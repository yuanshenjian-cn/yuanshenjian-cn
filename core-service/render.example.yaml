services:
  - type: web
    name: blog-core-service
    runtime: python
    rootDir: .
    buildCommand: pip install -r core-service/requirements.txt
    startCommand: alembic -c core-service/alembic.ini upgrade head && uvicorn app.main:app --app-dir core-service --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeployTrigger: off
    envVars:
      - key: APP_ENV
        value: production
      - key: PUBLIC_SITE_URL
        value: https://yuanshenjian.cn
      - key: API_PUBLIC_BASE_URL
        value: https://api.yuanshenjian.cn
      - key: ALLOWED_ORIGINS_RAW
        value: https://yuanshenjian.cn,https://www.yuanshenjian.cn,https://admin.yuanshenjian.cn
      - key: COOKIE_DOMAIN
        value: .yuanshenjian.cn
      - key: AI_ACTIVE_PROFILE
        value: deepseek/deepseek-v4-flash
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_SECRET_HASH
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: EMBEDDING_BASE_URL
        value: https://api.openai.com/v1
      - key: EMBEDDING_API_KEY
        sync: false
      - key: EMBEDDING_MODEL_ID
        value: text-embedding-3-small
      - key: EMBEDDING_DIMENSIONS
        value: "1536"
      - key: EMERGENCY_DISABLE_AI
        value: "false"
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: MOONSHOT_API_KEY
        sync: false
      - key: OPENAI_COMPATIBLE_API_KEY
        sync: false
