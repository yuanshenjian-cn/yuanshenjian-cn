,\"year\":\"2026\",\"month\":\"04\",\"day\":\"07\",\"title\":\"Claude Code 第七篇：扩展架构全景——Skills、Sub-agents、Hooks、MCP、Plugins 与 Agent Teams\",\"date\":\"2026-04-07T00:00:00.000Z\",\"excerpt\":\"系统拆解 Claude Code 的六大扩展机制——Skills、Sub-agents、Hooks、MCP、Plugins、Agent Teams，理解它们的定位、协作关系与选型决策，帮你从「会用工具」迈向「设计工具链」。\"},{\"slug\":\"claude-code-settings-and-permissions\",\"year\":\"2026\",\"month\":\"04\",\"day\":\"06\",\"title\":\"Claude Code 第六篇：设置、权限与 Auto Mode\",\"date\":\"2026-04-06T00:00:00.000Z\",\"excerpt\":\"深入 Claude Code 的四层设置体系、细粒度权限规则语法、Auto Mode 分类器配置与沙箱化纵深防御，帮你在安全与效率之间找到最佳平衡点。\"},{\"slug\":\"claude-code-memory-and-claude-md\",\"year\":\"2026\",\"month\":\"04\",\"day\":\"05\",\"title\":\"Claude Code 第五篇：记忆层——CLAUDE.md、Rules 与 Auto Memory\",\"date\":\"2026-04-05T00:00:00.000Z\",\"excerpt\":\"Claude Code 每次启动都是一张白纸——除非你给它\\\"记忆\\\"。CLAUDE.md 是你写给 Claude 的操作手册，Rules 是模块化的规则引擎，Auto Memory 是 Claude 自己的笔记本。三者配合，让 Claude 不再每次都从零开始。本文详解三套记忆系统的机制、写法与实战模式。\"},{\"slug\":\"claude-code-interactive-mode-and-built-in-commands\",\"year\":\"2026\",\"month\":\"04\",\"day\":\"04\",\"title\":\"Claude Code 第四篇：交互模式、内置命令与上下文管理\",\"date\":\"2026-04-04T00:00:00.000Z\",\"excerpt\":\"Claude Code 的交互终端远不止\\\"打字→回车\\\"。六种权限模式、60+ 条内置命令、快捷键组合、上下文管理策略——掌握这些，你才算真正\\\"住进\\\"了 Claude Code。本文带你从权限模式、键盘操控、命令体系到上下文管理，逐层拆解 Claude Code 的交互全貌。\"},{\"slug\":\"claude-code-common-workflows\",\"year\":\"2026\",\"month\":\"04\",\"day\":\"03\",\"title\":\"Claude Code 第三篇：日常工作流——探索、修 Bug、重构、写测试、Git、Review\",\"date\":\"2026-04-03T00:00:00.000Z\",\"excerpt\":\"Claude Code 不只是问答机器人，而是一个能读文件、跑命令、改代码的代理式编码环境。本文通过六个真实开发场景，展示如何用 Claude Code 高效完成日常研发任务——从理解陌生代码到修 Bug、重构、写测试、提交 PR，直到一轮对话跑完完整闭环。\"},{\"slug\":\"claude-code-getting-started\",\"year\":\"2026\",\"month\":\"04\",\"day\":\"02\",\"title\":\"Claude Code 第二篇：快速上手——安装、登录、选入口、跑通第一个真实任务\",\"date\":\"2026-04-02T00:00:00.000Z\",\"excerpt\":\"从安装到跑通第一个真实任务，只需要十分钟。本文覆盖三种安装方式、四种登录认证、五大入口选择，并带你用一个真实项目闭环走完\\\"理解代码→修改→验证→提交\\\"的全流程。\"},{\"slug\":\"opencode-to-claude-code-getting-oriented\",\"year\":\"2026\",\"month\":\"04\",\"day\":\"01\",\"title\":\"Claude Code 第一篇：从 OpenCode 切到 Claude Code——心智模型、迁移清单与能力地图\",\"date\":\"2026-04-01T00:00:00.000Z\",\"excerpt\":\"从 OpenCode 迁移到 Claude Code，不只是换一个 CLI 工具。这是一次从\\\"开源灵活\\\"到\\\"深度集成\\\"的范式转变。本文梳理两者的核心差异、Claude Code 的产品地图与功能矩阵，并提供一份可操作的迁移清单，帮你高效完成切换。\"},{\"slug\":\"oh-my-opencode-atlas-vs-sisyphus-arch\",\"year\":\"2026\",\"month\":\"02\",\"day\":\"24\",\"title\":\"Oh My OpenCode：Atlas vs Sisyphus 双 orchestrator 架构解析\",\"date\":\"2026-02-24T00:00:00.000Z\",\"excerpt\":\"Atlas 和 Sisyphus 是 OhMyOpenCode 插件中的两个核心 orchestrator 代理。Sisyphus 定位为全能主协调器，负责意图解析、动态规划和智能委派，拥有完整的工具权限但不能直接调用特定代理。Atlas 则是纯协调指挥家，不直接写代码，专注于协调和验证，通过 4-Phase QA Protocol 严格验证每个委派任务。两者在代码权限、适用场景、状态管理、并行策略和验证职责等方面有本质差异，分别代表了高级工程师和技术负责人两种不同的 orchestration 哲学。\"},{\"slug\":\"oh-my-opencode-sisyphus-ultrawork-mode\",\"year\":\"2026\",\"month\":\"02\",\"day\":\"17\",\"title\":\"Oh My OpenCode：Sisyphus ultrawork mode\",\"date\":\"2026-02-17T00:00:00.000Z\",\"excerpt\":\"西西弗斯超强工作模式（ultrawork mode）是一套严格的工作规范，旨在确保AI助手在实现任务前达到100%的确定性。该模式强调深度思考、彻底探索和精确交付，要求在使用任何代码前完全理解用户需求、探索代码库模式、制定清晰计划并解决所有歧义。通过强制性的确定性协议、代理委托机制和零容忍失败策略，确保高质量、完整无缺的交付成果。\"},{\"slug\":\"oh-my-opencode-categories-quick-reference\",\"year\":\"2026\",\"month\":\"02\",\"day\":\"11\",\"title\":\"Oh My OpenCode：Categories 速查手册\",\"date\":\"2026-02-11T00:00:00.000Z\",\"excerpt\":\"Oh My OpenCode Categories 系统深度解析，详细介绍 8 个内置 Category（visual-engineering、ultrabrain、deep、artistry、quick、unspecified-low、unspecified-high、writing）的工作原理、模型配置和使用场景。Category 是针对特定领域优化的 Agent 配置预设，通过 `task(category=\\\"xxx\\\")` 调用时由 Sisyphus-Junior 执行器完成工作。本文还介绍 Category 与 Skill 的组合策略、自定义 Category 配置方法、模型解析优先级机制，以及实际开发中的最佳实践。\"},{\"slug\":\"oh-my-opencode-agents-quick-reference\",\"year\":\"2026\",\"month\":\"02\",\"day\":\"10\",\"title\":\"Oh My OpenCode：Agent 速查手册\",\"date\":\"2026-02-10T00:00:00.000Z\",\"excerpt\":\"Oh My OpenCode Agent 系统完全指南，面向初学者深入解析 AI agent 工作原理。系统共有 11 个 AI agent，分为 Primary Agents（主 agent）和 Sub Agents（子 agent）两大类。主 agent 包括西西弗斯、赫菲斯托斯、阿特拉斯和普罗米修斯，负责复杂任务编排、端到端功能实现、长期项目管理和战略规划。子 agent 提供预规划分析、计划验证、架构咨询、文档搜索等专业化支持。本指南详细介绍每个 agent 的角色定位、工作机制、适用场景和最佳实践，帮助开发者高效选择和使用合适的 agent 完成任务。\"},{\"slug\":\"opencode-agent-quick-reference\",\"year\":\"2026\",\"month\":\"02\",\"day\":\"09\",\"title\":\"OpenCode Agent 速查手册\",\"date\":\"2026-02-09T00:00:00.000Z\",\"excerpt\":\"OpenCode 的 Sub Agent 功能让 AI 编程助手从单一对话模式升级为多代理协作系统。本文详细介绍 Primary Agent 与 Sub Agent 的区别、内置代理类型、配置方法以及实战使用技巧，帮助你构建更高效的 AI 辅助开发工作流。\"},{\"slug\":\"opencode-advanced-tips-and-practices\",\"year\":\"2026\",\"month\":\"02\",\"day\":\"07\",\"title\":\"OpenCode 基础使用：提升编程效率的技巧\",\"date\":\"2026-02-07T00:00:00.000Z\",\"excerpt\":\"掌握 OpenCode 的一些基础使用技巧，从初级自然语言提问到高级自定义配置，通过实战案例学习如何用 AI Coding Agent 提升编码效率。\"},{\"slug\":\"opencode-ai-coding-agent-getting-started\",\"year\":\"2026\",\"month\":\"02\",\"day\":\"06\",\"title\":\"OpenCode 新手入门：从零开始使用\",\"date\":\"2026-02-06T00:00:00.000Z\",\"excerpt\":\"OpenCode 是一款开源的 AI Coding Agent，支持终端、桌面应用和主流 IDE。本文从零开始，带你完成 OpenCode 的安装配置和初次使用，快速上手这款提升编程效率的神器。\"},{\"slug\":\"my-simple-design-perspective\",\"year\":\"2025\",\"month\":\"03\",\"day\":\"08\",\"title\":\"我的简单设计观\",\"date\":\"2025-03-08T00:00:00.000Z\",\"excerpt\":\"我的简单设计观阐述了支撑简单设计落地的四个核心价值观：专注（专注于当下真实业务价值，不为未来可能的需求过度设计）、克制（控制溢念，避免用\\\"假如\\\"\\\"万一\\\"为代码引入不必要的复杂性）、懒惰（恰当的懒惰驱动消除重复、引入自动化，是保持系统简单的助推剂）、勇气（拒绝损害代码质量的行为，在团队中坚持简单设计原则）。这套价值观源自多年XP和Scrum实践，强调始终从业务问题出发做出明智的设计选择。\"},{\"slug\":\"simple-design-principles-novel\",\"year\":\"2025\",\"month\":\"02\",\"day\":\"15\",\"title\":\"简单设计五原则（小说版）\",\"date\":\"2025-02-15T00:00:00.000Z\",\"excerpt\":\"简单设计五原则（小说版）用师徒对话的形式讲解了简单设计的四条核心原则：通过测试（满足业务需求而非追求测试覆盖率）、消除重复（避免霰弹式修改提升响应力）、揭示意图（用业务语言命名）、最少元素（保持简洁Less is More）。并引入优先级原则：通过测试 \u003e 消除重复 \u003e= 揭示意图 \u003e 最少元素。当设计决策冲突时，优先保证测试通过，在消除重复和揭示意图之间做适度权衡，始终追求刚好够用的设计。\"},{\"slug\":\"state-verification-challenges\",\"year\":\"2024\",\"month\":\"08\",\"day\":\"05\",\"title\":\"状态验证的困境\",\"date\":\"2024-08-05T00:00:00.000Z\",\"excerpt\":\"跨进程状态验证面临获取最终状态的困境，如邮件是否送达难以验证。通过GreenMail等轻量级Fake Mail Server可以捕获发送数据，实现跨进程行为验证。这种方式验证系统是否按预期调用第三方服务，是解决跨进程验证难题的有效策略。理解进程边界测试的复杂性，有助于设计更全面的测试方案。\"},{\"slug\":\"behavior-verification-traps\",\"year\":\"2024\",\"month\":\"08\",\"day\":\"04\",\"title\":\"行为验证的陷阱\",\"date\":\"2024-08-04T00:00:00.000Z\",\"excerpt\":\"跨进程边界的行为验证存在陷阱，无法验证SQL语句与数据库表的映射是否正确。In-Memory Database如H2可实现跨进程状态验证，通过真实数据库操作验证最终数据状态。理解这些陷阱和替代方案，有助于编写更可靠的测试，避免因实现细节变化导致的测试脆弱性问题。\"},{\"slug\":\"in-process-verification\",\"year\":\"2024\",\"month\":\"08\",\"day\":\"03\",\"title\":\"进程内测试验证\",\"date\":\"2024-08-03T00:00:00.000Z\",\"excerpt\":\"进程内测试验证包括状态验证和行为验证两种方式。状态验证直接读取最终状态，稳定可靠；行为验证使用Mock验证交互过程，粒度更细但更脆弱。通过购物车和停车男孩等实例，展示了两种验证方式的具体应用场景和优缺点，帮助理解测试设计的选择策略。\"},{\"slug\":\"state-vs-behavior-verification\",\"year\":\"2024\",\"month\":\"08\",\"day\":\"02\",\"title\":\"测试验证因果说\",\"date\":\"2024-08-02T00:00:00.000Z\",\"excerpt\":\"状态验证和行为验证是测试验证的两种方式。状态验证通过检查最终状态来判断功能正确性，稳定可靠；行为验证通过检查交互过程来推断结果，但存在脆弱性问题。当状态不可访问或依赖难以验证时，行为验证成为必要选择。理解两种验证方式的适用场景和优缺点，有助于设计更健壮的测试策略。\"},{\"slug\":\"tdd-introduction\",\"year\":\"2024\",\"month\":\"08\",\"day\":\"01\",\"title\":\"测试驱动开发\",\"date\":\"2024-08-01T00:00:00.000Z\",\"excerpt\":\"自动化测试是软件交付质量的保障，能显著提升问题发现和定位的速度。测试金字塔和敏捷测试四象限为制定测试策略提供了理论指导。Q1定位测试聚焦细粒度代码，帮助快速定位问题；Q2发现测试覆盖业务功能，帮助快速发现问题。合理搭配不同层次的测试，构建自动化测试体系，是实现高质量软件交付的关键实践。\"},{\"slug\":\"agile-growth-assistant\",\"year\":\"2023\",\"month\":\"01\",\"day\":\"01\",\"title\":\"敏捷软件教练书单\",\"date\":\"2023-01-01T00:00:00.000Z\",\"excerpt\":\"为敏捷软件教练和实践者推荐的书单，涵盖敏捷技术（测试驱动开发、重构、持续交付、代码整洁等）、敏捷管理（Scrum、看板、敏捷转型等）、教练技术（高绩效教练、共创式教练等）、引导技术（世界咖啡、开放空间等）、通用管理（团队协作、第五项修炼等）、领导力（影响力、驱动力等）以及哲学心理学（道德经、心流、自控力等）多个领域，帮助读者构建完整的敏捷知识体系和个人能力。\"},{\"slug\":\"3-misunderstandings-of-programmer\",\"year\":\"2021\",\"month\":\"02\",\"day\":\"22\",\"title\":\"程序员的3种思维误区\",\"date\":\"2021-02-22T00:00:00.000Z\",\"excerpt\":\"总结程序员在职业发展过程中常见的三种思维误区：不思考业务价值、不注重基本功修炼、不愿跳出自我局限。文章通过实际案例和寓言故事，阐述如何避免这些误区，强调要用正确的方式做正确的事情，追求卓越，持续改进，成为有价值的程序员。\"},{\"slug\":\"avoid-ineffective-knowledge-management\",\"year\":\"2021\",\"month\":\"02\",\"day\":\"02\",\"title\":\"远离无效的知识管理\",\"date\":\"2021-02-02T00:00:00.000Z\",\"excerpt\":\"探讨软件开发团队中的知识管理问题，区分显性知识、隐性知识和不可言说知识三类。文章指出团队常陷入企图用显性知识管理方式处理不可言说知识的陷阱，强调有效的知识管理需要通过社交活动如结对编程、Code Review等来传递不可言说的知识，形成生产-传递-运用-吸收的完整知识消费闭环。\"},{\"slug\":\"some-thought-of-a-book\",\"year\":\"2020\",\"month\":\"07\",\"day\":\"15\",\"title\":\"《你只是看起来很努力》些许感想\",\"date\":\"2020-07-15T00:00:00.000Z\",\"excerpt\":\"阅读《你只是看起来很努力》后，作者通过书中故事分享了几个重要感悟。关于不要忽视亲人，提醒我们不要对习关于警惕弱者思维，批评别人容易但建设性建议才是关键，当一个人取得成功时应研究学习而非盲目批判。书中核心观点是你只是看起来很努力——很多人看似忙碌实则低效，时间管理和专注是挑战。通过设定明确目标、排除外界干扰来保持专注，提升效率。对于不同观点应以开放心态看待，尊重每个人的价值观。\"},{\"slug\":\"tcr-is-not-best-practice\",\"year\":\"2020\",\"month\":\"02\",\"day\":\"09\",\"title\":\"TCR不是最佳实践\",\"date\":\"2020-02-09T00:00:00.000Z\",\"excerpt\":\"探讨TCR（Test \u0026\u0026 Commit || Revert）这一极限编程实践的本质和价值。TCR要求测试通过就提交代码，测试失败就回滚代码，通过极端的反馈机制强迫开发者频繁进行小步提交。文章分析TCR的核心目的不是作为常规实践，而是作为学习工具帮助开发者体会小步提交的价值。\"},{\"slug\":\"story-kickoff-and-deskcheck\",\"year\":\"2020\",\"month\":\"02\",\"day\":\"06\",\"title\":\"故事的首尾呼应\",\"date\":\"2020-02-06T00:00:00.000Z\",\"excerpt\":\"介绍用户故事开发中的两个轻量级实践：Story Kick Off（开卡）和 Story Desk Check（验卡）。通过情景再现的方式说明这两个实践如何帮助团队在开发前达成需求共识、在开发后快速验收，通过前置反馈减少返工浪费，确保团队始终在做正确的事情。\"},{\"slug\":\"mocks-arent-stubs\",\"year\":\"2020\",\"month\":\"01\",\"day\":\"02\",\"title\":\"Mocks 不是 Stubs\",\"date\":\"2020-01-02T00:00:00.000Z\",\"excerpt\":\"深入探讨Mock对象与Stub的区别，介绍状态验证与行为验证两种测试风格，以及古典派（Classical）和模拟派（Mockist）TDD的差异。文章通过代码示例详细说明两种测试风格的特点、优缺点和适用场景，帮助开发者理解如何选择合适的测试策略。\"},{\"slug\":\"solid-in-depth-explanation-en\",\"year\":\"2019\",\"month\":\"12\",\"day\":\"27\",\"title\":\"SOLID entrepreneurial story of Mr. Object-Oriented\",\"date\":\"2019-12-27T00:00:00.000Z\",\"excerpt\":\"\\n\\n\\n\\nMain members Introduction:\\n\\n- Mr. Yuan: boss, alias Mr. Object-Oriented, Referred to as Yuan\\n- Ms. Wu, Ms. Cai, Mr. Xiao, Mr. Shi, Mr Fa, Ms. Ren, Mr. Xing, employees\\n\\n\\n\\nAfter doing so many years ...\"},{\"slug\":\"solid-in-depth-explanation\",\"year\":\"2019\",\"month\":\"08\",\"day\":\"15\",\"title\":\"听面向对象先生聊SOLID创业故事\",\"date\":\"2019-08-15T00:00:00.000Z\",\"excerpt\":\"SOLID五大原则的创业故事解读：ISP（接口隔离原则）如袁Sir为不同顾客提供不同工具箱，不要强迫使用者依赖不需要的接口；LSP（里氏替换原则）如徒弟继承师傅手艺但修改风格会导致合作失败，强调子类替换父类行为需一致；DIP（依赖倒置原则）如通过服务清单依赖抽象而非具体执行者，从依赖实现转向依赖抽象；SRP（单一职责原则）如部门拆分各司其职，关注点分离提高效率；OCP（开闭原则）如引入读书大使对扩展开放对修改关闭。SOLID帮助设计高内聚低耦合的软件，降低维护成本。\"},{\"slug\":\"feedback-in-thoughtworks\",\"year\":\"2019\",\"month\":\"04\",\"day\":\"15\",\"title\":\"在ThoughtWorks，希望你知道的Feedback\",\"date\":\"2019-04-15T00:00:00.000Z\",\"excerpt\":\"在ThoughtWorks，Feedback的重要性犹如发动机于车，摒弃了传统KPI绩效考核后，Feedback成为推进绩效管理的核心机制。优质的Feedback需要具备三个基本属性：有心（走心，借助实际案例支撑）、有料（基于事实表达，避免空泛评价）、有效（及时传达、提供改进措施并促成执行）。Feedback对于个人而言能提升工作体验和胜任力，对于组织而言能帮助新人顺利转正、传承文化。作为提供方，应构建安全环境、使用沟通技巧；作为接受方，应保持开放心态、积极行动。\"},{\"slug\":\"beyond-training\",\"year\":\"2019\",\"month\":\"03\",\"day\":\"26\",\"title\":\"超越培训 -- 比培训多做一点点\",\"date\":\"2019-03-26T00:00:00.000Z\",\"excerpt\":\"本文发表于ThoughtWorks洞见。思沃内训团队的定位是超越培训、搞能力建设。单纯培训难以解决能力问题，必须比培训多做一点。训战模式核心思想是培训+实战，统筹训前、中、后三个阶段，做到训前瞄准、训中调整、训后复审。训前深入团队分析现状，量身定制方案；培训中诱发认知转变，通过螺旋化共创让学员经历困惑、解惑过程；训后部署训战计划促进知识转换。训战成功要素包括一致期望、专业培训、承诺计划、严格跟踪。最终目标是帮助团队将知识转化为技能，解决实际问题。\"},{\"slug\":\"talking-about-is-a-in-ood\",\"year\":\"2018\",\"month\":\"12\",\"day\":\"25\",\"title\":\"聊聊面向对象设计中的Is-A\",\"date\":\"2018-12-25T00:00:00.000Z\",\"excerpt\":\"面向对象设计的三大特性是封装、继承、多态，IS-A是检验继承关系的常用工具。然而IS-A在某些场景下会失效，如Square IS A Rectangle在业务逻辑中并不成立——当Square重写setWidth和setHeight改变行为时，使用父类引用调用方法会产生不同结果。LSP（里氏替换原则）强调IS-A是基于行为方式的，当子类改变父类行为时需要重新审视继承关系。解决方案是进一步抽象，将Square和Rectangle抽象为Quads，回归多态本质。\"},{\"slug\":\"make-lsp-working-for-you\",\"year\":\"2018\",\"month\":\"12\",\"day\":\"15\",\"title\":\"让里氏替换原则为你效力\",\"date\":\"2018-12-15T00:00:00.000Z\",\"excerpt\":\"SOLID是面向对象设计的五大原则，LSP（里氏替换原则）强调子类实例替换父类实例不会改变程序行为。Square继承Rectangle的例子展示了LSP被破坏的场景——当Square重写setWidth和setHeight改变行为时，替换会导致程序出错。继承的核心目的是复用，但子类不应重写父类方法。可以用Is-A初步验证继承关系，当LSP失效时需要进一步抽象，将Square和Rectangle抽象为Quads，避免破坏LSP。LSP是检验继承关系合理性的有效工具，帮助减少继承滥用，提升软件设计质量。\"},{\"slug\":\"two-basic-element-of-scrum-team\",\"year\":\"2018\",\"month\":\"11\",\"day\":\"27\",\"title\":\"Scrum团队的两个基本元素\",\"date\":\"2018-11-27T00:00:00.000Z\",\"excerpt\":\"Scrum犹如一场创业，自治团队最基础的两个元素是\\\"志同\\\"和\\\"自省\\\"。敏捷精髓在于价值观层面：尊重、沟通、专注、承诺、勇气、反馈、开放。团队需持续自省，跳出术的视野思考实践是否违背核心价值观。志同则是高效协作的核心动力，团队成员目标一致且互相信任，具备T型技能和多功能特性。敏捷分三个层次：道（价值观）、法（原则）、术（实践），前进方式应是守、破、离——先守术，再破法，最后根据价值观创新实践。\"},{\"slug\":\"understand-agile-manifesto-deeply\",\"year\":\"2018\",\"month\":\"10\",\"day\":\"30\",\"title\":\"深入解读敏捷宣言\",\"date\":\"2018-10-30T00:00:00.000Z\",\"excerpt\":\"2001年17位反叛性软件开发人员在犹他州雪鸟城制定并签署敏捷宣言。四句核心价值观：个体与交互优于流程与工具、可工作的软件优于面面俱到的文档、客户协作优于合同谈判、响应变化优于遵循计划。以人为本强调尊重信任激发个人潜能，建立自治全功能团队。价值导向以交付可工作的软件为核心，文档应有选择地保留。客户团队强调与客户建立信任合作关系取代敌对谈判。拥抱变化道出敏捷精髓——通过高效协作获取快速反馈以减少浪费。敏捷是文化价值认同，比形式更重要的是对敏捷价值观的理解和认同。\"},{\"slug\":\"programmer-to-trainner\",\"year\":\"2018\",\"month\":\"10\",\"day\":\"19\",\"title\":\"从写代码到做培训\",\"date\":\"2018-10-19T00:00:00.000Z\",\"excerpt\":\"作为程序员工作五年后，作者踏上培训道路开始梳理总结分享。发展他人的意愿是成为培训师的基础，在ThoughtWorks被列入胜任力模型。转型前有四点顾虑：培训劳心劳体是否拖垮身体；台上讲话紧张会否被嘲笑；不会课程设计是否会误人子弟；远离一线技术是否会退化。关于培训收获，强化了沟通协作、梳理知识体系、拓展外训视野、获得认证机会。培训师面对培训无用论的回答是：培训核心作用是让你知道自己不知道，再通过知识扩充、实战操练和技能转化达到提升目的。\"},{\"slug\":\"three-practices-of-simple-design\",\"year\":\"2018\",\"month\":\"08\",\"day\":\"27\",\"title\":\"简单设计落地三板斧\",\"date\":\"2018-08-27T00:00:00.000Z\",\"excerpt\":\"简单设计落地需要三板斧：TDD、重构和整洁代码。TDD通过测试驱动开发、测试驱动设计、任务驱动开发三种层次指导编码；重构在不改变行为的前提下改善代码设计；整洁代码强调不重复、揭示意图、简单三点核心价值。这三者形成有机整体，TDD开启开发、重构优化设计、整洁代码收尾，共同支撑简单设计的核心价值——编写简洁可用的代码。\\n\\n价值体系\\n假如让你去建造一幅巨大的广告牌，你会怎么做？从大框架来看，首先要打牢地基，再使用结实支柱做支撑，最后在顶部挂上广告牌。地基和支柱是帮助完成目标的必备条件。\"},{\"slug\":\"vd-cast-model-in-workshop\",\"year\":\"2018\",\"month\":\"07\",\"day\":\"05\",\"title\":\"Workshop中的价值交付投射模型\",\"date\":\"2018-07-05T00:00:00.000Z\",\"excerpt\":\"作者结合组织Workshop的经验，提炼出VD CAST模型（价值交付投射模型）来指导Workshop的组织和实施。模型左边是价值，中间是影响价值落地的五大因素（约束、受众、支持、跟踪），右边是最终交付。将Workshop视同Sprint，划分为5个阶段：需求分析、架构搭建、课程设计、课程交付、回顾复盘。VD CAST模型帮助组织者分离关注点，提前识别风险，评估Workshop能否落地并实现预设价值。\"},{\"slug\":\"summary-for-2017\",\"year\":\"2017\",\"month\":\"12\",\"day\":\"31\",\"title\":\"轻描淡写的2017\",\"date\":\"2017-12-31T00:00:00.000Z\",\"excerpt\":\"2017年主旋律是\\\"忙\\\"，作者在磕磕碰碰中收获了三个重要词汇：自信、健康和自律。关于自信，通过Workshop、演讲、培训等活动在挣扎中突破自己，借助公众压力驱动自己前进。关于健康，用三个月减重5公斤，一年内脂降低2%、身体年龄减小7岁，饮食控制并未造成生活困扰反而更热爱健康饮食。关于自律，坚持做一件让自己变好的事情需要极端自律，高质量执行比简单按计划执行更重要。自律给我自由，哪有什么天生如此，只是天天坚持。\"},{\"slug\":\"unit-test-from-other-sight\",\"year\":\"2017\",\"month\":\"12\",\"day\":\"20\",\"title\":\"从另一个角度告诉你单元测试的意义\",\"date\":\"2017-12-20T00:00:00.000Z\",\"excerpt\":\"微服务架构如火如荼，但单元测试仍是根本。微服务架构让服务独立小巧，但这不意味着可以忽略单元测试。微服务提倡服务间契约测试集成，但单元测试仍是性价比最高的实践。三个维度看单元测试：能力建设上，单元测试易上手，培训和Pair可快速培养能力，测试即文档帮助新人了解业务；生产效率上，重Service测试轻单元测试会导致反馈慢、缺陷发现晚；卓越态度上，追求卓越的程序员应编写Clean Test，单元测试可作为设计工具让代码更易测试。编写有效单元测试需要遵循SOLID原则，避免STUPID代码，践行GRASP原则，并对测试坏味道保持敏锐嗅觉。\"},{\"slug\":\"a-different-journey-in-thoughtworks\",\"year\":\"2017\",\"month\":\"12\",\"day\":\"15\",\"title\":\"ThoughtWorks给你不一样的入职之旅\",\"date\":\"2017-12-15T00:00:00.000Z\",\"excerpt\":\"本文同时发表于ThoughtWorks洞见。ThoughtWorks为新人提供TWU（应届生5周海外培训）、TWI（社招3天培训）、NHO、Buddy/Sponsor等丰富培训资源。北京Office推出Local项目人才培养计划，以\\\"学习者为中心\\\"进行四周脱产培训。培训体系包括：削弱象牙塔意识、建立Owner意识、明确可验证目标、构建项目技能树、教学反馈环、持续改进反馈、渗透敏捷文化、保持运动健康。Coach角色是引导启发而非灌输知识，新人需明确学习目标并承担成长责任。敏捷实践（Standup、Code Review、Retro、TDD、Pair等）应渗透到培训中，运动健身则保障培训可持续性。\"},{\"slug\":\"student-centralized-pdt\",\"year\":\"2017\",\"month\":\"10\",\"day\":\"23\",\"title\":\"以学习者为中心的项目驱动培训\",\"date\":\"2017-10-23T00:00:00.000Z\",\"excerpt\":\"ThoughtWorks北京Office与思沃学院推出Local项目人才培养计划，对5位新人进行四周封闭式脱产培训。以学习者为中心的项目驱动培训，强调启发式教学而非填鸭式灌输。培训体系包括：削弱象牙塔意识（拒绝\\\"老师\\\"词汇，传授解决问题套路）、建立Owner意识、明确可验证目标、构建围绕项目的技能树、教学反馈环（讲解-演示-练习-巩固-拓展-反馈分享）、持续改进反馈、敏捷文化渗透、运动健康保持。核心是教练少讲课多引导，学习者清楚目标并自主学习，培养责任意识。\"},{\"slug\":\"test-strategy-for-microservice-2\",\"year\":\"2017\",\"month\":\"07\",\"day\":\"25\",\"title\":\"微服务架构下的测试应对策略（下）\",\"date\":\"2017-07-25T00:00:00.000Z\",\"excerpt\":\"本文介绍消费者驱动契约测试（CDCT）。CDCT的流程是消费者定义期望的API或消息，这些期望即为契约，从契约生成存根供消费者团队在构建过程中重复使用。CDCT强调契约由消费者驱动并由双方共同遵守，只有双方都将文档转换成可工作的软件时，契约才真正生效。技术实践上，Spring Cloud Contract和Pact是流行的CDCT框架。微服务架构的盛行促使团队测试策略演变：引入CDCT可以大大弱化UI测试。软件工程没有银弹，选择测试策略需遵循原则：单元测试成本低始终第一位、高层测试是第二防线、选择性价比高的方案、根据团队能力选择适合的策略。\"},{\"slug\":\"test-strategy-for-microservice-1\",\"year\":\"2017\",\"month\":\"07\",\"day\":\"05\",\"title\":\"微服务架构下的测试应对策略（上）\",\"date\":\"2017-07-05T00:00:00.000Z\",\"excerpt\":\"系统架构从单体应用演变到SOA再到微服务架构，解决了扩展性、维护性、部署发布等瓶颈，但也带来了服务拆分、设计、测试的复杂性。单体应用的测试策略简单直接：足够单元测试、一定Service测试、少量E2E测试。微服务架构下，系统集成测试面临环境维护成本高、问题难定位、运行速度慢等痛点。Pair集成测试提出积小成多理念保证服务俩俩集成可靠。引入Contract概念的集成测试通过前后端共同定义API协议来支持并行开发，但仍缺乏自动化监控机制来同步契约变更，这就是CDCT要解决的问题。\"},{\"slug\":\"unit-test-in-a-programmer\",\"year\":\"2017\",\"month\":\"06\",\"day\":\"05\",\"title\":\"一枚程序员眼中的单元测试\",\"date\":\"2017-06-05T00:00:00.000Z\",\"excerpt\":\"程序员应手持神剑、心怀善念地成为战士，编写高质量代码以促成高质量交付。单元测试能增强代码信心、轻松完成工作、改良设计、缩减调试时间、作为测试文档。测试金字塔中单元测试位于底端，应更\\\"凶猛\\\"。不写测试的借口有无辜派（不清楚代码行为）、个性派（测试不是我的工作）、同理派（让QA失业内疚）。编写单元测试太花时间是常见担忧，但实践表明TDD方式总时间不会多于裸奔代码。测试价值大于成本时编写，否则需取舍，如追求100%覆盖率或快速技术Spike时可考虑不写。\"},{\"slug\":\"a-letter-for-newer\",\"year\":\"2017\",\"month\":\"02\",\"day\":\"28\",\"title\":\"写给新人的一封信\",\"date\":\"2017-02-28T00:00:00.000Z\",\"excerpt\":\"本文同时发表于ThoughtWorks洞见。作者结合自身经历和身边故事，给软件行业新人分享建议。关于认知误区：软件行业确实薪资较高，但仅靠速成培训班难以获得真正的高薪，热爱和持续投入才是关键；程序员加班分主动和被动，热爱技术者主动加班是享受而非负担；培训班不能保证好工作，关键在于自己扎实学习和勤加练习。关于新人定义，包括在校学生、转行者、已入行但迷茫的探索者。开启历练的最佳时机是大一大二，起步晚更需要加倍努力，不要抱有侥幸心理。最后强调：编程高手源自不断操练和思考，勇敢迈出第一步。\"},{\"slug\":\"my-agile-practice-in-thoughtworks\",\"year\":\"2017\",\"month\":\"02\",\"day\":\"12\",\"title\":\"我的ThoughtWorks敏捷初体验\",\"date\":\"2017-02-12T00:00:00.000Z\",\"excerpt\":\"分享在ThoughtWorks参与海外独立交付项目的敏捷实践经验。文章详细介绍了IPM、Standup、Story Kick Off、Pair、TDD、Code Review、Showcase、CI、Retro等敏捷实践，阐述如何通过高效协作与快速反馈实现项目成功交付，并强调敏捷不只是流程形式，更要追求实践背后的真正价值。\"},{\"slug\":\"summary-for-2016\",\"year\":\"2017\",\"month\":\"01\",\"day\":\"01\",\"title\":\"ThoughtWorks，我的2016\",\"date\":\"2017-01-01T00:00:00.000Z\",\"excerpt\":\"\\n\\n\\n---\\n\\n 匆匆那年\\n翻开自己的博客，重新读过 ThoughtWorks，我的2015\\n 这篇文章，感觉那时的我像是一个小孩吃到了期盼已久的糖果果，好奇心得到满足，并且也体会到了糖果的来之不易，拥有后倍加珍惜，而且享受其中。2015年，经历了`入职`--\u003e`Shadow(Off Shore)`--\u003e`On Beach`--\u003e`国内出差`--\u003e`国外出差`--\u003e`Billable(Off ...\"},{\"slug\":\"trust-building-for-buddy-sponsor\",\"year\":\"2016\",\"month\":\"05\",\"day\":\"15\",\"title\":\"Buddy/Sponsor培训•信任的构建\",\"date\":\"2016-05-15T00:00:00.000Z\",\"excerpt\":\"Buddy/Sponsor是ThoughtWorks的师徒制机制，Buddy陪伴新人度过试用期，Sponsor在转正后继续指导职业发展。这种机制旨在帮助新人融入大家庭、培养梯队建设、降低离职风险、吸引优秀人才。成功的Buddy/Sponsor应具备能力强、责任心、安全感、真诚、口碑好、亲和力、同理心等特质。信任的三要素包括：动机（互惠原则）、能力（技能、认知、态度）、品格（言行一致、履行承诺）。医患关系信任缺失的问题主要出在品格层面。作为Buddy/Sponsor，应认同公司文化价值观，对工作充满热情，富有责任心和同理心，积极主动地关注徒弟成长。\"},{\"slug\":\"3-mistakes-of-first-tl\",\"year\":\"2016\",\"month\":\"03\",\"day\":\"27\",\"title\":\"初次做技术领导的3个陷阱\",\"date\":\"2016-03-27T00:00:00.000Z\",\"excerpt\":\"开发人员初次转型为技术领导（TL）时，往往因为旧有习惯而踏入三个陷阱。第一个陷阱是所有时间都在编码，过度投入开发工作而忽略技术愿景创造、团队指导等职责。第二个陷阱是独自做所有技术决定，这会使TL成为团队瓶颈，削弱成员动力，应采用从委派到独裁等多种决策方式。第三个陷阱是忽视团队文化培养，未能建立信任关系和有效的协作机制。TL需要在技术和领导责任之间找到平衡，才能带领团队走向成功。\"},{\"slug\":\"5-tips-being-an-effective-tl\",\"year\":\"2016\",\"month\":\"03\",\"day\":\"15\",\"title\":\"高效技术领导的5个锦囊妙计\",\"date\":\"2016-03-15T00:00:00.000Z\",\"excerpt\":\"转型为技术领导（TL）对开发人员是艰难挑战，因为管理和沟通技能不能从编码经验自动转化。高效TL的五个锦囊：1.学会委托，不独自承担所有编码工作，让团队成员获得成长机会；2.抽出时间写代码，保持对代码库的熟悉和团队成员的尊敬；3.可视化系统架构，通过白板会议和图表帮助开发人员理解系统设计与自身工作的关联；4.与团队成员一对一交流，了解每个人的目标和成长需求；5.学会说业务语言，用业务人员熟悉的术语解释技术概念，减小沟通隔阂。\"},{\"slug\":\"summary-for-2015\",\"year\":\"2016\",\"month\":\"01\",\"day\":\"01\",\"title\":\"ThoughtWorks，我的2015\",\"date\":\"2016-01-01T00:00:00.000Z\",\"excerpt\":\"2015年3月26日，作者正式加入ThoughtWorks，结束了创业失败的经历，开启了这家专业软件咨询公司的旅程。从西安到珠海再到短暂的新加坡出差，作者参与了国内外项目交付，在敏捷实践中不断成长。这里聚集着对工作充满热情的人，高效完成高质量工作、为客户创造持久价值是目标。日常工作中出现最多的词包括敏捷开发、用户体验、持续集成、持续交付、代码整洁、结对编程、测试驱动、代码审查。环境上没有领导办公室、没有隔栏，人手MacBook Pro，网络无限制。作者在打鸡血的状态下高效工作、快乐生活，享受累并快乐着的过程。\"}]}]]}]}]\n"])</script><script>self.__next_f.push([1,"10:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\nc:null\n"])</script><script>self.__next_f.push([1,"16:I[622,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"e:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"袁慎建的主页 | Yuan Shenjian's Personal Blog\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"分享技术知识、生活感悟与个人想法\"}],[\"$\",\"link\",\"2\",{\"rel\":\"manifest\",\"href\":\"/manifest.json\",\"crossOrigin\":\"$undefined\"}],[\"$\",\"meta\",\"3\",{\"name\":\"theme-color\",\"content\":\"#000000\"}],[\"$\",\"meta\",\"4\",{\"name\":\"color-scheme\",\"content\":\"dark light\"}],[\"$\",\"meta\",\"5\",{\"name\":\"mobile-web-app-capable\",\"content\":\"yes\"}],[\"$\",\"meta\",\"6\",{\"name\":\"apple-mobile-web-app-title\",\"content\":\"YSJ Blog\"}],[\"$\",\"meta\",\"7\",{\"name\":\"apple-mobile-web-app-status-bar-style\",\"content\":\"default\"}],[\"$\",\"link\",\"8\",{\"rel\":\"shortcut icon\",\"href\":\"/favicon.ico\"}],[\"$\",\"link\",\"9\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\"}],[\"$\",\"link\",\"10\",{\"rel\":\"apple-touch-icon\",\"href\":\"/favicon.ico\"}],[\"$\",\"$L16\",\"11\",{}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"13:\"$e:metadata\"\n"])</script></body></html>
