",\"excerpt\":\"用了 OpenCode 一段时间后，大多数人还停在\\\"建个对话发需求\\\"的层面。这篇文章分享一些 TUI 界面里不太常见的操作方式，以及 Agent 配置体系的完整玩法——包括我自己的多模型 Agent 矩阵实践。\"},{\"slug\":\"claude-code-token-saving-tips\",\"year\":\"2026\",\"month\":\"04\",\"day\":\"13\",\"title\":\"Claude Code 省 Token 技巧\",\"date\":\"2026-04-13T00:00:00.000Z\",\"excerpt\":\"这篇文章把 Claude Code 省 Token 的关键经验整理成 10 条实用建议：什么时候该继续当前会话，什么时候该重开，为什么 1M 上下文别乱开，以及怎样通过精简 CLAUDE.md、减少无关输入和控制读取范围，把成本用在真正有价值的地方。\"},{\"slug\":\"claude-code-advanced-automation-with-mcp-hooks-and-agents\",\"year\":\"2026\",\"month\":\"04\",\"day\":\"08\",\"title\":\"Claude Code 第八篇：高阶自动化实战——Chrome、Channels、CI/CD 与跨端协作\",\"date\":\"2026-04-08T00:00:00.000Z\",\"excerpt\":\"三个端到端蓝图串联 Claude Code 全部扩展机制——本地 Chrome 自动化调试、GitHub CI/CD 无人值守流水线、跨端 Channels 协作，带你从理论走向实战。\"},{\"slug\":\"claude-code-extension-model-overview\",\"year\":\"2026\",\"month\":\"04\",\"day\":\"07\",\"title\":\"Claude Code 第七篇：扩展架构全景——Skills、Sub-agents、Hooks、MCP、Plugins 与 Agent Teams\",\"date\":\"2026-04-07T00:00:00.000Z\",\"excerpt\":\"系统拆解 Claude Code 的六大扩展机制——Skills、Sub-agents、Hooks、MCP、Plugins、Agent Teams，理解它们的定位、协作关系与选型决策，帮你从「会用工具」迈向「设计工具链」。\"},{\"slug\":\"claude-code-settings-and-permissions\",\"year\":\"2026\",\"month\":\"04\",\"day\":\"06\",\"title\":\"Claude Code 第六篇：设置、权限与 Auto Mode\",\"date\":\"2026-04-06T00:00:00.000Z\",\"excerpt\":\"深入 Claude Code 的四层设置体系、细粒度权限规则语法、Auto Mode 分类器配置与沙箱化纵深防御，帮你在安全与效率之间找到最佳平衡点。\"},{\"slug\":\"claude-code-memory-and-claude-md\",\"year\":\"2026\",\"month\":\"04\",\"day\":\"05\",\"title\":\"Claude Code 第五篇：记忆层——CLAUDE.md、Rules 与 Auto Memory\",\"date\":\"2026-04-05T00:00:00.000Z\",\"excerpt\":\"Claude Code 每次启动都是一张白纸——除非你给它\\\"记忆\\\"。CLAUDE.md 是你写给 Claude 的操作手册，Rules 是模块化的规则引擎，Auto Memory 是 Claude 自己的笔记本。三者配合，让 Claude 不再每次都从零开始。本文详解三套记忆系统的机制、写法与实战模式。\"},{\"slug\":\"claude-code-interactive-mode-and-built-in-commands\",\"year\":\"2026\",\"month\":\"04\",\"day\":\"04\",\"title\":\"Claude Code 第四篇：交互模式、内置命令与上下文管理\",\"date\":\"2026-04-04T00:00:00.000Z\",\"excerpt\":\"Claude Code 的交互终端远不止\\\"打字→回车\\\"。六种权限模式、60+ 条内置命令、快捷键组合、上下文管理策略——掌握这些，你才算真正\\\"住进\\\"了 Claude Code。本文带你从权限模式、键盘操控、命令体系到上下文管理，逐层拆解 Claude Code 的交互全貌。\"},{\"slug\":\"claude-code-common-workflows\",\"year\":\"2026\",\"month\":\"04\",\"day\":\"03\",\"title\":\"Claude Code 第三篇：日常工作流——探索、修 Bug、重构、写测试、Git、Review\",\"date\":\"2026-04-03T00:00:00.000Z\",\"excerpt\":\"Claude Code 不只是问答机器人，而是一个能读文件、跑命令、改代码的代理式编码环境。本文通过六个真实开发场景，展示如何用 Claude Code 高效完成日常研发任务——从理解陌生代码到修 Bug、重构、写测试、提交 PR，直到一轮对话跑完完整闭环。\"},{\"slug\":\"claude-code-getting-started\",\"year\":\"2026\",\"month\":\"04\",\"day\":\"02\",\"title\":\"Claude Code 第二篇：快速上手——安装、登录、选入口、跑通第一个真实任务\",\"date\":\"2026-04-02T00:00:00.000Z\",\"excerpt\":\"从安装到跑通第一个真实任务，只需要十分钟。本文覆盖三种安装方式、四种登录认证、五大入口选择，并带你用一个真实项目闭环走完\\\"理解代码→修改→验证→提交\\\"的全流程。\"},{\"slug\":\"opencode-to-claude-code-getting-oriented\",\"year\":\"2026\",\"month\":\"04\",\"day\":\"01\",\"title\":\"Claude Code 第一篇：从 OpenCode 切到 Claude Code——心智模型、迁移清单与能力地图\",\"date\":\"2026-04-01T00:00:00.000Z\",\"excerpt\":\"从 OpenCode 迁移到 Claude Code，不只是换一个 CLI 工具。这是一次从\\\"开源灵活\\\"到\\\"深度集成\\\"的范式转变。本文梳理两者的核心差异、Claude Code 的产品地图与功能矩阵，并提供一份可操作的迁移清单，帮你高效完成切换。\"},{\"slug\":\"oh-my-opencode-atlas-vs-sisyphus-arch\",\"year\":\"2026\",\"month\":\"02\",\"day\":\"24\",\"title\":\"Oh My OpenCode：Atlas vs Sisyphus 双 orchestrator 架构解析\",\"date\":\"2026-02-24T00:00:00.000Z\",\"excerpt\":\"Atlas 和 Sisyphus 是 OhMyOpenCode 插件中的两个核心 orchestrator 代理。Sisyphus 定位为全能主协调器，负责意图解析、动态规划和智能委派，拥有完整的工具权限但不能直接调用特定代理。Atlas 则是纯协调指挥家，不直接写代码，专注于协调和验证，通过 4-Phase QA Protocol 严格验证每个委派任务。两者在代码权限、适用场景、状态管理、并行策略和验证职责等方面有本质差异，分别代表了高级工程师和技术负责人两种不同的 orchestration 哲学。\"},{\"slug\":\"oh-my-opencode-sisyphus-ultrawork-mode\",\"year\":\"2026\",\"month\":\"02\",\"day\":\"17\",\"title\":\"Oh My OpenCode：Sisyphus ultrawork mode\",\"date\":\"2026-02-17T00:00:00.000Z\",\"excerpt\":\"西西弗斯超强工作模式（ultrawork mode）是一套严格的工作规范，旨在确保AI助手在实现任务前达到100%的确定性。该模式强调深度思考、彻底探索和精确交付，要求在使用任何代码前完全理解用户需求、探索代码库模式、制定清晰计划并解决所有歧义。通过强制性的确定性协议、代理委托机制和零容忍失败策略，确保高质量、完整无缺的交付成果。\"},{\"slug\":\"oh-my-opencode-categories-quick-reference\",\"year\":\"2026\",\"month\":\"02\",\"day\":\"11\",\"title\":\"Oh My OpenCode：Categories 速查手册\",\"date\":\"2026-02-11T00:00:00.000Z\",\"excerpt\":\"Oh My OpenCode Categories 系统深度解析，详细介绍 8 个内置 Category（visual-engineering、ultrabrain、deep、artistry、quick、unspecified-low、unspecified-high、writing）的工作原理、模型配置和使用场景。Category 是针对特定领域优化的 Agent 配置预设，通过 `task(category=\\\"xxx\\\")` 调用时由 Sisyphus-Junior 执行器完成工作。本文还介绍 Category 与 Skill 的组合策略、自定义 Category 配置方法、模型解析优先级机制，以及实际开发中的最佳实践。\"},{\"slug\":\"oh-my-opencode-agents-quick-reference\",\"year\":\"2026\",\"month\":\"02\",\"day\":\"10\",\"title\":\"Oh My OpenCode：Agent 速查手册\",\"date\":\"2026-02-10T00:00:00.000Z\",\"excerpt\":\"Oh My OpenCode Agent 系统完全指南，面向初学者深入解析 AI agent 工作原理。系统共有 11 个 AI agent，分为 Primary Agents（主 agent）和 Sub Agents（子 agent）两大类。主 agent 包括西西弗斯、赫菲斯托斯、阿特拉斯和普罗米修斯，负责复杂任务编排、端到端功能实现、长期项目管理和战略规划。子 agent 提供预规划分析、计划验证、架构咨询、文档搜索等专业化支持。本指南详细介绍每个 agent 的角色定位、工作机制、适用场景和最佳实践，帮助开发者高效选择和使用合适的 agent 完成任务。\"},{\"slug\":\"opencode-agent-quick-reference\",\"year\":\"2026\",\"month\":\"02\",\"day\":\"09\",\"title\":\"OpenCode Agent 速查手册\",\"date\":\"2026-02-09T00:00:00.000Z\",\"excerpt\":\"OpenCode 的 Sub Agent 功能让 AI 编程助手从单一对话模式升级为多代理协作系统。本文详细介绍 Primary Agent 与 Sub Agent 的区别、内置代理类型、配置方法以及实战使用技巧，帮助你构建更高效的 AI 辅助开发工作流。\"},{\"slug\":\"opencode-advanced-tips-and-practices\",\"year\":\"2026\",\"month\":\"02\",\"day\":\"07\",\"title\":\"OpenCode 基础使用：提升编程效率的技巧\",\"date\":\"2026-02-07T00:00:00.000Z\",\"excerpt\":\"掌握 OpenCode 的一些基础使用技巧，从初级自然语言提问到高级自定义配置，通过实战案例学习如何用 AI Coding Agent 提升编码效率。\"},{\"slug\":\"opencode-ai-coding-agent-getting-started\",\"year\":\"2026\",\"month\":\"02\",\"day\":\"06\",\"title\":\"OpenCode 新手入门：从零开始使用\",\"date\":\"2026-02-06T00:00:00.000Z\",\"excerpt\":\"OpenCode 是一款开源的 AI Coding Agent，支持终端、桌面应用和主流 IDE。本文从零开始，带你完成 OpenCode 的安装配置和初次使用，快速上手这款提升编程效率的神器。\"},{\"slug\":\"my-simple-design-perspective\",\"year\":\"2025\",\"month\":\"03\",\"day\":\"08\",\"title\":\"我的简单设计观\",\"date\":\"2025-03-08T00:00:00.000Z\",\"excerpt\":\"我的简单设计观阐述了支撑简单设计落地的四个核心价值观：专注（专注于当下真实业务价值，不为未来可能的需求过度设计）、克制（控制溢念，避免用\\\"假如\\\"\\\"万一\\\"为代码引入不必要的复杂性）、懒惰（恰当的懒惰驱动消除重复、引入自动化，是保持系统简单的助推剂）、勇气（拒绝损害代码质量的行为，在团队中坚持简单设计原则）。这套价值观源自多年XP和Scrum实践，强调始终从业务问题出发做出明智的设计选择。\"},{\"slug\":\"simple-design-principles-novel\",\"year\":\"2025\",\"month\":\"02\",\"day\":\"15\",\"title\":\"简单设计五原则（小说版）\",\"date\":\"2025-02-15T00:00:00.000Z\",\"excerpt\":\"简单设计五原则（小说版）用师徒对话的形式讲解了简单设计的四条核心原则：通过测试（满足业务需求而非追求测试覆盖率）、消除重复（避免霰弹式修改提升响应力）、揭示意图（用业务语言命名）、最少元素（保持简洁Less is More）。并引入优先级原则：通过测试 \u003e 消除重复 \u003e= 揭示意图 \u003e 最少元素。当设计决策冲突时，优先保证测试通过，在消除重复和揭示意图之间做适度权衡，始终追求刚好够用的设计。\"},{\"slug\":\"state-verification-challenges\",\"year\":\"2024\",\"month\":\"08\",\"day\":\"05\",\"title\":\"状态验证的困境\",\"date\":\"2024-08-05T00:00:00.000Z\",\"excerpt\":\"跨进程状态验证面临获取最终状态的困境，如邮件是否送达难以验证。通过GreenMail等轻量级Fake Mail Server可以捕获发送数据，实现跨进程行为验证。这种方式验证系统是否按预期调用第三方服务，是解决跨进程验证难题的有效策略。理解进程边界测试的复杂性，有助于设计更全面的测试方案。\"},{\"slug\":\"behavior-verification-traps\",\"year\":\"2024\",\"month\":\"08\",\"day\":\"04\",\"title\":\"行为验证的陷阱\",\"date\":\"2024-08-04T00:00:00.000Z\",\"excerpt\":\"跨进程边界的行为验证存在陷阱，无法验证SQL语句与数据库表的映射是否正确。In-Memory Database如H2可实现跨进程状态验证，通过真实数据库操作验证最终数据状态。理解这些陷阱和替代方案，有助于编写更可靠的测试，避免因实现细节变化导致的测试脆弱性问题。\"},{\"slug\":\"in-process-verification\",\"year\":\"2024\",\"month\":\"08\",\"day\":\"03\",\"title\":\"进程内测试验证\",\"date\":\"2024-08-03T00:00:00.000Z\",\"excerpt\":\"进程内测试验证包括状态验证和行为验证两种方式。状态验证直接读取最终状态，稳定可靠；行为验证使用Mock验证交互过程，粒度更细但更脆弱。通过购物车和停车男孩等实例，展示了两种验证方式的具体应用场景和优缺点，帮助理解测试设计的选择策略。\"},{\"slug\":\"state-vs-behavior-verification\",\"year\":\"2024\",\"month\":\"08\",\"day\":\"02\",\"title\":\"测试验证因果说\",\"date\":\"2024-08-02T00:00:00.000Z\",\"excerpt\":\"状态验证和行为验证是测试验证的两种方式。状态验证通过检查最终状态来判断功能正确性，稳定可靠；行为验证通过检查交互过程来推断结果，但存在脆弱性问题。当状态不可访问或依赖难以验证时，行为验证成为必要选择。理解两种验证方式的适用场景和优缺点，有助于设计更健壮的测试策略。\"},{\"slug\":\"tdd-introduction\",\"year\":\"2024\",\"month\":\"08\",\"day\":\"01\",\"title\":\"测试驱动开发\",\"date\":\"2024-08-01T00:00:00.000Z\",\"excerpt\":\"自动化测试是软件交付质量的保障，能显著提升问题发现和定位的速度。测试金字塔和敏捷测试四象限为制定测试策略提供了理论指导。Q1定位测试聚焦细粒度代码，帮助快速定位问题；Q2发现测试覆盖业务功能，帮助快速发现问题。合理搭配不同层次的测试，构建自动化测试体系，是实现高质量软件交付的关键实践。\"},{\"slug\":\"agile-growth-assistant\",\"year\":\"2023\",\"month\":\"01\",\"day\":\"01\",\"title\":\"敏捷软件教练书单\",\"date\":\"2023-01-01T00:00:00.000Z\",\"excerpt\":\"为敏捷软件教练和实践者推荐的书单，涵盖敏捷技术（测试驱动开发、重构、持续交付、代码整洁等）、敏捷管理（Scrum、看板、敏捷转型等）、教练技术（高绩效教练、共创式教练等）、引导技术（世界咖啡、开放空间等）、通用管理（团队协作、第五项修炼等）、领导力（影响力、驱动力等）以及哲学心理学（道德经、心流、自控力等）多个领域，帮助读者构建完整的敏捷知识体系和个人能力。\"},{\"slug\":\"3-misunderstandings-of-programmer\",\"year\":\"2021\",\"month\":\"02\",\"day\":\"22\",\"title\":\"程序员的3种思维误区\",\"date\":\"2021-02-22T00:00:00.000Z\",\"excerpt\":\"总结程序员在职业发展过程中常见的三种思维误区：不思考业务价值、不注重基本功修炼、不愿跳出自我局限。文章通过实际案例和寓言故事，阐述如何避免这些误区，强调要用正确的方式做正确的事情，追求卓越，持续改进，成为有价值的程序员。\"},{\"slug\":\"avoid-ineffective-knowledge-management\",\"year\":\"2021\",\"month\":\"02\",\"day\":\"02\",\"title\":\"远离无效的知识管理\",\"date\":\"2021-02-02T00:00:00.000Z\",\"excerpt\":\"探讨软件开发团队中的知识管理问题，区分显性知识、隐性知识和不可言说知识三类。文章指出团队常陷入企图用显性知识管理方式处理不可言说知识的陷阱，强调有效的知识管理需要通过社交活动如结对编程、Code Review等来传递不可言说的知识，形成生产-传递-运用-吸收的完整知识消费闭环。\"},{\"slug\":\"some-thought-of-a-book\",\"year\":\"2020\",\"month\":\"07\",\"day\":\"15\",\"title\":\"《你只是看起来很努力》些许感想\",\"date\":\"2020-07-15T00:00:00.000Z\",\"excerpt\":\"阅读《你只是看起来很努力》后，作者通过书中故事分享了几个重要感悟。关于不要忽视亲人，提醒我们不要对习关于警惕弱者思维，批评别人容易但建设性建议才是关键，当一个人取得成功时应研究学习而非盲目批判。书中核心观点是你只是看起来很努力——很多人看似忙碌实则低效，时间管理和专注是挑战。通过设定明确目标、排除外界干扰来保持专注，提升效率。对于不同观点应以开放心态看待，尊重每个人的价值观。\"},{\"slug\":\"tcr-is-not-best-practice\",\"year\":\"2020\",\"month\":\"02\",\"day\":\"09\",\"title\":\"TCR不是最佳实践\",\"date\":\"2020-02-09T00:00:00.000Z\",\"excerpt\":\"探讨TCR（Test \u0026\u0026 Commit || Revert）这一极限编程实践的本质和价值。TCR要求测试通过就提交代码，测试失败就回滚代码，通过极端的反馈机制强迫开发者频繁进行小步提交。文章分析TCR的核心目的不是作为常规实践，而是作为学习工具帮助开发者体会小步提交的价值。\"},{\"slug\":\"story-kickoff-and-deskcheck\",\"year\":\"2020\",\"month\":\"02\",\"day\":\"06\",\"title\":\"故事的首尾呼应\",\"date\":\"2020-02-06T00:00:00.000Z\",\"excerpt\":\"介绍用户故事开发中的两个轻量级实践：Story Kick Off（开卡）和 Story Desk Check（验卡）。通过情景再现的方式说明这两个实践如何帮助团队在开发前达成需求共识、在开发后快速验收，通过前置反馈减少返工浪费，确保团队始终在做正确的事情。\"},{\"slug\":\"mocks-arent-stubs\",\"year\":\"2020\",\"month\":\"01\",\"day\":\"02\",\"title\":\"Mocks 不是 Stubs\",\"date\":\"2020-01-02T00:00:00.000Z\",\"excerpt\":\"深入探讨Mock对象与Stub的区别，介绍状态验证与行为验证两种测试风格，以及古典派（Classical）和模拟派（Mockist）TDD的差异。文章通过代码示例详细说明两种测试风格的特点、优缺点和适用场景，帮助开发者理解如何选择合适的测试策略。\"},{\"slug\":\"solid-in-depth-explanation-en\",\"year\":\"2019\",\"month\":\"12\",\"day\":\"27\",\"title\":\"SOLID entrepreneurial story of Mr. Object-Oriented\",\"date\":\"2019-12-27T00:00:00.000Z\",\"excerpt\":\"\\n\\n\\n\\nMain members Introduction:\\n\\n- Mr. Yuan: boss, alias Mr. Object-Oriented, Referred to as Yuan\\n- Ms. Wu, Ms. Cai, Mr. Xiao, Mr. Shi, Mr Fa, Ms. Ren, Mr. Xing, employees\\n\\n\\n\\nAfter doing so many years ...\"},{\"slug\":\"solid-in-depth-explanation\",\"year\":\"2019\",\"month\":\"08\",\"day\":\"15\",\"title\":\"听面向对象先生聊SOLID创业故事\",\"date\":\"2019-08-15T00:00:00.000Z\",\"excerpt\":\"SOLID五大原则的创业故事解读：ISP（接口隔离原则）如袁Sir为不同顾客提供不同工具箱，不要强迫使用者依赖不需要的接口；LSP（里氏替换原则）如徒弟继承师傅手艺但修改风格会导致合作失败，强调子类替换父类行为需一致；DIP（依赖倒置原则）如通过服务清单依赖抽象而非具体执行者，从依赖实现转向依赖抽象；SRP（单一职责原则）如部门拆分各司其职，关注点分离提高效率；OCP（开闭原则）如引入读书大使对扩展开放对修改关闭。SOLID帮助设计高内聚低耦合的软件，降低维护成本。\"},{\"slug\":\"feedback-in-thoughtworks\",\"year\":\"2019\",\"month\":\"04\",\"day\":\"15\",\"title\":\"在ThoughtWorks，希望你知道的Feedback\",\"date\":\"2019-04-15T00:00:00.000Z\",\"excerpt\":\"在ThoughtWorks，Feedback的重要性犹如发动机于车，摒弃了传统KPI绩效考核后，Feedback成为推进绩效管理的核心机制。优质的Feedback需要具备三个基本属性：有心（走心，借助实际案例支撑）、有料（基于事实表达，避免空泛评价）、有效（及时传达、提供改进措施并促成执行）。Feedback对于个人而言能提升工作体验和胜任力，对于组织而言能帮助新人顺利转正、传承文化。作为提供方，应构建安全环境、使用沟通技巧；作为接受方，应保持开放心态、积极行动。\"},{\"slug\":\"beyond-training\",\"year\":\"2019\",\"month\":\"03\",\"day\":\"26\",\"title\":\"超越培训 -- 比培训多做一点点\",\"date\":\"2019-03-26T00:00:00.000Z\",\"excerpt\":\"本文发表于ThoughtWorks洞见。思沃内训团队的定位是超越培训、搞能力建设。单纯培训难以解决能力问题，必须比培训多做一点。训战模式核心思想是培训+实战，统筹训前、中、后三个阶段，做到训前瞄准、训中调整、训后复审。训前深入团队分析现状，量身定制方案；培训中诱发认知转变，通过螺旋化共创让学员经历困惑、解惑过程；训后部署训战计划促进知识转换。训战成功要素包括一致期望、专业培训、承诺计划、严格跟踪。最终目标是帮助团队将知识转化为技能，解决实际问题。\"},{\"slug\":\"talking-about-is-a-in-ood\",\"year\":\"2018\",\"month\":\"12\",\"day\":\"25\",\"title\":\"聊聊面向对象设计中的Is-A\",\"date\":\"2018-12-25T00:00:00.000Z\",\"excerpt\":\"面向对象设计的三大特性是封装、继承、多态，IS-A是检验继承关系的常用工具。然而IS-A在某些场景下会失效，如Square IS A Rectangle在业务逻辑中并不成立——当Square重写setWidth和setHeight改变行为时，使用父类引用调用方法会产生不同结果。LSP（里氏替换原则）强调IS-A是基于行为方式的，当子类改变父类行为时需要重新审视继承关系。解决方案是进一步抽象，将Square和Rectangle抽象为Quads，回归多态本质。\"},{\"slug\":\"make-lsp-working-for-you\",\"year\":\"2018\",\"month\":\"12\",\"day\":\"15\",\"title\":\"让里氏替换原则为你效力\",\"date\":\"2018-12-15T00:00:00.000Z\",\"excerpt\":\"SOLID是面向对象设计的五大原则，LSP（里氏替换原则）强调子类实例替换父类实例不会改变程序行为。Square继承Rectangle的例子展示了LSP被破坏的场景——当Square重写setWidth和setHeight改变行为时，替换会导致程序出错。继承的核心目的是复用，但子类不应重写父类方法。可以用Is-A初步验证继承关系，当LSP失效时需要进一步抽象，将Square和Rectangle抽象为Quads，避免破坏LSP。LSP是检验继承关系合理性的有效工具，帮助减少继承滥用，提升软件设计质量。\"},{\"slug\":\"two-basic-element-of-scrum-team\",\"year\":\"2018\",\"month\":\"11\",\"day\":\"27\",\"title\":\"Scrum团队的两个基本元素\",\"date\":\"2018-11-27T00:00:00.000Z\",\"excerpt\":\"Scrum犹如一场创业，自治团队最基础的两个元素是\\\"志同\\\"和\\\"自省\\\"。敏捷精髓在于价值观层面：尊重、沟通、专注、承诺、勇气、反馈、开放。团队需持续自省，跳出术的视野思考实践是否违背核心价值观。志同则是高效协作的核心动力，团队成员目标一致且互相信任，具备T型技能和多功能特性。敏捷分三个层次：道（价值观）、法（原则）、术（实践），前进方式应是守、破、离——先守术，再破法，最后根据价值观创新实践。\"},{\"slug\":\"understand-agile-manifesto-deeply\",\"year\":\"2018\",\"month\":\"10\",\"day\":\"30\",\"title\":\"深入解读敏捷宣言\",\"date\":\"2018-10-30T00:00:00.000Z\",\"excerpt\":\"2001年17位反叛性软件开发人员在犹他州雪鸟城制定并签署敏捷宣言。四句核心价值观：个体与交互优于流程与工具、可工作的软件优于面面俱到的文档、客户协作优于合同谈判、响应变化优于遵循计划。以人为本强调尊重信任激发个人潜能，建立自治全功能团队。价值导向以交付可工作的软件为核心，文档应有选择地保留。客户团队强调与客户建立信任合作关系取代敌对谈判。拥抱变化道出敏捷精髓——通过高效协作获取快速反馈以减少浪费。敏捷是文化价值认同，比形式更重要的是对敏捷价值观的理解和认同。\"},{\"slug\":\"programmer-to-trainner\",\"year\":\"2018\",\"month\":\"10\",\"day\":\"19\",\"title\":\"从写代码到做培训\",\"date\":\"2018-10-19T00:00:00.000Z\",\"excerpt\":\"作为程序员工作五年后，作者踏上培训道路开始梳理总结分享。发展他人的意愿是成为培训师的基础，在ThoughtWorks被列入胜任力模型。转型前有四点顾虑：培训劳心劳体是否拖垮身体；台上讲话紧张会否被嘲笑；不会课程设计是否会误人子弟；远离一线技术是否会退化。关于培训收获，强化了沟通协作、梳理知识体系、拓展外训视野、获得认证机会。培训师面对培训无用论的回答是：培训核心作用是让你知道自己不知道，再通过知识扩充、实战操练和技能转化达到提升目的。\"},{\"slug\":\"three-practices-of-simple-design\",\"year\":\"2018\",\"month\":\"08\",\"day\":\"27\",\"title\":\"简单设计落地三板斧\",\"date\":\"2018-08-27T00:00:00.000Z\",\"excerpt\":\"简单设计落地需要三板斧：TDD、重构和整洁代码。TDD通过测试驱动开发、测试驱动设计、任务驱动开发三种层次指导编码；重构在不改变行为的前提下改善代码设计；整洁代码强调不重复、揭示意图、简单三点核心价值。这三者形成有机整体，TDD开启开发、重构优化设计、整洁代码收尾，共同支撑简单设计的核心价值——编写简洁可用的代码。\\n\\n价值体系\\n假如让你去建造一幅巨大的广告牌，你会怎么做？从大框架来看，首先要打牢地基，再使用结实支柱做支撑，最后在顶部挂上广告牌。地基和支柱是帮助完成目标的必备条件。\"},{\"slug\":\"vd-cast-model-in-workshop\",\"year\":\"2018\",\"month\":\"07\",\"day\":\"05\",\"title\":\"Workshop中的价值交付投射模型\",\"date\":\"2018-07-05T00:00:00.000Z\",\"excerpt\":\"作者结合组织Workshop的经验，提炼出VD CAST模型（价值交付投射模型）来指导Workshop的组织和实施。模型左边是价值，中间是影响价值落地的五大因素（约束、受众、支持、跟踪），右边是最终交付。将Workshop视同Sprint，划分为5个阶段：需求分析、架构搭建、课程设计、课程交付、回顾复盘。VD CAST模型帮助组织者分离关注点，提前识别风险，评估Workshop能否落地并实现预设价值。\"},{\"slug\":\"summary-for-2017\",\"year\":\"2017\",\"month\":\"12\",\"day\":\"31\",\"title\":\"轻描淡写的2017\",\"date\":\"2017-12-31T00:00:00.000Z\",\"excerpt\":\"2017年主旋律是\\\"忙\\\"，作者在磕磕碰碰中收获了三个重要词汇：自信、健康和自律。关于自信，通过Workshop、演讲、培训等活动在挣扎中突破自己，借助公众压力驱动自己前进。关于健康，用三个月减重5公斤，一年内脂降低2%、身体年龄减小7岁，饮食控制并未造成生活困扰反而更热爱健康饮食。关于自律，坚持做一件让自己变好的事情需要极端自律，高质量执行比简单按计划执行更重要。自律给我自由，哪有什么天生如此，只是天天坚持。\"},{\"slug\":\"unit-test-from-other-sight\",\"year\":\"2017\",\"month\":\"12\",\"day\":\"20\",\"title\":\"从另一个角度告诉你单元测试的意义\",\"date\":\"2017-12-20T00:00:00.000Z\",\"excerpt\":\"微服务架构如火如荼，但单元测试仍是根本。微服务架构让服务独立小巧，但这不意味着可以忽略单元测试。微服务提倡服务间契约测试集成，但单元测试仍是性价比最高的实践。三个维度看单元测试：能力建设上，单元测试易上手，培训和Pair可快速培养能力，测试即文档帮助新人了解业务；生产效率上，重Service测试轻单元测试会导致反馈慢、缺陷发现晚；卓越态度上，追求卓越的程序员应编写Clean Test，单元测试可作为设计工具让代码更易测试。编写有效单元测试需要遵循SOLID原则，避免STUPID代码，践行GRASP原则，并对测试坏味道保持敏锐嗅觉。\"},{\"slug\":\"a-different-journey-in-thoughtworks\",\"year\":\"2017\",\"month\":\"12\",\"day\":\"15\",\"title\":\"ThoughtWorks给你不一样的入职之旅\",\"date\":\"2017-12-15T00:00:00.000Z\",\"excerpt\":\"本文同时发表于ThoughtWorks洞见。ThoughtWorks为新人提供TWU（应届生5周海外培训）、TWI（社招3天培训）、NHO、Buddy/Sponsor等丰富培训资源。北京Office推出Local项目人才培养计划，以\\\"学习者为中心\\\"进行四周脱产培训。培训体系包括：削弱象牙塔意识、建立Owner意识、明确可验证目标、构建项目技能树、教学反馈环、持续改进反馈、渗透敏捷文化、保持运动健康。Coach角色是引导启发而非灌输知识，新人需明确学习目标并承担成长责任。敏捷实践（Standup、Code Review、Retro、TDD、Pair等）应渗透到培训中，运动健身则保障培训可持续性。\"},{\"slug\":\"student-centralized-pdt\",\"year\":\"2017\",\"month\":\"10\",\"day\":\"23\",\"title\":\"以学习者为中心的项目驱动培训\",\"date\":\"2017-10-23T00:00:00.000Z\",\"excerpt\":\"ThoughtWorks北京Office与思沃学院推出Local项目人才培养计划，对5位新人进行四周封闭式脱产培训。以学习者为中心的项目驱动培训，强调启发式教学而非填鸭式灌输。培训体系包括：削弱象牙塔意识（拒绝\\\"老师\\\"词汇，传授解决问题套路）、建立Owner意识、明确可验证目标、构建围绕项目的技能树、教学反馈环（讲解-演示-练习-巩固-拓展-反馈分享）、持续改进反馈、敏捷文化渗透、运动健康保持。核心是教练少讲课多引导，学习者清楚目标并自主学习，培养责任意识。\"},{\"slug\":\"test-strategy-for-microservice-2\",\"year\":\"2017\",\"month\":\"07\",\"day\":\"25\",\"title\":\"微服务架构下的测试应对策略（下）\",\"date\":\"2017-07-25T00:00:00.000Z\",\"excerpt\":\"本文介绍消费者驱动契约测试（CDCT）。CDCT的流程是消费者定义期望的API或消息，这些期望即为契约，从契约生成存根供消费者团队在构建过程中重复使用。CDCT强调契约由消费者驱动并由双方共同遵守，只有双方都将文档转换成可工作的软件时，契约才真正生效。技术实践上，Spring Cloud Contract和Pact是流行的CDCT框架。微服务架构的盛行促使团队测试策略演变：引入CDCT可以大大弱化UI测试。软件工程没有银弹，选择测试策略需遵循原则：单元测试成本低始终第一位、高层测试是第二防线、选择性价比高的方案、根据团队能力选择适合的策略。\"},{\"slug\":\"test-strategy-for-microservice-1\",\"year\":\"2017\",\"month\":\"07\",\"day\":\"05\",\"title\":\"微服务架构下的测试应对策略（上）\",\"date\":\"2017-07-05T00:00:00.000Z\",\"excerpt\":\"系统架构从单体应用演变到SOA再到微服务架构，解决了扩展性、维护性、部署发布等瓶颈，但也带来了服务拆分、设计、测试的复杂性。单体应用的测试策略简单直接：足够单元测试、一定Service测试、少量E2E测试。微服务架构下，系统集成测试面临环境维护成本高、问题难定位、运行速度慢等痛点。Pair集成测试提出积小成多理念保证服务俩俩集成可靠。引入Contract概念的集成测试通过前后端共同定义API协议来支持并行开发，但仍缺乏自动化监控机制来同步契约变更，这就是CDCT要解决的问题。\"},{\"slug\":\"unit-test-in-a-programmer\",\"year\":\"2017\",\"month\":\"06\",\"day\":\"05\",\"title\":\"一枚程序员眼中的单元测试\",\"date\":\"2017-06-05T00:00:00.000Z\",\"excerpt\":\"程序员应手持神剑、心怀善念地成为战士，编写高质量代码以促成高质量交付。单元测试能增强代码信心、轻松完成工作、改良设计、缩减调试时间、作为测试文档。测试金字塔中单元测试位于底端，应更\\\"凶猛\\\"。不写测试的借口有无辜派（不清楚代码行为）、个性派（测试不是我的工作）、同理派（让QA失业内疚）。编写单元测试太花时间是常见担忧，但实践表明TDD方式总时间不会多于裸奔代码。测试价值大于成本时编写，否则需取舍，如追求100%覆盖率或快速技术Spike时可考虑不写。\"},{\"slug\":\"a-letter-for-newer\",\"year\":\"2017\",\"month\":\"02\",\"day\":\"28\",\"title\":\"写给新人的一封信\",\"date\":\"2017-02-28T00:00:00.000Z\",\"excerpt\":\"本文同时发表于ThoughtWorks洞见。作者结合自身经历和身边故事，给软件行业新人分享建议。关于认知误区：软件行业确实薪资较高，但仅靠速成培训班难以获得真正的高薪，热爱和持续投入才是关键；程序员加班分主动和被动，热爱技术者主动加班是享受而非负担；培训班不能保证好工作，关键在于自己扎实学习和勤加练习。关于新人定义，包括在校学生、转行者、已入行但迷茫的探索者。开启历练的最佳时机是大一大二，起步晚更需要加倍努力，不要抱有侥幸心理。最后强调：编程高手源自不断操练和思考，勇敢迈出第一步。\"},{\"slug\":\"my-agile-practice-in-thoughtworks\",\"year\":\"2017\",\"month\":\"02\",\"day\":\"12\",\"title\":\"我的ThoughtWorks敏捷初体验\",\"date\":\"2017-02-12T00:00:00.000Z\",\"excerpt\":\"分享在ThoughtWorks参与海外独立交付项目的敏捷实践经验。文章详细介绍了IPM、Standup、Story Kick Off、Pair、TDD、Code Review、Showcase、CI、Retro等敏捷实践，阐述如何通过高效协作与快速反馈实现项目成功交付，并强调敏捷不只是流程形式，更要追求实践背后的真正价值。\"},{\"slug\":\"summary-for-2016\",\"year\":\"2017\",\"month\":\"01\",\"day\":\"01\",\"title\":\"ThoughtWorks，我的2016\",\"date\":\"2017-01-01T00:00:00.000Z\",\"excerpt\":\"\\n\\n\\n---\\n\\n 匆匆那年\\n翻开自己的博客，重新读过 ThoughtWorks，我的2015\\n 这篇文章，感觉那时的我像是一个小孩吃到了期盼已久的糖果果，好奇心得到满足，并且也体会到了糖果的来之不易，拥有后倍加珍惜，而且享受其中。2015年，经历了`入职`--\u003e`Shadow(Off Shore)`--\u003e`On Beach`--\u003e`国内出差`--\u003e`国外出差`--\u003e`Billable(Off ...\"},{\"slug\":\"trust-building-for-buddy-sponsor\",\"year\":\"2016\",\"month\":\"05\",\"day\":\"15\",\"title\":\"Buddy/Sponsor培训•信任的构建\",\"date\":\"2016-05-15T00:00:00.000Z\",\"excerpt\":\"Buddy/Sponsor是ThoughtWorks的师徒制机制，Buddy陪伴新人度过试用期，Sponsor在转正后继续指导职业发展。这种机制旨在帮助新人融入大家庭、培养梯队建设、降低离职风险、吸引优秀人才。成功的Buddy/Sponsor应具备能力强、责任心、安全感、真诚、口碑好、亲和力、同理心等特质。信任的三要素包括：动机（互惠原则）、能力（技能、认知、态度）、品格（言行一致、履行承诺）。医患关系信任缺失的问题主要出在品格层面。作为Buddy/Sponsor，应认同公司文化价值观，对工作充满热情，富有责任心和同理心，积极主动地关注徒弟成长。\"},{\"slug\":\"3-mistakes-of-first-tl\",\"year\":\"2016\",\"month\":\"03\",\"day\":\"27\",\"title\":\"初次做技术领导的3个陷阱\",\"date\":\"2016-03-27T00:00:00.000Z\",\"excerpt\":\"开发人员初次转型为技术领导（TL）时，往往因为旧有习惯而踏入三个陷阱。第一个陷阱是所有时间都在编码，过度投入开发工作而忽略技术愿景创造、团队指导等职责。第二个陷阱是独自做所有技术决定，这会使TL成为团队瓶颈，削弱成员动力，应采用从委派到独裁等多种决策方式。第三个陷阱是忽视团队文化培养，未能建立信任关系和有效的协作机制。TL需要在技术和领导责任之间找到平衡，才能带领团队走向成功。\"},{\"slug\":\"5-tips-being-an-effective-tl\",\"year\":\"2016\",\"month\":\"03\",\"day\":\"15\",\"title\":\"高效技术领导的5个锦囊妙计\",\"date\":\"2016-03-15T00:00:00.000Z\",\"excerpt\":\"转型为技术领导（TL）对开发人员是艰难挑战，因为管理和沟通技能不能从编码经验自动转化。高效TL的五个锦囊：1.学会委托，不独自承担所有编码工作，让团队成员获得成长机会；2.抽出时间写代码，保持对代码库的熟悉和团队成员的尊敬；3.可视化系统架构，通过白板会议和图表帮助开发人员理解系统设计与自身工作的关联；4.与团队成员一对一交流，了解每个人的目标和成长需求；5.学会说业务语言，用业务人员熟悉的术语解释技术概念，减小沟通隔阂。\"},{\"slug\":\"summary-for-2015\",\"year\":\"2016\",\"month\":\"01\",\"day\":\"01\",\"title\":\"ThoughtWorks，我的2015\",\"date\":\"2016-01-01T00:00:00.000Z\",\"excerpt\":\"2015年3月26日，作者正式加入ThoughtWorks，结束了创业失败的经历，开启了这家专业软件咨询公司的旅程。从西安到珠海再到短暂的新加坡出差，作者参与了国内外项目交付，在敏捷实践中不断成长。这里聚集着对工作充满热情的人，高效完成高质量工作、为客户创造持久价值是目标。日常工作中出现最多的词包括敏捷开发、用户体验、持续集成、持续交付、代码整洁、结对编程、测试驱动、代码审查。环境上没有领导办公室、没有隔栏，人手MacBook Pro，网络无限制。作者在打鸡血的状态下高效工作、快乐生活，享受累并快乐着的过程。\"}]}]]}]}]\n"])</script><script>self.__next_f.push([1,"17:I[344,[\"403\",\"static/chunks/403-ccbe5c83e5ab6d94.js\",\"234\",\"static/chunks/app/articles/page/%5Bpage%5D/page-1fc220abaf95dace.js\"],\"ArticlesContent\"]\n18:T32a6,"])</script><script>self.__next_f.push([1,"\n## 引言\n\nClaude Code 的 `model` 配置看起来简单，实则暗藏不少细节。选 `sonnet` 还是 `sonnet[1m]`？`opus` 在不同套餐下真的都是 1M 上下文吗？`opusplan` 到底在哪个阶段用哪个模型？`effort` 和模型选择又有什么关系？\n\n这篇文章把官方文档里关于模型配置的所有关键信息整理成一份可操作的参考手册。\n\n---\n\n## 一、8 个模型别名速览\n\nClaude Code 的 `model` 配置支持两类值：**模型别名**（别名会跟随最新版本滚动更新）和**完整模型名称**（固定到特定版本）。\n\n模型别名共 8 个：\n\n| 别名 | 当前解析 | 上下文窗口 | 适用场景 |\n|------|---------|----------|---------|\n| `default` | 因套餐而异 | 因套餐而异 | 清除覆盖、恢复账户推荐模型 |\n| `best` | 等同于 `opus` | 同 `opus` | 最强模型 |\n| `opus` | Claude Opus 4.6 | **1M tokens**（Max/Team/Enterprise 自动）\u003cbr/\u003e需配置（Pro） | 复杂推理、架构设计 |\n| `sonnet` | Claude Sonnet 4.6 | **200K tokens**（默认）| 日常编码任务 |\n| `haiku` | Claude Haiku 4.5 | **200K tokens** | 简单快速任务 |\n| `sonnet[1m]` | Claude Sonnet 4.6（1M 变体） | **1M tokens** ✅ | 长会话、大型代码库 |\n| `opus[1m]` | Claude Opus 4.6（1M 变体） | **1M tokens** ✅ | 超长复杂推理 |\n| `opusplan` | Plan 阶段用 opus，执行阶段用 sonnet | 随当前激活模型 | 自动混合模式 |\n\n\u003e **重要**：`default` 本身不是模型别名，它是一个特殊值，作用是**清除任何模型覆盖**，让系统恢复账户类型对应的推荐模型。\n\n---\n\n## 二、上下文窗口深度解析\n\n### 2.1 各模型原生上下文窗口\n\n| 模型 | 上下文窗口 | 最大输出 |\n|------|----------|---------|\n| Claude Opus 4.6 | **1M tokens**（~75万词） | 128K tokens |\n| Claude Sonnet 4.6 | **1M tokens**（~75万词） | 64K tokens |\n| Claude Haiku 4.5 | **200K tokens**（~15万词） | 64K tokens |\n\nOpus 4.6 和 Sonnet 4.6 的原生上下文窗口都是 1M，但在 Claude Code 里默认是否启用 1M 取决于你的套餐。\n\n### 2.2 1M 扩展上下文的套餐可用性\n\n| 套餐 | Opus 4.6 + 1M | Sonnet 4.6 + 1M |\n|-----|--------------|----------------|\n| **Max / Team / Enterprise** | ✅ 订阅内包含，**自动启用** | 需要额外使用付费 |\n| **Pro** | 需要额外使用付费 | 需要额外使用付费 |\n| **API / 按需付费** | ✅ 完全访问 | ✅ 完全访问 |\n\n**关键结论**：\n\n- **Max/Team/Enterprise 用户**：使用 `opus` 别名时，Claude Code 会**自动升级**到 1M 上下文，无需任何配置\n- **Pro 用户**：`opus` 默认为标准上下文，需要显式使用 `opus[1m]` 并开启额外使用\n- **所有套餐**：`sonnet` 默认 200K，想要 1M 必须使用 `sonnet[1m]`\n\n```bash\n# 显式使用 1M 上下文的方式\n/model opus[1m]\n/model sonnet[1m]\n\n# 也可以附加到完整模型名称\n/model claude-opus-4-6[1m]\n/model claude-sonnet-4-6[1m]\n```\n\n\u003e 💡 1M 上下文使用标准模型定价，超出 200K 的 token 不额外收费。对于订阅套餐中包含扩展上下文的用户，使用量仍由订阅涵盖。\n\n---\n\n## 三、`default` 模型的实际行为\n\n`default` 根据账户类型解析为不同模型：\n\n| 账户类型 | `default` 解析结果 |\n|---------|-----------------|\n| **Max 和 Team Premium** | Opus 4.6 |\n| **Pro 和 Team Standard** | Sonnet 4.6 |\n| **Enterprise** | Opus 4.6 可用但不是默认 |\n\n另外，如果 Opus 达到使用阈值，Claude Code 可能**自动回退**到 Sonnet，这个行为是内置的。\n\n---\n\n## 四、`opusplan`：智能混合模式\n\n`opusplan` 是 Claude Code 特有的混合策略别名，核心思想是**用对的模型做对的事**：\n\n```\nPlan Mode ──▶ opus（强推理、架构决策）\n     ↓ 批准计划后\n执行模式 ──▶ sonnet（代码生成、实现）\n```\n\n实际配置：\n\n```json\n{\n  \"model\": \"opusplan\"\n}\n```\n\n**适合场景**：跨文件重构、复杂 Bug 排查、架构设计——这类任务规划阶段需要 Opus 的深度推理，但执行阶段重复性高、适合 Sonnet 的效率。\n\n**配合版本固定**（推荐）：\n\n```json\n{\n  \"model\": \"opusplan\",\n  \"env\": {\n    \"ANTHROPIC_DEFAULT_OPUS_MODEL\": \"claude-opus-4-6\",\n    \"ANTHROPIC_DEFAULT_SONNET_MODEL\": \"claude-sonnet-4-6\"\n  }\n}\n```\n\n---\n\n## 五、Effort 努力等级\n\nEffort 和模型选择是正交的两个维度——同一个模型，不同的 effort 等级，性能和成本差异显著。Effort 支持 **Opus 4.6 和 Sonnet 4.6**，`/model` 选择支持的模型后，滑块才会出现。\n\n### 5.1 四个等级\n\n| 等级 | 说明 | 适用场景 |\n|------|------|---------|\n| `low` | 最快、最省 | 简单修改、文案调整、重命名 |\n| `medium` | **Pro/Max 订阅的默认值**，均衡速度和推理深度 | 大多数日常编码任务 |\n| `high` | 更深入的推理；**API key、Team、Enterprise 及第三方部署的默认值** | 复杂 Bug、架构决策 |\n| `max` | 无 token 限制，最深入推理 | 极复杂问题，**仅 Opus 4.6 可用** |\n\n\u003e ⚠️ 默认 effort 等级因套餐而异：Pro / Max 订阅用户默认 `medium`；API key、Team、Enterprise 及 Bedrock / Vertex / Foundry 用户默认 `high`。`max` 等级仅适用于 Opus 4.6，且**不在会话间持续**（除非通过 `CLAUDE_CODE_EFFORT_LEVEL` 环境变量持久化）。\n\n### 5.2 配置 Effort 的方式\n\n**会话中动态切换**：\n\n```bash\n/effort low       # 切换到低努力\n/effort medium    # 切换到中等努力\n/effort high      # 切换到高努力\n/effort max       # 最高努力（仅 Opus）\n/effort auto      # 重置为模型默认\n```\n\n**一次性高深度推理**（不改变会话设置）：\n\n```\n在提示中包含 \"ultrathink\" 关键词，触发当次对话的高努力模式\n```\n\n**启动时指定**：\n\n```bash\nclaude --effort high\n```\n\n**永久配置**：\n\n```json\n{\n  \"effortLevel\": \"medium\"\n}\n```\n\n**环境变量**（优先级最高）：\n\n```bash\nCLAUDE_CODE_EFFORT_LEVEL=high\n```\n\n\u003e 📌 优先级：环境变量 \u003e 会话配置 \u003e 设置文件 \u003e 模型默认值\n\n---\n\n## 六、如何配置模型\n\nClaude Code 支持四种配置方式，按优先级从高到低：\n\n### 6.1 会话中动态切换\n\n```bash\n/model opus           # 切换到 opus\n/model sonnet[1m]     # 切换到带 1M 上下文的 sonnet\n/model claude-sonnet-4-6  # 切换到固定版本\n```\n\n`/model` 命令还支持通过左右箭头键调整 effort 滑块，当前模型和 effort 等级会显示在状态栏中（例如 `with low effort`）。\n\n### 6.2 启动时指定\n\n```bash\nclaude --model opus\nclaude --model sonnet[1m]\nclaude --model opusplan\n```\n\n### 6.3 环境变量\n\n```bash\nexport ANTHROPIC_MODEL=opus\n```\n\n### 6.4 设置文件（永久配置）\n\n```json\n{\n  \"model\": \"sonnet\"\n}\n```\n\n---\n\n## 七、环境变量控制别名解析\n\n如果需要将 `sonnet`、`opus`、`haiku` 等别名固定到特定模型版本（而不是跟随最新），使用以下环境变量：\n\n| 环境变量 | 作用 |\n|--------|------|\n| `ANTHROPIC_DEFAULT_OPUS_MODEL` | 控制 `opus` 别名，以及 `opusplan` 的 Plan 阶段 |\n| `ANTHROPIC_DEFAULT_SONNET_MODEL` | 控制 `sonnet` 别名，以及 `opusplan` 的执行阶段 |\n| `ANTHROPIC_DEFAULT_HAIKU_MODEL` | 控制 `haiku` 别名，以及背景任务 |\n| `CLAUDE_CODE_SUBAGENT_MODEL` | 控制子智能体使用的模型 |\n\n这些变量必须填写**完整模型名称**（如 `claude-opus-4-6`），不支持别名。\n\n**在设置文件中配置**（推荐，避免污染 shell 环境）：\n\n```json\n{\n  \"env\": {\n    \"ANTHROPIC_DEFAULT_OPUS_MODEL\": \"claude-opus-4-6\",\n    \"ANTHROPIC_DEFAULT_SONNET_MODEL\": \"claude-sonnet-4-6\",\n    \"ANTHROPIC_DEFAULT_HAIKU_MODEL\": \"claude-haiku-4-5-20251001\"\n  }\n}\n```\n\n**附加 `[1m]` 固定启用扩展上下文**：\n\n```bash\nexport ANTHROPIC_DEFAULT_OPUS_MODEL='claude-opus-4-6[1m]'\n```\n\n---\n\n## 八、限制模型选择（企业场景）\n\n企业管理员可以通过 `availableModels` 限制用户能选择的模型：\n\n```json\n{\n  \"availableModels\": [\"sonnet\", \"haiku\"]\n}\n```\n\n设置后，用户无法通过 `/model`、`--model`、`ANTHROPIC_MODEL` 切换到列表外的模型。\n\n**注意事项**：\n\n- `default` 选项**不受** `availableModels` 影响，始终可用\n- `availableModels` 设置在多层级合并时会**合并去重**\n- 要实现严格的白名单，需在 Managed 设置中配置（最高优先级，用户不可覆盖）\n\n**完整的模型管控三件套**（写入 `managed-settings.json`，IT 统一部署，用户不可覆盖）：\n\n```json\n{\n  \"model\": \"claude-sonnet-4-5\",\n  \"availableModels\": [\"claude-sonnet-4-5\", \"haiku\"],\n  \"env\": {\n    \"ANTHROPIC_DEFAULT_SONNET_MODEL\": \"claude-sonnet-4-5\"\n  }\n}\n```\n\n三个字段的分工：\n\n| 字段 | 作用 |\n|-----|------|\n| `model` | 设置会话启动时的初始模型 |\n| `availableModels` | 限制用户可切换的模型范围 |\n| `ANTHROPIC_DEFAULT_SONNET_MODEL` | 固定「默认」选项解析到的版本，防止用户选 `default` 绕过版本固定 |\n\n---\n\n## 九、第三方提供商固定模型版本\n\n通过 Bedrock、Vertex AI 或 Foundry 部署时，**强烈建议固定模型版本**——否则 Claude Code 更新时可能因别名解析到新版本而无声中断：\n\n| 提供商 | 示例 |\n|--------|------|\n| Bedrock | `export ANTHROPIC_DEFAULT_OPUS_MODEL='us.anthropic.claude-opus-4-6-v1'` |\n| Vertex AI | `export ANTHROPIC_DEFAULT_OPUS_MODEL='claude-opus-4-6'` |\n| Foundry | `export ANTHROPIC_DEFAULT_OPUS_MODEL='claude-opus-4-6'` |\n\n**对三个别名都要配置**，不要只配置 Opus：\n\n```json\n{\n  \"env\": {\n    \"ANTHROPIC_DEFAULT_OPUS_MODEL\": \"us.anthropic.claude-opus-4-6-v1\",\n    \"ANTHROPIC_DEFAULT_SONNET_MODEL\": \"us.anthropic.claude-sonnet-4-6-v1\",\n    \"ANTHROPIC_DEFAULT_HAIKU_MODEL\": \"us.anthropic.claude-haiku-4-5-20251001-v1:0\"\n  }\n}\n```\n\n### 9.1 modelOverrides：按版本精细路由\n\n如果需要将同一家族的不同版本路由到不同的提供商 ID（如不同的 Bedrock 推断配置文件 ARN），使用 `modelOverrides`：\n\n```json\n{\n  \"modelOverrides\": {\n    \"claude-opus-4-6\": \"arn:aws:bedrock:us-east-2:123456789012:application-inference-profile/opus-prod\",\n    \"claude-sonnet-4-6\": \"arn:aws:bedrock:us-east-2:123456789012:application-inference-profile/sonnet-prod\"\n  }\n}\n```\n\n`modelOverrides` 与 `availableModels` 协同工作：白名单评估基于 Anthropic 模型 ID，不受 override 值影响。\n\n---\n\n## 十、禁用 1M 上下文\n\n如果出于成本控制或其他原因，不想使用 1M 上下文，可以完全关闭：\n\n```json\n{\n  \"env\": {\n    \"CLAUDE_CODE_DISABLE_1M_CONTEXT\": \"1\"\n  }\n}\n```\n\n设置后，`/model` 选择器中不再显示 1M 变体。\n\n同时，建议配合自动压缩阈值，避免单次会话上下文无限膨胀：\n\n```json\n{\n  \"env\": {\n    \"CLAUDE_CODE_AUTO_COMPACT_WINDOW\": \"150000\"\n  }\n}\n```\n\n---\n\n## 十一、常见问题\n\n| 问题 | 答案 |\n|------|------|\n| `opus` 和 `opus[1m]` 有什么区别？ | Max/Team/Enterprise 用户两者相同（自动 1M）；Pro 用户 `opus` 默认标准上下文，`opus[1m]` 显式启用 1M |\n| `sonnet` 的上下文窗口是多少？ | 默认 **200K tokens**，需要 `sonnet[1m]` 才是 1M |\n| 当前会话在用什么模型？ | 查看状态栏，或运行 `/status` |\n| 别名会一直跟随最新版本吗？ | 是，如需固定版本，用完整模型名（如 `claude-opus-4-6`）或设置 `ANTHROPIC_DEFAULT_*_MODEL` |\n| `effort` 的默认等级是什么？ | 取决于套餐：Pro / Max 用户默认 `medium`；API key、Team、Enterprise、Bedrock / Vertex / Foundry 用户默认 `high` |\n| `effort max` 和 `high` 的区别？ | `max` 无 token 限制、更慢更贵，**仅 Opus 4.6 可用**，且不跨会话持续 |\n| `opusplan` 的 1M 上下文怎么启用？ | 在 `ANTHROPIC_DEFAULT_OPUS_MODEL` 中加 `[1m]` 后缀：`claude-opus-4-6[1m]` |\n| `availableModels: []` 会锁住所有模型吗？ | 不会，`default` 选项始终可用，用户仍能使用其套餐的默认模型 |\n| Haiku 支持 1M 上下文吗？ | 不支持，Haiku 4.5 上限为 200K |\n\n---\n\n## 小结\n\nClaude Code 模型配置的核心逻辑可以归纳为三层：\n\n**选模型**：日常用 `sonnet`（快、够用），复杂推理用 `opus`，需要自动切换用 `opusplan`\n\n**选上下文**：需要处理大型代码库或超长会话时，显式加 `[1m]` 后缀；不需要时保持默认 200K 更可控\n\n**选深度**：通过 `effort` 控制推理深度，`medium` 足以应对日常；真正复杂的问题用 `high`，不要无脑开 `max`\n\n---\n\n## 参考链接\n\n- [Claude Code 模型配置官方文档](https://docs.anthropic.com/en/docs/claude-code/model-config)\n- [Anthropic 模型概览](https://platform.claude.com/docs/en/about-claude/models/overview)\n- [1M Token 上下文窗口](https://platform.claude.com/docs/en/build-with-claude/context-windows#1m-token-context-window)\n- [Claude Code 省 Token 技巧](/articles/2026/04/13/claude-code-token-saving-tips)\n"])</script><script>self.__next_f.push([1,"19:T3262,"])</script><script>self.__next_f.push([1,"\n## 前言\n\nOpenCode 的文档写得很全，但很多功能需要你主动去翻才能发现。我用下来感受最深的有两块：一是 TUI 里有不少快捷键和命令，知道了就能省很多重复操作；二是 Agent 配置体系比表面看起来灵活得多，可以基于它构建一套相当完整的多模型协作工作流。\n\n这篇文章就按这两个方向写，尽量结合实际用法说，不只是罗列配置项。\n\n---\n\n## TUI 隐藏技巧\n\n### 思考块显示控制\n\n用带推理能力的模型（Claude Sonnet、GPT-5 等）时，OpenCode 会显示模型的\"思考过程\"。这些思考块在调试复杂问题时很有用，但平时全程显示会占很大屏幕空间。\n\n```\n/thinking\n```\n\n这个命令只切换**显示**，不影响模型是否实际使用推理。换句话说，你可以让模型该思考还是思考，只是 TUI 里折叠起来不显示。调试的时候再 `/thinking` 展开看。\n\n### 模型 Variant 切换\n\n```\nCtrl + T    # variant_cycle：循环切换模型 variant\n```\n\n这个快捷键会在当前模型支持的 variant 之间循环。各 provider 的 variant 取值不同：\n\n- **Anthropic**（Claude）：`high` / `max`\n- **OpenAI**：`none` / `minimal` / `low` / `medium` / `high` / `xhigh`\n- **Google**（Gemini）：`low` / `high`\n- **自定义**：也支持在配置里手动定义 variant\n\nTUI 状态栏会显示当前 variant。切换前先确认当前模型支持哪些 variant，循环到不支持的值会 fallback。\n\n值得注意的是，**每个模型的 variant 设置是持久化的**（实测行为），存在 `~/.local/state/opencode/model.json` 的 `variant` 字段里。换句话说，你给某个模型切到 `high` 之后，下次打开还是 `high`，不用每次重设。\n\n不需要每次去 `/models` 里找，`Ctrl+T` 两三下搞定。\n\n### 收藏模型 \u0026 快速切换\n\nOpenCode 维护两个模型列表（实测行为，官方文档未详细说明），都存在 `~/.local/state/opencode/model.json`：\n\n- `recent`：最近使用过的模型，按时间排序\n- `favorite`：你在模型列表里手动收藏（标星）的模型\n\n对应的快捷键：\n\n| 快捷键 | 操作 | 说明 |\n|--------|------|------|\n| `F2` | `model_cycle_recent` | 按最近使用顺序循环切换 |\n| `Shift+F2` | 反向切换 recent | 反向切换 |\n| `model_cycle_favorite` | 只在收藏列表里循环 | 需自定义快捷键绑定 |\n\n收藏模型不需要改配置文件，直接在 `\u003cLeader\u003e+M` 打开的模型列表里标星即可，OpenCode 自动写入 state 文件。`F2` 切最近用过的模型特别顺手，常用的几个来回两三下就够。\n\n### 模型列表 \u0026 命令面板\n\n\u003e **关于 `\u003cLeader\u003e` 键**：OpenCode 默认以 `Ctrl+X` 作为 Leader 键。下文所有 `\u003cLeader\u003e+X` 快捷键都是\"先按 `Ctrl+X`，再按 X\"。可以在 `tui.json` 的 `keybinds.leader` 里自定义。\n\n```\n\u003cLeader\u003e+M    # 打开模型列表（model_list）\nCtrl+P        # 打开命令面板（command_list）\n```\n\n命令面板里能找到所有可用命令，等同于一个\"功能搜索\"入口。不记得某个命令叫什么时，`Ctrl+P` 搜一下。\n\n### 侧边栏控制\n\n```\n\u003cLeader\u003e+B    # sidebar_toggle：切换侧边栏显示\n```\n\n侧边栏提供附加信息面板。屏幕空间紧张时隐藏，需要查看时展开。\n\n### 子 Agent 会话导航\n\nTask tool 运行时，primary agent 会创建子 agent 会话。子会话默认在后台跑，但你可以主动进去看。\n\n| 快捷键 | 说明 |\n|--------|------|\n| `\u003cLeader\u003e+Down` | 进入第一个子 agent 会话 |\n| `→` | 切换到下一个子会话 |\n| `←` | 切换到上一个子会话 |\n| `↑` | 返回父会话 |\n\n这个导航体系在 Agent 并行运行多个子任务时很有用，可以实时看到各个子任务的进展。\n\n### 工具执行详情\n\n```\n\u003cLeader\u003e+D    # tool_details：切换工具执行详情显示\n```\n\n工具调用时默认只显示摘要（比如\"读取了文件 X\"）。开启 `tool_details` 后会显示完整参数和输出，调试时很方便。\n\n\u003e **注意**：官方文档在这个快捷键上存在不一致——TUI 文档中列出了 `ctrl+x d`，但 Keybinds 文档中 `tool_details` 对应的默认绑定显示为 `none`（即未绑定）。如果 `\u003cLeader\u003e+D` 不生效，可以在 `tui.json` 的 `keybinds` 里手动绑定：`\"tool_details\": \"ctrl+x d\"`。\n\n### TUI 鼠标行为\n\n默认情况下，OpenCode TUI 会捕获鼠标事件。这意味着你在终端里无法用鼠标拖拽选中文本（因为被 TUI 拦截了）。\n\n如果你需要用鼠标复制 TUI 里的内容，可以在 `tui.json` 里禁用：\n\n```json\n// ~/.config/opencode/tui.json\n{\n  \"mouse\": false\n}\n```\n\n关掉后，鼠标的文本选择和滚动操作都回归终端原生行为。\n\n### 滚动加速\n\nmacOS 上的惯性滚动在 TUI 里默认不生效。如果想要更顺滑的滚动体验：\n\n```json\n// ~/.config/opencode/tui.json\n{\n  \"scroll_acceleration\": {\n    \"enabled\": true\n  }\n}\n```\n\n注意：开启加速后 `scroll_speed` 配置会失效，加速由系统惯性控制。\n\n---\n\n## Agent 配置体系\n\n### Primary vs Subagent\n\nOpenCode 里 Agent 分两种角色：\n\n- **Primary Agent**：和你直接对话的那个，TUI 里 `Tab` 键循环切换\n- **Subagent**：在子会话里运行，有两种调用方式：一是由 primary agent 通过 Task tool 自动调用；二是用户在对话框里直接输入 `@subagent-name` 手动指定\n\nBuilt-in 的 `build` 和 `plan` 都是 primary，`general` 和 `explore` 都是 subagent。\n\n这个区分很重要，因为几个配置项只对特定角色生效：\n- `hidden: true` 只对 subagent 有效，primary agent 设了也不会从 Tab 循环里消失\n- `description` 是 agent 配置的正式必填项，subagent 的自动委派尤其依赖它——primary agent 根据 description 决定把任务交给哪个 subagent\n- `default_agent` 只能设置 primary agent（非 primary 会 fallback 到 `build`）\n\n### 完整配置项一览\n\nAgent 配置支持 JSON（`opencode.jsonc` 的 `agent` 字段）和 Markdown 两种格式，选项是一样的。Markdown 文件的放置路径有两个层级：\n\n- **全局**：`~/.config/opencode/agents/name.md`（对所有项目生效）\n- **项目级**：`.opencode/agents/name.md`（仅对当前项目生效，优先级更高）\n\n```markdown\n---\ndescription: subagent 描述（被 primary 自动选择时的触发依据）\nmode: primary | subagent | all    # 默认 all\nmodel: provider/model-id          # 如 github-copilot/claude-sonnet-4.6\ncolor: primary | secondary | accent | success | warning | error | info | #hex\nhidden: true | false              # 仅对 subagent 有效\ntemperature: 0.0-1.0\ntop_p: 0.0-1.0\nsteps: 20                         # max steps\nreasoningEffort: high                             # 透传给 provider，取值依 provider 而定\nprompt: \"{file:./system-prompt.txt}\"           # 外部文件引用\n\npermission:\n  bash:\n    \"*\": ask\n    \"git status\": allow\n    \"rm -rf *\": deny\n  edit: deny\n  task:\n    \"*\": deny\n    \"safe-agent-*\": allow\n---\n\n系统 prompt 正文写在这里...\n```\n\n几个容易踩坑的地方：\n\n1. **`reasoningEffort` 是透传参数**，不是 OpenCode 内置的，值直接传给 provider API，具体支持哪些取值要看各 provider 的文档\n2. **`tools` 字段已废弃**，现在用 `permission` 来控制工具权限\n3. **`permission.task`** 控制该 agent 可以调用哪些 subagent，最后匹配的规则生效（glob 语法）\n4. **`prompt` 里可以用 `{file:./path}`** 引用外部文件，路径相对于配置文件所在目录\n\n### 实践案例：多模型 Agent 矩阵\n\n我自己用了一套比较系统化的 Agent 配置，核心思路是：**每个 primary agent 绑定一组对应的 subagent，保证整个对话链路用的是同一个模型系列**。\n\n为什么要这样？因为不同提供商的模型特性差异挺大：Claude 更擅长遵循指令和代码修改，GPT-5 推理链路更完整，Kimi 对中文和长上下文处理得好。如果 primary 用 Claude 但 subagent 用 GPT，有时候上下文传递和风格会有割裂感。\n\n#### Primary Agent 矩阵\n\n我配置了几个 primary agent，每个对应一个模型，用于不同场景：\n\n| Agent | 模型 | 适用场景 |\n|-------|------|----------|\n| 赤兔 | Claude Opus（via GitHub Copilot）| 复杂重构、需要深度思考的任务 |\n| 赵云 | Claude Sonnet（via GitHub Copilot）| 日常开发，速度和质量平衡 |\n| 诸葛亮 | GPT-5.4（via GitHub Copilot）| 架构设计、多步骤推理 |\n| 趣申请 | GPT-5.4（直连 OpenAI）| 需要直连 API 的场景 |\n| 国模 | Kimi（k2p5）| 中文任务、长文档处理 |\n\n每个 primary agent 的 system prompt 里都会指定\"使用哪个 subagent 代替默认的 explore/general\"：\n\n```markdown\n---\n# 赵云.md\ndescription: 日常开发 primary agent，速度和质量平衡，适合大多数编码任务\nmodel: github-copilot/claude-sonnet-4.6\ncolor: success\nmode: primary\n---\n\n## Sub-Agent 使用规则\n\n- 使用 explore-sonnet 代替 explore\n- 使用 general-sonnet 代替 general\n```\n\n这样当赵云（Sonnet）运行时，它启动的子任务也走 Sonnet，整条链路模型一致。\n\n#### Subagent 矩阵\n\n基于上面的设计，我给每个主要模型都建了 explore 和 general 两个版本的 subagent：\n\n**Explore 系列（只读，快速搜索代码库）**\n\n```markdown\n---\n# explore-sonnet.md\ndescription: Fast agent specialized for exploring codebases...\nmode: subagent\nmodel: github-copilot/claude-sonnet-4.6\nreasoningEffort: high\npermission:\n  write: deny\n  edit: deny\n---\n```\n\n`explore-sonnet`、`explore-opus`、`explore-high`（GPT-5.4 high）、`explore-xhigh`、`explore-china`（Kimi）……\n\n**General 系列（全权限，执行任务）**\n\n```markdown\n---\n# general-sonnet.md\ndescription: General-purpose agent for researching complex questions...\nmode: subagent\nmodel: github-copilot/claude-sonnet-4.6\nreasoningEffort: high\n---\n```\n\n同样有 `general-sonnet`、`general-opus`、`general-high`、`general-xhigh`、`general-china` 等版本。\n\n#### 代码审查 Agent\n\n另外还有两个 review agent，专门做代码审查：\n\n```markdown\n---\n# review-high.md\ndescription: 代码审查专家\nmode: subagent\nmodel: openai/gpt-5.4\nreasoningEffort: high\npermission:\n  write: deny\n  edit: deny\n---\n\n从业界最佳实践、项目规范、代码质量（重复代码、命名表意、代码冗余等）、\n并发安全、测试有效性、是否修复 bug 等方面，对当前的代码实现进行详细审查，\n提出评价和改进建议。\n```\n\n`review-high` 和 `review-xhigh` 的区别只是 `reasoningEffort` 不同，复杂改动用 xhigh 推理更彻底。\n\n#### 全局权限配置\n\n主配置文件里设了一些全局安全规则：\n\n```jsonc\n// ~/.config/opencode/opencode.jsonc\n{\n  \"default_agent\": \"赤兔\",\n  \"permission\": {\n    \"bash\": {\n      \"rm *\": \"deny\",\n      \"rm -rf *\": \"deny\"\n    }\n  },\n  \"compaction\": {\n    \"auto\": true,\n    \"prune\": true\n  }\n}\n```\n\n`rm` 系列命令全局禁止。`compaction.auto` 开启后上下文超长时自动压缩，`prune: true` 会在压缩时移除旧的工具调用输出，节省 token 用量。\n\n### Hidden 配置的实际行为\n\n说一下 `hidden` 这个配置项，文档里写得不够清楚，实际行为容易搞混：\n\n- **对 subagent**：`hidden: true` 让它不出现在 `@` 补全菜单，但 primary agent 仍可以通过 Task tool 调用它（用 agent 名字）\n- **对 primary agent**：用户设置的 primary agent 无法通过 `hidden: true` 从 Tab 循环里隐藏。注意这和系统行为不同——OpenCode 内置了一些 hidden primary agent（如 `compaction`、`title`、`summary`），这些是系统层面的隐藏，不是用户 `hidden: true` 能控制的\n\n我把 built-in 的 `build` 和 `plan` 设置了 `hidden: true`，但它们还是会出现在 Tab 切换列表里（实测）。正确的做法是直接用 `disable: true` 禁用，或者干脆不动它们，让自己的 agent 默认就好。\n\n---\n\n## 小结\n\nTUI 方面，我用得最多的几个：\n\n- `Ctrl+T`：切 effort，调任务复杂度时随手按\n- `/thinking`：思考块显示开关，重要任务时展开看推理过程\n- `\u003cLeader\u003e+Down` / 方向键：子 agent 会话导航，并行任务时跟进进展\n\nAgent 配置方面，核心思路是**模型绑定**：primary agent 指定配套的 subagent，保证整条链路模型一致。这在需要长时间多轮对话、多 agent 协作的任务里效果比较明显。\n\n这套配置搭起来初始有点工作量，但用熟了后基本不需要再调整，直接 `Tab` 切 agent 就行。\n\n---\n\n## 参考\n\n- [OpenCode TUI 文档](https://opencode.ai/docs/tui/)\n- [OpenCode Agents 文档](https://opencode.ai/docs/agents/)\n- [OpenCode Keybinds 文档](https://opencode.ai/docs/keybinds/)\n- [OpenCode Config 文档](https://opencode.ai/docs/config/)\n"])</script><script>self.__next_f.push([1,"1a:T3595,"])</script><script>self.__next_f.push([1,"\n\u003e 一句话结论：Claude Code 省 Token，靠的不是手快去 `/clear`，而是把上下文管理好，把 Token 花在真正有用的信息上。\n\n## 先说一个底层事实\n\nClaude Code 每次发起请求时，都会重新处理当前输入。输入通常包括三部分：\n\n- 固定内容：系统指令、工具定义、`CLAUDE.md`\n- 对话历史：当前会话前面所有轮次\n- 新消息：新输入的内容\n\n所以真正决定成本的，不是新输入的这一句话，而是前面那一大段上下文是不是还值得继续带着。\n\n## 10 条低成本使用原则\n\n### 1. 巧用缓存，避免机械地 `/clear`，按任务边界管理上下文\n\n要不要清上下文，得先看任务有没有变， 而不是固定 \"聊几轮就清一次\"。\n\n官方的建议：**切换到不相关任务时，用 `/clear` 重新开始**。但这不等于每做完一步、每问几轮就应该清空一次。\n\n如果你还在做同一件事，继续当前会话通常更合理，因为：\n\n- 已加载的项目规则和上下文还在发挥作用\n- Claude Code 会自动使用 prompt caching\n- 自动压缩会在上下文接近上限时帮助你保留摘要\n\n这里简单介绍一下缓存到底是怎么“失效”的。\n\n命中的缓存内容按 **cache read** 计费，官方价格是基础输入价格的 **0.1x**。所以对日常使用 Claude Code 来说，更实用的理解不是“这个会话聊了几轮”，而是：**前面那段稳定上下文有没有在短时间内继续被复用。**\n\n而缓存常见的失效方式主要有两种：\n\n- **超过默认 TTL 没再用到**：1小时的时间窗口，API 用户 5 分钟，超过这段时间后，之前的缓存前缀就可能不再命中。\n- **可复用前缀被改坏了**：官方文档明确提到，像工具配置变化、提示前缀变化，或者是否包含图片这类变化，都会打断缓存命中。\n\n**配置技巧：API 用户可以延长缓存到 1 小时（Claude Code 2.1.108+）**\n\n如果你是 API 用户（包括 Bedrock、Vertex、Foundry），可以在 `~/.claude/settings.json` 里开启 1 小时缓存 TTL：\n\n```json\n{\n  \"env\": {\n    \"ENABLE_PROMPT_CACHING_1H\": \"true\"\n  }\n}\n```\n\n开启后，缓存 TTL 从默认的 5 分钟延长到 1 小时，对长时间持续工作的会话通常更合算。\n\n几个补充说明：\n- 订阅用户（Pro / Max / Team）本来就默认获得 1 小时缓存，不需要额外设置这个变量\n- 1 小时缓存的写入费用高于 5 分钟选项，但命中时仍按 0.1x 读取计费\n- 原先 Bedrock 专用的 `ENABLE_PROMPT_CACHING_1H_BEDROCK` 已被这个新变量取代（仍兼容，但建议改用 `ENABLE_PROMPT_CACHING_1H`）\n- 同版本还新增了 `FORCE_PROMPT_CACHING_5M`，如果需要强制保持 5 分钟 TTL 可以设置它\n\n如果想尽量保持缓存有效，最实用朴素的做法是：\n\n- 同一个任务尽量连续做，不要做两步就切去别的话题\n- 不要在主会话里频繁引入无关的大段内容\n- 不要无必要地来回改模型、工具配置或上下文结构\n\n以下是一些判断参考依据：\n\n- 任务没变\n- 距离上一条消息不久\n- 代码和讨论过的方案仍然有用\n\n### 2. 三种情况更适合开新会话或直接 `/clear`\n\n有些时候，继续聊下去就是在给噪音付费了。下面这几种情况，我基本都会直接重开：\n\n- 任务切换了：比如刚修完登录模块，又开始做支付模块\n- 当前上下文已经塞进太多无关探索内容\n- 当前会话已经离题太远，继续压缩和续聊都不如重新开始直接\n\n一句话判断就是：**任务已经换了，或者上下文已经脏了，就可以开始新的。**\n\n### 3. 长内容给文件路径，不要直接粘进对话\n\n最便宜的 Token，是还没来得进入上下文的 Token。\n\n尽量不要把几千行日志、超长报错、整段文档直接贴进对话里。更好的做法是：\n\n- 提供文件路径\n- 提供错误命令\n- 提供搜索范围\n\n这样 Claude Code 会自己用工具去找关键片段，而不是把整份内容都吞进上下文。后者通常又贵又乱。\n\n### 4. 简单任务降低 `effort`，复杂任务先 Plan Mode 再执行\n\n现在推荐用 `effort` 来控制成本和深度，而不是只盯着“thinking token”。\n\n实际用下来也确实是这样：简单任务开太高的 `effort`，多数时候是在浪费；复杂任务如果一开始没想清楚，后面反复返工反而更贵。\n\n建议是：\n\n- 小改动、改文案、改样式、局部重命名：用更低的 `effort`\n- 跨文件重构、架构调整、复杂 Bug：先做计划，再实施\n\n常用入口：\n\n- `/effort low|medium|high|max`\n- 在 `/model` 里调整 effort\n- 复杂任务先进入 Plan Mode\n\n尽可能减少返工可以省下大量的Token。\n\n### 5. 1M 上下文窗口能用，但不要默认放任它膨胀\n\n1M 上下文当然是个很强的能力，官方也已经确认 Opus 4.6 和 Sonnet 4.6 支持它。但我的建议一直是：**能用，不代表应该无脑放开。**\n\n原因也不复杂。上下文越长，管理成本越高，噪音越容易堆积，后面你自己都未必分得清哪些信息还值得继续带着。\n\n更稳一点的做法是：\n\n- 保留大窗口能力\n- 同时设置保守的自动压缩阈值\n\n例如：\n\n```json\n{\n  \"env\": {\n    \"CLAUDE_CODE_AUTO_COMPACT_WINDOW\": \"200000\"\n  }\n}\n```\n\n如果你明确不想启用 1M 上下文，也可以直接关闭：\n\n```json\n{\n  \"env\": {\n    \"CLAUDE_CODE_DISABLE_1M_CONTEXT\": \"1\"\n  }\n}\n```\n\n### 6. 日常开发优先 Sonnet，复杂推理再上 Opus\n\n这个判断其实和选机器配置很像，不是永远上最贵的就最好。\n\n大多数日常编码任务，Sonnet 已经够用；Opus 更适合：\n\n- 复杂架构设计\n- 长链路推理\n- 大范围跨文件重构\n\n所以真正该问的，往往不是“怎么让 Opus 少花一点”，而是“这件事到底值不值得上 Opus”。\n\n**配置技巧：用 `opusplan` 自动切换模型**\n\n如果不想在 Plan Mode 和执行阶段之间手动 `/model opus`、`/model sonnet` 来回切换，可以直接在 `~/.claude/settings.json` 里设置官方模型别名 `opusplan`：\n\n```json\n{\n  \"model\": \"opusplan\"\n}\n```\n\n官方对 `opusplan` 的定义很清晰：\n- **Plan mode**：自动使用 Opus，负责架构思考和复杂决策\n- **执行模式（其他阶段）**：自动切换到 Sonnet，负责代码生成和实现\n\n这样 Claude Code 会根据当前阶段自动选择模型，你只需要在真正需要思考的地方进 Plan Mode，剩下的执行交给 Sonnet 来完成。\n\n如果你用的是 Bedrock 或者想固定具体版本，可以配合 `ANTHROPIC_DEFAULT_OPUS_MODEL` 和 `ANTHROPIC_DEFAULT_SONNET_MODEL` 控制 `opusplan` 实际解析到哪两个模型：\n\n```json\n{\n  \"model\": \"opusplan\",\n  \"env\": {\n    \"ANTHROPIC_DEFAULT_OPUS_MODEL\": \"claude-opus-4-6\",\n    \"ANTHROPIC_DEFAULT_SONNET_MODEL\": \"claude-sonnet-4-6\"\n  }\n}\n```\n\n### 7. 轻量侧任务优先交给低成本子智能体\n\n如果你只是想把一些边角活分出去，我会更建议用子智能体，而不是在主会话里来回切模型。\n\n官方文档也更支持这种思路：把高输出、低复杂度的侧任务交给更便宜的子智能体。\n\n典型场景：\n\n- 跑测试\n- 查文档\n- 处理日志\n- 做只读型代码探索\n\n官方也明确提到，简单的 subagent 任务可以直接指定 `model: haiku`。这很适合做“把杂音隔离出去”的工作，把主会话留给真正需要上下文连续性的任务。\n\n### 8. 精简 `CLAUDE.md`，谨慎增加 Skills 和 MCP\n\n`CLAUDE.md` 这件事，我现在的理解很直接：它不是知识库，它是操作手册。\n\n因为它会在会话启动时加载进上下文，所以它应该短、小、稳定，只保留长期有效的规则。适合长期放在里面的是：\n\n- 项目命令\n- 编码规范\n- 目录约定\n- 不能碰的边界\n\n不适合长期塞进去的是：\n\n- 很长的操作手册\n- 偶尔才会用到的流程文档\n- 大段背景材料\n\n按最新官方文档，Claude Code 的 MCP tool search 默认开启：启动时通常只有工具名进入上下文，完整 schema 会延迟到真正需要时再加载。所以如果讨论的是 **Claude Code CLI 本身**，那么“装几个 MCP 就立刻把上下文撑爆”这个说法，现在已经不准确了。\n\n不过要具体看：\n\n- 如果是 **非 Anthropic 官方的 `ANTHROPIC_BASE_URL`**，官方文档明确说明：tool search 默认会被关闭，除非显式设置 `ENABLE_TOOL_SEARCH=true`\n- 如果是 **更早版本**，或者别的 Claude 客户端，也没有这个默认行为。\n\n如果你想手动控制 ToolSearch，建议直接写进 Claude 的配置文件。官方文档也明确写了：这些环境变量都可以放进 `settings.json` 的 `env` 字段。\n\n常见位置有三个：\n\n- `~/.claude/settings.json`：用户级，作用于你所有项目\n- `.claude/settings.json`：项目级，可提交到仓库里给团队共享\n- `.claude/settings.local.json`：本地项目级，只对你自己生效\n\n最常用的几种写法如下：\n\n```json\n{\n  \"env\": {\n    \"ENABLE_TOOL_SEARCH\": \"true\"\n  }\n}\n```\n\n上面这段表示：**强制开启 ToolSearch**，所有 MCP 工具都按需延迟加载。\n\n```json\n{\n  \"env\": {\n    \"ENABLE_TOOL_SEARCH\": \"auto\"\n  }\n}\n```\n\n\"auto\"表示进入**阈值模式**。如果工具 schema 总量不大，就先加载；超过阈值再延迟加载。`auto` 默认按 **10% 上下文窗口**判断。\n\n```json\n{\n  \"env\": {\n    \"ENABLE_TOOL_SEARCH\": \"auto:5\"\n  }\n}\n```\n\n\"auto:5\"表示把阈值调得更激进一些，按 **5%** 来判断。\n\n```json\n{\n  \"env\": {\n    \"ENABLE_TOOL_SEARCH\": \"false\"\n  }\n}\n```\n\n**关闭 ToolSearch**，启动时完整加载 MCP 工具 schema 的方式，上下文会大很多，不建议关闭。\n\n这里有两个细节很值得记住：\n\n- `auto` **不是默认值**。默认值是按需延迟加载，跟 `true` 一样；`auto` 是阈值模式，按 10% 上下文窗口来判断是否先加载 schema\n- ToolSearch 需要支持 `tool_reference` 的模型，官方文档明确写了：**Sonnet 4+ / Opus 4+ 支持，Haiku 不支持**\n\n可以在 Claude Code 里运行 `/context`。最新版本的 Claude Code 不配置时默认开启 ToolSearch。\n\n但结论还是：不用的 Skills、Rules、MCP Tools 应该及时清理，因为它们会增加选择噪音、搜索范围和管理复杂度。\n\n### 9. 命令行优先，MCP 其次\n\n如果一件事命令行就能解决，我一般不会先上 MCP。\n\n最新官方对此也给了明确建议。虽然 MCP 现在支持延迟加载，启动成本比早期版本低很多，但 CLI 通常还是更轻、更直接。典型例子就是：\n\n- GitHub 操作优先使用 `gh`，比如比较流行的 gitub skill，它的 SKILL.md 很简短，主要描述的是如何使用 gh 来操作 GitHub。\n- 企业微信CLI、飞书CLI这些也建议让Agent直接使用（LLM 如果没有学习过类似知识，可通过Skill来指导）。\n- 文件搜索优先 `grep` / `glob`\n- 常规脚本优先 shell 命令\n\n原则不是“别用 MCP”，而是“只有当 MCP 明显更顺手、更强时再用”。\n\n### 10. 合理利用子智能体\n一般建议把子智能体当成“隔离舱”来用。它不一定最省单次成本，但特别适合把“测试输出、代码审查、文档搜索”这类长输出隔离出去，最后只把摘要带回主会话。对主会话来说，这通常更省。\n\n多智能体并发这件事，很容易让人误以为“更先进也更省”，其实不是。它适合加速复杂任务，但并发实例越多，总体 Token 消耗通常也越高。官方文档提到：在 plan mode 下，agent teams 的 Token 消耗大约可能是标准会话的 7 倍量级。它优化的是速度，不是成本。\n\n## 推荐日常实践\n\n如果把上面的内容压缩成我自己的日常习惯，大概如下 7 条：\n\n1. 一个会话只做一件事（相关的任务）\n2. 任务没变、当前上下文仍然相关时，继续当前会话\n3. 超长日志和大文档只给路径，不整段粘贴\n4. 简单任务用轻模式，复杂任务先 plan 再执行\n5. 设置自动压缩阈值，避免长会话无限膨胀\n6. 定期清理过长的 `CLAUDE.md`、无用 Skills 和不用的 MCP\n7. 优先使用命令行工具，必要时通过简单的 Skill 来包装CLI的使用。\n\n\n## 总结\n\nClaude Code 的成本控制，说到底不是“少说几句话”，而是两件事：\n\n- 让已经付过钱的上下文尽量继续命中缓存\n- 不让无关内容进入上下文，避免为噪音反复付费\n\n所以，真正高效的习惯不是“总是开新会话”，也不是“死守一个超长会话不放”，而是根据任务边界、上下文洁净度和当前工作阶段来判断。\n\n当你开始用这个思路管理会话时，Token 消耗通常会比单纯依赖 `/clear` 可控得多，而且回答质量也更稳。\n\n## 官方参考\n\n- [Anthropic Prompt caching](https://platform.claude.com/docs/en/build-with-claude/prompt-caching)：默认 5 分钟 TTL、命中后自动刷新、1 小时缓存为额外选项，以及哪些变化会导致缓存失效\n- [Claude Code Costs](https://docs.claude.com/en/docs/claude-code/costs)：`/clear` 的使用时机、prompt caching / auto-compaction 的成本优化建议、MCP 开销和 subagent 成本提醒\n- [Claude Code MCP](https://docs.claude.com/en/docs/claude-code/mcp)：ToolSearch 默认开启、MCP 工具延迟加载、`ENABLE_TOOL_SEARCH` 的几种模式，以及非官方 `ANTHROPIC_BASE_URL` 下的例外\n- [Claude Code Settings](https://docs.claude.com/en/docs/claude-code/settings)：`settings.json` 的作用域、`env` 字段写法，以及用户级 / 项目级 / 本地项目级配置文件位置\n"])</script><script>self.__next_f.push([1,"1b:T50ba,"])</script><script>self.__next_f.push([1,"\n## 引言：把所有积木拼起来\n\n前七篇我们逐层拆解了 Claude Code 的能力体系：从基础操作到日常工作流，从内置命令到扩展架构。现在是把这些积木拼成完整作品的时候了。\n\n本篇将通过**三个端到端蓝图**，展示如何在真实场景中组合使用 Skills、Sub-agents、Hooks、MCP 和 Agent Teams：\n\n| 蓝图 | 场景 | 涉及机制 |\n|------|------|---------|\n| **蓝图一** | 本地 Chrome 自动化调试 | MCP + Hooks + Sub-agents |\n| **蓝图二** | GitHub CI/CD 无人值守流水线 | Hooks + 程序化运行 + GitHub Actions |\n| **蓝图三** | 跨端 Channels 协作 | Channels + MCP + Agent Teams |\n\n\u003e **前置阅读**：本篇假设你已阅读[第七篇](/articles/2026/04/07/claude-code-extension-model-overview)，熟悉六大扩展机制的基本概念。\n\n---\n\n## 蓝图一：本地 Chrome 自动化调试\n\n### 场景描述\n\n你正在开发一个 Web 应用，遇到了一个棘手的前端 Bug——某个按钮在特定条件下无响应。你希望 Claude 能：\n\n1. 启动 Chrome 并导航到问题页面\n2. 检查 DOM 结构和 console 错误\n3. 定位问题根因并修复代码\n4. 验证修复后按钮恢复正常\n\n### 架构设计\n\n```\n┌─────────────┐     MCP (stdio)     ┌──────────────┐\n│ Claude Code │ ◄──────────────────► │ Chrome MCP   │\n│             │                      │ Server       │\n│  ┌────────┐ │                      │  ┌────────┐  │\n│  │ Debug  │ │                      │  │Chrome  │  │\n│  │ Skill  │ │                      │  │DevTools│  │\n│  └────────┘ │                      │  └────────┘  │\n│  ┌────────┐ │                      └──────────────┘\n│  │PostTool│ │\n│  │ Hook   │ │\n│  └────────┘ │\n└─────────────┘\n```\n\n### 第一步：配置 Chrome MCP 服务器\n\n在项目根目录创建 `.mcp.json`：\n\n```json\n{\n  \"mcpServers\": {\n    \"browser\": {\n      \"type\": \"stdio\",\n      \"command\": \"npx\",\n      \"args\": [\"@anthropic-ai/mcp-server-browserbase@latest\"],\n      \"env\": {\n        \"BROWSER_HEADLESS\": \"false\"\n      }\n    }\n  }\n}\n```\n\n\u003e **提示**：浏览器 MCP 服务器的包名可能随版本更新变化，请以 [Claude Code 官方文档](https://code.claude.com/docs/zh-CN/mcp) 或 `claude mcp add` 命令的推荐为准。社区常用的方案还包括 `@anthropic-ai/mcp-server-puppeteer` 和 Playwright MCP 等。\n\n添加完成后，Claude 会获得一组浏览器操作工具：\n\n| 工具 | 功能 |\n|------|------|\n| `mcp__browser__navigate` | 导航到 URL |\n| `mcp__browser__screenshot` | 截图 |\n| `mcp__browser__click` | 点击元素 |\n| `mcp__browser__type` | 输入文本 |\n| `mcp__browser__evaluate` | 执行 JavaScript |\n| `mcp__browser__snapshot` | 获取页面可访问性快照 |\n\n### 第二步：创建调试 Skill\n\n创建 `.claude/skills/debug-frontend/SKILL.md`：\n\n```markdown\n---\nname: debug-frontend\ndescription: \"使用 Chrome 调试前端问题\"\nargument-hint: \"\u003cURL\u003e \u003c问题描述\u003e\"\nuser-invocable: true\nallowed-tools:\n  - Read\n  - Write\n  - Bash(npm run dev)\n  - Bash(npm test)\n  - mcp__browser__*\n---\n\n# 前端调试流程\n\n## 环境准备\n\n!`lsof -i :3000 | grep LISTEN || echo \"开发服务器未运行\"`\n\n## 调试步骤\n\n1. 如果开发服务器未运行，先启动 `npm run dev`\n2. 使用浏览器 MCP 导航到 $1\n3. 获取页面快照，检查 DOM 结构\n4. 检查 console 是否有错误\n5. 根据 $ARGUMENTS 中的问题描述定位可疑代码\n6. 修复代码\n7. 刷新页面验证修复\n8. 运行相关测试确认无回归\n```\n\n### 第三步：配置自动格式化 Hook\n\n在 `.claude/settings.json` 中添加：\n\n```json\n{\n  \"hooks\": {\n    \"PostToolUse\": [\n      {\n        \"matcher\": \"Write\",\n        \"hooks\": [\n          {\n            \"type\": \"command\",\n            \"command\": \"npx prettier --write\",\n            \"timeout\": 10\n          }\n        ]\n      }\n    ]\n  }\n}\n```\n\n这样，每当 Claude 通过 Write 工具修改文件后，Prettier 会自动格式化。注意 `timeout` 单位是**秒**。\n\n### 第四步：实际使用\n\n```bash\n# 启动调试\n/debug-frontend http://localhost:3000/dashboard \"点击'导出报告'按钮无反应\"\n```\n\nClaude 会执行完整的调试循环：\n\n```\n1. ✅ 检测到开发服务器已在 :3000 运行\n2. 🌐 导航到 http://localhost:3000/dashboard\n3. 📸 获取页面快照，找到\"导出报告\"按钮\n4. 🔍 检查 console → 发现 TypeError: exportData is not a function\n5. 📂 定位到 src/components/Dashboard/ExportButton.tsx\n6. 🔧 修复：import { exportData } from '@/lib/export' 路径错误\n7. ♻️ 刷新页面 → 按钮可点击，导出成功\n8. ✅ 运行 npm test → 全部通过\n```\n\n### 进阶：多页面自动化测试\n\n将调试 Skill 扩展为自动化测试代理：\n\n```markdown\n---\nname: e2e-verify\ndescription: \"端到端验证关键用户路径\"\ncontext: fork\n---\n\n# E2E 验证\n\n对以下页面执行验证：\n\n!`cat e2e-paths.json`\n\n对每个路径：\n1. 导航到页面\n2. 执行页面中定义的关键交互\n3. 截图保存到 `./e2e-screenshots/`\n4. 记录任何 console 错误\n5. 输出验证报告\n```\n\n---\n\n## 蓝图二：GitHub CI/CD 无人值守流水线\n\n### 场景描述\n\n你希望在 GitHub Pull Request 流程中自动化以下环节：\n\n1. PR 创建时，Claude 自动进行代码审查\n2. 审查发现问题时，自动创建修复提交\n3. 修复后自动触发测试，确认绿灯\n4. 全程无需人工介入\n\n### 程序化运行（Programmatic Usage）\n\nClaude Code 支持完全无人值守的程序化运行模式，适合 CI/CD 环境：\n\n```bash\n# 基本 Headless 调用\nclaude -p \"审查这个 PR 的代码改动\" --output-format json\n\n# 带流式输出\nclaude -p \"修复 lint 错误\" --output-format stream-json\n\n# 指定权限模式\nclaude -p \"运行测试并修复失败\" --allowedTools \"Bash(npm test)\" \"Write\" \"Read\"\n```\n\n**关键参数**：\n\n| 参数 | 说明 |\n|------|------|\n| `-p \"prompt\"` | 非交互式执行 |\n| `--output-format json` | JSON 格式输出（含 cost、duration 等元数据） |\n| `--output-format stream-json` | 流式 JSON（实时输出） |\n| `--allowedTools` | 白名单工具（CI 中必须显式授权） |\n| `--max-turns N` | 最大对话轮数 |\n| `--permission-mode` | 权限模式（CI 中通常用 `auto`） |\n| `--continue` | 恢复上一次会话 |\n| `--bare` | 最小化输出，不显示进度和装饰信息 |\n| `--json-schema` | 指定 JSON Schema，约束输出格式 |\n| `--include-hook-events` | 在流式输出中包含 Hook 事件 |\n| `--no-session-persistence` | 不持久化会话记录（适合短期 CI 任务） |\n\n### GitHub Actions 配置\n\n创建 `.github/workflows/claude-review.yml`：\n\n```yaml\nname: Claude Code Review\n\non:\n  pull_request:\n    types: [opened, synchronize]\n\npermissions:\n  contents: write\n  pull-requests: write\n\njobs:\n  review:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n        with:\n          fetch-depth: 0\n          ref: ${{ github.head_ref }}\n\n      - name: Install Claude Code\n        run: |\n          curl -fsSL https://claude.ai/install.sh | sh\n\n      - name: Run Code Review\n        env:\n          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}\n        run: |\n          # 获取 PR 变更文件\n          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)\n\n          # Claude 审查\n          claude -p \"\n            请审查以下文件的代码改动：\n            $CHANGED_FILES\n\n            审查标准：\n            1. 类型安全（TypeScript 严格模式）\n            2. 错误处理完整性\n            3. 性能影响\n            4. 安全风险\n\n            输出 JSON 格式：\n            {\n              \\\"issues\\\": [{\\\"file\\\": \\\"...\\\", \\\"line\\\": N, \\\"severity\\\": \\\"error|warning|info\\\", \\\"message\\\": \\\"...\\\"}],\n              \\\"summary\\\": \\\"...\\\"\n            }\n          \" --output-format json \\\n            --allowedTools \"Read\" \"Bash(git diff*)\" \"Bash(git log*)\" \\\n            --max-turns 10 \\\n            \u003e review-result.json\n\n      - name: Post Review Comment\n        uses: actions/github-script@v7\n        with:\n          script: |\n            const fs = require('fs');\n            const result = JSON.parse(fs.readFileSync('review-result.json', 'utf8'));\n            // 解析并发布评论...\n```\n\n### 自动修复流水线\n\n在审查基础上增加自动修复步骤：\n\n```yaml\n  auto-fix:\n    needs: review\n    if: needs.review.outputs.has-fixable-issues == 'true'\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n        with:\n          ref: ${{ github.head_ref }}\n          token: ${{ secrets.GITHUB_TOKEN }}\n\n      - name: Install Claude Code\n        run: curl -fsSL https://claude.ai/install.sh | sh\n\n      - name: Auto Fix Issues\n        env:\n          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}\n        run: |\n          claude -p \"\n            请修复以下审查问题：\n            $(cat review-issues.json)\n\n            要求：\n            - 只修改必要的代码\n            - 每个修复保持最小改动\n            - 修复后运行 npm test 确认通过\n          \" --allowedTools \"Read\" \"Write\" \"Bash(npm test)\" \"Bash(npm run lint)\" \\\n            --max-turns 20\n\n      - name: Commit Fixes\n        run: |\n          git config user.name \"Claude Code Bot\"\n          git config user.email \"claude-bot@example.com\"\n          git add -A\n          git diff --staged --quiet || git commit -m \"fix: auto-fix review issues\"\n          git push\n```\n\n### 配合 Hooks 实现质量门禁\n\n在项目 `.claude/settings.json` 中配置 CI 专用 Hooks：\n\n```json\n{\n  \"hooks\": {\n    \"PreToolUse\": [\n      {\n        \"matcher\": \"Bash\",\n        \"hooks\": [\n          {\n            \"type\": \"command\",\n            \"command\": \"node ./scripts/check-dangerous-cmd.js\",\n            \"timeout\": 5\n          }\n        ]\n      }\n    ],\n    \"Stop\": [\n      {\n        \"hooks\": [\n          {\n            \"type\": \"command\",\n            \"command\": \"node ./scripts/ci-report.js\"\n          }\n        ]\n      }\n    ]\n  }\n}\n```\n\n其中 `check-dangerous-cmd.js` 脚本检查命令内容，对 `rm -rf`、`git push --force` 等危险命令返回 `{\"permissionDecision\": \"deny\"}`。这确保了即使在 `auto` 权限模式下，危险命令也会被拦截。\n\n### 多会话编排\n\n复杂的 CI 流程可以编排多个 Claude 会话：\n\n```bash\n#!/bin/bash\n# ci-pipeline.sh\n\n# 第一轮：代码审查\nREVIEW=$(claude -p \"审查代码改动，输出 JSON\" \\\n  --output-format json --max-turns 10)\n\n# 解析审查结果\nISSUES=$(echo \"$REVIEW\" | jq '.result.issues // []')\n\nif [ \"$(echo \"$ISSUES\" | jq 'length')\" -gt 0 ]; then\n  # 第二轮：自动修复\n  claude -p \"修复以下问题：$ISSUES\" \\\n    --allowedTools \"Read\" \"Write\" \"Bash(npm test)\" \\\n    --max-turns 20\n\n  # 第三轮：回归验证\n  claude -p \"运行全量测试，确认无回归\" \\\n    --allowedTools \"Bash(npm test)\" \"Read\" \\\n    --max-turns 5\nfi\n```\n\n---\n\n## 蓝图三：跨端 Channels 协作\n\n### 场景描述\n\n你是一个团队的 Tech Lead，希望：\n\n1. 在手机 Telegram 上随时给 Claude 发送任务\n2. Claude 在开发机上执行任务并通过 Telegram 回报进度\n3. 多个 Claude 实例协作处理大规模重构\n4. 全程通过移动端监控和指挥\n\n### Channels 基础配置\n\n\u003e **前提条件**：Channels 功能需要 Claude Code v2.1.80+ 且使用 claude.ai 账号登录（非 API Key），同时需要安装 Bun 运行时。\n\nChannels 通过安装对应的 Plugin 来启用。以 Telegram 为例：\n\n```bash\n# 安装 Telegram Channel Plugin\n/plugin install telegram-channel\n\n# Plugin 安装后会自动配置 MCP 服务器\n# 启动 Claude 时 Channel 即生效\n```\n\n首次启动时，Claude 会引导你完成频道配对：\n\n```\n📱 Channels 已启用\n请在 Telegram 中搜索 @ClaudeCodeBot 并发送配对码：A7X9K2\n等待配对...\n```\n\n### Telegram 工作流\n\n配对完成后，你可以在 Telegram 中：\n\n```\n你：请检查一下项目的 TypeScript 类型错误\n\nClaude：正在执行 npm run typecheck...\n\n发现 3 个类型错误：\n1. src/api/users.ts:42 - 参数类型不匹配\n2. src/components/Table.tsx:88 - 缺少必需属性\n3. src/utils/format.ts:15 - 隐式 any 类型\n\n需要我自动修复吗？\n\n你：修复吧\n\nClaude：正在修复...\n✅ 3 个类型错误已修复\n✅ npm run typecheck 通过\n✅ npm test 通过\n\n已创建提交：fix: resolve 3 TypeScript type errors\n```\n\n### 安全机制\n\nChannels 内置了多层安全保护：\n\n| 机制 | 说明 |\n|------|------|\n| **配对码验证** | 首次连接需输入一次性配对码 |\n| **发送者允许列表** | 只接受已认证的发送者消息 |\n| **权限继承** | 遵循当前会话的权限模式 |\n| **审计日志** | 所有 Channel 交互记录在会话日志中 |\n\n### 配合 Agent Teams 实现分布式协作\n\n在大规模重构场景中，结合 Agent Teams 和 Channels：\n\n```bash\n# 启用实验性 Agent Teams（Channels 通过 Plugin 已启用）\nexport CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1\nclaude\n```\n\n**工作流**：\n\n```\n手机 Telegram ──────────► Team Lead (Claude)\n                              │\n                    ┌─────────┼─────────┐\n                    ▼         ▼         ▼\n              Teammate A  Teammate B  Teammate C\n              (API 层)    (UI 层)    (测试层)\n                    │         │         │\n                    └─────────┼─────────┘\n                              ▼\n                         共享任务列表\n                              │\n                    ◄─────────┘\n手机 Telegram ◄──── 进度报告 + 完成通知\n```\n\n在 Telegram 中发起任务：\n\n```\n你：把项目从 REST API 迁移到 GraphQL，涉及 api/、components/、tests/ 三个目录\n\nClaude (Team Lead)：\n收到，我将任务分解为三部分并分配给团队：\n\n📋 任务分配：\n- Teammate A (API层)：迁移 api/ 目录下的 REST 端点到 GraphQL resolvers\n- Teammate B (UI层)：更新 components/ 中的 API 调用为 GraphQL queries\n- Teammate C (测试层)：更新 tests/ 中的测试用例适配新 API\n\n⏳ 开始执行...\n\n[10分钟后]\n\nClaude (Team Lead)：\n📊 进度更新：\n✅ Teammate A：已完成 12 个 resolver 迁移\n🔄 Teammate B：正在更新第 8/15 个组件\n🔄 Teammate C：等待 A、B 完成后开始测试更新\n\n预计剩余时间：约 15 分钟\n```\n\n### 频道配置进阶\n\nChannels 的频道连接通过插件或 MCP 服务器实现。由于 Channels 仍处于研究预览阶段，具体的包名和配置方式可能变化，请以 [Claude Code 官方 Channels 文档](https://code.claude.com/docs/zh-CN/channels) 为准。\n\n**配置思路示例**（概念性，非直接可运行）：\n\n```json\n{\n  \"mcpServers\": {\n    \"telegram-channel\": {\n      \"type\": \"stdio\",\n      \"command\": \"npx\",\n      \"args\": [\"\u003ctelegram-channel-mcp-package\u003e\"]\n    },\n    \"discord-channel\": {\n      \"type\": \"stdio\",\n      \"command\": \"npx\",\n      \"args\": [\"\u003cdiscord-channel-mcp-package\u003e\"],\n      \"env\": {\n        \"DISCORD_BOT_TOKEN\": \"${DISCORD_BOT_TOKEN}\"\n      }\n    }\n  }\n}\n```\n\n\u003e **注意**：上述包名为占位符。实际使用时需查阅 Claude Code 官方文档或 Plugin marketplace 获取最新可用的 Channels 插件。\n\n---\n\n## 四、三大蓝图对比与选型\n\n### 适用场景矩阵\n\n| 维度 | 蓝图一：Chrome 调试 | 蓝图二：CI/CD | 蓝图三：Channels |\n|------|-------------------|-------------|-----------------|\n| **环境** | 本地开发机 | 远程 CI 服务器 | 跨设备 |\n| **交互** | 实时交互 | 完全无人值守 | 异步远程 |\n| **核心机制** | MCP + Skill | 程序化运行 + Hook | Channels + Teams |\n| **复杂度** | 中等 | 中高 | 高 |\n| **投入** | 半小时配置 | 数小时配置 | 依赖实验功能 |\n| **收益** | 单次调试效率提升 | 持续集成全自动化 | 团队协作范式转变 |\n\n### 渐进式采用路径\n\n建议按以下顺序逐步引入：\n\n```\n第一阶段（立即可用）\n├── 配置基础 MCP（浏览器、数据库）\n├── 创建常用 Skills（调试、组件生成）\n└── 设置 Hooks（格式化、lint）\n\n第二阶段（稳定后）\n├── 程序化运行接入 CI/CD\n├── 自定义 Sub-agents（安全审查、文档生成）\n└── 多会话编排脚本\n\n第三阶段（实验性）\n├── Channels 跨端协作\n├── Agent Teams 并行开发\n└── 完整 Plugin 开发与分发\n```\n\n---\n\n## 五、生产环境注意事项\n\n### 成本控制\n\n| 策略 | 说明 |\n|------|------|\n| **`--max-turns`** | CI 中务必设置上限，防止无限循环 |\n| **模型选择** | 探索用 Haiku，审查用 Sonnet，复杂推理用 Opus |\n| **`effort` 参数** | 简单任务用 `low`，复杂任务用 `high` |\n| **工具白名单** | 只授权必要工具，减少不必要的工具调用 |\n\n### 安全清单\n\n在生产环境使用 Claude Code 自动化之前，确认以下项：\n\n- [ ] CI 环境的 API Key 使用独立的、有限额的 Key\n- [ ] `--allowedTools` 严格限制，不包含 `Bash` 的通配权限\n- [ ] Hooks 中拦截危险命令（`rm -rf`、`git push --force`、`DROP TABLE`）\n- [ ] 敏感文件在 `.claude/settings.json` 中通过 `permissions.deny` 保护\n- [ ] Git 操作限制在特定分支，禁止直接推送 `main`\n- [ ] 自动提交使用 bot 账号，便于审计追踪\n- [ ] 定期审查 Claude 的操作日志\n\n### 故障恢复\n\n| 场景 | 处理方式 |\n|------|---------|\n| CI 中 Claude 超时 | 设置 `--max-turns` + GitHub Actions `timeout-minutes` |\n| 自动修复引入新 Bug | Hook 在 `Stop` 事件运行全量测试 |\n| Agent Team 成员崩溃 | 当前无法自动恢复，需重新启动 |\n| MCP 服务器断连 | Claude 会自动尝试重连，超时后跳过该工具 |\n| Channels 消息丢失 | 通过配对码重新建立连接 |\n\n---\n\n## 六、全系列回顾：从新手到架构师\n\n八篇文章，一条完整的学习路径：\n\n| 篇号 | 主题 | 你获得了 |\n|------|------|---------|\n| **第一篇** | 心智模型与迁移 | 从 OpenCode 视角理解 Claude Code 的差异与优势 |\n| **第二篇** | 快速上手 | 安装、登录、三种入口、跑通第一个任务 |\n| **第三篇** | 日常工作流 | 探索代码、修 Bug、重构、测试、Git 全流程 |\n| **第四篇** | 交互模式与命令 | 六种权限模式、内置命令、上下文管理 |\n| **第五篇** | CLAUDE.md 与记忆 | 指令层级、规则系统、Auto Memory 机制 |\n| **第六篇** | 设置与权限 | 四层设置、权限规则语法、沙箱防御 |\n| **第七篇** | 扩展架构全景 | 六大机制的定位、配置与选型 |\n| **第八篇** | 高阶自动化实战 | 三个端到端蓝图的完整配置 |\n\n**核心认知跃迁**：\n\n```\n使用者 ──→ 定制者 ──→ 架构师\n (1-3篇)    (4-6篇)    (7-8篇)\n\n从\"用 Claude 写代码\"\n到\"让 Claude 自己组建团队、连接工具、自动化流水线\"\n```\n\n---\n\n## 七、结语\n\nClaude Code 不只是一个 AI 编程助手，它是一个**可编程的开发平台**。Skills 让你封装经验，Sub-agents 让你委派任务，Hooks 让你编织自动化，MCP 让你连接万物，Plugins 让你分享能力，Agent Teams 让你突破单人瓶颈。\n\n这些机制的组合空间是指数级的。本系列只是起点——真正的价值，在于你根据自己团队的实际痛点，设计出独一无二的自动化工作流。\n\n祝你构建愉快。\n\n\u003e 📖 **系列导航**\n\u003e\n\u003e - [第一篇：从 OpenCode 切到 Claude Code](/articles/2026/04/01/opencode-to-claude-code-getting-oriented)\n\u003e - [第二篇：快速上手](/articles/2026/04/02/claude-code-getting-started)\n\u003e - [第三篇：日常工作流](/articles/2026/04/03/claude-code-common-workflows)\n\u003e - [第四篇：交互模式与内置命令](/articles/2026/04/04/claude-code-interactive-mode-and-built-in-commands)\n\u003e - [第五篇：CLAUDE.md、Rules 与 Auto Memory](/articles/2026/04/05/claude-code-memory-and-claude-md)\n\u003e - [第六篇：设置、权限与 Auto Mode](/articles/2026/04/06/claude-code-settings-and-permissions)\n\u003e - [第七篇：扩展架构全景](/articles/2026/04/07/claude-code-extension-model-overview)\n\u003e - **第八篇：高阶自动化实战**（本文）\n"])</script><script>self.__next_f.push([1,"1c:T7064,"])</script><script>self.__next_f.push([1,"\n## 引言：从使用者到架构师\n\n前六篇我们已经能高效使用 Claude Code 完成日常开发。但随着任务复杂度上升，你会发现单靠内置能力远远不够：\n\n- 想让 Claude 每次提交前自动跑 lint + test，怎么做？\n- 想让 Claude 访问公司内部的 API 文档服务器，怎么接入？\n- 想把一套\"创建 React 组件\"的流程固化成可复用的模板，怎么封装？\n- 想让多个 Claude 实例并行处理不同模块，怎么协调？\n\nClaude Code 为此提供了**六大扩展机制**，从轻量脚本到分布式协作，覆盖了几乎所有定制化场景。本篇将系统拆解每一种机制的设计意图、核心配置与适用边界。\n\n\u003e **阅读建议**：本篇是\"架构认知\"篇，侧重**是什么、为什么、怎么选**。具体的端到端实战配置将在[第八篇](/articles/2026/04/08/claude-code-advanced-automation-with-mcp-hooks-and-agents)中展开。\n\n---\n\n## 一、六大机制全景图\n\n先建立宏观视角——六大机制各自解决什么问题：\n\n| 机制 | 核心定位 | 触发方式 | 典型场景 |\n|------|---------|---------|---------|\n| **Skills** | 可复用的指令模板 | `/skill-name` 命令 | 封装工作流（批量处理、调试循环） |\n| **Sub-agents** | 专职的子 Claude 实例 | 自动或手动调度 | 代码探索、方案规划、专领域代理 |\n| **Hooks** | 生命周期事件回调 | 25+ 事件自动触发 | 提交前检查、文件变更通知、权限拦截 |\n| **MCP** | 外部工具/数据连接协议 | Claude 按需调用 | 数据库查询、API 网关、文件系统扩展 |\n| **Plugins** | 多机制打包分发单元 | 安装后自动生效 | 第三方工具集成（如 Sentry、Linear） |\n| **Agent Teams** | 多 Claude 并行协作 | 团队任务分发 | 大规模重构、多模块并行开发 |\n\n它们之间不是互斥关系，而是**分层互补**：\n\n```\n┌─────────────────────────────────────────┐\n│            Agent Teams（协作层）          │  多个 Claude 并行\n├─────────────────────────────────────────┤\n│          Sub-agents（委派层）             │  单 Claude 内委派子任务\n├─────────────────────────────────────────┤\n│    Skills（指令层）  │  Hooks（事件层）    │  触发方式不同\n├─────────────────────────────────────────┤\n│            MCP（连接层）                  │  外部工具和数据源\n├─────────────────────────────────────────┤\n│          Plugins（分发层）                │  打包 + 命名空间\n└─────────────────────────────────────────┘\n```\n\n---\n\n## 二、Skills：可复用的指令模板\n\n### 2.1 什么是 Skill\n\nSkill 是一个 Markdown 文件（`SKILL.md`），包含 YAML frontmatter 元数据和正文指令。你可以把它理解为\"可参数化的 CLAUDE.md 片段\"——当用户输入 `/skill-name` 时，Claude 会加载该 Skill 的指令并按照其中的步骤执行。\n\n### 2.2 Skill 的存放位置与优先级\n\nSkill 可存放在四个位置，优先级从高到低：\n\n| 位置 | 路径 | 影响范围 | 是否共享 |\n|------|------|---------|---------|\n| **Enterprise** | 由管理策略注入 | 组织所有成员 | 由 IT 管控 |\n| **Personal** | `~/.claude/skills/skill-name/SKILL.md` | 你的所有项目 | 否 |\n| **Project** | `.claude/skills/skill-name/SKILL.md` | 项目所有协作者 | 提交到 git |\n| **Plugin** | 通过 Plugin 安装 | 取决于 Plugin 作用域 | 取决于 Plugin |\n\n同名 Skill 高优先级覆盖低优先级。\n\n### 2.3 SKILL.md 结构详解\n\n一个完整的 Skill 文件：\n\n```markdown\n---\nname: create-component\ndescription: \"创建 React 组件，包含类型定义、样式和测试\"\nargument-hint: \"\u003cComponentName\u003e\"\nuser-invocable: true\nallowed-tools:\n  - Write\n  - Read\n  - Bash(npm test)\nmodel: sonnet\neffort: high\ncontext: fork\n---\n\n# 创建 React 组件\n\n用户通过 `/create-component Button` 调用时：\n\n1. 在 `src/components/$ARGUMENTS/` 目录下创建：\n   - `$ARGUMENTS.tsx`：组件主体\n   - `$ARGUMENTS.test.tsx`：单元测试\n   - `index.ts`：导出文件\n2. 运行 `npm test -- --testPathPattern=$ARGUMENTS`\n3. 若测试失败，自动修复后重试\n```\n\n### 2.4 Frontmatter 字段速查\n\n| 字段 | 类型 | 说明 |\n|------|------|------|\n| `name` | string | Skill 名称，决定 `/name` 命令 |\n| `description` | string | 描述，用于 AI 自动选择 |\n| `argument-hint` | string | 参数提示，显示在帮助中 |\n| `user-invocable` | boolean | 是否可通过 `/` 命令手动调用 |\n| `disable-model-invocation` | boolean | 禁止 AI 自动调用此 Skill |\n| `allowed-tools` | string[] | 允许使用的工具白名单 |\n| `model` | string | 运行此 Skill 的模型 |\n| `effort` | string | 推理强度（`low` / `medium` / `high`） |\n| `context` | string | `fork` 则在子代理中运行，隔离上下文 |\n| `agent` | string | 指定运行此 Skill 的子代理 |\n| `hooks` | object | 绑定到此 Skill 的 Hooks |\n| `paths` | string[] | 限制 Skill 自动激活的范围（匹配工作目录下的路径） |\n| `shell` | string | 指定 Bash 命令使用的 Shell |\n\n### 2.5 参数替换机制\n\nSkill 正文中可使用以下占位符：\n\n| 占位符 | 说明 | 示例 |\n|--------|------|------|\n| `$ARGUMENTS` | 完整参数字符串 | `/deploy staging` → `staging` |\n| `$ARGUMENTS[0]` | 第 N 个参数（空格分隔） | `/deploy staging eu` → `staging` |\n| `$1`, `$2`, ... | 同 `$ARGUMENTS[0]`、`$ARGUMENTS[1]` | 简写形式 |\n| `${CLAUDE_SESSION_ID}` | 当前会话 ID | 用于日志关联 |\n| `${CLAUDE_SKILL_DIR}` | Skill 文件所在目录 | 引用同目录下的资源文件 |\n\n### 2.6 动态上下文注入\n\nSkill 正文中可使用 `` !`command` `` 语法动态注入命令输出：\n\n```markdown\n## 当前项目信息\n\n!`cat package.json | jq '{name, version, dependencies}'`\n\n## Git 状态\n\n!`git status --short`\n```\n\n当 Skill 被加载时，这些命令会立即执行，输出替换到对应位置，为 Claude 提供实时上下文。\n\n### 2.7 内置 Skills\n\nClaude Code 自带以下 Skills：\n\n| Skill | 用途 |\n|-------|------|\n| `/batch` | 批量处理多个文件或任务 |\n| `/claude-api` | 加载 Claude API 参考资料到上下文 |\n| `/debug` | 进入调试循环（运行→失败→修复→重试） |\n| `/loop` | 循环执行直到条件满足 |\n| `/simplify` | 简化复杂代码 |\n\n### 2.8 context: fork 与隔离运行\n\n当 `context: fork` 时，Skill 会在一个**独立的子代理会话**中运行：\n\n- **独立上下文**：不会污染主会话的对话历史\n- **结果回传**：子代理完成后，结果摘要返回主会话\n- **适用场景**：探索性任务、可能产生大量中间输出的操作\n\n---\n\n## 三、Sub-agents：专职的子 Claude 实例\n\n### 3.1 内置 Sub-agents\n\nClaude Code 内置了五个专职子代理，各有明确分工：\n\n| 子代理 | 模型 | 权限 | 用途 |\n|--------|------|------|------|\n| **Explore** | Haiku | 只读 | 快速搜索代码、阅读文件 |\n| **Plan** | 继承主模型 | 只读 | 制定实施方案，不做修改 |\n| **通用子代理** | 继承主模型 | 全工具 | 委派完整子任务 |\n| **StatusLine Setup** | Sonnet | — | 配置终端状态栏 |\n| **Claude Code Guide** | Haiku | — | 回答关于 Claude Code 本身的问题 |\n\n当 Claude 自行判断某个子任务适合委派时，会自动选择合适的内置子代理。例如，当它需要了解一个大型代码库的结构时，往往会先派出 Explore 子代理进行快速扫描。\n\n### 3.2 自定义 Sub-agents\n\n你可以在以下位置创建自定义子代理：\n\n- **项目级**：`.claude/agents/agent-name.md`\n- **用户级**：`~/.claude/agents/agent-name.md`\n\n文件格式与 Skill 类似——YAML frontmatter + Markdown 正文指令：\n\n```markdown\n---\nname: security-reviewer\ndescription: \"审查代码中的安全漏洞\"\ntools:\n  - Read\n  - Grep\n  - Glob\ndisallowedTools:\n  - Write\n  - Bash\nmodel: sonnet\npermissionMode: plan\nmaxTurns: 30\n---\n\n# 安全审查代理\n\n你是一个专注于安全审查的代理。对于每个文件：\n\n1. 检查硬编码的密钥或凭证\n2. 检查 SQL 注入风险\n3. 检查 XSS 漏洞\n4. 检查不安全的依赖\n5. 输出结构化的审查报告\n\n**绝对不要修改任何文件**，只报告发现。\n```\n\n### 3.3 Agent Frontmatter 字段速查\n\n| 字段 | 类型 | 说明 |\n|------|------|------|\n| `name` | string | 代理名称 |\n| `description` | string | 描述，用于 AI 自动选择 |\n| `tools` | string[] | 允许使用的工具白名单 |\n| `disallowedTools` | string[] | 禁止使用的工具黑名单 |\n| `model` | string | 使用的模型（haiku / sonnet / opus） |\n| `permissionMode` | string | 权限模式（default / plan / auto / bypassPermissions 等） |\n| `maxTurns` | number | 最大对话轮数 |\n| `skills` | string[] | 此代理可使用的 Skills |\n| `mcpServers` | string[] | 此代理可使用的 MCP 服务器名称列表 |\n| `hooks` | object | 绑定到此代理的 Hooks |\n| `memory` | string | 持久记忆级别（`user` / `project` / `local`） |\n| `background` | boolean | 后台运行模式 |\n| `effort` | string | 推理强度 |\n| `isolation` | string | `worktree` 使用 git worktree 隔离 |\n| `color` | string | 终端状态栏颜色标识 |\n| `initialPrompt` | string | 代理启动时的初始提示 |\n\n### 3.4 工具控制策略\n\n`tools` 和 `disallowedTools` 支持精细的工具控制：\n\n```yaml\n# 只允许读取和搜索\ntools:\n  - Read\n  - Grep\n  - Glob\n\n# 允许所有工具，但禁止写入和执行\ndisallowedTools:\n  - Write\n  - Bash\n\n# 允许 Bash，但只能运行特定命令\ntools:\n  - Read\n  - Bash(npm test)\n  - Bash(npm run lint)\n```\n\n工具名称遵循 Claude Code 的权限规则语法——`ToolName(pattern)` 形式可限制工具的参数范围。\n\n### 3.5 后台子代理\n\n当 `background: true` 时，子代理在后台运行：\n\n- **不阻塞主会话**：你可以继续与主 Claude 交互\n- **权限预审批**：后台代理的工具权限在启动时确定，运行中不再弹出权限确认\n- **适用场景**：长时间运行的任务（如大规模代码分析、持续监控）\n\n### 3.6 隔离运行：git worktree\n\n当 `isolation: worktree` 时，子代理会在一个独立的 git worktree 中工作：\n\n```yaml\nisolation: worktree\n```\n\n**效果**：\n- 子代理的文件修改不会影响主工作目录\n- 完成后可选择性地将更改合并回来\n- 适合需要大量试错的重构任务\n\n### 3.7 持久记忆\n\n当 `memory: true` 时，子代理会在会话间保留记忆：\n\n- **项目级记忆**：`.claude/agent-memory/agent-name/`\n- **用户级记忆**：`~/.claude/agent-memory/agent-name/`\n\n每次调用该代理时，之前积累的记忆会自动加载，使代理能\"记住\"项目的历史上下文。\n\n---\n\n## 四、Hooks：生命周期事件回调\n\n### 4.1 设计理念\n\nHooks 是 Claude Code 的事件系统——在特定生命周期节点自动触发外部脚本。与传统 Git hooks 类似，但覆盖面更广：不仅限于 Git 操作，还包括工具调用、权限决策、会话管理等 25+ 个事件。\n\n### 4.2 事件一览\n\nClaude Code 支持的 Hook 事件按生命周期阶段分组：\n\n**会话生命周期**\n\n| 事件 | 触发时机 |\n|------|---------|\n| `SessionStart` | 会话开始 |\n| `SessionEnd` | 会话结束 |\n| `InstructionsLoaded` | CLAUDE.md / Rules 加载完成 |\n| `ConfigChange` | 配置发生变更 |\n| `CwdChanged` | 工作目录切换 |\n\n**用户交互**\n\n| 事件 | 触发时机 |\n|------|---------|\n| `UserPromptSubmit` | 用户提交 prompt（可修改 prompt 内容） |\n| `Notification` | Claude 发出通知 |\n| `Elicitation` | MCP 服务器请求用户输入 |\n| `ElicitationResult` | 用户对 Elicitation 的回复 |\n\n**工具调用**\n\n| 事件 | 触发时机 |\n|------|---------|\n| `PreToolUse` | 工具调用前（可拦截、修改或放行） |\n| `PostToolUse` | 工具调用后（可审计结果） |\n| `PostToolUseFailure` | 工具调用失败后 |\n\n**权限决策**\n\n| 事件 | 触发时机 |\n|------|---------|\n| `PermissionRequest` | 权限请求弹出时（可自动决策） |\n| `PermissionDenied` | 权限被拒绝后（可重试） |\n\n**子代理 / 团队**\n\n| 事件 | 触发时机 |\n|------|---------|\n| `SubagentStart` | 子代理启动 |\n| `SubagentStop` | 子代理停止 |\n| `TeammateIdle` | 团队成员空闲 |\n| `TaskCreated` | 任务创建 |\n| `TaskCompleted` | 任务完成 |\n\n**文件 / 工作区**\n\n| 事件 | 触发时机 |\n|------|---------|\n| `FileChanged` | 文件发生变更 |\n| `WorktreeCreate` | git worktree 创建 |\n| `WorktreeRemove` | git worktree 移除 |\n\n**上下文管理**\n\n| 事件 | 触发时机 |\n|------|---------|\n| `PreCompact` | 上下文压缩前 |\n| `PostCompact` | 上下文压缩后 |\n\n**终止**\n\n| 事件 | 触发时机 |\n|------|---------|\n| `Stop` | Claude 正常停止 |\n| `StopFailure` | Claude 异常停止 |\n\n### 4.3 Hook 类型\n\nHook 支持四种执行方式：\n\n| 类型 | 说明 | 示例 |\n|------|------|------|\n| `command` | 执行本地命令 | `\"command\": \"npm test\"` |\n| `http` | 发送 HTTP 请求 | `\"url\": \"https://api.example.com/hook\"` |\n| `prompt` | 注入额外 prompt 给 Claude | `\"prompt\": \"记得检查类型安全\"` |\n| `agent` | 启动一个子代理处理 | `\"agent\": \"security-checker\"` |\n\n### 4.4 配置格式\n\nHooks 配置在 settings.json 中，采用**嵌套结构**——每个事件下是一组匹配规则，每条规则包含一个 `matcher`（可选）和对应的 `hooks` 数组：\n\n```json\n{\n  \"hooks\": {\n    \"PreToolUse\": [\n      {\n        \"matcher\": \"Write\",\n        \"hooks\": [\n          {\n            \"type\": \"command\",\n            \"command\": \"node ./scripts/pre-tool-check.js\",\n            \"timeout\": 5\n          }\n        ]\n      }\n    ],\n    \"SessionStart\": [\n      {\n        \"hooks\": [\n          {\n            \"type\": \"prompt\",\n            \"prompt\": \"请先阅读 CHANGELOG.md 了解最近的变更\"\n          }\n        ]\n      }\n    ]\n  }\n}\n```\n\n注意结构层次：`hooks → 事件名 → [ { matcher?, hooks: [...] } ]`。`matcher` 不填则匹配该事件的所有触发。\n```\n\n### 4.5 过滤机制：matcher 与 if\n\n- **`matcher`**：正则表达式，匹配工具名（如 `Write`、`Bash`）。对于工具相关事件（`PreToolUse` / `PostToolUse`），`matcher` 匹配的是工具名称\n- **`if`**：使用**权限规则语法**（permission rule syntax），如 `Bash(npm test)`、`Write(src/**)`，而非 JavaScript 表达式\n\n两者同时配置时，必须**同时满足**才会触发。\n\n### 4.6 退出码与决策控制\n\nHook 脚本的退出码决定了后续行为：\n\n| 退出码 | 含义 | 行为 |\n|--------|------|------|\n| **0** | 成功 | 继续执行，处理 stdout 中的 JSON 输出 |\n| **2** | 阻断错误 | 中止操作，将 stderr 内容反馈给 Claude |\n| **其他** | 非阻断错误 | 记录警告，继续执行 |\n\n**决策控制 JSON**（通过 stdout 返回）：\n\n对于 `PreToolUse` 事件，Hook 可通过 JSON 输出控制工具调用：\n\n```json\n{\n  \"permissionDecision\": \"allow\"\n}\n```\n\n| 字段 | 可选值 | 说明 |\n|------|--------|------|\n| `permissionDecision` | `allow` / `deny` / `ask` / `defer` | 控制工具调用权限 |\n\n对于 `PermissionRequest` 事件：\n\n```json\n{\n  \"decision\": {\n    \"behavior\": \"allow\"\n  }\n}\n```\n\n对于 `PermissionDenied` 事件：\n\n```json\n{\n  \"retry\": true\n}\n```\n\n### 4.7 Hook 配置位置\n\nHooks 可在多个位置配置：\n\n| 位置 | 说明 |\n|------|------|\n| User / Project / Local settings | 标准设置文件中的 `hooks` 字段 |\n| Managed policy | 企业级强制 Hooks |\n| Plugin `hooks/hooks.json` | 随 Plugin 分发 |\n| Skill / Agent frontmatter | 绑定到特定 Skill 或 Agent |\n\n**安全注意**：`disableAllHooks` 设置可临时禁用所有 Hooks，适用于调试场景。\n\n---\n\n## 五、MCP：外部工具与数据连接协议\n\n### 5.1 什么是 MCP\n\nMCP（Model Context Protocol）是一个开放标准协议，让 Claude 能够连接外部工具和数据源。你可以把它理解为\"Claude 的 USB 接口\"——不管外部系统是数据库、API 还是文件服务器，只要实现了 MCP 协议，Claude 就能即插即用。\n\n### 5.2 传输方式\n\n| 传输方式 | 适用场景 | 说明 |\n|---------|---------|------|\n| **HTTP** | 远程服务（推荐） | 可流式传输（Streamable HTTP） |\n| **stdio** | 本地进程 | Claude 启动子进程，通过 stdin/stdout 通信 |\n| **SSE** | — | 已弃用，建议迁移到 HTTP |\n\n### 5.3 作用域与配置\n\nMCP 服务器有三个作用域，优先级从高到低：\n\n| 作用域 | 配置文件 | 说明 |\n|--------|---------|------|\n| **Local** | `~/.claude.json`（项目段） | 仅你在此项目，不共享 |\n| **Project** | `.mcp.json` | 项目级，提交到 git |\n| **User** | `~/.claude.json` | 你的所有项目 |\n\n**stdio 服务器配置示例**（`.mcp.json`）：\n\n```json\n{\n  \"mcpServers\": {\n    \"my-db\": {\n      \"type\": \"stdio\",\n      \"command\": \"npx\",\n      \"args\": [\"@modelcontextprotocol/server-postgres\"],\n      \"env\": {\n        \"DATABASE_URL\": \"postgresql://localhost:5432/mydb\"\n      }\n    }\n  }\n}\n```\n\n**HTTP 服务器配置示例**：\n\n```json\n{\n  \"mcpServers\": {\n    \"remote-api\": {\n      \"type\": \"http\",\n      \"url\": \"https://mcp.example.com/api\"\n    }\n  }\n}\n```\n\n### 5.4 添加 MCP 服务器\n\n推荐使用命令行添加：\n\n```bash\n# 添加 stdio 服务器\nclaude mcp add my-db -- npx @modelcontextprotocol/server-postgres\n\n# 添加 HTTP 服务器\nclaude mcp add --transport http remote-api https://mcp.example.com/api\n\n# 指定作用域\nclaude mcp add my-tool --scope project -- npx my-tool-server\n\n# 列出已配置的服务器\nclaude mcp list\n\n# 移除服务器\nclaude mcp remove my-db\n```\n\n### 5.5 工具搜索（Tool Search）\n\n当配置了大量 MCP 工具时，每次都把所有工具声明发给模型会浪费 token。Claude Code 的**工具搜索默认已启用**（`auto` 模式），会根据当前任务上下文动态搜索最相关的 MCP 工具，而不是一次性加载所有工具。\n\n工具搜索支持三种模式：\n\n| 值 | 行为 |\n|------|------|\n| `true` | 始终启用工具搜索 |\n| `auto`（默认） | 当 MCP 工具数量超过阈值时自动启用 |\n| `false` | 禁用工具搜索，加载所有工具 |\n\n可在 settings.json 中通过 `toolSearch` 字段配置。\n\n### 5.6 MCP 资源引用\n\nMCP 服务器可暴露\"资源\"——Claude 可通过 `@` 语法引用：\n\n```\n@server-name:protocol://resource/path\n```\n\n例如，如果配置了一个文档服务器 `docs`，你可以在对话中写：\n\n```\n请参考 @docs:file:///api-reference.md 来实现这个接口\n```\n\n### 5.7 MCP Prompts 作为命令\n\nMCP 服务器可以暴露 prompts，它们会以斜杠命令的形式出现：\n\n```bash\n# 格式：/mcp__servername__promptname\n/mcp__docs__search-api\n```\n\n### 5.8 Claude 作为 MCP 服务器\n\nClaude Code 本身也可以作为 MCP 服务器运行：\n\n```bash\nclaude mcp serve\n```\n\n这使得其他支持 MCP 的工具可以连接到 Claude Code，利用它的代码理解和生成能力。\n\n### 5.9 输出限制与 Elicitation\n\n- **输出限制**：MCP 工具输出超过 10K token 时会收到警告，默认最大 25K token（可通过 `MAX_MCP_OUTPUT_TOKENS` 调整）\n- **Elicitation**：MCP 服务器可以请求用户输入结构化数据（如表单字段、选择项），Claude 会将请求转发给用户\n\n### 5.10 Channels（研究预览）\n\nChannels 是 MCP 的扩展能力，允许 MCP 服务器推送消息到 Claude 会话：\n\n- **需要 v2.1.80+ 且 claude.ai 登录**\n- **支持平台**：Telegram、Discord、iMessage（通过插件）\n- **启用方式**：通过安装对应的 Plugin（如 Telegram Plugin），Plugin 提供 Channel 所需的 MCP 服务器\n- **前置要求**：需要 Bun 运行时；首次连接需配对码验证\n- **安全机制**：发送者允许列表、配对码验证\n- **通信模式**：双向——服务器推送事件，Claude 通过同一频道回复\n\n\u003e **注意**：Channels 目前处于研究预览阶段，功能可能发生变化。\n\n---\n\n## 六、Plugins：多机制打包分发单元\n\n### 6.1 Plugin 的定位\n\nPlugin 不是一种新的扩展机制，而是一个**打包和分发容器**——它可以包含 Skills、Agents、Hooks、MCP 配置和 Settings，以一个统一的命名空间分发。\n\n### 6.2 Plugin 目录结构\n\n```\nmy-plugin/\n├── .claude-plugin/\n│   └── plugin.json          # 清单文件（可选，用于元数据声明）\n├── commands/                 # 额外命令\n├── agents/                   # 子代理定义\n├── skills/                   # Skill 定义\n├── hooks/\n│   └── hooks.json           # Hook 配置\n├── .mcp.json                # MCP 服务器配置\n├── .lsp.json                # LSP 配置\n└── settings.json            # 设置覆盖（仅支持 agent 相关配置）\n```\n\n**plugin.json** 清单（可选）：\n\n```json\n{\n  \"name\": \"my-plugin\",\n  \"version\": \"1.0.0\",\n  \"description\": \"我的自定义插件\",\n  \"author\": {\n    \"name\": \"your-name\"\n  }\n}\n```\n\n### 6.3 命名空间\n\nPlugin 内的 Skills 使用命名空间前缀，避免与其他 Plugin 或项目 Skills 冲突：\n\n```bash\n# 格式：/plugin-name:skill-name\n/my-plugin:create-component\n/sentry:analyze-error\n```\n\n### 6.4 开发与测试\n\n```bash\n# 测试本地 Plugin\nclaude --plugin-dir ./my-plugin\n\n# 重新加载 Plugins（开发时）\n/reload-plugins\n```\n\n### 6.5 安装与分发\n\n```bash\n# 从 marketplace 安装\n/plugin install plugin-name\n\n# 从 URL 安装\n/plugin install https://github.com/org/plugin-repo\n```\n\nPlugin 生态系统仍在快速发展中，未来将支持更丰富的 marketplace 功能。\n\n---\n\n## 七、Agent Teams：多 Claude 并行协作\n\n### 7.1 实验性状态\n\nAgent Teams 目前是**实验性功能**，需要显式启用：\n\n```bash\nexport CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1\n```\n\n### 7.2 架构设计\n\nAgent Teams 与 Sub-agents 的核心区别在于**通信模式**：\n\n| 维度 | Sub-agents | Agent Teams |\n|------|-----------|-------------|\n| **通信** | 只向主代理汇报 | 队友之间可跨代理通信 |\n| **协调** | 主代理串行委派 | Team Lead 分发任务，并行执行 |\n| **共享** | 无共享状态 | 共享任务列表 + 邮箱 |\n| **适用** | 单一子任务委派 | 大规模并行开发 |\n\n**架构图**：\n\n```\n            ┌──────────────┐\n            │  Team Lead   │\n            │ (协调者/你)   │\n            └──────┬───────┘\n                   │ 分发任务\n        ┌──────────┼──────────┐\n        ▼          ▼          ▼\n   ┌─────────┐ ┌─────────┐ ┌─────────┐\n   │Teammate │ │Teammate │ │Teammate │\n   │   A     │ │   B     │ │   C     │\n   └────┬────┘ └────┬────┘ └────┬────┘\n        │           │           │\n        └───────────┼───────────┘\n                    ▼\n            Shared Task List\n              + Mailbox\n```\n\n### 7.3 团队通信机制\n\n- **任务列表**：Team Lead 创建任务，分配给特定 Teammate\n- **邮箱**：Teammate 之间可以发送消息（如\"我修改了接口，你需要更新调用方\"）\n- **Hook 事件**：`TeammateIdle`、`TaskCreated`、`TaskCompleted` 用于自动化协调\n\n### 7.4 当前限制\n\n由于仍处于实验阶段，Agent Teams 有以下限制：\n\n- 无法恢复进程内队友的会话（崩溃后需重新开始）\n- 每个会话只能有一个团队\n- 不支持嵌套团队\n- Team Lead 角色固定，不可切换\n- 所有 Teammate 共享同一工作目录（除非使用 `isolation: worktree`）\n\n---\n\n## 八、六大机制选型决策\n\n### 8.1 决策流程图\n\n面对一个扩展需求，按以下路径选型：\n\n```\n你想做什么？\n│\n├─ 连接外部工具/数据 ──────────→ MCP\n│\n├─ 在特定事件自动执行 ──────────→ Hooks\n│  （提交前检查、文件变更通知）\n│\n├─ 封装可复用的工作流 ──────────→ Skills\n│  （模板化、参数化）\n│\n├─ 委派独立子任务 ──────────────→ Sub-agents\n│  （代码探索、安全审查）\n│\n├─ 多人/多模块并行 ──────────────→ Agent Teams\n│  （大规模重构）\n│\n└─ 打包分发给团队/社区 ─────────→ Plugins\n```\n\n### 8.2 对比总览表\n\n| 维度 | Skills | Sub-agents | Hooks | MCP | Plugins | Agent Teams |\n|------|--------|-----------|-------|-----|---------|-------------|\n| **触发** | 手动 `/` 命令或 AI 自动 | AI 自动或手动 | 事件驱动 | AI 按需调用 | 安装后生效 | 手动启动 |\n| **隔离** | 可选 fork | 可选 worktree | 无 | 进程隔离 | 命名空间 | 可选 worktree |\n| **共享** | git 提交 | git 提交 | settings | .mcp.json | Plugin 包 | 环境变量 |\n| **学习成本** | 低 | 中 | 中 | 中 | 高 | 高 |\n| **稳定性** | 稳定 | 稳定 | 稳定 | 稳定 | 较新 | 实验性 |\n| **典型耗时** | 即时 | 秒到分钟 | 即时 | 取决于服务 | — | 分钟到小时 |\n\n### 8.3 组合使用模式\n\n实际项目中，这些机制往往组合使用：\n\n**模式 1：Skill + Hook**\n\nSkill 封装\"创建组件\"流程，Hook 在文件写入后自动运行格式化：\n\n```\n/create-component Button\n    ↓ Skill 执行写入\n    ↓ PostToolUse Hook 触发\n    ↓ 自动运行 prettier + eslint --fix\n```\n\n**模式 2：Sub-agent + MCP**\n\n安全审查代理通过 MCP 连接漏洞数据库：\n\n```\n主 Claude → 委派 security-reviewer 子代理\n    ↓ 子代理通过 MCP 查询 CVE 数据库\n    ↓ 子代理通过 MCP 查询内部安全规则\n    ↓ 返回结构化审查报告\n```\n\n**模式 3：Plugin = Skill + Agent + Hook + MCP**\n\n一个\"Sentry 集成\"Plugin 可能包含：\n\n- Skill：`/sentry:analyze-error` 分析错误\n- Agent：`sentry-debugger` 自动定位 Bug\n- Hook：`PostToolUse` 上报代码变更到 Sentry\n- MCP：连接 Sentry API\n\n---\n\n## 九、小结与下篇预告\n\n本篇建立了 Claude Code 扩展架构的完整认知地图：\n\n| 你学到了 | 关键要点 |\n|---------|---------|\n| **全景视角** | 六大机制分层互补：MCP（连接层）→ Hooks/Skills（事件/指令层）→ Sub-agents（委派层）→ Agent Teams（协作层）→ Plugins（分发层） |\n| **Skills** | Markdown 模板 + 参数替换 + 动态上下文注入，`context: fork` 实现隔离 |\n| **Sub-agents** | 五个内置 + 自定义 Markdown 定义，支持工具控制、后台运行、worktree 隔离、持久记忆 |\n| **Hooks** | 26 个事件 × 4 种类型，退出码控制流程，`matcher` + `if` 精确过滤 |\n| **MCP** | 3 种传输 × 3 个作用域，工具搜索懒加载，Channels 双向通信 |\n| **Plugins** | 打包容器而非新机制，命名空间隔离，统一分发 |\n| **Agent Teams** | 实验性多 Claude 并行，共享任务列表 + 邮箱，突破单代理瓶颈 |\n\n下一篇（第八篇）将是本系列的收官之作——我们将用**三个端到端蓝图**把这些扩展机制串联起来，展示如何在真实项目中构建完整的自动化工作流。\n\n\u003e 📖 **系列导航**\n\u003e\n\u003e - [第一篇：从 OpenCode 切到 Claude Code](/articles/2026/04/01/opencode-to-claude-code-getting-oriented)\n\u003e - [第二篇：快速上手](/articles/2026/04/02/claude-code-getting-started)\n\u003e - [第三篇：日常工作流](/articles/2026/04/03/claude-code-common-workflows)\n\u003e - [第四篇：交互模式与内置命令](/articles/2026/04/04/claude-code-interactive-mode-and-built-in-commands)\n\u003e - [第五篇：CLA
