（我一直觉得将迪米特法则叫做迪米特建议更合适）\n\n在面向对象（OO）设计中，人们最难理解的事情之一是\"告诉而不问\"（[TellDon't Ask](https://martinfowler.com/bliki/TellDontAsk.html)）原则，它鼓励你告诉对象做一些事情，而不是从对象中提取数据来在客户端代码中做这些事情。模拟派测试者认为使用模拟测试有助于达到这一点，还能防止getter方法乱飞。古典派则认为有很多其他方法可以做到这一点。\n\n基于状态的验证的一个已知的问题是，它可能导致创建一些只为了支持验证的查询方法。单纯为测试增加额外的方法通常都不是一个好的做法，使用行为验证可以避免该问题。\n\n模拟派偏爱角色接口（[role interfaces](https://martinfowler.com/bliki/RoleInterface.html)），并断言使用这种测试风格会鼓励使用更多的角色接口，因为每个协作都是单独模拟的，因此更有可能转变为角色接口。因此，在上面的示例中，使用string buffer生成报告，模拟者将更有可能发明一个在该领域有意义的特定角色，不过还是用string buffer来实现。\n\n重要的是要记住，这种设计风格上的差异是大多数模拟派的主要动机。**TDD的初衷是获取能够大量支持设计演进的自动化回归测试**。实践证明，编写测试首先可以大大改善设计过程。模拟派对哪种设计是好的设计有非常强烈的见解，并且已经开发了mock库，来帮助人们发展这种设计风格。\n\n## 我应该成为一个古典派还是模拟派呢？\n\n我觉得这是一个很难自信回答的问题。就我个人而言，我一直是一个传统的的古典派TDDer，到目前为止，我看不出任何改变的理由。我看不出模拟派TDD有什么很吸引人的优势，反而我比较担心将测试与实现耦合所带来的不良后果。\n\n当我观察一个模拟派程序员时，这一点尤其让我震惊。我非常喜欢当我在编写测试时，我关注的是行为的结果，而不是如何实现的。模拟派经常考虑SUT的实现，以便能够编写期望。这让我觉得很不舒服。\n\n我还没有在真实的项目上实践过模拟派TDD，这种不利条件也让我有点痛苦。正如我从测试驱动开发本身学到的那样，如果不认真尝试，通常很难判断一种技术。我确实认识很多优秀的开发人员，他们是快乐忠实的模拟派。虽然我是一位坚定的古典派，我还是会尽可能公正地提出这两种观点，以便你自己做决定。\n\n如果模拟派风格测试对你很有吸引力，我建议你尝试一下。如果你在模拟派TDD试图改善的领域遇到了问题，就更值得一试了。我知道两个主要的领域。一个是，当测试失败时，你花费了大量时间进行调试，因为它们没有很干脆直接地告诉你问题在哪里。(你还可以通过在更细粒度的对象组上使用古典派的TDD来改善此问题。)另一方面是，如果你的对象没有包含足够的行为，模拟派测试可能会鼓励开发团队创建更多行为丰富的对象。\n\n## 总结\n\n单元测试的一个有趣之处在于，随着xunit框架和测试驱动开发的成熟，越来越多的人拥抱了mock对象的方式。很多时候，人们对模拟对象框架有一些了解，但却没有完全理解模拟派/古典派之间的的本质区别。无论你倾向哪一种方式，我认为理解彼此观点的差异性很有帮助。然而，你并不一定非要成为一个模拟派而精通mock框架，但理解指导软件设计决策的思想大有裨益。\n\n本文的目的是指出这些差异，并说明它们之间的取舍。对于模拟派的思考，相比我研究的这些，还有更多的内容，特别是它对设计风格的影响。我希望在未来几年，我们可以看到更多使用这种方式写的测试代码，那会加深我们对写代码前先写测试（TDD）这种迷人的方式的理解。\n\n## 延伸阅读\n\n想要透彻理解xunit测试实践，可以看一下Gerard Meszaros的新书(免责声明：这本在我的系列丛书中)。他也在维护一个[网站](http://xunitpatterns.com/)，网站上包含了这本书中的所有模式。\n\n想要了解更多TDD的东西，可以先看 Kent's book [译注1]。\n\n想要了解更多了解模拟派风格的测试，最好的全面的资源是[Freeman \u0026 Pryce](https://www.amazon.com/gp/product/0321503627?ie=UTF8\u0026tag=martinfowlerc-20\u0026linkCode=as2\u0026camp=1789\u0026creative=9325\u0026creativeASIN=0321503627)。作者在维护。特别是读一下这篇精彩的论文[OOPSLA paper](http://jmock.org/oopsla2004.pdf)。想要了解更多TDD的一个另一个分支 - 行为驱动开发的内容，可以从Daniel Terhorst-North的[introduction](https://dannorth.net/introducing-bdd/)开始看。\n\n你还可以看下关于这些技术的工具网站 [jMock](http://www.jmock.org/)，[nMock](http://www.nmock.org/)，[EasyMock](http://www.easymock.org/)以及[.NET EasyMock](http://sourceforge.net/projects/easymocknet/)。（还有很多其它的工具没有在这里列出，不要以为这个列表是全部的。）\n\n#### 注释\n+ 译注1：原文中的链接失效了，Kent写过一本《[_测试驱动开发_](https://book.douban.com/subject/1230036/)》\n\n#### 声明\n本文翻译自Martin Fowler的文章_*Mocks Aren't Stubs*_：\n\n+ 原文链接： [Mocks Aren't Stubs](https://martinfowler.com/articles/mocksArentStubs.html)\n+ 原文作者： [Martin Fowler](https://martinfowler.com/)\n+ 发表时间： 2007年1月2日\n"])</script><script>self.__next_f.push([1,"38:T4aa3,"])</script><script>self.__next_f.push([1,"\n\n\n\nMain members Introduction:\n\n- Mr. Yuan: boss, alias Mr. Object-Oriented, Referred to as Yuan\n- Ms. Wu, Ms. Cai, Mr. Xiao, Mr. Shi, Mr Fa, Ms. Ren, Mr. Xing, employees\n\n\n\nAfter doing so many years of Object-Oriented programming, I still write code that violates the SOLID principles. I understand it at a glance, but am embarrassed when coding. The understanding of SOLID is not enough. What should I do?\n\n- Are the SOLID principles flawed?\n- Can I use it with object oriented design?\n- ......\n\nFirst off, let's see what is SOLID:\n\n- SRP: Single Responsibility Principle\n- OCP: Open Close Principle\n- LSP: Liskov Substitution Principle\n- ISP: Interface Segregation Principle\n- DIP: Dependency Inversion Principle\n\nSOLID principles are usually abstract, Even developers experienced in OO may not have a solid grasp of the SOLID principles, let alone those new in OO.To improve the sensitivity to SOLID principles, the first step is to be clear what are each the principles. In this article, Mr Yuan's SOLID entrepreneurial story will unveil the principles.\n\n---\n\n## Designing a small and beautiful toolbox to enhance customer experience\n\nYuan has a metal tool rental store. In the early days of the business, he had  two types of customers. Type A customers needed scissors, hammers, wrenches, and chainsaws. Type B customers needed hammers, wrenches, fruit knives, and screwdrivers. For convenience, Yuan would put the six tools in a single toolbox, and rented the toolbox to both types of customers.\n\nYuan received complaints from those customers after several rentals, because it caused them much trouble. Firstly, having extra two tools made the toolbox heavy and the customers were more exhausted carrying it. Secondly, after they went back home, they would get confused: \"What are these two tools, I didn’t borrow them? Are the extra tools value added service? But how should I use it?\" Finally, Type A customers, who had never used the fruit knife and the screwdriver, but he had to maintain and take care of the extra two tools, which was inconvenient. Similarly, Type B customers faced the same problem.\n\nTo improve the customers' experience, Yuan separated the big tool box into two smaller tool boxes based on customers' needs, and rented them to A and B respectively. After that, he received favorable feedback from both types of customers.\n\n***[Interpretation of ISP]***\n\n**In software design, ISP advocates not providing a large and comprehensive interface to users, but isolating the interfaces that each user really cares about.**\n\n![image](/images/swd/oo/en/ood-isp.webp)\n\n---\n\n## Assure customers that apprentices can work in place of masters\n\nYuan worked diligently for two years and earned a lot of money. When he saw the rise of the real estate market and the home improvement market, he decisively bought a well-known furniture factory and cooperated with a private carpenter firm.\n\nSJ was a carpenter apprentice working in the carpenter firm. After more than three years of learning, he was able to make the same furniture as his master, like bookshelves, wardrobes, dining tables, doors, windows and other furniture\n\nEach time Yuan would work directly with SJ’s master. However, due to the master’s poor physical strength, he would delegate some work to SJ. Fortunately, the furniture made by SJ each time satisfied Yuan. After several collaborations, Yuan believed that the apprentice had inherited the master’s craftsmanship, and whatever the master could make, the apprentice would be able to make as well.\n\nIn 2017, the real estate market was crazily bullish, and the number of Yuan's one-time purchase orders doubled. In order to deliver on time, a more junior carpenter apprentice of SJ’s master, Y, started participating in projects. Unfortunately, Y created closets, doors and windows in a very different way from the master ’s style. The furniture made by Y made Yuan disappointed and angry. After that, Yuan ceased cooperation with this carpenter firm...\n\n***[Interpretation of LSP]***\n\n**Although Y inherited his master's craftsmanship, he would modify the design styles by himself. As a result, the furniture he created was totally different from what Yuan expected. This is similar to how the subclass instance replaces the parent class instance and introduces behavior inconsistent behavior of the parent class, causing the software to be buggy. There are potential problems with this kind of inheritance design.**\n\n**In software design, LSP emphasizes that, consumers that use a parent class must be able to use a subclass too, and the behavior should be the same.**\n\n\n**In short, a subclass should not change the existing behavior of the parent class (In Java, it shows that subclass overrides the non-abstract methods in the parent class). If inconsistency occurs after substituting a subclass for the parent class, you need to be vigilant about whether the inheritance is a suitable design.**\n\n\n**A client uses a furniture factory as an abstraction on different workers (different implementation of the master) and in order to get an excellent table a client has only one way: check which master is working on his table, in other words, the client has to check `instance of worker` that violates good design principles.**\n\n![image](/images/swd/oo/en/ood-lsp.webp)\n\n---\n\n## Clear and good cooperation agreements, which builds each other’s trust\n\nAfter the last unpleasant cooperation, Yuan not only earned less money but also got angry. Nonetheless, in those several years when the real estate market was completely crazy, Yuan made several fortunes. What would Yuan do with so much money? Of course, expand the company to earn more money.\n\nAdhered to the principle that \"Although the sparrow is small, its internal organs cannot be incomplete.\"(Chinese proverb, it means that small but complete in every detail) , Yuan established several departments - finance, legal, administrative, human resources, marketing and sales. Due to the small business volume, each department contains a single member. The four departments of human resources, administration, finance and legal apartment were under the sole control of Ms. Cai.\n\nYuan would go directly to Ms. Cai to check a reimbursement form, or hold an annual meeting. If he wanted to know the last month’s sales performance, he would find Mr. Xiao in the sales department. For marketing, he would seek Mr. Shi from the marketing department.\n\nAfter more than half a year of rapid development, the number of people in each department grew. Yuan continued doing things the same way as before but quickly encountered trouble. You see, the day before yesterday, Ms. Cai was in charge of the reimbursement, but yesterday it was handled by Ms. Wu, and today it became Ms. Ren. The same phenomenon had occurred in other departments. After much consideration, Yuan decided that each head of the department needs to make a fixed list of all the services that the department provides. For example, the service list provided by Ms.Cai from the finance department would look like this:\n\n- Check reimbursement forms\n- Process reimbursements\n- Pay wages\n- Recruit new colleagues\n- Review performance\n- Hold annual meetings\n- Review business licenses\n\nSo, if Yuan wanted to deal with reimbursement or pay wages, he can just communicate with Ms. Cai. As for who is doing the work, Yuan did not need to care at all. Certainly, it was much easier for other departments to cooperate with the finance department. Since then, the same process was similarly established in all departments.\n\nYuan finally enjoyed the perks of being a boss. Before getting off work, he typed this down: The departments must cooperate through agreed agreements, instead of caring about who is responsible for the agreements within.\n\n***[Interpretation of DIP]***\n\n**In the beginning, Yuan went directly to a specific executive in the department to communicate. It means that Yuan relied on the specific implementation details. The communication cost increased every time the executive changed. Later on, he asked Ms. Cai to provide a service list. Here, Ms. Cai acted as an abstraction or interface. After that, he only communicated with Ms. Cai. Yuan changed from relying on specific implementation details to relying on abstraction.**\n\n\n**In software design, DIP advocates that users rely on an abstract service interface, instead of relying on a specific service executor. From relying on a concrete implementation to relying on an abstract interface. That is what \"inversion\" means.**\n\n![image](/images/swd/oo/en/ood-dip.webp)\n\n---\n\n## Improve work efficiency by single responsibility\n\nYuan initially assigned Ms.Cai as the head of the four departments of human resources, administration, finance and legal. After the business expanded, he only recruited 10 more people for these departments. Ms. Cai felt very stressed because she had to assign tasks properly to each colleague to ensure that the company can carry out daily activities, personnel assessment, and training and payroll. Also, there are some sensitive activities like business audits, account review and information security audits.\n\n\n\nMs Cai was clearly tired. There was once she made a blunder at work that almost caused the company to go under.\n\n\n\nOne day, several people from the Administration for Industry and Commerce(AIC) came to the company to review the company's business qualifications. During the discussion between Ms. Cai and AIC manager, two other colleagues had a little dispute because of  data that could not be tallied. These two completely forgot that there were investigators from AIC. Some sensitive information related to the account was mentioned during in dispute. Fortunately, Ms. Cai reacted quickly and stopped them in time. She also managed to pacify AIC.\n\n\n\nLater Yuan heard about the incident. Ms. Cai  had, on numerous occasions,  also gave feedback to Yuan that business was too complex; it was not only tiring, but also easy to make mistakes. Yuan decided to let each department be headed by different staff. He assigned Ms. Ren to head the human resource department,  Mr. Xing to head the administrative department, and Mr. Fa to head the legal department.  Ms Cai remained as the head of the finance department.\n\n\n\nAfter a few months, Yuan was delighted that the cost of operating has not risen yet employees’ work status has improved..\n\nFrom then on, Ms. Cai, from the finance department, provided the list of services:\n\n- Check reimbursement forms\n- Process reimbursements\n- Pay wages\n\nMs. Ren, from human resource department, provided the list of services:\n\n- Recruit new staff\n- Review performance\n- Staff development\n\nMr. Xing, from the administrative department, provided the list of services:\n\n- Hold annual meeting\n- Receive guests\n\nMr. Fa, from the legal department, provided the list of services:\n\n- Review business licenses\n- Audit information security\n\n\nAt 10 pm on Friday, Yuan stepped out of the office door. He hummed and said to himself: specialists have to do specialised things. Don’t be greedy and overload, else there will be blunders.\n\n\nBefore going to bed, Yuan turned on his laptop and typed down the memo: Separating the points of focus is an effective way to do a single thing. If you need to take care of many unrelated tasks at the same time, context switching will greatly reduce work efficiency. It will greatly reduce work efficiency. Worse still, there may be some unexpected disasters. After typing these, he was pleased and went to sleep.\n\n***[Interpretation of SRP]***\n\n**In software design, SRP advocates allowing a class to handle only a set of related things. By controlling its direction of change, it will be better to maintain later. If there are many factors that cause change, the class will carry on a large amount of responsibilities. And it increases the difficulty of maintaining a class. The common God classes are like this.**\n\n![image](/images/swd/oo/en/ood-srp.webp)\n\n---\n\n## Introduce middleman as reading ambassadors to liberate himself\n\nAfter several years of expansion, Yuan’s company has been operating well. He started to think about how to build a culture for his company.\n\nYuan has always attached great importance to reading and he wanted to organize a reading community in the company - a weekly sharing session. In the beginning, he proposed that the administration department and the human resources department should take responsibility for this.The two departments should take turns, and he communicated with each owner.\n\n\n\nTwo months passed, and the company’s reading atmosphere had been greatly improved. Bookshelves are spread all over the office. Break time had been shifted from gossip to book reading experience sharing.\n\n\n\nEven though he was relieved, Yuan also felt powerless. This phenomenon often occurred: sometimes he would go to Mr. Shi in the human resource department to discuss reading related work, but was told that it was Mr. Zheng’s turn in the administration department. And when he went to Mr. Zheng, he was told that the marketing department was also one of the organizers, and it’s the marketing department’s turn this week.\n\n\n\nYuan was already busy with the company’s operations and the repeated coordination work for the reading campaign further exhausted him. However, he highly valued the reading community. After much pondering, he decided to recruit a reading ambassador (he can be a little bit extravagant when he is rich). Before starting the reading session each week, he directly communicated with the ambassador, and the ambassador then coordinated with the corresponding department to carry out the activity.\n\n\n\nYuan was liberated after this adjustment. He no longer needed to worry about which department will organize the campaign this week or which department will partake next week.\n\n\n\nAs the reading session blossomed in the company, Yuan thought that he would give a 12-month bonus to the one who read the most and shared the most in the year...\n\n\n\n***[Interpretation of OCP]***\n\n**At the beginning, Yuan only supported a reading session held by a certain department. Whenever a new department takes the responsibility to hold the session(like functional expansion), Yuan must change his communication method. That means he supported new requirements by modifying himself. At this time, Yuan is open to modification. The introduction of a reading ambassador is equivalent to making an abstract. Yuan only needs to rely on this abstraction. When a new department holds a reading session, he does not need to change the communication method. At this time, Yuan is closed to modifications, but open to extensions.**\n\n\n**In software design, OCP advocates closing to modifications, but opening to extensions. It is recommended to provide your service caller with an abstract, high-level behavior interface. Later, when your service has a new kind, all you need to do is add a specific service that implements the abstract, high-level interface without modifying the way how caller uses.**\n\n![image](/images/swd/oo/en/ood-ocp.webp)\n\n---\n\n## Review the startup story\n\nIt can be seen from the story of Yuan that there are two main reasons why Yuan faced various pain points at different stages:\n\n- Paying attention to too many things\n- Focusing on the details of things\n\nAt the beginning of the startup, what Yuan did was not a big problem. With the company constantly growing (as the software evolves), Yuan needed to figure out new solutions, and the core concepts of these solutions are nothing more than two:\n\n- Separation of concerns(SOC)\n- Introduce a middleman\n\n\n\nIn Object-Oriented design, separation of concerns reflects the essence of software design: high cohesion and low decomposition.The introduction of a middleman is similar to abstract-oriented programming.\n\n---\n\n## In the end\n\nThe SOLID principle is actually helping us to design high cohesion and low coupling software which can reduce the maintenance cost of the software. Although the principle can't effectively guide the coding at all times, understanding the design concepts behind these principles is the first step. From then on, you will need to continue to code and practice, reflect on these principles and finally internalize them.\n\n\n\nFinally, I want to share a key term with the technical staff – user perspective / business perspective:\n\n\n\nWe have learned many kinds of techniques(design principles, design patterns, refactoring techniques, etc.).  However, if we forget the original intention and deviate from our goal,  our code may not bring much value no matter how cool and robust it is. We should start from the business need and look at the problem from the user's perspective, then start writing simple and usable code.\n\n\n---\n\n## Appreciation\nThis article is originally written in [Chinese](https://sjyuan.club/solid-in-depth-explanation/). Thanks to the translation team, the English edition is published now.\n\n#### Translators' recommendation\n\n\n***Yangjie Lu*** from ThoughtWorks China Chengdu Office:\n\n\u003e Thanks Shenjian for inviting me write this translator sequence and working with us to translate this blog.《SOLID entrepreneurial story of Mr. Object-Oriented》uses an interesting way to explain what is SOLID principles. It’s easy to understand and impressive, I think it doesn’t only suit for developers, also suits for trainers who are trying to explain the abstract SOLID principles in the form of a story. Recently, I’m working on a team, we have people from five countries, I want to share this blog with them, so I think it’s time to work with our author Shenjian to translate it. Also hope this can share with more people and help more people to understand what is SOLID.\n\n\n\n***Ruolin Liang*** from ThoughtWorks China Shenzhen Office:\n\n\u003e As a new TWer, I really want to do something  to help. So when I saw the email asking for volunteers to help to translate this article, I responded with a big YES immediately. It was tough for a non-native English speaker to translate an article into English, but we made it! Thanks to my partners helping me with proofreading and something else.\n\u003e\n\u003eWhen I tried to translate this article, I was forced to learn SOLID again. SRP, OCP, LSP… At the time I translated them from Chinese to English, those principles were from blur to clear. It's a good way to learn, and you could try this method next time. I remembered a 13-year-old TensorFlow programmer at the latest GDG DevFest said: \"When you want to do something, just do it. And don't be afraid of the difficulties.\" The same words to you.  And I hope the concepts introduced in this article could be a handy tool for you to make things happen.\n\n\n\nWe also greatly appreciate them who has provided much support:\n\n- ***Yuan Liu***, from ThoughtWorks China Xi'an Office\n- ***Zhang Xin***, from ThoughtWorks China Chengdu office\n- ***Kelvin Yong***, from ThoughtWorks Singapore office\n- ***Sergey Bukahrov***, from ThoughtWorks Singapore office\n- ***Natalie Chin***, from ThoughtWorks Singapore office\n\n\n\n\n\n\n\n\n\n\n\n\n"])</script><script>self.__next_f.push([1,"39:T353e,"])</script><script>self.__next_f.push([1,"\n\n\n\n做了这么多年的面向对象编程还是写出违背SOLID原则的代码，一看都懂、一做就被怼，敏感度不够，如何是好？\n\n\n- 难道SOLID原则本身就有错？\n- 难道我不应该涉水OOD？\n- ......\n\n\n\n请先屏住呼吸，我们来看看SOLID叫什么：\n\n\n- **S**ingle Responsibility Principle，单一职责原则\n- **O**pen Close Principle，开闭原则\n- **L**iskov Substitution Principle，里氏替换原则\n- **I**nterface Segregation Principle，接口隔离原则\n- **D**ependency Inversion Principle，依赖倒置原则\n\n\n\n原则通常较为抽象，别说刚接触OO的程序员，有一定经验的人也不一定吃得透。要想提高对OO原则的敏感度，第一步，我们要清楚SOLID到底在讲什么？本文，袁Sir的SOLID创业故事将为你揭开一层面纱。\n\n\n文末有彩蛋~\n\n---\n\n## 设计小而精美的工具箱，提高顾客体验\n\n\n袁Sir创业初期经营了一家五金器具共享租用店，遇到两类顾客，A顾客需要剪刀、锤子、扳手、电锯，B顾客需要锤子、扳手、水果刀、梅花刀。袁Sir为了图省事，把这个六把工具同时装在一个工具箱里，每次都把装有6把工具的工具箱给A或B租用。\n\n\n经过几次借还，袁Sir收到顾客的抱怨，为什么呢？因为袁Sir这么做增加了A和B的负担，首先多了两把工具，扛来抗去的累得多。其次，他们拿回去之后会发现：\"咦，这两个是啥，我没要这个呀？莫非是增值服务？但我要用来做啥呢？\" 结果A从未用过水果刀和梅花刀，但A还要保管好这两工具，增加了保管的成本。同理，B顾客也会面临同样的问题。为了提高顾客的体验，袁Sir把这两类顾客的工具单独用两个更小的工具箱装好，分别提供给A和B，并得到了两类顾客的一致好评。\n\n_**[ISP解读]**_  \n袁Sir从一开始图一时的方便，塞给顾客他本不需要的东西，经过反思后，从顾客需求出发，只提供顾客想要的东西。**_投其所好_** 是他创业悟出的第一个处世之道。\n\n\n**_在软件设计中，ISP 提倡不要将一个大而全的接口扔给使用者，而是将每个使用者关注的接口进行隔离。_**\n\n\n![image](/images/swd/oo/oo-isp.webp)\n\n---\n\n## 让客户坚信徒弟能代替师傅干活\n\n\n袁Sir勤勤恳恳经营的五金租用店2年，挣了一大把辛苦钱，正好赶上房地产兴起的年头，家装市场跟着兴起，他果断买下一家知名的家具厂，并跟一家私人工匠所展开了合作。\n\n\nSJ是工匠所的一名木匠学徒，从师3年有余，书架、衣柜、餐桌，门、窗这些家具已经能够到跟他的师傅如出一辙了。\n\n\n袁Sir每次合作都是直接跟SJ的师傅对接，而在实际执行过程中，师傅有时候因体力跟不上，就交给SJ去做，好在每次生产出来的家具都能够让袁Sir满意。几次合作下来，袁Sir便相信：_徒弟继承了师傅的手艺，师傅能做的这些家具，徒弟也一定能做得一模一样_。\n\n\n2017年，房地产彻底疯了，袁Sir一次性采购订单多出了以往2倍。为了如期交付，SJ的师弟小Y也参与进来。不幸的是，个性十足的小Y打造衣柜和门窗的方式跟师傅的风格差别很大，设计出来的家具让袁Sir一脸懵逼，始料不及的三丈大火烧尽后，袁Sir果断地中断了跟这家工匠会所的合作...\n\n\n_**[LSP解读]**_  \n小Y将其师傅的手艺继承后，但自己又擅自修改了设计风格，结果打造的家具跟袁Sir的期望不一致，这就好比子类替换了父类，产生了不一致的行为，软件不能正常运行，这种继承设计存在潜在的问题。\n\n\n**_在软件设计中，LSP 重点强调：对使用者来说，能够使用父类的地方，一定可以使用其子类，并且预期结果是一致的。_**\n\n\n简而言之，子类不应该去修改父类已有的功能（在Java中，体现为子类重写了父类中非抽象的方法）。如果你的继承体系中出现了这种替换后不一致的现象，需要警惕你的继承是否合理了。\n\n\n关于代码示例，请在文末点击阅读文章 _让里氏替换原则为你效力[1]_\n\n![image](/images/swd/oo/oo-lsp.webp)\n\n---\n\n## 清晰良好的合作协议，让彼此更加信任\n\n\n经过上一次不愉快的合作，袁Sir虽然少挣了一笔钱，还生了一肚子气。但台风来，猪想飞你也挡不住。在房地产彻底疯了的这几年里，袁Sir又捞了好几大桶金。有了钱能做什么呢？当然把公司做大，再挣更多的钱呀。\n\n\n袁Sir秉着 '麻雀虽小，五脏不能不全' 的原则，成立了财务部、法务部、行政部、人事部、市场部、销售部，由于期初业务量没有大到招架不住，各部门都是光杆司令，而且人事、行政、财务、法务四个部门由小蔡独管（袁Sir流露出了资本家的面貌）。\n\n\n袁Sir要核对一个报销单，就直接找财务部的小蔡办了，要举办一场年会还得找小蔡，想了解上个月的销售业绩，他去找了销售部的老肖，当然找的最多的还是市场部老史。\n\n\n经过大半年的快速发展，各部门从光杆司令变成了群狼作战。袁Sir仍然按照之前的方式办事，但遇到了烦恼 -- 前天报销单还是小蔡在处理，昨天变成了小吴，今天又换成了小任。当然，其他部门也产生了相同的现象。苦思冥想，袁Sir出了一招：部门的负责人制定一个固定的服务列表，比如财务部小蔡提供服务列表：\n\n\n1. 核对报销单\n1. 处理报销\n1. 发工资\n1. 招聘新同事\n1. 评审绩效\n1. 举办年会\n1. 审核营业执照\n\n\n\n袁Sir此时要处理报销、发工资，只用找小蔡沟通就好，至于具体谁去执行，袁Sir压根不需要知道。当然其他部门跟财务部合作也轻松了很多。此后袁Sir对所有部门都进行了整改。\n\n\n此时袁Sir终于才体会到当老板的一丁点美好了。下班合上电脑前，他敲下了一句话：**_部门之间得通过约定好的协议来合作，而不用关心对方内部由谁做协议所规定的事项。_**\n\n\n**_[DIP解读]_**  \n一开始，袁Sir直接找部门中某个具体执行的人去沟通工作，此时袁Sir依赖的是具体实现细节，每次执行的人发生变化会增加袁Sir的沟通成本。他让小蔡提供了一个服务清单，小蔡充当了一个抽象/接口，此后他只用找小蔡沟通即可，袁Sir从依赖具体实现细节转变到依赖抽象。\n\n\n**_在软件设计中，DIP 提倡使用者依赖一个抽象的服务接口，而不是去依赖一个具体的服务执行者，从依赖具体实现转向到依赖抽象接口，倒置过来。_**\n\n\n![image](/images/swd/oo/oo-dip.webp)\n\n---\n\n## 各司其职，工作效率会大大提升\n\n\n袁Sir起初让小蔡统管了人事、行政、财务、法务四个部门，业务扩张后也只是给小蔡多招了10来个人。小蔡大脑里就不得不绷紧四根弦，他要给部门各个同事合理分配任务，确保公司能够正常开展日常活动、人员考核培养、工资发放等工作，当然还有一些诸如工商督查、账务审核、信息安全审核等敏感的活动。暂且不说小蔡有多累，关键是有一次捅了个篓子，差点没葬送公司前程。\n\n\n一天，工商局来了几个人审核公司的营业资质，就在小蔡跟工商局负责人交涉的过程中，其他管理账目的两位同事因为一项没法对齐的数据起了点小争执，全然忘记还有工商局调查人员在，口角中抖了一些账目相关的敏感信息，好在小蔡反应快，及时进行了制止，当然也做了一些额外的安抚工作，把这事给糊弄过去。\n\n\n这事传到袁Sir耳中，加上小蔡多次跟袁Sir反馈业务太杂，不但累且容易出篓子，袁Sir这才把几个部门进行了拆分，人事部交给了小任，行政部交给了小邢，法务由老发掌管。\n\n\n经过几个月的验证，让袁Sir欣喜的是，运营成本不但没有增加，员工的工作状态也比之前大有改善。\n从此，财务部门小蔡提供的服务列表：\n\n\n1. 核对报销单\n1. 处理报销\n1. 发工资\n\n\n\n人事部门小任提供的服务列表：\n\n\n1. 招聘新员工\n1. 员工绩效考核\n1. 员工培养\n\n\n\n行政部小邢提供的服务列表是：\n\n\n1. 举办年会\n1. 接待来宾\n\n\n\n法务部提供的服务列表是：\n\n\n1. 审核营业执照\n1. 审核信息安全\n\n\n\n周五晚上10点，袁Sir走出办公室大门，哼着小曲自言自语道：还得专门的人干专门的事呀，勿贪多，贪多必失...\n\n\n_**[SRP解读]**_  \n袁Sir睡前打开电脑，在备忘录写下：分离关注点（专注）是做好一件事的有效途径，如果同时需要兼顾多项不太相关的工作，注意力就必须在不同的上下文切换，会大大降低工作效率，更糟糕的是可能会出现一些意外的灾难。敲完欣慰睡去。\n\n\n**_在软件设计中，SRP 提倡让一个类只处理一组相关的事情，控制了它的变化方向，后期也能更好的定位。如果引发变化的因素很多，会导致类的职责过多，难以维护，常见的上帝类就是这么形。_**\n\n\n![image](/images/swd/oo/oo-srp.webp)\n\n---\n\n## 引入中间人读书大使，解放自己\n\n\n经过几年的发展，袁Sir的公司俨然已经步入正轨，他开始思考公司文化建设方面的事情。\n\n\n袁Sir一直对读书非常重视，他想在公司把读书运动搞起来，每周搞一次分享大会。起初他提议由行政部和人事部来牵头搞，两个部门轮流来，自己直接分别跟两个部门负责此事的负责人对接。\n\n\n两个月过去了，公司的读书氛围得到大大提升，书架遍布公司各个角落，水果时间也从八卦转向了读书心得的分享。\n\n\n欣慰之余，袁Sir也感觉有点力不从心。经常出现这种现象：有时候去他找人事部的小史商量工作，却被告知这周轮到行政部的小郑了，而去找小郑的时候，被告知市场部也是组织者之一，本周轮到市场部了。\n\n\n袁Sir因为业务繁忙，加上翻来覆去的对接工作，搞得心累，但他又很重视这件事情。琢磨良久，他决定给自己招一个读书会大使（有钱了可以稍微任性一下下），每周要开展读书运动大会前，他直接跟读书大使对接，大使后续再去协调对应的部门开展工作。\n\n\n经过这么一整改，袁Sir得到了解放，再也不用关心这周该由哪个部门组织，下次会有什么新的部门加入进来。\n\n\n看着读书运动在公司里遍地开花，袁Sir心想着年底了要给读书最多，分享最多的同事多发12个月的年终奖...\n\n\n_**[OCP解读]**_  \n在一开始，袁Sir支持某个部门举办的读书会，后续只要有新的部门要负责举办时（好比功能上的扩展），袁Sir都要改变自己的沟通方式，这意味着他自身做出修改才能支持新的需求，此时，袁Sir对修改是开放的。引入读书大使后，相当于做了一个抽象，袁Sir只需要依赖这个抽象，再有新的部门举办读书会时，他就不需要在改变沟通方式了，此时，袁Sir对修改是关闭的，对扩展是开放的。\n\n\n**_在软件设计中，OCP 提倡对修改关闭，对扩展开放。建议为你的服务调用者提供一个他需要的抽象、高层次的行为接口，后期你的服务有新的种类，你只需要新增一个实现该抽象、高层次接口具体服务，而不需要修改调用者的使用方式。_**\n\n\n![image](/images/swd/oo/oo-ocp.webp)\n\n---\n\n## 创业故事回顾\n\n\n从袁Sir的故事中可以看出来，袁Sir在不同阶段之所以面临各种不同的痛点，主要原因有两点：\n\n\n1. 关注的事情太多\n1. 关注事情的细节\n\n\n\n创业初期，袁Sir这么做问题不大，公司在不断地发展壮大（如同软件的演变），袁Sir就需要琢磨出新的方案，而这些方案的核心观念无非两个：\n\n\n1. 分离关注点\n1. 引入中间人\n\n\n\n在面向对象软件设计中，_关注点分离_，其实体现的就是软件设计的精髓 -- _高内聚，低耦合_，_引入一个中间人_ 则跟 _面向抽象编程_ 有异曲同工之处。\n\n---\n\n## 写在最后\n\n\nSOLID原则，它其实是在帮助指导我们设计出_高内聚，低耦合_ 的软件，降低软件后期的维护成本。虽然原则不能时刻有效指导编码落地，理解这些原则背后的设计理念，让你迈出了第一步，接下来，你需要做的是在前进的路上，不断地进行编码实践、思考总结，将其内化。\n\n\n最后，我想跟技术人员共享一个关键词汇 -- 用户视角/业务视角：\n\n\n**_我们学到了的很多技巧（设计原则、设计模式、重构手法等），如果忘记初衷，失去目标，代码写得再炫酷、再健壮，也很难体现出应有的价值。从业务需求出发，以用户视角看问题，致力编写出 简洁可用 的代码即可。_**\n\n---\n\n## 参考阅读\n\n\n- [让里氏替换原则为你效力](https://yuanshenjian.cn/make-lsp-working-for-you/)\n- [解析简单设计原则](https://yuanshenjian.cn/analyse-principle-of-simple-design/)\n- [聊聊面向对象设计中的Is-A](https://yuanshenjian.cn/talking-about-is-a-in-ood/)\n- [写了这么多年代码，你真的了解SOLID吗？](https://insights.thoughtworks.cn/do-you-really-know-solid/)\n\n\n\n## 彩蛋\n\n\n袁Sir的创业故事经历VLog：\n[]()\n\n\n\n\n\n\n\n\n\n"])</script><script>self.__next_f.push([1,"3a:T335c,"])</script><script>self.__next_f.push([1,"\n\n\n---\n\n## Feedback的特殊意义\n\u003e Feedback作为名词，可以理解为一种信息载体，该信息通常承载了认可或建议。\n\u003e\n\u003e Feedback作为动词，指提供反馈或接收反馈，是一个人向外传达信息以及从外部接收信息的过程。\n\n在ThoughtWorks，Feedback的重要性犹如发动机于车，像Interview、Interview++、Probation Review、Quater Review、Annual Review等重要绩效考核环节无不都在依靠Feedback这架发动机来推进。操控这架发动机的是每一位TWer，一群TWer在一起凝聚成独特的气场，久而久之沉淀成一种文化 -- 扁平文化。\n\nThoughtWorks摒弃了传统的KPI绩效考核，而绩效考核关系到每个员工的职业发展，这让Feedback的意义尤为凸显，如何做好Feedback（动词）以及如何鉴别Feedback（名词），可以说是每一位TWer加入ThoughtWorks的第一门必修课。\n\n我认为，好的Feedback需要具备三个基本的属性：\n\n- 有心\n- 有料\n- 有效\n\n\n如何提供有心、有料、有效的Feedback？我想借这篇文章跟大家分享ThoughtWorks里Feedback的那些事儿。\n\n\n---\n\n## Feedback为什么如此重要？\n当被问`为什么要给其他人提反馈？`，最直观的回答是为了帮助他人，可你为什么要帮助他人呢？别人好不好对你有什么影响呢？你干嘛要做这种一不小心就得罪人的事情，事不关己，高高挂起不也挺好的吗？\n\n真的事不关己吗？我给大家分享两个真实的故事。\n\n\n### Feedback于个人的意义\n\u003e 在做NHO的这段时间里，我跟很多新同事聊到加入ThoughtWorks的初衷。多数小伙伴的初衷跟我五年前类似：*想跟ThoughtWorks里面优秀的人一起工作。*\n\n#### 提升工作体验\n四年ThoughtWorks职业生涯中，我有机会跟很多优秀的小伙伴一起合作，对我帮助特别大的是他们给我提的Feedback。一开始，我还很好奇他们为什么这么乐意指出别人待改善的地方，久思不得其解，我想可能这就是优秀TWer的自然属性吧。\n\n直到后来的某次面试中被问到：\"假如这个候选人被安排到你的项目，你愿跟跟他一起合作吗？\" 这个问题触发了我的思考，加上在项目上偶尔遇到跟新同事协作上的困扰，我明白了一点：*给我提反馈的小伙伴是希望我变成他优秀的同事，从而提升他们的工作体验*。他们是在用行动捍卫组织文化：*让不完美但有潜力的新人加入之后也能更快挤入优秀的行列，进而吸引更多想优秀起来的人*。作为一个TWer，为了打造一个良好的工作环境，提升工作体验，我们的确有责任给他人提出有效的反馈。\n\n\n#### 提升胜任力\nThoughtWorks胜任力模型中定义了一个核心维度 - `发展他人`，从`Junior`到`Senior`到`Lead`到`Principle`的升级过程中，`发展他人`是我们重点参考的一项。\n\n给他人提反馈，帮助他人成长，本身就是在发展他人，过程中同样也能帮助自己成长。你可以通过践行反馈来强化自己发展他人的意识，在实践中观察自己的沟通所产生的效果，有意识地提升自己的沟通反馈技巧。同时，频繁的给他人提出有意义的反馈，也促使你自己有一个Open的心态去接收别人的反馈，别人的反馈恰恰是你前进的助推剂。\n\n\n### Feedback于组织的意义\n再说个关于试用期的案例。2017年，我把一朋友成功推荐到中国区某Office，遗憾的是，他在第五个月三周的时候被劝退了。好好的，怎么会被劝退呢？我怀着疑惑去了解了他这5个多月仅有的两次Interview++记录，并没有看出任何风险，唯一让我看出有问题的记录里存在诸多无效的反馈。比如，\"Java SpringBoot框架技能需要提升\"。\n\n他的两次Interview++都是他Buddy找人代理的，因为他的Buddy是中国区另一个Office某大项目上的Tech Lead，平时沟通交流的机会很少，这无形中埋下了一个雷。我们知道Buddy有责任去帮助新人度过试用期，怎么帮？一方面关注新人的成长，给新人有效Feedback去帮助Ta成长，另一方面要帮助新人收集反馈并过滤无效的反馈，帮助新人制定改进措施。\n\n如果Buddy能做好这两件事，新人的试用期会有如神助。但是很遗憾，就我最近两年在项目上的观察，项目上不少Buddy并没有履行好这两个职责。试想如果Buddy都做不好会怎么样？于新人，可能会类似我的这个朋友，被意外的劝退。于组织，新人转正后没法给后续加入的新人带来正向引导，久而久之造成文化稀释，优秀的人逐渐离开，ThoughtWorks沦为平庸，我想这是所有ThoughtWorkers都不愿意看到的。\n\n\n---\n\n## 优质Feedback不可或缺的三个属性\n\n了解了Feedback的背后的意义和使命后，接下来，我将从Feedback提供者的视角出发，来聊一聊优质的Feedback所需要具备的三个基本属性。\n\n### 有心\n\u003e 想知道一个人真诚与否，聊上三分钟便知晓。\n\n有心，通俗讲是走心。比如，你在赞美一个人的时候，真心与否很容易被感知到。为了不让对方感觉空和虚，你需要借助一些实际的案例来作支撑，而要掌握这些数据，就需要你平时用心去留意和观察，在配合恰当的表达方式能够更好地传达。\n\n当你作为项目的Senior成员（Team Lead，Tech Lead，Second Tier），你本身已经具备了发展他人的意识，促使你有较强主动性去关注团队成长，这种情况你自然而然会花一些精力和心思去观察每个人，并在需要的时候选择合适的时机提出反馈。\n\n当然也有可能因为项目交付压力过大让你忽略了这件事情，这就犹如你欠了一笔债，拖得越久利息就越高，到最后可能会不堪重负。必要的时候确实需要你前期花更多的精力，而且极有可能会牺牲你部分的业余时间，为了削减后期偿还的债务，前期的投入一定会带来回报（也要考虑自身的可持续发展，极端情况不做讨论）。\n\n另一种情况不那么主动了，比如到了某个Review的节点，有人来向你索要反馈，如果你平时跟Ta合作过程中没有留心和观察过，你很可能就给不出反馈或给出不痛不痒的反馈，两者都可能会错失帮助他人成长的机会，另外会让Ta对你的专业度（发展他人）产生一定的质疑。\n\n用心是做事的前提，当你对某个人或某件事走心了，你的主动性会被指数级提升起来（想想你恋爱那会儿）。你一旦用心去观察Ta了，你会收集到更多的有价值的信息，这会让你在提供Feedback的时候更加有料，味道也更真实和浓厚。\n\n\n### 有料\n在给别人提Feedback时候，大多时候你是在`表达认可`或`提出建议`，针对这两种情况存在着两个极端结果是`溜须拍马`或`人身攻击`。而我们中国人常常提到说话要讲究方式，为人处世秉承中庸之道，而中庸却是一把很难把握的尺子，如何在提Feedback的时候用好这把尺子呢？\n\n方法其实很简单 -- `有事说事，少聊态度，不谈信仰`。事，是你提Feedback的最核心的料，既然是料，就得是真实存在的。怎么去抓住事实，准确的表述事实，我举两个例子：\n\n1. 比如某同事这个月业绩超额完成了，达到了130%。130%的超额业绩就是铁板钉钉的事实。\n2. 再比如说某同事这周站会迟到了3次，一周迟到了3次就是一个真实的事实。\n\n针对上述两个现象给当事人提反馈，可能是这样子的：\n\n1. 你这个月业绩超额完成，众压群雄，简直是犹如超人（略显夸张，关系好是一种幽默，关系一般可能就是奉承）。\n2. 你怎么回事呀，这周怎么总是迟到！怎么着，对工作不满吗？（已经升级到态度的否定了，让对方难以接受）\n\n对于赞美的反馈，会更容易处理一些，毕竟是在赞美，只要不那么过分，对方总是比较乐意接受的。对于改进和建议的反馈，如果一旦让别人觉得你在怀疑他的态度，就很容易让对方树立起防御的心态，对接下来的沟通非常不利，从而也无法让你更好的提出有价值的反馈。\n\n要让沟通顺利的进行，核心点是不能缺少实料，你只是中立地表达一个事实，对方自然不会抵御你。对于态度，尽量尝试用事实来翻译。而提到信仰，其实就到了价值观层面了，我经常说，不要跟价值观不同的人去讨论人生，如果Ta对组织中大家正在做的事情不认同，你再多反馈也是徒劳，何不劝Ta另谋他途。\n\n但很多时候，人容易受情绪控制，试想你的团队信息同步不够，此时有人频繁站会迟到，你难免会受情绪影响，会产生类似上述的反馈表达方式。这时候你需要借助一些表达技巧来消灭情绪的诅咒，让你的反馈在一开始能有效地传达出去。\n\n\n### 有效\n反馈的有效性体现在三个阶段：\n\n1. 首先，你的反馈要能够及时有效地传达给当事人并被接受\n2. 然后，你要提供有效的改进措施\n3. 最后，对方执行了相应的措施并取了的改进\n\n好的开始是成功的一半。在前期多你需要用心观察，收集事实，让你的反馈具备实料，有了这些再紧扣反馈的目的 -- *让对方认识到已经发生事实的待改进的地方，并提供改进的建议*。配合一定的讲话方式（说白了就是要稍微绕绕弯子）来进行开场，比如经典的三段式：\n\n```\n我看到 这周你迟到了3次 (事实)\n我觉得 你最近遇到了什么困难吗 (我的判断)\n你真实 情况是什么样子的呢？（求证）\n```\n\n颇具`同理心`的开场消除了对方的抵御心里，构建起了信任，让你有机会了解到事实背后的真实原因，进而能够定义清楚问题。识别出问题后，再进入讨论解决方案的阶段，接下来就需要你提供一些有效的措施了。\n\n什么是有效的措施？大部分反馈死在这里了，比如`你的英语需要提升`，`你的Java Web技能需要提升`等等，这些反馈初心是好的，但很多时候对当事人的帮助会大打折扣（尤其是初入职场的新人），这时候你就需要思考如何给出建设性的建议了，比如：\n\n1. 前段时间我在某一对一的口语课中学习了两个月，每天按照那个练习半小时，我现在英语口语提升了两个等级，你也可以尝试一下\n2. 最近我想组织一个Java Web的Workshop，里面有些模块想邀请你一起来，这是一个操练Java Web技能的好机会，我找到一个很好的在线资料可以参考。\n\n这个过程也需要倾听对方的想法，一起讨论出改进措施，达成一致后，就是接下来的执行阶段，落地非常关键，一旦缺失，前期付出的努力都是白费。后期的落地可以视情况而定，如果是你的Buddy，你需要更密切的关注，其他情况，你可以通过观察Ta后期的变化来进一步给出反馈。\n\n\n---\n\n## Feedback工具箱\n有心、有料、有效是应当环环相扣，相互渗透，只有当你有心了，才会去收集真实信息，拿得出有料的反馈，接下来你需要通过一定技巧进行有效地传达，并促成改进措施有效地落地执行，这三者有机结合在一起，方可促成一次高质量的Feedback活动。\n\nFeedback活动其实是一次高效沟通的过程，作为提供方，你可以在构建良好的沟通氛围方面多做一些工作，比如：\n\n1. 征得同意后构建安全环境，比如一对一空间，放松的咖啡馆\n2. 说话是稍微绕绕弯子，比如上文中的三段式\n3. 表达感谢，后续保持关注\n\n作为接受方，你也可以做一些事情，比如：\n\n1. 保持开放的心态，毕竟人家是来帮助你成长的\n2. 对方在求证的时候，你需要勇敢地澄清理解\n3. 表达感谢，采取实际行动\n\n\n---\n\n## 写在最后\n作为一个Feedback提供者，你做到了有心、有料、有效，反过来，切换成Feedback接受者，你自然能够过滤反馈了，当对方给你的反馈无效时，你还能进一步提供反馈，形成一个正向促进环。\n\n广义的反馈涵盖了方方面面，在自然界，乌云密布预示着暴风骤雨即将来临，需要做好提前预防。腰部酸痛预示着腰肌劳损，得起来运动了。在敏捷软件开发领域，反馈作为核心价值观之一，它是我们保持高效协作的秘籍，比如CI红了是对代码库集成后健康状态的反馈，设计原型是对用户满意度的一种反馈，等等。\n\nThoughtWorks是一家搞敏捷的组织，敏捷的精髓是快速反馈，良好的反馈机制是组织运转的核心。作为组织中的一分子，你、我都有有义务和责任让最基本的反馈在组织中顺畅地运转，杜绝捕风捉影的谣传。\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n"])</script><script>self.__next_f.push([1,"3b:T30ad,"])</script><script>self.__next_f.push([1,"\n\n\n## 思沃内训团队的定位\n我小时候经常听到一句这样的广告：*学挖掘机找蓝翔* 。可能在ThoughtWorks内部，有一句潜台词叫：*搞培训找思沃学院*。在开始之前，我想先聊一聊这句潜台词背后的意义。\n\n我跟一些同事聊起思沃学院（曾用名，已更名为思沃内训）的时候，一些人对内训团队的认知是这这样子的：\"*我们团队成员的架构能力不足，没法落地微服务，你们来给我们上一个DDD的课吧...*\" 诚然，这种模式在培训市场是普遍存在的，组织斥巨资邀请大牌培训师，上个几天的课，培训师拿钱走人，然后呢，可能就没有然后了。\n\n团队之所以需要一个培训，无非是因为面临自身无法有效解决的问题，亦或识别出潜在的风险（以花钱为目的另当别论）。问题通常源于`流程`和`人`两方面，流程的问题最终也能归结到人身上，人的问题又很容易被定义为能力的问题，这么一来团队便寄希望借助外部力量来提升团队的能力。这种想法没毛病，毛病在于培训往往无法有效解决能力问题，除非培训能够回答以下两个问题：\n\n1. **如何让学员的认知发生实质性的转变？**\n2. **如何让学员将知识有效地转化成技能？**\n\n实践证明，单纯的培训很难给出答案，从而滋生了*培训无用论*。思沃内训团队致力于化解*培训无用论* 的魔咒。跟其他外部培训机构相比，内训团队得天独厚的优势在于根植于ThoughtWorks，深刻了解我们的文化和使命，我们要做的是超越培训，助力团队和组织有效地解决能力建设的问题。***搞能力建设找思沃内训*** 是内训团队努力打造的品牌。\n\n---\n\n## 能力建设的团队自治观\n思沃内训团队经过长时间的打磨沉淀，积累了多门精品课，在培训授课环节称得上得心应手。但前期实践下来，我们也面临着跟外部培训相似的困惑：*培训之后无法确保团队发生实质性的提升。* 要改变现状，我们必须要比培训做的多一点。站在更高的视角去看团队对培训的诉求，不难发现团队是希望通过有效的能力提升去解决实际问题，这便升级为一个复杂的能力建设问题。\n\n关于能力建设，最理想的情况是团队内部自发组织，一来内部有更好的On-Boarding土壤，二来更符合自组织的敏捷团队特征，在ThoughtWorks不乏这种学习小组。然而，随着公司业务的扩张，新老同事快速更替，团队内的能力建设遇到了瓶颈，内训团队便承担起特殊的外部教练角色。\n\n教练本身不会直接着手解决团队面临的问题，教练的主要职责是帮助团队自己解决问题，最终还是要依靠团队自身发力，*取之于团队、用之于团队*。知易行难，做好这一点呢？带着这些思考，我们落地了一场**超越培训的训战**。\n\n---\n\n## 超越培训的训战模式\n训战模式的核心思想是*培训* + *实战*，该模式需要统筹规划培训前、中、后三个阶段，做到***训前瞄准、训中调整、训后复审***，将单纯的培训变成一个有效的能力建设活动，实现价值闭环。\n\n与传统培训方式不一样的是，我们在训前做得更加充分精确，为训中留有足够的时间和空间，实现课程快速迭代，最后结合至关重要的训后复审，通过行动来内化知识。该模式的核心指导原则是：***跟团队保持紧密连接***。基于这些创新的做法，辅以4个关键步骤来完成训战：\n\n![image](/images/swd/agile/coaching/4d-cycle.webp)\n\n在培训前，深入团队，分析团队现状，准确定义问题，量身定制解决方案。在培训交付过程中，深度激发团队成员的思考和讨论来颠覆或加强他们固有的认知。最后，重点部署训战计划来促进团队的知识转换。\n\n![image](/images/swd/agile/coaching/4d-cycle-phase.webp)\n\n\n### 定义问题 - 深入团队\n问卷或访谈的方式呈现出来的很可能是冰山上半部分的景观。为了探索下半部分，我在前期深入团队内部获取团队日常工作状态、技术栈选型以及人员的相关情况，并出了一个初步的分析报告：\n\n![image](/images/swd/agile/coaching/swot-result.webp)\n\n基于分析报告，跟TL达成初步方案是上五抓手（`OO`、`TDD`、`Refactoring`、`Clean Code`、`Simple Design`）。虽然有五抓手这把枪，也不能乱开火，得弄清楚团队对这些实践的实际的落地情况。通过Code Review以及代码扫查，我果然收到了惊喜 -- 代码库测试覆盖率高达90%，代码分层、模块化都不错（似乎已经做的很好了）。\n\n代码库的良好状态离不开团队的对Clean Code的重视，再加上团队刚刚对原本代码量不多的代码库做了较大规模的重构。即便状况良好，团队依然非常渴望掌握工程技术实践的最佳姿势，尤其是TDD。\n\n基于这些调研分析，我对问题域重新划重点：\n\n1. 团队成员Second Tier入职时间偏短，相关敏捷技术实践掌握深度不够，担心影响后期交付质量。\n2. 技术实践在后期Ramp-up保持最佳姿势一致性有难度，存在辜负客户期望、降低客户信任度、难以保持标杆形象的风险。\n\n\n### 设计方案 - 量身定制\n不难看出此次能力建设活动属于风险预防性质的。虽然没有太大的痛点，貌似锦上添花，但团队此时暴露了一个关键的信号 -- ***团队已经在尝试的过程中产生困惑，渴望得到解答，并通过实践掌握最佳姿势***。该信号给了我一个方向：大量的实践机会和充分的思维碰撞将最大化训战的效果。基于此，我搬出了承载了五抓手的法宝OO Bootcamp，并一分为8，每周3次，每次晚上2~3小时，形成了`非常6+1`的两周拉锯战模式。\n\n依赖于口口相传的OO Bootcamp在课件标准化上沉淀颇少，这也给了我充分的空间让我去设计训战方案，对于训的设计，我重点兼顾了两点：\n\n1. 定制化调整。针对团队的真实情况做适当的定制化，并做好在交付的过程响应变化的准备。\n2. 螺旋化共创。在课程中能够不断激发思考，试图让大家经历困惑、解惑、疑惑、再解惑的螺旋化过程。做到*学员共创 Over 讲师讲解。*\n\n\n### 交付培训 - 认知转变\n本环节的核心目标是：***通过持续迭代的适应性调整，辅以螺旋化共创过程，来诱发认知转变。*** 要引发螺旋式的认知转变，最重要的一点是：*放慢步伐，以学员讨论、答疑解惑为核心宗旨*。因为参与这次训战的成员特殊性（TL \u0026 Second Tier），讨论的焦点主要被我引导向*价值层面（Why）*，通过*操作层面（How）*的冲突来激发讨论，并在`How`与`Why`之间螺旋交替冲击，最终回归到`Why`上，讨论重点围绕团队日常工作中面临的问题。\n\n有意思是，当大家对价值层面理解达成一致后，在操作层面的最佳实践往往都是无果而终（By Experience），我们对最佳实践虽然未曾有明确的定义，经过这样频繁的思维碰撞，团队往往能找到一些方向。比如TDD，做Story的时候，第一步是从业务视角去做Tasking，将Tasking可视化作为一个DoD[1]，严格根据Task来编写测试用例，做到测试先行，并通过Pair来刻意练习。\n\n铺设好明线，我同时在辅线上做了一些必要的工作 -- *跟团队做深入交流，了解他们当前面临的痛点，重新设计了案例，尝试抛出一些引子，引发团队成员共同思考。比如如何在后端MVC架构下做TDD。*\n\n\n### 部署计划 - 技能转换\n我认为一场好的训战应该由`体验`、`反思`、`抽象`、`行动`四个部分组成，相辅相成，并且能够形成一个闭环。在培训过程中，需求驱动、编码实践就是一种体验，在体验的过程中引发思考和讨论，最理想的情况下是学员自己能够从思考和讨论中抽象总结出结论，然后将结论付诸行动得以验证。\n\n在文章一开始我就提到，能力建设最终要靠团队自身发力，主动权必须交还给团队，否则一旦教练离场，打回原形的风险很大。通过培训颠覆认知只完成了一半的工作，另一半的工作是将这些新的认知在实践中去验证。要打好下半场，就需要搬出核心法宝 -- `训战计划`。\n\n训战计划类似于一个计划，它具备三个重要特征：\n\n1. 符合SMART[2]原则，难度适中\n2. 跟项目工作内容息息相关\n3. 学员自己拟定并认可签字\n\n\n作为教练，我协助团队成员去制定有效的训战计划。有了训战计划，就一定能够兑现吗？最理想情况下，团队成员的能够足够自我管理，并落实好计划。必要的时候，借助一些轻量的管理机制和有效的激励机制，比如，组建分队，队长责任制，并公开承诺，另外对计划完成后进行奖励等。\n\n作为特殊的外部教练，我需要持续重点做的事情有：\n\n1. 培养团队内部教练，保证后期可持续发展。\n2. 训战计划执行期间，响应团队的诉求，帮助团队解决执行过程面临的阻碍。\n3. 定期回访，跟踪训战计划的落实情况，了解团队的困难，并记录团队的变化。\n\n---\n\n## 训战的核心要素\n训战的复杂度远超越了培训，既要大处着眼，用全局的视角统筹训和战，也要小处着手，紧抓各个环节，尤其是训战计划的落地跟踪。一场优秀的训战，除了方案设计、课程内容和呈现形式上的创新，还需要借助团队管理和激励的手段。综合来看，决定训战成功与否的几大核心要素有：\n\n1. 一致的期望\n2. 专业的培训\n3. 承诺的计划\n4. 严格的跟踪\n\n### 一致的期望\n在训前方案设计阶段，一项至关重要的举措是吹响战斗的号角。跟Stakeholder和团队成员对训战模式的期望达成一致 -- 不仅仅是一场讲完就散的培训课程。对于学员，要做出源于追求卓越的自我Commitment。对于Stakeholder，后期需要持续投入资源来促成训战计划落地，比如识别潜在内部教练，提供道场支援等。\n\n\n### 专业的培训\n授课讲师需要对领域知识具备一定的深度，深刻理解正、反模式的利弊，拥有丰富的实战经验。同时对于培训引导能力也提出了较高的要求，提倡推行以学员为中心的共创式教学。另外，还需要具备对实时反馈的响应力，能够快速调整优化设计。\n\n\n### 承诺的计划\n学员基于培训的内容，并结合实际项目中遇到的问题，亲自挂帅拟定恰当可行的训战计划，并立下`\"军令状\"`，最终做出公开承诺已告示`\"天下\"`，若能借助管理激励机制形成彼此轻量的竞争态势会取得不一样的效果。\n\n### 严格的跟踪\n训战的效果取决于训战计划是否合理且能否有效执行落地，后期严格的跟踪显得尤为关键。首先，在团队内部培养教练，来帮助成员解决执行过程中遇到的问题，同时敦促他人的计划向前推进。其次，在流程管理和奖惩机制上，Stakeholder的关注、牵动人心的激励以及恰当的惩罚技巧都是影响跟踪效果的因素。至于如何操作，团队因地制宜即可，推荐正向激励。\n\n---\n\n## 写在最后\n*训前瞄准、训中调整、训后复审* 这种基于Account的训战模式，通过4个看似很平凡的关键步骤，最终围绕训战计划来促进行动学习，帮助团队将知识转换成技能，有效地实现价值闭环。\n\n在ThoughtWorks，存在一支这样的专业内训队伍，他们的理念是：***训战是为了颠覆认知，将知识转化为技能，从而解决实际问题，而不只是Know Unknown***。\n\n在ThoughtWorks，需要更多类似的本次活动的团队，他们积极参与、积极思考、积极实践、积极分享，在追求卓越的道路上永不止步。规模化道路上的技术卓越，离不开每一位ThoughtWorker的努力，愿以此与君共勉！\n\n---\n\n\n## 注释\n1. DoD, Definition of Done\n2. SMART\n\t- Specific\n\t- Measurable\n\t- Attainable\n\t- Relevant\n\t- Time-bound\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n"])</script><script>self.__next_f.push([1,"3c:T1596,"])</script><script>self.__next_f.push([1,"\n\n\n---\n\n面向对象编程范式得到了广大开发者的青睐，在做面向对象软件设计的同仁也或多或少曾经心存困惑过。比如，*怎么样才是正确的封装？如何恰当的继承？何时应该抽象？* 对于设计，我们很难说对与错，通常只有好与不好的区分，而所谓的最佳实践也只是 -- *在当前约束下，人们所能找到的最佳解决方案。*\n\n最近我在给ThoughtWorks内部某海外交付团队的核心成员（Tech Lead \u0026 Second Tier）做OO Bootcamp的培训，在分享讨论和编码实践的过程中加强了对面向对象设计的理解，本文我来聊一聊面向对象中关于继承设计的`IS-A`的这个工具。\n\n---\n\n## IS-A是把好尺子\n在做面向对象设计的时候，我们心中始终会装着三大武器：`封装`、`继承`、`多态`，设计出的软件也得有它们的身影。然而，很多时候并不是没有它们，而是它们的影子太多了（滥用或误用）。就拿继承来说，我们会经常使用`IS-A`来审视两个类的继承关系。比如以下场景：\n\n1. A Parrot IS A Bird（鹦鹉是一只鸟）\n2. A Man IS A Person（男人是一个人）\n3. A Square IS A Rectangle（正方形是一个矩形）\n\n以上关系，单纯从自然属性来思考都好像是正确的，所以我们在设计继承关系的时候通常会很容易类似写出以下代码：\n\n```java\nclass Man extends Person{ }\n\nclass Person {\n    private int age;\n    private double height;\n\n    public void walk(){ }\n}\n\nclass Square extends Rectangle{ }\n\nclass Rectangle{ }\n```\n\n因为`IS-A`这把尺子的辅助，我们很容易地采用了继承，继承之后，子类什么也不用做就拥有了父类的特征和行为能力。看起来很好，它如期达到我们复用的期望。\n\n---\n\n## IS-A的失效区\n拿`Square IS A Rectangle`来说，我们都知道正方形是一个矩形，这话没毛病。然而，当我们按照真实业务要求完善`Rectangle`之后可能是这样子的：\n\n```java\npublic class Rectangle {\n    protected double width;\n    protected double height;\n    public void setWidth(double width) { this.width = width; }\n    public void setHeight(double height) { this.height = height; }\n    public double calculateArea() { return width * height; }\n}\n\npublic class Square extends Rectangle {\n    @Override\n    public void setHeight(double height) {\n        this.height = height;\n        this.width = height;\n    }\n    @Override\n    public void setWidth(double width) {\n        this.height = width;\n        this.width = width;\n    }\n}\n```\n此时我们有一个客户类这样使用Rectangle：\n\n\n```java\npublic class SizeChanger {\n    private double newWidth;\n    private double newHeight;\n\n    public SizeChanger(double newWidth, double newHeight) {\n        this.newWidth = newWidth;\n        this.newHeight = newHeight;\n    }\n\n    public double resize(Rectangle rectangle) {\n        rectangle.setWidth(newWidth);\n        rectangle.setHeight(newHeight);\n        return rectangle.calculateArea();\n    }\n}\n```\n`resize`方法接受一个`Rectangle`对象参数，而`Square`作为子类，也可以被传入到这个方法中，比如我们测试客户类：\n\n```java\nclass SizeChangerTest {\n    @Test\n    void should_calculate_correct_area_after_resize() {\n        SizeChanger sizeChanger = new SizeChanger(5, 10);\n        Rectangle rectangle = new Rectangle();\n        rectangle.setWidth(4);\n        rectangle.setHeight(5);\n\n        assertThat(sizeChanger.resize(rectangle)).isEqualTo(50);\n    }\n}\n```\n我们期望`resize`的返回值是50，没毛病。但我们如果把`Rectangle`子类对象传给`resize`方法就会挂掉：\n\n```java\nclass SizeChangerTest {\n    @Test\n    void should_calculate_correct_area_after_resize() {\n        SizeChanger sizeChanger = new SizeChanger(5, 10);\n        Rectangle rectangle = new Square();\n        rectangle.setWidth(4);\n        rectangle.setHeight(5);\n\n        assertThat(sizeChanger.resize(rectangle)).isEqualTo(50); // 100 not 50\n    }\n}\n```\n\n作为客户程序就会产生疑惑了：\"我调用`resize`方法的表现时而不一样，这让我很焦虑，没法信任你的程序，既然`A Square IS A Rectangle`，给`resize`传入`Square`和`Rectangle`的结果应该是跟期望一致的。\" 所以从`resize`的角度来看，`A Square IS NOT A Rectangle`。而导致这一现象的原因是`Square`和`Rectangle`的行为方式发生了改变，它们的`setWidth`和`setHeight`行为不一样。\n\n`行为`是面向对象设计的关键所在，我们通过封装将对象属性隐藏，以API的方式来服务于客户程序，这些公开的API就是一系列行为，这些行为正是客户程序想使用的（客户程序依赖这些行为），它们也构成了我们软件的功能。\n\n所有，不难理解`LSP（里氏替换原则）`强调`IS-A`的关系是针对行为方式来讲的，这也是面向对象软件设计中与真实世界的对象关系的微妙差别，当子类与父类针对某个具体的行为发生改变时，这个继承就违背了`LSP`。\n\n---\n\n## 拯救IS-A的铁弹\n**`IS-A`是基于行为方式的，也就是说，当你的子类改变了父类的某个具体行为时，`IS-A`就需要重新审视了。**\n\n如何重新审视？你需要进一步进行抽象，进一步提取抽象概念，此时需要念出`面向抽象编程`的六字真经了，抽出`多态`这把匕首，并移步*[让里氏替换原则为你效力](https://sjyuan.club/make-lsp-working-for-you/)。*\n"])</script><script>self.__next_f.push([1,"3d:T2cfa,"])</script><script>self.__next_f.push([1,"\n\n\n---\n\n## 面向对象的基石\n从事软件开发的朋友或多或少都听过以下一些原则：比如KiSS、DRY、LKP、COC、DbC、SoC、HP、SOLID等。这些原则已经在业界被证实了自身的价值，尤其当谈到面向对象设计的时候，SOLID则是一个避不开的主题。\n\n作为面向对象的基本原则，SOLID本身就是一个明显的招牌 - 坚固的磐石，撑起了面向对象设计大厦。\n\nSOLID由五大原则构成：\n\n1. **S**ingle Responsibility Principle【单一职责原则】\n2. **O**pen Close Principle【开闭原则】\n3. **L**iskov Substitution Principle【里氏替换原则】\n4. **I**nterface Segregation Principle【接口隔离原则】\n5. **D**ependency Inversion Principle【依赖倒置原则】\n\n对于大部分OO程序员，这五大原则的名字可能已经耳熟能详，却总不能很清晰的描述出SOLID是如何为我们服务，因为SOLID从来也没有告诉我们How，它只在说：\"这就是你最终要达到的目的地\"。\n\n本文我将带着我的思考来捋一下LSP，LSP可能是一个很容易被破坏的原则，理解了它将能够很好地驱动我们去思考如何正确地做抽象设计。\n\n---\n\n## 打破里氏替换原则\n\u003e In a computer program, if S is a subtype of T, then objects of type T may be replaced with objects of type S without altering any of the desirable properties of the program (correctness, task performed, etc.) --  Barbara Liskov in 1987\n\n简单描述LSP：***一个子类实例对象替换掉其父类实例对象，不会引发程序的任何变化。***\n\n如果要保证这点，我们在设计类的继承关系的时候，子类不应重写父类的方法，这样保证了父类的行为没有被修改。来看个代码示例，一个`Square`类继承自`Rectangle`类，我们计算它们的面积：\n\n```java\n\nclass RectangleTest {\n    @Test\n    void should_return_area_when_calculate_given_width_and_height_valid() {\n        Rectangle rectangle = new Rectangle();\n        rectangle.setHeight(3);\n        rectangle.setWidth(5);\n\n        assertThat(rectangle.calculateArea()).isEqualTo(15);\n    }\n    @Test\n    void should_return_area_when_calculate_given_width_and_height_valid() {\n        Rectangle rectangle = new Square();\n        rectangle.setHeight(3);\n        rectangle.setWidth(5);\n\n        assertThat(rectangle.calculateArea()).isEqualTo(25);\n    }\n}\n```\n\n前者返回的是`15`，而后者返回的是`25`。这两者的差别在于我们使用了`Square`替换掉`Rectangle`，从而导致了程序的行为发生了改变。\n\n看看`Rectangle`和`Square`的实现，不难发现子类`Square`重写了`setHeight`和`setWidth`方法，修改了父类行为，导致了替换失败。\n\n```java\npublic class Rectangle {\n    protected double width;\n    protected double height;\n    public void setWidth(double width) { this.width = width; }\n    public void setHeight(double height) { this.height = height; }\n    public double calculateArea() { return width * height; }\n}\n\npublic class Square extends Rectangle {\n    @Override\n    public void setHeight(double height) {\n        this.height = height;\n        this.width = height;\n    }\n    @Override\n    public void setWidth(double width) {\n        this.height = width;\n        this.width = width;\n    }\n}\n```\n\n所以按照LSP的观点，这个继承关系被扣上`不良`的帽子，注意这里我用了`不良`，而非`错误`。因为我知道你可能会怼我：\"*我设计这个子类我就想基于父类做一个扩展，不同的子类有不同的实现，没让你在使用的时候去替换父类呀!* \" （我敢打赌你在项目中遇到过这种覆写父类的实现，并且软件还能正常Work）。在我怼回去之前，请先跟我来回顾一下面向对象特性。\n\n---\n\n## 从复用来看继承\n从一踏入职场那一刻，我就在面试中多次被问过：请谈谈你对面向对象的三大特性的理解？\n\n简单捋一下面向对象的三大特性：\n\n- 封装：隐藏对象的属性和实现细节，仅对外公开接口。比如`Rectangle`类，首先对自身属性`width`和`height`进行了隐藏，通过`calculateArea`方法提供服务，将依赖自身数据的计算细节也进行了隐藏\n- 继承：允许子类在不需要重新编写父类的前提下，复用父类的所有功能，并能够按需进行扩展。比如`Square`继承了`Rectangle`，就具有了`calculateArea`的功能。（当心：这个继承不合理）\n- 多态：允许对象在运行期表现出不同的形体\n\n\n恰巧LSP中提到了子类和父类的概念，所以不得不说说`继承`。在这之前，我假设：*在做面向对象软件设计的你认同面向对象设计的价值 -- 提升软件的对变化的响应力*。\n\n继承的最核心的目的之一是为了复用，很多时候我们为了复用采用了继承。如果我们设计继承单纯为了复用，你可能会问为啥不用组合？而且很多时候提倡`组合优于继承`。这就需要我们思考面向对象的设计初衷：面向对象建立在对真实世界的抽象前提上，它很大程度上反映了我们的真实世界。比如一只鹦鹉是一只鸟，鸟能飞，鹦鹉也能飞，所以让鹦鹉继承自鸟，鹦鹉具备了飞的能力。\n\n```java\npublic class Bird {\n    public void fly() {\n        System.out.println(\"I am flying\");\n    }\n}\n\npublic class Parrot extends Bird {}\n```\n\n如何决定继承关系，你可以用`Is-A`来进行初步验证，比如`A parrot is a bird`。当你使用`Is-A`读起来就能让自己发笑得的时候，就说明这个继承就明显不合理了。比如，你有一架飞机，它也能飞，为了复用你让飞机继承鸟 -- `A Plane is a Bird`。当关系不是那么明显的时候怎么办？比如，`A Square is a Rectangle`，下文我将给出答案。\n\n\n所以，继承首先它应该体现一种现实世界的真实规则`Is-A`，复用是它提供的一个核心能力，也是我们期望在设计上能获得的好处，*而要达到复用，就要遵守一个规则：子类不去更改父类已有的行为，否则就与复用不沾边了*（复用，代表你啥也不用做，直接具备的行为，如果你重新实现了，那叫新的实现，你付出了新的努力。至于你要添加新的行为，这属于扩展，按需就好）。\n\n我想你已经能够运用`Is-A`来避免很多明显恰当的继承关系。而当你面临模棱两可的继承场景时，从复用的视角出发，LSP提供了很好的校验规则。\n\n\n---\n\n## 抽象有助于恰当的复用\n回到文章一开始的例子，使用`Is-A`来解读：`A Square is a Rectangle`，好像还凑合，但有点把握不准。\n\n让`Square`继承自`Rectangle`，`Square`能够复用`Rectangle`中的所有行为，假如你不对`Square`做任何事情就能完美复用，但这样子出来的正方形可能宽和高就不一样了（无法满足客户真实需求，这可都是无用功哟）。为了满足客户需求，你就不得不对`setWidth`和`setHeight`进行重写：\n\n```java\npublic class Square extends Rectangle {\n    @Override\n    public void setHeight(double height) {\n        this.height = height;\n        this.width = height;\n    }\n    @Override\n    public void setWidth(double width) {\n        this.height = width;\n        this.width = width;\n    }\n}\n```\n\n一旦重写，当你将下面代码的`Rectangle`替换成`Square`时候就挂了：\n\n```java\n@Test\nvoid should_return_area_when_calculate_given_width_and_height_valid() {\n    // Replace with Square\n    Rectangle rectangle = new Rectangle();\n    rectangle.setHeight(3);\n    rectangle.setWidth(5);\n\n    // 25 if using Square\n    assertThat(rectangle.calculateArea()).isEqualTo(15);\n}\n```\n\n所以，Liskov就开始呐喊了：\"说好的`Square`只是复用`Rectangle`的呢，为啥把`Rectangle`的行为改了，程序挂了，你不守规矩，怎么回事！\"\n\n\n那规矩又是什么呢？此时你必须重写`setWidth`和`setHeight`，毕竟满足客户才是你首要目的。到这个时候，已经说明了该继承关系出了点问题。你需要做的是跳出来，重新审视一下你的设计：\n\n*`Square`和`Rectangle`都有宽和高，并且计算面积的方式一样，不同的是`setWidth`和`setHeight`。是否可以将共同的特征进一步抽象提炼。就这样逼着自己去思考，你可能很快就抽象出一个四边形，因为`setWidth`和`setHeight`行为不确定，先将它们抽象化，从而实现多态特征，并且让新的基类Quads恰当地被复用*\n\n\n你很快用Java代码实现：\n\n```java\npublic abstract class Quads {\n    protected int width;\n    protected int height;\n\n    public abstract void setWidth(int width);\n    public abstract void setHeight(int height);\n\n    public int calculateArea() { return width * height; }\n}\n```\n\n然后你让`Rectangle`和`Square`分别继承自`Quads`，各自在自己的类中实现`setWidth`和`setHeight`。这时候你使用`Rectangle`和`Square`的方式也改了：\n\n```java\nclass QuadsTest {\n    @Test\n    void should_return_area_when_calculate_given_width_and_height_valid() {\n        Quads quads = new Rectangle();\n        quads.setHeight(3);\n        quads.setWidth(5);\n\n        assertThat(quads.calculateArea()).isEqualTo(15);\n    }\n    @Test\n    void should_return_area_when_calculate_given_width_and_height_valid() {\n        Quads quads = new Square();\n        quads.setWidth(5);\n        assertThat(quads.calculateArea()).isEqualTo(25);\n    }\n}\n```\n\n通过进一步抽象，你改变了继承关系，`Rectangle is A Quads`，`Square is A Quads`，此时这种继承关系就更加清楚明显了，并且没有违背LSP（Quads是一个抽象类，不能实例化对象，所以不会出现子类实例对象替换父类实例对象的场景）。\n\n到这里，你已经成功通过了进一步抽象拯救了这个继承关系，而且新的继承关系更加合理，更加符合面向对象设计，也最大化发挥了继承的核心能力 -- ***复用***。\n\n很多时候我们遇到这种，可能是因为我们过于着急写代码或是疏忽大意，那些貌似像`Is-A`的关系也被我们用上了继承，这也促成了继承被滥用。而解决办法也很简单，LSP这个工具提供了很大的帮助，最终你会发现大多是由于恰当抽象的缺失。\n\n\n---\n\n\n## 总结\n如果用一句话来形容LSP，我觉得是：***当你无法根据`Is-A` 来判断继承关系是否合理时，你应该思考如何进行下一步抽象，从而避免让继承产生二义性***\n\n借用极限编程的理念来讲：*将我们认同的有效软件开发原理和实践应用到极限*。我们在做面向对象设计时，不妨拿起LSP这个现成的工具，帮助我们有效地减少继承的滥用、模糊意图等设计缺陷，提升软件设计。\n\n当然，很多不符合LSP的软件也能工作，这就像很多软件充斥着坏味道照样能工作一样（比如*代码注释*）。而它背后隐含的逻辑应该是：\n\n***我们应该积极去思考更好的设计，而不是过早放弃思考的机会***\n\n---\n\n## 注释\n- KiSS: Keep it simple, stupid\n- DRY: Don't Repeat Yourself\n- LKP: Least Knowledge Principle (LOD: Law of Demeter)\n- CoC: Convention over Configuration\n- DbC: Design by Contract\n- SoC: Segregation of Concerns\n- HP: Hollywood Principle\n\n---\n\n## 参考阅读\n- [写了这么多年代码，你真的了解SOLID吗？](https://insights.thoughtworks.cn/do-you-really-know-solid/)\n"])</script><script>self.__next_f.push([1,"3e:T2186,"])</script><script>self.__next_f.push([1,"\n\n\n---\n\n## Scrum犹如一场创业\n1993年，Jeff和Ken开创了Scrum，至今已经有25年之久。如今敏捷开发也不是什么流行词儿，不少IT组织已经走在敏捷转型的路上，还有一部分组织则刚痛下决心抛弃瀑布式计划型开发模型，试图采纳敏捷开发框架（比如Scrum）。但大部分组织即便拼得遍体鳞伤，仍然无法按期交付卓越的软件，最后要么放弃，要么就医 -- 引入专业敏捷咨询师，ThoughtWorks在这方面也已帮助业界诸多大型组织成功地敏捷转型。\n\n在瀑布模型的IT组织中，试点团队一旦决定采纳Scrum，就如同开启创业。对于创业，我们喜闻乐见的是：有人有想法、有抱负、有激情也有行动力去推动变革，做不一样的事情，此时，Ta或者Ta们会试图去寻找志同道合的人，寄希望于通过团队来提高成功的几率。\n\n就好比软件永远无法甩掉`业务不确定`的天然属性，Scrum团队自然也脱离不了创业团队的属性，而这些属性我认为最基础的两个元素是：`自省`和`志同`。\n\n---\n\n## 志同且自省\n如果将敏捷划分成三个层次 -- `道`、`法`、`术`，敏捷树的根部就是对应的道，它是敏捷的根本，比如敏捷宣言以及敏捷宣言中所体现的价值观。树的枝干对应了敏捷原则，树叶则是一些敏捷的框架、实践和工具。\n\n\n而敏捷的精髓在于敏捷树的根部，是敏捷提倡的那套`尊重`、`沟通`、`专注`、`承诺`、`勇气`、`反馈`、`开放`，价值观不像实践那么具体看得见摸得着，但它值得团队在实践中持续不断地通过自省的方式来打造高效团队，构建统一愿景和目标。\n\nJeff在他的*《敏捷革命》*中提到两个例子来突出团队的力量：\n\n1. 耶鲁大学的乔尔•斯波尔斯基研究一位教授的最难学课程，最后发现该课程得分为A的最快的学生和最慢的学生的时间比是1/10，\n2. 大量研究表明，同等质量完成一份工作，最快的团队用了1周，最慢的用了2000周。\n\n1986年，*《哈弗商业评论》*上一篇题为*《新产品开发新游戏》*的论文对Scrum起着启发性的影响，该论文描述了世界上最优秀的公司最卓越的团队具备以下三个特质：\n\n1. 超越寻常，即追求卓越\n2. 自主性，即自组织团队\n3. 多功能，即全功能团队\n\n任何尝试敏捷的团队都值得付出努力让自己具备上述三种特质，而要打造一个这样的团队，需要一群能够`自省`的人吵着同一个目标前进。\n\n---\n\n### `自省`是持续改进的基本保障\n在术的层面，我们不缺乏工具和知识框架，Scrum和XP就是很好的指导框架（《Scrum精髓》）。很多团队即便丰富的知识框架的指导下，依然效果不甚理想，总感觉心有余而力不足。仔细观察他们的日常\"敏捷实践\"，你会发现一起有趣的现象：规划会开成谈判会、站会开成汇报会、冲刺搞成斗牛场，回顾会开成吐槽大会。\n\n这里面很大的原因是团队把关注点放在术的层面，而忽略了这些术背后道和法，每当遇到阻碍时，团队需要停下步伐去思考和反省，跳出术的视野，不要着急去怀疑依样画葫芦却仍然失败的实践，更多去探索在实践过程中有没有违背核心价值观。比如，站会效果差，是不是团队不够包容，指责文化重，大家没有勇气去暴露问题。再比如，大家不愿意参加回顾会，是不是团队存在隐形政治，团队成员不敢发表自己的观点，互相不信任。而冲刺质量低，是不是大家不能好好专注于目标，或者团队目标不明确，等等，这些都是值得我们不断去思考和反思的，持续做出调整和改进，在团队建设上更是刻不容缓。\n\n\n---\n\n### `志同`是高效协作的核心动力\n传统瀑布计划型开发模型将软件开发周期分成了几个大的阶段，每个阶段由不同的职能团队负责，各自只对自己的环节负责，缺乏全局的视野和统一的目标，很难培养出共同的责任感和使命感，进而无法保障团队与团队之间信任的建立。\n\nScrum核心目标之一就是要克服团队协作的障碍，Scrum创始人借用这个橄榄球运动的专业术语，它的原本意思是：*团队通力合作，在场地内传球。这个过程需要团队认真配合、信念一致和目标明确*。所以一个成熟的Scrum团队，团队成员都应该保证目标一致且互相信任的。在这个基础上，成员各个身怀绝技，并且具备较强的责任感和自我管理的能力，在毫无自上而下发令的前提下，自下而上的自发协作完成工作，且积极主动承担更多的挑战。\n\n打造一支这样的团队并非容易的事情，需要让每个人都能够清楚团队的目标，并激励大家为这个目标去奋斗，在过程中不断地自省改进。*《Scrum精髓》*中描述了Scrum中优秀的开发团队的应该具备的十种特征：\n\n1. 规模规模适中\n2. 自组织\n3. 跨职能的多样化和全面化\n4. 团队成员稳定\n5. 专注、有责任感\n6. 火枪手态度：人人为我，我为人人\n7. T型技能\n8. 透明沟通\n9. 高带宽沟通\n10. 工作节奏可持续\n\n以上十种特征分别从团队组成（1，2，3，4）、团队成员（5，6，7）、团队文化（8，9，10）三个视角提供了很好的参考，你也可以在你的团队中，经常检视团队有没有具备这些特征以及如何能够培养这些特征。\n\n\n\n---\n\n## 敏捷真的很难吗？\n当人们婴儿学步的时候，遇到障碍物摔倒后，他可能不会立即爬起来就跑，而是会在摔跤地好奇的扫几眼（可能哭着看），然后才爬起来继续，而且还会时不时回头撇几眼摔跤点（不是为了记恨它）。\n\n当高中生在备战高考的时候，每周一小考，每月一大考，期中期末上巨考，这些考试都是在频繁地检查学生在该阶段的学习成果（暂且不讨论学习方法科学与否），每次学生应该根据考试成绩，做出针对性调整，而且不断地在重复这个循环。\n\n除了这些习以为常的事情，比如质量管理界著名的PDCA戴明环[1]，军事界的著名的博伊德OODA环[2]，无不在凸显很重要的两点：`检视`、`调整`，这两点加上`透明`构成了Scrum的三大支柱。\n\n就连大部分IT组织正在进行传统的瀑布开发模型，借用极限编程的思想理念[3]：我们可以把整个软件开发周期阶段引入到每个版本规划中，进而引入到每个冲刺规划中，最后引入到每个用户故事[4]中，也就被扣上了敏捷帽子。\n\n敏捷其实一直都在，不管你是在意还是不在意。而对于Scrum方法更简单 -- 无论你什么时候启动一个项目，为什么不经常检验一下自己在做的事情：\n\n1. 团队现在前进的方向对不对？\n2. 当前结果是不是大家真正希望看到的？\n3. 是否有什么办法能改善目前正在做的事情？\n4. 如何才能做的更快更好？\n5. 未来会存在哪些潜在的障碍和风险？\n\n对着你的团队不断地发问，缩短检视和调整的周期，敏捷终有一天会成为你碗中菜。\n\n\n---\n\n\n## 守术、破法、离道\n对应敏捷的`道`、`法`、`术`，`守`、`破`、`离`是一个好的前进方式。新团队，先守术，比如逐步在团队中引入Scrum框架中的实践，守的过程肯定会不断遇到问题，通过不断地自省，持续改进，沉淀团队的敏捷文化。应对守术过程中的问题游刃有余之后，再尝试去破法，根据团队自身情况尝试一些不一样的实践，找到跟团队更匹配的实践。当团队都深深理解敏捷价值观了，敏捷就犹如一个开源框架，团队可以随心所欲的做出取舍和创新，只要不违背敏捷价值观，它都可以是敏捷实践，这样你栽培的敏捷树将枝叶繁茂。\n\n\n---\n\n## 注释\n1. PDCA戴明环，Plan-Do-Check-Act，由美国质量管理专家休哈特博士首先提出的，由戴明采纳、宣传，获得普及，所以又称戴明环\n2. OODA循环，Observe-Orient-Decide-Act，是美国空军上校约翰•博伊德根据人脑决策过程建立的一种空战理论\n3. 极限编程理念：将我们认同的有效软件开发原理和实践应用到极限\n4. 用户故事极限编程的一项实践，它是在迭代中指导开发的业务需求单元载体\n"])</script><script>self.__next_f.push([1,"3f:T340d,"])</script><script>self.__next_f.push([1,"\n\n\n---\n\n## 敏捷宣言概览\n犹他州（Utah）的雪鸟城（Snowbird）是一个不太可能发生软件革命的地方，它位于盐湖城外约25英里的地方，一点都不像硅谷：既不以阳光和温和的气候闻名，也不是什么科技创新中心，更没有那么多充满热情的企业家。但就在这里，一个滑雪胜地，一群具有反叛性的软件开发人员于2001年2月聚集在一起，经历了为期三天的讨论，他们制定并签署了行业历史上最重要的文件之一：敏捷宣言。\n\n英文版：\n\n```\nWe are uncovering better ways of developing software by doing it and help others do it. Through this work we come to value:\n\nIndividuals and interactions over processes and tools\nWorking software over comprehensive documents\nCustomer collaboration over contract negotiation\nResponding to changes over following a plan\n\nThat is, there is value in the item on the right, we value the items on the left more.\n```\n\n中文版：\n\n```\n我们一直在实践中探寻更好的软件开发方法，身体力行的同时也帮助他人。由此，我们建立了如下价值观：\n\n个体与交互 优于 流程与工具\n可工作的软件 优于 面面俱到的文档\n客户协作 优于 合同谈判\n响应变化 优于 遵循计划\n\n也就是说，尽管右项有其价值，我们更重视左项的价值\n```\n\n\u003e 以上内容出自敏捷宣言：[http://agilemanifesto.org/](http://agilemanifesto.org/)\n\n\n我身边不少同仁对敏捷宣言中间的四句较为熟悉，往往最容易忽略了前后两句，久而久之，使得一些后来者曲了解敏捷宣言的精髓。而我恰恰觉得敏捷宣言的首、尾很重要。\n\n第一句告诉我们敏捷方法论并不是凭空而谈，它源自于截止目前的实践积累，但它有可能没法直接解决你现在所面临的问题，所以不必将其神话论，盲目跟随。你要做的是，明晰敏捷的核心，挖掘和定义清楚问题，循序渐进地在组织中引入敏捷，并且在实践中不断去探索更好的方法。\n\n`也就是说，尽管右项有其价值，我们更重视左项的价值` 这一句起到画龙点睛，敏捷方法论源于实践，它应回归实践，帮助我们解决实际问题，而不是一个框住我们思维的框架，沦为思想牢笼。所以在实践中，我们应该以开放的心态去接受右项的价值，并在探索中借用左项来帮助团队提升效率。而不是一味着否定一边而神话另一边。我们应该时刻警惕这一点。\n\n---\n\n## 敏捷宣言解读\n\n### 以人为本\n\u003e 我相信没有比面对面交流更高效的沟通渠道了\n\n一个人在团中的战斗力巅峰状态一定是在受到足够的尊重和信任的前提下产生的，尊重和信任激发个人内心的责任感和使命感，激发了个体的潜能。从团队角度出发，*我们应该充分尊重每个人，激发个体的斗志给与他们所需要的环境和支持，并且相信他们能够完成任务*，在团队内部建立彼此的信任。从个人角度出发，我们应该具备相当的专业能力，拥有较强的自管理能力，并不断提升自己，增强挑战困难和暴露问题的勇气。\n\n基于互相信任的前提，敏捷提倡自治的全功能团队。在工作形式上，整个团队平时坐在一起工作，从物理空间上创造了更加便捷面对面的沟通机会。在团队职责上，团队内部具备完成软件交付的角色（能力），团队所有人对软件的质量负责，开发过程由团队内部把控，业务价值在团队内部快速流动并得到验证，在任何环节都能及时获得反馈。同时，每个角色都更容易从全局视角去思考软件，避免了传统部门墙模式下的视角割裂和协作障碍。\n\n*有了个体与交互，我们是否可以摒弃一切流程与工具呢？答案当然是不可以！*\n\n这里举一个我曾经的真实经历：\n\n1. 公司不同的角色分布在不同的部门。需求部门的分析师在前期会花上一个月甚至更久的时间跟客户讨论需求，编写详细的需求分析文档（开发人员和设计人员不参与）。\n2. 需求文档被部门经理审核通过之后，项目管理系统进行提交。\n3. 我拿到需求分析文档进行功能开发，设计部门根据需求文档设计原型界面。\n4. 后期的开发过程中，当我需要一个icon的时候，我不得不在系统中提交申请，并由设计部门的项目经理审批后，设计师才开始设计。\n5. 功能开发完成后，在预先的发布时间内，由项目经理授权将软件提交给测试部门，测试部门开始测试。\n6. 测试人员在系统中通过Bug跟踪来反馈测试结果，后期开发人员和测试人员的交互主要发生在Bug跟踪系统上。这就好比，两个人在使用邮箱在交流一个紧急的Bug。\n7. 等待和返工成了后期开发的家常便饭，更低效的是，返工的时候需要反向走流程。另外，整个过程从需求分析到交给测试团队历时了大半年之久。\n\n在上述流程中，每个部门各自为政，好处是每个人在小黑屋里能专注、\"高效\"地做出一个用于被审批的中间产物，坏处是缺乏整体视角，很可能是以最高的效率做了一件错误的事情（效率低下的终极定义）。层层审批流程在重量级的项目管理和Bug跟踪工具下似乎运行得很良好，却扼杀了及时沟通和调整的时机，制造了彼此之间的隔阂、大大增加了成本浪费，于组织、于个人都无益。\n\n所以，我们要摒弃这种重流程和重工具，提倡轻量级流程和轻量级工具，而这些流程和工具又在促进个体交互。比如，我们在日常工作中会使用Trello、Jira、Keynote等工具。\n\n\n### 价值导向\n可工作的软件最终交付物，是我们追求的核心价值，以价值为导向也是我们每个职业人力所能及在做的事情。在交付价值的同时，如何看待过程中的文档呢？可能就仁者见仁智者见智了。\n\n提到文档，\"敏捷神教徒\"会跳出来指责并排斥一切文档，他们提倡开发人员应基于口头讨论后便开工，以最快的速度将业务功能实现，这是一种极端的思想，曲解了其含义。\n\n为客户交付可工作的软件是我们的核心目标，我们应该尽早交付可进行端到端测试的代码，该目标决定了我们不应该花过多精力在面面俱到的文档上，但这不代表我们要抵制任何文档。实践证明，轻量级的文档策略有助于团队高质量交付可工作的软件。\n\n在Scrum体系中，产品待办列表和Sprint待办列表就属于轻量级的文档。前者涵盖了产品的业务价值，后者包含了指导团队进行迭代开发的最优先的业务需求，并且在团队内形成知识共享，促进沟通协作。这类文档不应当省略。\n\n在开发过程中，交互设计原型也是一种轻量级文档，交互设计师交付可以尽早地跟团队和客户进行确认验收的核心业务场景的原型，快速收集反馈。而不是一开始就将产品的所有功能界面进行分块，然后在内容、视觉、交互上设计到非常精美的程度。\n\n以上两类文档都能够为团队中的个体交互提供基础支撑，大大的提高团队的协作效率。要不然，所有人都基于自己脑海里的信息去交流，很可能置身战场（舌战）的感觉。\n\n除了以上促进价值交付的文档，还有如下几类文档也是有价值，甚至不避免的：\n\n1. 作为交付物的一部分，比如用户手册，安装指南等。\n2. 软件发布受法律监管强制要求的文档。\n3. 帮助新成员快速获取项目上下文的文档。\n4. 记录重要会议和重要决策的文档，以便回溯。\n\n回到实际项目中，有一类文档会引起较多争议，比如：Troubleshoots、开发规范、交接文档、系统架构图等，这类文档更多是从项目管理的角度出发。而维护这些文档往往会提高管理成本，这是一个博弈的过程。怎么权衡也是需要根据不同的项目情况来定，我们要警惕的是盲目排斥一切文档，心中拿捏一杆秤：文档所创造的价值高于管理它的成本，它就值得去做。\n\n\n\n### 客户团队\n2015年，我去ThoughtWorks新加坡Office参与一个银行系统的交付。当时从中国区调遣人员过去支援，一来因为那边人员相对较为紧缺，二来因为跟客户关系处理得有些不妥，那边同事不愿意介入。近三个月的时间，软件成功交付上线了，但从销售那得知项目款很难要回来，后来我才知道这个项目一开始没有签下合同...感慨对优于合同谈判践行得不错！\n\n当然这是个反例。为了避免误解，我们需要从两个视角去对待合同：商务视角和交付视角。从商务视角，企业与企业合作需要法律的保障，所以正常情况下需要有一份合法的合同作为保障，这种不常见的问题更多出在管理上（新加坡总经理后被更换了）。\n\n我们更多从交付视角来出发。ThoughtWorks作为一家专业软件服务提供商，我们的终极目标是帮助客户实现他们真正想要的价值。基于业务从来都是捉摸不定的前提，在开发的过程中我们不可能固守一张死合同，遇到需求变更就谈判，面红耳赤最终只能关系破裂，导致双输。\n\n我们提倡客户团队，客户也作为团队的一分子，跟客户建立信任的合作关系取代敌对的谈判关系。因为需求的变化往往来自客户，这背后往往也是因为不确定的业务模式导致。让客户参与进来可以在开发的过程中尽早的发现变化，从而尽早采取解决方案，避免更多的浪费，保证交付朝正确的方向前进。协作的前提是信任，客户直接参与能够让客户更清楚当前的交付状况，增强客户的信心以及对我们的信任，切忌采取合同互怼的下下策。\n\n如果不能让客户成为团队的一分子，就要尽可能在其他的方面多做工作，比如提高Showcase频率，提高跟客户Catchup的频率，提供一个软件环境让客户始终能够在用我们交付的系统，等等。\n\n另外，客户参与可以提升客户的责任感，从而避免客户不负责任的需求变动。\n\n\n### 拥抱变化\n在我看来，这一点道出了敏捷的精髓。我曾经给敏捷下过定义：*通过高效的协作，获取快速的反馈，以便尽早做出调整，从而减少浪费，交付更大的价值*。\n\n敏捷初衷并不是让我们更快速地交付软件，敏捷一词很容易让人们产生望文生义的联想：敏捷就是迅速，就是快。当我们在看两个武功相当的高手过招（非太极）的时候，除了眼花缭乱的动作（出手极快，咏春拳唯快不破），更核心的点是他们能够根据对手的出招来快速采取应对招式。回到敏捷软件开发，开发速度快慢与否取决于团队成员的能力以及团队协作的默契度等因素，所以不一定所有的敏捷团队开发速度都会很高。而她真正的威力在于，当面临业务需求变更的时候，敏捷开发方式让我们能够更早、更快的做出响应。响应变化的能力才是她的核心竞争力，而她恰恰巧妙了抓了业务复杂性和不确定性的核心属性。\n\n敏捷团队的交付速度有可能在某些特定迭代比瀑布团队更慢，但需求发生变更时（通常一定会发生），响应变化的敏捷交付团队很早就做出了调整，而遵循计划的瀑布团队极有可能是一条道走到黑，最终交付一个让客户想哭又哭不出来的四不像。从最终价值成果来看，敏捷开发实践显然更容易帮助我们实现价值最大化。\n\n如果说我们做任何事情的终极目标是实现价值最大化，那么敏捷的终极目标就是通过提升响应力来最小化浪费，从而最大化价值。敏捷的开发团队能够更快速响应业务需求的变化，敏捷的企业组织能够更快速相应市场的变化。\n\n变化一词很好的描述了软件开发的本身属性，业务需求的不确定性给了敏捷软件开发方法用武之地。而对于流程非常稳定不变的工作，比如富士康某条成熟的iPhone生产线，遵循计划恐怕是更佳的选择。\n\n\n---\n\n## 写在最后\n\u003e敏捷虽好，不要盲从，更不要迷信\n\n敏捷开发方法有她的优势，也有她的门槛。市面上存在不少有形无神的伪敏捷组织。他们天天站会，甚至，他们也模仿Scrum搞了个3355，但他们仍然苦于对变化的龟速响应。\n\n我认为敏捷更像一种文化价值的认同，相比于形式，更重要的是团队对敏捷价值观的理解和认同，以及指导他们做出日常行为是否体现了`尊重`、`勇气`、`开放`、`承诺`、`专注`、`反馈`、`简洁`这些核心价值观。在一个敏捷的团队中，每个成员都应该拥有持续改进的心态，他们会不断学习理解敏捷宣言的内涵，会不断提升自己的专业技能，并能够结合团队实际情况采取因地制宜的敏捷实践。\n\n\n\n"])</script><script>self.__next_f.push([1,"40:T2542,"])</script><script>self.__next_f.push([1,"\n\n\n---\n\n作为一枚程序员，我埋头写代码到了第五个年头，走过很多弯路却发现是一个个填坑、挖坑过程，尝试很多东西后却发现仍然停留在`看是不是山、看水不是水`的状态。在这个转角上，个人初衷加上客观形势，我踏上了培训的道路，开始不断地尝试去梳理、总结、分享。\n\n在培训道路上，我看到了不一样的风景，新生了一些疑惑，产生了一些对未来的思考，本文我将分享一些我从写代码到做培训后的心里路程。\n\n---\n\n## 发展他人的意愿是基石\n在ThoughtWorks，发展他人这一项能力被列入到胜任力模型中，足以说明TW这个学习型组织对人才培养的重视。\n\n如果把`发展他人`的能力分解成两部分：意愿 + 能力。*那么怎么去衡量一个小伙伴在发展他人这方面的表现呢？*\n\nTW提倡师带徒制[[1]](#note-1)，因为没有KPI考核，过程中导师投入的时间、热情、用心程度，以及徒的成长，大家在工作中都有目共睹。所以在没有组织的压力下，一个人能够自发投入时间去做这些事情就流露出了很高的意愿。\n\n对于发展他人的能力，比如，沟通技能、专业技能、Coach技能、演讲技能等都是需要具备的能力，它们一个共同特点是都需要在实践中去积累和提升。所以，实践机会是一个重要的因素，而背后支撑的核心因素还是个人意愿。因为有了意愿，你会不断地去学习提升专业技能；有了意愿，你会抓住各种实践机会；有了意愿，你会不断的接受新的挑战；有了意愿，你的兴趣将成为你最好的导师。所以，发展他人的意愿被列为了基线[[2]](#note-2)。学富五车且情愿倾囊相授，你才可能桃李满天下。\n\n我在工作中体现出了较强烈的个人意愿，加上几次培训机会暴露出了一些基础能力，在TW规模化人员培养的趋势下，我加入了仝老师的队伍[[3]](#note-3)。\n\n---\n\n## 转型前的顾虑\n从写代码到做培训，让我想起了大四从材料转软件，内心难免有些忐忑。之前在项目上，我沟通对象主要是项目同事、客户，不用给很多人讲课，更多的是较为轻松的一对一交流。在项目上，我主要聚焦业务需求、疑难杂症，过程和目标都相对清晰，不用自己独立设计。而现在要离开一线项目做培训，我有了一些顾虑。针对这些顾虑，应届生培训[[4]](#note-4)的经历给了我一些答案。\n\n### 培训劳心劳体，身体会不会拖垮？ \n培训确实是一个劳心劳体的活，用心设计课程、用力传授课程，所以对体力有一定的要求，这更加促使我加强锻炼，平时的健身习惯帮助我维持了好的状态。\n\n### 台上讲话紧张，会不会被人嘲笑？\n台上讲话是我的一个弱项，而我却喜欢在众人面前演讲的感觉。大学期间使劲找各种演讲机会，工作了5年后上台讲话仍然会紧张，只是现在的紧张可以被克制住，而且每一次台上经验都会让我进步一点点。逮住机会去丢自己（丢人），每次做充足的准备，尽心尽力。\n\n### 不会课程设计，会不会误人子弟？\n多年的项目经验以及启蒙时的学习经历给了指导。培训讲求`讲`+`练`相结合，将`练`分解成`体验`和`行动`放在`讲`的两端，更加符合成年人的学习特点[[5]](#note-5)。课程设计没有灵丹妙药，收集反馈，持续学习和改进才是关键。\n\n### 远离一线项目，技术会不会退化？\n培训逼着自己去梳理总结自己的知识体系，达到教学相长，当然也就失去了置身一线的机会。在传播分享的同时要不断地学习操练，还可以回归一线去实战。而在TW，这样的机会随时都存在。\n\n---\n\n## 培训中的收获\n我刚加入TW培训团队，仝老师就让我接管了NHO的课程体系建立[[6]](#note-6)，恰逢NHO的改革期，历时三个月改革初级阶段基本成型，这个过程打开我的另一扇小窗，比如，沟通协作、知识体系化、外训讲师、认证机会等。\n\n### 强化沟通协作\n身为一名言语不多的程序员，我的沟通神经长时间没有得到足够的训练，自然不甚敏感。所以在接管NHO课程体系建立之后，除了课程设计和课程落地，我还要跟People团队不同角色去沟通，逼着自己跳出舒适区。另外，改革前期，在推动讲师赋能上的难题上，频繁地跟People去协作探讨解决方案，推动NHO改革的落地。高频率的沟通，让我变得习惯和享受沟通过程。当然，TW的小伙伴沟通协作上也很友好。\n\n### 梳理知识体系\n在培训期间，我觉得收获最大的是知识梳理。我需要将课程结合业务方（客户）的目标设计出来，然后通过不断讲授和反馈来迭代课程。这个过程我一直在梳理零散的知识，不断建立知识的关联性，从而形成特定的知识体系。将知识进行传授分享，收集反馈并不断完善，成长最多的是自己，这就是所谓的教学相长。\n\n### 拓展外训视野\nTW咨询团队会承接一些培训的项目，作为培训团队的一员，可以有更多地机会到外训战场去见识行业的面貌。因为外训天然具有内训无法比拟的压力，它能很好地锻炼你的心理素质，同时，更重要的是看到行业的一些真实状况，你可能会发现行业存在不少休克鱼[[7]](#note-7)，从而触发你更多的思考。\n\n\n### 获得认证机会\nTW正在举办一场将可能轰动行业的认证项目，而作为培训团队一员，通过前期积累了更多的实战教学经验，能够参与到前期认证体系建设团队中贡献力量的同事还能跟咨询大牛学习，这是一次难得的成长机会之一。\n\n---\n\n## 培训中的困惑\n当然在培训中，看到了不一样风景，也听到了不一样的言论，从而产生了一些困惑。比如，作为培训师，如何看待培训无用论？输出居多的情况下如何保证输入？如何让自己更加专业？\n\n### 如何看待培训无用论？\n最开始听到培训无用论，我似乎有些沮丧到怀疑人生。竟然培训无用，那公司为什么还花那么多的投资在培训上？通过跟前辈交流，不断的参加不同种类的培训，对这句话有了更深入的理解。\n\n培训确实`\"无用\"`，举个例子，知识焦虑让很多人去买了付费知识，并投入时间学习知识，遗憾的是，不少人忽略了后期的持续学习和刻意练习，最终没能将知识转化成自己的技能，从而进一步加深了知识焦虑。\n\n培训的一大核心作用是，让你知道自己不知道，并配合知识扩充、实战操练和技能转化三个阶段来达到提升的目的。而一位优秀的培训师会将这些融合到他课程体系中。\n\n\n### 如何保证持续的输入？\n培训做多了，尤其是重复相同的培训，如何保证新鲜有效的输入也是培训师需要面对的一个问题。答案很确定 -- 持续学习。而模糊的是如何持续学习？自学 + 实战两项能够经常得到练习，导师指导和业界培训这两项却起到至关重要的画龙点睛作用。在这方面，TW能力建设团队现在支持团队成员报名参加业界专项培训进行个人能力的提升。\n\n---\n\n## 未来的路\n在过去6个月时间，从写代码到做培训，跟HRBP团队协作将建立NHO体系。我对未来的路我也不是非常明晰，后面也许还会不断地产生新的困惑，也会不断得到答案。\n\n因为个人意愿加入了培训的队伍，所以要好好做培训，因为要更好地做培训，所以要让自己不断地输入。在TW这个充满机会的组织，我目前想到了三个方向：\n\n1. 走向专业培训师之路，匍匐前行，建功立业\n2. 回归交付团队，高效战斗，Coach团队\n3. 迈入咨询团队，大刀阔斧，Coach客户\n\n三个方向并不非相互独立，它们或许相辅相成，而重要的是你能不能在你感兴趣的领域取持续取得进步，去影响更多的人。\n\n---\n\n## 注释\n\n\u003ca id=\"note-1\"\u003e\u003c/a\u003e\n\n1. TW中的师徒制的形式有两种，一种是转正前会有一个Buddy带你快速成长，转正后会有一个Sponsor在你职业生涯中帮助你成长。\n\t\n\t\u003ca id=\"note-2\"\u003e\u003c/a\u003e\n\n2. `发展他人的意愿`被TW能力建设团队列为招聘的首要要求，其他还包括：`自学能力`、`开发心态`、`有效沟通`\n\n\t\u003ca id=\"note-3\"\u003e\u003c/a\u003e\n\n3. TW仝键是一位很资深的咨询师和培训师，带领了团队建立了培训体系，现加入外训咨询团队，内训由人称大姐大的资深咨询师禚娴静带头。\n\n\t\u003ca id=\"note-4\"\u003e\u003c/a\u003e\n\n4. 应届生培训的经历请参阅 [ThoughtWorks给你不一样的入职之旅]()\n\n\n\t\u003ca id=\"note-5\"\u003e\u003c/a\u003e\n\n5. 成年人学习的四个阶段：`体验`、`反思`、`抽象`、`行动`，讲师的首要职责是引导学员通过体验促发思考，经历了一定的思考之后进行总结提炼，最后进行落地。\n\n\t\u003ca id=\"note-6\"\u003e\u003c/a\u003e\n\n6. NHO，为期三天的新员工入职培训，由TW文化方面和敏捷项目体验组成。\n\n\t\u003ca id=\"note-7\"\u003e\u003c/a\u003e\n\n7. 休克鱼，企业投资与经营管理领域的概念，指硬件设施好，但管理不善的企业。本文泛指管理和文化理念僵化、不思变革的组织，以及组织中不思进取的员工。\n\n\n\n\n\n\n\n\n\n\n\n"])</script><script>self.__next_f.push([1,"41:T2195,"])</script><script>self.__next_f.push([1,"\n\n\n\n如果你认同 [简单设计的价值观]()，我相信 [解析简单设计原则]() 对你来说很容易理解并接受，它不像面向对象设计原则（比如：SOLID）那么晦涩难懂，它给你指明了一条明朗可通行的道路。即便如此，前进的道路依然不是一帆风顺，尤其对于新手来说，怎么将这些已经很接地气的原则更高效地落地，从而创造更大的价值，本文我将分享帮助我们落地简单设计的三板斧：*TDD、重构和整洁代码*。\n\n---\n\n## 价值体系\n假如让你去建造一幅巨大的广告牌，你会怎么做？从大框架来看，首先要打牢地基，再使用结实支柱做支撑，最后在顶部挂上广告牌。地基和支柱是帮助完成目标的必备条件。那么，如何实现简单设计的核心价值？我们可以以*简单设计价值观*、*简单设计原则*做为地基，并通过打造*TDD*、*重构* 和 *整洁代码* 三大支柱来支撑起简单设计的 \"广告牌\"：\n\n![image](/images/swd/xp/simple-design/sd-house.webp)\n\n---\n\n## 三大支柱\n\n### TDD\n作为极限编程的一项实践，测试驱动开发经过被大量的开发者证明是一项具有实用价值的实践。从广义上讲，TDD不限于开发人员在编码的过程中先写测试用例，然后驱动出代码实现，就连我们拿起一个待实现的用户故事[[1]](#note-1)，在脑海中开始构思如何去验收这个功能，也是一个TDD的过程，只不过这个T存在于你的大脑中，没有被可视化出来且不能复用。\n\n本文我所要表达的TDD聚焦在编码层面中的单元测试。它包含了三层含义：\n\n1. Test Driven Development\n2. Test Driven Design\n3. Task Driven Development\n\n#### Test Driven Development\n测试驱动开发，它是TDD在操作层面的落地方式，也是最普适的含义。它遵循一个基本流程：*写测试 -\u003e 执行测试（红） -\u003e 写实现 —\u003e 执行测试（绿）*。在TDD中融入重构步骤之后，它的一个具体详细的完整流程如图所示：\n\n![image](/images/swd/xp/simple-design/tdd-flow.webp)\n\n\n#### Test Driven Design\n\u003e 编码如艺术，优秀的程序员即是一名设计师，也是一位艺术家\n\n作为一名用代码改变世界的程序员，我们应该试图将自己的设计思想融入到代码中，让代码充满生气和灵性，从而远离机械式的僵尸代码。在*解析简单设计原则* 一文中我谈到设计不足和设计过度时所催生三类问题：\n\n1. 难以修改\n2. 难以测试\n3. 难以阅读\n\nTDD能让我们在编写测试的时候就开始思考即将实现的功能代码的可测试性。试想如果我们在编写测试阶段就举步维艰，此时不得不逼着自己去思考如何让API能够利于测试。这个过程主要面临了两方面的挑战：\n\n1. 视角切换。从用户视角出发，将脑海中的隐性验收测试落地到代码层面。\n2. API设计。如何让API更加职责清晰、内聚，从而更加有利于测试。\n\n这些挑战对开发人员的设计思维提出了较高的要求，所以也能理解不少新手在起步阶段颇为痛苦，以至于他们会觉得TDD降低了开发速度，对它的价值产生了怀疑。\n\n从我个人经验以及身边一些大牛身上总结出一个结论：*掌握TDD最好的捷径是刻意练习*。所以如果你刚起步，不要气馁，找一些Kata勤加练习[[2]](#note-2)\n\n\n#### Task Driven Development\n任务驱动开发，强调的是将大任务拆解成小任务。人的大脑在处理足够简单的问题的时候（比如`1+2-3+4-5 = ？`），能够快速给出方案。然而，面对较为复杂的问题的时候（比如`2-1*5*3/2+2-3/2-2/1*5+4-5 = ？`），大脑难免捉会襟见肘，此时就有必要借助一些辅助工具来做到事半功倍。\n\n任务驱动的方式会用到一个思维工具 -- Tasking[[3]](#note-3)。在练习TDD时，建议你将待完成的任务进行分解，然后将分解后的子任务可视化出来。可视化的好处之一是它可以作为沟通的工具，去收集反馈，进而完善自己的思路。任务拆解之后的好处是，待实现的功能更加小而单一，有利于编写测试。\n\nTasking同样需要刻意练习，它对分析性思维提出了一定的挑战，练习分析性思维的四步法：\n\n1. 定义问题 - 清楚定义问题\n2. 分解问题 - 将问题进行分解\n2. 关联问题 - 通过输入和输出寻找子问题的关联关系\n4. 限界问题 - 识别出子问题的边界，明确假设和结果\n\n关于TDD的示例，欢迎观看我录制的视频[[4]](#note-4)。\n\n### 重构\n重构，它是极限编程中的一项实践，Martin Flower在 *《重构：改善既有代码设计》*[[5]](#note-5) 一书中对重构进行了全面的定义。它提倡我们对代码最佳实践充满敬畏之心，*在不改变软件行为的前提下去修改代码，不断改善代码的设计，提升软件的响应力*。\n\n作为程序员，我们经常在修改代码，在修改之前，建议你先问自己四个问题：\n\n1. 软件已经工作，还需要修改这段代码？ - 软件可工作，可能有坏味道\n2. 如何识别这段代码浮现出的坏味道？ - 换味道是什么\n3. 针对坏味道，我们应该怎么修改？ - 怎么去坏味道\n4. 修改完之后，如何确保功能没有发生变化？ - 软件可工作，坏味道变少\n\n四个问题环环相扣的，始于目标，终于目标。你若能给出答案，并形成闭环，便实现了重构的核心价值。通常最难回答的是最后一个问题，以至于迟迟不敢下手，导致软件逐渐恶化。所以重构提倡重构要在测试的保护下进行，人工测试亦或自动化测试，只要能给出正确的答案。\n\n重构是一门手艺活，在日常编码中，你应该始终保持警惕，积极思考上述四个问题，另外辅以大量的刻意练习[[5]](#note-5)，同时我强烈推荐你以*《重构：改善既有代码设计》*[[6]](#note-6) 这本书作为起点。\n\n结合TDD，重构大有用武之地，测试先行保驾护航，重构演奏，方能唱出悠久的歌声。然而重构到什么程度？让整洁代码来回答这个问题。\n\n### 整洁代码\n整洁代码，从其字面来看是要编写整洁的代码，但这个问题仁者见仁、智者见智，很难有一个标准答案。回到我们文章的初衷 -- 落地简单设计，所以整洁的代码至少是：\n\n1. 尽量不重复\n2. 尽量揭示意图\n3. 尽量简单的\n\n小到变量命名，大到类交互设计，我们应该在意识中不断强化对以上三点的认知，在实践中养成良好的编码习惯。\n\nRobert C在*《代码整洁之道》*[[6]](#note-6) 一书中提供了很多案例，另外*《编写可读代码的艺术》*[[6]](#note-6) 也是一个很好的开始。理论结合实践，在日常开发中，建议你在团队中组织Code Review[[7]](#note-7)，它是一个难得的学习提升机会。\n\n---\n\n## 价值着陆\nTDD、重构和整洁代码并不能直接让我们设计出来的代码就天生符合简单设计。TDD带我们开了一个头，一旦开始了，在过程中不断地审视自己的代码，并通过重构来让代码变得整洁：\n\n![image](/images/swd/xp/simple-design/sd-land.webp)\n\n欢迎你以文中提到的案例和网站作为开始，进行大量的刻意练习从而让简单设计的核心价值能够着陆你所开发的软件，提升软件的响应力。\n\n\n---\n\n## 注释\n\n\u003ca id=\"note-1\"\u003e\u003c/a\u003e\n\n1. 用户故事是极限编程中的一个实践，请参阅 [我在ThoughtWorks中的敏捷实践]()\n\n\t\u003ca id=\"note-2\"\u003e\u003c/a\u003e\n\n2. 关于编码Kata，欢迎访问 [http://www.cyber-dojo.org/](http://www.cyber-dojo.org/)\n\n\t\u003ca id=\"note-3\"\u003e\u003c/a\u003e\n\n3. 有关Tasking更多解读，欢迎阅读ThoughtWorks仝键老师的 [像机器一样思考系列文章](https://www.zybuluo.com/jtong/note/403738)\n\n\t\u003ca id=\"note-4\"\u003e\u003c/a\u003e\n\n4. 我已经将 [TDD实现斐波那契数](https://www.bilibili.com/video/av27452115/) 的视频发表于B站\n\n\t\u003ca id=\"note-5\"\u003e\u003c/a\u003e\n\n5. 关于重构的练习，欢迎以 [GlidedRose](https://github.com/emilybache/GildedRose-Refactoring-Kata) 案例作为开始\n\n\t\u003ca id=\"note-6\"\u003e\u003c/a\u003e\n\n6. 关于编程方面的书籍，欢迎从我的GitHub [programming-books](https://github.com/sjyuan-cc/programming-books) 库中获取\n\n\t\u003ca id=\"note-7\"\u003e\u003c/a\u003e\n\n7. Code Review是项非常有价值的编码实践，它不仅能够促进团队互相学习，还能防止代码库恶化，更多内容请参阅 [我在ThoughtWorks中的敏捷实践]()\n"])</script><script>self.__next_f.push([1,"42:T140c,"])</script><script>self.__next_f.push([1,"\n\n\n---\n\n### 循序渐进的偶然\n有些事情单独看起来有点偶然，仔细回想起来却是循序渐进的过程。去年在北京一次偶然的应届生培训，让我向培训师又靠近了一步，紧接着顺水推舟，借着微服务的一阵学习分享的东风，我偶然地负责了一起面向北京Office的微服务技术实践的Workshop，而就在此前不久，我偶然被选为公司微服务培训的目标学员，恰好我所在的项目又采用了微服务的那些技术实践...\n\n作为组织者以及培训师，我难免会遇到一系列问题，在摸爬滚打的尝试过程中积累了一些心得，结合了我所在组织的特色（敏捷），我将Workshop视同一个Sprint，并提炼了一个框架模型，希望能够帮助一些新的组织者更好地开展Workshop。\n\n---\n\n###  VD CAST模型\n做任何事情之前，我们都要考虑其背后的价值，定义清楚价值，如何去实现价值，比如在这里我们如何通过Workshop达到这些目的。为了促成最终的交付，我们还要考虑影响交付的一些外在因素，最后，在成功交付之后如何将我们所交付的价值持续产生更多的价值也是等待我们去思考的。我把这些关注点提炼为*VD CAST* 模型（`价值交付投射`模型）：\n\n![image](/images/swd/agile/coaching/vd-cast-model.webp)\n\n最左边起点是我们做这件事的价值，中间则是影响价值落地的外在因素，主要涵盖了当前面临的`约束`、培训的目标`受众`、所能获得的`支持`以及课程交付后的`跟踪`五大方面。最右边是我们要落地的交付。能否落地以及如何建立价值与交付之间的投射？落实到操作层面，我们需要深入到各个方面中去探讨一些关键性的问题，我以提问的方式罗列出每个环节要解决的主要问题：\n\n![image](/images/swd/agile/coaching/vd-cast-question.webp)\n\n从这些待解决的问题中不难看出，每个环节存在一定的关联性，比如*价值*，我们给组织带来什么会决定我们能从组织上获得什么支持，而给讲师和学员带来什么会影响我们会影响讲师和学员的招募，*价值* 在很大程度上决定了我们所获得的*支撑*，*支撑* 则为成功*交付* 提供了强有力的保障。*约束* 会在一定程度缩小*受众*，并且很可能阻碍*交付*。最后，有效的*跟踪* 能够更好的突显*价值* 以及帮助改进下一次Workshop。我把它们之间的关系概括为：\n\n![image](/images/swd/agile/coaching/vd-cast-relationship.webp)\n\n它们之间关联性能够帮助我们理清这些问题的依赖顺序，让我们集中Focus在优先级更高的问题上，同时尽可能避免去解决一些根本不需要解决的问题。\n\n---\n\n### As a Sprint\n回到实际操作中，我们可以邀请有经验的讲师或组织中的Key Member一起头脑风暴，这样有助于捕捉那些由于个人思维限制而被遗漏但很重要的问题。一旦挖掘出了关键性问题，我们接下来如何干掉它们，难道必须一次性给出全部问题的答案吗？\n\n如果把一次Workshop视同敏捷开发中的一个Sprint（即迭代，请参阅 *我在ThoughtWorks中的敏捷实践*），我们需要做的是在Sprint的不同阶段中去解决对应的问题：\n\n![image](/images/swd/agile/coaching/workshop-as-a-sprint.webp)\n\n我把Sprint划分为5个阶段，每个阶段针对问题所提供的答案除了影响本阶段的进展，还会直接影响下个阶段的进展。比如在*需求分析* 的时候我们没法排除约束，可能会导致Sprint失败。而在*架构搭建* 中如果没有服务器资源，就会影响课程设计，而课程设计则会增大交付的风险（因为缺少特定的服务器资源，增加了环境的复杂度）。\n\n所以在每个阶段，我们要试图去给出合适但不一定十全十美的答案，这些答案能够推进Sprint，并有助于实现价值即可。\n\n---\n\n### 写在最后\n*VD CAST* 模型提炼出我们在Workshop中需要关注的核心点，它能帮助我们分离关注点（经常出现在软件架构设计中），让我们能够提前识别风险，进而评估Workshop能否落地且实现我们预设的价值，如若不能落地，它能帮助我们挖掘出不能落地的真实原因。\n\n针对*VD CAST* 模型中关注点的关键性问题不局限于前文所提出的那些，你需要把握住一个核心原则：\n\n\u003e 依据你所处的真实环境，针对*VD CAST* 模型的关注点提出关键性的问题，并试图给出合适的答案。\n\n在一个分享氛围浓厚的学习型组织中，不乏各类Workshop，在我司尤为突出。如果你参加过一些Workshop，且有意愿尝试组织一次Workshop，希望*VD CAST* 能给你注入能量。\n\n\n---\n\n\u003e 为了让学员保持较高的参与度，我们需要在课程设计上多下功夫，在课程中整合*目标*、*反馈*、*挑战* 等元素，更多精彩内容请阅读邱大师的 [反馈拯救世界](http://icodeit.org/2018/01/feedback-saves-the-world/)。\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n"])</script><script>self.__next_f.push([1,"43:Tf7d,"])</script><script>self.__next_f.push([1,"\n\n\n---\n\n## 主旋律\n2017年，主旋律，***忙***。可自己还是不满意最后的结果，并不是我不知足，是因为我觉得自己还不够努力...\n\n磕磕碰碰中，我收获了三个对我来说意义重大的词汇：自信、健康和自律。之所以对我来说很重要，是因为我还处在匮乏的状态。不一样的是，我更加深刻地体会到它们背后的意义。\n\n---\n\n## 自信\n做Workshop、做演讲、做培训（NHO、Graduate、Microservice）等等活动让我在一次次心里挣扎过程中突破自己，也让我真正体会到`Can Do`含义。甚至，为了避免打退堂鼓，我选择先将活动公之于众，借助公众环境压力来驱动自己往前走，略有 `后路已断` 的悲怆。\n\n就是在这种一次次恐惧和向前冲的矛盾中，我尝到了勇（鲁）敢（莽）给我的甜头，他每次都会守候在终点，龇牙咧嘴地对我说：`\"去做吧，我不会辜负你太多的，好样的！\"`\n\n就这样，我喜欢上了 `勇敢` 的这句谎言，每次都是被 `\"骗\"` 之后依然对它微笑。即便这样，我也想一直微笑下去。\n\n---\n\n## 健康\n身边人，身边事，让我体会到了健康的意义。程序员职业特征让我们患上职业病的概率提升了N个百分点，如果生活中的真实写照还不能引起我们的重视，健康就和我们渐行渐远。\n\n我用了三个月的时间，体重减轻了5kg。而用了一年的时间内脂降低了2个百分点、身体年龄减小了7岁。这些长期的饮食控制对我来说，不但没有造成生活的困扰，反而让我更加热爱高营养的美食。\n\n`管住嘴、迈开腿` 的确不是一件容易的事情，做到了，哪怕只是一半，健康正向我们靠近。而健康对于一个有远大抱负的人来说意义深远，对于平凡的我们同样意义重大。生活很艰辛，健康地活着才能有机会一直品尝辛苦。\n\n---\n\n## 自律\n*《那些自律的人后来都怎么样了》*、*《自律的人生是开了挂的人生》* ...平时没有少灌心灵鸡汤，然而自己的人生并没有开挂，某些计划后来也不了了之了。这让我意识到人性一个弱点：*一辈子听了很多道理，可还是过不好一生。* \n\n看书、编码、写文、锻炼、吃饭、休息，这些都是我在要求自己做到自律的地方，可我仍然还是很难坚持做到每天看一个小时的书，很难坚持做到每天往GitHub提交一次代码，很难坚持做到每一个月按时写一篇文章，很难坚持做到每天专门锻炼一小时，很难做到杜绝垃圾食品，很难坚持做到每天10:30~06:30的作息。\n\n在初期没有做到的时候，内心会有内疚感，总想着明天要做到，可是明天会被一些意外的事情干扰，久而久之，如果每次这么内疚下去也挺累，所以干脆安慰自己：*计划赶不上变化，做到了，当做给自己的奖励，做不到也情有可原，干嘛活的那么累*。就这样，做到和做不到约各占一半。\n\n逐渐地，挣扎反思的过程中我开始尝试了变通。比如健身锻炼，如果我每天不痛不痒的锻炼1个小时，我并不会获得新的突破，但如果我一周三次，高质量专注投入，每次2小时，并且拥抱高强度的训练，这样我能保持每天进步一点点，也能真正地品尝到痛快的滋味：*痛并快乐*。\n\n自律并不只是简单地按照已定的计划去执行，它更深次的意义是高质量地去落实一个能够让自己获得突破的计划，并在痛苦的条件下将它做到。对于我们每一个人来说，时间是很宝贵的资源，用效率来赢取时间，坚持去做一件让我们变得越来越好的事情，即便很普通，可能需要的却是极端的自律。\n\n最后送君一句鸡汤：\n\n***哪有什么天生如此，只是我们天天坚持！***  ***自律给我自由***\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n"])</script><script>self.__next_f.push([1,"44:T2847,"])</script><script>self.__next_f.push([1,"\n\n\n当下微服务如火如荼，各个团队在争先恐后推出微服务，不论在概念上还是在实践上，如果自己没有跟微服务挂上钩，便会被贴上`落伍`的标签。我们在推微服务的时候，我们说微服务架构具备如下优势：\n\n- 架构灵活，能够应对复杂的业务需求。\n- 独立部署，大大提高CI/CD的效率。\n- 服务自治，支持技术栈多元化。\n- ......\n\n\n这些特征恰恰是单点应用无法具备的，因此微服务架构在广大的呼声下逐渐承接了单点应用的替代工作。随着容器技术的成熟，使用Docker重建一个应用的成本趋近于零。而K8S/Rancher在生产上的广泛应用，很大程度解决了容器管理的难题。调用链分析工具（ZipKin）、ELK+Kibana再配合系统监控工具（Prometheus），就连微服务架构带来的部署运维的复杂性也得到了大大的改善。更加乐观的是，众多云平台（AWS, GCP, Azure等）正在试图打造解决部署运维难题的一体化Paas服务，让应用开发商更加专注于业务上。\n\n如果将软件生命周期大致划分成两部分：\n\n![lifecycle-of-software.jpg](/images/swd/xp/testing/lifecycle-of-software.webp)\n\n我们认为左边部分正在享受着微服务架构的益处，而右边部分在遭受着微服务架构复杂性的折磨。\n\n微服务架构带来的复杂性（右边部分）已经很大程度上得到了解决，常见的解决方案是在开发团队中植入DEVOPS。比如在ThoughtWorks中的某些团队，DEVOPS成为Team不可或缺的成分。\n\n我们把注意力放在左边部分。开发人员关注更多的是`开发`，每个服务由一个小的Team负责开发，Team正在极力往`服务自治`的方向靠拢。测试人员可能更加关注`测试`，尤其是契约测试伴随着业界对集成测试（UI测试）的痛斥声而崛起。`消费者驱动契约测试`的演讲比比皆是，我也没有例外，在某Account的技术大会上做了一次 *微服务架构下的测试应对策略* 的分享。在分享中，我赶时髦提倡用契约测试取代集成测试，但是细节中没有忽略的一个核心点：*单元测试*。这也是本文我要分享的重点。\n\n---\n\n## 基本最无敌\n\n\u003e单元测试是根，是基本，基本最无敌\n\n单元测试存在于测试金字塔的底端，撑起了整个金字塔，编写它是开发人员的职责。微服务架构让服务更加独立小巧，*这意味着我们不用为小巧的代码库编写单元测试了吗？*微服务架构提倡服务与服务之间通过契约测试来集成，*这意味着我们只用编写契约测试就足够了吗？*\n\n*假设我们以正确的姿势在践行微服务的相关技术实践。*\n\nCI上会伴随每次提交都触发单元测试、Service测试（API测试）、契约测试，所有测试通过后开始独立部署，如果我们的契约测试写的足够好，便可以自信地独立部署。如果Service测试覆盖的足够全，便可以自信地说代码缺陷率很低。此时我们可能认为单元测试业务价值低，不必过多关注。\n\n*回到现实，实际情况可能是这样子的。*\n\nCI上有契约测试的Stage，但也是草率编写，甚至契约测试因为没人维护而被默认忽略。Service测试写了大量的Case，导致测试运行时间被拖长，Build效率大大降低。由于大量的Servcie测试的存在导致单元测试被过度轻视，再加上无效的测试充斥着代码库。这几点不但扼杀了服务*独立部署* 的特性，而且增加了开发部署的工作量。\n\n再者，根据康威定律：`系统架构取决于组织架构，它俩息息相关`。不少团队怀揣微服务架构的梦想，却在老一套组织架构的驱使下渐行渐远。最后迫不得已，将原来一个大Team按照功能模块拆成几个小Team，将代码库粗暴地拆分成多个，每个开发人员同时往所有的代码库中提交代码。\n\n微服务架构的优势会驱使团队在一开始就高架微服务，无视业务需求复杂度，走一遍Event Storming，来一场DDD活动，确定几个服务便开始搞下去。而微服务架构提倡的是演进式架构，某些团队却因为各种原因一直停留在起初确定的那几个服务下开发下去，拆分的不合理性和演进性没有得到体现。这足以扼杀微服务架构*能够应对复杂业务需求* 的特性。\n\n\n微服务架构本身并没有错。归根结底是业务的复杂性很难被驾驭。我们说DDD可以帮助做微服务设计，于是我们都来学习*Eric Evans* 的DDD，可它却不能有效解决以下几个问题：\n\n- 如何进行领域建模？\n- 如何划分限界上下文？\n- 如何在实现层面定义对象？\n\n\n所以，我们学习了DDD还是不会DDD。但有一点毋庸置疑，我们每个人（DEV）都会编写单元测试。我们在试图驾驭微服务架构的路上摒弃了陈旧的集成测试、掌握了新的契约测试，而任何时候我们都应该始终抓住根本：***编写有效的单元测试来为我们的系统保驾护航。***\n\n---\n\n## 三个维度看单元测试\n我们不会说单元测试是灵丹妙药，对于100%覆盖率我们也应该持有保留态度。但在一个微服务架构基础设施还不完善、开发人员能力参差不齐、DDD能力不足以应对复杂业务的情况下，单元测试是性价比最高的实践。\n\n### 能力建设\n一个具备开发经验的开发人员，基本上都会编写单元测试。即便不会，可以通过培训来快速达成。从学习曲线上看，单元测试很容易上手（方法难以被测试另当别论），拥抱Java大腿的JUnit就是一个很好的例子。所以在一个团队中，我们可以过培训、[*Pair*]() 快速让开发人员具备编写单元测试能力。\n\n测试即文档，对于新上项目的开发人员，可以通过阅读单元测试来了解业务需求，并且不会对一系列具备复杂数据安装的Service测试产生恐惧感。\n\n\n### 生产效率\n在那些重Service测试而轻单元测试的项目中，Service测试里的数据安装缺少易用的脚手架，实际上编写出来的诸多Service测试犹如行尸走肉，不但没有测试出缺陷，还降低了测试运行速度，拉长了反馈时间。\n\n实践证明，很多缺陷完全可以通过单元测试来发现，测试金字塔提出者*Martin Fowler* 强调 *如果一个高层测试失败了，不仅仅表明功能代码中存在bug，还意味着单元测试的欠缺。因此，无论何时修复失败的端到端测试，都应该同时添加相应的单元测试。* 而越早发现发现Bug，造成的浪费就会越小，单元测试本身就能够提供了快速反馈的机制。\n\n\n### 卓越态度\n追求卓越是一个优秀程序员必备的态度。优秀的程序员除了能够编写Clean Code，还应该能够编写Clean Test。而Clean Code的基本特征之一是易于测试。单元测试可以充当一个设计工具，它有助于开发人员去思考代码结构的设计，让代码更加有利于测试。知名的开源代码库从来不会缺乏单元测试，而给与他们自信的也正是这些可观的单元测试覆盖率。\n\n考虑到成本与收益比，我们不必保证100%的覆盖率。因为随着覆盖率提升，单元的测试的价值越来越低，而编写的成本却越来越高。所以相比于100%这个漂亮的数字，我们应该去追求那不到100%的单元测试的有效性。\n\n---\n\n## 夯实根基\n\u003e单元测试能为代码库保驾护航的前提是它本身应该有效可靠。\n\n编写单元测试的能力容易培养，但编写有效的单元测试却需要不断地刻意练习，甚至一个有多年经验的Senior开发人员也不一定能够时刻编写出有效的单元测试。\n\n让单元测试有效的一个很好的方式是尽可能让我们的被测代码具备良好的可测性。要做到这点，我们需要尽可能的在编码的过程中掌握必要的代码设计原则。就拿面向对象的编程编程语言来讲，我们在编写代码的时候要时刻思考*Robert C. Martin* 提出的`SOLID`原则：\n\n- SRP(Single Responsibility Principle)，单一职责原则\n- OCP(Open Closed Principle)，开放封闭原则\n- LSP(Liskov Substitution Principle)，里氏替换原则\n- ISP(Interface Segregation Principle)，接口分离原则\n- DIP(Dependency Inversion Principle)，依赖倒置原则\n\n同时我们应该尽量避免编写`STUPID`代码：\n\n- Sington，单例\n- Tight Coupling，紧耦合\n- Untestability，不可测\n- Premature Optimization，过早优化\n- Indescriptive Naming，胡乱命名\n- Duplication，重复代码\n\n在做设计和编写代码的时候多思考我们是不是在践行`GRASP`原则：\n\n- Controller，控制器\n- Creator，创造者\n- High cohesion，高内聚\n- Low coupling，低耦合\n- Polymorphism，多态\n- Indirection，中介\n- Information expert，信息专家\n- Protected Variations，受保护变化\n- Pure fabrication，纯虚构\n\n以上这些原则需要在编码中不断地刻意练习，除了阅读针对性的书籍，在团队中积极组织 Code Review、推动 Pair来互相学习和改进是一个更有效的方式。\n\n良好的代码设计让我们的单元测试更加容易编写，而要编写有效的单元测试，我们应该对以下几个维度的测试坏味道保持敏锐的嗅觉：\n\n- 可读性：*基本断言*、*附加细节*、*冗长安装*、*逻辑分隔*、*魔法数字*、*过度断言* 等。\n- 可维护性：*重复*、*条件逻辑*、*参数化混乱*、*残缺路径*、*永久性临时文件*、*弱不禁风* 等。\n- 可靠性：*被注释*、*歧义注释*、*永不失败*、*轻率承诺*、*降低期望*、*有条件的测试* 等。\n\n---\n\n## 我的呼吁\n我们在试图驾驭微服务架构的路上，应该时刻守住根本，让单元测试这项成本低、收益高的实践为我们高层测试打好地基。*如何设计良好可测的代码* 以及 *如何编写有效的单元测试* 更是值得每一位追求卓越的程序员去深入学习和实践。\n\n如果你还在思考*为什要写单元测试？*推荐阅读我的文章 [*一枚程序员眼中的单元测试*]()。\n\n\n\n\n"])</script><script>self.__next_f.push([1,"45:T328d,"])</script><script>self.__next_f.push([1,"\n\n\n---\n\n## 不一样的旅程\nThoughtWorks是一家极具创造力的公司，在这里，人才是最重要的资产。如果你以应届生的身份加入TW，你将获得5周的出国留学机会（ThoughtWorks University，简称TWU），如果你通过社招加入TW，你会获得为期三天的TWI。除了TWU、TWI，TW还提供诸如NHO、Session、Workshop、Buddy/Sponsor、TL、极光计划（领导力）等数不胜数的培训。所有这些培训都在让你的职业之旅变得不一样。\n\n而更不一样的是，TW北京Office联手思沃学院推出了一个Local项目人才培养计划，针对某Local项目刚刚入职的5位新人（应届生）进行 `\"封闭式\"` 脱产培训。旨在通过为期四周的高强度培训，帮助新人快速融入到项目中。作为Coach，我来说说它到底不一样在哪里。\n\n受思沃学院*以学习者为中心的教学* 启发，我给此次培训起名为 ***以学习者为中心*** 的项目驱动培训，一来培训目标很明确 -- *新人更好更快地上项目实战*，二来以项目为驱动力的培训是一种强有效的能力培养方式。\n\n---\n\n## 不一样培训体系\n不同于象牙中*以老师为中心* 的填鸭式教学，*以学习者为中心* 强调的是以学生为中心的启发式教学。然而，初出象牙塔的新人可能仍然保留了较为强烈的 `学生-老师` 的象牙塔意识。所以对于Coach，我们首要任务是识别出他们的 *`意识形态`*，并帮助其调整。\n\n整个培训贯穿一个宗旨 -- 新人通过培训后能够*更快*、*更好* 地为项目做贡献。在大目标的指引下，制定合理且可以落地的验收标准，*`以可验收的目标为导向`*。\n\nThoughtWorks的特色文化（敏捷）时刻在督促我们：*在培训过程中坚持持续 `反馈优化` 并将 `敏捷实践渗透` 到培训中*。同时，通过 *`教学过程的反馈环`* 来强化技能成长。别出心裁的是，我们推崇辅以 *`运动健身`* 来提高培训的可持续性和高效性。\n\n*以学习者为中心的项目驱动培训* 的培训体系涉及以下几大方面：\n\n![image](/images/career/student-center-training-system.webp)\n\n---\n \n### 意识形态的更新\n意识形态，某种意义上又回到了认知的问题。对于刚从象牙塔中走出来的新人，他们对学习的认知会直接影响他们的学习方式和学习效率。\n\n##### 削弱象牙塔意识\n之前当小Buddy的经验告诉我，刚步入职场的新人思维中往往充斥着较强的象牙塔意识。典型的表现是*在遇到问题后的第一时间是跟老师索要答案*，而非自己先冷静下来去跟问题对话。作为Coach，如果每次遇到这样的求助之后都无条件的给与帮助，只会助长其这种意识。面对这种问题，我们会采取以下措施：\n\n- 拒绝出现 `老师` 词汇。从平时语言交流形式上淡化 `老师还在` 的心里暗示，从而帮助摆脱依赖心理。\n- 传授解决问题的套路。扭转他们的意识需要通过一些新的工具去帮助他们养成新的习惯。\n\n\n关于 `解决问题的套路` 大致可以分为如下几步：\n\n- 冷静下来与问题对话，了解问题是什么（核心）。\n- 找出关键错误信息，尝试独立解决（互联网/问题库）。\n- 在预期时间内没有解决，尝试寻求他人帮助，并带上自己的调研结果。\n- `\"放弃\"`。当上述三条都没有奏效的时候，起身活动，让大脑放松后再开始。\n\n削弱象牙塔意识是一个持久战，我们会在培训过程中不断地施加引导。比如，在遇到这种现象时可以反复问他们：*问题的关键信息是什么？* *可不可以快速验证一下你的猜测？* *应该去哪儿能找到答案？* *谁可以提供帮助？* 通过这些问题激发他们去思考改变。\n\n\n##### 建立Owner意识\n左边做减法，右边做加法。此时应该抓住机会培养他们的责任意识。像 `Retro`、`Code Review`、`Standup` 这些日常敏捷实践可以交由他们去Drive。而一旦作为Owner，他们除了自己快速地掌握，还会去思考它们背后的本质。更重要的是，Owner意识的提高会驱使他们不断地*自我学习，突破自己，追求卓越*，给他们未来的成长打好基调。\n\n---\n\n### 明确且可验证的目标\n某些项目（Account）在培训新人的时候，针对检验目标，通常是抽象模糊的，比如 `能够进行良好的团队协作`。对于培训，在开始之前我们得回答两个问题：*新人将具备什么能力？* *能通过什么检验？* 这两个问题本身没有标准答案，我们会把握住一个核心点：*基于项目的需求因地制宜*。所以，目标的制定需要PM/TL的参与，我们邀请了PM/TL以及长期从事应届生培训的思沃学院的老师共同来落地这些目标。下图是针对5位新人制定的目标和Checklist：\n\n![image](/images/career/goal-checkpoints.webp)\n\n有了目标，还需要一个**循序渐进**的培训计划针来达成目标。在做计划之前，Coach会先画出一条技能培养主线，后续的每日计划沿着主线推进，并根据知识点的依赖性安排先后顺序。\n\n关于目标，我们会做到公开、公平以及共享，即让每一位新人明确培训的目标。\n\n---\n\n### 围绕项目的技能树\nCoach在培训开始前花时间将项目上相关的技能进行梳理，并通过一些工具（比如思维导图）可视化出来。下面是我们项目的技能树：\n\n![image](/images/career/traning-skills.webp)\n\n下一步是要针对这些技能划分优先级，通过不同的Flag标记出来，比如图中橙色星星表示在培训中重点讲解和实践的，红色星星需要了解，蓝色会被提及。构建项目技能树可以遵循一个方针： *技能树的枝枝叶叶都源于项目*，两个关注点：*关注技术栈 \u0026\u0026 关注业务分析*。\n\n那么如何让新人消化并吸收技能树枝叶的营养对Coach来说是一项具有挑战的任务。除了需要大量时间去准备，还要非常用心，但也不是没有套路可循。\n\n---\n\n### 教学反馈环\n针对每项技能的教学，Coach会按照 `讲解 -\u003e 演示 -\u003e 练习 -\u003e 巩固 -\u003e 拓展 -\u003e 反馈 【分享】`的模式展开。\n\n![image](/images/career/coach-process.webp)\n\n**讲解。**授人鱼不如授人以渔，最好的方式是莫过于让新人掌握技术框架的实现原理。比如在讲解Spring IOC的时候，可以使用Java反射、注解来实现一个IOC容器。然而，在较大的时间压力下，新人接受度达不到预期的效果，这就要求Coach要学会讲故事，借用通俗的比喻来介绍知识点，通过必要的可视化工具（比如时序图）来提高讲解接受度。\n\n**演示。**Coach提前准备一些演示习题，在讲解完后通过习题来演示技能的应用。\n\n**练习。**Time-box限时编程练习，建议使用表格记录下新人每次完成时间。通过反复的限时练习来培养他们编码的感觉并形成肌肉记忆，不用在意他们优秀的记忆力，因为后面还有验收环节。\n\n**巩固。**布置一定量的课后作业，一方面是为了巩固学习，另一方面是不让他们松懈。实践证明，适当的忙碌和压力能够增强新人的安全感，但要当心过于繁重的作业影响睡眠和第二天的培训。\n\n**拓展。**这是激发新人自我驱动去扩展知识的好机会。比如，绘制概念图 -- 他们在绘制概念图的时候会扩展学习不少相关的技能。\n\n**反馈。**针对编码训练，Coach会通过验收习题（不同于练习题和作业）来Time-box获取小伙们对知识掌握的反馈。验收习题会 *回归项目，从项目代码库中找出相关技能应用场景来验证*。\n\n**分享。**分享作为一个附加环节，针对重要知识点，我们会鼓励新人进行Session分享，在分享过程中检验学习成果，同时可以激发他们集体思考和讨论。\n\n上述的反馈环帮助Coach高效地传授和验收知识技能点，同时也对Coach提出了较大的挑战，*如何让这个过程发挥更好的效果？如何准备有针对性的习题？如何将习题有效的串起来？* 等的都需要Coach花大量时间去思考和总结。最后，提倡在整个教学过程中：`多用肯定词，少用或尽量不用否定词`。\n\n---\n\n### 持续改进的反馈\n持续改进是ThoughtWorks的优良传统。很多时候我们在 **收集/给与** 大家的反馈，目的是让自己和对方更好地成长。这在培训过程中也不应该有例外。在开始阶段新人的反馈意识并不强，Coach会有意识地给与引导，引导他们去提出有效的反馈。对于Coach，我们将尝试以下几点：\n\n- 提醒新人随时针对培训和Coach提出反馈，以及互相之间给与和收集反馈，提高他们的反馈意识。\n- 肯定和赞美新人的进步和良好表现，提高他们的自信心和积极性。\n- 及时指出新人的不良编码习惯和学习方式，纠正他们的编码习惯，千万不要错过这个良机。\n\n\n对于新人，他们同样可以给出有效的反馈：\n\n- 对培训整体的适应程度，帮助Coach调整培训强度和进度。\n- 对知识点讲解的接受度，帮助Coach优化知识讲解的方式。\n\n除了及时的反馈，定期的Retro也是有助于持续改进的优秀实践。\n\n---\n\n### 特色的敏捷文化\n\n\u003e 敏捷跟ThoughtWorks关系就像社会主义跟中国的关系。\n\n以敏捷著称的ThoughtWorks，敏捷是我们的特色文化，就像家常便饭存在于日常工作中。所以在培训我们不是把敏捷挂在口头上，而是让它们渗透在各个环节中。Coach自身要对于日常的敏捷实践了如指掌，并能够担任敏捷教练职责。\n\n`Standup`、`Code Review`、`Retro`、`TDD`、`Pair`、`IPM`、`Kick-off`、`Desk-check` 等敏捷实践都可以植入到培训中。关于这点，要把握的核心宗旨是：*敏捷无处不在。*Coach在开始担任敏捷教练，之后交由新人去Drive，让他们逐步具备成为敏捷教练的能力。\n\n需要特别强调的是 `TDD` 和 `Code Review`（`TDD` 没有作为Check point）。`TDD` 对于新人会有较大的挑战，甚至引起一些抵触心理，但它非常值得为之付出努力。而 `Code Review` 是一个发现和纠正新人不良编码习惯的好时机。这两点对于他们日后成为优秀的程序员至关重要。\n\n[我在ThoughtWorks中的敏捷实践](http://www.infoq.com/cn/articles/my-agile-practice-in-thoughtworks/) 一文对敏捷实践做了详细的介绍。\n\n---\n\n### 保持运动健康的状态\n作为程序员，辛苦是不可否认的事实，如何在辛苦的状态下持续快乐下去（痛快）。我们得拥有一个健康的体魄，并且不要吝啬让身体回归自然 -- *生命在于运动*。\n\n说到运动健身，大家第一反应可能是 `健身卡`、`速干衣`、`跑步鞋`、`蛋白粉`、`功能饮料` 等。有人会雇专业的健身教练指导，我更建议将运动融入到工作生活中。如果能将 `久坐8小时之后去健身房锻炼1小时` 转换成 `8小时每隔1小时运动7分钟`，便可以杜绝 `腰椎盘突出`、`颈椎病`、`肩周炎` 等职业病。\n\n在培训过程中除了保持合理的节奏，预留出休息活动的时间，我们会在办公室空旷区域开展集体的运动，比如 `平板支撑`、`开合跳` 等。更重要的是，加强身体锻炼有利于Coach授课的可持续性和高效性。\n\n我在 改善程序员生活质量的 3+10 习惯 中提到的一些小的习惯可以帮助你保持健康的状态。\n\n---\n\n## 不一样的宗旨\n*以学习者为中心*，它与象牙塔中以老师为中心的填鸭式教学区分开来，如何找准这个中心，我们始终把握住以下三点：\n\n- Coach应尽量少讲课，多去引导启发学习者去思考和学习，并提供足够的辅导，通过必要的测试来收集和给与有价值的反馈。\n- 学习者应清楚学习理由和学习目标，并明确自己的目标（具体、公开、共享）。旨在提高学习者对学习目标的重要性认识，从而进行有效的自主学习。\n- Coach通过必要的课堂知识分享，并充分赋予学习者选择学习的权力，培养他们对自身学习成长的责任意识。\n\n---\n\n## 期待不一样的你\n在 [ThoughtWorks](https://www.thoughtworks.com/) ，学习是一件终身大事，培养人更是我司的立足之本。以学习者为中心能够激发学习者高效学习成长，以项目为驱动力有助于打造一个短期内专注度极高的目标。\n\n如此不一样的职业之旅，我想你一定会喜欢，如果你已经心动了，赶紧行动起来吧。*聚集了一群优
