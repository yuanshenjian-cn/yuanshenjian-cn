秀小伙伴* 的ThoughtWorks期待不一样的你。\n\n\n\n\n\n\n\n\n"])</script><script>self.__next_f.push([1,"46:T3055,"])</script><script>self.__next_f.push([1,"\n\n\n---\n\n\n## 寻找驱动力\nThoughtWorks北京Office和思沃学院联手推出了一个Local项目人才培养计划，针对某Local项目即将接纳的5位新人（应届生）进行\"封闭式\"脱产培训。经历四周左右的高强度培训，新人已经顺利加入项目。作为Coach，我想分享一些关于此次培训的经验和心得。\n\n受思沃学院*以学习者为中心的教学* 启发，我给此次培训起名为 *以学习者为中心的项目驱动培训*，一来培训目标很明确 -- *新人更好更快地上项目实战*，二来以项目为驱动力的培训是一种强有效的能力培养方式。\n\n---\n\n## 构筑培训体系\n不同于象牙中*以老师为中心* 的填鸭式教学，*以学习者为中心* 强调的是以学生为中心的启发式教学。然而，初出象牙塔的新人可能仍然保留了较为强烈的 `学生-老师` 的象牙塔意识。所以对于Coach，首要任务是识别出他们的 *`意识形态`*，并帮助其调整。\n\n整个培训贯穿一个宗旨 -- 新人通过培训后能够*更快*、*更好* 地为项目做贡献。在大目标的指引下，制定合理且可以落地的验收标准，*`以可验收的目标为导向`*。\n\nThoughtWorks的特色文化（敏捷）告诉我，在培训过程中坚持持续 *`反馈优化`*，并将 *`敏捷实践渗透`* 到培训中，通过*`教学过程的反馈环`* 来强化技能成长。另外，辅以*`运动健身`*来提高培训的可持续性和高效性。\n\n*以学习者为中心的项目驱动培训* 的培训体系涉及以下几大方面：\n\n![image](/images/swd/agile/coaching/student-center-training-system.webp)\n\n---\n\n### 意识形态的更新\n意识形态，某种意义上又回到了认知的问题。对于刚从象牙塔中走出来的新人，他们对学习的认知会直接影响他们的学习方式和学习效率。\n\n##### 削弱象牙塔意识\n之前当小Buddy的经验告诉我，刚步入职场的新人思维中往往充斥着较强的象牙塔意识。典型的表现是*在遇到问题后的第一时间是跟老师索要答案*，而非自己先冷静下来去跟问题对话。作为Coach，如果每次遇到这样的求助之后都无条件的给与帮助，只会助长其这种意识。面对这种问题，可以采取以下措施：\n\n- 拒绝出现 `老师` 词汇。从平时语言交流形式上淡化 `老师还在` 的心里暗示，从而帮助摆脱依赖心理。\n- 传授解决问题的套路。扭转他们的意识需要通过一些新的工具去帮助他们养成新的习惯。\n\n\n关于`解决问题的套路`大致可以分为如下几步：\n\n\n- 冷静下来与问题对话，了解问题是什么（核心）。\n- 找出关键错误信息，尝试独立解决（互联网/问题库）。\n- 在预期时间内没有解决，尝试需求他人帮助，并带上自己的调研结果。\n- `\"放弃\"`。当上述三条都没有凑效的时候，起身活动，让大脑放松后再开始。\n\n削弱象牙塔意识是一个持久战，需要Coach在培训过程中不断地施加引导。比如，在遇到这种现象时可以反复问他们：*问题的关键信息是什么？* *可不可以快速验证一下你的猜测？* *应该去哪儿能找到答案？* *谁可以提供帮助？* 通过这些问题激发他们去思考改变。\n\n\n##### 建立Owner意识\n左边做减法，右边做加法。此时应该抓住机会培养他们的责任意识。像`Retro`、`Code Review`、`Standup`这些日常敏捷实践可以交由他们去Drive。而一旦作为Owner，他们除了自己快速地掌握，还会去思考它们背后的本质。更重要的是，Owner意识的提高会驱使他们不断地*自我学习，突破自己，追求卓越*，给他们未来的成长打好基调。\n\n---\n\n### 明确且Verifiable的目标\n某些项目（Account）在培训新人的时候，针对检验目标，通常是抽象模糊的，比如`能够进行良好的团队协作`。对于培训，在开始之前我们得回答两个问题：*新人将具备什么能力？* *能通过什么检验？* 这两个问题本身没有一个标准答案，我们要把握住一个核心点：*基于项目的需求因地制宜*。所以，目标的制定需要PM/TL的参与，建议邀请PM/TL以及长期从事应届生培训的思沃学院的老师共同来落地这些目标。下图是针对5位新人制定的目标和Checklist：\n\n![image](/images/swd/agile/coaching/goal-checkpoints.webp)\n\n有了目标，我们需要一个**循序渐进**的培训计划针来达成目标。在做计划之前，Coach应该先画出一条技能培养主线，后续的每日计划沿着主线推进，并根据知识点的依赖性安排先后顺序。\n\n关于目标，切勿忽视公开、公平以及共享，即让每一位新人明确培训的目标。\n\n---\n\n### 围绕项目的技能树\nCoach在培训开始前应该花时间将项目上相关的技能进行梳理，并通过一些工具（比如思维导图）可视化出来。下面是我们项目的技能树：\n\n![image](/images/swd/agile/coaching/traning-skills.webp)\n\n下一步是要针对这些技能划分优先级，通过不同的Flag标记出来，比如图中橙色星星表示在培训中重点讲解和实践的，红色星星需要了解，蓝色会被提及。构建项目技能树可以遵循一个方针： *技能树的枝枝叶叶都源于项目*，两个关注点：*关注技术栈 \u0026\u0026 关注业务分析*。\n\n那么如何让新人消化并吸收技能树枝叶的营养对Coach来说是一项具有挑战的任务。除了需要大量时间去准备，还要非常用心，但也不是没有套路可循。\n\n---\n\n### 教学反馈环\n针对每项技能的教学，Coach可以按照 `讲解 -\u003e 演示 -\u003e 练习 -\u003e 巩固 -\u003e 拓展 -\u003e 反馈 【分享】`的模式展开。\n\n![image](/images/swd/agile/coaching/coach-process.webp)\n\n**讲解。**授人鱼不如授人以渔，最好的方式是莫过于让新人掌握技术框架的实现原理。比如在讲解Spring IOC的时候，可以使用Java反射、注解来实现一个IOC容器。然而，在较大的时间压力下，新人接受度达不到预期的效果，这就要求Coach要学会讲故事，借用通俗的比喻来介绍知识点，通过必要的可视化工具（比如时序图）来提高讲解接受度。\n\n**演示。**Coach提前准备一些演示习题，在讲解完后通过习题来演示技能的应用。\n\n**练习。**Time-box限时编程练习，建议使用表格记录下新人每次完成时间。通过反复的限时练习来培养他们编码的感觉并形成肌肉记忆，不用在意他们优秀的记忆力，因为后面还有验收环节。\n\n**巩固。**布置一定量的课后作业，一方面是为了巩固学习，另一方面是不让他们松懈。实践证明，适当的忙碌和压力能够增强新人的安全感，但要当心过于繁重的作业影响睡眠和第二天的培训。\n\n**拓展。**这是激发新人自我驱动去扩展知识的好机会。比如，绘制概念图，你会发现他们在绘制概念图的时候会扩展学习不少相关的技能。\n\n**反馈。**针对编码训练，Coach可以通过验收习题（不同于练习题和作业）来Time-box获取小伙们对知识掌握的反馈。验收习题一定要*回归项目，从项目代码库中找出相关技能应用场景来验证*。\n\n**分享。**分享作为一个附加环节，针对重要知识点，鼓励新人进行Session分享，在分享过程中检验学习成果，同时可以激发他们集体思考和讨论。\n\n上述的反馈环帮助Coach高效地传授和验收知识技能点，同时也对Coach提出了较大的挑战，*如何让这个过程发挥更好的效果？如何准备有针对性的习题？如何将习题有效的串起来？* 等的都需要Coach花大量时间去思考和总结。最后，提倡在整个教学过程中：`多用肯定词，少用或尽量不用否定词`。\n\n---\n\n### 持续改进的反馈\n持续改进是ThoughtWorks的优良传统。很多时候我们在**收集/给与**大家的反馈，目的是让自己和对方更好地成长。这在培训过程中也不应该有例外。在开始阶段新人的反馈意识并不强，需要Coach给与更多的引导，引导他们去提出有效的反馈。对于Coach，可以尝试以下几点：\n\n- 提醒新人随时针对培训和Coach提出反馈，以及互相之间给与和收集反馈，提高他们的反馈意识。\n- 肯定和赞美新人的进步和良好表现，提高他们的自信心和积极性。\n- 及时指出新人的不良编码习惯和学习方式，纠正他们的编码习惯，千万不要错过这个良机。\n\n\n对于新人，他们同样可以给出有效的反馈：\n\n- 对培训整体的适应程度，帮助Coach调整培训强度和进度。\n- 对知识点讲解的接受度，帮助Coach优化知识讲解的方式。\n\n除了及时的反馈，定期的Retro也是有助于持续改进的优秀实践。\n\n---\n\n### 特色的敏捷渗透\n\n\u003e 敏捷跟ThoughtWorks关系就像社会主义跟中国的关系。\n\n以敏捷著称的ThoughtWorks，敏捷是我们的特色文化，就像家常便饭存在于日常工作中。所以在培训我们不是把敏捷挂在口头上，而是让它们渗透在各个环节中。Coach需要对于日常的敏捷实践了如指掌，并能够担任敏捷教练职责。\n\n`Standup`、`Code Review`、`Retro`、`TDD`、`Pair`、`IPM`、`Kick-off`、`Desk-check`等敏捷实践都可以植入到培训中。关于这点，要把握的核心宗旨是：*敏捷无处不在。*Coach在开始担任敏捷教练，之后交由新人去Drive，让他们逐步具备成为敏捷教练的能力。\n\n需要特别强调的是`TDD`和`Code Review`（`TDD`没有作为Check point）。`TDD`对于新人会有较大的挑战，甚至引起一些抵触心理，但它非常值得为之付出努力。而`Code Review`是一个发现和纠正新人不良编码习惯的好时机。这两点对于他们日后成为优秀的程序员至关重要。\n\n[我在ThoughtWorks中的敏捷实践](http://www.infoq.com/cn/articles/my-agile-practice-in-thoughtworks/) 一文对敏捷实践做了详细的介绍。\n\n---\n\n### 保持运动健康的状态\n作为程序员，辛苦是不可否认的事实，如何在辛苦的状态下持续快乐下去（痛快）。我们得拥有一个健康的体魄，并且不要吝啬让身体回归自然 -- *生命在于运动*。\n\n说到运动健身，大家第一反应可能是`健身卡`、`速干衣`、`跑步鞋`、`蛋白粉`、`功能饮料`等。有人会雇专业的健身教练指导，我更建议将运动融入到工作生活中。如果能将`久坐8小时之后去健身房锻炼1小时`转换成`8小时每隔1小时运动7分钟`，便可以杜绝`腰椎盘突出`、`颈椎病`、`肩周炎`等职业病。\n\n在培训过程中要保持合理的节奏，预留出休息活动的时间，不妨在办公室空旷区域开展集体的运动，比如`平板支撑`、`开合跳`等。更重要的是，加强身体锻炼有利于Coach授课的可持续性和高效性。\n\n我在 改善程序员生活质量的 3+10 习惯 中提到的一些小的习惯可以帮助你保持健康的状态。\n\n---\n\n## 找准中心，回归初始\n*以学习者为中心*，它与象牙塔中以老师为中心的填鸭式教学区分开来，如何找准这个中心，把握住三点：\n\n- Coach应尽量少讲课，多去引导启发学习者去思考和学习，并提供足够的辅导，通过必要的测试来收集和给与有价值的反馈。\n- 学习者应清楚学习理由和学习目标，并明确自己的目标（具体、公开、共享）。旨在提高学习者对学习目标的重要性认识，从而进行有效的自主学习。\n- Coach通过必要的课堂知识分享，并充分赋予学习者选择学习的权力，培养他们对自身学习成长的责任意识。\n\n在ThoughtWorks里，学习是一件终身大事，培养人更是我司的立足之本。以学习者为中心能够激发学习者高效学习成长，以项目为驱动力有助于打造一个短期内专注度极高的目标。\n\n\u003e 此次培训也是Local项目的首次探索，可行性得到证实 -- 五位新人已经顺利地Billable。欢迎每位TWer参与到后续类似的培训中，更欢迎分享你宝贵的经验。\n\n\n\n\n\n\n\n\n"])</script><script>self.__next_f.push([1,"47:T1ae3,"])</script><script>self.__next_f.push([1,"\n\n\n---\n\n\n在 上一篇 中我们了解了测试策略的转变，本文我将为大家揭晓*消费者驱动契约测试*。\n\n## CDCT\n消费者驱动契约测试的流程是，消费者定义他们期望的API或消息是什么样子，这些期望即为契约，从这些契约可以生成存根，此后消费者团队可以在构建过程中重复使用它们。*消费者和生产者都需要验证契约*。\n\nCDCT强调契约由消费者来驱动，并由双方**共同遵守**，核心是**共同遵守**。\n\n*那么如何保证**共同遵守**呢？*\n\n敏捷宣言中提到 `可工作的软件 优于 面面俱到的文档`。引入Contract概念的测试会定义一个Contract文档（JSON协议文件）。对于消费方，该文档被用作测试断言依据，文档被转换成一个`可工作的软件`（可执行的测试套件：修改文档会导致测试失败）。而对于服务提供方，因为测试的断言与Contract文档没有强制关联，它最多只能是一个`面面俱到的文档`。\n\n所以，只有当双方都将文档转换成可工作的软件时，文档的修改便会导致任意一方测试失败，文档才真正成为双方**共同遵守**的契约（可工作的软件总是可靠的，文档却有可能已经过期）。\n\n消费者驱动契约测试中存在一个契约，双方基于契约生成可工作的测试套件：\n\n![image](/images/swd/xp/testing/cdct.webp)\n\nCDCT具备了`引入Contract概念集成测试`的诸多优点，并且通过可工作的测试套件保证了契约的一致性和实时性。\n\n---\n\n## 技术实践\n\n\u003e运筹帷幄之中，决胜千里之外。\n\n三国明星诸葛亮负责运筹帷幄，关、张、赵等武将负责冲锋陷阵，从而决胜千里之外的硝烟战场。团队确定了测试策略之后，应当交由优秀工具来实施执行。\n\n关于单元测试，业界已经有非常优秀的测试工具和框架，比如我们正在做的Springboot应用，`JUnit`, `Mockito`, `JMock`, `Hamcrest`等都是测试工具箱里的明星。对于CDCT，目前比较流行的有JVM框架 [Spring cloud Contract](http://cloud.spring.io/spring-cloud-contract/spring-cloud-contract.html)，以及支持多语言的 [Pact](https://docs.pact.io/)。\n\n如果团队正在开发一个Springboot应用，[Spring cloud Contract](http://cloud.spring.io/spring-cloud-contract/spring-cloud-contract.html) 是一个不错的选择。它使用Groovy DSL定义测试契约并生成测试套件，测试套件去验证服务提供方是否满足契约，测试通过之后会生成一个jar文件，该jar文件随后会作为一个可运行的Stub server，消费方基于Stub server编写测试，从而验证功能是否满足契约：\n\n![image](/images/swd/xp/testing/spring-cloud-contract.webp)\n\n在CDCT中，不管是测试生产者还是测试消费者，都需要引入一种快速失败方法。即如果任何一方违反了契约，最好在构建的第一分钟就失败，而不是等到2小时之后的集成测试中失败。所以，我们需要将CDCT作为构建Pipeline中的一个Stage集成到CI中。\n\n\n---\n\n## 何去何从\n代价高昂的UI测试使得开发团队逐渐对它失去了信心，尤其引入了微服务架构，它所带来的复杂性使得业界摒弃UI测试的呼声高涨。早在2009年，著名的敏捷和TDD专家J.B. Rainsberger在InfoQ上提出 [Integration Tests Are a Scam](https://www.infoq.com/presentations/integration-tests-scam)。\n\n\u003e集成测试是一个骗局，你可能需要编写2-5%集成测试来做一个E2E的测试，但它们可能到处在重复单元测，另外集成测试存在彼此重复。更糟糕的是，当集成测试失败时，你不知道哪里出了问题，不能及时准确定位问题。\n\nJ.B. Rainsberger后来还在博客上发表了 [《Integration Tests Are a Scam》](http://blog.thecodewhisperer.com/permalink/integrated-tests-are-a-scam)，文章借用强有力的数据分析来证实自己的观点。他提出的最佳实践是：**用契约测试或协议测试来做集成测试！**\n\nMartin Fowller 在2012年的 [测试金字塔理论](https://martinfowler.com/bliki/TestPyramid.html) 中也指出：\n\n\u003e应该引入面向应用程序服务层的中间层测试，这些测试既保持了端到端测试的诸多优势，又避免了许多与UI框架相关的复杂性。在Web应用程序中，中间层测试相当于API层测试，而位于金字塔顶层的UI测试则相当于Selenium测试。\n\n[ThoughtWorks技术雷达](https://www.thoughtworks.com/radar/techniques/consumer-driven-contract-testing) 于2016年已经正式采纳消费者驱动契约测试。\n\n\u003eWe’ve decided to bring consumer-driven contract testing back from the archive for this edition even though we had allowed it to fade in the past.\n\n微服务架构的盛行促使越来越多的开发团队开始引入CDCT，逐渐淡化UI测试。团队的测试策略正在发生不同的演变：\n\n![image](/images/swd/xp/testing/testpyamid-evolution.webp)\n\n引入了CDCT并摆出了正确的姿势，便可大大弱化UI测试，甚至可以使用少量的人工测试来代替自动化UI测试。CDCT帮助我们缓解了UI测试的痛点，但也要当心走极端，譬如有些团队的测试策略发生了下面的极端情况：\n\n![image](/images/swd/xp/testing/testpyramid-bad-evolution.webp)\n\n软件工程曾经从未产出银弹，相信未来也不会，一种新的方案的诞生只是解决了已有方案的痛点，好比微服务架构解决了单体的那些痛点之后，却又带来了足够的复杂性，从而对团队自身的能力提出了挑战。在选择测试策略的时候可以参考以下几条原则：\n\n- 单元测试成本低，运行效率高，性价比非常高，始终摆在第一位。\n- 高层测试只是测试防护体系的第二防线。\n- 软件开发是一项成本与收益的博弈活动，性价比高的方案应该更加受到青睐。\n- 没有绝对的对与错，根据自身项目工程和技术能力选择适合团队的策略。\n\n其中第二条原则强调：*如果一个高层测试失败了，不仅仅表明功能代码中存在bug，还意味着单元测试的欠缺。因此，无论何时修复失败的端到端测试，都应该同时添加相应的单元测试。*\n\n\n---\n\n## 写在最后\n\n微服务架构的复杂度不仅体现在技术上，与之相辅相成的是系统的业务架构，而技术架构总是服务于业务架构。优秀的测试策略和工程技术实践让我们更好地构建复杂的架构体系并克服它所带来的挑战，而最终决定一个系统成功与否在于人。所以，团队中每一个人应该保持Open的心态，持续学习，提升自己的高度（技能和业务），掌握实施微服务的相关技能，比如利用DDD去做服务的划分，从而能够更好的驾驭微服务架构。\n\n\n\n"])</script><script>self.__next_f.push([1,"48:T23f1,"])</script><script>self.__next_f.push([1,"\n\n\n---\n\n## 系统架构的演变\n伴随着互联网的快速发展，Web应用系统从面向企业内部发展到面向市场用户，业务的日趋复杂以及用户量的上升，那些曾经工作良好的单体应用开始遇到开发、测试、部署、发布各个方面的瓶颈，诸如`扩展新增功能艰难`、`系统庞大难以维护`、`编译太耗时，发布流程太慢`等问题困扰着开发团队。\n\nSOA的问世促使系统架构发生了跨越式的演变，它提出了面向服务的架构思想，将系统拆分成多个服务组件，并通过ESB（企业服务总线）对服务组件进行统一管理，但重量级的ESB使得自身又成为了一个瓶颈。随之而来的是近来业界流行的微服务架构，它将SOA的思想进一步升级，将系统组件化、服务化以及去中心化，强调 `轻量级`、`松耦合`、`服务自治`、`独立部署`。\n\n微服务架构解决了单体应用的痛点，打破了SOA的瓶颈，同时也带来了很多的复杂性。部署运维方面，服务的部署、管理、监控。开发设计方面，服务的拆分、设计、编码、测试都将会变得复杂。幸运的是，容器化技术（比如无比流行的Docker）已经很大程度上帮助我们克服了环境的差异性，而一些容器编排工具诸如Kubernetes, Rancher, Docker-compose 提供了容器部署管理的解决方案。作为行业的领航者，ThoughtWorks也在极力倡导 *开发、设计、部署、运维一体化* 的DEVOPS文化理念，并通过丰富的咨询和交付成果来帮助企业研发团队更好地实施微服务架构的开发。\n\n*那么在编码测试方面，又有什么招来保证微服务架构下系统的质量？*\n\n本文将从开发测试的视角来探讨如何在微服务架构下通过不一样的测试策略来尽可能的保证系统的质量。\n\n---\n\n## 单体应用测试实践\n\n\u003e当我们的意识中只存在一样东西的时候，我们便可以不假思索的拿来就用。\n\n在单体时代，对于开发-测试-部署，业界已经具备了一套很成熟的解决方案。基于这种方案，当一个敏捷开发的小Team开始构建一个应用之前，CI搭建的过程也会变得非常简单：*CI只需要从一个代码库中去pull代码，然后编译-测试-部署*，它的流程可以简化成：\n\n\n在这种单线流水线模式下，如果团队的自动化实践做得很好，开发人员只需要关注自己编写代码时所编写的测试的质量和数量。整个应用的测试策略简单直接:\n\n![image](/images/swd/xp/testing/single-app-ci.webp)\n\n***保证足够的单元测试的覆盖率，保持一定数量的Servcie测试，添加一些重要业务流程的E2E测试。***\n\n\n---\n\n\n## 微服务测试的演变\n微服务架构是一种演进式架构，开发团队跟领域专家在一起进行业务分析（Event Storming），从而划分出独立的服务，系统一开始确定为独立服务的数量可能是几个，伴随着业务的复杂深入，会不断地衍生出新的服务。下图是一个包含了四个服务的微服务架构的系统：\n\n![image](/images/swd/xp/testing/microservice-architecture.webp)\n\n微服务体系中的诸多服务不可避免跨服务调用，它们通常使用轻量级的HTTP RESTful API。那么如何保证跨服务调用的可靠性以及整个系统集成的质量？尤其是当不同服务由不同小团队负责开发和测试。\n\n---\n\n### 服务自身的Unit测试\n系统被拆分成独立的服务，每个服务都是一个完整的小系统，首要工作仍然是保证服务自身的业务功能的正确性。比如一个Java Web应用（Springboot），API功能以及各个Service的业务逻辑的正确性，可以通过单元测试来保证。服务细分之后从某种意义上让单元测试更加易于编写，可以借助测试替身来屏蔽掉对其他服务依赖。\n\n---\n\n### 系统级的集成（UI）测试\nUnit测试使得开发人员可以快活地活在自己的世界中，每个开发团队按照图纸造出系统的一个部件，只有当这些小部件集成在一起之后能够按照用户的期望为用户提供服务才体现出了系统业务价值。所以我们要通过系统集成测试（UI测试）来保证集成的质量。\n\n\n从 [测试金字塔](https://martinfowler.com/bliki/TestPyramid.html) 中可以看出，在一个系统中，UI测试是数量最少的。虽然它的业务价值最高，但它高昂的成本使得它只会覆盖业务流程复杂的业务场景。甚至，当一个微服务架构系统中服务个数量达到一定之后，很多开发团队对UI测试开始望而却步，因为在一个存在多个服务的系统中（即便单体应用系统）做集成测试，会面临诸多痛点：\n\n- 需要维护完整的运行环境，成本很高。\n- 环境不稳定（UI不稳定）导致测试随机挂，功能增强很容易破坏大量测试。\n- 问题难定位，修复时间太长，影响Pipeline的推进。\n- 运行速度慢，反馈周期长。\n- 存在重复测试已测试的功能。\n\n这些痛点在很大程度上会削减一个开发团队的生产力，某些企业会雇一个QA进行重复的人工测试从而解放开发人员的生产力。这种措施有悖于追求卓越的理念，并没有从本质上解决系统的集成的质量问题。既然UI测试已经不适用引进了微服务架构的开发团队，要如何保证服务集成的质量，我们还需要在自动化测试道路上另辟蹊径。\n\n---\n\n### Pair集成测试\n系统级别的集成测试阻碍重重，我们不妨退一步思考，将集成的范围缩小 *保证服务俩俩的集成的可靠性*。有了这个想法，我们开始对服务俩俩配对做集成测试。测试架构演变成：\n\n![image](/images/swd/xp/testing/pair-integration-test.webp)\n\n我们需要真实运行待测试的服务，并且对其他服务使用替身。不难看出这种方式存在以下问题：\n\n- 需要运行待集成的真实服务，存在环境不稳定导致维护成本增加。\n- 需要Mock掉其他服务，增加了额外的工作量。\n- 存在大量重复测试已经测试的功能。\n\n虽然Pair集成测试没有从根本上解决UI测试的痛点，但它提出了 *积小成多* 的理念，该理念告诉我们：***只要能够保证服务俩俩之间的集成是可靠的，我们就可以相信系统集成也是可靠的。***\n\n---\n\n### 引入Contract概念的集成测试\n\n就在两年前，我在珠海出差的某项目上跟小伙伴一起尝试了一种集成测试方案。当时项目采用的是前后端分离开发，后端作为服务提供者提供RESTful API，前端作为消费者消费API。\n\n为了保证前后端开发人员并行开展工作，我们引入了Contarct概念。前后端开发人员基于业务共同定义API协议（Contract），该协议以JSON文件存在于代码库的测试资源目录中，前端在开发过程中以JSON文件作为测试的断言依据。而后端开发人员则参照该协议内容来实现API。\n\n基于这种方案，前后端开发人员如果都遵守了协议，联调的过程就会非常顺利。而它的优势也很明显的体现出来：\n\n- 不需要运行其他服务，环境简单，运行快。\n- 测试可控范围缩小到单个服务内部。\n- 按照Contract，各自编写代码并测试。\n\n前后端本质上等价于服务提供方和服务消费方，所以该理念运用在微服务之间的集成测试中，系统的测试架构会得到进一步演进：\n\n![image](/images/swd/xp/testing/contract-concept-test.webp)\n\n我么在享受着它带来的好处的同时，问题也偷偷地潜入系统中。不久后，CI就报警了：*UI测试测试挂了*\n\n进行一番debug之后我们定位到了问题，解开了 `按照Contract单独运行测试一切OK，为什么上集成环境就莫名其妙挂掉！` 的疑惑：\n\n```groovy\n// 两天前\nrequest {\n    method 'POST'\n    url '/users'\n    body([\n            name: $(regex('[a-z]{6, 20}')),\n            email: 'sjyuan@thoughtworks.com',\n            homePage: 'http://sjyuan.club'\n    ])\n    headers {\n        contentType('application/json')\n    }\n}\n\n// 两天后\nrequest {\n    method 'POST'\n    url '/users'\n    body([\n            name: $(regex('[a-z]{6, 20}')),\n            email: 'sjyuan@thoughtworks.com',\n            homePage: 'http://sjyuan.club',\n            gender: 'M'\n    ])\n    headers {\n        contentType('application/json')\n    }\n}\n\n```\n通过Git历史记录发现服务消费方（前端）将API协议更新了，而服务提供方（后端）没有同步修改实现。\n\n回顾一下`引入Contract概念的集成测试`，之所以会出现协议的修改直到集成环境中才暴露出来，是因为缺乏自动化监控机制来提前发现问题并预警。让我们做进一步深入思考：*把同一份API契约作为服务提供方和服务消费方的测试断言依据，一旦契约被一方改动，则另一方的测试便会失败*。\n\n归根结底，我们缺乏一种有效的强制约束来约束双方，下一篇 我将分享的`消费者驱动契约测试`可以提供这种约束。\n\n"])</script><script>self.__next_f.push([1,"49:T2747,"])</script><script>self.__next_f.push([1,"\n\n## 论测试的重要性\n\n\n\n![ku-xing-seng.png](/images/swd/xp/testing/ku-xing-seng.webp)\n\n在我看来，程序员应该是：\n\n\u003e手持神剑，心怀善念，胸有成竹、有理有据并且合情合理地跟QA、PM、DEV斗智斗勇的战士。\n\n\n要摆脱QA的质疑、DEVs的吐槽以及PM的夺命催，除了那些不容易掌控的客观因素，我们可以从自身发力，加强自身的`\"核心肌群\"`，呈现出自己的应有的专业态度，编写出高质量的代码，从而促成高质量的交付。\n\n*如何交付高质量的代码？*\n\n首先，我们可以摆出苦行僧的心态，平日里练就一身好把式：如Clean Code、Refactor、OOD及FOP。即便这样，牛逼哄哄的程序员也不敢说自己的代码百分之百没有缺陷。\n\n怎么办，两个参考原则：\n\n- 编写完代码多问自己一句：\"真的可靠地完成目标了吗？\" 怎么问，写个测试来提问。这便是 **测试覆盖**。\n- 编写代码之前先问自己一句：\"怎么样才算完成目标了呢？\" 怎么问，同样写个测试来提问。这便是 **TDD + 测试覆盖**。\n\n\n---\n\n## 测试能做什么\n要知道测试能做什么，首先我们需要知道测试是什么（它在测什么）？它能给我们带来什么价值？以及人力成本那么昂贵，我们为什么还要花时间去编写这些上不了产品的测试代码？\n\n程序员总喜欢倒腾点代码来开始一个话题：\n\n```java\npublic class StringUtils {\n    public static String toUpperCase(String source) {\n        if (source == null) {\n            return null;\n        }\n        return source.toUpperCase();\n    }\n}\n\n\nclass StringUtilsTest {\n    @Test\n    void convert_to_upper_case() throws Exception {\n        assertThat(StringUtils.toUpperCase(\"unit-test\"), is(\"UNIT-TEST\"));\n    }\n}\n```\n\n这一**小段**测试代码所做的事情是在**验证**`StringUtils#toUpperCase`方法的功能正确性。\n\n顺便用一句话来形容单元测试：\n\n***开发人员编写一小段代码，用于检验被检测代码的一个很小的、很明确的功能是否正确。***\n\n![test-pyramid.png](/images/swd/xp/testing/test-pyramid.webp)\n\n\u003e广义上的测试并不总是像上面这段代码这么简单，熟为人知的 [测试金字塔](https://martinfowler.com/bliki/TestPyramid.html) 将测试分为三大类，单元测试位于测试金字塔底端，旨在传达单元测试应该来得更凶猛一些，而它们正是由开发人员亲手编写出来。本文也是围绕单元测试来开展。\n\n\n---\n\n## 测试的价值何在\n\n经常听开发人员说：\"我对我的代码非常有信心。\"理由往往充分且单一：*单元测试是老大，老大罩着我不怕*。（当然，专业的QA始终能发现DEV很难察觉到的Defect，难免会惊起一脸狐疑：*老大不灵了吗！*回首代码，觉漏某一Case）。\n\n所以单元测试能够**增强你写代码的信心**。都说自信是成功者必不可少的特质。当你对代码充满信心之后，你的潜能无形中被激发（你会发现你敲代码的速度都会变快），这样你工作效率的提高促使你**更加轻松地完成工作**。身心受益便会产生一连串良性的\"蝴蝶效应\"。\n\n测试的两个无形价值就体现出来了：\n\n- 增强我们写代码的信心。\n- 让我们更加轻松的完成工作，身心收益。\n\n再来说说有形的代码。缺陷减少了则证明你的代码质量提高了，代码质量衡量指标总离不开`可读性`、`可扩展性`、`可维护性`。这三个指标的增强反映了良好的代码整洁度、OO设计、模块化等。实践证明，这些良好的设计往往不是一蹴而就的，而当你为一个类或方法编写单元测试却举步维艰的时候，你就应该考虑去**改良你的设计了**。\n\n![value-of-unit-test.png](/images/swd/xp/testing/value-of-unit-test.webp)\n\n理想情况下，编写完的代码应该是可以工作的。但现实并不那么美好，当你在验证代码正确性的时候遇到问题，你就不得不频繁地启用调试模式，而调试正是吞噬你宝贵时间的恶魔。此时我们要拔出单元测试这把神剑，使出浑身解数将恶魔驱赶到尘封的黑暗角落，从而**缩减我们花在调式上的时间**。\n\n那么，测试的两个有形的价值也体现出来了：\n\n- 改良我们的设计。\n- 缩减我们花在调试上的时间。\n\n\n在敏捷开发领域，文档（需求文档，详细设计文档等）是罕见之物。当一个新人半途加入项目的时候，在没有太多文档的情况下，阅读测试代码便是一个很好的开始。当然，前提是我们的测试代码必须是可靠的，并且具有良好的可读性。单元测试的第五项不可小觑的价值就被体现出来:\n\n- 测试即文档。\n\n---\n\n## 不写测试又如何\n\n\u003e 有一种声音：\"单元测试代码写得再漂亮，也终究不是产品代码，在部署到生产环境时会被无情的抛弃掉！\"\n\n所以被这种声音迷惑的人开始信奉了*长（测）话（试）短（少）说（写），短（甚）话（至）不（不）说（写）*的信仰。这只是经过修饰得以传播的一种声音，而背后做支撑的总有那么几大派系。\n\n**无辜派**\n\n- 我并不清楚代码的行为，你叫我怎么测试呢？\n- 这些代码命名都能够通过编译啊！\n\n**个性派**\n\n- 测试代码不是我的工作，这不应该由专门的人去做吗？\n- 公司请我来是为了写代码，而不是写测试的。\n\n**同理派**\n\n- 如果我让QA人员没有工作，那么我会觉得很内疚的！\n\n仔细推敲这三大派系，甩出几个问题就能让这些借口不攻自破：\n\n- 如果连代码的行为都不清楚，写出来的代码意义何在？\n- 通过编译就代表能正常工作吗？\n- 你可以不写测试，但你写的代码不断被QA找出Defect，作为DEV名声信誉何在，难道写出可靠的代码也不是你的职责吗？\n- 公司的确不是雇你来写测试的，那公司是顾你来调试bug的吗？\n- 试问QA会喜欢一个交付的代码存在很多Defect的DEV吗？我想QA也宁愿代码可靠到让他ta `\"无事可做\"`，从而去做一些功能测试、性能测试、验收测试等。\n\n让我觉得值得一提的是**常规派**的看法：\n\n- 编写单元测试太花时间了，项目结束时再说吧！\n- 运行测试时间太长了！\n\n\n*\"编写单元测试太花时间了，等测试结束后再说\"* 听起来是一个很合乎情理的想法。而在软件开发项目上存在一个这样的魔咒:\n\n\u003e一推再推的事情，往往都是不会去做的事情。\n\n不去做的原因可能是重视度不够，被和谐掉了，也可能是最后想去做也没有时间去做。不管出于什么原因，不写测试存在潜在的风险。\n\n实践证明，随着时间推移，产品的功能性的变化趋势受测试代码编写的时机的影响如下图所示：\n\n![productivity.png](/images/swd/xp/testing/productivity.webp)\n\n好想法抵挡不住现实的打击，代码库随着项目的进展越发复杂，由于没有测试的保护，一些不良的设计偷偷溜了进来，代码越发娇气，慢慢地没有人敢去动它。最糟糕的结果可能是，DEVs顶着巨大交付压力，唯唯诺诺的写着代码，而灾难正在酝酿，交付最终失败。\n\n所以只有当测试代码并行于产品代码，甚至可以采用TDD。测试的几大价值才有可能被体现出来，从而能够为我们的产品保驾护航。\n\n另外，如果是因为不熟练而导致编写测试的时间太长，不妨记录一下自己每天花在定位问题和调试上的时间，做个对比，你会发现编写单元测试最终是会为你节省时间的。\n\n\u003e 就我个人经验，半TDD的编码方式，在一个Story上所花的总时间不会多余没有测试裸奔的代码。或许刚开始会觉得有点拖慢节奏，操练多了，它的威力就会彰显出来了。\n\n*测试也写了，可是运行时间太长了又带来了另一个苦恼？*\n\n细谈该苦恼可以单独写一篇文章了。我的确见过测试运行时间很长，每次验证一次跑上半个多小时。下面列举一些测试加速的实践：\n\n- 编写更多的单元代码来代替一些不重要的集成测试和UI测试。\n- 使用Mockito、JMock等工具模拟掉依赖。\n- 并行运行测试，前提是让测试之间保持相互独立。\n- 让CI服务器去跑更耗时的集成测试和UI测试。\n- 使用契约测试来代替微服务之间的集成测试。\n\n\n单元测试运行时间是毫秒级别的，如果耗时过长，你就要留意是否存在内存泄漏、资源未释放、依赖过重或者不依赖容器而启动了容器的单元测试。\n\n---\n\n## 挥之不去的例外\n编写单元测试是一项成本低却价值很高的活动。编写它不会花掉你太多的时间，而运行它更是毫秒间的事情。极限编程推崇者正在使用TDD的方式诠释着单元测试的价值和意义。\n\n它能带给我们信心，改良我们的代码设计，提升我们（DEVs）的声誉，为代码库保驾护航，为高质量的软件交付提供保障。但它终究不是一颗银弹。我们*编写单元测试也无非是一种价值的取舍*，当它给我们带来的价值低于我们付出的成本时，我们就要保持警惕了，比如思考以下两个问题：\n\n- 在追求漂亮的测试覆盖率数字100%的时候，思考一下它真有那么高的价值吗？\n- 在做快速的技术Spike（技术调研），思考一下不写测试是不是能让我更快的试错？\n\n我们要理解的是单元测试背后的核心价值，从而做出正确的取舍。我们要做的是编写出有效的单元测试，让它真正地为我们创造价值。\n\n\n---\n\n\n## 注释\n- Terminal：命令行终端\n- QA：专职测试人员\n- PM：项目经理\n- DEV：开发人员，DEVs表示复数\n- OOD：面向对象设计\n- FOP：函数时编程\n- TDD：测试驱动开发\n- CI：持续集成\n\n"])</script><script>self.__next_f.push([1,"4a:T3cf3,"])</script><script>self.__next_f.push([1,"\n\n\n---\n\n## 情从何起\n最近工作和生活中发生了一些事情，促使我想写点东西，给新人写点东西，何谓新人，后文会有介绍。先来缕一缕最近所发生的事情：\n\n* 去年一个来我们组实习的大一小妹妹（现在大二了），突然 微信 找到我，想从测试转到开发方向，向我寻求建议。\n* 某在校生通过 我的博客 加了我的微信，向我打听从事软件开发行业的一些看法。\n* 某长安大学的硕士留学生（尼泊尔国籍），通过 [LinkedIn](https://www.linkedin.com/in/%E6%85%8E%E5%BB%BA-%E8%A2%81-40ab31104/) 找到我，在奖学金和工作经验的抉择上向我寻求建议。\n* 作为面试官参加了公司周末的面试专场，在面试的过程中，某位面试者编写代码的能力较弱（得分为0），但因为其他方面表现让我觉得潜力很大，遂极力推荐。\n* 我一大学同学花了`1.6W`报名了重庆某培训机构，经过半年的培训，全班18个人3个月未进入就业状态。\n\n---\n\n上述这些事情，有些是我曾经经历过的，比如：`大学时期发现自己没有专业`、`择业方向的选择`、`软件培训机构老师的不专业`，`ThoughtWorks的面试经历`。曾今很迷茫地向身边的人进行求助，如今距离自己踏入软件行业马上4年了，积累了一定的经验和认知，也该将自己的一些想法分享给正在经历这些困惑的新人们。\n\n正所谓`十年才有可能成就一位行业专家`，跟专家至少相差3/5的我不打算分享技术实践，而是给想要进入软件行业以及已经身处软件行业的黑暗角落里摸索的新人们分享一些Tips。\n\n---\n\n## 所谓新人\n我已经多次提起`新人`，我所说的`新人`，涵盖了在校念书的科班生，比如`计算机科学与工程`、`软件工程`、`通信工程`等相关专业的学生。还有非科班生，比如类似我的专业`材料成型及控制工程`的`土木工程`、`经济学`、`管理学`、`汉语文学`相关工科、理科后文科的学生。另外，还有像我在培训班时遇到的半途转行来培训的哥哥姐姐，以及那些纠结于要不要选择进入软件行业的弟弟妹妹们。\n\n最后，`新人`还包括了那些已经上道，却心存迷惘的探索者，就比如说2013年的我。\n\n如果你是我所提到的`新人`之一，希望本文对你有所帮助，如果你不是`新人`，并且也想给`新人`一些Tips，欢迎在文章后留言评论。\n\n---\n\n## 认知误区\n不可否认，任何行业，都存在一些`流言蜚语`，尤其是当今备受关注的软件行业。对于新人，或多或少听过一些，而这些`流言蜚语`也在无形之中影响甚至左右了部分新人的思考和最后的选择。我从其中挑了一些出来：\n\n```\n1. 软件行业薪资高，想拿高薪，就削尖头进入软件行业。\n2. 身体被掏空，青春饭只能吃几年时间。\n3. 花点钱参加一个培训班，随意写写代码就能谋得一份好工作。\n```\n\n我之所以以疑问句的形式罗列出来，因为如果回答是`肯定`的，那就是一种认知误区，至于为什么是误区？下面就据我的经验来回答这些问题。\n\n---\n\n### 高薪蛋糕也得有我的一口\n身边参加软件培训的人数越来越多，女生偏多的`软件测试`，男生偏多的`Java Web软件开发`、`Android开发`、`IOS开发`，一般周期为3~6个月。培训费用从9k~1.8W不等。\n\n需求的增长带来了市场的增长，被冠名为`**速成班`的培训机构犹如异军突起，随之而来的问题是，整个行业从培训班走出来的软件从业人员的专业素没有跟上节奏。因为他们不光想要速成，而且想要速速挣取高薪。可结果呢，真的拿到高薪了吗？真的找到好工作了吗？\n\n不一定！\n\n我所了解的主要有两种，一种参加培训确实是因为真爱，在培训过程中付出了极大的努力，能够踏实从低的起点开始积累历练，显然这种人不是冲着高薪而来的，不过经过几年的积累，他们的薪水快速增长。而另一种是因为不喜欢自己所做的事情（或者觉得工资低），但又不知道要做什么，看着身边软件行业的朋友都拿的薪水比自己高，于是花血本参加一个培训，挤进软件行业，拿了一份比自己之前工资高了不少的工作，可仍然因为没有太大兴趣，没有持续投入提升自己，几年如一日，薪水几乎停滞不前，还要干着自己并没有兴趣的工作。\n\n假如把这两种划分到两个极端的话，那么更多的人是处于这两个极端之间的。\n\n如果只打算混一份较高薪水的人越来越多地充斥在这个行业，必然会导致这个行业的整体质量下降，越来越多的人就失去了本可以在找到自己喜欢做的领域之后去创造社会价值的机会。所以，真的是挤进软件行业就能拿高薪吗？只能说，软件行业的薪资水平相比于其他很多行业高，混迹于行业而缺乏进取的激情，终究拿不到真正的高薪。因为很有可能N年过去，你或许发现你原来行业的朋友已经比你薪水高出很多。\n\n`360行，行行出状元`，相对来说，软件行业目前是高薪行业，但不要仅仅只看到了表面的光环，更多地应该去思考自己是否喜欢（适合）这个行业，即便不是100%真爱，也要`有为这个行业去创造价值的愿望`。如果只为生计，何苦找一个外界看来很苦逼的行业，苦了身体还苦了心。\n\n最后，不可否认，软件行业确实薪资水平要高于其他大部分行业。\n\n---\n\n### 培训班会送一份好工作\n现在软件培训班（速成班）肆起，而专业的讲师却供不应求，不少培训班的讲师鱼龙混杂，良莠不齐。这样一来就会产生一个问题，很多一腔热情的学生，在启蒙阶段，也是最重要的阶段被某些老师给误了。就我个人的亲身经历来讲，我在开始培训之前在网上找了一套黑马的[Java基础教程（毕向东）](https://www.bilibili.com/video/BV1Rt411f7F5)进行自学，然后花了巨款（学生时代的巨款）报名参加了西安尚学堂的培训。黑暗之神也降临到我身上，第一个老师授课水平很低（对比了视频教程的老师以及自学时发现的知识缺失和疏漏）。而我比较幸运的地方在于，我没有被那个老师误得很深，因为我有那套视频教程，加上自己一直啃技术书，而我那是除了一天满负荷的培训，还有自己的培训视频，所以培训期间的晚上和周末几乎都是在消化这些知识。当然，后来在众多学生反馈下，老师被替换成一个学校的名牌讲师（注重传授原理，带着大家去亲手实现框架的原理），后来跟这个老师学习到了很多宝贵的东西。\n\n如果你很幸运，在启蒙阶段遇到了一位良师，要好好珍惜！如何珍惜？无非就是多付出汗水。因为培训班的内容量很大，一天8小时的课程，留给专门练手的时间不多，而这些课程都是承前启后的，一旦前面积累了太多未消化的知识点，越到后面就越吃力了。而消化这些知识就是一个非常有挑战的问题，也是必须要解决的问题。对于一般人而言，只有牺牲大量的课后时间，此时需要将几乎所有的逛街看剧闲聊时间的节省下来，反复地进行编码和思考，直到消化掉当天所学习的知识，这个过程是比较痛苦的，但一定要坚持：\n\n```\n编码和思考，直到消化!\n编码和思考，直到消化!\n编码和思考，直到消化!\n```\n\n最后，不要过于`相信`和期望培训班给你分配工作，已经不是大锅饭的时代了，自由自己能够对你的前途负责，所以扎扎实实将基础打好，多付出汗水，勤加操练，方可在后期游刃有余。\n\n---\n\n### 畏惧身体被掏空\n`双肩包`、`格子衬衫`、`衣衫不整`、`发如干草`、`加班狂魔`、`绝顶聪明`、`目光呆滞`...这些都是曾经或者正在被贴在程序员身上的标签，都在突出一个观念：\n\n```\n程序员，一个苦逼的职业，缺乏个人生活，加班无极限，最终身体被掏空！\n```\n\n真实是这样子的吗？\n\n的确，不可否认，程序员很苦逼。比如说我们众所周知的`大有可为`公司，以及中国互联网三大巨头`BAT`。`你见过凌晨4点的阿里巴巴大楼吗？！`这些新闻Title说的就是苦逼程序员的一部分生活现状。这些足以证明一个事实：`程序员加班是不可避免的！`\n\n可以将加班区分为主动加班和被动加班。先说说何为主动加班？就拿我自己身边的事例来讲，比如上一个新项目的时候，对新的技术栈不熟，那么晚上和周末得花大量时间啃书写代码，一方面提升自己的能力，另一方面能够更高效地开展项目，以及引导后续加入项目的人。又比如，学习新的技术、翻译技术书籍以及写博客等，都会占用大量的业余时间，这个时间不比那些经常加班到很晚的伙伴少，甚至多得多。主动加班需要有一个前提：\n\n```\n热爱你当前所做的事情，以及有强烈的欲望去提升自己。\n```\n\n我个人对被动加班没有太多的经历，但经常听到很多被动加班的事情。被动加班大多是出于以下几个原因：\n\n```\n1. 加班文化，领导没走，我也不敢走，或者公司有不成文的加班规定。\n2. Team给分配的工作量太大，不可能在工作时间完成。\n3. 自己的技术能力不足以胜任当前的工作。\n4. 项目上线前，需要几乎24小时值守。\n```\n\n具体对待加班的态度，因人而异。如果你是崇尚自由，热爱技术的程序员，你肯定更愿意主动加班，所以我不建议你去有浓厚加班文化的企业。我非常推荐你来 [ThoughtWorks](https://www.thoughtworks.com/)。\n\n加班会不会让身体被掏空呢？（这其实触及到养生的范畴了）答案是几乎不会，对于热爱编码的程序员，写代码是一件快乐的事情，只要不连续熬到深夜凌晨（存在一些精力充沛的狂热者经常熬到深夜），注意饮食以及适当的锻炼，不会有太大的影响。当然，如果你不幸加入了一个黑工厂，经常连续加班到12点以后，我建议你果断离职。\n\n另外，像`软件行业吃的是青春饭，干到30就干不动了`这些认知都属于此类。\n\n---\n\n### 劝君更近二行码\n如果你正在犹豫要不要从事软件开发行业，如果你也有以上类似的认知误区，而且阅读完这几条仍然不能解惑。接下来，我提供几条以下参考：\n\n```\n1. 如果你是计算机相关专业，大学期间你应该很清楚自己对软件开发的兴趣。\n2. 如果你不是计算机相关专业，大学期间你应该接触过C语言和Java等类似的计算机二级课程，回忆一下你当时学习这门课程的状态，比如我学习C语言时，我没事就会去图书馆机房敲敲代码，而且很享受实现一个复杂逻辑的成就感，结果期末考试和二级，不用任何小炒，轻轻松松拿高分（后来也是基于这种经历，我果断转行了）。\n```\n\n如果你没有上述两条的经历，那么只有当机立断，采取行动去做初步探索。不要着急掏巨款去报名参加培训班，先自己去尝试写代码，在写的过程中确定自己对它的态度。推荐两种探索途径：\n\n1. 自学。建议从视频教程开始，比如 [Java基础教程(毕向东)](http://yun.itheima.com/course/7.html)。\n2. 试听课。参加一些培训机构的免费试听课程，试听课程的老师一般都是授课能力不错的。推荐`传智播客`、`尚学堂`这类培训机构，其他一些没听过的培训机构。\n\n不管你采取什么途径，勤加练习是不可避免的。不能只做一个听客，动手去敲，将一个个从简单到复杂的逻辑用代码实现，然后收获实现后的成果，不断验证自己的兴趣点。\n\n`劝君更近两行码`，编程高手从来都是源自于不断地操练和思考，勇敢迈出你的第一步！\n\n\n---\n\n## 开启历练\n在中国存在一个较为普遍的现象：`学生上了大学就完成了学习之旅`，所以会有很多当年那么乖巧、勤恳的学生，进入大学后，很大程度上丧失了自我管理的能力，沉迷游戏者居多。而我自己，高考的一次失败虽然让我对游戏产生了抗体，但因为对自己所选的专业（材料成型及控制工程）毫无兴趣，没有好好学习教科书上陈旧的知识。好在我花了大量时间在运动和看其他`有用的`（历史、哲学之类的）书籍上。\n\n我真正意识到危机是在大三快结束的时候，要毕业了，才发现自己缺乏专业技能，如何面对将来的就业。于是就着大一大二的时候对C语言的一点兴趣，尝试去报了一个Java的培训班，开启了自己的软件开发之旅。\n\n参加培训的时候意气风发，也没有想太多，借了巨款去报名后意味着历练的开始，幸运的是后来我确定了自己喜欢软件开发，愿意持续花时间去给自己充电，在提升的过程中享受软件开发的乐趣和成就感。\n\n所以我是在大四的时候才开始真正接触软件开发，如果你大学学的就是这个专业，不讨厌它的话，好好珍惜自己选的这个专业。此时从高中跨入大学的你犹如一匹脱缰的野马，还不知道真的对它有几分爱，需要你在后续的学习中去挖掘它的乐趣。\n\n当时有一位一碰代码就爱不释手的学长，跟我一个专业，在大学期间通过自己的编程实践，参与了[长安大学](http://www.chd.edu.cn/)门户网站的开发，毕业后直接拿到新浪Offer。当然，即便你选的是软件开发相关专业，你在后期学习的过程中发现自己毫无兴趣，至于你要不要继续下去？要看自己的打算，如果你找到其他感兴趣的事情最佳，如果没有那么讨厌，还可以为自己某得一份工作（可能没有太多工作热情）。\n\n大学期间（包括研究生）可以体验很多事情（恋爱、运动、游戏、学生会、兼职等），你如果在这期间同时开启了历练，你就拥有了一个至少比我要早的起点。如果你跟我一样，危机感产生在大三大四，也要勇敢地跳出来去做一个新的尝试和探索。\n\n如果你已经在社会大学摸爬滚打过几年，此时的你应该懂得只有自己才能为自己的选择负责任了。由于起步晚，所以要比别人付出更多，不要吝惜自己的汗水，更不要抱着侥幸心理：`混一份差不多的工作`，如果只是觉得高薪，不妨移步[认知误区](/some-tips-for-newer/#section-2)后再做选择。\n\n---\n\n## 最后\n\u003e说的再绚烂，想得再周全，没有迈出第一步，都是空谈、空想\n\n所以很多时候，有些人具备了想法，只是缺乏一丝丝勇气，有些人具备了勇气，只是缺乏一点点坚持。\n\n1. 当不确定该不该从`测试`转成`开发`的时候，去体验一下`开发`就知道了。\n2. 当不确定自己喜不喜欢编程的时候，写几行代码就知道了。\n3. 当不确定要不要从事软件开发的时候，看一看上文的[认知误区](/some-tips-for-newer/#section-2)，或许也就知道了。\n\n\n\n\n\n\n\n\n\n"])</script><script>self.__next_f.push([1,"4b:T80ff,"])</script><script>self.__next_f.push([1,"\n## 项目回顾\n\n### 项目背景\n\nE项目是一个在线的物资跟踪监控系统。由ThoughtWorks团队为客户提供的一套完善的软件交付服务。\n\n该系统为资助物资的跟踪与监控提供了完整的网络解决方案。整个流程涵盖了客户对物资来源的管控、库存管理、物资下发与跟踪、客户与IP(Implementing Partner，合作伙伴)的协作沟通、IP对运输结果的反馈(生成报告，警告通知，短信互动，邮件通知)，以及IP对物资的二次分发后的记录跟踪与监控。\n\n该项目属于海外独立交付项目，整个开发过程由ThoughtWorks团队负责管理。好了，项目信息只能透漏这么多了，不然客户要找我打官司了。\n\n### 成员背景\n\n我们是一个完整的全功能交付团队(`PM`, `BA`, `TL`, `QA`, `DEV`, `UX`)，团队为颇具代表性的敏捷团队，规模10人左右。客户团队主要接口人3位。\n\n团队成员犹如一架生猛的战斗机：PM英文一流，敏捷开发管理相当到位，因为看了上万本`脑残`小说，时不时就用到了生活中来。TL拥有7年以上的开发经验，7年之痒，什么，不用说都懂的。TL还富有学习激情和被黑精神，黑历史墙列满了他的关辉`血泪史`。QA被誉为IT界的福尔摩斯，DEV都休想逃过她敏锐的鼻子（怎么是鼻子呢？太陶醉了吧，这是境界！），最后，就是`'苦逼'`的DEV，也就是以`程序员`自居的我们。\n\n我们每个人特点各不相同，但有一点神似：`专业，责任心，追求卓越`\n\n我们团队还有一个`workout`的文化特色，向⬇️看：\n\n![](/images/swd/agile/agile-workout.webp)\n\n\u003e PS：我们的`workout`自开始之日到项目交付之期，不曾落下过一天，且收到良好的反馈。即便团队成员分开了，每个人都能将`运动精神`传播下去，乃至源远流长......\n\u003e\n\n### 技术背景\n\n我们是一个全功能团队，人人身怀敏捷开发领域的知识和技能，且有一定的经验积累，所以可以说我们天生敏捷，在开发过程中大家都能高效地分工合作。\n\n再说技术栈，项目使用的主要技术栈是`Python`, `Django`, `AngularJs`, `PostgresSQL`, `Docker`。而我们DEV在进入这个项目之前，擅长的技术栈是`Java`, `Springboot`, `C#`, `Android`, `jQuery`。\n\n## 敏捷实践\n\n\u003e 项目之所以成功交付，核心在于人，而良好的敏捷流程与实践也是不容忽视的。\n\u003e\n\n早在2001年，17位追求卓越的志愿者聚集在美国犹他州雪鸟独家圣地，讨论一个新的软件开发趋势，它被称作`轻量型软件开发过程`，后来他们将它定义为`敏捷`，并且发布了敏捷开发宣言：`一种把以人为本、团队合作、快速响应变化和可工作的软件作为宗旨的开发方法`：\n\n```plain\n个体与交互    优于  流程与工具\n客户协作     优于  合同谈判\n响应变化     优于  遵循计划\n可工作的软件  优于  面面俱到的文档\n\n也就是说，尽管右项有其价值，我们更重视左项的价值。\n```\n\n敏捷开发的核心就是`在一个高度协作的环境下，不断的通过反馈来进行自我调整和完善`。重点强调的是`协作`和`反馈`，协作体现在团队与客户之间的协作，团队成员之间的协作。反馈则是在开发中的任何环节，包括代码质量、自动化测试、部署、项目进度、需求变更、客户验收等，而且反馈越快越好。有句土耳其谚语这么讲的：`\"不管你走了多远，错了就要重新返回\"`，所以我们越快得到反馈，就能越早确认自己有没有走错路。如果没有错，我们会更加充满信心。反之，及时做出调整，让浪费最小化。\n\n项目中所涉及的敏捷实践主要围绕迭代进行，用一张图概括：\n\n![](/images/swd/agile/agile-iteration-flow.webp)\n\n可以总结出以下几点：\n\n+ Iteration通常始于IPM ，止于Showcase。\n+ 每天都会发生事件有Standup 。\n+ Pair、TDD、Code Review穿插在日常Coding中。\n+ Story kick-off之后，该Story就进入了开发环节。\n+ CI属于基础设施，通常在一个名为Iteration0的迭代完成，也就是正是开发开始之前就应该完成CI的搭建。\n+ Retro较长一段时间才进行的活动，根据实际情况，1个月或两个月举行一次。\n+ Regular catch up with client也会因项目而异，Daily或者Weekly，甚至某些项目可以省略该项活动。\n\n敏捷的宗旨是减少浪费，所有的敏捷实践也都是围绕着`高效协作`与`快速反馈`这两个核心理念展开。\n\n### IPM\n\n\u003e IPM(Iteration Plan Meeting)，迭代计划会议主要是跟客户保持沟通与信息更新的一个会议。\n\u003e\n\n敏捷宣言里面有一条：`客户协作优于合同谈判`。在Scrum团队中有一个角色叫做产品负责人，Ta的核心职责是确保业务需求的清晰和透明，保证开发团队对业务有足够的了解，并将这些待完成的业务需求（Story）按照优先级排列出来，按照任务卡的方式来驱动团队的开发。并在客户需求有变更后能够第一时间告知团队以做出调整。\n\n在我们团队中，这个角色就是一开始提到的BA。她是IPM主要参与人，另外还有Tech Lead会一起参与讨论（团队中每一个人成员都是可以参与进来的）。IPM按照团队指定的迭代的周期，通常是两周，每隔两周跟客户接口人一起约一个时间，主要讨论以下几个方面的内容：\n\n+ 下一个迭代的Story。\n+ 对下一个迭代的期望。\n+ 团队的人员可用性。\n+ 风险的评估总结。\n\n通过这种会议，能够让客户对我们团队状况有一个清晰的了解，而且客户对我们下一个迭代要做的功能有了整体的把控，一起设定好期望，这样也会大大降低风险。\n\nIPM的主要产出是下一个迭代中完成的Story，这些Story即为下一个Story要完成的目标，我们通过敏捷看板工具来管理它们，例如下图[mingle](https://www.thoughtworks.com/mingle/)上位于`Backlog`栏中的Story:\n\n![](/images/swd/agile/agile-mingle-board.webp)\n\n### Regular catch up with client\n\n\u003e 跟客户建立信任关系是合作的基础，而让客户保持愉悦，也是项目成功交付的助推剂。\n\u003e\n\nRegular catch up with client，即 `定期跟客户进行沟通`，双方共同商议一个时间（工作时间最佳），一起开个短暂的小会，时间上的成本较低。\n\nCatch up的主要参与人员是BA(PM)和TL，通过于客户方Face2Face会议或者online会议进行一个短暂的沟通，沟通内容主要涉及：\n\n+ 我们团队昨天的更新.\n+ 客户昨天的更新\n+ 确认Story。如果有变更，能及时作出调整。\n+ 提醒客户使用我们开发出来的功能，以便我们尽早得到反馈。\n+ 一些节日的问候，嘘寒问暖，表达我们团队的关怀。\n\n因项目而异，Catch up实践可以大体分为两种：\n\n+ 针对Onsite项目Face2Face形式。因为跟客户在一起工作，就可以较为高效地组织Face2Face的会议，实践证明，Face2Face是效率最高的一种形式。\n+ 针对独立交付项目的Online形式。因为地点、时差等原因，适当调整Catch up的频率，另外选择一个便捷可靠地工具（例如：Fuze, GTM, Skype等），提前设置好环境并分享给客户相关人员。\n\n通过与客户进行定期的沟通，产生的价值主要体现在客户信任和客户关系方面：\n\n+ 首先，让客户有非常强烈的参与感，以及让他们对项目整个进展的把控（他们会觉得自己才是项目的主导者），增强他们的信心以及对我们的信任。\n+ 其次，让客自己决定功能实现以及及时验收功能，降低了需求变更和打回的风险。\n+ 最后，则是润滑剂了，能够在客户良好的信任的基础上，保持合作关系的轻松愉快，这会为项目的成功交付使上劲。\n\n\u003e 并不是每一个项目都会有这个实践，有些独立交付的项目，他们每日站会的时候客户也会参与进来，就不需要额外单独的时间去做这件事情了，而有些项目，因为特殊性，客户可能不希望这么频繁的Catch up，这时候需要团队灵活变通，与客户一起商讨出一个合适的时间周期，做出一些权衡，让客户自身觉得舒服。总之，Keep住的一点是：`保持跟客户的信息沟通，尽可能早的得到客户的反馈，保持良好的客户关系`。\n\u003e\n\n### Standup\n\n\u003e Standup是一项成本小收益大的活动，做好它是敏捷的第一步。\n\u003e\n\nStandup，就是每日站会。我听过一个有趣的事情：在敏捷开发方法兴起的时候，很多传统开发模式的团队跃跃欲试，他们选择从Standup切入。然后每天早上上班后，大家聚在一起开个会（站着、坐着都有），然后该怎么做还是怎么做。他们会对别人说，我们在搞敏捷开发...\n\n没错，Standup就是团队在一起`快速`地开一个会，大家挨个的更新一下自己的状态，更新包含以下几个方面：\n\n+ 昨天完成的工作。\n+ 今天计划做什么。\n+ 面临什么阻碍。\n+ 自己手头Story的进展。\n+ 是否存在技术风险。\n\n既然是快速的会议，Standup的时间就不宜过长，建议5~15分钟。最好是站着开会，因为研究表明，当人们坐着开会的时候，会议的时间会被无形中拉长。Standup的时间安排在工作时间开始后的半个小时最佳（比如9:00上班，9:30开始），这样大家就不用一到公司就急急忙忙的参加Standup，大家有个缓冲的时间，比如说设置电脑，泡咖啡，沏茶，整理今天的todo list等。\n\n没有什么特殊原因的情况下，确保团队成员都要参加，如果一些人因为特殊原因经常不按时到，适当调整Standup的时间，但也不宜太晚。\n\n而对于规模很小的团队（3~5人），也强烈建议执行Standup，因为它的成本真的很低。\n\n或许有人会觉得：大家天天都在一起工作，沟通如此方便，何必要这项活动？ 这有点`深处酒巷中不觉酒香`的味道了。站会能够给团队带来的价值不容忽视：\n\n+ 让大家进入一天的工作状态。\n+ 清楚自己的Story的进展，提醒自己把握好时间，或者激励其他成员的开发进度。\n+ 让团队成员知道项目其他地方的进展。\n+ 如果谁遇到不好解决的问题，可以将问题抛出来，大家一起积极讨论解决方案，也能寻求其他人员的技术支持。\n+ 避免在重复造轮子而耗费时间，让大家知道目前团队中可供复用的解决方案。\n+ 帮助Team Leader了解哪些领域需要更多的帮助，从而更好地分配资源。\n\n下面是我们团队的Standup:\n\n![](/images/swd/agile/agile-standup.webp)\n\n\u003e PS: Standup的时候，选一实物作为Token，发言时拿着Token。上图中我们选择了`瑜伽球`作为Token，逗比们说：健身无处不在~\n\u003e\n\n### Story Kick Off\n\n\u003e 在一个Story开始前，确保`BA`, `QA`, `DEV`对Story的理解达成一致，并严格按照`AC`来验收。当然，前提是Story本身是不容置疑的。\n\u003e\n\nStory kick off，指的是对某一个Story进行开卡，也就是启动该Stroy，从而使其进入开发阶段。Story kick off的时候，通常需要三个角色一起参与：BA、QA以及要开发该Story的DEV。\n\nStory由BA预先写好，并通过专业的敏捷管理工具进行管理。DEV在kick off的时候，BA会给DEV讲解这个Story要完成的功能，以及它的AC。DEV如果对其中的描述有任何疑惑，需要及时提出来，当场弄明白才可以正确的去完成这些功能。在后续的开发过程中，如果碰到任何疑惑，随时找BA或者QA了解清楚，不应该自己猜测着开发，更不可跟着心走。\n\nStory kick off 的核心目的是确保DEV开发出的功能都是符合客户期望的。而Story本身存在错误并不在讨论范围之内。实际上在开发过程中，也未发生过这种情况，因为一旦客户的需求变更后，Story卡也会及时变更过来。Story kick off 可以follow以下实践：\n\n+ DEV自己先完整地过一遍Story的描述。\n+ DEV给BA和QA去讲这个Story的功能以及AC。\n+ 要能够清晰的讲出来，并且三者达成一致，如果有疑惑，需要当场得到解决。\n+ DEV开始开发Story，并自行将Story参照AC拆分成很多个子任务列表，然后逐一干掉它们。\n\n最后一个实践严格上讲不是kick off环节里面的，它发生在kick off后，DEV自行决定怎么去完成功能。我比较推荐DEV在kick off后将Story划分成子任务列表，按照依赖关系和优先级排序，逐个干掉他们。一些敏捷管理工具([Trello](https://trello.com/), [mingle](https://www.thoughtworks.com/mingle/), [Pivotal Tracker](http://www.pivotaltracker.com/), [teambition](https://www.teambition.com/))都支持这种任务拆分，你还可以很容易的记录与跟踪。\n\nStory kick off也是一项短时间高收益的活动，因为在我们DEV界中，有一句邪门的定律：\n\n\u003e 猜出来的需求往往是不靠谱的，最终需要打回重做！\n\u003e\n\n所以kick off能够`有效的避免Dev自行臆测业务需求而产生的浪费`。除此之外，`能够弥补BA在编写Story的时候技术视角的一些遗漏`。\n\n\u003e 一些项目会引入好的开发实践，比如说`BDD`。它能按照人类自然语言去描述一个功能的实现。我们的Story描述通常会参照这种方式: `as...when...then...when...then`。这个时候，DEV、QA、BA可以在Story kick off的时候利用一些测试工具（[Cucumber](https://cucumber.io/)）一起来编写Story验收测试用例（主要由QA来编写），DEV负责编写代码来通过这些测试。理想情况下，验收测试用例如果正确完整，当所有测试都通过后，意味着Story功能已经完成。而且这种`TDD`的方式，代码出现bug的几率也会大幅度降低。\n\u003e\n\n下面是一对Pair做Story kick off：\n\n![](/images/swd/agile/agile-story-kickoff.webp)\n\n### Pair\n\n\u003e 结对编程的开发速度通常小于简单地将一个人的开发速度乘以2，但它依然能创造价值：知识的共享，代码质量的提高，缺陷率的降低。\n\u003e\n\n`XP`里面提到了结对编程，经过事实证明，它是一项利大于弊的实践。\n\n通俗地讲，Pair就是两个人同时工作在同一个Story上，一起讨论Story的解决方案，并编写代码实现功能，一个人敲键盘，一个人看屏幕，穿插着进行。Pair的小伙伴在快速敲击键盘的时候会伴随一些交流，并时不时停下来讨论说笑片刻，亦或是在欣赏一下自己漂亮的代码。\n\n两个人一起写代码即为Pair，那么如何进行高效的Pair呢，也有一些良好的实践：\n\n+ 搭档的选择上，两个人的技能和经验最好是相当的，这样就不至于一个人成为被教育的对象，而另一个人成为键霸。\n+ 有新人加入时，需要一个经验较丰富的老人Pair，最好是有良好Coach技能的老人，老人尽量只提供思路启发，并让新人多思考和动手实现。\n+ 经验相当的Pair时，可以一起讨论解决方案，并达成一致，然后一个人写测试，另一个人编写代码通过测试，两人同时保持focus。\n+ 定期更换Pair，粒度可以控制在以一个Story完成为节点。大一点的Story可以keep住一个人不动，另一个人进行更换。\n+ 遇到技术阻碍时，分头并行寻找解决方案，并最终一起决定采取什么方案。\n+ 当两个人对实现细节的优劣拿捏不定时，邀请团队经验丰富的老人做出建议参考。\n+ 在一些很简单的defect上，可以不采用Pair。\n\nPair将本来可以并行工作的两个人聚焦在一件事情上，表面上是在降低生产力，实际上它确实是有一定的成本的。而这种付出并不会打水漂，最明显的好处是能够最大化知识的共享（尤其是更换pair的场景下）,包括业务知识的共享、技术方案共享、解决问题思路的共享，这一点尤其体现在团队有新人融入的时候，通过Pair能够快速带领新人成长起来，提高整个团队的战斗力。另一方面可以提高代码质量，Pair实际上是两个人一直在不停的做Code Review，两个人的思维碰撞能够避免很多代码小聪明和不好的编码习惯。\n\n有些时候，因为项目进度的紧张，Pair并不会这么理想的被落实，团队可以进行灵活的调整。如果Pair的时间减少了，可以通过加长Code Review的时间来做一些弥补。\n\n下图是我跟TL Pair的剪影：\n\n![](/images/swd/agile/agile-pair-programming.webp)\n\n### TDD\n\n\u003e TDD，测试驱动开发，这项人人都称赞、却很少有人真的去做的活动，不应该只是一个被供奉起来的神。接地气，再接地气一点。\n\u003e\n\nTDD，即测试驱动开发，强调的是测试先行。TDD是一个存在争议的主题，因为在一个连测试的没有的代码库中（多数客户也不关心测试代码，他们通常只想要看得到的功能），它的立身之本就不复存在了。我经历过只有纯手工黑盒测试的项目，没有单元测试、没有集成测试、没有E2E测试（[测试金字塔, Martin Folower](http://martinfowler.com/bliki/TestPyramid.html))，所以TDD无从谈起。我也经历过客户要求测试覆盖率的项目，有专门的测试覆盖率工具([coveralls](https://coveralls.io))来检测代码库，有的甚至集成在[CI](#ci)上作为一个硬性指标。\n\n所以，TDD必须在一个有测试的项目中去讲。它跟我们先实现功能代码后添加测试的过程恰恰相反。我们根据对业务理解，先写一些测试（E2E，Integration, Unit），此时得到运行结果为红色（测试运行失败），然后编写业务代码让其变绿（测试运行成功）。\n\n当然，TDD实践存在一定的门槛，TDD更多地考察一个人的设计能力，所以需要有一定经验的开发人员，而新人往往是很难做到这一点，但这不应该是新人不去尝试TDD的借口。\n\n在实际项目中，可以根据团队自身的条件，灵活采取TDD去编码。就我个人的经验而言，TDD编码的时候刚一开始的时候并不是那么顺手（因为TDD更偏重设计），心里会觉得比较耗费时间，最终Story的完成时间相差无几，而TDD除了有效地降低缺陷率，还有以下三个方面的好处。\n\n+ 从宏观把握Scope，开发人员不会在开发的过程中扩大或偏离Scope。举个例子，开始一个功能点时，一上来添加一个E2E测试，整个Scope在此时就被框定，然后再细分到内部实现，最终以通过这个测试来完成这个功能。\n+ 提高代码的设计。当我们先写测试的时候，就会考虑到被测试的对象要尽可能被方便的测试，此时我们会尽可能的改良我的的API设计，以便利于测试，这样一来，我们写出的代码更具有可测试性，这样的代码往往具备较高的质量。\n+ 确保功能不会被遗漏。我们一开始更多关注的是业务，而不是代码的实现细节，此时写出来的测试会更全面的涵盖不同的Case。\n\n### Code Review\n\n\u003e 不可否认的一个事实：人人都爱整洁的代码。而一个人单独编码难免会耍一些小聪明，或引入一些自身习惯难以察觉的不良代码。Code Review能让你提高警惕，并改善代码的质量。\n\u003e\n\nCode review，检查代码，也叫代码审查，就是开发人员凑在一起来检阅彼此所产出的代码。看看有没有新的代码坏味道，看看有什么不合理的设计甚至是错误的设计，等等。\n\n既然是开发人员凑在一起审查代码，那么Code Review会产生一定的时间成本（根据团队的规模1~2小时 = 5~10个开发人员），所以需要一些良好的实践来确保Code review的高效产出：\n\n+ 团队一起拟定一个开始时间和时长，并落实到位，保证团队成员的参与度和Focus。\n+ 短时间的描述自己的Story业务，主要Focus在代码上。\n+ 持续跟踪记录，并获取反馈。这需要有一个人记录问题（可以按天轮流），结束后交给Owner执行更改，并且下一次Code Review的时候先过上一次的更改。\n+ 必要的时候拉长时间，条件允许下建议在一个有大显示器的会议室中进行。\n\n另外，从团队规模和时间安排上，可以遵循以下两个原则\n\n+ 对于规模很小的团队，可以适当减少Code Review的时间和频率，如果团队经常Switch Pair，也可以适当减少Code Review的时间。\n+ 安排在下班前进行。一方面，大家经过一天的高强度的思考与编码，适当停下来，看看其他人写的代码，同时将自己代码讲解出来，还能意外的获得一些灵感，或许能解决自己面临的阻碍（你所面临的问题可能已经被其他人解决了）。另一方面，如果这个时候发现代码的坏味道，需要改进的地方，下班后可以花少量时间作出更改。\n\n长期的实践证明，Code Review能带来的好处有：\n\n+ 让每一个人提高警惕：自己写的代码并不是只有自己看的，所以要督促自己做好。比如规避不想写测试，代码耍酷等。\n+ 共同找出代码的坏味道（命名规范，代码整洁，API内聚性，面向对象设计），及时做出改正，提高代码库的质量，有助于后期扩展和维护。\n+ 让团队成员知道他人在做什么以及怎么做，分享好的编码习惯和技术实现，有助于团队整体进步。\n\n下面是某个时刻，我们Team四个人正在专注地讨论为一个函数取个更好的名字（猜猜谁是表情帝？？）：\n\n![](/images/swd/agile/agile-code-review.webp)\n\n### Showcase\n\n\u003e 不管客户有多忙，也要定期让客户确认自己的期望是否得到满足。在签订合同前，要跟客户达成一致：Showcase的地位不可动摇。\n\u003e\n\nShowcase就是给客户演示我们上一个迭代已经完成的功能，它的宗旨是及时得到客户的反馈，确认团队的产出是否满足客户的期望，降低需求变更返工的风险。\n\nShowcase从项目开始时周期性地进行，并直到项目交付。这个时间间隔是基于团队设定的迭代周期，我们团队是两周一次。团队跟客户安排一个远程会议（如果是在客户现场，一些参与讨论效果更好），主要涵盖了以下内容：\n\n+ 跟客户确认上一个迭代的Story列表。\n+ 项目目前的交付状态。是否正常进度，会不会延期。\n+ 演示上一个迭代完成功能。在线系统演示，需要一个staging环境。\n+ 客户对功能确认，对达到期望的story签字，反之。我们记录下问题，并修改，再次确认签字。\n\nShowcase的目标是客户，需要针对不同的客户有不同的策略。如若客户觉得每两周一次过于频繁，团队可以变通调整迭代周期，通常建议的是1~4周，不宜太长，太短也没什么效果，至于如何权衡这个时间，有两点可以参考：\n\n+ 在探索中找到适合团队的迭代周期，如果发现每个迭代时间不够用，要么是story划分太大，要么是迭代周期太短，这时需要根据几次的平均结果做出调整，适当扩大迭代周期，或者更合理的拆分Story。\n+ 如果Showcase的时候功能背离了客户的期望，通常是因为迭代周期太长。因为用户的需求以及团队对需求的理解都在随着时间的推移而变化，导致发布时的产出并不是客户需要的。这个时候，可以考虑适当缩短迭代周期，让反馈来的更快更舒缓一些，而不是更慢更猛烈。\n\n试想一下传统瀑布开发模式下，一个功能的演示通常安排在在某个里程碑节点，此时项目或许开展了半年或一年甚至更久，客户这个时候见到自己的系统，简直会惊叫起来，原来这压根不是他们想要的东西（因为客户一开始都不知道自己要什么），即便开发团队严格按照预先的设计文档。这是一种时常发生的灾难，它导致大量的浪费，且很难挽救。\n\n敏捷开发可以规避这种灾难性事件的发生。而Showcase在敏捷开发中是一个不容忽视的环节，它契合了敏捷宣言中的`拥抱变化优于遵循计划`。Showcase能够让团队在每个迭代完成后及时从客户那得到反馈，对变化做出快速的响应，避免了劳动成果的浪费以及方向的偏离，也能最大化让客户的期望得到满足。\n\n为了达到更好的Presentation效果，Showcase通常提前准备一个总结性的Slide来引导整个过程的推进，结束后该Slide即为产出的一部分，另外也会有一封总结性的邮件来跟踪记录Showcase的结果。\n\n### CI\n\n\u003e 没有CI的项目开发是在耍流氓。CI在Agile中是一项最基础的设施，它通过自动化来提供有效的反馈机制以及高效的部署，大大降低代了码集成和项目交付的风险。\n\u003e\n\nCI，持续集成。在敏捷开发中，它是一个项目开始前`必须`搭建起来的基础设施。当代的软件开发项目中，几乎没有项目是只有一个人在开发的。超过一个人就形成了团队，每个人同时并行开发不同模块的功能，这就涉及到代码的集成，所以代码集成是几乎所有开发团队都要面临的问题（一个人的开发项目不在本文范畴中）。\n\n持续集成跟团队开发人员独立开发没有冲突，相反，借助一些工具（[Jenkins](https://jenkins.io/index.html), [GoCD(ThougthWorks开发)](https://go.cd/), [Travis CI](https://travis-ci.org/)），它能快速的对我们开发人员提交到代码库的代码作出反馈。开发人员每天都在代码库提交代码，版本控制工具（比如[Git](https://git-scm.com/download/)）在提交前必须更新代码库最新的代码（解决冲突，代码合并，应用更改），然后将代码提交到代码库中。这个过程是代码集成的第一步，最重要的是如何确保这些集成是可靠的，以下是一些关于CI的良好实践：\n\n+ 开发人员对自己编写的代码添加足够的测试覆盖率。这是基本，基本最无敌：一来验证代码的正确性，二来防止被误更改。\n+ 每个人提交代码到代码库之前在自己的机器上保证单元测试都能通过，很耗时集成测试和E2E测试可以更多的交给CI去跑。\n+ 借助一些CI工具（见上文）,将代码集成的结果反馈展示在团队所有人都能看到的Dashboard上，一定要大家都可以看到。\n+ CI定期检查代码库的更新，只要有更新，就要运行所有的测试。这里有个权衡：不耗时的单元测试每次全部运行，集成测试也要频繁的运行，耗时的E2E测试可以稍微执行少一点（比如设置夜间执行）。我们这个项目，是每次检查到更新就会运行所有的测试（单元测试+集成测试6分钟，E2E测试30分钟）\n+ CI如果没有通过，所有人都应该停止向代码库中提交代码，直到CI被修复，所以如果CI挂了，能够及时通知相关开发人员，要第一时间修复。\n+ 所有测试通过之后，CI负责自动化部署到不同的环境（Test，开发团队测试环境；Staging，客户ShowCase环境；UAT和Production，用户验收测试环境和生产环境，通常开发团队没有权限），并正常启动所有的服务。\n\n通过这些实践，CI能带来的价值也是相当可观的，主要体现在五个方面：\n\n+ 减少重复的过程。CI通过自动化，将一些需要重复执行的操作（代码审查、编译、测试、构建、部署）自动化管理起来，大大减少了重复的过程，节省了大量的时间。\n+ 降低风险。开发过程中，每天进行多次集成，并且添加了足够相应的测试，每次集成CI都会快速检查代码中的缺陷并提供及时的反馈，降低了未知的风险。\n+ 可视化。CI提供了大量真实且最新的数据，能够让我们关注当前集成的趋势（例如构建时间、构建失败比例、测试覆盖率等），有利于有效决策。\n+ 增强团队的信心。每次构建的结果都是公开透明的，所有人清楚地知道自己的每次提交改动对软件所造成的影响。\n+ 随时随地可以生成可部署的软件（CD）。对于客户来说，可以部署的软件产品是最实际的资产，而CI让我们可以在任何时间发布可以部署的软件。\n\n\u003e 可以借助一些工具，比如Chrome插件[BuildReactor](https://chrome.google.com/webstore/category/apps?hl=en)可以将CI的多个Pipeline集中展示出来。\n\u003e\n\n下面是我们CI的Dashboard，使用了一个Chrome插件[BuildReactor](https://chrome.google.com/webstore/category/apps?hl=en)（如果加载不了就说明需要翻墙）将[Go](https://go.cd/)的多个Pipeline集中展示出来。\n\n![](/images/swd/agile/agile-ci-dashboard.webp)\n\n### Retro\n\n\u003e 团队专注于交付目标，埋头干活的同时，也要懂得停下来总结过去，并更好地抬头看路。\n\u003e\n\nRetro是Retrospective的简写，即回顾。团队通常以回顾会议的形式进行，大家坐在一起，对过去的这段时间里，我们Team的工作状态（团队合作，技术实践，团队氛围等）做一个总结，它有一点基本思想：`对事不对人，大家思想自由Open`。如何做到这一点，下面是我们Team的实践：\n\n+ 确认构建安全的环境。什么意思呢？就是每个人都是觉得当前的会议是可以自由发表意见的，而不是因为某些人（比如说不友善的Leader）而不敢发表意见。开始前每个人对安全系数打分，1~10分，如果平均分数偏低（比如低于6分），需要将Leader从会议中\"驱赶出去\"，直到大家觉得安全了才好。\n+ 建立几项总结指标（Well, Less Well，Suggestion，Action），大家分别对前三项提出自己的看法。第四项是综合所有前三项的结果总结出来后面要做的事情。\n+ 使用Sticker纸片，最好是用马克笔写（这样一张Sticker就不能泛泛无边的写），一张Sticke写上一个点的内容即可。\n+ 编写Sticker内容的时间控制在5分钟以内，每个人自己将Sticker按照分栏贴好，然后Facilitator（通常是PM或BA）开始带着大家过每一栏的Sticker，对Less Well栏中，将同一类的问题归纳起来，总结出相应的解决措施。\n+ 将Action栏中的Sticker指派Owner，并落实。\n+ 如果跟客户关系融洽且相对容易参与进来，可以将客户Involve进来，然后一起构建一个安全的环境（有可能因为大家的打分较低，客户不得不\"出场\"，所以客户参与不是必须的）。\n\n`说得天花乱坠，没有行动，犹如竹篮打水`。Retro这个环节最核心的产出物是`Action`，团队共同一致商量出来的措施，有没有效果就在于行动了，所以Action分配了Owner之后，一定要跟踪这些Action有没有落实执行。一方面，需要Owner拥有高度的责任心和执行力，尽职将这些Action落实执行。\n\n\u003e Retro的细节因团队而有些差异，而它的理念是一致的：`总结过去，做的好的方面继续保持及加强，做的欠佳的方面一起讨论改进措施，并尽全力落实`。Retro让团队在实践中摸索出适合团队的最佳实践，引导团队和个人不断自我完善，追求卓越。\n\u003e\n\n我们Team的一次Retro\n\n![](/images/swd/agile/agile-retro.webp)\n\n## 总结\n\n这是我参加的一个关于敏捷实践很完善的项目，个人亲身经历了这些，深深体会到这些敏捷实践带来的益处以及个人的成长是非常大的。敏捷很好，但不只在于这些流程形式，在形式背后，我们应该深入思考这些实践是否真的让团队变得高效？让交付变得更加顺利？每个团队都是不同的，不必拘泥于这些流程形式，而是要追求这些流程产生的真正价值与意义。\n\n\u003e PS：文章中提供的链接在有网络的情况下如果不能访问，确认自己是否可以翻墙，如不可以，切勿较真。\n\u003e\n\n## 术语注释\n\n+ PM：Project Manager，项目经理\n+ BA：Business Analyst，业务分析师\n+ TL：Technical Leader，技术领导\n+ QA：Quality Assurance，测试人员\n+ DEV：Developer，开发人员\n+ UX：User Experience，用户体检设计师\n+ AC：Acceptance Criteria，验收条件\n+ UAT：User Acceptance Test，用户验收测试\n+ Retro：Retrospective，回顾会议\n+ TB: Team building，团队建设\n\n本文于2017-02-26发表到 InfoQ中国\n\n[我在ThoughtWorks中的敏捷实践-InfoQ](https://www.infoq.cn/article/my-agile-practice-in-thoughtworks)\n"])</script><script>self.__next_f.push([1,"4c:T246c,"])</script><script>self.__next_f.push([1,"\n\n\n---\n\n## 匆匆那年\n翻开自己的博客，重新读过 ThoughtWorks，我的2015\n 这篇文章，感觉那时的我像是一个小孩吃到了期盼已久的糖果果，好奇心得到满足，并且也体会到了糖果的来之不易，拥有后倍加珍惜，而且享受其中。2015年，经历了`入职`--\u003e`Shadow(Off Shore)`--\u003e`On Beach`--\u003e`国内出差`--\u003e`国外出差`--\u003e`Billable(Off Shore)`，转了一圈又回到了Off Shore。这一回就是一年有余，从去年11月份到现在，整个2016年，相同的是我一直在作战在同一个Team中，不同的是：\n\n* 项目： `E`--\u003e`P`--\u003e`C`--\u003e`P Phase2`\n* 角色： `Dev`--\u003e`Android DEV`--\u003e`Core DEV`--\u003e`Tech Lead`\n* 技术： `Angular JS`--\u003e`Python(Django)`--\u003e`Ruby(Rails)`--\u003e`Android(Java)`\n* 组名： `Dingo`--\u003e`Dinpo`--\u003e`CSCI China（Xi'an)`\n\n除了这些枚举出来的变化，还有很多的不一样，心态变得不一样了，生活状态变得不一样了，感情状态变得不一样了，等等。唯一不变的是：`一切都在变`。2016年，感觉时间过得飞快，如果非要用一个词来形容，那就是两个字，`匆匆的2016`。\n\n---\n\n## 不忘初心\n作为一名ThoughtWorker，追求卓越，为公司和可客户创造价值始终是第一目标，当然还有一个并列的第一个目标是：`提升自我，实现自身价值`，而这些都胜不过 `让世界变得更加美好` 的伟大愿景。用一句广告语讲就是：`因为你，世界便多一份美好`。所以，ThoughtWorker不会忘记初心，始终坚守在追求卓越的战线上，直至趴下。\n\n说得有点壮士断腕的感觉。这让我想起面试时郑烨问我的那个问题：`当你发现你所遭遇的场景并没有你想象得那么理想时，你会用你自己的努力去改变着它，让它走向卓越吗？`虽然看似一个选择的，甚至不用动脑筋都能回答`会`，可这一个字包含了太多的意义，而这一年我也深刻感受到了其中的滋味。什么滋味，这就要深入实际工作中来。\n\n---\n\n## 坚守战线\n2016年初，对`E`项目进行了一个收尾总结，`E`项目上的坚守给我提供了很多真实素材，才有了那篇 我在ThoughtWorks的敏捷初体验 的输出。这个项目上，每一个人都以及其专业的态度，坚守在敏捷战线上，Dev追求代码整洁、测试覆盖率等等，Code review、Pair、TDD、CI这些敏捷实践也都善始善终。这些离不开每一个ThoughtWorker的追求和付出。\n\n而`Primero`项目切换到Android这个新的技术栈（新是因为Team中没有Android Dev），在 [ThoughtWorks](https://thoughtworks.com/) 里面，编程语言技术栈的切换大家司空见惯了，所以都不是什么问题，即便像我这样没有做过Android项目的Dev，经历了这次项目，在Android开发技能和最佳实践上从一只小白鼠转变成一名很嫩的`老司机`。所以，Android技术栈没有造成多大的阻碍，最大的问题是Android开发的一些最佳实践，比如：测试、架构、组件交互、第三方类库使用等等，这些都是经验积累出来的。而这也是我们Team比较欠缺的。另外加上项目周期很短，所以大家在较大的交付压力下，并没有太多时间去学习尝试自身还没有掌握的最佳实践。\n\n在开发过程中，`系统架构不清晰`、`测试覆盖率低`、`类库的使用不当`、`组件交互不良设计`都是我们面临的问题，一边是紧张的交付压力，一边还要探索并不断地推翻原先的设计，这犹如雪上加霜。但我们始终没有放弃，始终追求最佳的设计和实践，一旦发现之前的不合理，我们会做出评估，然后努力将其改善优化。整个项目开发过程很累，但这个过程中，我的成长也是极大的，一方面，在极短的时间内学会了Android的开发技能（很久之前，自己系统学习过Android，而这次付诸实践），另一方面也让我更加坚定去坚守初心。\n\n最终，我们的坚守成功地交付了`Primero`，并获得了客户的认可，这离不开Team中每一个ThoughtWorker对卓越的追求。\n\n现在Primero启动了2期，现在我们的战力以及大大提升，我们仍然会一如既往地坚守战线。\n\n\n---\n\n## 独特的旋律\n\n\u003e活到老，学到老\n\n自从加入 [ThoughtWorks](https://thoughtworks.com/) 后，`持续学习`的旋律就奏起，从此她就成了一支独特的旋律，时而高昂、时而低沉、时而欢快、时而悲怆......，当然大部分都是平和的，而且它没有终止符。\n\n在 [ThoughtWorks](https://thoughtworks.com/) 这个学习型组织中，几乎每一个人都在自我充电，提升自己的技能，提升自己的影响力，这种环境的力量是无穷的，犹如一个漩涡，我也被卷在其中。\n\n---\n\n### 持续集成\nCI、CD，这是我加入 [ThoughtWorks](https://thoughtworks.com/) 后一直关注的主题，从刚加入时参加的CD Workshop后的启蒙，到`Primero`上搭建CI所解决的各种问题，我对CI已经深有体会，并且探索出一些最佳实践，通过项目上的使用和总结，并将其在通过 Dojo 的方式进行分享。\n\n---\n\n### 英语\n英语是我的一个弱项，听说读写拍个次序的话就是读、写、说、听。我购买了一对一的私人外教的学习来提高自己的语感。除了这个课程，我和另一位同事一起翻译了《Learning JavaScript》，现在已经完成了翻译，离出版应该还有一段时间。\n\n中间历时8个月左右，业余时间完成。因为是首次翻译，而英语也不是我的强项，好在这是一本干货，鉴于自己薄弱的JavaScript基础，坚持将整本书翻译完成。整个翻译过程收获了JavaScript相关技能（ES6），英语阅读和中文组织能力也有大幅度提升，而最重要的是，在整个过程坚持不懈，每天去完成一点点，每天进步一点点，对来说也是一次极好的修炼，让我更能沉下心去做一件事情，去除浮躁。感谢我的Sponsor [邱大师](http://icodeit.org/about-me/) 推荐的机会。\n\n---\n\n### 点点滴滴\n追求整洁代码，热衷于TDD，坚守敏捷实践，积极参与到公司的活动中（面试、培训、运动会、户外运动等），点点滴滴，我一直在前进，过程中压力一直形影不离，这种压力让我真正感觉到`有压力，就有动力`的含义。\n\n虽然目前在公司和社区的技术影响力还没有build起来，但一直没有放弃努力，一直在积累，借由一句话来慰藉自己的努力：`每天进步一点点，靠近一点点`。\n\n---\n\n## 不一样的生活\n\u003e越努力，越要学会享受生活\n\n`工作忙得连饭都吃不上`，我不认为这种状态是一个真正热爱工作的人应该具备状态，而我在身边听到一种好的回答便是 `越忙，越要健身`。\n\n而我自己主张的是 `越努力，越要学会享受生活`。那么这 `享受` 两字就有不同的解读了。先说说我身边的例子：\n\n```\n0. 练过武术，坚持早睡早起（22:00+ ~ 6:00+），并且出版了好几本技术书籍。\n1. 经常下班时间跟客户开各种会议，节假日待到一个咖啡馆或者书店去完成工作，但会经常健身，小长假跑到一个环境极好的地方旅游，当然还要晒幸福。\n```\n\n还有很多这样的例子，比如一些人工作很牛逼，还能保持健身，拥有良好的饮食和作息习惯，精神状态极佳，各方面都很出色。这种状态应该也是很多人都向往的，但现实生活存在很多阻碍，比如说健身。要么没时间，要么没精力，要么去健身房嫌麻烦，要么有孩子牵绊，等等。\n\n其实只差一小步，迈出右脚的那一小步。真的很花时间吗？很多人一天浪费远远不止一个小时的时间，而健身半个小时已经能达到不错的效果。真的没精力吗？因为习惯了食多动少，暴饮暴食，身体的机能走的是下坡路，导致越来越缺乏精力，而运动就可以激活身体机能。去健身房真的麻烦吗？其实健身无处不在，工作中，家里，路上，休息等，而最近比较流行的keep里面提供了很多免费的指导。那么孩子呢？这个问题，因为没有孩子，不做发言，不过我相信，很多有孩子的人能做得很好。\n\n说了这么多，想表达的是：要有不一样的生活，努力工作就是为了更好的享受生活，让工作服务于生活，而不是生活只为了工作。\n\n---\n\n## 感恩有你\n一如既往，身边很多非常优秀的同事一直在给我注入正能量，有年幼的PM、低调的总监、牛逼的Android Dev、大师级的Sponsor、战斗机型的QA。跟一群优秀的人在一起工作久了，自己也在向优秀靠近，感谢有你们，感谢 [ThoughtWorks](https://thoughtworks.com/) 这个大家庭。\n\n---\n\n## 给自己一个赞\n2016，已成为历史，这一年，努力着，进步着，也一直坚持健身，同时跟自己喜欢的女孩一起变得越来越好，给自己一个赞。\n\n---\n\n## Keep 2017\n\u003e有人问我健身的秘诀，我回了两个字 \"**坚持**\"\n\n2017，**Keep** Going:\n\n![image](/images/career/2016-keep-review.webp)\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n"])</script><script>self.__next_f.push([1,"4d:T4709,"])</script><script>self.__next_f.push([1,"\n\n\n\n\n---\n\n## Buddy/Sponsor是什么？\n`Buddy`，正如这个词的意思，小伙伴，好朋友。记得加入[ThoughtWorks](https://thoughtworks.com/)的时候，大家在公司内部的Session和微信群里喊的最多的是小伙伴。慢慢地我发觉一个现象：几乎每个人都把同事当成自己的小伙伴，大家相处很友好，互帮互助，整个氛围像个大家庭。试想一下，一个刚加入TW的新人，对TW的组织文化和做事方式充满好奇，自己的定位和发展还很茫然的时候，这时候ta被告知：“Hey，你不孤单，你有一个小伙伴，ta将`陪伴`你度过半年的试用期......”。陪伴，不仅仅是存在这个小伙伴，而且小伙伴要对你的成长负一定的责任，指导帮助你更快的融入到这个大家庭中来，让你成为一名合格的TWer。\n\n`Sponsor`，这个词的含义有点意思了，赞助商？保证人？貌似都不是，赞助什么呢？要赞助也是公司给你赞助。保证什么？保证你不会离职？所以单从中文意义上讲，好像不是很表意，将它理解成负责人更确切一些。对于一个在[ThoughtWorks](https://thoughtworks.com/)顺利度过半年试用期的TWer来说，此时证明你已经是一个合格的TWer，接下来，你需要一位能够在你的TW职业生涯中给出有效指点的帮助的人，`Sponsor`对你今后在TW的生涯成长中负有一定的责任，帮助指引你朝自己想去的方向发展，成长为更好的自己。\n\n---\n\n## Buddiee/Sponsee是什么？\n`Buddy`和`Sponsor`帮助指导的对象则为`Buddiee`和`Sponsee`，一个`Buddy`可以带多个`Buddiee`，同样一个`Sponsor`可以带多个`Sponsee`，Buddy/Buddiee的适用范围是刚加入[ThoughtWorks](https://thoughtworks.com/)到成为合格的TWer前，Sponsor/Sponsee适用范围是转正后到终身的TWer（TW是终身合同制）。\n\n---\n\n## 为什么要设置Buddy/Sponsor？\nBuddy/Sponsor这种机制本质上是传统企业普遍存在的`师徒制`，只不过在它在[ThoughtWorks](https://thoughtworks.com/)中得到了进化：任何时候你都有一个师傅指引着你，你有同样的义务和责任去带好徒弟。它是一个重视人才培养的学习型组织中能够高效培养出高质量人才的一种机制，而[ThoughtWorks](https://thoughtworks.com/)就是一个这样的学习型组织。\n\n在人力资源管理方面，Buddiee/Sponsee机制的意义在于：\n\n```\n1. 帮助新员工更快、更好地融入大家庭中来，降低新人培养的成本。\n2. 让新人能够及时的跟上团队的步伐，形成团队的“梯队建设”，提升团队的战斗力。\n3. 通过帮助新人成长，师傅能够收获更多职业成就感，也促进师傅自身能力的提高。\n4. 古人云：”一日为师，终身为父“，相处过程中建立了良好的信任合作关系，降低了离职的风险。\n5. 有效地师徒监督培养机制能够提高人才的质量，要知道，优秀的人总是会吸引更多优秀的人。\n```\n\n对于Buddy/Sponsor来说，除了自身能力得到了持续的提升，还具有较大的社会价值。因为一个人能够将自己的经验阅历分享出来帮助更多人一起成长、甚至成功，是一件多么功德无量的事情。在佛教中，布施有三种境界：一是`财布施`，即施人钱财，替人排忧解难；二是`法布施`，即传授做人做事的道理和方法；三是`无畏布施`，即激励别人，给人带来希望，让人无所畏惧的生活。在企业的师徒制中，作为一名合格的师傅，应该努力让自己做到`法布施`和`无谓布施`，至于财布施，更多的是私下生活中的的范畴了。要做到`法布施`和`无谓布施`，师傅要严于律己，以身作则，并不断提升自己。\n\n\n企业中师徒制面临着两个问题：`不愿带`和`不愿跟`。考虑到师徒的性格习性等诸多因素，在[ThoughtWorks](https://thoughtworks.com/)中师徒的结合是有一定的自由度的，类似于企业招聘人的时候存在双向选择（通常Sponsor/Sponsee是可以双向选择）。而且并不是一旦定下就不可改变，可以根据个人的成长方向选择适合自己的老师，最大化发挥师傅的价值。\n\n---\n\n## Buddy/Sponsor的使命\n既然你能做别人的老师，既然别人愿意跟着你学习，那么你就应该具备一技之长，有值得别人学习的地方。老师要肩负着一系列责任和使命，从大方面讲有三个点：\n\n```\n1. 传递企业的价值观和文化理念。\n2. 解答企业的管理制度和流程。\n3. 在工作上提供技能帮助和指导。\n4. 在生活上提供关怀（非必须）。\n```\n\n所以对师傅的要求也是有的：\n\n```\n1. 态度，首先态度上是认可上面几个方面的，并且具备积极良好的工作态度。\n2. 责任心，对自己的Buddiee/Sponsee的成长负责，同时要对自身负责。\n3. 认可，认同公司的价值观，了解公司的文化理念。\n4. 全面，熟悉公司的管理制度和工作流程。\n5. 能力，工作技能上拥有一技之长，或软技能，或硬技能。\n6. 加分项，富有同理心和恻隐之心。\n```\n---\n\n## 我的Buddiee之旅\n我于2015.03.26正式加入[ThoughtWorks](https://thoughtworks.com/)，在这之前的一年时间里我跟TW有一段小渊源（了解到TW-\u003e加入TW-\u003e赴创业路-\u003e正式加入TW）。HR指引我去见`Dolphin`组的`杨栋`（皮肤黝黑，印度哥，栋哥），接下来我就shadow在这里，一开始颇有些迷茫，不久后的一天，我收到一封邮件：我有`Buddy`了，是美丽大方温和的`于婵婵`（CC）。此时我并不知道这意味着什么，紧接着映入我眼帘的是邮件下方列出多条关于`Buddy`的职责，我十一分认真地看完，伴随着心里有底了，原来她会对我试用期的成长提供指点和帮助，差点高兴坏了。\n\nBuddiee之旅起航了，接下来的六个月的时间里，我有三个月在西安办公室度过，一个月在珠海度过，两个月在新加坡度过，工作场所的变更就像一场旅行，而Buddiee之旅目的地未变。CC一直很关注着我的成长，而我更像一个不懂礼貌的弟弟，有问题就找她，问题涵盖了项目信息、公司文化、技能成长以及生活旅游方面。而她像一个有问必答的姐姐，自己解答不了的她会找人帮我解答，她对公司很了解，一直激励我提高对自己的要求，努力成为一名优秀的程序员。\n\n到我转正那天，我的Buddiee之旅名义上结束了，但我心里还是认为CC是我的Buddy。非常感谢CC给予我的帮助的指导，这期间，她还给我组织了几次Inerview++。\n\n---\n\n## 成功的Buddy/Sponsor具备的特特质\n\n* `能力强` `责任心` `安全感` `真诚` `口碑好` `亲和力` `同理心`\n\n* `经验丰富` `自我驱动力强` `积极主动` `关怀/关注buddiee/sponsee`\n\n* `能力强`  `责任心/担当` `经验丰富` `情商高/沟通好` `积极主动` `宽容` `耐心倾听`  `Geek/技术热情` `影响力` `对公司文化很了解`\n\n* `能力强` `靠谱` `善于鼓励` `同理心`\n\n* `能力强` `责任心` `鼓励` `同理心`\n\n这些标签都是这次培训中大伙给成功Buddy/Sponsor贴上的（已过滤掉一些重复或代表性不大的标签）。说起培训，简单介绍一下这次培训：\n\n```\n培训于05.08日进行了一整天，培训的讲师叫郭志辉，一个了不起的知性姐姐（或者阿姨），主题为《构建信任》。期间，小伙伴们分为5组，所以你看到上面有5组标签。关于培训本身，这里我不想介绍太多。\n```\n从5组小伙伴给出的标签很明显能看出，`能力`是最重要的，毕竟是一个追求卓越的专业服务公司，拥有专业的技能是我们的立身之本。而作为一个师傅，自己有了足够的技能方可传授技能，同时师傅应该努力将自己的技能通过更多的途径分享传播，扩大自己的`影响力`。且说能力，并不是要求一个人一开始就具备多么高水准的能力，比如对于一个进入职场不久的小伙伴，更看重的是`学习能力`和ta的工作态度，不管是`学习能力`还是`专业`、`积极`的工作态度，都属于个人能力中的一部分。\n\n一个具备较强能力的人不一定就会是一个合格的师傅。比如我们会听到不少能力强的人恃才自傲。还有一些人喜欢耍小聪明，缺乏责任心。所以合格的师傅要求有较强的`责任心`，对自己的工作负责，对自己的Buddiee/Sponsee的成长负责，敢于`担当`，一个富有`责任心`的人也往往能够给人带来`安全感`，让人觉得很`靠谱`。\n\n师傅的主要职责在于coach，良好`真诚`的`沟通`能够有助于这个过程的开展，另外若能抛开传统观念“师傅在上，凡事坐等学徒上门请教”更好，平时多留心，多`关注Buddiee/Sponsee`，`积极主动`地给Buddiee/Sponsee提供良好的建议和指导，并`鼓励`Buddiee/Sponsee来找自己探讨工作上的问题，鼓励他们挑战困难。\n\n新加入的小伙伴对公司的文化和价值理念可能不是很了解，这就要求师傅`对公司文化很了解`，能够做到快速的传达个新人。同时我们是一个有包容心的企业，Buddiee/Sponsee一开始难免会犯一些错误，对他们犯的错误多多`包容`，最重要的是在他们犯错的时候，不要一味着拿工作表现说事，应当`耐心倾听`他们的心声，持有`同理心`，多`关怀`他们生活中的遭遇，因为很可能是因为他们生活上一些不幸遭遇让他们犯下一些错误，而这些错误不具有危害性。\n\n\u003e所有人都觉得运动健身很好，但很少有人真正去坚持做了。\n\n一个人要不要做什么，最核心的是自己有没有欲望去做。`我要做`和`要我做`，都可以把一件事请完成，而`我要做`更强调的是一种`自我驱动`，`要我做`可能更像是完成一项工作任务。比说，我最近在翻译一本技术书，工作任务中并没有这一项，翻译都是利用业余时间完成的，这是一门苦差，需要一种自我驱动力去坚持做好，又比如说健身、学英语......\n\n`热爱你当下的工作`是我觉得最美好的状态，喜欢自己所做的事情，`work for fun`能极大的强化`自我驱动`力，在辛苦付出的同时收获乐趣和成就感，活在一种`累并快乐`的状态中。所以，在TW我能看到不少对充满`技术热情`的`Geek`。\n\n我用一句话概括一个合格Buddy/Sponsor应该具备的核心素质：\n\n\u003e一个合格的Buddy/Sponsor，应当认同公司文化价值观，对工作充满热情，具有较强的工作技能，富有责任心和同理心，积极主动地关注Buddiee/Sponsee的成长，善于倾听并有效地激励Buddiee/Sponsee。\n\n---\n\n## 小伙伴心中的Buddy/Sponsor\n实践是检验真理最好的手段，听一听实际工作生活中，小伙伴们的Buddiee/Sponsee之旅过程的体验和总结，这些是最货真价实的营养品。作为已经是Buddy/Sponsor或即将是Buddy/Sponsor的小伙伴来说，扬长避短，对着一面镜子，更好的认识自己，让自己变得更好。\n\n### 成功的例子\n* 以身作则，榜样的力量\n* 仔细倾听，并给与可行的建议\n* 帮助收集别人的反馈\n* 主动约饭、沟通\n* 给出Expectation，关注Buddiee/Sponsee的成长轨迹\n* 帮助留意适合的机会\n* 鼓励Buddiee/Sponsee去挑战，挖掘潜力\n\n\n* 生活中的关怀\n* 工作中的帮助指导\n* 帮助争取机会\n* 尊重过去的经历\n* 共鸣\n* 直接反馈\n* 制定提升计划\n\n\n* 分享自己心路历程，坦诚\n* 遇到Challenge时能够聆听自己\n* 高质量的Catch up\n* 鼓励Buddiee/Sponsee去挑战，挖掘潜力\n* 积极主动指导对方\n\n* 反馈直接透明\n* 可以帮助解决问题\n* 给与足够的自由空间\n* 沟通良好\n* 平等尊重\n* 以身作则\n\n\n\n### 不成功的例子\n* 不主动\n* 太结果导向\n* 功利性强\n* 没有提供帮助和指导，最后直接提出批评\n\n\n* 反馈不多，被动\n* 承若未兑现\n* 分享很少\n* 没耐心\n* 错误的引导\n\n* 关注度不够\n* 责任心不够\n\n* Interview++没有反馈\n* 关心程度低\n* 没实质性帮助 \n\n---\n\n## 信任的构建\n这次培训我更希望听到一些发生在工作生活中关于Buddy/Sponsor的案例分析，可是《信任的构建》这个课题跟这个没有太大直接的关系，不过也能学到一些东西。关于信任的构建，我以为一个人从小到大形成的人格和价值观就基本上决定了这个人是否是一个值得信赖的人。孩子小时候看的动画片，《黑猫警长》和《葫芦娃》等这些充满正义色彩的动画片也能带来很大的影响，《孩子与狼》的故事告诉一个小孩不讲诚信的害处，但最重要的是父母的榜样力量的影响和家庭教育（学校教育我倒觉得不是最重要的）。\n\n对于一个成年人，特别是奔三的人来说，核心价值观基本上已经成型，是不是一个值得信赖的人已经在周围的人群中有了个定论。一个值得信任的人在与人相处中，任何时候都会把信誉看得极其重要，不管对陌生人、朋友、还是亲人。由于我本人是一个坚信`人无信不立`的人，有些根植于内心的东西用言语无法表达，特别像信任这种需要终身去践行的信仰。一旦信任被破坏，那就是毁灭性的，所以任何时候不要存有侥幸心理，做一个始终讲信用的人，你的生活会更简单。\n\n### 信任的定义\n可以从三个方面去理解解读：\n\n```\n1. 信心\n2. 期望（风险承受）\n3. 信念\n```\n信任一个人，表示你对这个人某方面是有信心的，而信任有时候也分不同的等级，这就因期望而异了，期望越高，要求信任度越高。打个比方，你借给一个朋友一万块，你会相信他，你此时的期望就是：归还1万块。退一万步，没有了也就1万块，这里也跟自己的内心风险承受能力有关了。如果让你借30万给你这个朋友，可能你就会掂量一下，他是否能不能满足你的期望，所以在这个等级，信任度就大大降低了。\n\n还有一种情况，超出了信心和期望了，上升到信念的高度。借用郭老师口述的例子：\n\n```\n郭老师一次飞机旅途中，有一段很长的强气流，飞机有一段较长的时间处在失重状态，给乘客的感觉像是要坠机了，加上不停地摇晃。而此时，紧急氧气罩没有下来，大家非常恐惧和焦躁，可想而知，场面一片混乱。而作为常人的郭老师，她也跟大多数人一样，极度的害怕，心里抱怨着呼吸口罩怎么还不下来，各种情绪夹杂在一起，不但没有让自己好过一点，反而更加糟糕。百般无奈之下，她突然镇定下来了，脑海冒出一个念头，要相信飞机上的空姐，要相信航空公司，最重要的是要相信自己不会有事，相信上帝。此刻她觉得自己应该有生存的信念，有了这个信念，她的心也定了下来，不再那么慌张失措，而是静静的等待氧气罩下来......最后证明是一场虚惊。\n```\n\n\u003e形而上的理论，一旦根植于一个人的内心深处，ta反而只顾着去践行，便成了只可意会不可言传的东西，就好比`大道理大家都懂，经常说的人未必会做到，而一直在做的人未必会挂在嘴上说`\n\n---\n\n### 信任三要素\n\u003e人无信不立。\n\n自古有此言，信用乃人的立身之本。关于信用的重要性，我不想说。这次培训中，郭老师从研究分析的角度系统地讲解了影响信任的三要素：\n\n```\n1. 动机：互惠原则。\n2. 能力：技能，认知，态度（责任心，主观能动性）。\n3. 品格：言行一致，履行承诺，完善的人格。\n```\n\n---\n\n### 医患关系问题出在哪里\n借助一个生活中非常常见的例子来说明这三个要素。对于医患关系，很多人是不喜欢医生的，甚至痛恨，究其根本原因是医生失去了病人的信任，那么是什么导致这种信任的缺失呢？就从这三要素来看看这个问题：\n\n1. 医生的动机有问题吗？\n\t* 很显然，作为一名医生，没有人是抱着残害百姓的初衷去治病的，相反，他们从内心深处都想医治好病人，减少人间的伤痛，这点大家几乎不会怀疑。（那种一心报复社会的医生不在讨论范围之内） \n\n2. 医生的能力有问题吗？\n\t* 有人抢答：“有，绝对有！” 不可否认，实实在在存在庸医（其实更多强调的是缺乏责任心），但对于大多数普通病症，医生的在专业知识能hold住的，他们也是可以胜任工作的，而且人们愿意找医生看病，还是对他们的能力是认可的。也不可否认，有少部分医生确实是医生平庸导致不良后果。那么问题究竟出在哪里？\n3. 医生的品格有问题吗？\n\t* 不用抢答，我说：“有!”。 我是一个很少去医院的人（陕西的地邪，那就每年去体检一次吧~），我不恨医生，相反我对医生存在着一种敬仰之心，包括现在都有。我感受过医生的焦躁的态度，因为没有太深入的接触，所以对他们品格这块的问题感触不是很深。但从大方面讲，我不否认医患关系这个事实：病人属于弱势群体，医生有时候处于现实压迫等原因，不得不放弃一些原则，不得不......这上升到一个社会性的问题了，他们有罪，但这个社会也有责任。\n\n\t\n\u003e我相信，慢慢地，随着社会的进步，教育的普及，社会福利的完善，人们素质的提高，普遍社会的信任会越来越好。作为社会公民，我们应该让自己做一个讲信用的人。\n\n---\n\n### 给自己一个承诺 \n尾声很美好，每个人给自己一个承诺，我的承诺是：\n\n\u003e每周给家里打两次上的电话，只是听爸妈唠叨家常......\n\n"])</script><script>self.__next_f.push([1,"4e:T119a,"])</script><script>self.__next_f.push([1,"\n\n\n\n\n---\n\n开发人员初次走进技术领导（后文简称TL）这个角色的时候都是很困难的。即便经验再丰富的开发人员，他的技能和经验也是不能自动转换成一个TL必备的技能的。事实上，如果开发人员不能很好地运用已有的技能和经验，或者不能在这个新角色中树立更多权威，一些旧有的习惯不但没有帮助，反而会带来阻碍。\n\n\n\n\n这篇文章，我们一起来探索一下初次做TL时容易踏入的三个陷阱，以及他们可以做些什么来避免绕过这些陷阱。\n\n---\n\n## 1. 所有时间都在编码\n开发人员初次做TL往往会手痒痒想去写代码。事实上，他们很容易误认为自己需要通过一直不停地写代码来证明自己的领导力。的确，一个高效的TL是需要一些时间来编写、阅读以及检查代码，但一旦他们花太多的时间去编码，其他的职责就容易被忽略掉。例如，创造一个技术愿景，以及确保团队成员理解核心的系统质量属性。\n\n缺乏技术愿景可能会导致三种不同的实现，开发人员会觉得他们自己想的是最好的，或者部署可能失败是因为开发人员不知道操作约束或者生产环境的差异。更糟糕的情况是，如果一个开发人员不考虑维护性而选择了非主流的方式，或者压根不知道系统是如何随着时间推移而演变，他们写出的代码就必须不断地被改写\n\n稍微有些经验的TL知道他们必须平衡编码和其他职责的时间。他们将时间以天为单位或者至少以周为单位进行分割，这样就能确保关注到其他职责。比如，构建一个共享的架构愿景，识别和解决技术风险，计划会议以及关注团队和代码的内聚性和稳定性。\n\n---\n\n## 2. 做了所有的技术决定\n\n一个新的TL通常是团队中经验最丰富的开发人员，他或许会有种压力感导致他们要做所有的技术决定来证明他的权威和影响力。TL一个人对技术说了算意味着他成为了团队的瓶颈，此时团队离开了TL就无法取得进步了，团队其他成员也会失去动力，因为TL做了所有的重要的决定意味着他们的贡献都被否定了，而这只会让他们心生不满。\n\n有经验的TL知道他们可以有很多种方式去做决定。通常，最好的决定是源自于整个团队的经验和技能，而非某个个体。下面列出的一些值得借鉴技巧，而它们取决于决定的重要性、紧急程度以及他们想要从团队成员中获得多少的承诺：\n\n- 仅仅委派 - 在没有任何沟通的前提下，TL将决定告知某个成员。\n- 提供建议 - TL将决定委派给某个成员后，还提供了输入和自己的建议。\n- 询问调查 - TL将决定委派给某个成员后，还对后续的产出和影响因素做了跟踪调查。\n- 达成共识 - TL将团队所有成员召集起来，让大家对某个决定达成共识。\n- 独裁专制 - TL运用自己已有的信息去做决定，至于要不要和团队成员商量完全看自己的意愿，最后将结果告知大家。\n\n---\n\n## 3. 忽视了团队文化的培养\n\n一个团队是一群有共同目标的人在一起工作。新的TL可能会误以为他们的角色就是在所有的技术方面做出表率，而忘了关心团队是怎么一起工作的。虽然像团队领导者和项目经理这样的角色也肩负这个责任，TL也要带领着团队像同一技术方向前进。\n\n同样，新的TL也很容易忽视了两个开发人员之间激烈的讨论，或者忽视团队技术成员对非技术成员的不理睬和不尊重。\n\n而一个有经验的TL会意识到这个角色领导意义如同技术一样重要。他们会不断地寻找方法在团队中建立信任和良好的关系。一些好的实践，如将团队描述成一个白板架构图，建立编码和架构原则来指导个人决策，或者做定期改进提升以及回顾。\n\n---\n\n## 总结\n\n初次做TL通常会容易掉进一些陷阱，这跟他们做开发是养成的习惯有密切关系。为了绕过这些陷阱，他们必须找到有效地方法来平衡技术和领导责任。\n\n在Patrick写的《Talking with Tech Leads》书里可以找到更多关于TL的经验。你可以[下载](http://info.thoughtworks.com/talking-with-tech-leads-book.html)一本免费的样本。\n\n\n[原文链接](https://www.thoughtworks.com/insights/blog/three-common-mistakes-first-time-tech-lead)\n\n"])</script><script>self.__next_f.push([1,"4f:T197f,"])</script><script>self.__next_f.push([1,"\n\n\n\n\n---\n\n成为一个技术领导者(后文简称TL)对任何开发人员来讲都是一个艰难的转型，因为开发人员的经验和技能仅仅只有部分有助于他们达到对这个新角色的期望。除了简单的设计和编码，TL最重要的职责在于管理整个开发团队，这意味着TL要经常与技术人员以及非技术人员进行沟通协作。\n\n一个开发人员花在编写良好结构的代码的时间并不能等效地转化成一些必要的技能，比如了解他人，解决冲突，以及突然需要同时处理多个他们自己并不太可能独立搞定的任务。\n\n![Alt text](/images/career/5-tips-for-being-an-effective-tech-lead-1.webp)\n\n下面是如何成为一个高效TL的5个锦囊妙计\n\n---\n\n## 1.学会委托\n\n作为开发人员，当你在工作中遇到了一个难以解决的技术问题时，你会寻找各种解决方案，你挑了一个最简单的方案把问题解决了，最后你高兴地庆祝你的测试如愿以偿的由红变绿。\n\n作为TL，不论你有多少经验，你都不能去承担所有的编码工作，也不能去解决所有有挑战和有趣的问题。因为有更多的职责需要你去关注，一旦你独自将自己专注在一个任务里，你就不能兼顾其他的职责了。当你着手去解决棘手的难题时，这会剥夺团队其他开发人员成长的机会。这可能会让一些开发人员觉得没意思，进而选择离开团队。\n\n当然，有时候你的经验和知识对于一些问题非常有用，但你又不想成为解决问题的瓶颈（译者注：意思是只有你能解决那些问题），所以你想找到一种合适的方式将它委托给其他开发人员。你可以召集开发人员一起开会讨论一些常用的方案，将问题派给某些人去做，然后定期的检查他们的进展，确保进展在可控的范围内。\n\n一旦你和开发人员的信任建立起来后，你就可以更少的参与到开发工作中，甚至你完全可以将一些事情委托出去，从而让你能够专注在更重要的事情上。\n\n\n\n---\n\n## 2.抽出时间写代码\n\n这个角色之所以被称作TL有一个原因，它是最基本的一点：你要花时间在代码库上。让自己熟悉代码能够有助于你获得团队成员的尊敬，同时也使你的知识技能得到更新，并且你还能清楚的了解代码库的当前的现状，比如代码库的一些约束和存在的问题。\n\n如果你不花任何时间去写代码，你有可能践行了“象牙塔建筑师”这个反模式，导致了你在做一些技术决定的时候并没有理解代码实现以及维护背后真正的含义。而且这个反模式有很多的副作用，它会让你失去团队成员的信任，会延长新功能的开发时间，并且会增加软件系统的意外复杂性。\n\nTL可以有很多方式抽出时间来编码，重要的是你要有意识去做这件事。这通常意味着你要对怎么支配你的时间做出艰难的选择。锦囊1可以帮助你腾出更多的时间。我了解到一些TL会在他们的日历上标注出一些特定的时间段来确保自己有时间写代码或者跟其他开发成员检查代码。我还知道一些TL会检查提交的日志，给开发成员提出反馈--这种方式更像一个宽松自由的结对编程。\n\n\n\n\n---\n\n## 3.可视化你的系统架构\n\n我待过的几个团队中，开发人员不明白他们所做的工作是怎样跟系统架构的设计融合在一起的。开发人员一个小的技术决策可能会造成大范围的架构影响。如果开发人员不能理解这些抽象的系统架构，这些将无法避免。\n\n高效的TL通常将系统架构通过可视化的方式呈现出来，并拿它来跟开发人员展开讨论。通常有多种不同的图形方式来呈现系统架构（逻辑图，部署图，等等）。并且每一个图形都能帮助开发人员明白他们的工作是怎么与系统架构融合在一起的。\n\n一个全员的白板会议是检查整体架构的一个很有用的方式，因为它会随着时间逐步完善，从而能够满足不断变化的需求以及会议中那些比图形更重要的讨论结果。专注在关键的质量指标上，这些指标是驱动系统架构可视化的指标（可扩展性，性能，可用性等等）。同时要清楚它们是如何促成你当前的系统架构。引出一些假设以及分享历史上下文信息能够帮助开发人员指导他们的平时的决策。\n\n---\n\n\n## 4.与团队成员一对一交流\n衡量一个TL是否高效并不是看他完成了多少编码工作，而要看整个团队有多么的高效。一个TL所做的任何事情就是让团队成员成长，让整个团队持续进步。坐下来跟团队成员进行一对一的交流沟通，了解每个人的知识背景、长处以及他们的目标，从而了解你的团队成员如何在一起工作的。同时也要让开发人员都有机会成长。这意味着你要允许他们尝试冒险、挑战有难度的工作，让自己成长的同时也为团队做出贡献。鼓励团队成员在团队中分享知识，并且让他们有更多的交流互动。\n\n---\n\n\n## 5.学会说业务语言\n想要成为一个高效的TL，你还需要跟开发团队之外的人保持好关系，比如产品经理、市场人员、销售等。他们并不能理解你作为一个开发人员的一些术语，所以跟他们讲框架、技术工具以及平台只会让他们困惑。\n\n高效的TL会想办法让非技术人员理解这些技术概念，最好的方式是找出那些业务人员经常使用的术语并想办法用那些术语来解释我们的开发工作。可视化模型，白板会议以及恰当的比喻都会有助于业务人员理解技术概念和含义。你可以找来一个非技术人员跟你一起练习，看你是否能让他听懂你在说什么。\n\n通过将业务术语引进开发团队中并鼓励他们尽可能多的使用这些术语，可以尽可能地减小转换层。开发团队成员运用这些领域术语越多，他们就能越容易理解相关业务人员。\n\n在Patrick写的《Talking with Tech Leads》书里可以找到更多关于TL的经验。你可以[下载](http://info.thoughtworks.com/talking-with-tech-leads-book.html)一本免费的样本，或者，不要错过[初次做技术领导的三个陷阱]()这篇精彩的文章。\n\n\n[原文链接](https://www.thoughtworks.com/insights/blog/5-tips-being-effective-tech-lead)\n"])</script><script>self.__next_f.push([1,"50:T1f07,"])</script><script>self.__next_f.push([1,"\n\n\n---\n\n## 加入ThoughtWorks\n2015年3月26日，我正式加入[ThoughtWorks](https://thoughtworks.com/)，这一天，我内心充满了喜悦，也多了几分压力，我的[ThoughtWorks](https://thoughtworks.com/)之旅在就我憧憬了一年后真的开始了。那么2015年3月26日之前，我在哪里呢？一笔可以带过：和朋友创业失败，过了本命年的春节后，我再次来到[ThoughtWorks](https://thoughtworks.com/)西安办公室，招待我的还是美丽及气质不凡的HR唐丽娟。就这样，一个星期过去了，在2015年3月26日那天，我跟ThoughtWorks签了终身合同。重要的事情说三遍，重要的日子也出现了三遍。\n\n\n---\n\n## 那些帮助过我的TWer\n从开始到现在，我要感谢我在TW遇到的人，他们每一个人给了我不同的帮助和积极的影响：  \n\n * `唐丽娟`，HR，她给我电话面试和主持我笔试及整个面试流程。HR在某种程度上讲是一个企业的门面，她专业的职业素养和极好的精神风貌，给我留下了深刻的印象，给了我很大的鼓舞。\n * `郑烨`，Principle Consultant，一个很有影响力的首席咨询顾问，在业界享有一定的声誉，在TW影响力深远，开创了郑大夜校，并持续为TW培养优秀的毕业生人才。他最后一轮面试了我，据说我是他离职去创业前最后面试的一个人。他在面试过程中没有拿具体的技术考核我，而是非常关注我解决问题的方法和我的思路。\n * `于婵婵`，BA，我的Buddy，在我六个月的试用期中给了我很多指导和帮助，让我能够更快的融入到TW这个大家庭中，她对TW的文化有着深刻的理解。\n * `杨栋`，TL，他是一名很好的Coach。能够很有条理的将自己的知识传达出去，并且拥有丰富的管理经验和扎实的代码技能，他在工作上无形的感染着我，能让我也变得更加严谨和专业。\n * `邱俊涛`，Senior Consultant，是一名技术大牛。刚加入TW时，他指导我学习开发Restful API，现在我有幸选择他作为我的Sponsor。他在社区有一定的影响力，他有自己的[博客](http://icodeit.org/blog/archives/)，并写过[《轻量级Web应用开发》](http://item.jd.com/11741605.html)、[《JavaScript核心概念及实践》](http://item.jd.com/11232701.html)，还有其他一些电子书。我想成为一名技术方面的咨询师，选择他作为师父，我要更加努力了。\n * `张海东`，Consultant，我在TW的‘小冤家’，跟他有很多相同的兴趣爱好，如篮球、羽毛球、看书、游泳等，另外有一点相同的是都比较帅（小小自恋一下）。\n * 还有其他很多一起工作的小伙伴，张久坤，秦小强，张雅轩，高瑗，冯博等，他们个个身怀绝技，在不同的方面给我注入正能量。\n\n\n---\n\n\n## 另一种体验\n一路走来，从西安--\u003e珠海--\u003e新加坡--\u003e西安，短暂的9个月时间，我参与了国内和国外的出差，做过咨询式的交付，做过纯交付，工作压力和强度各有不同，唯一相同的是，我一直在成长。在这里，不进则退，学习能力是一项重要的技能，而我，也正享受着这种积极充满活力的氛围。\n\n因为热爱，所以学习，这是重点。对我来说，学习的压力一直在增大，不同的项目，面对不同的客户，以及不同的技术，还有那始终不变的英语学习。我的脑袋瓜子要高速运转，同时身体还不能松懈（平日坚持运动健身，带领Team成员做平板支撑），用一句通俗的话讲：“我被打鸡血了”。这种状态没有把我击垮，相反，会让我感觉非常棒，因为累并快乐着。\n\n说了这么多，自己都快被自己吓到了，再不解释一下，我的描述有黑工厂的嫌疑了，就用一个事实说明现状吧：“我的身体状况和精神状况都很好，而且越来越好。”打鸡血的状态，更多的是主动自发的去学习提升，而且我也有自己的生活和学习时间，高效、高质量完成工作是我们的态度，写出高质量的代码是我的追求。\n\n---\n\n\n## 轻描谈写的2015\n[ThoughtWorks](https://thoughtworks.com/)，我的2015就这样被我轻描淡写的过了，这中间还发生了还有很多美好的事情，我的Buddy Launch，Sponsor Launch，我们的Team Build，我们的WorkShop，等等等等，说多了就是[ThoughtWorks](https://thoughtworks.com/)的文化要素了，一段轻描淡写完了，再来一段轻描淡写吧，这次真的是轻描淡写了，因为我加入TW时间不算长，[ThoughtWorks](https://thoughtworks.com/)是什么样子的，也是我有局限性的认识。\n\n没错，我们是一家外包公司，专注于提供专业的软件咨询和软件交付服务。专业一词并不是教科书上的教条，他是真的专业，而且是专注于专业。这里聚集着一群对工作充满热情的Guys，完成工作已经不再是我们的目标，我们的目标是高效的完成高质量的工作，为客户创造更大更持久的价值（这也是为什么国内外诸多客户愿意支付数倍的账单来购买我们的服务）。在这里，出现最多的词有，敏捷开发，用户体验，持续集成，持续交付，代码整洁，结对编程，测试驱动，代码审查。因为专注和专业，我们有开源的[CI工具](https://www.go.cd/)，还有被广泛使用的[E2E的测试工具](http://docs.seleniumhq.org/)，还有大牛主持的开源项目[Moco](https://github.com/dreamhead/moco)，更多更多，等待你去挖掘。\n\n---\n\n\n## 工作环境\n如果你来过[ThoughtWorks](https://thoughtworks.com/)的办公室，比如西安原来  `陕西省西安市雁塔区丈八沟街道锦业一路软件园H座1101室` 以及现在`陕西省西安市雁塔区高新区天谷八路211号环普科技产业园E座606室`，你会发现这里只有大开间，人员分布几乎按照10人左右的团队划分成小组（充满战斗力的敏捷开发小团队），有很多大小不一的会议室，有厨房、洗浴室、书架、乒乓球台，还有篮球和羽毛球场地（新地址有），最常见的是故事墙（贴满很多卡片的墙，注意：那些都是用户故事卡，敏捷开发独门秘籍）。说了这么多有的，那还有很多没有的，没有领导办公室，办公桌没有隔栏，没有各种职权不一的部门。再说点程序员都感兴趣的，网络没有限制，Google搜索乐翻天，人手HBU的Macbook Pro。\n\n---\n\n\n## 囧事爆料\n有的没的说了一堆，再说一件囧事：一次On Beach了，找一桌子坐下，一个瘦瘦的小伙伴也来此桌，下班时，电梯撞见，被问名字。遂回答后反问之，答曰：“胡凯”。后来得知，那个瘦瘦小伙伴是[ThoughtWorks](https://thoughtworks.com/)中国区负责海外市场的总经理，实在低调。如此低调的大牛（技术和非技术的），在TW是一件很常见的事情，如此一来，时间长了，我也习惯了...\n\n---\n\n\n## 欢迎加入我们\n有句话说得在理：`跟优秀的人一起工作，你同样会变的优秀，你的优秀会吸引更多优秀的人`，来这里是因为被优秀的人吸引，让优秀成为一种习惯，让习惯形成巨大的磁场，从而让更多希望变得优秀的人成为优秀的人。\n\n如果你有想法，并且真正热爱编程，更想在IT界有所成就，最后你非常渴望加入TW，大胆自荐给我，我将不遗余力把你举荐给[ThoughtWorks](https://thoughtworks.com/)伟大的HR团队。 \n\n让世界变得更加美好，[ThoughtWorks](https://thoughtworks.com/)欢迎你的加入。\n\n---\n\n## 注释\n  * BA：业务分析师，Business Analyst\n  * CI：持续集成，Continuous Integration \n  * HBU：高大上，High, Big, Up\n  * On Beach：在沙滩上，意思是暂时没有上项目\n\n"])</script><script>self.__next_f.push([1,"b:[\"$\",\"main\",null,{\"className\":\"py-12 px-6\",\"children\":[\"$\",\"div\",null,{\"className\":\"max-w-2xl mx-auto\",\"children\":[\"$\",\"$13\",null,{\"fallback\":[\"$\",\"div\",null,{\"className\":\"py-8 text-center\",\"children\":\"加载中...\"}],\"children\":[\"$\",\"$L17\",null,{\"allPosts\":[{\"slug\":\"claude-code-model-config\",\"year\":\"2026\",\"month\":\"04\",\"day\":\"16\",\"title\":\"Claude Code 模型配置完全指南\",\"date\":\"2026-04-16T00:00:00.000Z\",\"excerpt\":\"全面解析 Claude Code 的模型配置体系：8 个模型别名的上下文窗口大小、1M 扩展上下文的套餐差异、opusplan 混合模式、effort 努力等级、以及企业环境下固定模型版本和限制模型选择的完整方案。\",\"content\":\"$18\",\"tags\":[\"软件开发\",\"AI 编程\",\"ClaudeCode\"],\"published\":true,\"readingTime\":7,\"category\":\"swd\",\"relativePath\":\"swd/ai-coding/claudecode/claude-code-model-config.mdx\"},{\"slug\":\"opencode-tui-and-agent-config\",\"year\":\"2026\",\"month\":\"04\",\"day\":\"16\",\"title\":\"OpenCode 进阶：TUI 隐藏技巧与 Agent 配置体系深度实践\",\"date\":\"2026-04-16T00:00:00.000Z\",\"excerpt\":\"用了 OpenCode 一段时间后，大多数人还停在\\\"建个对话发需求\\\"的层面。这篇文章分享一些 TUI 界面里不太常见的操作方式，以及 Agent 配置体系的完整玩法——包括我自己的多模型 Agent 矩阵实践。\",\"content\":\"$19\",\"tags\":[\"软件开发\",\"AI 编程\",\"OpenCode\"],\"published\":true,\"readingTime\":7,\"category\":\"swd\",\"relativePath\":\"swd/ai-coding/opencode/opencode-tui-and-agent-config.mdx\"},{\"slug\":\"claude-code-token-saving-tips\",\"year\":\"2026\",\"month\":\"04\",\"day\":\"13\",\"title\":\"Claude Code 省 Token 技巧\",\"date\":\"2026-04-13T00:00:00.000Z\",\"excerpt\":\"这篇文章把 Claude Code 省 Token 的关键经验整理成 10 条实用建议：什么时候该继续当前会话，什么时候该重开，为什么 1M 上下文别乱开，以及怎样通过精简 CLAUDE.md、减少无关输入和控制读取范围，把成本用在真正有价值的地方。\",\"content\":\"$1a\",\"tags\":[\"软件开发\",\"AI 编程\",\"ClaudeCode\"],\"published\":true,\"readingTime\":8,\"category\":\"swd\",\"relativePath\":\"swd/ai-coding/claudecode/claude-code-token-saving-tips.mdx\"},{\"slug\":\"claude-code-advanced-automation-with-mcp-hooks-and-agents\",\"year\":\"2026\",\"month\":\"04\",\"day\":\"08\",\"title\":\"Claude Code 第八篇：高阶自动化实战——Chrome、Channels、CI/CD 与跨端协作\",\"date\":\"2026-04-08T00:00:00.000Z\",\"excerpt\":\"三个端到端蓝图串联 Claude Code 全部扩展机制——本地 Chrome 自动化调试、GitHub CI/CD 无人值守流水线、跨端 Channels 协作，带你从理论走向实战。\",\"content\":\"$1b\",\"tags\":[\"软件开发\",\"AI 编程\",\"ClaudeCode\"],\"published\":true,\"readingTime\":7,\"category\":\"swd\",\"relativePath\":\"swd/ai-coding/claudecode/claude-code-advanced-automation-with-mcp-hooks-and-agents.mdx\"},{\"slug\":\"claude-code-extension-model-overview\",\"year\":\"2026\",\"month\":\"04\",\"day\":\"07\",\"title\":\"Claude Code 第七篇：扩展架构全景——Skills、Sub-agents、Hooks、MCP、Plugins 与 Agent Teams\",\"date\":\"2026-04-07T00:00:00.000Z\",\"excerpt\":\"系统拆解 Claude Code 的六大扩展机制——Skills、Sub-agents、Hooks、MCP、Plugins、Agent Teams，理解它们的定位、协作关系与选型决策，帮你从「会用工具」迈向「设计工具链」。\",\"content\":\"$1c\",\"tags\":[\"软件开发\",\"AI 编程\",\"ClaudeCode\"],\"published\":true,\"readingTime\":6,\"category\":\"swd\",\"relativePath\":\"swd/ai-coding/claudecode/claude-code-extension-model-overview.mdx\"},{\"slug\":\"claude-code-settings-and-permissions\",\"year\":\"2026\",\"month\":\"04\",\"day\":\"06\",\"title\":\"Claude Code 第六篇：设置、权限与 Auto Mode\",\"date\":\"2026-04-06T00:00:00.000Z\",\"excerpt\":\"深入 Claude Code 的四层设置体系、细粒度权限规则语法、Auto Mode 分类器配置与沙箱化纵深防御，帮你在安全与效率之间找到最佳平衡点。\",\"content\":\"$1d\",\"tags\":[\"软件开发\",\"AI 编程\",\"ClaudeCode\"],\"published\":true,\"readingTime\":12,\"category\":\"swd\",\"relativePath\":\"swd/ai-coding/claudecode/claude-code-settings-and-permissions.mdx\"},{\"slug\":\"claude-code-memory-and-claude-md\",\"year\":\"2026\",\"month\":\"04\",\"day\":\"05\",\"title\":\"Claude Code 第五篇：记忆层——CLAUDE.md、Rules 与 Auto Memory\",\"date\":\"2026-04-05T00:00:00.000Z\",\"excerpt\":\"Claude Code 每次启动都是一张白纸——除非你给它\\\"记忆\\\"。CLAUDE.md 是你写给 Claude 的操作手册，Rules 是模块化的规则引擎，Auto Memory 是 Claude 自己的笔记本。三者配合，让 Claude 不再每次都从零开始。本文详解三套记忆系统的机制、写法与实战模式。\",\"content\":\"$1e\",\"tags\":[\"软件开发\",\"AI 编程\",\"ClaudeCode\"],\"published\":true,\"readingTime\":11,\"category\":\"swd\",\"relativePath\":\"swd/ai-coding/claudecode/claude-code-memory-and-claude-md.mdx\"},{\"slug\":\"claude-code-interactive-mode-and-built-in-commands\",\"year\":\"2026\",\"month\":\"04\",\"day\":\"04\",\"title\":\"Claude Code 第四篇：交互模式、内置命令与上下文管理\",\"date\":\"2026-04-04T00:00:00.000Z\",\"excerpt\":\"Claude Code 的交互终端远不止\\\"打字→回车\\\"。六种权限模式、60+ 条内置命令、快捷键组合、上下文管理策略——掌握这些，你才算真正\\\"住进\\\"了 Claude Code。本文带你从权限模式、键盘操控、命令体系到上下文管理，逐层拆解 Claude Code 的交互全貌。\",\"content\":\"$1f\",\"tags\":[\"软件开发\",\"AI 编程\",\"ClaudeCode\"],\"published\":true,\"readingTime\":12,\"category\":\"swd\",\"relativePath\":\"swd/ai-coding/claudecode/claude-code-interactive-mode-and-built-in-commands.mdx\"},{\"slug\":\"claude-code-common-workflows\",\"year\":\"2026\",\"month\":\"04\",\"day\":\"03\",\"title\":\"Claude Code 第三篇：日常工作流——探索、修 Bug、重构、写测试、Git、Review\",\"date\":\"2026-04-03T00:00:00.000Z\",\"excerpt\":\"Claude Code 不只是问答机器人，而是一个能读文件、跑命令、改代码的代理式编码环境。本文通过六个真实开发场景，展示如何用 Claude Code 高效完成日常研发任务——从理解陌生代码到修 Bug、重构、写测试、提交 PR，直到一轮对话跑完完整闭环。\",\"content\":\"$20\",\"tags\":[\"软件开发\",\"AI 编程\",\"ClaudeCode\"],\"published\":true,\"readingTime\":10,\"category\":\"swd\",\"relativePath\":\"swd/ai-coding/claudecode/claude-code-common-workflows.mdx\"},{\"slug\":\"claude-code-getting-started\",\"year\":\"2026\",\"month\":\"04\",\"day\":\"02\",\"title\":\"Claude Code 第二篇：快速上手——安装、登录、选入口、跑通第一个真实任务\",\"date\":\"2026-04-02T00:00:00.000Z\",\"excerpt\":\"从安装到跑通第一个真实任务，只需要十分钟。本文覆盖三种安装方式、四种登录认证、五大入口选择，并带你用一个真实项目闭环走完\\\"理解代码→修改→验证→提交\\\"的全流程。\",\"content\":\"$21\",\"tags\":[\"软件开发\",\"AI 编程\",\"ClaudeCode\"],\"published\":true,\"readingTime\":8,\"category\":\"swd\",\"relativePath\":\"swd/ai-coding/claudecode/claude-code-getting-started.mdx\"},{\"slug\":\"opencode-to-claude-code-getting-oriented\",\"year\":\"2026\",\"month\":\"04\",\"day\":\"01\",\"title\":\"Claude Code 第一篇：从 OpenCode 切到 Claude Code——心智模型、迁移清单与能力地图\",\"date\":\"2026-04-01T00:00:00.000Z\",\"excerpt\":\"从 OpenCode 迁移到 Claude Code，不只是换一个 CLI 工具。这是一次从\\\"开源灵活\\\"到\\\"深度集成\\\"的范式转变。本文梳理两者的核心差异、Claude Code 的产品地图与功能矩阵，并提供一份可操作的迁移清单，帮你高效完成切换。\",\"content\":\"$22\",\"tags\":[\"软件开发\",\"AI 编程\",\"ClaudeCode\"],\"published\":true,\"readingTime\":11,\"category\":\"swd\",\"relativePath\":\"swd/ai-coding/claudecode/opencode-to-claude-code-getting-oriented.mdx\"},{\"slug\":\"oh-my-opencode-atlas-vs-sisyphus-arch\",\"year\":\"2026\",\"month\":\"02\",\"day\":\"24\",\"title\":\"Oh My OpenCode：Atlas vs Sisyphus 双 orchestrator 架构解析\",\"date\":\"2026-02-24T00:00:00.000Z\",\"excerpt\":\"Atlas 和 Sisyphus 是 OhMyOpenCode 插件中的两个核心 orchestrator 代理。Sisyphus 定位为全能主协调器，负责意图解析、动态规划和智能委派，拥有完整的工具权限但不能直接调用特定代理。Atlas 则是纯协调指挥家，不直接写代码，专注于协调和验证，通过 4-Phase QA Protocol 严格验证每个委派任务。两者在代码权限、适用场景、状态管理、并行策略和验证职责等方面有本质差异，分别代表了高级工程师和技术负责人两种不同的 orchestration 哲学。\",\"content\":\"$23\",\"tags\":[\"软件开发\",\"AI 编程\",\"OpenCode\",\"Oh My OpenCode\"],\"published\":true,\"readingTime\":8,\"category\":\"swd\",\"relativePath\":\"swd/ai-coding/opencode/oh-my-opencode-atlas-vs-sisyphus-arch.mdx\"},{\"slug\":\"oh-my-opencode-sisyphus-ultrawork-mode\",\"year\":\"2026\",\"month\":\"02\",\"day\":\"17\",\"title\":\"Oh My OpenCode：Sisyphus ultrawork mode\",\"date\":\"2026-02-17T00:00:00.000Z\",\"excerpt\":\"西西弗斯超强工作模式（ultrawork mode）是一套严格的工作规范，旨在确保AI助手在实现任务前达到100%的确定性。该模式强调深度思考、彻底探索和精确交付，要求在使用任何代码前完全理解用户需求、探索代码库模式、制定清晰计划并解决所有歧义。通过强制性的确定性协议、代理委托机制和零容忍失败策略，确保高质量、完整无缺的交付成果。\",\"content\":\"$24\",\"tags\":[\"软件开发\",\"AI 编程\",\"OpenCode\",\"Oh My OpenCode\"],\"published\":true,\"readingTime\":8,\"category\":\"swd\",\"relativePath\":\"swd/ai-coding/opencode/oh-my-opencode-sisyphus-ultrawork-mode.mdx\"},{\"slug\":\"oh-my-opencode-categories-quick-reference\",\"year\":\"2026\",\"month\":\"02\",\"day\":\"11\",\"title\":\"Oh My OpenCode：Categories 速查手册\",\"date\":\"2026-02-11T00:00:00.000Z\",\"excerpt\":\"Oh My OpenCode Categories 系统深度解析，详细介绍 8 个内置 Category（visual-engineering、ultrabrain、deep、artistry、quick、unspecified-low、unspecified-high、writing）的工作原理、模型配置和使用场景。Category 是针对特定领域优化的 Agent 配置预设，通过 `task(category=\\\"xxx\\\")` 调用时由 Sisyphus-Junior 执行器完成工作。本文还介绍 Category 与 Skill 的组合策略、自定义 Category 配置方法、模型解析优先级机制，以及实际开发中的最佳实践。\",\"content\":\"$25\",\"tags\":[\"软件开发\",\"AI 编程\",\"OpenCode\",\"Oh My OpenCode\"],\"published\":true,\"readingTime\":8,\"category\":\"swd\",\"relativePath\":\"swd/ai-coding/opencode/oh-my-opencode-categories-quick-reference.mdx\"},{\"slug\":\"oh-my-opencode-agents-quick-reference\",\"year\":\"2026\",\"month\":\"02\",\"day\":\"10\",\"title\":\"Oh My OpenCode：Agent 速查手册\",\"date\":\"2026-02-10T00:00:00.000Z\",\"excerpt\":\"Oh My OpenCode Agent 系统完全指南，面向初学者深入解析 AI agent 工作原理。系统共有 11 个 AI agent，分为 Primary Agents（主 agent）和 Sub Agents（子 agent）两大类。主 agent 包括西西弗斯、赫菲斯托斯、阿特拉斯和普罗米修斯，负责复杂任务编排、端到端功能实现、长期项目管理和战略规划。子 agent 提供预规划分析、计划验证、架构咨询、文档搜索等专业化支持。本指南详细介绍每个 agent 的角色定位、工作机制、适用场景和最佳实践，帮助开发者高效选择和使用合适的 agent 完成任务。\",\"content\":\"$26\",\"tags\":[\"软件开发\",\"AI 编程\",\"OpenCode\",\"Oh My OpenCode\"],\"published\":true,\"readingTime\":13,\"category\":\"swd\",\"relativePath\":\"swd/ai-coding/opencode/oh-my-opencode-agents-quick-reference.mdx\"},{\"slug\":\"opencode-agent-quick-reference\",\"year\":\"2026\",\"month\":\"02\",\"day\":\"09\",\"title\":\"OpenCode Agent 速查手册\",\"date\":\"2026-02-09T00:00:00.000Z\",\"excerpt\":\"OpenCode 的 Sub Agent 功能让 AI 编程助手从单一对话模式升级为多代理协作系统。本文详细介绍 Primary Agent 与 Sub Agent 的区别、内置代理类型、配置方法以及实战使用技巧，帮助你构建更高效的 AI 辅助开发工作流。\",\"content\":\"$27\",\"tags\":[\"软件开发\",\"AI 编程\",\"OpenCode\"],\"published\":true,\"readingTime\":5,\"category\":\"swd\",\"relativePath\":\"swd/ai-coding/opencode/opencode-agent-quick-reference.mdx\"},{\"slug\":\"opencode-advanced-tips-and-practices\",\"year\":\"2026\",\"month\":\"02\",\"day\":\"07\",\"title\":\"OpenCode 基础使用：提升编程效率的技巧\",\"date\":\"2026-02-07T00:00:00.000Z\",\"excerpt\":\"掌握 OpenCode 的一些基础使用技巧，从初级自然语言提问到高级自定义配置，通过实战案例学习如何用 AI Coding Agent 提升编码效率。\",\"content\":\"$28\",\"tags\":[\"软件开发\",\"AI 编程\",\"OpenCode\"],\"published\":true,\"readingTime\":8,\"category\":\"swd\",\"relativePath\":\"swd/ai-coding/opencode/opencode-advanced-tips-and-practices.mdx\"},{\"slug\":\"opencode-ai-coding-agent-getting-started\",\"year\":\"2026\",\"month\":\"02\",\"day\":\"06\",\"title\":\"OpenCode 新手入门：从零开始使用\",\"date\":\"2026-02-06T00:00:00.000Z\",\"excerpt\":\"OpenCode 是一款开源的 AI Coding Agent，支持终端、桌面应用和主流 IDE。本文从零开始，带你完成 OpenCode 的安装配置和初次使用，快速上手这款提升编程效率的神器。\",\"content\":\"$29\",\"tags\":[\"软件开发\",\"AI 编程\",\"OpenCode\"],\"published\":true,\"readingTime\":6,\"category\":\"swd\",\"relativePath\":\"swd/ai-coding/opencode/opencode-ai-coding-agent-getting-started.mdx\"},{\"slug\":\"my-simple-design-perspective\",\"year\":\"2025\",\"month\":\"03\",\"day\":\"08\",\"title\":\"我的简单设计观\",\"date\":\"2025-03-08T00:00:00.000Z\",\"excerpt\":\"我的简单设计观阐述了支撑简单设计落地的四个核心价值观：专注（专注于当下真实业务价值，不为未来可能的需求过度设计）、克制（控制溢念，避免用\\\"假如\\\"\\\"万一\\\"为代码引入不必要的复杂性）、懒惰（恰当的懒惰驱动消除重复、引入自动化，是保持系统简单的助推剂）、勇气（拒绝损害代码质量的行为，在团队中坚持简单设计原则）。这套价值观源自多年XP和Scrum实践，强调始终从业务问题出发做出明智的设计选择。\",\"content\":\"$2a\",\"tags\":[\"软件开发\",\"简单设计\"],\"published\":true,\"readingTime\":6,\"category\":\"swd\",\"relativePath\":\"swd/xp/simple-design/my-simple-design-perspective.mdx\"},{\"slug\":\"simple-design-principles-novel\",\"year\":\"2025\",\"month\":\"02\",\"day\":\"15\",\"title\":\"简单设计五原则（小说版）\",\"date\":\"2025-02-15T00:00:00.000Z\",\"excerpt\":\"简单设计五原则（小说版）用师徒对话的形式讲解了简单设计的四条核心原则：通过测试（满足业务需求而非追求测试覆盖率）、消除重复（避免霰弹式修改提升响应力）、揭示意图（用业务语言命名）、最少元素（保持简洁Less is More）。并引入优先级原则：通过测试 \u003e 消除重复 \u003e= 揭示意图 \u003e 最少元素。当设计决策冲突时，优先保证测试通过，在消除重复和揭示意图之间做适度权衡，始终追求刚好够用的设计。\",\"content\":\"$2b\",\"tags\":[\"软件开发\",\"简单设计\"],\"published\":true,\"readingTime\":8,\"category\":\"swd\",\"relativePath\":\"swd/xp/simple-design/simple-design-principles-novel.mdx\"},{\"slug\":\"state-verification-challenges\",\"year\":\"2024\",\"month\":\"08\",\"day\":\"05\",\"title\":\"状态验证的困境\",\"date\":\"2024-08-05T00:00:00.000Z\",\"excerpt\":\"跨进程状态验证面临获取最终状态的困境，如邮件是否送达难以验证。通过GreenMail等轻量级Fake Mail Server可以捕获发送数据，实现跨进程行为验证。这种方式验证系统是否按预期调用第三方服务，是解决跨进程验证难题的有效策略。理解进程边界测试的复杂性，有助于设计更全面的测试方案。\",\"content\":\"$2c\",\"tags\":[\"软件开发\",\"极限编程\",\"TDD\"],\"published\":true,\"readingTime\":3,\"category\":\"swd\",\"relativePath\":\"swd/xp/tdd/state-verification-challenges.mdx\"},{\"slug\":\"behavior-verification-traps\",\"year\":\"2024\",\"month\":\"08\",\"day\":\"04\",\"title\":\"行为验证的陷阱\",\"date\":\"2024-08-04T00:00:00.000Z\",\"excerpt\":\"跨进程边界的行为验证存在陷阱，无法验证SQL语句与数据库表的映射是否正确。In-Memory Database如H2可实现跨进程状态验证，通过真实数据库操作验证最终数据状态。理解这些陷阱和替代方案，有助于编写更可靠的测试，避免因实现细节变化导致的测试脆弱性问题。\",\"content\":\"$2d\",\"tags\":[\"软件开发\",\"极限编程\",\"TDD\"],\"published\":true,\"readingTime\":2,\"category\":\"swd\",\"relativePath\":\"swd/xp/tdd/behavior-verification-traps.mdx\"},{\"slug\":\"in-process-verification\",\"year\":\"2024\",\"month\":\"08\",\"day\":\"03\",\"title\":\"进程内测试验证\",\"date\":\"2024-08-03T00:00:00.000Z\",\"excerpt\":\"进程内测试验证包括状态验证和行为验证两种方式。状态验证直接读取最终状态，稳定可靠；行为验证使用Mock验证交互过程，粒度更细但更脆弱。通过购物车和停车男孩等实例，展示了两种验证方式的具体应用场景和优缺点，帮助理解测试设计的选择策略。\",\"content\":\"$2e\",\"tags\":[\"软件开发\",\"极限编程\",\"TDD\"],\"published\":true,\"readingTime\":3,\"category\":\"swd\",\"relativePath\":\"swd/xp/tdd/in-process-verification.mdx\"},{\"slug\":\"state-vs-behavior-verification\",\"year\":\"2024\",\"month\":\"08\",\"day\":\"02\",\"title\":\"测试验证因果说\",\"date\":\"2024-08-02T00:00:00.000Z\",\"excerpt\":\"状态验证和行为验证是测试验证的两种方式。状态验证通过检查最终状态来判断功能正确性，稳定可靠；行为验证通过检查交互过程来推断结果，但存在脆弱性问题。当状态不可访问或依赖难以验证时，行为验证成为必要选择。理解两种验证方式的适用场景和优缺点，有助于设计更健壮的测试策略。\",\"content\":\"$2f\",\"tags\":[\"软件开发\",\"极限编程\",\"TDD\"],\"published\":true,\"readingTime\":4,\"category\":\"swd\",\"relativePath\":\"swd/xp/tdd/state-vs-behavior-verification.mdx\"},{\"slug\":\"tdd-introduction\",\"year\":\"2024\",\"month\":\"08\",\"day\":\"01\",\"title\":\"测试驱动开发\",\"date\":\"2024-08-01T00:00:00.000Z\",\"excerpt\":\"自动化测试是软件交付质量的保障，能显著提升问题发现和定位的速度。测试金字塔和敏捷测试四象限为制定测试策略提供了理论指导。Q1定位测试聚焦细粒度代码，帮助快速定位问题；Q2发现测试覆盖业务功能，帮助快速发现问题。合理搭配不同层次的测试，构建自动化测试体系，是实现高质量软件交付的关键实践。\",\"content\":\"$30\",\"tags\":[\"软件开发\",\"极限编程\",\"TDD\"],\"published\":true,\"readingTime\":10,\"category\":\"swd\",\"relativePath\":\"swd/xp/tdd/tdd-introduction.mdx\"},{\"slug\":\"agile-growth-assistant\",\"year\":\"2023\",\"month\":\"01\",\"day\":\"01\",\"title\":\"敏捷软件教练书单\",\"date\":\"2023-01-01T00:00:00.000Z\",\"excerpt\":\"为敏捷软件教练和实践者推荐的书单，涵盖敏捷技术（测试驱动开发、重构、持续交付、代码整洁等）、敏捷管理（Scrum、看板、敏捷转型等）、教练技术（高绩效教练、共创式教练等）、引导技术（世界咖啡、开放空间等）、通用管理（团队协作、第五项修炼等）、领导力（影响力、驱动力等）以及哲学心理学（道德经、心流、自控力等）多个领域，帮助读者构建完整的敏捷知识体系和个人能力。\",\"content\":\"$31\",\"tags\":[\"软件开发\",\"敏捷教练\"],\"published\":true,\"readingTime\":9,\"category\":\"swd\",\"relativePath\":\"swd/agile/agile-growth-assistant.mdx\"},{\"slug\":\"3-misunderstandings-of-programmer\",\"year\":\"2021\",\"month\":\"02\",\"day\":\"22\",\"title\":\"程序员的3种思维误区\",\"date\":\"2021-02-22T00:00:00.000Z\",\"excerpt\":\"总结程序员在职业发展过程中常见的三种思维误区：不思考业务价值、不注重基本功修炼、不愿跳出自我局限。文章通过实际案例和寓言故事，阐述如何避免这些误区，强调要用正确的方式做正确的事情，追求卓越，持续改进，成为有价值的程序员。\",\"content\":\"$32\",\"tags\":[\"职业成长\"],\"published\":true,\"readingTime\":10,\"category\":\"career\",\"relativePath\":\"career/3-misunderstandings-of-programmer.mdx\"},{\"slug\":\"avoid-ineffective-knowledge-management\",\"year\":\"2021\",\"month\":\"02\",\"day\":\"02\",\"title\":\"远离无效的知识管理\",\"date\":\"2021-02-02T00:00:00.000Z\",\"excerpt\":\"探讨软件开发团队中的知识管理问题，区分显性知识、隐性知识和不可言说知识三类。文章指出团队常陷入企图用显性知识管理方式处理不可言说知识的陷阱，强调有效的知识管理需要通过社交活动如结对编程、Code Review等来传递不可言说的知识，形成生产-传递-运用-吸收的完整知识消费闭环。\",\"content\":\"$33\",\"tags\":[\"软件开发\",\"敏捷教练\"],\"published\":true,\"readingTime\":9,\"category\":\"swd\",\"relativePath\":\"swd/agile/avoid-ineffective-knowledge-management.mdx\"},{\"slug\":\"some-thought-of-a-book\",\"year\":\"2020\",\"month\":\"07\",\"day\":\"15\",\"title\":\"《你只是看起来很努力》些许感想\",\"date\":\"2020-07-15T00:00:00.000Z\",\"excerpt\":\"阅读《你只是看起来很努力》后，作者通过书中故事分享了几个重要感悟。关于不要忽视亲人，提醒我们不要对习关于警惕弱者思维，批评别人容易但建设性建议才是关键，当一个人取得成功时应研究学习而非盲目批判。书中核心观点是你只是看起来很努力——很多人看似忙碌实则低效，时间管理和专注是挑战。通过设定明确目标、排除外界干扰来保持专注，提升效率。对于不同观点应以开放心态看待，尊重每个人的价值观。\",\"content\":\"$34\",\"tags\":[\"生活\"],\"published\":true,\"readingTime\":4,\"category\":\"life\",\"relativePath\":\"life/some-thought-of-a-book.mdx\"},{\"slug\":\"tcr-is-not-best-practice\",\"year\":\"2020\",\"month\":\"02\",\"day\":\"09\",\"title\":\"TCR不是最佳实践\",\"date\":\"2020-02-09T00:00:00.000Z\",\"excerpt\":\"探讨TCR（Test \u0026\u0026 Commit || Revert）这一极限编程实践的本质和价值。TCR要求测试通过就提交代码，测试失败就回滚代码，通过极端的反馈机制强迫开发者频繁进行小步提交。文章分析TCR的核心目的不是作为常规实践，而是作为学习工具帮助开发者体会小步提交的价值。\",\"content\":\"$35\",\"tags\":[\"软件开发\",\"极限编程\"],\"published\":true,\"readingTime\":11,\"category\":\"swd\",\"relativePath\":\"swd/xp/tcr-is-not-best-practice.mdx\"},{\"slug\":\"story-kickoff-and-deskcheck\",\"year\":\"2020\",\"month\":\"02\",\"day\":\"06\",\"title\":\"故事的首尾呼应\",\"date\":\"2020-02-06T00:00:00.000Z\",\"excerpt\":\"介绍用户故事开发中的两个轻量级实践：Story Kick Off（开卡）和 Story Desk Check（验卡）。通过情景再现的方式说明这两个实践如何帮助团队在开发前达成需求共识、在开发后快速验收，通过前置反馈减少返工浪费，确保团队始终在做正确的事情。\",\"content\":\"$36\",\"tags\":[\"软件开发\",\"极限编程\"],\"published\":true,\"readingTime\":10,\"category\":\"swd\",\"relativePath\":\"swd/xp/story-kickoff-and-deskcheck.mdx\"},{\"slug\":\"mocks-arent-stubs\",\"year\":\"2020\",\"month\":\"01\",\"day\":\"02\",\"title\":\"Mocks 不是 Stubs\",\"date\":\"2020-01-02T00:00:00.000Z\",\"excerpt\":\"深入探讨Mock对象与Stub的区别，介绍状态验证与行为验证两种测试风格，以及古典派（Classical）和模拟派（Mockist）TDD的差异。文章通过代码示例详细说明两种测试风格的特点、优缺点和适用场景，帮助开发者理解如何选择合适的测试策略。\",\"content\":\"$37\",\"tags\":[\"软件开发\",\"TDD\"],\"published\":true,\"readingTime\":20,\"category\":\"swd\",\"relativePath\":\"swd/xp/tdd/mocks-arent-stubs.mdx\"},{\"slug\":\"solid-in-depth-explanation-en\",\"year\":\"2019\",\"month\":\"12\",\"day\":\"27\",\"title\":\"SOLID entrepreneurial story of Mr. Object-Oriented\",\"date\":\"2019-12-27T00:00:00.000Z\",\"excerpt\":\"\\n\\n\\n\\nMain members Introduction:\\n\\n- Mr. Yuan: boss, alias Mr. Object-Oriented, Referred to as Yuan\\n- Ms. Wu, Ms. Cai, Mr. Xiao, Mr. Shi, Mr Fa, Ms. Ren, Mr. Xing, employees\\n\\n\\n\\nAfter doing so many years ...\",\"content\":\"$38\",\"tags\":[\"软件开发\",\"面向对象\"],\"published\":true,\"readingTime\":27,\"category\":\"swd\",\"relativePath\":\"swd/oo/solid-in-depth-explanation-en.mdx\"},{\"slug\":\"solid-in-depth-explanation\",\"year\":\"2019\",\"month\":\"08\",\"day\":\"15\",\"title\":\"听面向对象先生聊SOLID创业故事\",\"date\":\"2019-08-15T00:00:00.000Z\",\"excerpt\":\"SOLID五大原则的创业故事解读：ISP（接口隔离原则）如袁Sir为不同顾客提供不同工具箱，不要强迫使用者依赖不需要的接口；LSP（里氏替换原则）如徒弟继承师傅手艺但修改风格会导致合作失败，强调子类替换父类行为需一致；DIP（依赖倒置原则）如通过服务清单依赖抽象而非具体执行者，从依赖实现转向依赖抽象；SRP（单一职责原则）如部门拆分各司其职，关注点分离提高效率；OCP（开闭原则）如引入读书大使对扩展开放对修改关闭。SOLID帮助设计高内聚低耦合的软件，降低维护成本。\",\"content\":\"$39\",\"tags\":[\"软件开发\",\"面向对象\"],\"published\":true,\"readingTime\":9,\"category\":\"swd\",\"relativePath\":\"swd/oo/solid-in-depth-explanation.mdx\"},{\"slug\":\"feedback-in-thoughtworks\",\"year\":\"2019\",\"month\":\"04\",\"day\":\"15\",\"title\":\"在ThoughtWorks，希望你知道的Feedback\",\"date\":\"2019-04-15T00:00:00.000Z\",\"excerpt\":\"在ThoughtWorks，Feedback的重要性犹如发动机于车，摒弃了传统KPI绩效考核后，Feedback成为推进绩效管理的核心机制。优质的Feedback需要具备三个基本属性：有心（走心，借助实际案例支撑）、有料（基于事实表达，避免空泛评价）、有效（及时传达、提供改进措施并促成执行）。Feedback对于个人而言能提升工作体验和胜任力，对于组织而言能帮助新人顺利转正、传承文化。作为提供方，应构建安全环境、使用沟通技巧；作为接受方，应保持开放心态、积极行动。\",\"content\":\"$3a\",\"tags\":[\"职业成长\"],\"published\":true,\"readingTime\":8,\"category\":\"career\",\"relativePath\":\"career/feedback-in-thoughtworks.mdx\"},{\"slug\":\"beyond-training\",\"year\":\"2019\",\"month\":\"03\",\"day\":\"26\",\"title\":\"超越培训 -- 比培训多做一点点\",\"date\":\"2019-03-26T00:00:00.000Z\",\"excerpt\":\"本文发表于ThoughtWorks洞见。思沃内训团队的定位是超越培训、搞能力建设。单纯培训难以解决能力问题，必须比培训多做一点。训战模式核心思想是培训+实战，统筹训前、中、后三个阶段，做到训前瞄准、训中调整、训后复审。训前深入团队分析现状，量身定制方案；培训中诱发认知转变，通过螺旋化共创让学员经历困惑、解惑过程；训后部署训战计划促进知识转换。训战成功要素包括一致期望、专业培训、承诺计划、严格跟踪。最终目标是帮助团队将知识转化为技能，解决实际问题。\",\"content\":\"$3b\",\"tags\":[\"软件开发\",\"敏捷教练\"],\"published\":true,\"readingTime\":8,\"category\":\"swd\",\"relativePath\":\"swd/agile/coaching/beyond-training.mdx\"},{\"slug\":\"talking-about-is-a-in-ood\",\"year\":\"2018\",\"month\":\"12\",\"day\":\"25\",\"title\":\"聊聊面向对象设计中的Is-A\",\"date\":\"2018-12-25T00:00:00.000Z\",\"excerpt\":\"面向对象设计的三大特性是封装、继承、多态，IS-A是检验继承关系的常用工具。然而IS-A在某些场景下会失效，如Square IS A Rectangle在业务逻辑中并不成立——当Square重写setWidth和setHeight改变行为时，使用父类引用调用方法会产生不同结果。LSP（里氏替换原则）强调IS-A是基于行为方式的，当子类改变父类行为时需要重新审视继承关系。解决方案是进一步抽象，将Square和Rectangle抽象为Quads，回归多态本质。\",\"content\":\"$3c\",\"tags\":[\"软件开发\",\"面向对象\"],\"published\":true,\"readingTime\":2,\"category\":\"swd\",\"relativePath\":\"swd/oo/talking-about-is-a-in-ood.mdx\"},{\"slug\":\"make-lsp-working-for-you\",\"year\":\"2018\",\"month\":\"12\",\"day\":\"15\",\"title\":\"让里氏替换原则为你效力\",\"date\":\"2018-12-15T00:00:00.000Z\",\"excerpt\":\"SOLID是面向对象设计的五大原则，LSP（里氏替换原则）强调子类实例替换父类实例不会改变程序行为。Square继承Rectangle的例子展示了LSP被破坏的场景——当Square重写setWidth和setHeight改变行为时，替换会导致程序出错。继承的核心目的是复用，但子类不应重写父类方法。可以用Is-A初步验证继承关系，当LSP失效时需要进一步抽象，将Square和Rectangle抽象为Quads，避免破坏LSP。LSP是检验继承关系合理性的有效工具，帮助减少继承滥用，提升软件设计质量。\",\"content\":\"$3d\",\"tags\":[\"软件开发\",\"面向对象\"],\"published\":true,\"readingTime\":6,\"category\":\"swd\",\"relativePath\":\"swd/oo/make-lsp-working-for-you.mdx\"},{\"slug\":\"two-basic-element-of-scrum-team\",\"year\":\"2018\",\"month\":\"11\",\"day\":\"27\",\"title\":\"Scrum团队的两个基本元素\",\"date\":\"2018-11-27T00:00:00.000Z\",\"excerpt\":\"Scrum犹如一场创业，自治团队最基础的两个元素是\\\"志同\\\"和\\\"自省\\\"。敏捷精髓在于价值观层面：尊重、沟通、专注、承诺、勇气、反馈、开放。团队需持续自省，跳出术的视野思考实践是否违背核心价值观。志同则是高效协作的核心动力，团队成员目标一致且互相信任，具备T型技能和多功能特性。敏捷分三个层次：道（价值观）、法（原则）、术（实践），前进方式应是守、破、离——先守术，再破法，最后根据价值观创新实践。\",\"content\":\"$3e\",\"tags\":[\"软件开发\",\"敏捷教练\"],\"published\":true,\"readingTime\":5,\"category\":\"swd\",\"relativePath\":\"swd/agile/coaching/two-basic-element-of-scrum-team.mdx\"},{\"slug\":\"understand-agile-manifesto-deeply\",\"year\":\"2018\",\"month\":\"10\",\"day\":\"30\",\"title\":\"深入解读敏捷宣言\",\"date\":\"2018-10-30T00:00:00.000Z\",\"excerpt\":\"2001年17位反叛性软件开发人员在犹他州雪鸟城制定并签署敏捷宣言。四句核心价值观：个体与交互优于流程与工具、可工作的软件优于面面俱到的文档、客户协作优于合同谈判、响应变化优于遵循计划。以人为本强调尊重信任激发个人潜能，建立自治全功能团队。价值导向以交付可工作的软件为核心，文档应有选择地保留。客户团队强调与客户建立信任合作关系取代敌对谈判。拥抱变化道出敏捷精髓——通过高效协作获取快速反馈以减少浪费。敏捷是文化价值认同，比形式更重要的是对敏捷价值观的理解和认同。\",\"content\":\"$3f\",\"tags\":[\"软件开发\",\"敏捷教练\"],\"published\":true,\"readingTime\":8,\"category\":
