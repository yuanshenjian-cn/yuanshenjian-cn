系统默认自带的。\n\n**第一步：安装 WSL**\n\n以管理员身份打开 PowerShell，执行：\n\n```powershell\nwsl --install\n```\n\n这会安装默认的 Ubuntu 发行版。安装完成后重启电脑，按提示设置 Ubuntu 用户名和密码。\n\n如果已经安装了 WSL，可以跳过此步骤。\n\n**第二步：在 WSL 中安装 OpenCode**\n\n打开 WSL 终端（在开始菜单搜索 \"Ubuntu\" 或 \"WSL\"），然后执行：\n\n```bash\ncurl -fsSL https://opencode.ai/install | bash\n```\n\n**WSL 目录关联说明**\n\n在 WSL 中，Windows 磁盘被挂载到 `/mnt` 目录下。了解路径对应关系有助于在 WSL 中访问 Windows 文件：\n\n| Windows 路径              | WSL 路径                      |\n| ----------------------- | --------------------------- |\n| `C:\\Users\\Name\\project` | `/mnt/c/Users/Name/project` |\n| `D:\\workspace`          | `/mnt/d/workspace`          |\n| `E:\\data`               | `/mnt/e/data`               |\n\n例如，要在 WSL 中打开 Windows 的 D 盘工作目录：\n\n```bash\ncd /mnt/d/workspace\nopencode\n```\n\n**方式二：npm 安装**\n\n```powershell\nnpm install -g opencode-ai\n```\n\n### 桌面应用安装（BETA）\n\n从官方发布页下载对应平台安装包：\n\n| 平台 | 下载文件 |\n|------|----------|\n| macOS (Apple Silicon) | opencode-desktop-darwin-aarch64.dmg |\n| macOS (Intel) | opencode-desktop-darwin-x64.dmg |\n| Windows | opencode-desktop-windows-x64.exe |\n| Linux | .deb / .rpm / AppImage |\n\n下载地址：[https://opencode.ai/download](https://opencode.ai/download)\n\n\u003e ⚠️ **注意**：桌面应用目前处于 BETA 阶段，功能可能不如终端版本稳定。\n\n\n### 启动与初次使用\n\n安装完成后，在终端输入以下命令启动 OpenCode：\n\n```bash\nopencode\n```\n\n![OpenCode 启动界面](/images/swd/ai-coding/opencode/opencode-start-ui.webp)\n\n**首次启动流程**：\n\n1. **欢迎界面**：看到 OpenCode 的 TUI（终端用户界面）\n2. **模型选择**：首次启动会提示选择 AI 模型\n   - 选择标注 **Free** 的限时免费体验模型（如 Kimi K2.5、MiniMax M2.1、GLM-4.7），体验期间无需配置 API Key\n   - 或选择 `/connect` 配置自己的 API Key 或登录已有账户\n3. **开始使用**：进入主界面后，输入 `/help` 查看帮助\n\n**验证安装成功**：\n\n**快速测试**：\n\n```bash\n# 启动 OpenCode\nopencode\n\n# 在界面中输入\n你好，是现在使用的LLM是什么？你擅长做什么？\n```\n\n如果看到 AI 回复，说明安装成功。\n\n### 配置模型\n\n**使用免费体验模型（限时，无需 API Key）**：\n\n启动后输入 `/models` 查看可用模型，选择标注 **Free** 的限时免费体验模型（如 Kimi K2.5、GLM-4.7、MiniMax M2.1）。体验期间无需连接供应商或配置 API Key 即可直接使用。\n\n\u003e ⚠️ **注意**：免费体验模型可能有使用限制或时限，建议长期使用前配置自己的 API Key 或考虑 OpenCode Zen 服务。\n\n**连接商业模型**：\n\n\n```bash\n# 方式一：命令行\nopencode auth login\n\n# 方式二：TUI 中输入\n/connect\n```\n\n按提示选择提供商（OpenAI、Anthropic、Google 等）并粘贴 API Key。\n\n**使用已有账号登录**：\n\nOpenCode 支持直接登录你已经付费的 AI 服务账号：\n- **Claude**：输入 `/connect`，选择 Anthropic，粘贴 API Key\n- **ChatGPT Plus/Pro**：输入 `/connect`，选择 OpenAI，登录你的 ChatGPT 账户\n\n这样可以复用你已经订阅的服务，无需额外付费。\n\n\u003e💡 **提示**：新手可以先使用免费模型体验，需要更好性能时再考虑使用 Zen。\n\n## 核心功能\n\n### 双模式工作流\n\nOpenCode 提供两种工作模式，通过 **Tab 键** 切换：\n\n**Build 模式（默认）**\n- AI 拥有完整编辑权限\n- 可直接修改文件、执行命令\n- 适合直接编码任务\n\n**Plan 模式**\n- AI 只读，不修改文件\n- 提供实施方案和步骤\n- 适合规划和审查\n\n**使用建议**：复杂任务先 Plan 后 Build，简单任务直接 Build，关键代码人工确认后再执行。\n\n### 项目初始化\n\n进入项目目录后执行：\n\n```bash\ncd /path/to/your/project\nopencode\n```\n\n在 TUI 中输入：\n\n```bash\n/init\n```\n\n`init`命令会做如下事情：\n1. 扫描整个项目 - 分析项目结构和所有内容\n2. 理解项目类型 - 识别项目使用的技术栈、框架和架构\n3. 生成 AGENTS.md - 创建一个包含项目特定规则和指南的 AGENTS.md 文件\n\n`AGENTS.md`会帮助 opencode 更好地导航和理解项目，在后续任务中更懂你。一定要将 `AGENTS.md` 提交到 Git，便于团队协作。\n\n### 内置工具集\n\nOpenCode 通过工具操作代码库，可在 `opencode.json` 中配置权限：\n\n| 工具 | 功能 | 权限选项 |\n|------|------|----------|\n| **bash** | 执行 shell 命令 | allow/deny/ask |\n| **read** | 读取文件内容 | allow |\n| **write** | 创建新文件 | allow/ask |\n| **edit** | 修改文件内容 | allow/ask |\n| **patch** | 应用代码补丁 | allow/ask |\n| **grep** | 搜索文件内容 | allow |\n| **glob** | 列出匹配文件 | allow |\n| **list** | 列出目录内容 | allow |\n| **webfetch** | 抓取网页内容 | allow |\n| **websearch** | 网络搜索 | allow（需 `OPENCODE_ENABLE_EXA=1`）|\n| **skill** | 加载 SKILL.md 技能文件 | allow |\n| **todowrite** | 创建/更新任务清单 | allow |\n| **todoread** | 读取任务清单 | allow |\n| **question** | 向用户提问 | allow |\n\n### 常用 Slash 命令\n\n在 TUI 中输入 `/` 查看所有命令：\n\n**核心命令**：\n\n| 命令 | 功能 | 快捷键 |\n|------|------|--------|\n| `/connect` | 配置模型提供商 | - |\n| `/init` | 初始化项目 | Ctrl+X I |\n| `/models` | 切换模型 | Ctrl+X M |\n| `/new` | 新会话 | Ctrl+X N |\n| `/compact` | 压缩当前会话（总结上下文） | Ctrl+X C |\n| `/sessions` | 列出并切换会话 | Ctrl+X L |\n| `/export` | 导出对话为 Markdown | Ctrl+X X |\n| `/undo` | 撤销更改 | Ctrl+X U |\n| `/review` | 审查代码变更 | - |\n| `/share` | 分享会话 | Ctrl+X S |\n| `/exit` | 退出 | Ctrl+X Q |\n\n### 文件引用语法\n\n使用 `@` 快速引用项目文件：\n\n```\n解释 @src/main.ts 中的逻辑\n```\n\n支持模糊搜索，输入 `@` 后按文件名自动补全。\n\n## 参考链接\n\n- **官网**：[https://opencode.ai](https://opencode.ai)\n- **GitHub**：[https://github.com/anomalyco/opencode](https://github.com/anomalyco/opencode)\n- **文档**：[https://opencode.ai/docs](https://opencode.ai/docs)\n- **下载页面**：[https://opencode.ai/download](https://opencode.ai/download)\n"])</script><script>self.__next_f.push([1,"2a:T224a,"])</script><script>self.__next_f.push([1,"\n## 保持简单\n\n\n\u003e 简单是一个成年人司空见惯的词，然而，大部分成年人却觉得纯真的孩子才是简单的。\n\u003e\n\n\n\n很多时候，人们习惯把`简单`跟`容易`理解成一个意思。简单和复杂多用于形容事物或人的属性或状态，容易和困难一般形容达到某种目标的过程。生活中经常听到这样的感慨：「人活简单点真难啊！」、「系统一不小心就搞复杂了」。这些感慨背后流露出一种心愿 -- **保持简单**。\n\n\n\n![画板](/images/swd/xp/simple-design/keep-it-simple.webp)\n\n\n\n\n\n\n\n对于人来说，保持简单可能意味着人情世故的简单、工作关系的简单、心态的简单。对于软件系统来说，则意味着系统设计的简单、部署运维的简单等等。\n\n\n\n\n\n## 三重境\n\n\n\u003e 看山是山，看水是水；看山不是山，看水不是是水；看山是山，看水是水。\n\u003e\n\n\n\n`保持简单`的确不是一件容易的事情。禅宗提出的人生三境界中也诠释了这个理：人从简单开始，以复杂贯穿了大部分甚至整个人生，最后返璞归真。\n\n\n\n对应到一个需求简单的软件系统中，系统的设计一开始处于简单的状态。然而软件开发的核心问题是复杂多变的业务需求，随着时间的推移，软件系统可能呈现出以下三个状态：\n\n\n\n![画板](/images/swd/xp/simple-design/system-states.webp)\n\n\n\n\n\n正常情况下，没有人希望系统处于第三个状态，而是从第二个状态回到第一个状态。映射到禅宗的人生三境界，系统的理想三境界是：\n\n\n\n1. 清晰 -- 单一化\n2. 复杂 -- 层级化\n3. 清晰 -- 模块化\n\n\n\n![画板](/images/swd/xp/simple-design/three-states.webp)\n\n\n\n\n\n在面临复杂多变的业务需求，如何设计一个恰好简单够用的系统？如何保持系统的高响应力？程序员们一直都没有停止对最佳实践的探索，始终为这些目标奋斗。软件开发的所有问题最终都能归结到人身上，那么驱动程序员不断改进的力量是什么？\n\n\n\n袁帅心中有一个答案：**对简单设计、高响应力价值的认可，对简单设计价值观的深层内化**。\n\n\n\n## \n## 核心观\n\n\n价值观往往给人一种感觉：看着这些高大上的词汇，缺点什么，却总又说不上来。比如极限编程（XP）的价值观：沟通、简单、反馈、勇气、尊重。再比如 Scrum 的价值观：专注、开放、承诺、勇气、尊重。尤其是刚开始接触这 些知识体系的新人，每个词都能看懂，只是不知道它们如何去指导 XP 和 Scrum。\n\n\n\n在 Thoughtworks 工作这么多年，袁帅亲自实践过 XP 和 Scrum，也在很多场合传授过它们，再回过头来看，他深刻体会到一点 -- XP 和 Scrum 的那些实践跟它们的价值观都非常吻合。袁帅能够在日常开发以及培训和练习中去落地简单设计，这背后驱使他不断探索的是已内化于心的观念：\n\n\n\n\n\n![画板](/images/swd/xp/simple-design/simple-design-values.webp)\n\n\n\n## \n## 专注\n\n\n在 Scrum 中，专注强调的是所有人都专注于 Sprint 目标，团队同为一个目标努力。对于简单设计，要专注在哪里呢？袁帅结合他自身经历的几个典型的场景来看：\n\n\n\n1. 一上来匆匆忙忙编写业务代码，没有Tasking，没有测试，没有设计，业务Scope逐步偏离或扩大\n2. 在编码阶段，听到声音：“你这个设计太土气了，都没用设计模式”，于是琢磨着怎么去套设计模式\n3. 在系统架构设计阶段，有人说：“什么年代了，你还不拆出几个微服务”，于是尝试拍脑袋拆出一个分布式单体\n\n\n\n上述三个场景，究其根本，是没能很好地专注于自己要实现的真实业务价值，要么缺乏思考和设计，要么受外界影响，舍本琢末。你可能会质问：不应该多做点设计来兼容后期可能出现的情况吗？为未来做设计，难免会掺入不合时宜的猜测，不仅增加系统当前的复杂度，还可能浪费成本。\n\n\n\n袁帅觉得要始终保持对当下真实业务价值的专注，专注理解业务本质，专注于刚好够用的设计，时刻让系统保持简单，尽可能跟业务模型保持匹配和同步。\n\n## \n\n\n\n\n## 克制\n\n\n克制力是一项非常重要且需要长期培养的能力。由于受到太多外界的干扰而难以定静，成年程序员经常会因为沉浸在自己的世界里，可能出现乐观估算，还可能经常过度设计。\n\n\n\n而实际上，大部分乐观的估算会让团队交付面临更多风险，大部分健壮性设计会让系统难以理解和修改。袁帅想起来自己曾经面试过的一个候选人，一个很简单的业务需求，硬生生地套用了5种设计模式，叹为观止。\n\n\n\n在日常交付项目和工作坊中，袁帅会较为留意开发人员嘴里发出的 “我觉得”、“假如”、“万一”、“以后”等用语，这些用语背后所隐藏的溢念（溢出的想法），很可能促使该开发人员交付一个不满足需求的软件，或者一个难以维护的系统。\n\n\n\n袁帅觉得程序员克制自己一个有效的方式是培养业务视角，站在用户使用系统的视角尝试深刻理解业务，通过将业务需求进一步拆解成小颗粒度的任务来让自己保持聚焦。Think Big（深刻理解业务问题并拆分），Start Small（每次只聚焦在某一个小的任务），Move Fast（快速完成一个个小的任务并获得反馈）。\n\n\n\n\n\n\n\n\n\n## 洁癖\n\n\n袁帅经常在Code Review中被同事开玩笑说有代码洁癖，比如对命名太较真了。一开始他会有所妥协，毕竟软件开发是一个团队来完成的，如果因为某个人的洁癖而让其他人不舒适，可能不利于团队协作。可是时间后来告诉他，那些身披不认真或者不严格标签的小魔头在后面出来制造各种噪音，比如命名看不懂、结构不一致、架构混乱臃肿等等。\n\n\n\n做程序员这几年，洁癖潜移默化影响着袁帅的编码和设计风格，小到变量命名、代码注释、文档管理，大到系统架构，他都会时刻保持警惕，尽其所能去消除噪音污染。在没有其他不可抗拒的因素前提下，他都会尽力尝试让团队接纳自己对代码洁癖的追求。\n\n\n\n洁癖更侧重于团队个体成员，对于个体，可以通过不断提升自己的整洁代码认知来强化它，并尝试在实践中去运用它们。而对于团队，我想到一条指导原则：**任何有助于提升系统质量的洁癖都不应该被忽视，团队应该尽力接纳并落实。**\n\n## \n\n\n## \n## 懒惰\n\n\n\u003e 恰当的“懒惰”是一个优秀的程序员必备的特质，因为 Ta 总是勤于思考如何才能少做重复的事情。\n\u003e\n\n\n\n懒惰听起来是一个负面的词，中国几千年的文化价值观在告诉每一个人要做勤奋努力的人。在软件开发领域，袁帅认为恰当的懒惰是解放程序员生产力、保持系统简单的助推剂，比如：\n\n\n\n+ 需求或设计变更，懒得改太多代码。怎么办？消除代码重复，隔离和封装变化，分离关注点\n+ 手工集成和测试，懒得重复做。怎么办？增加自动化测试并做好CI/CD\n+ 用户鉴权分散在各个服务中，懒得修改所有的服务。怎么办？引入API Gateway\n+ 新人上项目，搭建环境反复找我，懒得重复讲。怎么办？编写自动化脚本和文档指南\n\n\n\n如果每次面对相同的问题，不得不花精力去处理，在这种毫无挑战的重复性工作中，人通常很容易犯错，所以，当手懒得去做这些事情，懒惰会驱使大脑去思考一种更加高效的方式，比如隔离变化将其封装，引入自动化，从而取代一遍遍的重复的操作，并且大脑还会思考如何运用 KISS(Keep it Simple and Stupid)，Yagni，如无必要，勿增实体。\n\n\n\n有一种看似很”勤快”的CCCV（CMD + C | CMD + V）编码行为，这些行为背后跟袁帅提倡的懒惰大相径庭。CCCV行为是思想上的懒惰，在这种思维的指导下，双手会乐此不疲去重复做很多重复的事情，CCCV当规避之。\n\n\n\n勤于思考，惰于盲行，做一个具备恰当惰性的程序员是一种快乐。\n\n\n\n\n\n## \n## 需要勇气\n\n\n在 XP 和 Scrum 鼓励人们要有勇气去做正确的事情、处理棘手的问题、做出承诺、坚持原则、拒绝损害工作的行为、暴露自己的不足并寻求帮助、提供有建设性的意见等。\n\n\n\n要保持简单，这些勇气也是不可或缺的。同时，袁帅提倡程序员培养 保持专注、克制溢念、养成代码洁癖、滋养恰当的懒惰的勇气。"])</script><script>self.__next_f.push([1,"2b:T33ae,"])</script><script>self.__next_f.push([1,"\n欢欢：“你看我的代码用了策略模式和状态模式，假如后面客户会有这样的需求，可以无缝扩展，多么健壮！” 清扬一脸狐疑，心中念叨了数遍 ：\"哼，过度设计！”，只见她欲言又止，好几次话到嘴边又被自己咽回去了。\n\n\n\n这种关于设计的讨论，袁帅最近一周不是第一次听到了，就在昨天他还看到清扬和正义的一次口水仗。最近清扬有点仕途不顺，几次被结对的搭档怼的无言以对。袁帅想为他的Buddy清扬“讨回公道”，但不是直接出面帮清扬怼回去。\n\n\n\n## 设计的标准在哪里？\n\n\n周五下午，袁帅在给SDP做最后的润色，前两周他跟Jeany联手汉化了公司Global推出的SDP[1]，China Capability团队也完成了校审。SDP上醒目的三条价值观的「**简单性**」让他陷入沉思：\n\n\n\n\u003e **简单性**：我们重视刚刚够用的设计。只为当下设计，不为未来可能会出现的需求做设计。但是，我们做出的决策应当允许软件快速变更，能够快速响应需求变化。\n\u003e\n\n\n\n「简单性」，看起来也似乎明白在讲什么，可什么是刚刚够用的设计呢？这句话让他想起来当年他在一次OOBootcamp课后跟某个学员说过的一句话：“设计犹如西红柿炒鸡蛋，盐要恰到好处。” 这句话是如此的正确却又无比空洞。\n\n\n\n设计的好坏本身没有一个标准的答案，这么多年，袁帅也在跟着软件界各路神仙学习设计原则，仍然处在似懂非懂的状态。他也深知每个人心中都有一杆秤。**什么是好的设计？**便成了公说公有理，婆说婆有理的问题，谁也难以说服谁。\n\n\n\n这一次他不太想提那些空空如也的东西，为了能够让清扬快速掌握要点，他尝试将范围缩小到敏捷团队程序员交付用户故事卡时的编码设计，避开架构设计。从变量、常量、方法、类、类与类之间的关系、对象的交互开始。\n\n\n\n\n\n## 重温旧文：简单设计\n\n\n周六，袁帅很早就钻到书房，点燃背景音乐《稻香》，打开博客主页，发现了一篇多年前写的文章《简单设计》，仔细通读一遍之后，他觉得还不错，可以作为入门，发给清扬阅读，约下周一大一早去公司讨论。\n\n\n\n他花了近一个小时将文字润色，也基于最近对设计的体会调整了部分内容，保留了文章的整体脉络。\n\n\n\n\n\n## 用具体的词汇表达设计\n\n\n抽象的设计问题大大提升了初学者的学习门槛，想得太多怕被说过度设计，吃饱撑着没事找事。想少了，又怕被人认为能力不足，无脑编码。到底怎么办，怎么样才能做出好的设计？SOLID、GoF的23种设计模式、STUPID、GRASP这些原则学会了就可以了吗？No，统统忘掉这些抽象不接地气的设计原则。\n\n\n\n起步，尽量别为难自己。极限编程领域的大师程序员Kent Beck很早前就提出了4条相对容易理解的参考原则：\n\n\n\n{/* 这是一张图片，ocr 内容为：高 通过测试 消除重复 揭示意图 最少元素 低 */}\n![](/images/swd/xp/simple-design/simple-design-pyramid.webp)\n\n\n\n\n\n\n\n## 原则一：通过测试（信仰）\n\n\n**「通过测试」** 通常会被一概地理解为通过自己在项目中的各种测试（自动化 + 手工），这么理解，也没有什么问题，但是需要满足两个前提条件：\n\n\n\n1. 测试覆盖率达到100%\n2. 所有测试都是有效的\n\n\n\n如果你的项目中没法满足这两点，当然，99%的项目是做不到的（还有1%存在传说中）。此时你需要换一个角度去理解 _通过测试_。\n\n\n\n你为什么写测试？测试在测什么？不就是为了增强你对系统功能是否满足了业务需求的信心吗？所以「**通过测试 **」广义理解为要满足业务需求，不论是自动化测试还是手工测试，你需要做的是满足业务需求，只不过我们提倡尽可能编写足够的自动化回归测试。\n\n## \n\n\n## 原则二：消除重复（职责）\n\n\n\u003e 重复乃万恶之源 -- Kent Beck没有说过\n\u003e\n\n\n\n重复意味着_低内聚、高耦合_，导致的后果是难以修改（霰弹式修改），必然降低系统对变化的响应力。响应力的降低势必会造成维护工作量的提升，[我的简单设计价值观](https://www.yuque.com/yuanshenjian/clean-coder/simple-design.value) 一文中的_懒惰_ 将驱使我尽我所能消除这些重复，从而减少修改时的工作量，提升软件的响应力。\n\n## \n\n\n## 原则三：揭示意图（初衷）\n\n\n揭示意图，听起来是一个不可言说的概念，怎样表示揭示意图了呢？对于这一条，我们很难有一个标准且完美的答案，做不到完美，但不妨碍我们努力尝试趋近完美。\n\n\n\n你可以在编码过程中，不断问自己：代码容易理解吗？它有没有偏离它的初衷（业务需求）？紧接着，进一步探索这背后暴露的行为信号 -- 「解释」：\n\n\n\n1. 新人了解了业务需求后，能够第一时间清晰地从代码中找到对应的代码吗？\n2. 你需要额外对一个新人解释代码的含义吗？如果要，你要解释到什么程度？\n\n\n\n这几个问题会让你不断反思你的代码能够体现业务初衷吗？变量、方法以及类的命名等，你时刻都保持警惕的是：**赋予它一个更加准确表达业务的名字，一个不要额外解释的名字。**从而让读者能够在深入细节之前就能够在较高层次上快速理解代码的意图。\n\n\n\n\n\n\n\n## 原则四：最少元素（精髓）\n\n\n既然说的是代码，那么充斥在你的代码库中的任何东西都可以理解是元素。当然，我们还是焦点聚焦在与代码相关的元素，比如，变量、常量、注释、注解、关键字、包。\n\n\n\n「**最少元素**」 的核心思想是：在不必要的时候，尽可能减少代码元素来降低代码复杂度，保持简洁，贯彻less is more的思想，它道出了简单设计的精髓。\n\n\n\n\n\n\n\n## 原则五：前四条优先级依次降低（灵魂）\n\n\n简单设计前四条原则给设计决策提供了指导，在实际运用过程中，当面临冲突时，我们如何取舍，Kent Beck也提出一个优先级：通过测试 \u003e 消除重复 \u003e= 揭示意图 \u003e 最少元素。\n\n\n\n以上四条优先级依次降低，这就话有点类似敏捷宣言中的最后一句：也就是说，尽管右项有其价值，我们更重视左项的价值[3]。\n\n\n\n1. 通过测试\n2. 消除重复\n3. 揭示意图\n4. 最少元素\n5. **以上四条优先级依次降低**\n\n\n\n## \n## 优先级帮助揭开迷雾\n\n\n周末过的飞快，清扬读完了袁帅发给他的《简单设计》，而且读了很多遍，一脑子的疑问等着要找袁帅探讨。她比往日提前了一个小时到了办公室，只见袁帅已经在工位，一副就等她来战的态势。\n\n\n\n还没等清扬开口，袁帅递给她四张红色卡片，是他的手写笔记，清扬见字迹工整，貌似她从未见过袁帅如此认真写过字，颇感意外和感动，格外认真地阅读起来。\n\n\n\n![画板](/images/swd/xp/simple-design/simple-design-cards.webp)\n\n\n\n\n\n“清扬，考你一个脑筋急转弯 -- 在工作中你的领导的领导的领导的领导（4个人），当他们给你的指令有冲突时，你该听谁的？”。“当然是听更高级领导的指令啊！”清扬条件反射式快速回答到。\n\n\n\n袁帅见状会心一笑，清扬也挠挠头貌似明白袁帅的意思。“可是，我还是......” 还没等清扬说完，袁帅示意她靠近来看他早早准备好的代码。\n\n\n\n\n\n\n\n## Talk is cheap\n\n\n示例一：\n\n```java\npublic class DateFormater {\n    public LocalDate formatUserBirthday(String birthdayStr) {\n        DateTimeFormatter formatter = DateTimeFormatter.ofPattern(\"yyyy-MM-dd\");\n        return LocalDate.parse(birthdayStr, formatter);\n    }\n    public LocalDate formatRegisterDate(String registerDateStr) {\n        DateTimeFormatter formatter = DateTimeFormatter.ofPattern(\"yyyy-MM-dd\");\n        return LocalDate.parse(registerDateStr, formatter);\n    }\n}\n\npublic class DateFormater {\n    public LocalDate formatUserBirthday(String birthdayStr) {\n        return format(birthdayStr);\n    }\n    public LocalDate formatRegisterDate(String registerDateStr) {\n        return format(registerDateStr);\n    }\n    private LocalDate format(String birthdayStr) {\n        DateTimeFormatter formatter = DateTimeFormatter.ofPattern(\"yyyy-MM-dd\");\n        return LocalDate.parse(birthdayStr, formatter);\n    }\n}\n```\n\n\n\n袁帅快速出招：“这段代码在做什么？用简单设计框架怎么解读？”。清扬敏捷地接招：“抽取公共方法，为了「消除重复」而违背「最少元素」。”\n\n\n\n\n\n示例二：\n\n```java\npublic class Scheduler {\n    public void executeJobs(int jobNumbers){\n        if (jobNumbers \u003c 1000000){\n            for (int i = 0; i \u003c jobNumbers; i++) {\n                execute();\n            }\n        }\n    }\n}\n\npublic class Scheduler {\n    public static final int MAC_CONCURRENT_EXECUTOR_NUMBERS = 1000000;\n    public void executeJobs(int jobNumbers){\n        if (jobNumbers \u003c MAC_CONCURRENT_EXECUTOR_NUMBERS){\n            for (int i = 0; i \u003c jobNumbers; i++) {\n                execute();\n            }\n        }\n    }\n}\n```\n\n\n\n“常量代替魔鬼数字，为了「揭示意图」而违背「最少元素」。”还没等袁帅发问，清扬抢先回答，当然也赢了袁帅的大拇指（向上的）。\n\n\n\n\n\n一晃就08:55了，袁帅见Jeany朝他走来，搭载着一副即将要开会的眼神，便起身准备去会议室跟她商量晚上OOBootcamp最后一次课的安排。\n\n\n\n“喂，我还有一个疑问...”  “桌上还有一张蓝色卡片，你看能不能解答你的疑问。” 袁帅扭着头得意地给清扬一个微笑，就跟Jeany进入了会议室。\n\n\n\n清扬拿起卡片开始阅读：\n\n\n\n![画板](/images/swd/xp/simple-design/code-refactoring.webp)\n\n\n\n清扬很是惊讶袁帅竟然如此懂她，不愧是优秀的Buddy，一大早开启了美好的工作节奏。她读完卡片，继续阅读袁帅留给她的几个代码示例，15分钟过去了，她对简单设计算是有点体会了，拿起一张绿色的卡片认真写下了：\n\n\n\n![画板](/images/swd/xp/simple-design/code-example.webp)\n\n\n\n## 简单设计遐想\n\n\n跟Jeany开完会，袁帅回到工位上，看到清扬留下的卡片，深感欣慰，他清楚清扬已经入门了，日后Code Review不再会被怼的无言以对，而他帮清扬“讨回公道”的小心愿很快就要实现。\n\n\n\n此时，他坐下来喝了口水，发出了感慨 -- Kent Beck 提出的简单设计原则更多关注的是代码设计，简单设计思想其实也能运用在架构设计、沟通协作上。\n\n\n\n**架构设计**\n\n\n\n+ 我们应该最先考虑的是满足业务的系统架构（通过测试：性能、稳定性等）。\n+ 借助DDD来合理的划分微服务（揭示意图：明确限界上下文）。\n+ 提取公共服务组件来分离关注点（消除重复：API Gateway、BFF等）。\n+ 最后，我们在满足了前三点的前提下尽可能简化系统架构中的组件（最少元素）。\n\n\n\n**沟通协作**\n\n\n\n+ 在与客户正式场合的沟通中，我们始终应该明确沟通主题，确定目标（通过测试 ）。\n+ 通过加强结构思考力来提升表达的结构性和清晰度，从而达到言简意赅（消除重复，揭示意图 ）。\n+ 最后，我们达到了前面三点之后尽量不说多余的废话（最少元素）。\n\n\n\n## \n## 简单不仅如此\n\n\n简单设计五原则中，测试要确保通过（满足需求）、重复应该被消除、元素没必要就不要存在，这几条看起来相对具体，而且能见字如意。但`揭示意图`这样一个每个人持有不一样标准的概念，它代表了代码的可理解性，可理解性的参考则要回到业务源头，是否准确表达了业务概念。**最后，优先级原则是万万不可忽略的，否则这个框架就失去了灵魂和生命力。**\n\n\n\n袁帅做了多年的软件开发和培训，他心里很清楚，那个完美的答案可能不存在。软件开发是一种知识工作，设计又是仁者见仁智者见智，简单设计五原则能在一定程度上帮助程序员少走弯路。\n\n\n\n除了这些，在团队社交活动发生探讨是一个非常有效的途径。这也是他如此重视在工作坊中引入社交活动的原因。代码是否易读懂，除了自我审视，还需要多几个大脑，比如：Code Review、结对编程。\n\n\n\n\n\n## 注释\n\n1. 参考Martin Fowler博客 [BeckDesignRules](https://martinfowler.com/bliki/BeckDesignRules.html)\n2. [敏捷软件开发宣言](http://agilemanifesto.org/iso/zhchs/manifesto.html)\n3. 有关简单设计更权威的表述，请参考Kent Beck的_《Extreme Programming Explained: Embrace Change》_\n    - Runs all the tests\n    - Has no duplicated logic. Be wary of hidden duplication like parallel class hierarchies\n    - States every intention important to the programmer\n    - Has the fewest possible classes and methods"])</script><script>self.__next_f.push([1,"2c:T1365,"])</script><script>self.__next_f.push([1,"\n清扬采用跨进程的状态验证避开了行为验证的陷阱，但有一些跨进程状态无法获取时，这种状态验证有点力不从心了。袁帅调整了`CIMonitor`的通知方式来探讨状态验证的困境。\n\n下班后，他快速修改了`CIMonitor`，示意清扬过来讨论。功能是：构建失败后给提交人发邮件，类图如下：\n\n![](/images/swd/xp/tdd/email-publisher-arch.webp)\n\n在此场景中，`CIMonitor`会调用`EmailPublisher`，`EmailPublisher`会调用进程边界交互组件`JavaMailSender`（Spring mail提供的类库）来发送邮件到邮件服务器，邮件服务器会给指定邮箱的人发通知邮件。程序正常执行后的最终状态是：提交人收到的通知邮件。\n\n在测试中，要获得最终数据状态，需要搭建一个可以发邮件的服务器，在测试执行后去验证指定邮箱的提交人是否收到邮件通知。\n\n![](/images/swd/xp/tdd/greenmail-server.webp)\n\n基于这种验证方式，测试时需要安装一个Fake Mail Server，该 Server 具备实际可用发送邮件的功能，且保存了成功发送出去的邮件记录，通过接口可以获得已成功发送邮件的邮件信息，即便如此，也是退而求其次的选择，因为几乎无法从接收者那里获得接收到的邮件信息。\n\n袁帅给清扬演示完这个过程，她满脸质疑：\"谁做测试会真这么做呀，搭建一个真正能够发邮件的服务器，成本有点高啊。再说了，在开发阶段做测试，这种跟第三方邮件服务器交互，不需要证明它发邮件的功能是否工作，**只需要证明的系统能把邮件发送到邮件服务器上就足够了吧**。\"\n\n\"那怎么做呢？\"\n\n清扬接过键盘，花了不到十分钟的时间，写了一个基于JavaEmailServer的测试：\n\n```java\nclass CIMonitorTest {\n    private static GreenMail mailServer;\n    private static JavaMailSenderImpl mailSender;\n\n    @BeforeAll\n    static void setup() {\n        String HOST = \"127.0.0.1\";\n        String USER = \"root\";\n        String PASSWORD = \"pass\";\n        int PORT = 9999;\n\n        ServerSetup config = new ServerSetup(PORT, HOST, \"smtp\");\n        mailServer = new GreenMail(config);\n        mailServer.setUser(\"ci@thoughtworks.com\", USER, PASSWORD);\n        mailServer.start();\n\n        mailSender = new JavaMailSenderImpl();\n        mailSender.setHost(HOST);\n        mailSender.setPort(PORT);\n        mailSender.setUsername(USER);\n        mailSender.setPassword(PASSWORD);\n    }\n\n    @Test\n    void should_publish_notification_with_mock_behavior_verification() throws Exception {\n        // Setup\n        CIMonitor ciMonitor = new CIMonitor(new EmailPublisher(mailSender));\n\n        // Exercise\n        ciMonitor.buildFailed(\"sjyuan@thoughtworks.com\", CIMonitor.Stage.TEST);\n\n        // Verify\n        MimeMessage receivedMessage = mailServer.getReceivedMessages()[0];\n        assertEquals(\"[CI] Build WARNING!\", receivedMessage.getSubject());\n        String expectedContent = String.format(\"You break ci @ %s !!!\", CIMonitor.Stage.TEST);\n        assertEquals(expectedContent, receivedMessage.getContent());\n    }\n    \n    @AfterAll\n    static void teardown() {\n        mailServer.stop();\n    }\n}\n```\n\n\"你咋这么6，又生写了一个！\" 袁帅表示称赞。\n\n\"在测试初始化阶段，我安装了一个轻量的JavaEmailServer，使用`mailServer.getReceivedMessages()`获得服务器接收到的邮件信息，来验证要发送的邮件成功传送到邮件服务器上，至于能不能发送给用户，这不是我关心的事儿。\" 清扬流畅地讲解自己的逻辑。\n\n![](/images/swd/xp/tdd/cross-process-behavior.webp)\n\n\"真漂亮啊，用了「**跨进程行为验证**」，你搭建了一个轻量的 Spy Server，该 Spy Server 会记录系统发送的邮件信息，为后续验证提供查询接口。测试能够提供跟第三方邮件服务成功交互的信心。\" 袁帅略带钦佩地总结着。\n\n\"咦，验证看起来是获取数据状态做验证呀，你怎么把它叫「行为验证」，还加了个跨进程限定。\" 清扬有点不解问道。\n\n\"哦，这样子，在我看来，状态验证的状态指的是程序执行的最终状态，这里你**使用了一个 Spy Server 来捕捉系统跟第三方系统调用所传递的数据，Spy Server 记录数据也只能证明你按照预期调用了第三方系统**，由于跨进程，所以我把它叫做「**跨进程行为验证**」\" 袁帅回答时语速放慢了很多。\n\n---\n\n**小微小结**\n\n+ 进程边界的「行为验证」的陷阱是无法验证进程间的协议以及映射的有效性，借助跨进程的「状态验证」可以解决，比如读写数据库时，代码和数据库表的映射，数据库交互协议。\n+ 「跨进程状态验证」的困境是不能低成本地获得最终数据状态，可以借助「跨进程行为验证」，确保系统能够按照预期调用第三方系统。\n"])</script><script>self.__next_f.push([1,"2d:T14c0,"])</script><script>self.__next_f.push([1,"\n上周五，清扬和袁帅在探讨进程内测试验证时，先是写了进程内行为验证和状态验证的测试，最后写了触及进程边界的行为验证，测试类图如下：\n\n![](/images/swd/xp/tdd/jdbc-behavior-verification.webp)\n\n周一清晨，一大早来到公司，清扬就把新的测试类图展示在屏幕上，等待袁帅的到来：\n\n![](/images/swd/xp/tdd/h2-state-verification.webp)\n\n\"我回去想了想，`jdbcTemplateMock`按照预期执行update方法，没法证明就一定能保存到数据库中。因为，如果SQL语句哪个字段名或者表名写错了，或者语法存在错误，这个行为验证是是没办法发现的问题的，\" 见袁帅到来，清扬轻快地说着自己的理解。\n\n\"嗯嗯，有道理，那你后来怎么做的？\"袁帅丢下背包，随即问道。\n\n清扬没有例会他的提问，继续按照自己的思路：\"**在涉及到进程边界时，尤其要格外留意测试的有效性，不同进程之间往往存在一些通信协议，比如jdbc、http、socket，这时候某个进程内的行为验证是很难发现这种问题的**，**这是行为验证的一个陷阱**。此时需要一种等效的验证方式，它能够覆盖住跨进程的通信协议，最好还能表达最终的数据状态。\"\n\n袁帅来到清扬的显示器前，快速浏览了新的测试类图后就示意她看代码。紧接着她把之前的 **行为验证** 和周末在家写的基于 In-Memory Database 的 **状态验证** 同时展示在屏幕上：\n\n```java\n@Test\nvoid should_log_with_layer_cross_mock_behavior_verification() {\n    // Setup\n    JdbcTemplate jdbcTemplateMock = mock(JdbcTemplate.class);\n    CIFailedLogServiceJdbcImpl logService = new CIFailedLogServiceJdbcImpl(jdbcTemplateMock);\n    String spoilerEmail = \"sjyuan@thoughtworks.com\";\n    String sql = \"insert into t_ci_failed_log(spoilerEmail, stage) values(?, ?)\";\n\n    // Exercise\n    new CIMonitor(logService).buildFailed(spoilerEmail, CIMonitor.Stage.TEST);\n\n    // Verify\n    verify(jdbcTemplateMock, times(1))\n            .update(sql, spoilerEmail, CIMonitor.Stage.TEST.toString());\n}\n```\n\n\n```java\n@Test\nvoid should_log_with_process_cross_state_verification() throws Exception {\n    // Setup\n    JdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource());\n    createTable(jdbcTemplate.getDataSource());\n    String spoilerEmail = \"sjyuan@thoughtworks.com\";\n\n    // Exercise\n    new CIMonitor(new CIFailedLogServiceJdbcImpl(jdbcTemplate))\n            .buildFailed(spoilerEmail, CIMonitor.Stage.TEST);\n\n    // Verify\n    String querySql = \"select spoilerEmail from t_ci_failed_log where id =?\";\n    String savedSpoilerEmail = jdbcTemplate.queryForObject(querySql, String.class, 1);\n    assertThat(savedSpoilerEmail).isEqualTo(spoilerEmail);\n}\n\nprivate DataSource dataSource() throws Exception {\n    Driver driver = (Driver) Class.forName(\"org.h2.Driver\").getDeclaredConstructor().newInstance();\n    SimpleDriverDataSource dataSource = new SimpleDriverDataSource();\n    dataSource.setDriver(driver);\n    dataSource.setUrl(\"jdbc:h2:mem:testdb\");\n    dataSource.setUsername(\"root\");\n    dataSource.setPassword(\"pass\");\n    return dataSource;\n}\n\nprivate void createTable(DataSource dataSource) throws SQLException {\n    Connection connection = dataSource.getConnection();\n    String sql = \"\"\"\n            create table `t_ci_failed_log`\n            (\n                `id`           bigint       not null primary key auto_increment,\n                `stage`        varchar(30)  not null,\n                `spoilerEmail` varchar(100) not null\n            );\n            \"\"\";\n    connection.createStatement().execute(sql);\n    connection.commit();\n    connection.close();\n}\n```\n\n\"将就看一下哈，在真实Spring boot项目中，我们只需要少量配置就可以完成JdbcTemplate的初始化。这个测试里，我验证行为最终写入数据库的数据状态是否符合预期。\"\n\n\"厉害厉害，竟然能生写出来。** In-Memory Database 是常见的**`**Fake Object**`**实践，我们认为它跟真实的生产数据库功能几乎一致，这么做能很好测试到程序真实运行时的功能，但也要注意一点是，有些数据库特定的语法可能会不支持导致测试不能完全等效。为了做得更好，现在一些项目会借助容器技术，在测试时快速启动一个跟生产环境一样的数据库，这样会提升测试的稳定性和信心。**\" 袁帅从清扬的表情中清楚她已经Get到了这段话的意思。\n\n\"等等，这种场景下，数据状态是我们可控的数据库，那如果我是给第三方邮件系统发消息，邮件有没有成功发送给用户，这个状态我是获取不到的，怎么办呢？\"袁帅刚要起身离开，清扬又抛出了一个灵魂拷问。\n\n\"好问题，那个我马上要参加一个会，晚点我们继续哈~\" 袁帅抱起电脑径直走向Agile会议室。\n\n---\n\n**小微小结**\n\n+ 涉及跨进程交互时，进程边界的行为验证存在陷阱，可引入跨进程的**状态验证来**规避此问题**。**\n+ 常见的涉及跨进程的场景，跟内部数据库的交互，跟其他Web Service的交互。\n\n**小微思考**\n\n+ 当跨进程的状态无法获得时，跨进程的状态验证无法工作，有没有其他方式呢？\n"])</script><script>self.__next_f.push([1,"2e:T1b93,"])</script><script>self.__next_f.push([1,"\n\"一会跳完了来我这哈，上次说就这代码聊聊 **「状态验证」 **和 **「行为验证」 **的。\" 周五下午没啥急事，袁帅加大嗓门示意正在跳健身操的清扬。趁着这十分钟功夫，袁帅打开电脑准备了一些代码例子。\n\n## 进程内验证\n\n\"小鬼，咱们先看个超级简单的，你看下面这两段代码在做什么验证？\"袁帅说完等她给出答案。\n\n```java\nclass ShoppingCartTest {\n    @Test\n    void should_add_item_to_shopping_cart_with_state_verification() {\n        // Setup\n        ShoppingCart shoppingcart = new ShoppingCart();\n        Item iphone14 = new Item(\"iPhone 13\", 5999);\n        Item mi12 = new Item(\"XiaoMi 12\", 4999);\n\n        // Exercise\n        shoppingcart.addItem(iphone14).addItem(iphone14).addItem(mi12);\n\n        // Verify\n        assertThat(shoppingcart.count(iphone14)).isEqualTo(2);\n        assertThat(shoppingcart.count(mi12)).isEqualTo(1);\n    }\n}\n```\n\n\"购物车添加了3件商品，然后验证购物车里面的商品是否符合预期，典型的「**状态验证**」\"清扬火眼金睛。\n\n\"不错，继续！待测试场景：GraduateParkingBoy停车成功，车停到停车场....\"袁帅还没讲完，清扬就打断：\"咳，这个我知道，不用介绍太多，这个需求我太熟悉了，就单刀直入吧。\"\n\n![](/images/swd/xp/tdd/parking-boy-state.webp)\n\n```java\nclass GraduateParkingBoyTest {\n    @Test\n    void should_park_to_first_parking_lot_with_state_verification() {\n        // Setup\n        ParkingLot parkingLot = new ParkingLot(1);\n        GraduateParkingBoy parkingBoy = new GraduateParkingBoy(Arrays.asList(parkingLot));\n        Car car = new Car(\"陕A YS6666\");\n\n        // Exercise\n        Ticket ticket = parkingBoy.park(car);\n\n        // Verify\n        assertSame(car, parkingLot.pick(ticket));\n    }\n}\n```\n\n\"这个也是**「状态验证」**，GraduateParkingBoy停车，验证最终车有没有停到预期的停车场。略微不同的是，GraduateParkingBoy会委托ParkingLot去停车，状态保存在ParkingLot对象里，该测试相当于把GraduateParkingBoy跟ParkingLot整体看做测试目标。\"\n\n\"反应挺快呀，GraduateParkingBoy依赖了ParkingLot，在测试GraduateParkingBoy的时候，还有一种方式做测试，来看！\"说完袁帅切切跳到下一个方法。\n\n```java\n@Test\nvoid should_park_to_first_parking_lot_with_behavior_verification() {\n    // Setup\n    ParkingLot parkingLotMock = mock(ParkingLot.class);\n    Car car = new Car(\"陕A YS6666\");\n    Ticket ticket = new Ticket(\"陕A YS6666\");\n\n    when(parkingLotMock.park(car)).thenReturn(ticket);\n\n    // Exercise\n    GraduateParkingBoy parkingBoy = new GraduateParkingBoy(Arrays.asList(parkingLotMock));\n    Ticket ticketBoy = parkingBoy.park(car);\n\n    // Verify\n    assertSame(ticketBoy, ticket);\n    verify(parkingLotMock, times(1)).park(car);\n}\n```\n\n\"嗯，这个是在验证 GraduateParkingBoy 跟 ParkingLot 的交互行为有没有按照预期发生，是 **「行为验证」 。**前提是ParkingLot的停车功能是好的，在此前提下，GraduateParkingBoy能正常调用它，就可相信GraduateParkingBoy该场景下停车功能是OK的。\" 清扬利索回答道。\n\n\"很好，这个测试借助测试框架Mockito来配置一个Mock Object，当然还有其他方式做 **「行为验证」。**\"袁帅见清扬突然很感兴趣想打断，立即抢先：\"后面聊测试替身的时候咱们再一起探索其他做「**行为验证**」的方式。\"\n\n![](/images/swd/xp/tdd/parking-boy-behavior.webp)\n\n## 触及进程边界\n\n\"够简单对吧，整一个稍微复杂的场景，给你加点难度，我把写好的测试代码特意删除了，你来用两种方式实现一下。\" 袁帅边说边打开了类图：\n\n![](/images/swd/xp/tdd/ci-monitor-arch.webp)\n\n\"要测试一个CIMonitor的构建失败方法，当构建失败时，会调用CIFailedLogService将日志写到数据库中，这里面涉及到跨进程协作，进程边界的 `JdbcTemplate`组件会负责跟数据库进程通信。\"\n\n清扬迅速阅读了代码：\n\n```java\npublic class CIMonitor {\n    private final Map\u003cLong, Stage\u003e failedRecords = new HashMap\u003c\u003e();\n    private final CIFailedLogService failedLogService;\n\n    public CIMonitor(CIFailedLogService failedLogService) {\n        this.failedLogService = failedLogService;\n    }\n\n    public void buildFailed(String spoilerEmail, Stage stage) {\n        failedRecords.put(System.currentTimeMillis(), stage);\n        failedLogService.log(spoilerEmail, stage);\n    }\n\n    public enum Stage {\n        CHECKOUT, SPOT_BUG, TEST, DEPLOY\n    }\n}\n\npublic interface CIFailedLogService {\n    boolean log(String spoilerEmail, CIMonitor.Stage stage);\n}\n\npublic class CIFailedLogServiceJdbcImpl implements CIFailedLogService {\n    private JdbcTemplate jdbcTemplate;\n  \n    public CIFailedLogServiceJdbcImpl(JdbcTemplate jdbcTemplate) {\n        this.jdbcTemplate = jdbcTemplate;\n    }\n\n    @Override\n    public boolean log(String spoilerEmail, CIMonitor.Stage stage) {\n        String sql = \"insert into t_ci_failed_log(spoilerEmail, stage) values(?, ?)\";\n        int updateRow = jdbcTemplate.update(sql, UUID.randomUUID(), spoilerEmail, stage);\n        return updateRow == 1;\n    }\n}\n```\n\n看完实现代码，她抢过来键盘开始流利的手法：\n\n```java\n@Test\nvoid should_log_with_mock_behavior_verification() {\n    // Setup\n    JdbcTemplate jdbcTemplateMock = mock(JdbcTemplate.class);\n    String sql = \"insert into t_ci_failed_log(spoilerEmail, stage) values(?, ?)\";\n\n    // Exercise\n    new CIMonitor(new CIFailedLogJdbcImpl(jdbcTemplateMock))\n            .buildFailed(\"sjyuan@thoughtworks.com\", CIMonitor.Stage.TEST);\n\n    // Verify\n    verify(jdbcTemplateMock, times(1))\n            .update(sql, \"sjyuan@thoughtworks.com\", CIMonitor.Stage.TEST);\n}\n```\n\n袁帅看出来清扬试图将 `CIMonitor`和 `CIFailedLogServiceJdbcImpl`俩当做一个黑盒来测试，使用测试替身 `jdbcTemplateMock`代替 `JdbcTemplate`，注入到 `CIFailedLogServiceJdbcImpl`，然后验证 `jdbcTemplateMock`是否按照预期执行了SQL语句，典型的 「**行为验证**」，测试类图如下：\n\n![](/images/swd/xp/tdd/jdbc-mock-verification.webp)\n\n\"所以，你认为 `jdbcTemplateMock`执行了这个SQL语句（**因：更新操作**），就能推断出会将这条记录保存到数据库中咯（**果：表记录**）？\"袁帅问道。\n\n\"呜...嗯，呜...嗯，呜...嗯...\"   清扬刚准备回答，消防警报声（演习）响起来了，两人稍作整顿开始往楼梯通道走去。\n\n---\n\n**小微小结**\n\n+ 当状态在同一个进程内可便捷访问时，通过最终状态进行验证，这种 **状态验证** 是一种常用的方式。\n+ 进程内 **「行为验证」** 可以提供更细粒度的等效验证，细粒度的测试帮助定位问题。由于是交互过程的验证，会增加测试的脆弱性。\n\n**小微思考**\n\n+ 当行为验证处在进程边界，正确调用了负责通信类库组件，就能证明跨进程的交互正确么？\n"])</script><script>self.__next_f.push([1,"2f:T13eb,"])</script><script>self.__next_f.push([1,"\n\"菩萨畏因，众生畏果，生生世世，因果轮回！\" 袁帅手握水杯，端坐在工位上，嘴里碎碎念着这些佛教的句子。\n\n\"嘿，帅哥，别菩萨呀，众生了。你说我什么时候用Mock，什么时候用Stub和Fake啊，对，还有那个Spy？把我搞晕了，这么多概念！\" 清扬的问题s一下子把袁帅的思绪拉到现实中。\n\n\"这些是危险品，最好不要用~\" 袁帅一脸狡黠的对她讲。\n\n\"扯吧，我看你自己都在用！\"\n\n\"哈哈，就知道唬不住你，你可知这些测试替身背后的原理，有没有听说过「行为验证」和「状态验证」？\" 袁帅认真起来了。\n\n\"嗯，我看过 Gerard Meszaros _《_[xUnit Test Patterns](https://book.douban.com/subject/1859393/)_》_那本大部头，但看一次忘一次，而且有些地方，Gerard老哥讲的模棱两可。\" 清扬说着抓起了后脑勺。\n\n\"来，考你一个数学题：我现在有一个1块钱的硬币和一张5毛钱的纸币，我去一个小卖部买瓶农夫山泉，我从左口袋掏出硬币给老板，再从右口袋掏出纸币给老板，老板给了我一瓶农夫山泉，有什么方式可以证明我们这笔交易是成功了？\" 说完袁帅喝了一个口水。\n\n\"简单呀，你少了1块5，多了一瓶农夫山泉，小卖部少了一瓶农夫山泉，钱柜多了1块5。\" 清扬抢答成功，戴上了等着被表扬的得意表情。\n\n\"厉害，你这是验证交易完成后的最终状态咯，那还有没有其他方式呢？\" 袁帅顺势发问。\n\n\"嗯... 有了，验证你左手给了小卖部老板1块钱，紧接着右手给了小卖部老板5毛钱，然后小卖部老板给了你一瓶农夫山泉。\" 清扬又戴上了一副等待着被表扬的神情。\n\n\"我去，你今天开挂了呀~\" 袁帅一脸惊讶，趁热打铁：\"第二种方式跟第一种方式有什么不同？\"\n\n\"第一种我是从**最终的结果**来看，第二种是从**导致这个结果的行为**来看。前者我在验证结果的状态，后者我在验证过程中发生的行为。噢，我懂了，如果把买你去买农夫山泉类比成软件功能，小卖部是你的一个依赖，前者我是在做「**状态验证**」，后者我是在做「**行为验证**」。\" 清扬脸上浮现出茅塞顿开的开心神情。\n\n\"**状态验证，没啥好说的，最终的状态正确，功能肯定正确。行为验证不同点是，我通过发生某种行为，推断出我期望的结果。行为是因，状态是果，根据因推断果**。难怪你刚刚嘴里念叨什么因果，我还以为你是走火入魔了，原来你也在思考测试呀。\" 清扬兴奋地说出了让她自己都不可思议的话。\n\n![](/images/swd/xp/tdd/state-behavior-comparison.webp)\n\n\"于老师，请受我一拜~\"袁帅双手抱拳调侃起清扬来。\n\n\"少来！我算是大概明白了状态验证和行为验证的区别了，可是行为验证有点问题呀，你这次是左手给1块，右手给5毛，下次你觉得这样有点麻烦，你干脆就一只手从口袋了掏出一块五毛钱，那先前的行为验证就要跟着调整呀，而状态验证却不需要。\" 清扬进一步思考。\n\n\"是滴，**当做行为验证时，你验证的是怎么达到你期望结果的过程，这个过程有可能会被调整优化。在软件测试中，当一个功能正确且没有发生变化的时候，状态验证是相对很稳定的，但是行为验证就不一定，行为验证相当于在验证过程实现细节，这个细节粒度越细，不稳定性就越高**。\" 袁帅说完又不忘问一个问题：\"既然这样子，我们是不是只做状态验证就好了呢？\"\n\n\"是呀~\" 清扬不假思索。\n\n\"**如果你要验证的状态不是你能访问的时候呢？或者你测试目标的依赖对象非常影响你的测试呢？**比如，小卖部的货柜和钱柜你没法知道结果呢？\" 袁帅一连三问。\n\n\"那我就只能验证目标测试对象对依赖对象是否做了正确的事情咯~ 对了，我现在开发的CI监控程序就需要发邮件通知用户，但邮件系统是第三方系统，我可以通过验证系统做了发送邮件的行为，从而推断用户会收到通知。\" 清扬想起了系统的CI构建失败的场景，要给破坏者发邮件通知。\n\n\"嗯，有点那个意思了。回到实际软件开发场景中，情况可能更加复杂了，今天时间有限，改天咱们对着代码聊聊行为验证和状态验证的应用场景。\" 袁帅抬手看了一眼手表，过了下班时间，要奔赴篮球场了。\n\n\"谢谢帅哥，概念上我算是理解了行为验证和状态验证了，我先去用代码练练，下次再找你就着真实代码来咀嚼咀嚼！\"\n\n\"好呀，要谢谢你自己哦，都是你自己总结出来的，我就提了几个问题~\" 袁帅跑向电梯过程中转身给清扬点了个赞。\n\n---\n\n**小微小结**\n\n+ 如果状态验证是验证你达到目的之后的最终状态，行为验证则是在验证你是如何到达目的地的，行为验证是因，状态验证是果。\n"])</script><script>self.__next_f.push([1,"30:T3994,"])</script><script>self.__next_f.push([1,"\n## 初探软件测试\n\n\u003e 在规定的条件下对程序进行操作，以发现程序错误，衡量软件质量，并对其是否能满足设计要求\n\u003e\n\u003e 进行评估的过程。\n\n袁帅边默念着这句关于软件测试的经典定义，边打开Android Studio。那到底如何做软件测试？他想到了最近自己做过的两个小场景。\n\n场景1：袁帅开发了一个任务管理系统，他模拟用户的行为在界面输入正确的用户名和密码，点击登陆后能够登陆到系统的主界面，并看到自己的任务清单。\n\n![](/images/swd/xp/tdd/tdd-user-scenario.webp)\n\n场景2，袁帅编写了一个统计字符的函数后，他会模拟调用者传入一个特定的字符串，看它执行后能否返回你预期的结果。\n\n![](/images/swd/xp/tdd/tdd-char-count.webp)\n\n在上述两个例子中，袁帅对自己开发的系统和函数提前进行测试，看看能否发现Bug。他心里很清楚，这么做就是想最大限度地确保软件交付给用户时功能是正确的 -- 小心驶得万年船。**交付高质量有价值的软件是他在Thoughtworks做程序员意义之一**。\n\n没有人希望Bug被真实用户发现，开发团队要尽可能降低错误流入生产的概率，越早越好，因为发现问题的时机越早，修复的成本越低。所以，及时**发现软件问题**成为了一个关键的因素。\n\n及时发现问题，让问题尽早暴露，可是团队无法有效快速的定位问题，难免镜中赏花不知花在哪。所以，**快速定位问题**成了另一个关键因素。定位到问题方可有的放矢，相比于修复问题，定位问题要花更多时间。\n\n**就这样，袁帅将发现问题的速度**和**定位问题的速度**作为自己和团队的修炼目标。而要实现两个速度的稳定持续提升，就需要引入必要的自动化。传统绿皮火车靠人工烧煤，速度怎么也快不起来，而配备了全车动力系统的高铁让铁路出行更加顺溜。\n\n**经常做高铁出差的袁帅，索性将自动化测试比喻成软件测试中的高铁。**\n\n针对自动化测试，Wiki给了如下定义：\n\n\u003e 在软件测试中，**自动化测试**指的是使用独立于待测软件的其他软件来自动执行测试、比较实际结果与预期并生成测试报告这一过程。在测试流程已经确定后，测试自动化可以自动执行的一些重复但必要测试工作。也可以完成手动测试几乎不可能完成的测试。\n\n说白了，就是让机器代替人来执行那些手工的测试过程。**在敏捷软件开发中，自动化测试是不可或缺的工程实践。**\n\n## 唯快不破的价值\n\n**假如不做自动化测试会怎么样？**\n\n在开发过程中，无论是新增功能还是修复缺陷都需要大量的回归测试。如果仅靠\"人肉\"战术，一方面测试人员要对付新功能的测试，另一方面又要回归已有功能。人毕竟不是机器，大量的鼠标点击也不像打地鼠那么有趣，在经过重复枯燥地点击后，难免会滋生\"审丑\"疲劳，而软件的\"丑\"有时就被熟视无睹了。\n\n就拿敏捷迭代开发来说，在固定长度的迭代周期内，第一个迭代开发了3块功能并进行了测试，第二个迭代新开发了3块功能，除了测试新功能，还要回归迭代一的功能，而到第三个迭代要回归测试的功能就更多。此时多半有两种选择：\n\n+ 方式一：一种是减少新功能开发，大家都来做手工回归测试，这样才有可能完成，但项目进度会受到严重影响。\n+ 方式二：另一种选择是新功能照常开发，留给回归测试的时间被挤压，而测试人员不得不把重点放在新功能上面，回归测试就会因为时间紧被简化甚至漏化了。简化的后果就是原来应该被回归的范围缩小，从而导致越来越多的缺陷被遗漏掉。\n\n![](/images/swd/xp/tdd/tdd-regression-cost.webp)\n\n在大多数实际项目交付中，为了完成项目目标，袁帅见过很多团队选择了方式二，从此生产事故率开始上升，即便有幸没上生产，返工的频率也肉眼提高，而且返工的时机越晚，修复的成本大大提升。增加的修复成本，反噬了团队的宝贵资源，陷入恶性增长循环。\n\n一些项目会琢磨着加班和加人（QA），这么做只是扬汤止沸。\n\n**如何避免这种问题？**\n\n**一种方式是一做就对，另一种方式是出手够快**。前者已经被证实不可能，后者努把力还有点戏。袁帅一直都承认软件开发难免存在缺陷，但是只要能够足够快搞定问题（发现 -\u003e 定位 -\u003e 修复），交付效率（质量 + 速度）也可得到保证。\n\n\u003e 解决问题的最好的态度是勇敢面对问题，在它还没有产生较大负面影响的时候就揪出来并干掉。\n\u003e\n\u003e -- 老马可能说过\n\n在有限的交付时间内，要想从容面对缺陷营造的惊喜，就要采用一种更高效、更快的方式来代替手工测试。自动化测试无疑是当下的一个优秀的工程实践，它规避了人类固有的审丑疲劳，同时节省了大量手工工作，让回归更全面也更靠谱。\n\n在袁帅看来，自动化测试本质上是实现软件测试的提速，提升了两个核心速度：\n\n**发现问题的速度：**\n\n1. 发现的时机要早。这就要求测试前移，开发人员也要编写自动化测试。\n2. 发现的速度要快。这就要求编写有效的、执行效率高的自动化测试。\n\n**定位问题的速度：**\n\n1. 定位的精准要够。这就要良好的测试策略，划分合适的测试粒度。\n2. 定位的效率要高。同样要求编写有效的、执行效率高的自动化测试。\n\n## 合理的测试搭配\n\n**什么样的测试能够帮助实现快速定位问题和快速发现问题的两个速度目标呢？**\n\n提到测试种类，袁帅多年的开发经验中也记不清听过很多少测试概念了，比如，单元测试、集成测试、功能测试、端到端测试、客户验收测试、冒烟测试、性能测试、安全性测试、易用性测试，等等。\n\n关于这些测试概念，业界一直众说纷纭，缺乏统一的标准定义。为了更友好地介绍测试搭配，袁帅找到了敏捷测试四象限[1]。\n\n### 测试四象限\n\n![](/images/swd/xp/tdd/testing-quadrants.webp)\n\n敏捷测试四象限，分别从支撑团队和评价产品，面向技术和面向业务四个维度来划分不同的测试：\n\n+ Q1：面向技术和支撑团队，支撑开发团队编码工作，聚焦较细粒度的代码，质量内建的地基\n+ Q2：面向业务和支撑团队，支撑开发团队编码工作，聚焦较高层级的业务，质量内建的屋顶\n+ Q3：面向业务和评价产品，评价软件产品功能方面，聚焦感性的用户体验，产品口碑的地基\n+ Q4：面向技术和评价产品，评价软件产品跨功能方面，聚焦产品的周边特性，产品稳定的保障\n\n四象限提倡：**不同的测试具有不同的目的，可以从团队、产品、业务、技术四个维度出发，制定不同的测试策略来提升软件交付的效能**。\n\nQ1涵盖了支撑团队、面向技术的测试。**用以帮助团队更快速定位问题**，通常这种测试覆盖的代码行数较少，比如单元测试和组件测试。\n\nQ2涵盖了支撑团队、面向业务的测试。**用以帮助团队更快发现问题**，通常这种测试覆盖的代码范围较广，比如面向业务功能的功能测试，更容易发现系统业务功能的问题。\n\nQ3涵盖的是一些需要人主观参与的测试。比如探索性测试、易用性测试和客户验收测试，这些测试一些分析性思考和创造力，通常需要专业的QA来做。它们更多是从业务价值视角去测试软件产品，做一些自动化测试无法做到的事情。\n\nQ4则是从技术视角去评估软件产品，比如安全测试、性能测试等，这些测试通常需要借助一些专业的工具来完成。\n\n因为开发背景，袁帅更多关注在支持团队（Q1 + Q2）的测试上，Q1和Q2通过针对面向业务的粗粒度单元和面向技术的细粒度单元构建自动化测试来帮助发现问题和定位问题，从而缩短发现问题和定位问题的时间。因为同时要满足效率要求，通常不会在真实系统的运行环境中测试。而评价产品（Q3 + Q4）则会把整个系统当作一个整体去看待，既包含了完整的系统组件也包含了运行环境。\n\n### 支持团队的测试\n\nQ1主要关注的是软件内部质量，它包含了细粒度的测试，比如单元测试，虽然不同的项目、不同的人对单元的定义不一样，但有一点共识是它测试的单元很小，比如面向对象中的单个类或函数、或者几个有关系的类或函数、函数式编程中的函数。\n\n另外，在一个分层的Web Service中，单独对Service和Domain的API进行的测试这些属于单元测试，单元测试通常需要测试替身技术来隔离依赖，比如测试Service需要Stub掉Repository，测试Controller提供的API，会使用Stub替换Service和Domain。\n\n组件测试的测试范围稍微会广一些，覆盖的范围更广，比如单个分层系统中各个层级集成在一起测试，并采用Mock技术隔离外部依赖。业界关于组件测试的定义也不统一，袁帅借鉴了老马主页上微服务测试策略[2]对组件测试的定义。另一种比较流行的说法：组件测试的组件指进程内架构中的不同层级的的组件，如Controller、Service、Repository。至于具体指什么，要参考具体团队的上下文共识。\n\nQ2主要关注的是软件的外部质量，它从客户使用的角度去做功能验收测试。比如端到端测试、UI测试都属于这一类测试。这类测试的特点是站在终端业务视角，按照用户故事的AC去验收功能。\n\n功能验收测试成本较高，如果做不好，维护这类测试可能会拖累交付。首先，做功能验收测试需要模拟真实环境，将服务真实运行起来，对于一些外部的不可控的服务，同样也会采用Mock技术。所以，测试环境搭建成本较高，特别是UI这种端到端的测试，因为界面的不稳定性会让UI测试变得脆弱，提升了维护成本。现在一些前后端分离的Web Service软件系统，通常功能验收测试会绕过UI，模拟UI的调用来测试API功能。\n\nQ2中的测试站在更高的业务角度，把控软件的外部质量，更容易发现系统的功能问题，是一种很好的回归测试套件。但它付出的是更大的维护成本，所以需要配置合理的功能验收测试，然后结合Q1细粒度的测试。\n\n由于单元测试、组件测试和集成测试，在业界没有统一的定义，在这里，袁帅把Q1统称为**定位测试**，Q2为**发现测试**。\n\n就拿由Mike Cohn提出的经典测试金字塔，提倡了一种最佳测试平衡，平衡了发现问题和定位问题这两个关键因素。\n\n![](/images/swd/xp/tdd/test-pyramid.webp)\n\n### 测试实例化\n\n为了更好地理解发现问题和定位问题的测试，袁帅编写了一个简单的Web Service。该Service提供了用户登录API。对于用户登录功能进行API功能测试时会模拟发起一个登录API请求，系统接收到请求后做一系列业务处理返回预期的结果。\n\n![](/images/swd/xp/tdd/tdd-api-service.webp)\n\nAPI功能测试很容易发现功能问题，但是当测试失败时，袁帅很快知道其功能上有问题，但不知道具体问题出在哪里。此时，袁帅进一步把Web Service打开，对内部的不同层和组件进行测试，有API 端口层的Controller组件，业务层Service组件，数据访问层的Repository组件。\n\n![](/images/swd/xp/tdd/tdd-components.webp)\n\n这类测试聚焦更细粒度的组件，更容易定位问题。配合着API功能测试，达到发现问题和定位问题的目的。\n\n在编写细粒度的代码组件测试时，SUT是不同层的组件，SUT的全称是System Under Test，即测试目标。通常它会存在一些依赖，即DOC，全称Depended-on Component。对应到刚才的例子，UserController的DOC是UserService，UserService的DOC是UserRepository，UserRepository的DOC是Database。\n\n![](/images/swd/xp/tdd/tdd-sut-doc.webp)\n\n对内部组件进行测试，需要使用Test Double来替换掉对应的DOC。关于Test Double，袁帅打算写单独的文章来聊聊。\n\n## 写在最后\n\n软件开发，你不可能一开始就把软件做对，亦或者你不可能一直一开始就做对。但发现和定位问题的速度有可能被持续提升。长期来看，提升这两个速度的途径也只有一条 -- 自动化测试，再加上限定词：合理有效。\n\n敏捷测试四象限从四个维度来划分测试类型，帮助你制定合理有效的测试策略。Q1涵盖了支撑团队、面向技术的定位测试，提升定位问题的速度。Q2涵盖了支撑团队、面向业务的测试，提升发现问题的速度，重点关注Q1和Q2。\n\n自动化测试相比于手工测试，也不是免费的午餐，高铁不能跑在普通绿皮车的轨道上，票也贵很多。自动化测试对团队的能力提出了一定的要求，能否做出合适的测试组合，能否选对合适的工具，能否编写有效的测试，这些都是团队要面对的实际挑战，但以目前业界在这方面的成熟度，都算不上什么大碍，只要你愿意用点劲，\"高铁票还有可以买的\"\n\n## 注释\n\n1. [1]. 敏捷测试象限源自 Brian Marick 最开始提出的敏捷测试矩阵。后来在他的许可下，敏捷测试专家 Lisa Crispin 和 Janet Gregory 做了扩展，并在她们的著作《[敏捷软件测试：测试人员与敏捷团队的实践指南](https://book.douban.com/subject/5338399/)》提出了敏捷测试象限的概念。敏捷测试四象限，不是测试分类规则，更多提供了测试分层的指导原则，建议结合**发现问题**和**定位问题**背后的核心目的去理解它。\n2. [2]. 老马主页上的一个Deck《[微服务测试策略](https://martinfowler.com/articles/microservice-testing/#testing-component-in-process-diagram)》，提出了进程内和进程外的组件测试概念。\n\n## 扩展学习\n\n1. [测试大家庭](https://www.yuque.com/yuanshenjian/agile/test-family)\n2. [关于敏捷测试象限的\"秘密\"](https://www.bylinzi.com/2022/05/30/agile-testing-quadrants/)\n3. [工程效能管理微课程](https://drive.google.com/file/d/1kQ6CSGLs6BgLGGSs3HSLtwt0hIEtRDGg/view)（TW内部）\n"])</script><script>self.__next_f.push([1,"31:T1d60,"])</script><script>self.__next_f.push([1,"\n\n\n## 敏捷技术\n- [程序员的职业素养](https://book.douban.com/subject/11614538/)\n- [程序员修炼之道(第2版)](https://book.douban.com/subject/35006892/)\n- [有效的单元测试](https://book.douban.com/subject/26364867/)\n- [软件测试的艺术](https://book.douban.com/subject/1445661/)\n- [Google软件测试之道](https://book.douban. https://book.douban.com/subject/4118751/)\n- [参与感：小米口碑营销内部手册](https://book.douban.com/subject/25942507/)\n- [丰田模式－精益制造的14项管理原则](https://book.douban.com/subject/26703782/)\n- [德鲁克管理思想精要](https://book.douban.com/subject/2180696/)\n- [人月神话](https://book.douban.com/subject/2230248/)\n- [黑客与画家](https://book.douban.com/subject/6021440/)\n- [重来2](https://book.douban.com/subject/25861795/)\n- [系统思考](https://book.douban.com/subject/25963524/)\n\n## 领导力\n- [影响力](https://book.douban.com/subject/1786387/)\n- [创新公司：皮克斯的启示](https://book.douban.com/subject/26314955/)\n- [驱动力](https://book.douban.com/subject/10484712/)\n- [身心合一的奇迹力量](https://book.douban.com/subject/21249050/)\n- [拥抱变革](https://book.douban.com/subject/25766546/)\n- [从0到1:开启商业与未来的秘密](https://book.douban.com/subject/26297606/)\n- [从为什么开始](https://book.douban.com/subject/6718052/)\n- [瞬变](https://book.douban.com/subject/25828158/)\n- [重塑组织](https://book.douban.com/subject/27030307/)\n\n## 哲学 \u0026 心理学\n- [道德经](https://book.douban.com/subject/1009789/)\n- [活法](https://book.douban.com/subject/1269900/)\n- [乔布斯传](https://book.douban.com/subject/6798611/)\n- [设计中的设计](https://book.douban.com/subject/1941558/)\n- [禅者的初心](https://book.douban.com/subject/4898627/)\n- [失控](https://book.douban.com/subject/5375620/)\n- [复杂](https://book.douban.com/subject/6749832/)\n- [心流 : 最优体验心理学](https://book.douban.com/subject/27186106/)\n- [自控力](https://book.douban.com/subject/10786473/)\n\n\n## 沟通协作\n- [金字塔原理 ](https://book.douban.com/subject/4882120/)\n- [麦肯锡方法](https://book.douban.com/subject/4238931/)\n- [非暴力沟通](https://book.douban.com/subject/3533221/)\n- [关键对话 : 如何高效能沟通（原书第2版）](https://book.douban.com/subject/10586741/)\n\n"])</script><script>self.__next_f.push([1,"32:T3f10,"])</script><script>self.__next_f.push([1,"\n此生有幸我跑到了程序员这个赛道上，说有幸因为自己还算热爱这份职业。自从2013年，我从一个工科生转入到程序员这个行业，我听过不少人把我们叫码农，最开始我也跟风自嘲，可当我后来看到程序员与程序员实际上存在巨大的差别的时候，渐渐地我心里放下了码农这个看似自嘲却值得深思的标签。\n\n跨行业总是不那么一帆风顺，通过速成班长出来的我接收到了第二次冲击波 -- 很难找到合适的工作。经受着\"戴维斯双击\"（生活压力和精神压力），唯有比别人付出更多的努力，才能勉强跟别人站在同一起跑线上，而且在跑道上时刻要保持多几分的努力。\n\n至今，我在这个赛道上跑了8年有余，有些人一开始在我视线范围内，跑着跑着不见踪影。有的人跑着跑着就停下来了，还有的人干脆跑出了赛道，更多的人虽然人在赛道上，但一直在痛苦的挣扎着向前。我敬重那些通过超常人的努力跑到前头成为领航者的人，珍惜那些按自己的步伐仍在努力稳步前行的人，同情那些在痛苦挣扎却又长时间无法完成自我突破的人。\n\n作为一个半路杀进来的程序袁，没有科班生天然的优势，一开始我成为了自己同情的那类人。在一家公司挣扎者开发着一款大数据分析的软件产品，用落后的软件开发方式修修补补。幸运的是，天然的危机感促使我不断去填补自己的知识和技能的空缺，逐渐扩大了视野，结识了行业的优秀伙伴（Thoughtworkers），便义无反顾的跳出了原来的码农圈。\n\n在Thoughtworks，我很幸运能亲身实践诸多业界优秀的工程实践，并觉知真正是在用正确的方式做事情，这是其一。倘若用正确方式做事情就足够了，有可能出现\"以最高的效率做了一件错误的事情\"的，所以还需要确保自己是在做正确的事情，这是其二，甚至两相居上。唯有\"以正确的方式做正确的事情\"，程序员的价值就不再是简单的码农所能替代的。\n\n在ThoughtWorks，我学到了对我的职业生涯来说很宝贵的东西 -- **用正确的方式做正确的事情，持续改进，追求卓越**。在一个这样充满同侪压力的学习氛围中，即便胸无大志的我也不会被潮流抛弃，顺流缓进是一贯的主旋律。流的越久，认识的程序员种类越多。总得来说，在这里大部分人在做正确的事情，同样也用正确的方式做事情。\n\n阴差阳错，我从历时5年的交付项目上跳出来，成了一名技术讲师和技术教练。视角的切换方才后知后觉 -- 原来之前我是 不识庐山真面目，只缘身在此山中。接触到的程序员多了，发现虽同为程序员，彼此有大别。有的人喜欢沉浸在技术的乐园，唯业界先进或炫酷的技术尝鲜为快。有的人忽视枯燥反复的基本功修炼，一心追逐热点，深怕被时代遗弃。有的人则在这里谋得一相对高薪的差事，心猿意马，采用蹩脚的方式应付着各种软件的需求亦或要求，生活在水深火热中却不自知。\n\n我也遇到了我欣赏的一类程序员，他们始终孜孜\u003cu\u003e不倦地修炼自己的基本功，始终在思考什么是正确的事情，不断地尝试跳跃出自身的局限性\u003c/u\u003e，能够耐下性子，跟时间做朋友，不断遇见更好的自己，最终脱颖而出。要成为这样的程序员，与之对应的三种思维误区是你应当尽量避免的。\n\n## 误区1：不思考业务价值\n\n在我看来，一名应用软件程序员，\"做正确的事情\"最显著的表现是**思考软件功能背后的业务价值**，可能没有之一了。\n\n我在做敏捷软件技术教练的期间，听到过一名学员这样的声音：\"用户故事即便写了这么一段话，我也压根不用看，因为我不看都能把代码写出来。\"这里所说的这么一段话是指用户故事的三要素描述：Who-What-Why。如果你有过一些用户故事的使用经验，应该已经回忆起来是那段：As a... I want... So that...\n\n言外之意是我对系统长什么样，每个功能点怎么实现了然于心了，不用再去在意是为了解决谁的什么问题。的确，不否认资深的程序员基于前期编码的积累，对系统有足够了解。只是了解和了解是不一样的，正如前文所提到的程序员和程序员是不一样的。如果一名项目开发骨干对系统的了解大多关注在How层面，而很少理解背后的Why，这种了解缺了一点生机和灵气。如何诊断这种了解呢 -- 你问他系统是怎么工作，他能很流利地讲出来，你再问他系统为什么要这样工作，答案便知晓了。\n\n只知其然而不知其所以然的程序员其实不少见，很多时候这也是大环境的产物。因为项目的开发协作模式，在业务人员和开发团队缺乏沟通的协作模式下，业务需求往往通过重量级的需求文档来传递，里面长篇大论在讲软件应该如何工作，甚至给出了详细的界面设计、数据设计的方案，而对为什么要这样工作？这样是为了解决谁的问题？解决了什么问题？却是轻描淡写，亦或是写了也被埋没在文字大海里了。（我在一次Code Review中听到某个学员在实现了某个需求文档描述的接口功能后来了一句：其实我不知道这个请求返回的字段跟这个需求有什么关系）\n\n在这样的注重流程的工作模式下，程序员被培养成编程工具的可能性会高出许多。假如你也身处在这样的环境，要跳出这样的思维模式需要付出更多的努力。有时候，即便自己去思考业务，挑战需求方，凭一己之力也难以撬动大盘，加上身负开发重任，还得拉拢团队其他人，种种阻力的叠加下，你可能坚持一段时间就放弃了，而一旦放弃，这种模式就会越发合理的存在，开发体验也将持续恶化下去。\n\n好在敏捷转型和数字化转型在中国也不再是新鲜词汇了，一些传统的IT组织也开始寻求变化，他们邀请外部教练来帮助解决这些问题，如果你恰恰碰到了这种机会，当珍惜这样的机会。跳出原来的思维模式，对分派到自己手上的需求多停下来去想一想下面的三个问题：\n\n1. 解决谁的问题？\n2. 解决了什么问题？\n3. 有没有更好的方案？\n\n重文档的需求管理方式多少扼杀程序员参与业务需求讨论的机会，这样一来就给业务价值之思添上了一堵墙。如若程序员有机会参与到业务讨论过程中，理解了业务本质问题，相信能够给出更具程序员独特智慧的技术解决方案，不但充分发挥了主观创造力，还可能赢得业务人员更多的信任。\n\n从被动等待丢过来一份缺乏生机的需求文档，积极主动起来吧，积极思考三个问题，积极跟业务人员建立链接，即使努力了最终无法撬动大盘，美好的未来也会在向你伸出橄榄枝。\n\n对于过重的需求文档，不妨以钱钟书钱老的话为借鉴 -- \u003cu\u003e不受教育的人，因为不识字，上人的当；受教育的人，因为识了字，上印刷品的当\u003c/u\u003e。做一个不容易上当的程序员，需要比别人多一些额外的思考。\n\n## 误区2：不注重基本功修炼\n\n互联网便捷性的提升，软件行业诞生了越来越多的GBS程序员（Google + Baidu + Sougou）和栈溢出程序员（Stack Overflow），有了这些搜索工具，似乎问题再也不是问题了。渐渐地跟抽大烟一样，越抽越上瘾，越上瘾越搜。\n\n搜索引擎提供了信息检索的便利性，使用起来就几分像嗑瓜子或玩王者一样能够很快获得反馈（很快帮助我们解决眼前的问题）。而体系的阅读和钻研的过程是漫长的，加上不能每次快速有效吸收的话，还无法立即用在工作上去解决燃眉之急，很容易半途而废。\n\n如果给这两种方式取个名字，前者是假借外力，后者则是修炼内功，一个可能知其然而不知其所以然，一个是知其然且知其所以然。\n\n举个身边经常发生的例子：一个Java后端程序员小A正在采用MVC架构，他看了篇别人写的文章，认识了Model、View和Controller这些新生的概念，并且也能画出它的结构图，并且很快依葫芦画瓢，照着网上Demo慢慢把代码写出来。后来，小A上了个Andorid项目，使用了MVP架构，他采取了一样的方式快速从别人的博客中取得真经，超度了了项目。TL说要把MVP改成MVVM架构，陌生的概念，你又去搜索了几篇文章，改吧改吧变成自己的。再后来，做了个Ruby On Rails， 依然是MVC架构，还是不会，于是原来的拿来主义又派上用场了.....\n\n这些年，各种架构模式的概念层出不穷，从名字上似曾相似，又似是而非，然而这些架构模式的底层原理有什么不同吗？MVC、MVP、MVVM说得不都是展示和逻辑分离吗？为什么要将它们分离，你曾思考过吗？如何分离，你有去从0到1实现过吗？这些模式背后的原理若理解透了，你还会焦虑今天Struts2还没焐热，明天切到SpingMVC，后天又换成Ruby on Rails吗？掌握了底层的原理，任凭川普变脸如何耍，你也可以做到新中有数，处码不惊。\n\n洋葱架构、六边形架构、端口适配架构、整洁架构、DDD分层架构，这些词没一个重音同名的，每个都够消化一阵子，它们真的有那么多的不同吗？细究之后，无非是通过引入分层来分离关注点，保持职责单一和清晰，隔离变化与不变，并通过依赖倒置来控制简单的依赖关系。为什么要这么做？怎么做到？这些都是值得程序员应该去思考的底层问题，搞清楚了背后的原理，恐怕不用担心哪天业务复杂到超出当前架构所能驾驭的范围了吧。\n\n又比如依赖注入(DI：Dependency Injection)，很多开发人员为了速成完成项目交付，一直照猫画虎使用Dagger、Spring DI、Guice这些开箱即用的框架，而很少去探究DI的原理，思考DI的价值和优劣，更别提手动实现一个简易的DI框架，以至于多年的软件开发经验其实更像1年的多次重复，下一次换了个别的框架，依然需要按图索骥般从0开始，而随着年纪的增大，身体体力恐怕有点吃不消了。\n\n若要做到任凭它技术日新月异，稳坐乾坤不乱。相比于追逐技术热点，更重要的是夯实基本功。培养出整洁代码的洁癖，吃透基础的面向对象设计理念，吃透架构设计的底层原则和理念，养成持续重构的意识，磨练自己的编码手速。深究技术框架的背后原理 -- 学会造轮子，用原生的方式实现框架，从而深入理念。\n\n软件开发从来不是一个人的事情，程序员除了一些软件开发相关的基本功，不容忽视的是团队协作方面的一些软性基本功。培养自己团队协作的意识和责任感，培养开放合作的心态以及磨炼结构化思考和表达的能力，力求在与他人合作的过程中不至于因为这些短板将闪光的技术硬实力遮掩住。\n\n重要不紧急的事情要提前做，而且要经常做，因为很多重要紧急的事情是由重要不紧急的事情演变而来。好比健身，平时花点时间去健身，不至于哪天身体出问题了，健康就变成了重要紧急的事情了。程序员平时除了完成本职的开发工作，基本的夯实需要更多忍耐和坚持，而这恰恰又是违背人的天性的（人天性喜欢安逸），所以需要能够多保持一份清醒和克制。另外，如果你的工作忙到不允许你有时间去学习成长，而这种忙本身却带来不了成长，不妨站在现在、不久的将来、以及未来去思考这种状况是否你想要的，人无远虑，必有近忧，成长越早开始越好。\n\n## 误区3：不愿跳出自我局限\n\n我在做软件教练的时候，曾听到过学员一些这样的声音：\n\n+ 我没事干嘛给自己找事，早点下班不好吗\n+ 这不是我的工作呀，况且只有我去这么做也没什么用啊，干嘛费这劲\n\n我第一反应有点惊讶，因为我自己是一个那种\"路上有个石头即使没把我绊倒，我也会把它搬开，因为我觉得这次即使没把我绊倒，下次可能会绊倒其他的路人。\" 跳出自我这个小圈子，很多事情就不再是\"事不关己，高高挂起\"的心态了。\n\n在工作上，如果每天仅仅想着如何快速让自己的任务交差，跟自己眼前没关系的事情一概挂起，多付出点精力和时间生怕吃亏，这其实是一种小格局的表现。暂且不说出于为他人着想，什么拯救世界的崇高理想，哪怕是让自己工作的环境变好一点，工作体验也会更舒适。这让我想起来几年前我刚加入ThoughtWorks的时候，一些小伙伴总是喜欢\"爱管闲事\"般地给我反馈，多年后我想清楚了原因之一 -- 他们希望我变得更好，以至于后面再跟我合作的时候更高效。\n\n其实不管是否身为程序员，为人处世也要尝试跳出这种小我的局限性，因为这种小我会大概率地限制自己未来的发展，时间久了，发现身边跟自己一起奔跑的人越来越比自己年轻，而此时自己已经各方面不具备优势。这种小我局限性给人带来的影响让我想起了十点读书经常听到的一个故事：\n\n\u003e 一天，一位记者到建筑工地采访时，看到工地现场，大家都在忙碌工作，不方便接受他的采访，他就近采访几个正在忙碌施工的建筑工人，问他们正在做什么？第一个建筑工人头也不抬地回答道：\"我正在砌一堵墙。\"，第二个建筑工人习以为常地回答道：\"我正在盖一所房子。\"，第三个建筑工人则干劲十足、神采飞扬地说道：\"我正在为建设一座美丽的城市而努力。\"\n\u003e\n\u003e 若干年后，当这位记者找到这三个建筑工人的时候，现在这三个人的境遇令他大吃一惊：当年头也不抬回答的建筑工人现在还是一个普通工地的建筑工人，仍然像以前一样砌着他的墙，没有任何变化。而习以为常自己工作的第二个建筑工人，现在是在施工现场拿着图纸的设计师。那个干劲十足、神采飞扬的建筑工人，现在已经是一家房地产公司的老板，手下拥有几十号人，正在运营大的建设工程。\n\n同样是在写代码，平庸的程序员在堆砌功能，优秀的程序员在构建系统，伟大的程序员在改变世界。而这种区别源于程序员心中的小我和大我。如果仅仅是想完成每日工作，按时下班，软件开发可能不是一份好差事，因为这种事不关己高高挂起的做法大概率会给自己挖坑，迟早会坑了自己，自己编（挖）码（坑）把自己埋了的案例不少见。\n\n在传统的代码非集体所有的责任田式的开发模式下，很多程序员可能吃过改别人代码的亏，出了问题还得自己来背锅，在这种环境下，克服内心的小我需要付出更多的努力。 即便如此，也希望你为之努力，尽力了也没能如意也没关系，你若盛开，舞台自来。\n\n## 写在最后\n\n如果你是一名程序员，并且愿意让自己更优秀，这三个误区值得去尝试避开。如果你有幸融入了一个不错的环境，当珍惜，努力成长，顺势而进。如果你身处在一个不那么理想的环境，跟环境做抗争需要你付出更多的努力，避开这三个误区可能需要尝试从外部汲取更多营养。\n\n我心中的程序员不再是我之前跟风调侃的码农，他们是一群 \u003cu\u003e用正确的方式做正确的事情，追求卓越，持续改进\u003c/u\u003e 的人，愿你我都能成为这样的人。\n"])</script><script>self.__next_f.push([1,"33:T3c9f,"])</script><script>self.__next_f.push([1,"\n随着互联网的繁荣发展，信息传播的多样化和速度已经发生了质的飞跃，人们获取信息越来越容易，业界各类有识之士纷纷买票上车，大力向外界传播自己的知识，或是出于公益而免费普及，或是出于利益而付费变现。\n\n在这样信息大爆炸的时代下，诞生了一个新的名词：知识焦虑。以至于一些网络人士给现在某些互联网知识平台定位为**贩卖焦虑**的平台。\n\n作为程序员，暂且不必参合到那些舆论中，回到自己的领域，我们不得接受的一个事实是：在软件开发中，也充斥着海量的知识。比如，开发方法论、研发流程、业务需求、技术方案、系统架构、编程范式等等。除了这个事实，我们还不得不面对一个问题：软件研发中很可能会因为知识越多，反而越难行动。就拿困扰研发团队多年的文档问题来讲，那些在研发过程中制造了大量文档的团队，文档的维护无疑成为了团队前进的负担。\n\n在知识的生产上，需要区分有效的知识和无效的知识。有效的知识包括那些能够被团队成员消化吸收，帮助解决问题，并进一步内化成认知的知识。有效知识的转化通常会经历四个阶段：**生产--\u003e传递--\u003e运用--\u003e吸收**。生产的知识首先要发生传递，知识接受者能将其运用到工作和生活中并解决了实际问题，经过四个阶段的转化，伴随着问题的解决，能力和认知将得到提升。\n\n![](/images/swd/agile/knowledge-cycle-1.webp)\n\n团队有些时候更多关注了知识生产，这种大量的知识生产会给自己一种幻觉，觉得团队\"学富五车\"，知识库这么殷实，战斗力不爆棚都难。秉承着既然生产出来了就不能白费，然后想法设法要这些知识传播出去。可是，这些知识能否经受住这几个拷问吗：\n\n1. 学过了吗？\n2. 运用了吗？\n3. 认知提升了吗？\n4. 足够了吗？\n\n针对上面的问题，就拿身边知识焦虑的真实例子来讲：\n\n1. 花钱买了付费课程，没打开过 -- 没学习，铁定无效\n2. 每天就想写写代码，不想跟人打交道，刚学完沟通表达技巧的课程长时间用不上 -- 没运用，仍旧无效\n3. 最近倒是有一次机会去跟人交流，课程里面的技巧用上了两个，但没用好，就那样吧 -- 没反思，终究遗忘\n4. 学习了这些单向传播的课程，有很多疑问，从未找过别人探讨 -- 不可言说的知识，无法习得\n\n在软件开发中，只要是团队作战，个体之间必然存在认知的差异，要提升团队的协作效率和研发效能，就要想办法弥补这种认知差异，尽可能消除由它带来的负面影响。团队可能已经尝试通过一些知识管理手段来缓解这种局面，但在知识管理上，如果无法正面回答上述几个问题，很有可能偏离轨道。不妨停下来，尝试诊断出无效的知识管理，而要做到这一点，对知识要有深刻的认识，进而采取针对性的管理手段。\n\n## 知识的简单分类\n\n知识可以大致被分为3类，分别是隐性知识、显性知识、不可言说的知识。\n\n+ 隐式知识：能够被明确定义，却没有被显性化的知识。\n+ 显式知识：能够被明确定义，并且被显性化的知识。\n+ 不可言说知识：虽然被显性化，却无法还原回有用技能的知识。\n\n隐性知识一旦被显性化呈现出来，它就可以转化为显式知识。比如公司的请假流程，公司在刚开始建立的时候，人数很少，还没有什么限制，请假流程也很简单，每个人都记得清楚。此时这种请假流程就属于隐性知识，它存在于每个人的脑子里。随着公司发展壮大，请假流程逐渐复杂起来，此时需要将请假流程明文写下来放到员工手册上，请假流程就变成了显性知识，而且这种显性知识传递出去之后就立马解决如何请假的问题。\n\n上述两类知识相对容易理解，最难区分的是不可言说的知识，关于不可言说的知识，来看一则庄子的寓言故事：\n\n\u003e 在春秋战国时代，有一位擅长做车轮的能工巧匠，他的名字叫轮扁。　　\n\u003e\n\u003e 一天，齐桓公在殿堂上读书，轮扁在堂下砍削车轮。齐桓公读书读到妙处，不禁摇头晃脑、口中念念有词，很是得意。轮扁见桓公这样爱书，心里觉得纳闷。\n\u003e\n\u003e 他放下手中的锥子、凿子，走到堂上问齐桓公说：\"请问，大王您所看的书，上面写的都是些什么呀？\"\n\u003e\n\u003e 齐桓公回答说：\"书上写的是圣人讲的道理。\"\n\u003e\n\u003e 轮扁说：\"请问大王，这些圣人还活着吗？\"\n\u003e\n\u003e 齐桓公说：\"他们都死了。\"\n\u003e\n\u003e 于是轮扁说：\"那么，大王您所读的书，不过是古人留下的糟粕罢了。\"\n\u003e\n\u003e 齐桓公很是扫兴。他对轮扁说：\"我在这里读书，你一个做车轮的工匠，凭什么瞎议论呢？你说圣人书上留下的是糟粕，如果你能谈出个道理来，我还可以饶了你，如果你说不出道理来，我非杀你不可！\"\n\u003e\n\u003e 轮扁不紧不慢地回答齐桓公说：\"我是从自己的职业和经验体会来看待这件事的。就说我砍削车轮这件事吧，速度慢了，车轮就削得光滑但不坚固；动作快了，车轮就削得粗糙而不合规格。只有不快不慢，才能得心应手，制作出质量最好的车轮。由此看来，削车轮也有它的规律。可是，我只能从心里去体会而得到，却难以用言语很清楚明白他讲授给我儿子听，因此我儿子便不能从我这里学到砍削车轮的真正技巧，所以我已经70岁了，还得凭自己心里的感觉去动手砍削车轮。由此可见，古代圣人心中许多只可意会、不可言传的知识精华已经随着他们死去了，那么大王您今天所能读到的，当然只能是一些古人留下的肤浅粗略的东西了。\"\n\n不可言说的知识即便用文字记录下来，白纸黑字人人都懂，但就是差那么一点**得心应手**感觉。比如，你去给一个人讲：\u003cu\u003e好的软件设计应该是高内聚低耦合，且应该遵循单一职责\u003c/u\u003e。你觉得听者听了之后就能做出好的设计吗？要是就凭三言两语就能搞定，软件行业的遗留系统恐怕就没这么难缠了吧。\n\n## 软件开发中的知识\n\n### 显性知识\n\n在软件开发活动中，识别出那些非不可言说的知识相对较为容易。比如一些新人On-boarding流程、团队组成、CI纪律、请假流程、团队开发活动、代码库、技术栈等等，这些知识有一个公共的特点，几乎所有人对这些知识的理解不会出现二义性，而且一旦获取，就能够有效解决问题。比如，一个刚加入团队的新人拿着这些显性知识：\n\n1. 清楚接下来两周要做什么事情\n2. CI挂了不会继续提交\n3. 请假给正确的人发邮件\n4. 准时参加每日站会和Code Review，每个迭代末主持Showcase会议\n5. 找到了代码库，下载并构建代码库\n\n当然，新人在接收到显性知识之后也有可能犯错，但这通常是个人主观的造成的，这种错误较容易进行纠正，只要再次回顾一下原来的知识基本上能搞定。\n\n### 隐性知识\n\n有些时候，上述列举的显性知识被存储在团队每个人的大脑中。尤其是团队初期，很多知识相对简单，团队对齐过之后便基本上能记住，这种被记住却又没有地方能找到显性记录的知识就属于隐性知识，所以，隐性知识，就是能够被明确定义，只是没有被显性化，一旦显性化之后就变身显性知识。\n\n识别隐性知识也简单，每当有人不清楚什么事情的时候，通过询问团队其他成员就立马能获得有效知识，如果这种现象反复发生，多半这里隐藏着是一个隐形知识。\n\n### 不可言说的知识\n\n不可言说的知识可能会有更多的争议，因为很多知识看起来可以通过文字写下来，会给人一种错觉，而实际上即便它们被显性化，消费者无法很快有效运用去解决问题，比如，整洁代码、软件架构、业务需求。\n\n**整洁代码，**什么样的代码是整洁代码，业界有名的几本书《整洁代码之道》《编写可读代码的艺术》里面给出了很多定义，看过这两本书的人不少，能写出整洁代码的人多吗？\n\n**重构，**《重构》一书中定义了很多坏味道和重构手法，然而代码重构的瓶颈不在于这些白纸黑字写的知识，而是如何在一个千奇百怪的代码海洋中有效识别出有问题的代码。仅仅依循书中定义的20多种坏味道 + 60多种手法，一个设计不良的软件系统恐怕也不那么容易搞定吧。\n\n**软件架构，**架构由不同类型的组件以及组件之间的交互组成。很多团队在项目初期会给出了明确清晰的架构设计文档和架构图。然而，当出现新需求，如何按照架构把需求分解到不同组件上的功能，架构图你告诉你怎么做吗？即便架构图清楚了定义了不同层级的组件，很多人仍然无法正确分解。所以，架构的腐化很多情况下是由于对架构不恰当的认知导致对组件功能不当划分所造成的。而软件架构作为系统需求功能拆分的一种指导原则，属于不可言说的知识。\n\n## 避开知识管理的陷阱\n\n不同类型的知识要想有效管理起来需要对症下药。在软件开发中，显式知识相对容易管理，可以通过文字、图像、录音等形式来承载和传递，比如说请假流程可以写出来放在团队的文档库中，CI纪律打印出来贴在CI墙边。而隐性知识显性化通常也不是一件难事，投入相应时间去生产，偶尔做些频率不高的更新即可，比如某些项目的代码库分布和使用过的技术栈，掌握了信息的当事人将它写下来就可以变成显性知识。\n\n管理显性知识要注意呈现形式的良好结构化和图例化，要做好这点，多迭代几次通常就能达到。最棘手的对不可言说知识的管理，在不可言说的知识上，团队很容易掉入一个常见的陷阱 -- **企图遵循显性知识的管理方式**。\n\n前文列举软件开发中的一些不可言说的知识，针对这些知识，如果引入一些社交活动会怎么样呢？比如，如何写出整洁代码，结对编程是一种很有效的方式，这种模式下通过老带新不断能够快速传递业务知识，还能在结对过程中产生对整洁代码的探讨和有效的认知提升。再比如，Code Review这项团队活动，大伙儿聚在一块讨论同一块代码，众人拾柴火焰高，团队里总有人看不惯别人的设计，提出好的点子，而总有人不接受，那就扒拉扒拉讨论一番，然后达成共识，不可言说的整洁代码就出来了，但整洁代码是什么，仍然无人可以给出能够有效指导他人写出整洁代码的建议，有何妨呢？\n\n回到知识消费环，**生产--\u003e传递--\u003e运用--\u003e吸收，**不可言说的知识的消费不能仅靠显性知识的输入，需要不同观点的碰撞，不同理解的交融，在思辨中打破自己原有的认知，从而形成新的理解，而这种在当时特定场景下形成的理解也不一定就能快速吸收，还需要不断地场景迁移，看能否将理解应用在不同的场景，经过几个这样的回合，能举一反三了，则说明认知得到提升，达到了吸收内化。\n\n**\u003cu\u003e要形成有效的知识消费闭环，社交活动是必不可少的，这也是驾驭不可言说知识的核心\u003c/u\u003e**。\n\n再比如系统架构，好的系统架构应该是出自团队，通过演进式浮现出来，而不是某个人在一张白纸上画几个线框图搞出来的。为什么这么设计？这么设计之后不同的业务功能应该划分到哪个组件？未来业务复杂度更高了，非功能性需求变更了，系统应该怎么演变？同样一张架构设计图不同人理解是不一样的，要有效传递系统架构背后的设计理念，需要团队通过定期的探讨和复盘，在动态的沟通过程中达成共识，从而指导对架构的演化。\n\n关于不可言说的知识，不得不说说业务需求。根据2019年中国DevOps现状调查报告数据显示，软件被延迟交付是困扰很多开发团队的一个现象，超半数企业认为需求的频繁变更是阻碍软件按时交付的主要原因。\n\n![](/images/swd/agile/knowledge-delay-reasons.webp)\n\n需求变更是导致软件延期的最大元凶，尤其是在一些传统瀑布开发流程的组织中，企图通过重型文档和强审核流程规范开发过程，强流程管控 + 重需求文档必然导致组织对需求变更的响应力不足，而需求变更又是不可避免的。业务需求很多时候属于不可言说的知识（业务人员的想法），针对这种不可言说的知识，好的方式是通过沟通交流达成共识，再借助显性化知识管理手段来记录和传递。这也是为什么敏捷软件开发中不提倡重量级需求文档，提倡基于个体交互的沟通共识的原因。\n\n传递不可言说的知识离不开有效的社交活动，而社交活动也稍微需要点讲究，最好形成「沟通-确认」循环，即Kick-Off ~ Review，简称KR环。Kick off中传递知识，沟通达成初步共识，再通过Review来检视行动结果。每一次沟通循环必然会深化共识，人员认知也会随之得到提升。\n\nKick off ~ Review的社交循环需要注意几点：\n\n1. 闭环。善始善终，有始有终，切勿在Kick off的时候兴致满满，而Review草草了之。\n2. 及时。Kick off ~ Review的时间间隔适当，太长了上下文可能已经淡化，影响知识传递效果。\n3. 记录。通过轻量的方式将沟通共识后的要点记录下来，建议将沟通过程中的一些片段也进行记录，便于回忆。\n\n在软件开发项目中，绝大部分知识属于不可言说的知识，当你发现团队中知识传递效率低，不妨回顾一下团队的社交活动是不是存在问题，考虑是否要增加Kick off - Review循环或者缩短循环周期以进行高效的沟通。\n\n![](/images/swd/agile/knowledge-cycle-2.webp)\n\n## 写在最后\n\n太阳底下无新鲜事，排列组合便是创新。其实在基于迭代的敏捷软件开发过程中，有很多敏捷实践都其实是在做社交循环，典型的有 \"IPM - Showcase\"、\"Story off - Story Desk check\"，\"Coding - Code Review\"，\"任务分解 - 功能实现\"，结对编程。\n\n如果把软件开发当成是一种知识传递的过程，它起源于创意或想法，首先将某人脑中的想法转化为需求，再通过编码实现转化为代码，最终通转化为可工作的软件。在这个过程会涉及到大量的知识传递，而这些知识大量属于不可言说的知识，如何高效率传递这些知识，并提升团队的认知，是一个值得软件知识工作者去深入探索的问题。\n\n作为软件开发活动中的知识工作者，切勿让在生产知识上的勤奋掩盖了在思考有效知识管理上的懒惰，最终投入大量精力制造了一推没有被消费掉的知识，还制造了一个\"知识渊博\"和\"学富五车\"的幻象。\n"])</script><script>self.__next_f.push([1,"34:T1856,"])</script><script>self.__next_f.push([1,"\n\n\n---\n\n\n前段时间看了《你只是看起来很努力》，书中没有头衔家族（心理学家、科学家、哲学家等）那些成体系的理论知识和指导框架，更多的是作者自己一路走来经历的故事，这些故事主要写的是别人。他通过这些故事来参悟一些人生道理，并试图以自己的言语传播。有的人也会视之为鸡汤，这不重要，重要的是它能不能跟跟你产生有效的共鸣，并带来积极的影响。\n\n他以第一人称的口吻去表达，也正是这一点，书中内容代表的是他自己的价值观，既然是自己的价值观，就难以匹配所有人，没法发挥普世哲学的意义。以至于有的人会觉得他在否定跟他价值观不同的人的价值观而对齐产生负面的看法。\n\n总体感觉还是很钦佩他不断地折腾，敢于去尝试，身上散发出了一股正能量。能够给处在低谷的人带来一些阳光。尤其是那些在学生时代不愿意随波逐流而又缺乏勇气和坚持的学生，能为他们提供一些指引和激励。甚至我自己在想，要是我在大学的时候看到这些问题，或许那时候就会更加努力一些。\n\n能量太强，总会波及一些不愿意被能量辐射到的人。道理是自己的，他说出来了是他的自由，我们接不接受是我们的自由。碰到自己也同样经历过并认同的感悟，不妨给予肯定的回应和认可，遇到自己不同的观点，权当自己又看到世界的一种不同观点，多了解了一点别人的想法，也是有益无害的，不用上升到人生信条的高度去批判。\n\n我在看这本书时，虽然没有像在看俞敏洪老师《我曾走在崩溃的边缘》这本书，看到眼泪在眼眶打转的故事场景。这本书里面的一些故事感觉更加离自己近一些，有时候看完，也会脑补一下自己经历一次会是什么样的结果呢。在看到每一个故事，自己脑海也会随之浮现出故事场景，走过一遍，也会有所体会。\n\n### 不要忽视亲人\n\n里面提到一个故事：\n\u003e 一个孩子和父母吵架，孩子一气之下离家出走了。他走了很远很远，走到了一个自己也不知道的地方。\n\u003e\n\u003e 一整天，他没有吃一点儿东西，于是去面店想要一碗面，被店主赶走了。\n他去快餐店想要个汉堡，又被服务员赶走了。他万般无奈，坐在地上哭。一个老太太路过，看见他哭，就递给他一个面包。孩子一边吃面包，一边告诉了老太太自己为什么沦落成这副模样，说完，他跟老太太说：“您真好，还给我吃的，我以后能不能跟您生活在一起？我能照顾您。”\n\u003e\n\u003e他以为老奶奶会很感动，没想到的是，老奶奶一把抢过面包，发飙说：“你不配吃这个面包。”孩子震惊了。老奶奶说：“我只是给了你一个面包，你就感动到要照顾我，你想过你的父母吗？他们每天管你吃喝，无条件地对你好。而你呢，却为一点儿小事离家出走，你想过他们的感受吗？”\n\u003e\n\u003e孩子醍醐灌顶，于是回到了家。从此，他慢慢学会用心体谅着父母。\n\n当然这个故事从侧面说出了个现象 -- 人很容易对一些习以为常的事情觉得理所当然。作为提供帮助方，不要让对方得到的太容易，并且在对方真正需要帮助时提供必要帮助，哪怕是亲子或夫妻，也不妨尝试学会让对方保持内心的期待。作为接收方，不要陷入**升米恩斗米仇**的误区，培养自己秉持初心的能力、心怀感恩的能力。\n\n### 警惕弱者思维\n\n一个人升了官，涨了工资，要么就是好有关系，要么是跟老板有一腿；如果没有，要么就是有一个好爸爸，要么就是有个好舅舅或好叔叔。所以，我现在这个样子，也是情有可原的。所以他拒绝付出行动，拒绝让自己不舒服的改变，停留在自己舒适的批判中，显露出一副“我弱我有理”的神态。\n\n从这引申出一个道理：批评别人是很简单的，挑错也必定是容易的，所以有很多喜欢评论别人的人，经常口若悬河而提不出任何建设性的建议，自己的生活也没有发生什么积极的变化。\n\n当一个人或一件事情爆红，会出现两批吃瓜群众，一批忙着批判，一批忙着研究。忙着批判的人把别人批得一塌糊涂，用各种社交媒体去谩骂，骂完别人，自己长舒一口气，却忘记自己的生活一趟糊涂。忙着研究的那批人，脑子思考一件事，他们是怎么红的？有什么地方值得自己学习？能够对自己有什么启发和帮助？\n\n对于上述两批人，前者在暴躁地原地踏步，后者在安静的进步前行。\n\n\n### 不要让自己只是看起来努力\n\n顺应了书的标题，其实本书讲的很多点都比较散，之间没有什么必然的联系。而**你只是看起来很努力**也只是里面的一个主题，但这个点确实是生活中会经常遇到的。比如说：有些人，看起来每天熬夜，却只是拿着手机点了无数个赞；看起来起那么早去上课，只是在课堂上补昨晚的觉；看起来在图书馆坐了一天，是真的只做了一天；看起来去健身房，却只是和别人在闲聊。看起来是在工作，却只是刷了好几个微信，等等。\n\n这里面透露着一点 -- 时间管理和专注其实是一件很有挑战的事情。很多时候，经历了不专注的一天，自己会觉得非常忙，但是第二天回想起来，又好像没做个啥，这样的工作方式是低效的，自然也不会收获成就感。\n\n所以，自己要能够意识到这一点，通过时间管理和任务分配，自己保证一些专注的时间，比如早起的时间专注看书或处理一天中最重要的事情。去健身房带上耳机听英语或音乐，专心锻炼不聊天。看书前，列出一些问题，然后带着问题去书中找答案。通过让自己有一个清晰明确的目标，小而有节奏的任务，排除外界的干扰来让自己保持专注。效率提升，就能挤出更多时间去做其他的事情。\n\n\n\n\n"])</script><script>self.__next_f.push([1,"35:T4719,"])</script><script>self.__next_f.push([1,"\n自从2015年3月加入ThoughtWorks接触到团队Code Review活动之后，我对Code Review有一种上瘾的感觉。那会儿的项目简直是敏捷派程序员的乐园，各种敏捷工程实践都得到很好的实践，团队了有优秀的程序员带着一帮热爱学习的新人和次新人在构建着已投入生产的大型商业软件。\n\n我当时作为一名团队次新人，特别享受Code Review过程中去审视别人的代码，发现不良的设计，然后提供我的见解，当然还有机会吸收很多小伙伴的观点，而我的Clean Code的意识和基本功也因为这种Review会议得到加速提升，很多在书本上看到的一知半解的原则在这种思辨过程中得到吸收。Code Review活动让我吸收了很多营养的同时也展现了自己的价值，增强了自身的团队归属感。所以，以至于再后来参加了很多不同类型的交付项目之后，我都会格外注重Code Review这项活动，走到哪里我都会去主动推动这项活动。就像平板支撑，喜欢运动的我会带着大家一起在工作中运动，因为它确实能够为我们带来好处，Code Review也是如此。\n\n我也碰到过交付压力大的团队，他们可能会节省下Code Review的会议时间，企图让大家每天多出个把小时来写代码，这样就也许能多开发点功能。而有的团队虽然没有取消Code Review，但流于形式，把Code Review搞成没有笑声的单口相声，大家聚到一块放松放松。还有的团队介于这两者之间，不想流于形式，但苦于团队优秀程序员的匮乏，导致效果不佳。\n\n家家有本难念的经，每个团队的情况都不尽相同，Code Review为什么要坚持做？以什么样的形式开展？适合什么样的团队？这些问题的答案也是因团队而已，我的观点是：这是一项值得投资的活动。\n\n## 出身平凡\n\nCode review，代码检查，也叫代码审查，我平时觉得英文发音有点拗口，有时候叫Code Diff。开发人员凑在一起来检阅彼此所编写的代码。看看有没有代码坏味道，看看有什么不合理的设计甚至是错误的设计，等等。\n\nCode Review是敏捷开发团队的一项较为常规活动，既然是Review，肯定是我写代码别人来检查，别人写代码我来检查，所以需要2个或2个以上的人参与进来，那种通过异步Pull Request的方式其实也是一种Code Review，只不过那种方式没有产生实时的个体与交互，交流互通通过文字来传递，效果和时效性会差一些。\n\n从知识管理的角度出发，Code Review可以强化代码集体所有，让团队开发人员能够熟悉代码库，避免出现知识孤岛。从代码守护的角度出发，Code review可以带来一个显著的效果 -- 有效防止代码库的腐化。这两个视角通常也不是彼此割裂的，更多时候是有机结合在一起，比如当发现具体的代码坏味道，通过交流碰撞来传递什么是好的设计，怎么消除这些坏味道。\n\n所以，Code Review的好处显而易见，一方面防止代码库的腐化，消除并减缓了技术债的累积，另一方面让不可言说的知识被有效消费从而提升团队成员认知，提升新代码的质量。两相结合，形成了\"戴维斯双击[1]\"效应。这种双击效应恐怕是团队无法拒绝的诱惑。但要形成有效的双击效应，还得避开一些陷阱，并且因地制宜，找到适合自己团队的方式。\n\nCode Review最常规的方式是，在一个固定的时间段，团队的开发人员聚在来逐个检查每个人开发人员的代码，通常频率是一天一次，也有多天一次，我待过的团队一天一次居多，这样小步快跑的方式会让每天的时间不会太长，而且每天都能发生一点点好的改变，我个人更加倾向于这种方式。\n\n时间段大多是选择下午下班前，也有第二天一大早站会之后搞得，我个人也倾向于下班前，因为经过一天的紧张思考，下班前调节一下大脑的节奏，趁代码印象深刻的时候探讨会更加高效。\n\n每天固定节奏凑在一起开展Code Review的方式适合具有稳定开发节奏的团队，在软件交付活动中，大部分团队都具备较为稳定的交付节奏，所以也适合大部分团队。\n\n## 三大陷阱\n\nCode Review其实就是以一个很普通的会议形式开展的，固定的时间 + 确定的人 + 代码就可以搞起来，而这种普通的会议要玩出效果，需要避开一些陷阱，并且采取一些不同于常规的形式。\n\n### 麦霸上线\n\n想想一下你们团队5个开发人约好下午4:30开始Code Review，刚开始没几分钟，团队的Tech Lead开始变身麦霸，讲了一通他上周学习的一种架构理念，眉飞色舞，但听的人心中充满了疑虑：这个我写的Code有什么关系呢？这种情况要识别出来，不然一场Code Review下来，他讲的知识由于跟Code的关联度不高，没有让听众产生共鸣，有没有被消费是个大问号了。可能有些人就是喜欢学习，热爱分享，难免忍不住讲给大家听。如果团队有这样浓厚的学习氛围，绝对是一个好现象，针对这种分享定期搞技术研讨会来交流会是一个更好的选择。\n\nCode Review也会少不了知识的分享，但建议这种分享是问题驱动的，而这个问题切身关系到当前代码所涉及的问题。比如代码命名不表意，使用了不恰当的继承，某个接口过度设计了，职责被放到了不恰当的架构组件等等，由这些问题驱动大家去探讨，有洞见的成员分享自己的观点，分享命名如何自解释、继承的合理用法、简单设计的运用、架构分层的职责划分甚至什么是合理的业务建模。\n\n最终，这些讨论能落实到代码的优化上，当然也不是每次都能达到这样的优化，即便如此，代码问题驱动的探讨也能让彼此更加聚焦，这些思维碰撞在日后编码定会发挥作用。\n\n### 有始无终\n\nCode Review在传递不可言说的知识上功不可没，而这种功不可没要建立在善始善终上。如果只有开始，没有结尾，知识的消费没有形成闭环，就无法产生理想的效果。也就是说在Code Review中经过沟通达成的共识以及待调整的行动项有没有被落实，则需要去认真的Review，否则只是生产了知识，而没有运用知识，吸收更是无从谈起。\n\n我见到过一些团队在Code Review的时候提到了很多待修改的代码，最终可能真正得到执行的只有少数，而且还取决于团队成员的执行力和自觉性。有时候没有落实可能不是某人犯懒，而是真正忘掉了，好记性不如烂笔头，Code Review的时候**做一些记录会减少被遗忘的概率**。记录的作用不只是提醒，它还是**下一次Code Review时的检查清单**，而这正是有始有终的一个保障手段。\n\nCode Review中产生了很多基于共识后的知识固然是一个好的开始，如何给这个好的开始配上一个好的结局，需要增加检查闭环，检查不是为了监视有没有偷懒而进行惩罚，而是为了检验知识有没有被有效消费，只有知识被有效的消费了，Review的产出才不至于白白浪费掉，不然的话，也大可不必花时间在这里搞流于形式且内心不安的团队放松时刻。\n\n增加检查闭环会带来一点点成本，切莫因为这一点成本而忽略它的价值，否则每天固定的Code Review时间本身就可能变成了成本，把它纳入到Code Review的流程中，除了能够促进认知提升，还能增强团队的纪律性和执行力。\n\n### 核心乏力\n\n有一种团队每天都会准时Code Review，但是代码库的质量还经常出现一些明显的代码坏味道，而且重复出现。我在2017年加入某个大型项目的时候就遇见了这种情况。经过一段时间的观察，发现其中很大的原因是Code  Review时的主力缺乏。这就好比一个人在打羽毛球时候，因为核心乏力，手臂在怎么使劲，也难以将下肢转体蹬地的力量传导到拍子上，导致击不出高质量的球。\n\nCode Review核心乏力通常存在两种原因，一种是团队的核心程序员忙于救火或者忙于编码之外的沟通事宜，导致没时间参加团队的活动，而年轻化的团队成员一起讨论难以有效发现问题。另一种是，团队成员在Clean Code和软件设计方面的基本功普遍偏低，没有人能像孙悟空一样能快速识别代码里的各种妖魔鬼怪，导致漏网的特别多，还给人一派和谐的幻象。\n\n核心乏力归根结底是人员基本能力素质的匮乏，团队一旦出现这种状况，团队的管理者则需要思考如何能够借力，在人员筛选和人员的培养上下点功夫，要么让基本功扎实的核心程序员能够抽身现场说法，要么让非核心程序员成长为核心程序员。不然指望一群连枪都握不稳的新兵蛋子能在战场持枪杀敌，这比赌股市明天涨跌还难。\n\n作为团队一员，当团队核心乏力时则是你展现自己的好机会，多花业余时间阅读几本重构、整洁代码、软件设计、面向对象设计等方面的好书，在编码中运用，在Code Review中分享探讨，这种理论立即实践的方式不失为一种高效学习的方式，久而久之，你的代码基本功会得到显著的提升，而你也会成为团队的核心程序员，发挥更大的价值。\n\n## 极限Review\n\n前文提到了Code Review的常规形式，团队固定时间段一起开会来Review代码。在实际项目中，Code Review的形式也有很多。其中不得不提的是极限编程中有一项结对编程的实践。极限编程中的极限理念是如果我们认为一项实践是有价值的，那就把它做到极致。比如，跟客户保持沟通是有价值的，那就提倡现场客户，代码尽早集成是有价值的，那就提倡持续集成。Code Review是有价值的，那我们就时刻进行Review，结对编程就是一项极限Code Review。\n\n从知识管理的有效性视角来看，结对编程比Code Review的效果要好，因为它的KR环[2]更加频繁，新人带老人采用结对编程是一种很高效的方式。采用结对编程要防范信息的孤岛，不要因为两个人搭档很顺畅就长期固定，一般采取结对编程的团队也都会进行定期更换搭档。然而，结对编程在国内通常是一个反领导直觉的实践 -- 2个人干1份活，这不是浪费劳动力嘛。很多项目可能没办法采取结对编程，甲方不会同时为两个人付钱，乙方也就很难说服自己去干这种降低一半收益的事情。\n\n理想情况下，结对编程玩得很好的团队不需要Code Review，他们时刻都在Code Review，并通过更换搭档的方式达到了代码集体所有，除非有必要集体讨论的代码，引入一些轻量的集中Review即可。不理想的情况是，很多团队无法开展结对编程，这种情况下Code Review如果再省略了，那代码质量全凭运气了。运气好时，团队都是精英，个个身怀绝技，写出高水平的代码。运气不好使，代码库腐坏的速度会随着时间成斜率渐大式的增长，并且新人还得不到成长。\n\n回到现实中来，极限团队总是稀缺的，10倍程序员也已经很难寻觅了，Code Review在我看来是一项不应该省略掉的活动，不但不应该省略，而且在实践过程中还应当小心避开这3个陷阱。\n\n## 因地制宜\n\n除了常规的Code Review形式和极限形式，Code Review因团队境遇不一样可以采取不一样的开展方式。\n\n### 超越时空\n\n如果团队人数过多，如果大家一起会耗时过长，可以采取分小组并行的形式并行开展，在分组的时候确保每个小组有资深的核心程序员在场。一般Code Review的小组人数3 ~ 7个人为宜，最多不建议超过9个人，在我的经历过的团队中3 ~ 5个人一组效果会更好。 \n\n如果团队采取的是分布式协作方式，不容易聚到一个空间，除了疫情时代最常用的在线形式，还有一种方式是随时进行Review，比如团队有一个工作微信群，任何人提交了Pull Request之后就可以把链接发到群中，邀请大家来Review，通过群回复或者页面注释的方式提供反馈，如果有必要，就随时拉一个快速的会议。我在客户这边带的团队就采取了这种方式，长期执行下来，大家的反馈也都很好。\n\n### 游击队\n\n当团队确实处于较为紧张的交付压力下，团队的新人也比较多，而团队的资深核心程序员无法保证Code Review的出席率。这种情况下，可以采取游击队的方式，比如Tech Lead在新人提交代码前进行一对一的Review，从而减少代码坏味道迁入到代码库中。\n\n有时候，Tech Lead也会成为单点瓶颈，此时团队中基本功相对扎实的程序员也可以充当游击队队长，去Review其他人的代码。我见过有些Tech Lead技术热情较高，对团队的责任感也会更强，他会在业余时间去Review团队成员提交的代码，并反馈到具体的人，争取在下次提交的时候做一些优化。我自己之前也这么干过，我会在集成代码的时候去Review别人的代码，一旦发现觉得需要优化的代码坏味道，我就会及时找到对应的小伙伴去沟通，我的这种Review更多发生在工作时间段之内，因为时效性很高，效果也很不错。\n\n### 单点限流\n\n这种形式其实在我看来更多是一种出于审核把关的目的，比如团队所有人提交代码通过Pull Request进行，所有的Pull Request需要某个人来审核，认为可以了进行合并，不行的话就提出反馈，修改后再提交PR。当开发者大多数是供应商的时候，甲方多数时候需要对代码进行把控，这个人通常是甲、乙方的技术领导，技术领导对供应商每一个人提交的代码进行审核，至于供应商团队内部有没有进行代码集体所有的Code Review，这个往往不会被付诸过多的关注。\n\n这种Review方式也是现实存在的，但其目的往往与我们提倡的Code Review的初衷有点不一致，这种也相对容易造成单点瓶颈，由于团队缺乏集体的交流沟通，团队的认知难以得到有效提升，战斗力水平提升也不会显著。但这种形式确实是在没能选择中的一种选择，至少比放任不管要好。\n\n## 管理之忧\n\n有的管理者总想让程序员8小时干出16小时的活，如果做不到让程序员自愿加班8小时。那8个小时就给我干满8个小时活不能算过分吧。在这种想法的驱使下，他们不重视这种团队的社交活动，觉得每天1小时，8个人参加就一天没了。所以，一些团队因为管理者的压力，会取消这些有意义的团队社交活动。\n\n从短期来看，能理解管理的苦衷，毕竟实打实的投入时间了就能写出更多的代码，表面上看这样好像很在理，比如流水线的机器，停电1小时就损失1小时的工作产出。管理者这样想本身没什么错，错就错在他们这么做了之后却又抱怨后期加功能越发困难，困难了就要求团队加班，越加班越困难。\n\n遗憾的是，软件开发不是流水线的标准化生产活动，假如写出可用的代码需要的是体力，写出整洁可用的代码需要的则是创造力。你如果要想要可用的代码，找一帮体力好的人开干就好，但后期也只会越干越辛苦。你如果想要整洁可用的代码，就需要寻找有创造力的程序员，还要充分发他们的创造力。\n\n人的专注力是有限的，人的认知也是有局限性的，一天紧张的编码工作下来，让团队之间发生一些思维碰撞，调节一下大脑的节奏，适当释放程序员大脑的创造力，而这种释放会换来更多整洁可用的代码。\n\n所以，作为管理者，你在抱怨的同时，想想你是怎么看待程序员的。如果你把程序员当成流水线的机器，就别指望流水线的机器能够迸发出创造力。让程序员熬夜加班写代码，就好比让一台生锈的机器继续拼命地运转，结果是它只会生产出更多的次品。除了让他们多产出代码，你给他们时间去学习了吗？你帮助他们去成长了吗？\n\n另外，管理者在招聘程序员的时候，除了考察面试者对一些算法的记忆力，不妨多看看面试者的技术热情，看看他写过的代码，整洁代码的Sense，面向对象设计基本功这些很多时候更为重要，因为在应用软件开发工作中算法一年用不上几回，而系统的腐坏往往是因为基本功缺失积少成多造成的。\n\n毕竟，你播种什么就收获什么，你用什么样的鱼饵就钓到什么样的鱼。\n\n## 写在最后\n\nCode Review 本身没什么高大上的，自己写的代码，找其他人Review一下，众人拾柴火焰高。一方面通过加强团队的社交循环来强化知识的传递效率和吸收率，提升团队的认知水平，进而增强团队战斗力。另一方面，通过集体智慧来扫除代码坏味道，减缓技术债的积累。\n\n如果你是一名程序员，想在团队中让Code Review发挥更好的效果，除了避开一些陷阱，因地制宜，并取得管理层的支持，还要尽可能快速让自己成长起来，成为团队的核心程序员，去发展更多的人。\n\n# 注释\n1. 戴维斯双击，当一个公司利润持续增长使得每股收益提高，同时市场给予的估值也提高，股价得到了相乘倍数的上涨。即，公司业绩和市场预期同时加持推动股价快速上涨。\n2. KR环，Kick off ~ Review环，启动和检查的沟通闭环，在[_远离无效的知识管理_](/articles/2025/02/02/avoid-ineffective-knowledge-management)一文中有介绍。\n"])</script><script>self.__next_f.push([1,"36:T3b22,"])</script><script>self.__next_f.push([1,"\n如题，故事是用户故事，它是敏捷研发团队一贯采用的需求管理手段。开发人员以用户故事作为需求功能开发的单元，在开始开发用户故事前和完成用户故事开发后，一头一尾，通过两个非常轻量级的实践来形成首尾呼应，能够大大提升工作产出的价值，减少返工的风险和浪费。\n\n本文重点聊一聊这两个轻量级团队社交实践，它们分别是 **Story kick off 和 Story Desk check，**中文通常被翻译成开卡和验卡，卡指的是用户故事卡**。**\n\n## 剧情还原\n\n演员表：\n\n+ 丹娜：业务分析师（BA），女\n+ 袁帅：开发人员（DEV），男\n+ Q仔：测试人员（QA），女\n\n### 首：Story Kick off\n\n周一，新的迭代伊始，丹娜已经在卡墙上的【Ready For Dev】一列贴上了9张卡片。\n\n袁帅走到卡墙上驻足了10秒钟，从墙上的【Ready For Dev】的甬道中摘下一张卡片，顺势瞟了一眼坐在桌子那一端的丹娜，发现她正在跟Q仔讨论中。于是自己就先打开电子卡墙上对应的故事，仔细阅读故事的描述和验收条件（AC）。\n\n袁帅几分钟时间就阅读完了，他没有立马切换到IDE去写代码，因为按照规矩，这时候他需要约丹娜和Q仔一起勾兑一下这个故事。见她俩还在讨论中，袁帅起身去倒了杯水，路途上还在琢磨着故事里描述的内容。\n\n袁帅倒满水杯回到座位刚坐下，丹娜就笑脸迎过来：\"帅哥，是不是要找我开卡？\" 袁帅心想神了，竟然能猜到自己内心的活动（其实袁帅刚才在卡墙前驻足摘卡的时候，丹娜就留意到了）。袁帅笑嘻嘻的夸赞道：\"果然不愧是娜姐啊！\"，说完便向Q仔使了个眼神。5秒钟不到的时间，三个人开始在袁帅的座位旁交头接耳。\n\n一开始是袁帅指点江山式的边指点着屏幕口若悬河，丹娜和Q仔且听且点头，面容较为舒展。紧接着，丹娜眼神坚定地讲了几句简短的话，袁帅边听边在纸上记录着。记录完后，袁帅面带疑虑的问了几个问题，经过几个来回，袁帅得意地点着头，貌似秀了一把肌肉。正要解散时，Q仔突然如获至宝似的，比划着手势语速略快地讲了一通，只见袁帅点头称是，并追加了一些记录。\n\n大概10秒钟的样子，袁帅就着便利贴纸上的记录做了一次总结性的陈词，说完，他们仨互相抛了个媚眼，开心的散去。袁帅按下【CMD + tab】切换到IntelliJ IDEA，但他还是没有着急写代码，而是趁热喝了一口刚倒的水（刚才的过程不到5分钟，袁帅可能只是有点渴了），喝完水他撕下一张新的便利贴，拿起笔开始边思考边比划起来。\n\n【旁白：到此为止，袁帅、丹娜和Q仔三人完成了用户故事的 Kick off活动】\n\n### 尾：Story Deck check\n\n周三，下午3:12，袁帅喝了口水，如释重负般伸直了懒腰，发出号召：\"平板支撑了！\"。他起身去拿来两个瑜伽垫，团队的小伙伴也自觉来到瑜伽垫上准备着。袁帅打开他自己开发的一个平板支撑微信小程序[1]：\"Start！\" \n\n7分钟后大家回到工位上继续工作了，个个精神焕发的样子，看来每日平板支撑让大家尝到了甜头，运动能够提升工作效率，也是袁帅一直坚持的理念，走到哪里他把运动带到哪里。\n\n还没等丹娜坐下，袁帅就喊她过来看看他开发的故事。\"哟，帅哥这效率可以啊！\" Q仔听到袁帅喊丹娜，自己先主动出击了，边说边向袁帅靠近。\n\n时隔两天多的时间，这三个人又聚在一起开始对袁帅周一认领的故事卡指点江山了。只见袁帅手法娴熟的操作着鼠标和键盘，用手指指着屏幕，嘴里滔滔不绝，越讲越兴奋。丹娜和Q仔也频频点头，丹娜还时不时竖起大拇指来表扬帅哥。\n\n很快5分钟过去了，丹娜没有什么问题了，Q仔突然灵光一闪，示意袁帅将鼠标和键盘给她，只见她接过鼠标胡乱点了一番后，也朝帅哥树起了一个大拇指。然后，三人开心的散去，整个过程比较顺利。丹娜和Q仔各自回到自己工位上，只见袁帅噼里啪啦在终端敲了几行命令，然后起身直奔拳击室，喜欢运动健身的袁帅每天除了平板支撑还要加一套组合拳，运动是让他保持高效工作的秘诀。\n\n【旁白：到此为止，袁帅、丹娜和Q仔三人完成了用户故事的 Desk check活动】\n\n## 剧情复盘\n\n从整个剧情来看，两个社交活动都非常轻量，每个活动都在5分钟左右完成了。BA、DEV、QA三种不同的角色同时参与到其中，这三个角色一个是定义功能的人，一个是要开发功能的人，一个是要测试功能的人。三者能否对业务需求达成共识就至关重要了。\n\n假想丹娜写完了用户故事，袁帅照着用户故事上的描述，按照自己的理解去编写代码，Q仔同样就着故事描述去测试。一旦袁帅和Q仔对文字的理解跟丹娜的期望不一致，返工的几率就会大大提升，而因返工浪费的时间，随便一个缺陷都远远不止额外消耗掉这10分钟，而且错误发现地越晚，返工的成本也就户越大。\n\nStory Kick off 和 Story Desk check这两个社交活动，核心目的是前置反馈，更早的发现因需求理解不一致导致开发了错误功能，造成没必要的成本付出。说白了**要确保一开始就在做正确的事情，不然做得再快再多都是浪费**。\n\nStory Kick off为了尽早发现需求理解不一致导致开发走了弯路。Story Desk check为了避免DEV认为自己做完了，提交到下一个阶段给QA进行测试，一些场景的遗漏或偏差再由QA打回来，修复的成本比DEV更早在自己本地进行修复的成本会大很多。所以，那咱们就快速在DEV桌面上快速检查一下嘛（Desk check的意思）。\n\n## 首尾呼应的要领\n\n### Kick off 业务价值\n\n我在[程序员的3种思维误区](/articles/2021/02/22/3-misunderstandings-of-programmer)一文中提到了不关注业务价值的误区。在Kick off中，我仍然强调关注业务价值。关注业务价值的好处有：解决相同的业务问题，能够挖掘出更加节省成本的方案。举个例子，你老板让你明天开车把他捎上去国家会议中心开会。不关注业务价值的做法是，你明天按照要求开车把他捎上，结果运气不好路上堵车，没有准时赶上会议。关注价值的做法是，搞清楚老板为啥要你开车去接他，发现老板是担心周一不好打车，担心会迟到，而解决这个问题最好的方案可能是步行100米去地铁站坐地铁，稳妥还经济（老板被接送习惯了，容易忽略还有公共交通）。\n\n好的BA通常会在用户故事中写清楚业务价值，用户故事的三要素里面会明确用文字描述。即便这样，DEV在解读业务的时候，理解不一定跟BA表达的一致，毕竟文字会有信息传递的偏差。Story Kick off是消除这种偏差好时机，尽可能保持在为什么做这件事情上形成共识。基于价值共识，用户故事上写得验收标准可能会因为发现了更优方案而做出调整。\n\n比如，BA丹娜在编写「用户短信验证码登录」的用户故事，她前两天她刚好在哪个网站上看到一个有意思的方案，类似\"找出图中所有的汽车\"（12306里面的\"识别出图中哪个是白酒\"），验证通过后就能申请发送短信验证码。袁帅认领了这个故事，袁帅没有过多思考为什么做这个事情而直接照做了，他花了两天去Spike也没有搞定这个方案。\n\n第三天一早，他突然想起来在上一个项目中实现了一个\"输入图片中字符\"的人工验证方案。他再次仔细阅读了用户故事：\u003cu\u003e从而防止恶意防止一些恶意捣乱的人编写程序来频繁请求发短信造成经济损失\u003c/u\u003e。白字黑字写得很清楚，那他那个现成简单方案不就在解决这个问题吗。袁帅再次找到丹娜，确认了这个业务价值后便引入了这个方案，半天不到搞定。\n\n袁帅如果在Kick off时多去关注和琢磨业务价值，也许能够更快地完成这个故事。\n\n\u003e 有了这次教训，在前文的剧情中袁帅【面带疑虑的问了几个问题】，其实就是在根据业务价值建议更好的方案。\n\u003e\n\n### Kick off 跨功能需求\n\nBA通常能够将功能性需求验收场景罗列出来。一些非功能性需求，比如性能、安全性和易用性等。通常QA在这方面会有更多的关注。在Kick off的时候提前考虑这些跨功能需求会让业务方案和实现方案发生一些调整。\n\n比如，用户查看历史订单，正常发生的用户行为是只能查看自己的订单，而有一些恶意篡改请求的行为，在登陆之后，通过更改请求URL的用户id和订单id去查看其他人的订单。这种数据安全性需要去防范的，这会影响DEV的实现方案，在开发时要做这种用户安全性校验。\n\n再比如，如果等待所有历史订单加载出来会比较慢，影响用户体验，此时查询历史订单的时候默认只展示近三个月的订单，然后提供不同的条件查询其他的订单。这种性能和易用性的需求也会让业务方案发生有益的调整，而不必等到开发出来之后发现不对劲再重做。\n\n\u003e 在前文的剧情中，Q仔【比划着手势语速略快的讲了一通】其实就是在补充一些跨功能的需求场景，袁帅也做了一些记录。\n\u003e\n\n### Desk check 边界场景\n\nDesk check其实是DEV开发完故事里的功能场景后一个迷你的showcase，DEV通常会逐个按照故事中描述的AC进行功能演示，通过BA的验收许可。QA因为常年的修炼练就了一番独特的视角，QA很喜欢关注功能的边界场景，这些恰恰是最容易出现缺陷的地方，能不能捕获到这些缺陷不只是关乎软件质量，还关乎到QA的职业声誉了。\n\nQA通常在这时就会进行很多边界场景的测试，这个时候也是DEV心里压力比较大的时候。作为DEV，在开发前，对每一个场景实例化需求的时候不妨锻炼自己尽可能列出边界场景，通过自动化测试进行覆盖。如果边界场景在这块被遗漏了，QA在测试环境中发现了问题，在返工给DEV，修复成本也会被放大不少。\n\n\u003e 在前文的剧情中，【Q仔突然灵光一闪，示意袁帅将鼠标和键盘给她，只见她结果鼠标胡乱点了一番后】，Q仔就是在做这个事情，因为袁帅演示的大多是一些非边界的场景。好在袁帅常年修炼TDD，在做任务分解和实例化需求的时候会重点关注边界场景，最终赢得了Q仔的一个大拇指。\n\u003e\n\n### Buffer 加持技巧\n\n除了上述几点核心点的把握，有一些小技巧能够加持这两个社交活动的效果，这些小技巧在整个剧情中也都被运用，我把它单独总结提炼出来：\n\n1. 把握好Kick off和Desk check的时效性，在立马要开发之前进行Kick off，在开发完成之后立即做Desk check，避免多线程并发模式，一次只搞定一个Story。\n2. 在Kick off过程中，运用翻转课堂的理念，让DEV来阐述对用户故事的理解，BA和QA做确认和补充，这样能够更好激发DEV去认真阅读和理解需求。即便不这么做，也有必要在最后让DEV做一个确认理解的复述。\n\n## 现实障碍\n\n对于一些非敏捷形态的团队，BA、DEV和QA没有在一起工作，他们各自在自己的独立部门中，这种社交活动发生的成本和阻力会大很多。这也是为什么这种部门孤立的开发模式频繁因为缺陷导致返工浪费。\n\n即便不能做到无障碍沟通，通过一些其他手段来践行 \"**前置反馈，及早暴露问题**\"这个大原则，正式和非正式的会议和SMS及时沟通，总比黑盒闭门开发、单向邮件或文档传输效果好很多。当这种沟通活动开展越容易，团队则越愿意去做，否则因为很多流程的阻碍，成本变大，在趋利避害的人性驱使下，大家当然也会逐渐就践行\"依流程办事，不出差错不背锅就好\"的原则。\n\n要应用好故事开发的首尾呼应术，团队需要具备一定的基础，比如敏捷全功能研发团队的形态，如果不具备这个形态，强行要求这么做，可能会适得其反。\n\n比如，最近我在一个客户这里，BA和开发按流程办事，一个BA会同时负责多个团队的需求编写，他们并不喜欢这种灵活的沟通方式，因为在流程中该开的会议都开了，再频繁这样沟通，会占用他们编写需求文档的时间。另外，在需求的管理上，如果进行独立有序的分解，彼此互相混乱依赖，这种沟通通常会比较痛苦，这就跟软件耦合度太高了，动一个点影响了一大片。\n\n所以，作为管理者，优先级更高的事情我觉得应该是努力打造这样的基础环境，逐步引入这样的血液和基因。\n\n## 小结\n\nStory Kick off和Story Desk check虽然两者都有一个Story的前置条件。其背后遵循的原则是 \"前置反馈，尽早发现问题\" 和 \"借助有效社交活动增强不可言说知识的传递\"。如果在团队中，还没有采用用户故事来管理需求，可以尽可能引入一些高效迷你的社交活动来践行这两条原则。\n\n传统的大篇幅文档 + 高度集中式的会议流程，不但达不到业务共识的效果，还让撇清责任的事情合理化 -- 「这个我都讲过了哈，你再做错就是你的问题了」。搭进很多人的时间，非但没有有效解决问题，还营造了虚假的合理性。\n\n这种细粒度、轻量级的社交活动本质上是把这些集中的流程会议时间打散分配在每一个小颗粒的需求中，整体上并没有额外增加过多额外的投入，但降低了风险，减少了返工浪费。\n\n## 下集预告\n\nStory Desk check之后，如果发现存在功能为完成或者功能开发有误，袁帅将继续进行修改开发，再次进行Desk check，直到丹娜和Q仔验收通过。随后，袁帅将代码推送到测试环境中，后续Q仔开始对这个用户故事进行全方位的测试，包括功能和非功能。袁帅则稍作休整，打完一套组合拳神后，采奕奕额头略冒汗珠缓缓朝卡墙走去，准备重演下一个Story kick off和Story Desk off循环。\n\nQ仔在测试过程中如果发现了功能缺陷，他会及时告知袁帅停下手头的工作，优先去修复这个故事的缺陷，然后再进行Desk check，最终Q仔验收通过后将其推入Showcase队列， 等待下一个重要的社交活动：Showcase。\n\n**推荐资源**\n\n+ [5分钟让你学会返工率降低一倍的神技——开卡、验卡](https://www.bilibili.com/video/BV1Fp4y1X72m)\n\n**注释**\n\n+ 1. 平板支撑计时器，在微信小程序搜索「Plank」\n"])</script><script>self.__next_f.push([1,"37:T8a0c,"])</script><script>self.__next_f.push([1,"\n\"Mock对象\"已成为一个流行的术语，指的是在测试中模拟真实对象的一类特殊对象。现在，大多数编程语言都有可以轻松创建模拟对象的框架。但是，人们通常没有意识到的是，模拟对象只是特殊场景下测试对象的一种形式，它支持不同风格的测试。本文将会介绍Mock对象是如何工作的，它们如何推进基于行为验证的测试，以及社区是如何使用它们来开发不同风格的测试。\n\n我是几年前在极限编程（[Extreme Programming](https://martinfowler.com/bliki/ExtremeProgramming.html)）社区中第一次接触\"mock对象\"。从那以后，我就越来越多的看到模拟对象（mock object）。这在一定程度上是因为很多mock对象方面的顶尖开发人员在不时地成为我在ThoughtWorks的同事。另外，还因为我在那些受XP影响的测试文献中越来越频繁地看到它的身影。\n\n但是，我经常看到mock对象被描述地很糟糕。特别是看到它们经常跟stub（测试环境的常见帮手）一起被搞混淆。我能理解这一点 – 我自己有一段时间也认为它们是类似的东西，但是与mock开发人员的交流中逐渐让我对mock对象的更深刻的理解。\n\n它们存在两大区别。首先是测试结果验证的方式不同：一个是状态验证，一个是行为验证。其次是在测试和设计相结合的理念上两者大相径庭。我在文中将它们称为测试驱动开发（[TestDrivenDevelopment](https://martinfowler.com/bliki/TestDrivenDevelopment.html)）的古典派（classical）风格和模拟派（mockist）风格。\n\n## 常规的测试\n\n我将通过一个简单的示例来说明这两种风格。（该示例使用Java，但这些原则对于任何面向对象的语言都适用）我们想获取一个订单（order）对象并依赖仓库中的产品来填充。订单（Order）类非常简单，只有产品和数量两个属性。Warehouse存放着不同产品的库存。当我们使用仓库中产品来填充的订单时，有两种可能的响应。如果仓库（warehouse）中有足够的产品来执行订单，则填充将被执行，并且仓库（warehouse）中的产品数量将减少相应的数量。如果仓库（warehouse）中没有足够的产品，那么订单（order）就不会被填充，仓库（warehouse）状态保持不变。\n\n这两种行为意味着要写两个测试，它们看起来很像常规的JUnit测试。\n\n```java\npublic class OrderStateTester extends TestCase {\n    private static String TALISKER = \"Talisker\";\n    private static String HIGHLAND_PARK = \"Highland Park\";\n    private Warehouse warehouse = new WarehouseImpl();\n    \n    protected void setUp() throws Exception {\n        warehouse.add(TALISKER, 50);\n        warehouse.add(HIGHLAND_PARK, 25);\n    }\n    \n    public void testOrderIsFilledIfEnoughInWarehouse() {\n        Order order = new Order(TALISKER, 50);\n        order.fill(warehouse);\n        assertTrue(order.isFilled());\n        assertEquals(0, warehouse.getInventory(TALISKER));\n    }\n    \n    public void testOrderDoesNotRemoveIfNotEnough() {\n        Order order = new Order(TALISKER, 51);\n        order.fill(warehouse);\n        assertFalse(order.isFilled());\n        assertEquals(50, warehouse.getInventory(TALISKER));\n    }\n}\n```\n\nxUnit测试遵循典型的四个测试阶段：初始化（setup）、执行（exercise）、验证（verify）、复原（teardown）。在上述测试用例中，初始化是通过`setUp`方法（初始化仓库）完成，部分则通过测试方法（初始化订单）完成。对`order.fill`的调用是执行阶段，它是我们要测试的目标行为。断言语句表示进入到验证阶段，它会检查执行的方法是否正确执行。本例子中，没有显式的复原阶段，因为Java垃圾回收器会隐式地完成清理。\n\n在初始化过程中，我们要把两类对象放在一起。 Order是我们正在测试的类，但是要使Order.fill正常工作，还需要一个Warehouse实例。在我们例子中，订单是重点测试的对象。面向测试的人喜欢使用被测对象（object-under-test）或被测系统（system-under-test）之类的术语来命名它。这两个词都很拗口，但由于被广为接受，所以我勉为其难地使用它。我将参照Meszaros，使用\"被测系统\"或简称SUT。\n\n因此，在这个测试中，我需要SUT（Order）和一个协作者（Warehouse）。需要Warehouse的原因有两个：一是要让测试正常执行（因为Order.fill调用仓库的方法），其二我要用它来做验证（因为Order.fill的会改变warehouse的状态）。随着对该话题的深入讨论，你会看到我们会对SUT和协作者做很多区分。（在本文的早期版本中，我将SUT称为\"主要对象\"（primary object），将协作者称为\"辅助对象\"（secondary object））\n\n这种测试风格使用了**状态验证**：这意味着我们可以通过在执行方法后检查SUT及其合作者的状态来确定被执行的方法是否正确工作。除了这种方式，我们接下来讨论的mock对象可以采用另一种验证方式。\n\n## 使用Mock对象进行测试\n\n现在，我们使用mock对象来完成相同的事情。下面代码我会使用jMock库定义的mocks。 jMock是一个Java编写mock对象库。当然，还有一些其他的模拟对象库，只是该库是mock技术的发明者编写的最新库，从它开始上手比较合适。\n\n```java\npublic class OrderInteractionTester extends MockObjectTestCase {\n    private static String TALISKER = \"Talisker\";\n    \n    public void testFillingRemovesInventoryIfInStock() {\n        //setup - data\n        Order order = new Order(TALISKER, 50);\n        Mock warehouseMock = new Mock(Warehouse.class);\n        \n        //setup - expectations\n        warehouseMock.expects(once()).method(\"hasInventory\")\n            .with(eq(TALISKER),eq(50))\n            .will(returnValue(true));\n        warehouseMock.expects(once()).method(\"remove\")\n            .with(eq(TALISKER), eq(50))\n            .after(\"hasInventory\");\n        \n        //exercise\n        order.fill((Warehouse) warehouseMock.proxy());\n        \n        //verify\n        warehouseMock.verify();\n        assertTrue(order.isFilled());\n    }\n    \n    public void testFillingDoesNotRemoveIfNotEnoughInStock() {\n        Order order = new Order(TALISKER, 51);\n        Mock warehouse = mock(Warehouse.class);\n        \n        warehouse.expects(once()).method(\"hasInventory\")\n            .withAnyArguments()\n            .will(returnValue(false));\n        \n        order.fill((Warehouse) warehouse.proxy());\n        \n        assertFalse(order.isFilled());\n    }\n}\n```\n\n先重点看`testFillingRemovesInventoryIfInStock`测试方法，因为我在另一个测试中采取了一些捷径。\n\n首先，初始化阶段非常不同。 一开始，它由两部分组成：数据和期望。数据部分初始化了测试所关注的对象，从某种意义上说，它类似于传统初始化阶段。区别在于所创建的对象。SUT是相同的 – Order。 但是，协作者不是仓库对象，而是一个mock warehouse – 从技术上讲是Mock类的实例。\n\n初始化的第二部分在mock对象上设置期望，该期望表示当执行SUT时应在mock对象上调用哪些方法。\n\n一旦所有期望设置都就绪，我就执行SUT，而后进行验证。验证包含两部分，一部分是对SUT的断言，这和之前一样。另一部分对mock对象的验证 – 检查它们是否如期被调用。\n\n这里的关键区别在于我们如何验证order在与warehouse的交互时做了正确的事情。在之前状态验证的例子中，我们是通过断言warehouse的状态来做到这一点。Mock则使用了**行为验证**，检查order是否正确调用了warehouse。在初始化阶段，我们给mock对象设置好期望并要求它在验证期间进行自我校验。因为如果只校验订单的话，我们其实无法确认该方法否成功更改了订单状态，此时断言便形同虚设。\n\n在第二个测试中，我做了一些不同的事情。首先，我没有使用`Mock`类的构造函数，而是使用`MockObjectTestCase`类中的`mock`方法来创建mock对象。这是jMock库提供的一种便捷方式，用了它之后不用再显式调用`verify`方法，采用了该方法创建的mock对象都会在测试结束时自动进行验证。我也可以在第一个测试中这么做，我之所以用显式验证的方式是为了更好地展示mock的工作方式。\n\n第二个测试的另一个不同点是，我通过使用`withAnyArguments `放宽了对期望的约束。我之所以能这么做，是因为前一个测试已经检查产品编号是否会传递到warehouse，因此第二个测试没必要重复了。如果以后更改了order的逻辑，就只会破坏一个测试，从而简化了测试维护的工作。实际上，我可以完全不用显式调用`withAnyArguments`方法，因为它是默认的。\n\n### 使用 EasyMock\n\n还有很多其他的mock对象库。我遇到的一个全面点的框架是EasyMock，它既有Java版本，也有.NET版本。EasyMock也支持行为验证，但是与jMock在写法上有一些差异，这点很值得深入探讨。同样还是我们熟悉的测试：\n\n```java\npublic class OrderEasyTester extends TestCase {\n    private static String TALISKER = \"Talisker\";\n    private MockControl warehouseControl;\n    private Warehouse warehouseMock;\n    \n    public void setUp() {\n        warehouseControl = MockControl.createControl(Warehouse.class);\n        warehouseMock = (Warehouse) warehouseControl.getMock();\n    }\n    \n    public void testFillingRemovesInventoryIfInStock() {\n        //setup - data\n        Order order = new Order(TALISKER, 50);\n        //setup - expectations\n        warehouseMock.hasInventory(TALISKER, 50);\n        warehouseControl.setReturnValue(true);\n        warehouseMock.remove(TALISKER, 50);\n        warehouseControl.replay();\n        //exercise\n        order.fill(warehouseMock);\n        //verify\n        warehouseControl.verify();\n        assertTrue(order.isFilled());\n    }\n    \n    public void testFillingDoesNotRemoveIfNotEnoughInStock() {\n        Order order = new Order(TALISKER, 51);\n        warehouseMock.hasInventory(TALISKER, 51);\n        warehouseControl.setReturnValue(false);\n        warehouseControl.replay();\n        order.fill((Warehouse) warehouseMock);\n        assertFalse(order.isFilled());\n        warehouseControl.verify();\n    }\n}\n```\n\nEasyMock使用记录/回放的方式来设置期望。它会为每个要mock的对象创建一个控件对象和mock对象。mock对象跟协作对象的接口一致，控件对象为你提供其他功能。 我们通过调用mock对象的方法，并将期望的参数传给该方法，以此来描述一个期望。如果需要返回值，可以调用控件对象。一旦完成所有期望的设置，你可以在控件对象上调用`replay`方法 – 此时，mock对象将完成记录并随时可以响应主要对象的调用。上述步骤完成后，我们就可以调用控件的`verify`方法来验证。\n\n第一眼看到记录/回放这个比喻时，大家可能都会感到很困惑，但很快就习惯了。它比 jMock的约束更有优势，因为你可以直接调用mock对象的方法，而不是用字符串来指定方法。这意味着你可以使用IDE的代码补全功能了。同时，任何方法名称的重构都会自动更新测试。劣势是它对你的限制更多。\n\njMock的开发人员正在开发新版本，新版本将用其他技术来实现mock方法的调用。\n\n## Mock和Stub的差异\n\n第一次引入mock对象时，很多人很容易将它与常见的stub搞混淆。渐渐地，人们似乎更了解这些差异（希望本文的早期版本起到了作用）。然而，要透彻理解mock的使用，理解mock和其他类型的测试替身（Test Double）就尤为重要。（\"替身\"？别担心，如果它对你来说很新，等再多读几段，你们就会成为朋友了。）\n\n按照上述代码示例的方式写测试，你一次只专注于软件的一个元素，这是\"单元测试\"的基本概念。 但问题是，要让一个单元正常工作，你通常需要其他单元 – 也就是例子中的warehouse对象。\n\n上述例子中存在两种测试风格，第一种使用真实的warehouse对象，第二种使用mock warehouse，它不是真实的warehouse对象。使用mock对象是在测试中不用使用真实仓库的一种方法，还有其他方式能做到这一点。\n\n探讨这个话题时会涉及各种各样的单词：stub、mock、fake、dummy，你可能很快迷失掉。本文中，我将沿用杰拉德·梅萨罗斯（Gerard Meszaros）书中的词汇。虽然不是每个人都这么用，但我认为他们是不错的词汇。由于是我自己的文章，我能决定选择使用哪些词。\n\nMeszaros使用的术语是**测试替身**（Test Double），任何出于测试目的而替换掉真实对象的场景都是对它的运用。该名称源于电影中的特技替身（Stunt Double）（使用这个名字的一个目的是为了避免与已存在的一些词产生歧义）。Meszaros定义了五种特殊的测试替身：\n\n+ **Dummy**对象会被构建和传递，但实际上不会被使用。 通常它们仅用于填充参数列表。\n+ **Fake**对象实际上一个等效的实现，只是实现方式更简单，它们往往不适合用于生产环境。（[InMemoryTestDatabase](https://martinfowler.com/bliki/InMemoryTestDatabase.html)是一个很好的例子）\n+ **Stubs**对测试指定的调用提供固定的返回值，它们不会响应测试没有涉及的任何其他调用。\n+ **Spy**也是stubs，只是它们还会根据调用方式记录一些额外信息。比如，电子邮件服务，它会记录发送了多少消息。\n+ **Mocks** 会预先设定好期望，这些期望代表它们希望接收到特定规范的调用。它们会在验证过程中进行校验，从而确保接收到所有如期的调用，否则会抛出异常。\n\n在这些类型的替身中，只有mock做的是行为验证。其他替身也可以这么做，但它通常使用的是状态验证。在执行阶段，mock的行为实际上跟其他替身一样，都是让SUT相信它正在与其真正的协作者交互 – 只是mock对象在初始化和验证阶段有所不同。\n\n为了进一步探索测试替身，我们需要对上述例子做一些扩展。很多人只在真实对象难以使用的时候才使用测试替身。一种更常见的场景是：如果需求发生了改变，比如Order没有被成功填充时要发送一封电子邮件。而我们又不想在测试时给客户发送电子邮件。因此，我们创建一个可以操控的电子邮件系统的测试替身。\n\n这里我们可以看到Mock和Stub的区别。如果我们要测试邮件行为，可以编写一个简单的stub，例如：\n\n```java\npublic interface MailService {\n    public void send (Message msg);\n}\n\n\npublic class MailServiceStub implements MailService {\n    private List\u003cMessage\u003e messages = new ArrayList\u003cMessage\u003e();\n    \n    public void send (Message msg) {\n        messages.add(msg);\n    }\n    \n    public int numberSent() {\n        return messages.size();\n    }\n}\n```\n\n我们可以在stub上这样做状态验证：\n\n```java\nclass OrderStateTester...{\n    public void testOrderSendsMailIfUnfilled() {\n        Order order = new Order(TALISKER, 51);\n        MailServiceStub mailer = new MailServiceStub();\n        order.setMailer(mailer);\n        order.fill(warehouse);\n        assertEquals(1, mailer.numberSent());\n  }\n}\n```\n\n当然这个测试很简单 – 只发送了一条消息。虽然我们没有测试它是否会发送正确的内容，或发送给正确的人，但是它确实可以说明发邮件这件事情发生了。\n\n如果使用mock对象，方式就完全不同了。\n\n```java\nclass OrderInteractionTester...{\n    \n    public void testOrderSendsMailIfUnfilled() {\n        Order order = new Order(TALISKER, 51);\n        Mock warehouse = mock(Warehouse.class);\n        Mock mailer = mock(MailService.class);\n        order.setMailer((MailService) mailer.proxy());\n        mailer.expects(once()).method(\"send\");\n        warehouse.expects(once()).method(\"hasInventory\")\n            .withAnyArguments()\n            .will(returnValue(false));\n        \n        order.fill((Warehouse) warehouse.proxy());\n   }\n}\n```\n\n这两种情况我使用的都是测试替身而不是真实邮件服务。区别在于stub做的是状态验证，而mock做的是行为验证。\n\n为了在stub上使用状态验证，我需要在stub上增加一些额外的辅助方法。结果是，stub实现MailService接口，同时添加一些额外的测试方法。\n\nMock对象只能做行为验证，stub则可以采用任何一种方式。Meszaros将使用了行为验证的stub定义为测试间谍（Spy）。它们的区别在于测试替身运行和验证的具体方式，这个就留给读者去探索了。\n\n## 古典派（Classical）和模拟派（Mockist）测试\n\n现在我们来探讨第二个差异点：古典派TDD和模拟派TDD的差异。这两者之间最大的差别是何时使用mock对象（或其他测试替身）。\n\n**古典派TDD**风格是在尽可能使用真实的对象，只有在真实对象很难使用时才使用测试替身。因此，古典的TDDer将使用真实的warehouse和邮件服务的替身。至于测试替身的类型就没那么重要了。\n\n但是，**模拟派TDD**实践者始终会对任何协作对象都使用mock对象。所以，他们会使用mock对象来代替真实的warehouse和邮件服务。\n\n尽管各种模拟框架都是以模拟派的思路设计的，不过很多古典派也会用它们来创建测试替身。\n\n模拟派风格的一个重要分支是行为驱动开发（BDD）。BDD最初是由我的同事Daniel Terhorst-North发明的，目的是帮助人们理解TDD是如何帮助开发人员提升代码设计的，BDD通过把测试名称改为具体行为的名字，驱使你去思考一个对象到底需要做什么事情，从而理解TDD在提升设计方面的作用。BDD采取了模拟派的方式，但它在此基础上进行了扩展，包括命名方面和集成分析方面，我在这里不再赘述。BDD与本文唯一相关的点在于，BDD是TDD使用模拟派测试方式的一个变体。我会在文末留下它的参考链接，你可以通过链接获得更多信息。\n\n有时你也会看到用\"底特律\"风格来表示\"古典派\"风格，\"伦敦\"风格表示\"模拟派\"风格。这暗示了这样一个事实，即XP最初是由底特律的C3项目开发的，而模拟派的风格是由伦敦的早期XP的采用者开发的。我还应该提到过，很多模拟派TDDer不喜欢该术语，甚至不喜欢任何暗示了古典派测试和模拟派测试之间有不同风格的术语。他们认为这两种风格之间没有什么实质性的区别。\n\n## 不同方案之间的选择\n\n在本文中，我提到两个不同点：状态验证和行为验证以及古典派TDD和模拟派TDD。那在它们之间做选择时要牢记哪些点呢？我将从状态验证和行为验证开始谈。\n\n首先要考虑的是上下文。我们是在考虑简单的协作（例如订单和仓库），还是复杂的协作（例如订单和邮件服务）？\n\n如果是一个简单的协作，选择就很简单了。如果我是古典派TDDer，就不会使用mock、stub或任何测试替身。而是使用一个真实的对象并且做状态验证。如果我是模拟派TDDer，则会使用mock对象和行为验证。这个没什么好犹豫的。\n\n如果这是一个复杂的协作，如果我是模拟派，也不用犹豫 – 使用mock和行为验证。如果我是古典派，那么我的确需要做个选择，但是使用哪个并不重要。通常，古典派会根据实际情况选择最简单的方式。\n\n因此，正如我们所看到的，状态验证与行为验证的选择在大部分情况下都不难决定。真正的问题在于古典派TDDer与模拟派TDDer之间的区别。事实证明，状态验证和行为验证的特点确实会影响到最后的决策，这也是我投入最多精力去研究的地方。\n\n但在此之前，我先讲一个边界情况。你有时会碰到一些很难验证状态的情况，即使它们并不是复杂的协作，比如说缓存。缓存难点是，你无法从其状态中判断出缓存是命中还是未命中 – 在这种情况下，忠实的古典派TDDer也会明智地选择行为验证。我相信两种方式都会存在例外的情况。\n\n当研究古典派/模拟派的这两种选择后，我们需要考虑很多因素，我将它们粗略地分成了几组。\n\n### TDD的姿势（Driving TDD）\n\nMock对象出自XP社区，XP最重要的特性之一是它对测试驱动开发的强调 – 系统的设计的演进是通过编写测试来驱动的迭代完成。\n\n因此，模拟派特别强调模拟测试对设计的影响也就不足为奇了。他们特别提倡一种称为需求驱动开发的风格。使用这种风格，你在开始着手开发用户故事（[user story](https://martinfowler.com/bliki/UserStory.html)）前，你会首先从你要开发的系统的外围开始写测试，把接口对象当做SUT。通过思考对协作者的期望来探索SUT和它依赖对象之间的交互，这样能有效地设计SUT外围系统的接口。\n\n一旦第一个测试跑起来，对mock对象的期望就为下一步提供了指导规范，这为测试提供了起点。你将每个期望转换为对协作者的测试，一次只选取一个 SUT，并不断的重复这个过程。这种风格也称为\"由外而内\"，这是一个非常形象的名称。它在分层系统中可以良好运用。首先，你通过mock掉UI的下层模块来开发UI。然后，你为较低的层编写测试，并逐步遍历每一层。这种做法很结构化且可控，很多人还觉得它能够帮助新手更好的理解和实践OO和TDD。\n\n古典派TDD的方式有点不一样。他们也可以像那样一步一步前进，但使用stub而不是mock。为了完成同样的事情，可以对协作者的响应进行硬编码，来让SUT正常工作。然后，你可以使用正确的代码替换硬编码的响应。\n\n但是古典派TDD也可以做其他事情。常见的风格是由中间向两边。使用这种风格，你要开发一个业务功能，首先要明确哪些领域模型能让这个功能生效。然后编写领域模型，并把需要的行为添加进去，一旦它们起作用，你就可以将UI层放上去了。这样做你可能永远不需要伪造任何东西。很多人喜欢这种方式，因为它首要关注领域模型，可以防止领域逻辑泄漏到UI中。\n\n我还要强调的是，无论是模拟派和还是古典派，一次都只做一个故事。有一种学院派思想提倡逐层构建应用程序，而不是在完成另一层之前就开始下一层。古典派和模拟派都具有敏捷的背景，并且更喜欢细粒度的迭代。因此，他们是一个特性一个特性地完成工作，而不是一层接一层。\n\n### Fixture初始化（Fixture Setup）\n\n使用古典派TDD方式，你不仅需要创建SUT，还需要创建SUT的所有协作者。虽然示例中只有2个对象，但实际测试通常涉及大量的辅助对象。通常，每次测试运行时都会创建并清理这些对象。\n\n然而，模拟派测试只需要创建SUT，然后mock掉它的直接协作者。这样可以省掉一些在构建Fixture的过程中涉及的其他工作（至少在理论上是这样。我已经遇到过非常复杂的Fixture过程，但这可能是工具使用有误。）\n\n实际上，古典派测试人员倾向于尽可能多地重用复杂的Fixture。最简单的方法是将Fixture初始化代码放到xUnit的`setup`方法中。如果多个测试类需要使用更复杂的Fixture，你可以单独创建特殊的Fixture生成类。我通常根据早期ThoughtWorks XP项目中使用的命名约定将这些命名为\"对象母亲（[Object Mother](https://martinfowler.com/bliki/ObjectMother.html)）\"。在大型古典派测试中使用mothers是必不可少的，但是mothers是需要维护的额外代码，对mothers的任何更改都可能在测试中产生明显的连锁反应。初始化fixture也可能会降低性能，尽管我没有听说在正确使用的情况下会遇到严重问题。大多数Fixture对象的创建成本低廉，通常不会成倍增加。\n\n基于上述原因，我听说两种派别都在指责彼此要做太多工作。模拟派说创建fixture太费力了。但古典派说fixture是能够重用的，而你们每次测试时都创建mock烦死人。\n\n### 测试隔离\n\n当使用模拟测试时，如果一个错误被引入系统，通常只会导致包含了该错误的SUT的测试失败。但是，使用古典派的方法时，依赖了这个错误对象的测试都有可能失败。因此，一个被高度依赖的对象如果出问题了，整个体统大量的测试都会失败。\n\n模拟派认为这是一个很大问题； 要找到错误的根源并修复它，需要大量的调试。 但是，古典派并不认为这是问题的源头。通常，查看哪些测试失败通常很容易找出问题的根源，并且开发人员可以判断出其他故障是由根故障引起的。此外，如果你定期进行测试（如你应做的那样），那么你就会知道破坏是由你上次编辑的内容引起的，因此查找故障并不难。\n\n这里一个重要的因素是测试粒度。由于古典派测试会行执行多个真实对象，因此你经常会发现一个测试是一组对象的主要测试，而不仅仅是一个。如果对象组跨越许多对象，就很难找到错误的真正源头。这是测试的粒度太粗导致的。\n\n模拟派测试可能不会有这个困扰，因为他们会模拟掉SUT之外的所有对象，这清楚地表明协作者需要更细粒度的测试。也就是说，使用过于粗糙的测试不一定是古典派测试作为一种技术的失败，而是未能正确使用古典派测试的失败。一个好的经验法则是确保你为每个类分离细粒度的测试。虽然对象组有时是合理的，但应将对象组限制为只有很少的对象 – 最多不超过六个。另外，如果由于过于粗粒度的测试而引发调试问题，则应该以测试驱动的方式进行调试，并在进行过程中创建更细粒度的测试。\n\n从本质上讲，古典派风格的xunit测试不仅仅是单元测试，而且是小型集成测试。因此，很多人认同这一点：如果一个对象的测试遗漏了一些错误，客户端测试可能会捕获到它们，特别是在类之间发生深度交互的地方。模拟派测试就不具备这个能力了。此外，模拟派测试还可能模拟了错误的预期，虽然单元测试通过了，但却掩盖了错误，这也会带来风险。\n\n最后，我还要强调一点，无论你使用哪种测试方式，都必须结合可以贯穿整个系统功能的粗粒度验收测试。我经常遇到一些项目因为迟迟没有使用验收测试而感到后悔。\n\n### 将测试与实现耦合\n\n当你编写模拟派风格的测试时，你正在测试SUT的对外调用，以确保它与供应商的交互是正确的。古典派测试仅关心最终状态 – 而不是状态的变化过程。因此，模拟派测试与方法的实现耦合度更高。改变对协作者的调用会破坏测试。\n\n这种耦会引发了两个问题。最重要一个是对测试驱动开发的影响。使用模拟派风格编写测试可以使你考虑行为的实现 – 实际上，模拟测试者将其视为一种优势。但是，古典派认为很重要的一点是：应该只考虑外部接口，具体实现可以留到你写完测试之后再考虑。\n\n与实现的耦合也干扰了重构，因为实现的更改比古典派测试更有可能破坏测试。\n\n同时，模拟工具的特性会使情况变得更糟。模拟工具通常会指定非常具体的方法调用和参数匹配，即便它们与这些特定的测试无关。jMock工具箱的目标之一是在期望的规范方面更加灵活，从而在一些无关紧要的地方变得宽松，代价是使用了字符串，让重构更麻烦。\n\n### 设计风格\n\n这些测试风格对我而言最有意思的地方之一是它们如何影响设计决策。当我跟两种类型的开发人员交谈时，我已经意识到这两种风格的侧重点不同，但我觉得我只是略懂一二。\n\n我已经提过他们在处理分层上的区别。模拟派支持\"由外而内\"的方法，而古典派更喜欢领域模型的由内而外方式。\n\n在更小的层面上，我注意到模拟派测试者不喜欢有返回值的方法，更喜欢作用在收集对象上的方法。 举个例子，比如你想要从一组对象中收集信息来创建一个字符串报告。一种常见的方法是让`reporting`方法调用各种对象上的字符串返回方法，并将结果字符串组装到一个临时变量中。模拟派测试者会更想要传一个string buffer到各种对象中，然后让它们把不同的字符串加到这个buffer中 – 用string buffer来收集参数。\n\n模拟派测试人员会更多谈论到避免\"火车残骸\"的问题 – getThis().getThat().getTheOther()风格的调用方法链。避免方法链可以说是遵循迪米特法则。虽然过长方法链是一种坏味道，但充斥着代理转发方法的中间对象也是一种坏味道。
