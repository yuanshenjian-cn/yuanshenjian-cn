Auto Mode |\n| 7 | 扩展架构全景 | Skills、Sub-agents、Agent Teams、Hooks、MCP、Plugins 选型 |\n| 8 | 高阶自动化实战 | Chrome 调试、Channels、CI/CD、跨端协作蓝图 |\n\n**阅读建议**：\n\n- **赶时间**：直接跳到第 2 篇开始上手，遇到问题再回来翻\n- **系统学习**：按顺序 1→8 依次阅读\n- **有 AI 编程经验**：1→4→5→7 掌握差异化能力\n- **DevOps/自动化爱好者**：1→6→7→8 聚焦自动化\n\n## 小结\n\n从 OpenCode 到 Claude Code 的迁移，本质上是从一个\"开源灵活、模型自由\"的终端工具，切换到一个\"深度集成、跨端协作\"的 AI 编码平台。\n\n你需要调整的不只是配置文件，更是**心智模型**：\n\n1. Claude Code 不只是一个 CLI，它是一个跨五种入口的平台\n2. 扩展能力从 OpenCode 的三层（AGENTS.md + MCP + Agent）变成了七层（CLAUDE.md + Rules + Skills + Sub-agents + Hooks + MCP + Plugins）\n3. 跨端协作（Remote Control、Channels、Dispatch）是 Claude Code 独有的维度\n4. Hooks 和 Skills 是迁移后最大的能力增量\n\n下一篇，我们将正式开始：安装 Claude Code，登录认证，选择最适合你的入口，然后跑通第一个真实任务。\n\n\u003e 📖 **系列导航**\n\u003e\n\u003e - **第一篇：从 OpenCode 切到 Claude Code**（本文）\n\u003e - [第二篇：快速上手](/articles/2026/04/02/claude-code-getting-started)\n\u003e - [第三篇：日常工作流](/articles/2026/04/03/claude-code-common-workflows)\n\u003e - [第四篇：交互模式与内置命令](/articles/2026/04/04/claude-code-interactive-mode-and-built-in-commands)\n\u003e - [第五篇：CLAUDE.md、Rules 与 Auto Memory](/articles/2026/04/05/claude-code-memory-and-claude-md)\n\u003e - [第六篇：设置、权限与 Auto Mode](/articles/2026/04/06/claude-code-settings-and-permissions)\n\u003e - [第七篇：扩展架构全景](/articles/2026/04/07/claude-code-extension-model-overview)\n\u003e - [第八篇：高阶自动化实战](/articles/2026/04/08/claude-code-advanced-automation-with-mcp-hooks-and-agents)\n"])</script><script>self.__next_f.push([1,"23:T51eb,"])</script><script>self.__next_f.push([1,"\n## Atlas vs Sisyphus：OhMyOpenCode 双 orchestrator 架构解析\n\n在 OhMyOpenCode（OmO）插件中，Atlas 和 Sisyphus 是两个核心 orchestrator 代理，它们共同构成了多代理协调系统的双核引擎。理解它们的工作原理、设计哲学和协作关系，对于掌握 OmO 的高级用法至关重要。\n\n### 角色定位：指挥家 vs 高级工程师\n\n#### Sisyphus ：全能主协调器\n\nSisyphus 是 OmO 的默认主代理，定位为\"像 senior engineer 一样工作的 AI 开发者\"。它的核心职责是：\n\n- **意图解析**：通过 IntentGate 分析用户的真实意图\n- **动态规划**：根据任务复杂度创建 todo 列表\n- **智能委派**：决定什么时候自己执行，什么时候调用 subagent\n- **并行执行**：同时启动多个 background task 加速工作\n\nSisyphus 拥有广泛的工具权限——它可以读写文件、执行命令、通过 `task()` 调用其他代理。但出于安全考虑，**`call_omo_agent` 工具被明确禁止**，Sisyphus 只能通过 `task()` 进行任务委派，不能直接调用特定 agent。\n\n**权限对比：Sisyphus vs Sisyphus-Junior**\n\n| Agent                                | `task()` | `call_omo_agent` | 使用场景               |\n| ------------------------------------ | ---------- | ------------------ | ---------------------- |\n| **Sisyphus** (主协调器)        | ✅ 允许    | ❌**禁止**   | 动态规划、灵活委派     |\n| **Sisyphus-Junior** (子执行器) | ❌ 禁止    | ✅**允许**   | 执行具体任务、自主探索 |\n\n这种设计形成**权限互补**：协调器通过 `task()` 灵活委派，执行者通过 `call_omo_agent` 自主获取信息。源码依据：\n\n**Sisyphus 权限配置**（`src/plugin-handlers/tool-config-handler`）：\n\n```typescript\nconst sisyphus = agentByKey(params.agentResult, \"sisyphus\");\nif (sisyphus) {\n  sisyphus.permission = {\n    ...sisyphus.permission,\n    call_omo_agent: \"deny\",  // ❌ 明确禁止\n    task: \"allow\",           // ✅ 允许使用 task 委派\n    \"task_*\": \"allow\",\n    teammate: \"allow\",\n  };\n}\n```\n\n**Sisyphus-Junior 权限配置**（`src/agents/sisyphus-junior/agent,97`）：\n\n```typescript\n// Core tools that Sisyphus-Junior must NEVER have access to\n// Note: call_omo_agent is ALLOWED so subagents can spawn explore/librarian\nconst BLOCKED_TOOLS = [\"task\"]  // ❌ 禁止 task\n// ...\nmerged.call_omo_agent = \"allow\"  // ✅ 显式允许 call_omo_agent\n```\n\n\u003e **重要限制**：`call_omo_agent` 工具**仅允许调用特定类型的 agent**：`explore`、`librarian`、`oracle`、`hephaestus`、`metis`、`momus`、`multimodal-looker`（`src/tools/call-omo-agent/constants`）。其中 `explore` 和 `librarian` 用于代码库探索和文档查询，其他代理用于特定专业任务。\n\n#### Atlas：纯协调指挥家\n\nAtlas 的设计理念截然相反——**它不直接写代码**，而是专注于协调和验证。Atlas 的定位是\"指挥家，不是乐手；将军，不是士兵\"。\n\nAtlas 的**委派工具在 agent 配置层被限制**（`src/agents/atlas/agent`）：\n\n```typescript\n// Atlas agent 配置明确禁止 task 和 call_omo_agent 工具\nconst restrictions = createAgentToolRestrictions([\n    \"task\",\n    \"call_omo_agent\",\n])\n```\n\n然而，Atlas 的**系统提示**（`src/agents/atlas/default`）教导它使用 `task()` 进行委派：\n\n```typescript\n// Atlas prompt 明确教导使用 task()\nComplete ALL tasks in a work plan via `task()` until fully done.\n\nUse `task()` with EITHER category OR agent:\ntask(\n  category=\"[category-name]\",\n  load_skills=[\"skill-1\", \"skill-2\"],\n  run_in_background=false,\n  prompt=\"...\"\n)\n```\n\nAtlas 在 agent 配置层被限制 `task` 和 `call_omo_agent` 工具权限，但在**插件配置处理阶段**通过 `tool-config-handler.ts` 重新授予 `task` 权限（仍禁止 `call_omo_agent`）。这确保 Atlas 可以使用 `task()` 进行任务委派，但不能直接调用特定的 explore/librarian 等 agent。\n\n**权限重授机制源码**（`src/plugin-handlers/tool-config-handler`）：\n\n```typescript\nconst atlas = agentByKey(params.agentResult, \"atlas\");\nif (atlas) {\n  atlas.permission = {\n    ...atlas.permission,\n    task: \"allow\",              // ✅ 重新授予 task 权限\n    call_omo_agent: \"deny\",     // ❌ 保持禁止 call_omo_agent\n    \"task_*\": \"allow\",\n    teammate: \"allow\",\n  };\n}\n```\n\n**关键区别**：\n\n- **Atlas**：主要使用 `task()` 进行**category-based 委派**（推荐），但也支持 `subagent_type` 指定特定代理（如 `oracle`）\n- **Sisyphus**：同样只能使用 `task()`，但它是**主协调器**，拥有更广泛的任务规划能力\n- **Sisyphus-Junior**：被**禁止**使用 `task()`，但**允许**使用 `call_omo_agent()` 直接调用特定 agent\n\nAtlas 的核心工作是：\n\n- 读取预定义的计划（Plan）\n- 分析任务依赖关系，制定并行化策略\n- 委派给 **Sisyphus-Junior**（category-based subagent）执行具体任务\n- **严格验证**结果（读代码、跑测试、检查 LSP）\n- 维护跨会话状态（Boulder State）\n\n## 工作机制对比\n\n### Sisyphus 的工作流程\n\n```typescript\n// Phase 0: Intent Gate - 解析用户真实意图\n\"I detect [implementation] intent — user wants to add auth. \n My approach: [explore → plan → delegate].\"\n\n// Phase 1: 创建 Todo 列表\ntodowrite([\n  { content: \"分析现有代码结构\", status: \"in_progress\" },\n  { content: \"实现 JWT middleware\", status: \"pending\" },\n  { content: \"添加登录路由\", status: \"pending\" }\n])\n\n// Phase 2: 并行探索（Background Tasks）\ntask(subagent_type=\"explore\", run_in_background=true, ...)\ntask(subagent_type=\"librarian\", run_in_background=true, ...)\n\n// Phase 3: 执行或委派\n// - 简单任务：自己直接执行\n// - 复杂任务：委派给 category-based subagent\ntask(category=\"quick\", run_in_background=false, ...)\n\n// Phase 4: 验证\nlsp_diagnostics()\nbash(\"bun test\")\n```\n\n### Atlas 的工作流程\n\n```typescript\n// Step 0: 注册 Boulder 跟踪\ntodowrite([{ id: \"orchestrate-plan\", content: \"Complete ALL tasks\", status: \"in_progress\" }])\n\n// Step 1: 分析 Plan 文件\nRead(\".sisyphus/plans/feature-xyz.md\")\n// 解析出：总任务数、可并行组、依赖链\n\n// Step 2: 初始化 Notepad 系统\nmkdir -p .sisyphus/notepads/feature-xyz/\n// learnings.md, decisions.md, issues.md, problems.md\n\n// Step 3: 并行委派（关键差异）\n// Atlas 通过 task() 同时启动多个 Sisyphus-Junior subagent 执行具体任务\n// 虽然 Atlas 被配置为限制使用 task 工具，但在实际工作流程中通过系统协调机制调用\n// 注意：每个 task() 使用 run_in_background=false 同步等待，但在单个消息中可并行发起多个\ntask(category=\"quick\", load_skills=[], run_in_background=false, prompt=\"Task 1...\")\ntask(category=\"quick\", load_skills=[], run_in_background=false, prompt=\"Task 2...\")\ntask(category=\"deep\", load_skills=[], run_in_background=false, prompt=\"Task 3...\")\n\n// Step 4: 验证每一个结果\n// - 读每一个修改的文件\n// - 运行 LSP diagnostics\n// - 执行测试\n// - 检查 boulder state\n\n// Step 5: Loop Until Done\n// 重复直到所有任务完成\n```\n\n## 核心差异详解\n\n| 维度               | Sisyphus                    | Atlas                                      |\n| ------------------ | --------------------------- | ------------------------------------------ |\n| **代码权限** | 完整（读写文件、执行命令）  | **零**（只能委派）                   |\n| **适用场景** | 日常开发、探索性任务        | 复杂多步骤计划（Ralph Loop）               |\n| **会话范围** | 单会话 + Background Tasks   | 多会话协调（Boulder Session Tree）         |\n| **状态管理** | 当前会话的 todo API         | Boulder State JSON + Notepad               |\n| **并行策略** | 探索类任务后台并行          | 执行类任务前台并行（多 subagent）          |\n| **验证职责** | 自我验证                    | **强制 QA Gate**（4-Phase Protocol） |\n| **模型要求** | claude-opus-4-6 / kimi-k2.5 | kimi-k2.5 / claude-sonnet-4-6              |\n\n**注**：以上为主模型配置。两者都有备用模型链（fallback chain）以确保高可用性：\n\n- Sisyphus: claude-opus-4-6 → kimi-k2.5-free → glm-5 → big-pickle\n- Atlas: kimi-k2.5-free → claude-sonnet-4-6 → gpt-5.2\n\n**Fallback 链源码**（`src/shared/model-requirements`）：\n\n```typescript\nexport const AGENT_MODEL_REQUIREMENTS: Record\u003cstring, ModelRequirement\u003e = {\n  sisyphus: {\n    fallbackChain: [\n      { providers: [\"anthropic\", \"github-copilot\", \"opencode\"], model: \"claude-opus-4-6\", variant: \"max\" },\n      { providers: [\"opencode\"], model: \"kimi-k2.5-free\" },\n      { providers: [\"zai-coding-plan\", \"opencode\"], model: \"glm-5\" },\n      { providers: [\"opencode\"], model: \"big-pickle\" },\n    ],\n  },\n  atlas: {\n    fallbackChain: [\n      { providers: [\"opencode\"], model: \"kimi-k2.5-free\" },\n      { providers: [\"anthropic\", \"github-copilot\", \"opencode\"], model: \"claude-sonnet-4-6\", variant: \"extended\" },\n      { providers: [\"openai\", \"github-copilot\", \"opencode\"], model: \"gpt-5.2\" },\n    ],\n  },\n}\n```\n\n### 代码修改权限\n\n这是两者最根本的区别。Atlas 的 Prompt 中反复强调：\n\n```markdown\n**YOU DO**:\n- Read files (for context, verification)\n- Run commands (for verification)\n- Use lsp_diagnostics, grep, glob\n- Manage todos\n- Coordinate and verify\n\n**YOU DELEGATE**:\n- All code writing/editing  ← 绝对禁止\n- All bug fixes\n- All test creation\n- All documentation\n- All git operations\n\n**NEVER**:\n- Write/edit code yourself - always delegate\n```\n\n这种设计的哲学是：**最贵的模型应该只做 orchestration**，代码实现交给便宜些的 specialist models。\n\n### 并行执行模式\n\n**Sisyphus 的并行**：\n\n```typescript\n// 探索类任务：后台并行（不阻塞）\ntask(subagent_type=\"explore\", run_in_background=true)\ntask(subagent_type=\"librarian\", run_in_background=true)\n// Sisyphus 继续工作，稍后收集结果\n\n// 执行类任务：串行或同步等待\ntask(category=\"quick\", run_in_background=false)  // 阻塞等待\n```\n\n**Atlas 的并行**：\n\n```typescript\n// Atlas 通过 task() 委派给 Sisyphus-Junior 执行具体任务\n// 在同一个消息中同时发起多个 task() 调用，实现 subagent 级别的并行\n// 每个 task() 使用 run_in_background=false 同步等待结果\ntask(category=\"quick\", load_skills=[], run_in_background=false, prompt=\"Task A...\")\ntask(category=\"quick\", load_skills=[], run_in_background=false, prompt=\"Task B...\")\ntask(category=\"quick\", load_skills=[], run_in_background=false, prompt=\"Task C...\")\n// Atlas 同时启动3个 Sisyphus-Junior subagent，各自独立执行\n```\n\n\u003e 注意：Atlas 使用 `task(category=\"...\")` 委派给 Sisyphus-Junior。虽然 Atlas 的 agent 配置限制了 task 工具，但在实际 orchestration 流程中通过系统协调层调用。\n\n### 并行机制的关键区别\n\n两种并行模式有本质差异：\n\n| 特性               | Sisyphus 后台并行                            | Atlas 消息级并行            |\n| ------------------ | -------------------------------------------- | --------------------------- |\n| **参数**     | `run_in_background=true`                   | `run_in_background=false` |\n| **阻塞性**   | 非阻塞，立即返回 task_id                     | 阻塞，等待任务完成          |\n| **结果收集** | 使用 `background_output(task_id)` 稍后收集 | 直接在响应中返回结果        |\n| **适用场景** | 探索类任务（explore/librarian）              | 执行类任务（需要等待结果）  |\n| **并发控制** | BackgroundManager 管理（默认5并发）          | 消息级并发，受限于响应时间  |\n\n**关键理解**：\n\n- **Sisyphus** 使用 `run_in_background=true` 启动真正的异步后台任务，适合耗时较长的探索任务\n- **Atlas** 在单个消息中同时发起多个 `task()` 调用（每个 `run_in_background=false`），实现 subagent 级别的并行执行，适合需要立即获得结果的任务\n\n### 状态持久化\n\n**Sisyphus**：依赖当前会话的 todo API\n\n```typescript\nconst response = await ctx.client.session.todo({ path: { id: sessionID } })\n```\n\n**Atlas**：使用 Boulder State 持久化到文件\n\n```json\n// .sisyphus/boulder.json\n{\n  \"active_plan\": \"/path/to/project/.sisyphus/plans/feature-xyz.md\",\n  \"started_at\": \"2026-02-23T10:30:00.000Z\",\n  \"session_ids\": [\n    \"ses_abc123\",\n    \"ses_def456\",\n    \"ses_ghi789\"\n  ],\n  \"plan_name\": \"feature-xyz\",\n  \"agent\": \"atlas\"\n}\n```\n\n**Boulder State 完整机制**（`src/hooks/atlas/event-handler.ts`）：\n\nBoulder continuation 的决策流程包含多个检查点：\n\n```\nsession.idle event\n  → 是否属于 boulder session_ids？\n  → 是否有 abort error？（跳过）\n  → 失败次数 \u003c 2？（防止无限循环）\n  → 是否有运行中的后台任务？（等待）\n  → Agent 是否匹配 boulder 配置？\n  → Plan 是否未完成？\n  → 5秒冷却期是否已过？\n  → 注入 continuation prompt\n```\n\n**关键常量**：\n\n- `CONTINUATION_COOLDOWN_MS = 5000`（5秒冷却期）\n- `MAX_CONSECUTIVE_FAILURES = 2`（失败2次后暂停）\n\n**Notepad 系统**（`.sisyphus/notepads/{plan-name}/`）：\n\nNotepad 用于在 subagent 间传递累积知识，由 Atlas 创建并管理：\n\n```\n.sisyphus/notepads/{plan-name}/\n├── learnings.md    # 代码约定、模式发现\n├── decisions.md    # 架构决策记录\n├── issues.md       # 已知问题、陷阱\n└── problems.md     # 未解决的阻塞\n```\n\n**工作流程**：\n\n1. **创建**：Atlas 在 Step 2 初始化 Notepad 目录\n2. **读取**：每个 subagent 在开始前读取相关 Notepad 文件\n3. **追加**：subagent 完成后追加发现（使用 `Write` 追加，绝不覆盖）\n4. **继承**：后续 subagent 获得累积的知识上下文\n\n这种设计让 Atlas 能够：\n\n- 跨会话跟踪进度\n- 在子代理失败后恢复（session resume）\n- 通过 Notepad 在 subagent 间传递知识\n\n## Hook 层的协作机制\n\n在 OhMyOpenCode 的 Hook 系统中，Atlas 和 Sisyphus 的 continuation 机制是分开的：\n\n### TodoContinuationEnforcer（Sisyphus）\n\n```typescript\n// 处理除 prometheus/compaction 外的所有会话\nDEFAULT_SKIP_AGENTS = [\"prometheus\", \"compaction\"]\n\nsession.idle\n  → 是否主会话？\n  → 仍有未完成 todos？\n  → 2秒倒计时 → 注入 CONTINUATION_PROMPT\n```\n\n### Atlas Hook（Boulder Orchestrator）\n\n```typescript\n// 处理 boulder/ralph/background 会话\nsession.idle\n  → 是否属于 boulder session_ids？\n  → 或是否 background task 会话？\n  → Agent 是否匹配 boulder 配置？\n  → Plan 是否未完成？\n  → 5秒冷却 → 注入 continuation prompt\n```\n\n两者都监听 `session.idle` 事件，但通过不同的条件判断来避免冲突。\n\n## 实际场景对比\n\n### 添加一个 API 端点（Sisyphus）\n\n```bash\n用户：帮我加一个用户注册的 API 端点\n```\n\n**Sisyphus 的处理**：\n\n1. Intent Gate：识别为\"实现\"意图\n2. 创建 todos：分析代码 → 实现 handler → 添加路由 → 写测试\n3. 可能启动 explore 找现有模式（background）\n4. 自己实现或委派给 quick category\n5. 验证：LSP + 测试\n\n### Ralph Loop 全栈功能开发（Atlas）\n\n```bash\n用户：/ralph-loop \"实现完整的 OAuth2 认证系统，包括前端登录页、后端 API、数据库模型\"\n```\n\n**Atlas 的处理**：\n\n1. Prometheus 生成 Plan（10个任务）\n2. Atlas 启动，创建 Boulder State\n3. **并行委派**：\n\n   - Task 1-3：Sisyphus-Junior (quick) 创建数据库模型、API 路由、中间件\n   - Task 4-6：Sisyphus-Junior (visual-engineering) 创建登录页面组件\n   - Task 7：Sisyphus-Junior (deep) 实现 token 刷新逻辑\n4. **4-Phase 验证**每个结果：\n\n   Atlas 的 4-Phase QA Protocol 确保每个委派任务都得到严格验证：\n\n   - **Phase 1: Automated Verification**\n\n     - `lsp_diagnostics()` → ZERO errors at project level\n     - `bun run build` or `bun run typecheck` → exit code 0\n     - `bun test` → ALL tests pass\n   - **Phase 2: Manual Code Review**（NON-NEGOTIABLE）\n\n     - `Read` EVERY file the subagent created or modified\n     - Check line by line: logic correctness, stubs/TODOs, edge cases\n     - Cross-reference: subagent's claims vs actual code\n   - **Phase 3: Hands-On QA**（if applicable）\n\n     - Frontend/UI: Browser testing via `/playwright`\n     - TUI/CLI: Interactive testing via `interactive_bash`\n     - API/Backend: Real requests via `curl`\n   - **Phase 4: Boulder State Check**\n\n     - `Read(\".sisyphus/tasks/{plan-name}.yaml\")`\n     - Count remaining `- [ ]` tasks\n     - Confirm current progress\n5. 失败的任务使用 session_id 恢复\n6. Loop until all tasks complete\n\n## 如何选择？\n\n**使用 Sisyphus（默认）**：\n\n- 日常开发任务\n- 需要探索和灵活性的工作\n- 不确定如何分解的开放式任务\n- 不需要跨会话持久化的短期任务\n\n**使用 Atlas（Ralph Loop / Plan）**：\n\n- 复杂多步骤项目\n- 需要严格验证的关键功能\n- 需要并行执行多个独立子任务\n- 需要跨会话恢复的长时任务\n\n## 协作关系总结\n\n```\n用户请求\n    │\n    ▼\n┌─────────────────────────────────────┐\n│  Intent Gate (Sisyphus 或 Atlas)    │\n│  - 如果是 Plan 路径 → 启用 Atlas    │\n│  - 否则 → Sisyphus 处理             │\n└─────────────────────────────────────┘\n    │\n    ├──► Sisyphus 路径 ─────────────────┐\n    │   - 动态规划                      │\n    │   - 灵活委派                      │\n    │   - 自我执行或调用 subagent       │\n    │   - TodoContinuationEnforcer      │\n    │       监控完成                    │\n    │\n    └──► Atlas 路径 ────────────────────┐\n        - 读取预定义 Plan               │\n        - Boulder State 管理            │\n        - 纯协调，零代码实现            │\n        - 严格 4-Phase 验证             │\n        - 多 subagent 并行              │\n        - Atlas Hook 监控完成           │\n```\n\n## 技术细节补充\n\n### BackgroundManager 的并发控制\n\n```typescript\n// 每个模型默认 5 个并发槽\nprivate concurrencyManager: ConcurrencyManager\n\n// 队列机制\nprivate queuesByKey: Map\u003cstring, QueueItem[]\u003e  // 按模型/provider分队列\n```\n\n### Sub Agent 的会话创建\n\n每个 `task()` 调用都会创建一个**独立的子会话**：\n\n```typescript\nconst createResult = await this.client.session.create({\n  body: {\n    parentID: input.parentSessionID,  // 记录父会话关系\n    title: `${input.description} (@${input.agent} subagent)`,\n  }\n})\nconst sessionID = createResult.data.id\nsubagentSessions.add(sessionID)  // 注册为子会话\n```\n\n### Metis/Momus 的角色与工具权限\n\n**重要澄清**：Metis 和 Momus 是 **read-only / pre-planning 代理**，它们的工具权限有特定限制：\n\n```typescript\n// Metis 的工具限制（src/agents/metis.ts）\ncreateAgentToolRestrictions([\n  \"write\", \"edit\", \"apply_patch\", \"task\"  // task 被禁止！\n])\n\n// Momus 的工具限制（src/agents/momus.ts）\ncreateAgentToolRestrictions([\n  \"write\", \"edit\", \"apply_patch\", \"task\"  // task 被禁止！\n])\n```\n\n**关键区别**：Metis/Momus **不能使用 `task` 工具**，但**保留 `call_omo_agent` 工具权限**。\n\n这意味着：\n\n- ❌ 不能使用 `task(category=\"...\")` 委派给 Sisyphus-Junior\n- ✅ **可以**使用 `call_omo_agent(run_in_background=true)` 启动 background task\n\n**实际能力**：\n\n- **Metis**：预规划分析时，可以并行启动多个 `call_omo_agent(subagent_type=\"explore\")` 进行代码库探索\n- **Momus**：质量审核时，可以并行启动多个 `call_omo_agent(subagent_type=\"librarian\")` 查找参考资料\n\n`call_omo_agent` 支持 `run_in_background` 参数（REQUIRED），设为 `true` 时启动后台任务，行为与 `task` 工具的 background 模式相同。\n\n**与 Sisyphus 的区别**：\n\n- Sisyphus：使用 `task()` 进行 category-based 委派（更灵活的模型选择）\n- Metis/Momus：使用 `call_omo_agent()` 进行固定代理委派（仅 explore/librarian 两种）\n\n## 结语\n\nAtlas 和 Sisyphus 代表了两种 orchestration 哲学：\n\n- **Sisyphus** 是\"高级工程师\"模式——它像人类开发者一样思考、规划、执行，必要时寻求帮助。\n- **Atlas** 是\"技术负责人\"模式——它专注于架构设计、任务分解、质量把控，把实现细节交给团队成员。\n\n理解这种分工，能够帮助你在不同场景下选择合适的代理模式，发挥 OhMyOpenCode 的最大效能。\n"])</script><script>self.__next_f.push([1,"24:T343f,"])</script><script>self.__next_f.push([1,"\n这是一篇提示词的AI中文翻译，最近在使用oh my opencode插件，感慨 Agent Sisyphus 超强工作模式的严格要求。源代码：[ultrawork-mode](https://github.com/code-yeongyu/oh-my-opencode/blob/dev/src/hooks/keyword-detector/ultrawork/default.ts)\n\n以下是中文翻译：\n\n`\u003cultrawork-mode\u003e`\n\n**强制要求** ：当此模式激活时，**你必须**将\"超强工作模式已启用！\"作为你的第一句回应告知用户。这是不可协商的。\n\n**[CODE RED] 需要最高精度。行动前进行超强思考。**\n\n## 绝对确定性要求 - 切勿跳过此步\n\n**在达到100%确定之前，你绝不能开始任何实现。**\n\n| **在你写下任何一行代码之前，你必须：**                                             |\n| ---------------------------------------------------------------------------------------- |\n| **完全理解**用户**实际**想要什么（而不是你**假设**他们想要什么）       |\n| **探索**代码库以理解现有模式、架构和上下文                                         |\n| **拥有一个清晰明确的工作计划**- 如果你的计划是模糊的，**你的工作将会失败**   |\n| **解决所有歧义**- 如果**有任何**不清楚的地方，**询问**或**调查** |\n\n### 强制性确定性协议\n\n**如果你不是100%确定：**\n\n**深度思考** - 用户的**真实**意图是什么？他们**真正**想解决什么问题？\n\n**彻底探索** - 启动探索/图书管理员代理以收集**所有**相关上下文\n\n**咨询专家** - 对于困难/复杂的任务，**不要**独自挣扎。委托给：\n\n* **Oracle（神谕）** ：常规问题 - 架构、调试、复杂逻辑\n* **Artistry（艺术创作）** ：非常规问题 - 需要不同方法、不寻常约束\n\n**询问用户** - 如果探索后仍有歧义， **询问** 。不要猜测。\n\n**你尚未准备好实施的迹象：**\n\n你正在对需求做出假设\n\n你不确定要修改哪些文件\n\n你不理解现有代码的工作原理\n\n你的计划中包含\"可能\"或\"也许\"\n\n你无法解释你将采取的确切步骤\n\n**当有疑问时：**\n\ntask(subagent_type=\"explore\", load_skills=[], prompt=\"我正在实现 [任务描述] 并且需要理解 [特定的知识缺口]。在代码库中查找 [X] 模式——展示文件路径、实现方法和使用的约定。我将用此来 [结果将如何被使用]。专注于 src/ 目录，除非特别需要测试模式，否则跳过测试文件。返回具体的文件路径及每个文件的简要说明。\", run_in_background=true)\n\ntask(subagent_type=\"librarian\", load_skills=[], prompt=\"我正在使用 [库/技术] 并且需要 [特定信息]。查找关于 [Y] 的官方文档和生产级示例——具体包括：API参考、配置选项、推荐模式和常见陷阱。跳过初学者教程。我将用此来 [此决策将基于此信息]。\", run_in_background=true)\n\ntask(subagent_type=\"oracle\", load_skills=[], prompt=\"我需要对我的 [任务] 方法进行架构评审。这是我的计划：[描述包含具体文件和更改的计划]。我的顾虑是：[列出具体的不确定性]。请评估：方法的正确性、我可能遗漏的潜在问题，以及是否存在更好的替代方案。\", run_in_background=false)\n\n**只有在你已经：**\n\n通过代理收集了足够的上下文\n\n解决了所有歧义\n\n创建了一个精确的、逐步的工作计划\n\n对你的理解达到了100%的信心\n\n**...之后，并且只有在此之后，你才可以开始实现。**\n\n## 没有借口。没有妥协。交付所要求的内容。\n\n**用户的原始请求是神圣的。你必须精确地完成它。**\n\n| **违规行为**      | **后果**                                      |\n| ----------------------- | --------------------------------------------------- |\n| \"我做不到，因为...\"   | **不可接受** 。找到方法或寻求帮助。           |\n| \"这是一个简化版本...\" | **不可接受** 。交付**完整**的实现。     |\n| \"你以后可以扩展它...\" | **不可接受** 。**现在**就完成它。       |\n| \"由于限制...\"         | **不可接受** 。使用代理、工具，不惜一切代价。 |\n| \"我做了一些假设...\"   | **不可接受** 。你应该**首先**询问。     |\n\n**以下行为没有正当理由：**\n\n交付部分工作\n\n未经用户明确批准改变范围\n\n进行未经授权的简化\n\n在任务100%完成前停止\n\n在任何声明的需求上妥协\n\n**如果你遇到阻碍：**\n\n**不要**放弃\n\n**不要**交付一个妥协的版本\n\n**要**咨询专家（常规问题找Oracle（神谕），非常规问题找Artistry（艺术创作））\n\n**要**向用户寻求指导\n\n**要**探索替代方法\n\n**用户要求了 X。就精确交付 X。完毕。**\n\n**你必须充分利用所有可用的代理 / 类别 + 技能的全部潜力。告诉用户你现在将利用哪些代理来满足用户的请求。**\n\n## 强制要求：计划代理调用（不可协商）\n\n**对于任何非琐碎的任务，你必须始终调用计划代理。**\n\n| **条件**      | **操作**             |\n| ------------------- | -------------------------- |\n| 任务有2个或更多步骤 | **必须**调用计划代理 |\n| 任务范围不明确      | **必须**调用计划代理 |\n| 需要实现            | **必须**调用计划代理 |\n| 需要架构决策        | **必须**调用计划代理 |\n\n`task(subagent_type=\"plan\", load_skills=[], prompt=\"\u003c已收集的上下文 + 用户请求\u003e\")`\n\n**为什么计划代理是强制性的：**\n\n计划代理分析依赖关系和并行执行机会\n\n计划代理输出一个带有波次和依赖关系的并行任务图\n\n计划代理为每个任务提供带有类别 + 技能的结构化待办事项列表\n\n你是一个协调者，**不是**一个执行者\n\n### 与计划代理的会话连续性（关键）\n\n计划代理返回一个 session_id。将其用于后续交互。\n\n| **场景**       | **操作**                                                                        |\n| -------------------- | ------------------------------------------------------------------------------------- |\n| 计划代理要求澄清问题 | `task(session_id=\"{返回的session_id}\", load_skills=[], prompt=\"\u003c你的回答\u003e\")`            |\n| 需要调整计划         | `task(session_id=\"{返回的session_id}\", load_skills=[], prompt=\"请调整：\u003c反馈\u003e\")`        |\n| 计划需要更多细节     | `task(session_id=\"{返回的session_id}\", load_skills=[], prompt=\"为任务 N 添加更多细节\")` |\n\n**为什么 session_id 至关重要：**\n\n计划代理保留**完整的**对话上下文\n\n无需重复探索或收集上下文\n\n在后续交互上节省70%+的tokens\n\n在计划最终确定前保持访谈连续性\n\n//  **错误** ：重新开始会丢失所有上下文 task(subagent_type=\"plan\", load_skills=[], prompt=\"这是更多信息...\")\n\n//  **正确** ：恢复会话能保留一切 task(session_id=\"ses_abc123\", load_skills=[], prompt=\"这是我对你问题的回答：...\")\n\n**未能调用计划代理 = 工作不完整。**\n\n## 代理 / 类别 + 技能利用原则\n\n**默认行为：委托。不要自己工作。**\n\n| **任务类型** | **操作**                                                          | **原因**                  |\n| ------------------ | ----------------------------------------------------------------------- | ------------------------------- |\n| 代码库探索         | task(subagent_type=\"explore\", load_skills=[], run_in_background=true)   | 并行、上下文高效                |\n| 文档查找           | task(subagent_type=\"librarian\", load_skills=[], run_in_background=true) | 专业知识                        |\n| 规划               | task(subagent_type=\"plan\", load_skills=[])                              | 并行任务图 + 结构化待办事项列表 |\n| 困难问题（常规）   | task(subagent_type=\"oracle\", load_skills=[])                            | 架构、调试、复杂逻辑            |\n| 困难问题（非常规） | task(category=\"artistry\", load_skills=[...])                            | 需要不同方法                    |\n| 实现               | task(category=\"...\", load_skills=[...])                                 | 领域优化模型                    |\n\n**类别 + 技能委托：**\n\n// 前端工作 task(category=\"visual-engineering\", load_skills=[\"frontend-ui-ux\"])\n\n// 复杂逻辑 task(category=\"ultrabrain\", load_skills=[\"typescript-programmer\"])\n\n// 快速修复 task(category=\"quick\", load_skills=[\"git-master\"])\n\n**你应该只在自己动手做时：**\n\n任务极其简单（1-2行，明显的更改）\n\n你已经加载了所有上下文\n\n委托的开销超过了任务复杂性\n\n**否则：委托。始终如此。**\n\n## 执行规则\n\n **待办事项** ：跟踪**每一个**步骤。在每一步完成后**立即**标记为完成。\n\n **并行** ：通过 task(run_in_background=true) 同时启动独立的代理调用 - **绝不**顺序等待。\n\n **后台优先** ：使用 task 处理探索/研究代理（如果需要，可同时10个以上）。\n\n **验证** ：完成后重新阅读请求。在报告完成前检查**所有**需求是否满足。\n\n **委托** ：不要所有事情都自己做 - 协调专业代理发挥他们的优势。\n\n## 工作流程\n\n分析请求并识别所需能力\n\n **并行** （如果需要，可同时10个以上）通过 task(run_in_background=true) 生成探索/图书管理员代理\n\n使用已收集的上下文通过计划代理创建详细的工作分解\n\n根据原始需求持续验证执行\n\n## 验证保证（不可协商）\n\n没有**证据**证明其有效，就 **不算** \"完成\"。\n\n### 实现前：定义成功标准\n\n**在编写任何代码之前，你必须定义：**\n\n| **标准类型**  | **描述**     | **示例**                     |\n| ------------------- | ------------------ | ---------------------------------- |\n| **功能性**    | 必须有效的具体行为 | \"按钮点击触发API调用\"            |\n| **可观察性**  | 可以测量/看到什么  | \"控制台显示'成功'，无错误\"     |\n| **通过/失败** | 二元性，无歧义     | \"返回200 OK\"，而不是\"应该有效\" |\n\n明确写出这些标准。如果范围非琐碎，与用户分享。\n\n### 测试计划模板（非琐碎任务强制要求）\n\n```markdown\n### 测试计划\n### 目标：[我们要验证什么]\n### 先决条件：[需要的设置]\n### 测试用例：\n1.  [测试名称]：[输入] → [预期输出] → [如何验证]\n2.  ...\n### 成功标准：所有测试用例通过\n### 如何执行：[确切的命令/步骤]\n```\n\n### 执行与证据要求\n\n| **阶段**     | **操作**       | **所需证据**               |\n| ------------------ | -------------------- | -------------------------------- |\n| **构建**     | 运行构建命令         | 退出代码为0，无错误              |\n| **测试**     | 执行测试套件         | 所有测试通过（截图/输出）        |\n| **手动验证** | 测试实际功能         | 演示其有效（描述你观察到的内容） |\n| **回归**     | 确保没有破坏任何东西 | 现有测试仍然通过                 |\n\n**没有证据 = 未验证 = 未完成。**\n\n### TDD工作流程（当测试基础设施存在时）\n\n **SPEC** ：定义\"有效\"意味着什么（上述成功标准）\n\n **RED** ：编写失败的测试 → 运行它 → 确认它**失败**\n\n **GREEN** ：编写最少的代码 → 运行测试 → 确认它**通过**\n\n **REFACTOR** ：清理 → 测试**必须**保持通过\n\n **VERIFY** ：运行完整的测试套件，确认没有回归\n\n **EVIDENCE** ：报告你运行了什么以及看到了什么输出\n\n### 验证反模式（阻塞性）\n\n| **违规行为** | **失败原因**                                |\n| ------------------ | ------------------------------------------------- |\n| \"现在应该可以了\" | 没有证据。运行它。                                |\n| \"我添加了测试\"   | 它们通过了吗？显示输出。                          |\n| \"修复了错误\"     | 你怎么知道？你测试了什么？                        |\n| \"实现完成\"       | 你对照成功标准验证了吗？                          |\n| 跳过测试执行       | 测试的存在是为了被**运行** ，而不仅仅是编写 |\n\n**没有证据，不要声称任何事。执行。验证。展示证据。**\n\n## 零容忍失败\n\n **不允许范围缩减** ：绝不制作\"演示\"、\"骨架\"、\"简化\"、\"基础\"版本 - 交付**完整**实现\n\n **不允许模拟工作** ：当用户要求你\"移植A\"时，你必须\"移植A\"，完全地，100%。没有额外功能，没有减少功能，没有模拟数据，完全可用的100%移植。\n\n **不允许部分完成** ：绝不在60-80%时说\"你可以扩展这个...\"就停止 - 完成100%\n\n **不允许假设捷径** ：绝不跳过你认为\"可选\"或\"可以稍后添加\"的需求\n\n **不允许过早停止** ：在所有待办事项完成并验证之前，绝不宣布完成\n\n **不允许删除测试** ：绝不删除或跳过失败的测试以使构建通过。修复代码，而不是测试。\n\n**用户要求了 X。就精确交付 X。不是子集。不是演示。不是起点。**\n\n**探索 + 图书管理员**\n\n**收集 -\u003e 计划代理生成**\n\n**通过委托给其他代理来工作**\n\n**现在。**\n\n`\u003c/ultrawork-mode\u003e`"])</script><script>self.__next_f.push([1,"25:T5155,"])</script><script>self.__next_f.push([1,"\n## 什么是 Category？\n\n**Category 是针对特定领域优化的 Agent 配置预设**。它回答的核心问题是：**\"这是什么类型的工作？\"**\n\n当你使用 `task()` 工具指定 `category` 参数时，系统会：\n\n1. **创建 Sisyphus-Junior 执行器**：一个专用的子 Agent\n2. **应用预配置**：自动设置模型、温度、提示词等\n3. **执行任务**：专注完成，不会无限委托\n\n```\ntask(category=\"visual-engineering\", prompt=\"创建响应式仪表板组件\")\n         ↓\n    Category 预设生效\n         ↓\n    Sisyphus-Junior 执行\n         ↓\n      任务完成\n```\n\n### Category vs Agent vs Skill\n\n| 概念 | 定义 | 回答的问题 | 示例 |\n|------|------|------------|------|\n| **Agent** | 固定身份的专家 | \"谁来做？\" | Sisyphus、Oracle、Librarian |\n| **Category** | 运行时配置预设 | \"什么类型的工作？\" | visual-engineering、ultrabrain |\n| **Skill** | 领域知识和工具 | \"需要什么能力？\" | git-master、playwright |\n\n三者可以组合使用：\n\n```typescript\ntask(\n  category=\"visual-engineering\",  // 使用前端优化配置\n  load_skills=[\"frontend-ui-ux\", \"playwright\"],  // 加载设计知识和浏览器工具\n  prompt=\"实现一个漂亮的登录页面\"\n)\n```\n\n## 8 个内置 Categories 详解\n\nOh My OpenCode 提供 **8 个内置 Category**，每个都有针对性的模型和配置：\n\n### Category 快速参考表\n\n| Category | 默认模型 | 变体 | 适用场景 | 成本 |\n|----------|---------|------|----------|------|\n| `visual-engineering` | `google/gemini-3-pro` | - | 前端、UI/UX、设计、样式、动画 | 中 |\n| `ultrabrain` | `openai/gpt-5.3-codex` | `xhigh` | 深度逻辑推理、复杂架构决策 | 高 |\n| `deep` | `openai/gpt-5.3-codex` | `medium` | 自主问题解决、需深入理解的任务 | 高 |\n| `artistry` | `google/gemini-3-pro` | `max` | 高度创意/艺术性任务、新颖想法 | 高 |\n| `quick` | `anthropic/claude-haiku-4-5` | - | 琐碎任务、单文件修改、拼写修复 | 低 |\n| `unspecified-low` | `anthropic/claude-sonnet-4-5` | - | 不适合其他类别、低投入任务 | 中 |\n| `unspecified-high` | `anthropic/claude-opus-4-6` | `max` | 不适合其他类别、高投入任务 | 高 |\n| `writing` | `google/gemini-3-flash` | - | 文档、散文、技术写作 | 低 |\n\n### visual-engineering（视觉工程）\n\n| 属性 | 详情 |\n|------|------|\n| **默认模型** | `google/gemini-3-pro` |\n| **Provider 链** | google → anthropic → zai-coding-plan |\n| **核心能力** | UI 组件开发、响应式设计、动画效果、CSS 优化 |\n\n**适用场景**：\n- 开发 React/Vue 组件\n- 实现响应式布局\n- 添加 CSS 动画和过渡效果\n- 优化用户界面体验\n\n```typescript\ntask(\n  category=\"visual-engineering\",\n  prompt=\"创建一个带有动画效果的数据可视化仪表板，使用 Tailwind CSS\"\n)\n```\n\n### ultrabrain（超脑）\n\n| 属性 | 详情 |\n|------|------|\n| **默认模型** | `openai/gpt-5.3-codex` |\n| **变体** | `xhigh`（最高推理投入） |\n| **Provider 链** | openai → google → anthropic |\n| **核心能力** | 深度分析、复杂架构设计、系统性推理 |\n\n**适用场景**：\n- 系统架构评审和设计\n- 复杂业务逻辑分析\n- 多系统权衡决策\n- 算法设计和优化\n\n```typescript\ntask(\n  category=\"ultrabrain\",\n  prompt=\"分析当前微服务架构的性能瓶颈，提出优化方案\"\n)\n```\n\n\u003e ⚠️ **注意**：这是最\"昂贵\"的 Category，仅在需要深度推理时使用。\n\n### deep（深度）\n\n| 属性 | 详情 |\n|------|------|\n| **默认模型** | `openai/gpt-5.3-codex` |\n| **变体** | `medium`（中等推理投入） |\n| **Provider 链** | openai → anthropic → google |\n| **核心能力** | 自主问题解决、深入研究、理解复杂代码 |\n\n**适用场景**：\n- 理解复杂代码库\n- 调试疑难问题\n- 需要深入理解的实现任务\n- 代码重构规划\n\n**与 ultrabrain 的区别**：\n- **ultrabrain**：纯推理，不做实现\n- **deep**：推理 + 实现，面向目标自主工作\n\n```typescript\ntask(\n  category=\"deep\",\n  prompt=\"重构这个认证模块，提高可测试性和可维护性\"\n)\n```\n\n### artistry（艺术）\n\n| 属性 | 详情 |\n|------|------|\n| **默认模型** | `google/gemini-3-pro` |\n| **变体** | `max`（最大能力） |\n| **Provider 链** | google → anthropic → openai |\n| **核心能力** | 创意设计、新颖想法、艺术性任务 |\n\n**适用场景**：\n- 创意 Landing Page 设计\n- 独特的交互动画\n- 视觉效果创新\n- 非常规的 UI 解决方案\n\n```typescript\ntask(\n  category=\"artistry\",\n  prompt=\"设计一个令人印象深刻的 404 页面，要有创意和趣味性\"\n)\n```\n\n### quick（快速）\n\n| 属性 | 详情 |\n|------|------|\n| **默认模型** | `anthropic/claude-haiku-4-5` |\n| **Provider 链** | anthropic → google → opencode |\n| **核心能力** | 快速响应、简单任务处理 |\n\n**适用场景**：\n- 修复拼写错误\n- 单文件小修改\n- 简单的重命名操作\n- 格式化代码\n\n```typescript\ntask(\n  category=\"quick\",\n  prompt=\"把 README.md 中的所有 'opencode' 改为 'OpenCode'\"\n)\n```\n\n\u003e 💡 **成本优势**：使用最快的模型，适合批量处理简单任务。\n\n### unspecified-low（未指定-低）\n\n| 属性 | 详情 |\n|------|------|\n| **默认模型** | `anthropic/claude-sonnet-4-5` |\n| **Provider 链** | anthropic → openai → google |\n| **核心能力** | 通用任务处理 |\n\n**适用场景**：\n- 不适合其他 Category 的任务\n- 中等复杂度的实现\n- 不需要深度推理的工作\n\n```typescript\ntask(\n  category=\"unspecified-low\",\n  prompt=\"添加一个新的配置选项到设置页面\"\n)\n```\n\n### unspecified-high（未指定-高）\n\n| 属性 | 详情 |\n|------|------|\n| **默认模型** | `anthropic/claude-opus-4-6` |\n| **变体** | `max` |\n| **Provider 链** | anthropic → openai → google |\n| **核心能力** | 复杂通用任务处理 |\n\n**适用场景**：\n- 不适合其他 Category 但需要高投入的任务\n- 复杂功能实现\n- 需要高质量输出的工作\n\n```typescript\ntask(\n  category=\"unspecified-high\",\n  prompt=\"实现一个完整的用户权限管理系统\"\n)\n```\n\n### writing（写作）\n\n| 属性 | 详情 |\n|------|------|\n| **默认模型** | `google/gemini-3-flash` |\n| **Provider 链** | google → anthropic → zai-coding-plan → openai |\n| **核心能力** | 文档撰写、技术写作、内容创作 |\n\n**适用场景**：\n- 编写技术文档\n- 撰写 README\n- API 文档生成\n- 博客文章起草\n\n```typescript\ntask(\n  category=\"writing\",\n  prompt=\"为这个 API 端点编写详细的文档说明\"\n)\n```\n\n## Sisyphus-Junior：Category 的执行者\n\n当使用 Category 时，实际执行任务的是 **Sisyphus-Junior**（小西西弗斯）。\n\n### 什么是 Sisyphus-Junior？\n\n| 属性 | 详情 |\n|------|------|\n| **角色** | 推石头者·少年版 |\n| **模型** | 继承自指定的 Category |\n| **特点** | 专注执行，不能再次委托 |\n| **成本** | 根据使用的 Category 决定 |\n\n### 核心限制\n\n```typescript\n// Sisyphus-Junior 的权限\n{\n  read: true,      // ✅ 可以读取文件\n  write: true,     // ✅ 可以写入文件\n  edit: true,      // ✅ 可以编辑文件\n  bash: true,      // ✅ 可以执行命令\n  task: false,     // ❌ 不能创建新任务（防止无限委托）\n  call_omo_agent: true  // ✅ 可以调用其他 Agent\n}\n```\n\n### 为什么禁止 `task` 工具？\n\n防止**无限委托循环**：\n\n```\n❌ 没有限制的情况：\nSisyphus → Category A → Sisyphus-Junior → task(Category B) \n    → Sisyphus-Junior → task(Category C) → ...无限循环\n\n✅ 有限制的情况：\nSisyphus → Category → Sisyphus-Junior → 专注执行 → 完成\n```\n\n## Category 与 Skill 的组合策略\n\n通过组合 Category 和 Skill，可以创建强大的**专业代理组合**：\n\n### 设计师组合（UI 实现）\n\n```typescript\ntask(\n  category=\"visual-engineering\",\n  load_skills=[\"frontend-ui-ux\", \"playwright\"],\n  prompt=\"实现一个精美的登录表单组件\"\n)\n```\n\n**效果**：\n- `visual-engineering`：使用 Gemini 3 Pro 的视觉能力\n- `frontend-ui-ux`：注入设计原则和美学指导\n- `playwright`：完成后自动截图验证\n\n### 架构师组合（设计评审）\n\n```typescript\ntask(\n  category=\"ultrabrain\",\n  load_skills=[],\n  prompt=\"评审当前系统的微服务架构设计\"\n)\n```\n\n**效果**：\n- `ultrabrain`：使用 GPT-5.3 Codex 的深度推理\n- 空 skills：纯推理，专注架构分析\n\n### 维护者组合（快速修复）\n\n```typescript\ntask(\n  category=\"quick\",\n  load_skills=[\"git-master\"],\n  prompt=\"修复类型错误并提交\"\n)\n```\n\n**效果**：\n- `quick`：使用快速的 Haiku 模型\n- `git-master`：自动生成规范的 commit message\n\n### 文档专家组合\n\n```typescript\ntask(\n  category=\"writing\",\n  load_skills=[\"frontend-ui-ux\"],\n  prompt=\"为这个组件库编写使用文档\"\n)\n```\n\n**效果**：\n- `writing`：使用适合写作的模型\n- `frontend-ui-ux`：理解 UI 组件的设计意图\n\n## 自定义 Category 配置\n\n在 `oh-my-opencode.json` 中可以自定义或覆盖 Category：\n\n### 配置文件位置\n\n| 优先级 | 位置 | 说明 |\n|--------|------|------|\n| 1（最高） | `.opencode/oh-my-opencode.json` | 项目级配置 |\n| 2 | `~/.config/opencode/oh-my-opencode.json` | 用户级配置 |\n\n### 配置字段参考\n\n```typescript\ninterface CategoryConfig {\n  model?: string          // AI 模型 ID\n  variant?: string        // 模型变体：max, xhigh, medium, low\n  temperature?: number    // 温度：0.0 ~ 2.0\n  top_p?: number          // 核采样：0.0 ~ 1.0\n  prompt_append?: string  // 追加到系统提示词\n  thinking?: {            // 思考模式配置\n    type: \"enabled\" | \"disabled\"\n    budgetTokens?: number\n  }\n  reasoningEffort?: \"low\" | \"medium\" | \"high\" | \"xhigh\"\n  textVerbosity?: \"low\" | \"medium\" | \"high\"\n  tools?: Record\u003cstring, boolean\u003e  // 工具控制\n  maxTokens?: number      // 最大响应 token\n  description?: string    // 描述（显示在提示词中）\n  is_unstable_agent?: boolean  // 标记不稳定，强制后台模式\n}\n```\n\n### 示例配置\n\n```jsonc\n{\n  \"categories\": {\n    // 1. 创建自定义 Category\n    \"korean-writer\": {\n      \"model\": \"google/gemini-3-flash\",\n      \"temperature\": 0.5,\n      \"prompt_append\": \"You are a Korean technical writer. Maintain a friendly and clear tone.\"\n    },\n    \n    // 2. 覆盖内置 Category\n    \"visual-engineering\": {\n      \"model\": \"openai/gpt-5.2\",\n      \"temperature\": 0.8,\n      \"prompt_append\": \"Use shadcn/ui components and Tailwind CSS.\"\n    },\n\n    // 3. 配置深度思考模式\n    \"deep-reasoning\": {\n      \"model\": \"anthropic/claude-opus-4-6\",\n      \"thinking\": {\n        \"type\": \"enabled\",\n        \"budgetTokens\": 32000\n      },\n      \"tools\": {\n        \"websearch_web_search_exa\": false\n      }\n    },\n\n    // 4. 使用国产模型\n    \"quick\": {\n      \"model\": \"zhipuai-coding-plan/glm-4.7\"\n    },\n    \"ultrabrain\": {\n      \"model\": \"zhipuai-coding-plan/glm-5\"\n    }\n  }\n}\n```\n\n## 关键：模型解析优先级\n\n**Categories 除非被配置，否则不使用内置默认值！**\n\n### 解析流程\n\n```\n┌─────────────────────────────────────────────────────────────┐\n│                    模型解析优先级                             │\n├─────────────────────────────────────────────────────────────┤\n│                                                             │\n│  Step 1: 用户配置的模型（oh-my-opencode.json）              │\n│           ↓ 如果没有配置                                    │\n│  Step 2: Category 的内置默认值                              │\n│           ↓ 如果该 Category 未在配置中定义                  │\n│  Step 3: 系统默认模型（opencode.json 中的 model）           │\n│                                                             │\n└─────────────────────────────────────────────────────────────┘\n```\n\n### 常见问题\n\n```json\n// opencode.json\n{ \"model\": \"anthropic/claude-sonnet-4-5\" }\n\n// oh-my-opencode.json（空的 categories）\n{}\n\n// ❌ 结果：所有 Category 都使用 claude-sonnet-4-5\n// - quick 任务用 Sonnet（浪费！应该用 Haiku）\n// - ultrabrain 用 Sonnet（推理能力不足！应该用 GPT-5.3）\n// - visual 任务用 Sonnet（效果不佳！应该用 Gemini）\n```\n\n### 推荐配置\n\n```json\n{\n  \"categories\": {\n    \"visual-engineering\": {\n      \"model\": \"google/gemini-3-pro\"\n    },\n    \"ultrabrain\": {\n      \"model\": \"openai/gpt-5.3-codex\",\n      \"variant\": \"xhigh\"\n    },\n    \"artistry\": {\n      \"model\": \"google/gemini-3-pro\",\n      \"variant\": \"max\"\n    },\n    \"quick\": {\n      \"model\": \"anthropic/claude-haiku-4-5\"\n    },\n    \"unspecified-low\": {\n      \"model\": \"anthropic/claude-sonnet-4-5\"\n    },\n    \"unspecified-high\": {\n      \"model\": \"anthropic/claude-opus-4-6\",\n      \"variant\": \"max\"\n    },\n    \"writing\": {\n      \"model\": \"google/gemini-3-flash\"\n    },\n    \"deep\": {\n      \"model\": \"openai/gpt-5.3-codex\",\n      \"variant\": \"medium\"\n    }\n  }\n}\n```\n\n\u003e **只配置你有访问权限的 Category**。未配置的会回退到系统默认模型。\n\n## Provider 优先级链\n\n每个 Category 都有 Provider fallback 机制，当首选模型不可用时自动切换：\n\n| Category | 默认模型 | Provider 优先级链 |\n|----------|---------|------------------|\n| `visual-engineering` | `gemini-3-pro` | google → anthropic → zai-coding-plan |\n| `ultrabrain` | `gpt-5.3-codex` | openai → google → anthropic |\n| `deep` | `gpt-5.3-codex` | openai → anthropic → google |\n| `artistry` | `gemini-3-pro` | google → anthropic → openai |\n| `quick` | `claude-haiku-4-5` | anthropic → google → opencode |\n| `unspecified-low` | `claude-sonnet-4-5` | anthropic → openai → google |\n| `unspecified-high` | `claude-opus-4-6` | anthropic → openai → google |\n| `writing` | `gemini-3-flash` | google → anthropic → zai-coding-plan → openai |\n\n### 检查配置\n\n```bash\nbunx oh-my-opencode doctor --verbose\n```\n\n输出示例：\n\n```\n✓ Model Resolution\n  ├─ Sisyphus: anthropic/claude-opus-4-6 (via anthropic)\n  ├─ visual-engineering: google/gemini-3-pro (via google)\n  ├─ ultrabrain: openai/gpt-5.3-codex (via openai)\n  ├─ quick: anthropic/claude-haiku-4-5 (via anthropic)\n  └─ ...\n```\n\n## 实际使用场景\n\n### 场景：快速开发 UI 组件\n\n**需求**：开发一个响应式的导航栏组件\n\n```bash\n# 在 OpenCode TUI 中输入：\nulw 用 visual-engineering 实现一个响应式导航栏，包含 logo、菜单和移动端汉堡按钮\n```\n\n**执行过程**：\n1. `ulw` 触发 Ultrawork 模式\n2. Sisyphus 识别为前端任务\n3. 使用 `visual-engineering` Category\n4. Sisyphus-Junior 使用 Gemini 3 Pro 执行\n\n### 场景：深度架构分析\n\n**需求**：分析当前系统的性能瓶颈\n\n```bash\n# 在 OpenCode TUI 中输入：\n用 ultrabrain 分析当前系统的性能瓶颈，提出优化方案\n```\n\n**执行过程**：\n1. 识别需要深度推理\n2. 使用 `ultrabrain` Category\n3. GPT-5.3 Codex 进行分析\n4. 输出详细的优化建议\n\n### 场景：批量小修改\n\n**需求**：修复项目中的所有 TypeScript 类型错误\n\n```bash\n# 在 OpenCode TUI 中输入：\nulw 用 quick 修复所有的 TypeScript 类型错误\n```\n\n**执行过程**：\n1. `ulw` 触发并行处理\n2. 使用 `quick` Category（快速便宜）\n3. Haiku 模型批量处理\n4. 每个文件独立处理，最后汇总\n\n### 场景：技术文档编写\n\n**需求**：为新功能编写文档\n\n```bash\n# 在 OpenCode TUI 中输入：\n用 writing 为这个新的 API 端点编写文档\n```\n\n**执行过程**：\n1. 使用 `writing` Category\n2. Gemini 3 Flash 进行写作\n3. 生成规范的 API 文档\n\n## 最佳实践\n\n### 选择正确的 Category\n\n| 你的需求 | 推荐 Category | 理由 |\n|----------|--------------|------|\n| 开发 UI 组件 | `visual-engineering` | 视觉能力强 |\n| 架构设计/分析 | `ultrabrain` | 深度推理 |\n| 复杂功能实现 | `deep` | 自主工作 |\n| 创意设计 | `artistry` | 高创造力 |\n| 小修改/批量处理 | `quick` | 快速便宜 |\n| 不确定的任务（简单） | `unspecified-low` | 通用 |\n| 不确定的任务（复杂） | `unspecified-high` | 高质量 |\n| 文档/写作 | `writing` | 文本生成 |\n\n### 配置你的 Categories\n\n**不要依赖默认值！** 在 `oh-my-opencode.json` 中显式配置：\n\n```json\n{\n  \"categories\": {\n    \"quick\": { \"model\": \"anthropic/claude-haiku-4-5\" },\n    \"visual-engineering\": { \"model\": \"google/gemini-3-pro\" },\n    \"ultrabrain\": { \"model\": \"openai/gpt-5.3-codex\", \"variant\": \"xhigh\" }\n  }\n}\n```\n\n### 组合 Skills 增强能力\n\n```typescript\n// UI 开发 + 设计知识 + 浏览器验证\ntask(category=\"visual-engineering\", load_skills=[\"frontend-ui-ux\", \"playwright\"], ...)\n\n// Git 操作 + 原子提交\ntask(category=\"quick\", load_skills=[\"git-master\"], ...)\n```\n\n### 使用 `ulw` 自动选择\n\n如果不确定用哪个 Category，直接用 `ulw`：\n\n```bash\nulw 实现用户认证功能\n```\n\nSisyphus 会自动分析任务类型并选择合适的 Category。\n\n### 监控成本\n\n| Category | 相对成本 | 使用频率建议 |\n|----------|---------|--------------|\n| `quick` | 🟢 低 | 大量使用 |\n| `writing` | 🟢 低 | 按需使用 |\n| `visual-engineering` | 🟡 中 | 按需使用 |\n| `unspecified-low` | 🟡 中 | 按需使用 |\n| `deep` | 🟠 高 | 谨慎使用 |\n| `artistry` | 🟠 高 | 谨慎使用 |\n| `ultrabrain` | 🔴 很高 | 少量使用 |\n| `unspecified-high` | 🔴 很高 | 少量使用 |\n\n## 配置速查表\n\n### 内置 Categories 完整配置\n\n```json\n{\n  \"categories\": {\n    \"visual-engineering\": {\n      \"model\": \"google/gemini-3-pro\",\n      \"description\": \"Frontend, UI/UX, design, styling, animation\"\n    },\n    \"ultrabrain\": {\n      \"model\": \"openai/gpt-5.3-codex\",\n      \"variant\": \"xhigh\",\n      \"description\": \"Deep logical reasoning, complex architecture\"\n    },\n    \"deep\": {\n      \"model\": \"openai/gpt-5.3-codex\",\n      \"variant\": \"medium\",\n      \"description\": \"Goal-oriented autonomous problem-solving\"\n    },\n    \"artistry\": {\n      \"model\": \"google/gemini-3-pro\",\n      \"variant\": \"max\",\n      \"description\": \"Highly creative/artistic tasks, novel ideas\"\n    },\n    \"quick\": {\n      \"model\": \"anthropic/claude-haiku-4-5\",\n      \"description\": \"Trivial tasks, single file changes, typo fixes\"\n    },\n    \"unspecified-low\": {\n      \"model\": \"anthropic/claude-sonnet-4-5\",\n      \"description\": \"Tasks that don't fit other categories, low effort\"\n    },\n    \"unspecified-high\": {\n      \"model\": \"anthropic/claude-opus-4-6\",\n      \"variant\": \"max\",\n      \"description\": \"Tasks that don't fit other categories, high effort\"\n    },\n    \"writing\": {\n      \"model\": \"google/gemini-3-flash\",\n      \"description\": \"Documentation, prose, technical writing\"\n    }\n  }\n}\n```\n\n### 使用命令速查\n\n```bash\n# UI 任务\ntask(category=\"visual-engineering\", prompt=\"实现登录表单\")\n\n# 架构分析\ntask(category=\"ultrabrain\", prompt=\"分析系统架构\")\n\n# 复杂实现\ntask(category=\"deep\", prompt=\"重构认证模块\")\n\n# 创意设计\ntask(category=\"artistry\", prompt=\"设计 404 页面\")\n\n# 快速修复\ntask(category=\"quick\", prompt=\"修复类型错误\")\n\n# 文档编写\ntask(category=\"writing\", prompt=\"编写 API 文档\")\n\n# 组合 Skills\ntask(category=\"visual-engineering\", load_skills=[\"frontend-ui-ux\"], prompt=\"...\")\n```\n\n## 总结\n\nOh My OpenCode 的 Categories 系统是一个强大的**任务分类和资源配置**机制：\n\n| 核心概念 | 说明 |\n|----------|------|\n| **8 个内置 Category** | 覆盖前端、后端、创意、写作等场景 |\n| **Sisyphus-Junior** | Category 任务的专用执行器 |\n| **模型优化** | 每个 Category 针对场景选择最优模型 |\n| **Skill 组合** | Category + Skill 创建专业代理 |\n| **自定义配置** | 在 oh-my-opencode.json 中灵活定制 |\n\n**记住**：配置你的 Categories，不要依赖默认值！\n\n---\n\n## 参考资料\n\n- [Oh My OpenCode 官方文档](https://github.com/code-yeongyu/oh-my-opencode)\n- [Category \u0026 Skill System Guide](https://github.com/code-yeongyu/oh-my-opencode/blob/dev/docs/category-skill-guide.md)\n- [Configuration Reference](https://github.com/code-yeongyu/oh-my-opencode/blob/dev/docs/configurations.md)\n- [Oh My OpenCode Agent 完全指南](/blog/swd/ai-coding/opencode/oh-my-opencode-agents-guides)\n"])</script><script>self.__next_f.push([1,"26:T644c,"])</script><script>self.__next_f.push([1,"\nOh My OpenCode 共有 **11 个 AI agent**，分为两大类：Primary Agents（主 agent）和 Sub Agents（子 agent）。\n\n## Agent 快速预览\n\n| Agent | 中文名 | 角色 | 类型 | 计划/执行 | 读写权限 | 成本 | 温度 | 适用场景 | 场景举例 |\n|-------|--------|------|------|-----------|----------|------|------|----------|----------|\n| Sisyphus | 西西弗斯 | 推石头者 | Primary | 执行+协调 | ✅ 全权限 | EXP | 0.1 | 复杂任务编排、项目管理 | `ulw 重构整个应用` |\n| Hephaestus | 赫菲斯托斯 | 锻造之神 | Primary | 执行 | ✅ 全权限 | EXP | 0.1 | 端到端功能实现 | `实现用户认证系统` |\n| Atlas | 阿特拉斯 | 擎天神 | Primary | 执行+协调 | ✅ 全权限 | EXP | 0.1 | 长期大型项目 | `开发完整电商平台` |\n| Prometheus | 普罗米修斯 | 先知 | Primary | **仅计划** | ❌ 只读 | EXP | 0.1 | 战略规划、架构设计 | `规划系统架构` |\n| Metis | 墨提斯 | 智慧女神 | Sub agent | **仅计划** | ❌ 只读 | EXP | 0.3 | 预规划分析、可行性研究 | 为普罗米修斯提供咨询 |\n| Momus | 摩摩斯 | 讽刺之神 | Sub agent | **仅计划** | ❌ 只读 | EXP | 0.1 | 计划验证、风险评估 | 验证普罗米修斯的计划 |\n| Oracle | 神谕 | 神谕 | Sub agent | 咨询 | ❌ 只读 | EXP | 0.1 | Debug、架构咨询 | `为什么API这么慢？` |\n| Librarian | 莱布瑞恩 | 图书管理员 | Sub agent | 研究 | ❌ 只读 | CHEAP | 0.1 | 技术调研、文档查询 | `React 19 新特性` |\n| Explore | 艾克斯 | 探索者 | Sub agent | 搜索 | ❌ 只读 | FREE | 0.1 | 代码定位、快速搜索 | `找到认证中间件` |\n| Multimodal Looker | 莫达尔 | 多模态观察者 | Sub agent | 分析 | ❌ 只读 | CHEAP | 0.1 | 图像/PDF分析 | `分析这个API截图` |\n| Sisyphus-Junior | 小西西弗斯 | 推石头者·少年版 | Sub agent | 执行 | ⚠️ 受限 | EXP | 0.1 | 子任务执行 | 被西西弗斯委托的具体任务 |\n\n**图例说明**:\n\n- **Primary**: 主 agent，可直接作为入口调用\n- **Sub agent**: 子 agent，通常由主 agent 自动调度\n- **EXP**: 昂贵（使用高级模型）\n- **CHEAP**: 便宜（性价比高）\n- **FREE**: 免费（使用免费模型）\n\n### Agent 分类\n\n```\nPrimary Agents（主 agent）: 4个 - 负责任务编排和执行\n├── Sisyphus（西西弗斯）- 主编排\n├── Hephaestus（赫菲斯托斯）- 深度实现\n├── Atlas（阿特拉斯）- 会话编排\n└── Prometheus（普罗米修斯）- 战略规划\n\nSub Agents（子 agent/专家）: 7个 - 提供专业领域支持\n├── Metis（墨提斯）- 预规划分析\n├── Momus（摩摩斯）- 计划验证\n├── Oracle（神谕）- 设计/调试顾问\n├── Librarian（莱布瑞恩）- 文档/代码搜索\n├── Explore（艾克斯）- 快速代码探索\n├── Multimodal Looker（莫达尔）- 图像/PDF分析\n└── Sisyphus-Junior（小西西弗斯）- 子任务执行\n```\n\u003e 💡 **Agent 分类说明**：根据 [官方文档](https://github.com/code-yeongyu/oh-my-opencode/blob/dev/docs/features.md)，将 agents 分为 **Core Agents（核心执行类）** 和 **Planning Agents（规划咨询类）** 两大类。Core Agents 负责实际执行和代码修改，Planning Agents 专注规划和分析，不具备代码写入权限。\n\n\n### 核心设计哲学\n\n- **专业化分工**: 每个 agent 都有明确的职责边界\n- **协作而非竞争**: agent 之间相互配合，形成完整工作流\n- **推石头精神**: 任务不完成绝不停止（Sisyphus 核心机制）\n\n## Primary Agents（主 agent）\n\n主 agent 是你日常使用的主力，可以直接调用或作为入口点，使用`Tab`可以快速切换。\n\n### Sisyphus | 西西弗斯\n\n| 属性 | 详情 |\n|------|------|\n| **角色** | 推石头者 |\n| **中文名** | 西西弗斯 |\n| **希腊神话原型** | 被惩罚永远推石头上山的智者 |\n| **模型** | `anthropic/claude-opus-4-6` |\n| **Fallback** | glm-5 → kimi-k2.5 → gpt-5.3-codex → gemini-3-pro |\n| **温度** | 0.1 |\n| **成本** | EXPENSIVE |\n\n**核心定位**: 主编排器、团队协调者\n\n**工作机制**:\n\n```\n用户请求 → 西西弗斯分析 → 并行启动 sub agent:\n  ├── 艾克斯: 快速找代码\n  ├── 莱布瑞恩: 查官方文档\n  ├── 神谕: 给架构建议\n  └── 赫菲斯托斯: 执行具体实现\n  ↓\n汇总结果 → 持续推动直到100%完成\n```\n\n**特点**:\n\n- 🔱 不自己埋头苦干，而是组建团队并行工作\n- ⚡ 核心机制是\"推石头\"——任务不完成绝不停止\n- 🎯 擅长复杂项目管理、多 agent 协调\n\n**读写权限**: ✅ 全权限（可以创建任务、调用其他 agent、读写文件）\n\n**使用场景**:\n\n```bash\n# 终端执行\nopencode\n\n# 进入 TUI 后输入：\n重构整个认证系统\n\n# 使用 ulw 魔法词（最推荐）\nulw 优化这个React应用的性能\n```\n\n### Hephaestus | 赫菲斯托斯\n\n| 属性 | 详情 |\n|------|------|\n| **角色** | 锻造之神 |\n| **中文名** | 赫菲斯托斯 |\n| **希腊神话原型** | 火与锻造之神，众神的工匠 |\n| **模型** | `openai/gpt-5.3-codex` |\n| **Fallback** | glm-5 → glm-4.7 |\n| **温度** | 0.1 |\n| **成本** | EXPENSIVE |\n\n**核心定位**: 自主深度工作者、端到端实现者\n\n\u003e 💡 **国产模型备选**: 当 GPT-5.3-Codex 不可用时，可使用 GLM-5（Agentic Coding 能力强）或 GLM-4.7（性价比高）作为备选。\n\n**工作机制**:\n\n```\n用户目标 → 赫菲斯托斯启动预研:\n  ├── 启动 2-5 个 艾克斯 agent 并行探索\n  ├── 启动 莱布瑞恩 研究最佳实践\n  └── 分析项目风格模式\n  ↓\n制定计划 → 独立执行 → 验证测试 → 完成交付\n```\n\n**特点**:\n\n- 🔥 \"正当工匠\"——不抄近路，methodical 执行\n- 🎨 先探索研究，再精准实现\n- 🎯 给他一个目标，他自己搞定一切\n\n**读写权限**: ✅ 全权限（但不能创建任务，只能执行）\n\n**使用场景**:\n\n```bash\n# 终端执行\nopencode\n\n# 进入 TUI 后输入：\n给我实现一个完整的用户认证系统\n\n# 深度重构\n将这个单体应用拆分为微服务\n```\n\n**与西西弗斯的区别**:\n\n- **西西弗斯**: 我给你规划，让团队来做\n- **赫菲斯托斯**: 我自己研究，我自己做，直到完成\n\n### Atlas | 阿特拉斯\n\n| 属性 | 详情 |\n|------|------|\n| **角色** | 擎天神 |\n| **中文名** | 阿特拉斯 |\n| **希腊神话原型** | 撑起天空的泰坦 |\n| **模型** | `anthropic/claude-sonnet-4-5` |\n| **Fallback** | glm-5 → kimi-k2.5 → gpt-5.2 |\n| **温度** | 0.1 |\n| **成本** | EXPENSIVE |\n\n**核心定位**: 会话级编排者、大型项目协调者\n\n**工作机制**:\n\n```\n大型项目启动 → 阿特拉斯接管:\n  ├── 分析整体架构\n  ├── 规划阶段性目标\n  ├── 协调 西西弗斯 执行具体阶段\n  └── 监控进度，处理阻塞\n```\n\n**特点**:\n\n- 🌍 宏观视角，管理整个会话生命周期\n- 🏗️ 在更大时间尺度上协调工作\n- ⚖️ 适合长期项目（数小时到数天）\n\n**读写权限**: ✅ 全权限（但不能直接调用其他 agent）\n\n\u003e ⚠️ **已知问题**: Atlas 目前存在 `ask_user` 工具权限配置问题，可能无法正常与用户交互（参见 [Issue #1239](https://github.com/code-yeongyu/oh-my-opencode/issues/1239)）。\n\n**使用场景**:\n\n```bash\n# 终端执行\nopencode\n\n# 进入 TUI 后输入：\n开发一个完整的电商平台，需要数天时间\n```\n\n**与西西弗斯的区别**:\n\n- **西西弗斯**: 任务级编排（单个任务内）\n- **阿特拉斯**: 会话级编排（跨多个任务/会话）\n\n### Prometheus | 普罗米修斯\n\n| 属性 | 详情 |\n|------|------|\n| **角色** | 先知 |\n| **中文名** | 普罗米修斯 |\n| **希腊神话原型** | 为人类盗取火种的泰坦 |\n| **模型** | `anthropic/claude-opus-4-6` |\n| **Fallback** | kimi-k2.5 → gpt-5.2 → gemini-3-pro |\n| **温度** | 0.1 |\n| **成本** | EXPENSIVE |\n\n**核心定位**: 战略规划者、计划制定者\n\n**⚠️ 重要限制: 只计划，不写代码！**\n\n**工作机制**:\n\n```\n用户需求 → 普罗米修斯深度分析:\n  ├── 墨提斯: 预规划咨询\n  ├── 莱布瑞恩: 调研技术方案\n  └── 摩摩斯: 验证可行性\n  ↓\n生成详细工作计划 → 交给 赫菲斯托斯/西西弗斯 执行\n```\n\n**特点**:\n\n- 🔮 深度分析，制定完整计划\n- 📋 从不实现，专注规划\n- 🎯 项目启动前的战略规划\n\n**读写权限**: ❌ **只读**（禁止 write, edit, task, call_omo_agent）\n\n**使用场景**:\n\n```bash\n# 终端执行\nopencode\n\n# 进入 TUI 后输入：\n帮我规划这个系统的架构\n\n# 分析实现方案\n分析实现这个功能的最佳方案\n```\n\n**当普罗米修斯完成规划后，可以通过以下方式切换到执行阶段：**\n\n- **方法 1**: 输入 `/start-work` 命令\n- **方法 2**: 按 **Tab 键** 从 Plan Mode 切换到 Build Mode\n\n**执行流程：**\n\n```\n用户确认计划 → /start-work 或按 Tab\n    ↓\n切换到 Atlas（擎天神）执行模式\n    ↓\nAtlas 接管会话级编排:\n  ├── 分析整体架构\n  ├── 规划阶段性目标\n  ├── 协调 西西弗斯 执行具体阶段\n  └── 监控进度，处理阻塞\n    ↓\n西西弗斯 并行启动 sub agent:\n  ├── 艾克斯: 快速找代码\n  ├── 莱布瑞恩: 查官方文档\n  ├── 神谕: 给架构建议\n  └── 赫菲斯托斯: 执行具体实现\n    ↓\n持续推动直到 100% 完成\n```\n\n**权限变化**: 从只读（Plan Mode）→ 可读写（Execute Mode / Build Mode）\n\n\u003e ⚠️ 在某些情况下，`/start-work` 后 READ-ONLY 模式可能持续存在，导致无法正常写入代码（参见 [Issue #864](https://github.com/code-yeongyu/oh-my-opencode/issues/864)）。\n\n## Sub Agents（子 agent）\n\n子 agent 通常不直接调用，而是由主 agent 自动调度。但了解它们有助于理解工作流。\n\n### Metis | 墨提斯\n\n| 属性 | 详情 |\n|------|------|\n| **角色** | 智慧女神 |\n| **中文名** | 墨提斯 |\n| **模型** | `anthropic/claude-opus-4-6` |\n| **Fallback** | kimi-k2.5 → gpt-5.2 → gemini-3-pro |\n| **温度** | **0.3**（最高，增加创造性） |\n| **成本** | EXPENSIVE |\n\n**核心定位**: 预规划分析顾问\n\n**特点**:\n\n- 💡 项目启动前的可行性分析\n- 🔍 深度分析，多角度思考\n- 🌡️ **温度 0.3**（所有 agent 中最高，增加创造性）\n\n**工作机制**: 为普罗米修斯提供咨询建议\n\n**读写权限**: ❌ 只读\n\n### Momus | 摩摩斯\n\n| 属性 | 详情 |\n|------|------|\n| **角色** | 讽刺之神 |\n| **中文名** | 摩摩斯 |\n| **模型** | `openai/gpt-5.2` |\n| **Fallback** | glm-5 → claude-opus-4-6 → gemini-3-pro |\n| **温度** | 0.1 |\n| **成本** | EXPENSIVE |\n\n**核心定位**: 计划验证者、批评者\n\n**特点**:\n\n- 🎭 \"魔鬼代言人\"——挑刺确保计划可行\n- 🔍 检查逻辑漏洞、验证资源需求、识别依赖风险\n- ⚖️ 验证普罗米修斯制定的计划\n\n**工作机制**: 审查并给出改进建议\n\n**读写权限**: ❌ 只读\n\n### Oracle | 神谕\n\n| 属性 | 详情 |\n|------|------|\n| **角色** | 神谕 |\n| **中文名** | 神谕 |\n| **模型** | `openai/gpt-5.2` |\n| **Fallback** | glm-5 → claude-opus-4-6 |\n| **温度** | 0.1 |\n| **成本** | EXPENSIVE |\n\n**核心定位**: 设计与调试顾问\n\n**特点**:\n\n- 🔮 问题导向，深度分析\n- 🐛 诊断问题根因，提供解决方案\n- 🎯 架构设计、Debug、性能优化建议\n\n**工作机制**: 诊断问题 → 提供方案选项 → 给出最佳实践\n\n**读写权限**: ❌ 只读（禁止 write, edit, task, call_omo_agent）\n\n**使用场景**:\n\n```bash\n# 终端执行\nopencode\n\n# 进入 TUI 后输入：\n为什么这个API这么慢？\n\n# 架构咨询\n这个架构有什么问题？\n```\n\n### Librarian | 莱布瑞恩\n\n| 属性 | 详情 |\n|------|------|\n| **角色** | 图书管理员 |\n| **中文名** | 莱布瑞恩 |\n| **模型** | `zai-coding-plan/glm-4.7` |\n| **Fallback** | glm-4.7-free → claude-sonnet-4-5 |\n| **温度** | 0.1 |\n| **成本** | CHEAP |\n\n**核心定位**: 文档与代码研究者\n\n**特点**:\n\n- 📚 系统性搜索与整理\n- 🔍 官方文档查询、开源项目研究\n- 💰 性价比高（CHEAP）\n\n**工作机制**: 搜索文档 → 查找示例 → 分析最佳实践 → 整理报告\n\n**读写权限**: ❌ 只读（禁止 write, edit, task, call_omo_agent）\n\n**使用场景**:\n\n```bash\n# 终端执行\nopencode\n\n# 进入 TUI 后输入：\nReact Server Components 的工作原理是什么？\n\n# 查找示例\n查找这个开源库的使用示例\n```\n\n### Explore | 艾克斯\n\n| 属性 | 详情 |\n|------|------|\n| **角色** | 探索者 |\n| **中文名** | 艾克斯 |\n| **模型** | `anthropic/claude-haiku-4-5` |\n| **Fallback** | glm-4.7-free → gpt-5-mini → gpt-5-nano |\n| **温度** | 0.1 |\n| **成本** | FREE |\n\n**核心定位**: 极速代码库探索\n\n**特点**:\n\n- 🚀 最快速度\n- ⚡ 并行、广度优先搜索\n- 📚 最多级 fallback（4层备用模型）\n\n**工作机制**: 并行grep → 快速定位 → 返回精准位置\n\n**读写权限**: ❌ 只读（禁止 write, edit, task, call_omo_agent）\n\n**使用场景**:\n\n```bash\n# 终端执行\nopencode\n\n# 进入 TUI 后输入：\n认证中间件在哪个文件？\n\n# 搜索用法\n找到所有使用 useEffect 的地方\n```\n\n### Multimodal Looker | 莫达尔\n\n| 属性 | 详情 |\n|------|------|\n| **角色** | 多模态观察者 |\n| **中文名** | 莫达尔 |\n| **模型** | `google/gemini-3-flash` |\n| **Fallback** | gpt-5.2 → glm-4.6v → kimi-k2.5 → claude-haiku-4-5 → gpt-5-nano |\n| **温度** | 0.1 |\n| **成本** | CHEAP |\n\n**核心定位**: 视觉内容分析\n\n**特点**:\n\n- 👁️ 图像理解、文档解析\n- 🖼️ PDF分析、截图理解、图表解析\n- 💰 价格便宜（CHEAP）\n\n\u003e 💡 **国产模型备选**: Kimi K2.5 具有强大的原生多模态能力，擅长截图转代码、视频理解等视觉任务。\n\n**工作机制**: 提取文本 → 理解视觉结构 → 总结关键信息\n\n**读写权限**: ❌ **仅 read**（只允许 read 工具）\n\n**使用场景**:\n\n```bash\n# 终端执行\nopencode\n\n# 进入 TUI 后输入：\n分析这个API文档的截图\n\n# 提取PDF\n提取这个PDF中的表格数据\n```\n\n### Sisyphus-Junior | 小西西弗斯\n\n| 属性 | 详情 |\n|------|------|\n| **角色** | 推石头者·少年版 |\n| **中文名** | 小西西弗斯 |\n| **模型** | `anthropic/claude-sonnet-4-5` |\n| **Fallback** | 用户指定配置可能被忽略 |\n| **温度** | 0.1 |\n| **成本** | EXPENSIVE |\n\n**核心定位**: 被委托任务执行者\n\n\n\u003e ⚠️ **注意**: 此 agent 由 category 系统自动生成，**用户不应直接调用**。它是当主 agent 使用 category 委派任务时自动创建的执行者。\n\n\u003e 💡 **模型配置**: Sisyphus-Junior 使用 category 委派时的模型配置，或默认使用 `anthropic/claude-sonnet-4-5`。在 `oh-my-opencode.json`中配置`agents.sisyphus-junior.model` 会被忽略（参见 [Issue #1295](https://github.com/code-yeongyu/oh-my-opencode/issues/1295)）。\n\n\n**特点**:\n\n- 🤖 由 category 系统（如 `visual-engineering`、`deep` 等）自动创建\n- 🎯 执行西西弗斯/阿特拉斯委托的具体子任务\n- 🎓 专注执行，不越权\n\n**工作机制**: 接收指令 → 专注完成 → 汇报结果\n\n**读写权限**: ⚠️ 受限（禁止 task 工具，不能创建新任务）\n\n\n## Agent 协作机制\n\n### 协作关系图\n\n```\n用户请求\n    │\n    ▼\n┌─────────────────────────────────────┐\n│         Primary Agents              │\n├─────────────────────────────────────┤\n│                                     │\n│  [Plan Mode]                        │\n│   普罗米修斯 ──制定计划──┐          │\n│        │                │          │\n│   墨提斯(咨询)  摩摩斯(验证)         │\n│        │                │          │\n│        └────────┬───────┘          │\n│                 │                   │\n│         用户: /start-work 或 Tab 切换     │\n│                 ▼                   │\n│  [Execute Mode]                     │\n│   西西弗斯 ──协调执行──┐           │\n│   阿特拉斯 ──会话编排─┤           │\n│   赫菲斯托斯─独立实现─┘           │\n│        │                            │\n│        ▼                            │\n│  小西西弗斯 (执行子任务)             │\n│                                     │\n└─────────────────────────────────────┘\n              │\n              ▼\n┌─────────────────────────────────────┐\n│      Sub Agents (专家)              │\n├─────────────────────────────────────┤\n│                                     │\n│  神谕 ─────── 设计/调试顾问      │\n│  莱布瑞恩 ─────── 文档/代码研究      │\n│  艾克斯 ──────── 极速代码搜索        │\n│  莫达尔 ──────── 图像/PDF分析        │\n│                                     │\n└─────────────────────────────────────┘\n```\n\n### 调用链示例\n\n**典型工作流**:\n\n```\n用户: \"实现用户认证\"\n    ↓\n普罗米修斯: 制定计划\n    ├── 墨提斯: 需求分析\n    ├── 莱布瑞恩: 调研JWT\n    └── 摩摩斯: 验证方案\n    ↓\n西西弗斯: 协调执行\n    ├── 艾克斯: 找现有代码\n    ├── 神谕: 安全建议\n    └── 赫菲斯托斯: 实现代码\n    ↓\n任务完成\n```\n\n## 使用场景与示例\n\n### 场景 1: 快速开发功能（最常用）\n\n**需求**: 实现一个完整的用户认证系统\n\n**推荐入口**: Hephaestus（赫菲斯托斯）\n\n```bash\n# 终端执行\nopencode\n\n# 进入 TUI 后输入：\n给我实现一个完整的用户认证系统，包括注册、登录、密码重置\n```\n\n**执行过程**:\n\n1. 赫菲斯托斯启动预研，调用多个艾克斯并行搜索\n2. 莱布瑞恩研究 JWT 最佳实践\n3. 神谕提供安全建议\n4. 赫菲斯托斯独立完成实现\n5. 自动测试验证\n\n**预计耗时**: 10-30分钟（取决于复杂度）\n\n### 场景 2: 复杂项目重构\n\n**需求**: 重构整个前端架构\n\n**推荐入口**: Sisyphus（西西弗斯）+ `ulw` 关键词\n\n```bash\n# 终端执行\nopencode\n\n# 进入 TUI 后输入：\nulw 重构整个前端架构，从 Class 组件迁移到 Hooks\n```\n\n**执行过程**:\n\n1. 西西弗斯分析整体影响\n2. 协调多个 agent 并行工作\n3. 小西西弗斯批量处理不同模块\n4. 持续推动直到全部完成\n\n**预计耗时**: 1-数小时（ultrawork 模式会持续执行）\n\n### 场景 3: 先规划再执行\n\n**需求**: 开发一个新的电商平台\n\n**推荐入口**: Prometheus（普罗米修斯）→ Hephaestus（赫菲斯托斯）\n\n**步骤 1**: 规划阶段\n\n```bash\n# 终端执行\nopencode\n\n# 进入 TUI 后输入：\n我要做一个电商网站，帮我规划一下架构和技术选型\n# 会自动触发普罗米修斯\n```\n\n**步骤 2**: 执行阶段（根据生成的计划）\n\n```bash\n# 在 TUI 中继续输入：\n按照刚才的计划，开始实现用户模块\n# 会自动触发赫菲斯托斯\n```\n\n### 场景 4: 快速定位代码\n\n**需求**: 找到特定功能的实现位置\n\n**推荐入口**: Explore（艾克斯）\n\n```bash\n# 终端执行\nopencode\n\n# 进入 TUI 后输入：\n找到认证中间件的实现代码\n# 会自动触发艾克斯（最快最经济）\n```\n\n**预计耗时**: 几秒钟\n\n### 场景 5: Debug 问题\n\n**需求**: API 响应很慢，需要诊断\n\n**推荐入口**: Oracle（神谕）\n\n```bash\n# 终端执行\nopencode\n\n# 进入 TUI 后输入：\n这个API响应很慢，帮我找出原因并优化\n# 会自动触发神谕，然后由赫菲斯托斯实施修复\n```\n\n**执行过程**:\n\n1. 神谕诊断问题根因\n2. 艾克斯搜索相关代码\n3. 莱布瑞恩查性能优化文档\n4. 赫菲斯托斯实施修复\n\n### 场景 6: 研究技术方案\n\n**需求**: 了解新技术的工作原理\n\n**推荐入口**: Librarian（莱布瑞恩）\n\n```bash\n# 终端执行\nopencode\n\n# 进入 TUI 后输入：\nReact Server Components 的工作原理是什么？\n# 会自动触发莱布瑞恩\n```\n\n**预计耗时**: 1-2分钟\n\n\n## 最佳实践\n\n### 懒人模式（推荐）\n\n```bash\n# 终端执行\nopencode\n\n# 进入 TUI 后输入：\nulw 你的需求描述\n# 一切交给西西弗斯\n```\n\n### 精准控制\n\n```bash\n# 终端执行\nopencode\n\n# 进入 TUI 后输入：\n用赫菲斯托斯实现用户注册功能\n\n# 或先规划再执行\n用普罗米修斯规划这个系统\n```\n\n### 分阶段工作\n\n```bash\n# 终端执行\nopencode\n\n# 阶段1: 规划（在 TUI 中输入）\n帮我规划电商网站架构\n\n# 阶段2: 实现（继续在 TUI 中输入）\n按照刚才的计划，开始实现用户模块\n\n# 阶段3: 优化（继续在 TUI 中输入）\n优化刚才实现的代码性能\n```\n\n### 充分利用 sub agent\n\n```bash\n# 终端执行\nopencode\n\n# 进入 TUI 后输入：\n莱布瑞恩，查一下 React 19 的新特性\n\n# 快速定位代码\n艾克斯，找到所有使用 Redux 的地方\n```\n\n## 快速参考表\n\n### 模型配置\n\n| Agent | 主模型 | Fallback 链 |\n|-------|--------|-------------|\n| Sisyphus | `anthropic/claude-opus-4-6` | glm-5 → kimi-k2.5 → gpt-5.3-codex → gemini-3-pro |\n| Hephaestus | `openai/gpt-5.3-codex` | glm-5 → glm-4.7 |\n| Atlas | `anthropic/claude-sonnet-4-5` | glm-5 → kimi-k2.5 → gpt-5.2 |\n| Prometheus | `anthropic/claude-opus-4-6` | kimi-k2.5 → gpt-5.2 → gemini-3-pro |\n| Oracle | `openai/gpt-5.2` | glm-5 → claude-opus-4-6 |\n| Librarian | `zai-coding-plan/glm-4.7` | glm-4.7-free → claude-sonnet-4-5 |\n| Explore | `anthropic/claude-haiku-4-5` | glm-4.7-free -\u003e gpt-5-mini → gpt-5-nano |\n| Multimodal Looker | `google/gemini-3-flash` | gpt-5.2 → glm-4.6v → kimi-k2.5 → claude-haiku-4-5 → gpt-5-nano |\n| Metis | `anthropic/claude-opus-4-6` | kimi-k2.5 → gpt-5.2 → gemini-3-pro |\n| Momus | `openai/gpt-5.2` | glm-5 → gpt-5.2 → claude-opus-4-6 → gemini-3-pro |\n| Sisyphus Junior | `anthropic/claude-sonnet-4-5` | 继承对应category任务的模型配置，用户手动配置会被忽略 |\n\n### Agent 速选\n\n| 你的需求 | 启动 Agent | TUI 中输入示例 |\n|----------|------------|----------|\n| \"实现一个功能\" | **Hephaestus（赫菲斯托斯）** | `实现用户认证` |\n| \"协调复杂项目\" | **Sisyphus（西西弗斯）** | `ulw 重构项目` |\n| \"长期大型项目\" | **Atlas（阿特拉斯）** | `开发电商平台` |\n| \"先规划再执行\" | **Prometheus（普罗米修斯）** | `规划系统架构` |\n| \"快速找代码\" | **Explore（艾克斯）** | `找到中间件` |\n| \"研究技术\" | **Librarian（莱布瑞恩）** | `Redux 原理` |\n| \"Debug问题\" | **Oracle（神谕）** | `为什么API慢？` |\n| \"分析文档图片\" | **Multimodal Looker（莫达尔）** | `分析这个截图` |\n\n### 魔法词速查\n\n| 关键词 | 作用 | TUI 中输入示例 |\n|--------|------|------|\n| `ulw` / `ultrawork` | 触发并行 agent、背景任务、持续执行 | `ulw 重构应用` |\n| `ask oracle` | 调用神谕咨询 | `ask oracle 分析架构` |\n| `ask librarian` | 调用莱布瑞恩研究 | `ask librarian 查文档` |\n| Tab 键 | Plan Mode ↔ Build Mode 切换 | 按 Tab 循环切换模式 / 进入规划模式后可按 Tab 开始执行 |\n\n### 权限矩阵\n\n\u003e ⚠️ **免责声明**: 以下权限矩阵基于 oh-my-opencode 官方文档整理。部分 agent 存在已知的配置 Bug，实际权限可能因版本而异。建议在 `~/.config/opencode/oh-my-opencode.json` 中查看并自定义配置。\n\n| Agent | read | write | edit | bash | task | call_omo_agent |\n|-------|------|-------|------|------|------|----------------|\n| Sisyphus | ✅ | ✅ | ✅ | ✅ | ✅ | ✅ |\n| Hephaestus | ✅ | ✅ | ✅ | ✅ | ❌ | ✅ |\n| Atlas | ✅ | ✅ | ✅ | ✅ | ❌ | ❌ |\n| Prometheus | ✅ | ❌ | ❌ | ✅ | ❌ | ❌ |\n| Metis | ✅ | ❌ | ❌ | ✅ | ❌ | ❌ |\n| Momus | ✅ | ❌ | ❌ | ✅ | ❌ | ❌ |\n| Oracle | ✅ | ❌ | ❌ | ✅ | ❌ | ❌ |\n| Librarian | ✅ | ❌ | ❌ | ✅ | ❌ | ❌ |\n| Explore | ✅ | ❌ | ❌ | ✅ | ❌ | ❌ |\n| Multimodal Looker | ✅ | ❌ | ❌ | ❌ | ❌ | ❌ |\n| Sisyphus-Junior | ✅ | ✅ | ✅ | ✅ | ❌ | ✅ |\n\n## 参考链接\n\n- [oh-my-opencode GitHub 仓库](https://github.com/code-yeongyu/oh-my-opencode) - 官方源码和最新版本\n- [oh-my-opencode 配置文档](https://github.com/code-yeongyu/oh-my-opencode/blob/dev/docs/configurations.md) - 详细的配置说明\n- [oh-my-opencode 功能文档](https://github.com/code-yeongyu/oh-my-opencode/blob/dev/docs/reference/features.md) - 功能特性介绍\n- [oh-my-opencode AGENTS.md](https://github.com/code-yeongyu/oh-my-opencode/blob/dev/AGENTS.md) - Agent 详细配置\n- [OpenCode 官方文档](https://opencode.ai/docs/) - OpenCode 基础使用指南\n- [OpenCode Agents 文档](https://opencode.ai/docs/agents/) - Agent 使用和配置\n- [OpenCode 模式文档](https://opencode.ai/docs/modes/) - Plan/Build 模式说明"])</script><script>self.__next_f.push([1,"27:T377d,"])</script><script>self.__next_f.push([1,"\n\u003e OpenCode Sub Agent 让 AI 助手实现\"分工协作\"，复杂任务并行处理，效率倍增。\n\n## 为什么需要 Sub Agent\n\n使用传统 AI 编程助手时，所有任务都在同一个对话中完成。分析代码、修改文件、搜索文档——这些操作串行执行，效率受限。\n\nOpenCode 的 Sub Agent 解决了这个问题：\n\n- **并行处理**：多个任务同时执行\n- **专业化分工**：不同代理负责不同领域\n- **上下文隔离**：子任务不污染主对话\n- **权限管控**：精细化控制每个代理的能力\n\n## Agent 类型详解\n\nOpenCode 有两种 Agent 类型：Primary（主代理）和 Sub（子代理）。\n\n### Primary Agent（主代理）\n\n直接与用户交互，处理主要对话。\n\n| 代理 | 模式 | 特点 |\n|------|------|------|\n| **Build** | Primary | 默认代理，拥有全部工具权限 |\n| **Plan** | Primary | 受限代理，仅分析和规划，不修改代码 |\n\n**切换方式**：按 `Tab` 键循环切换。\n\n### Sub Agent（子代理）\n\n由主代理调用，处理特定任务。\n\n| 代理 | 用途 |\n|------|------|\n| **General** | 通用任务，支持文件修改 |\n| **Explore** | 代码库探索，只读模式 |\n\n**调用方式**：`@agent-name` 手动调用，或由主代理自动调用。\n\n### 系统代理\n\n| 代理 | 模式 | 状态 | 功能 |\n|------|------|------|------|\n| **Compaction** | primary | 隐藏 | 自动压缩长上下文 |\n| **Title** | primary | 隐藏 | 自动生成会话标题 |\n| **Summary** | primary | 隐藏 | 自动创建会话摘要 |\n\n## 内置代理使用指南\n\n### Build 代理\n\n全能型代理，适合日常开发。\n\n**适用场景**：\n- 编写和修改代码\n- 执行系统命令\n- 完整的开发任务\n\n**特点**：所有工具默认启用。\n\n### Plan 代理\n\n安全分析型代理，适合代码审查。\n\n**默认权限**：\n- 文件编辑：需要确认（ask）\n- Bash 命令：需要确认（ask）\n\n**适用场景**：\n- 代码审查\n- 架构规划\n- 方案设计\n\n### General 子代理\n\n通用任务处理专家。\n\n```\n@general 帮我并行处理以下任务：\n1. 搜索所有使用了 fetch API 的文件\n2. 分析 package.json 中的依赖\n3. 列出 components 目录下的所有组件\n```\n\n**特点**：\n- 完整工具访问（除 todo 外）\n- 可修改文件\n- 适合多任务并行\n\n### Explore 子代理\n\n代码库探索专家。\n\n```\n@explore 找出项目中所有自定义 Hook 的使用位置\n```\n\n**特点**：\n- 只读模式，不会修改文件\n- 快速搜索和定位\n- 安全探索代码库\n\n## 配置方法\n\n### JSON 配置\n\n在项目根目录创建 `opencode.json`：\n\n```json\n{\n  \"$schema\": \"https://opencode.ai/config.json\",\n  \"agent\": {\n    \"build\": {\n      \"mode\": \"primary\",\n      \"model\": \"anthropic/claude-sonnet-4-20250514\",\n      \"tools\": {\n        \"write\": true,\n        \"edit\": true,\n        \"bash\": true\n      }\n    },\n    \"code-reviewer\": {\n      \"description\": \"代码审查专家\",\n      \"mode\": \"subagent\",\n      \"model\": \"anthropic/claude-sonnet-4-20250514\",\n      \"prompt\": \"专注于代码质量、安全性和性能优化\",\n      \"tools\": {\n        \"write\": false,\n        \"edit\": false\n      }\n    }\n  }\n}\n```\n\n### Markdown 配置\n\n将代理配置文件保存为 `.md` 格式，支持两种保存位置：\n\n- **全局配置**：`~/.config/opencode/agents/`（所有项目可用）\n- **项目配置**：`.opencode/agents/`（当前项目专用）\n\n例如，在全局目录创建 `review.md`：\n\n```markdown\n---\ndescription: 代码审查专家\nmode: subagent\nmodel: anthropic/claude-sonnet-4-20250514\ntemperature: 0.1\ntools:\n  write: false\n  edit: false\n  bash: false\n---\n\n专注于：\n- 代码质量和最佳实践\n- 潜在 Bug 和边界情况\n- 性能影响\n- 安全考虑\n\n仅提供建议，不做直接修改。\n```\n\n## 核心配置选项\n\n### Temperature（温度）\n\n控制输出的创造性和随机性。\n\n| 范围 | 适用场景 |\n|------|----------|\n| 0.0-0.2 | 代码分析、规划（确定性高） |\n| 0.3-0.5 | 一般开发任务（平衡） |\n| 0.6-1.0 | 头脑风暴、探索（创造性高） |\n\n\u003e **默认值**：如果未指定温度，OpenCode 使用模型默认值（大多数模型为 0，Qwen 模型为 0.55）。\n\n### Max Steps（最大步数）\n\n限制代理的迭代次数，控制成本。\n\n```json\n{\n  \"agent\": {\n    \"quick-thinker\": {\n      \"steps\": 5\n    }\n  }\n}\n```\n\n### Permissions（权限）\n\n精细控制工具权限。\n\n```json\n{\n  \"agent\": {\n    \"review\": {\n      \"permission\": {\n        \"edit\": \"deny\",\n        \"bash\": {\n          \"*\": \"ask\",\n          \"git status\": \"allow\"\n        }\n      }\n    }\n  }\n}\n```\n\n权限级别：\n- `ask`：执行前询问\n- `allow`：允许执行\n- `deny`：禁止执行\n\n### Mode（模式）\n\n```json\n{\n  \"agent\": {\n    \"my-agent\": {\n      \"mode\": \"subagent\"  // primary | subagent | all\n    }\n  }\n}\n```\n\n### Hidden（隐藏）\n\n隐藏子代理，不让其在 `@` 菜单中显示。\n\n```json\n{\n  \"agent\": {\n    \"internal-helper\": {\n      \"mode\": \"subagent\",\n      \"hidden\": true\n    }\n  }\n}\n```\n\n### Top P（采样控制）\n\n控制响应多样性的温度替代方案。\n\n```json\n{\n  \"agent\": {\n    \"brainstorm\": {\n      \"top_p\": 0.9\n    }\n  }\n}\n```\n\n值范围 0.0-1.0：低值更聚焦，高值更多样。\n\n### Color（颜色）\n\n自定义代理在 UI 中的显示颜色。\n\n支持十六进制颜色（如 `#FF5733`）或主题色：`primary`、`secondary`、`accent`、`success`、`warning`、`error`、`info`。\n\n```json\n{\n  \"agent\": {\n    \"code-reviewer\": {\n      \"color\": \"accent\"\n    },\n    \"creative\": {\n      \"color\": \"#ff6b6b\"\n    }\n  }\n}\n```\n\n### Disable（禁用）\n\n设置为 `true` 禁用代理。\n\n```json\n{\n  \"agent\": {\n    \"review\": {\n      \"disable\": true\n    }\n  }\n}\n```\n\n### Task Permission（代理调用权限）\n\n控制代理可以调用哪些子代理，使用 glob 模式匹配。\n\n```json\n{\n  \"agent\": {\n    \"orchestrator\": {\n      \"mode\": \"primary\",\n      \"permission\": {\n        \"task\": {\n          \"*\": \"deny\",\n          \"orchestrator-*\": \"allow\",\n          \"code-reviewer\": \"ask\"\n        }\n      }\n    }\n  }\n}\n```\n\n### Prompt（自定义提示）\n\n指定自定义系统提示文件。\n\n```json\n{\n  \"agent\": {\n    \"code-reviewer\": {\n      \"prompt\": \"{file:./prompts/code-review.txt}\"\n    }\n  }\n}\n```\n\n路径相对于配置文件所在位置。\n\n### Model（模型选择）\n\n为不同代理使用不同模型。\n\n```json\n{\n  \"agent\": {\n    \"plan\": {\n      \"model\": \"anthropic/claude-haiku-4-20250514\"\n    },\n    \"build\": {\n      \"model\": \"anthropic/claude-sonnet-4-20250514\"\n    }\n  }\n}\n```\n\n模型 ID 格式：`provider/model-id`。\n\n### Other（传递给模型的参数）\n\n其他选项会直接传递给模型提供商。\n\n```json\n{\n  \"agent\": {\n    \"deep-thinker\": {\n      \"description\": \"使用高推理努力解决复杂问题\",\n      \"model\": \"openai/gpt-5\",\n      \"reasoningEffort\": \"high\"\n    }\n  }\n}\n```\n\n## 实战技巧\n\n### 手动调用子代理\n\n```\n@general 帮我分析这个函数的性能瓶颈\n@explore 查找项目中所有未使用的导入\n```\n\n### 会话导航\n\n当子代理创建子会话时：\n\n- `\u003cLeader\u003e+Right`：向前切换（parent → child1 → child2）\n- `\u003cLeader\u003e+Left`：向后切换（child2 → child1 → parent）\n\n### 并行任务\n\n让 General 子代理并行处理多个独立任务：\n\n```\n@general 同时执行：\n1. 检查 src/utils/ 目录下所有文件\n2. 分析 tests/ 目录的测试覆盖率\n3. 搜索所有 TODO 注释\n```\n\n### 安全审查工作流\n\n```\n使用 Plan 代理分析代码 → \n@code-reviewer 审查安全风险 → \nBuild 代理实施修改\n```\n\n## 自定义代理创建\n\n使用命令行快速创建：\n\n```bash\nopencode agent create\n```\n\n交互式流程：\n1. 选择保存位置（全局/项目）\n2. 描述代理用途\n3. 生成系统提示词\n4. 选择可用工具\n5. 创建 Markdown 配置文件\n\n## 典型使用场景\n\n| 场景 | 推荐代理 | 配置要点 |\n|------|----------|----------|\n| 日常开发 | Build | 全工具开启 |\n| 代码审查 | Plan / 自定义 Review | 只读，温度 0.1-0.2 |\n| 代码探索 | Explore | 只读 |\n| 安全审计 | Security Auditor | 禁止写操作，温度 0.1 |\n| 文档编写 | Docs Writer | 禁用 bash |\n| 多任务并行 | General | 全工具 |\n| 调试问题 | Debug | 禁止写操作，温度 0.2 |\n| 创意探索 | Creative | 高温度 0.8，high top_p |\n| 快速规划 | Plan (Haiku) | 使用 Haiku 模型节省成本 |\n\n## 实用示例\n\n### 代码审查代理配置示例\n\n```markdown\n---\ndescription: 代码审查专家\nmode: subagent\ntemperature: 0.1\ntools:\n  write: false\n  edit: false\n---\n\n审查重点：\n- 代码规范\n- 潜在 Bug\n- 性能问题\n- 安全风险\n\n提供建设性反馈。\n```\n\n### 安全审计代理配置示例\n\n```markdown\n---\ndescription: 安全漏洞检测\nmode: subagent\ntools:\n  write: false\n  edit: false\n---\n\n关注：\n- 输入验证漏洞\n- 认证授权缺陷\n- 数据暴露风险\n- 依赖漏洞\n```\n\n### 文档编写代理配置示例\n\n```markdown\n---\ndescription: 编写和维护项目文档\nmode: subagent\nmodel: anthropic/claude-sonnet-4-20250514\ntools:\n  bash: false\n---\n\n专注于：\n- 清晰的解释\n- 合理的结构\n- 代码示例\n- 友好的语言\n```\n\n### Debug 代理配置示例\n\n```markdown\n---\ndescription: 调试专家\nmode: subagent\nmodel: anthropic/claude-sonnet-4-20250514\ntemperature: 0.2\ntools:\n  write: false\n---\n\n调试重点：\n- 分析错误堆栈\n- 追踪问题根因\n- 提供修复建议\n- 不直接修改代码\n```\n\n### 创意代理配置示例\n\n```markdown\n---\ndescription: 创意头脑风暴\nmode: subagent\nmodel: anthropic/claude-sonnet-4-20250514\ntemperature: 0.8\ntop_p: 0.9\ncolor: \"#ff6b6b\"\n---\n\n用于头脑风暴和创意探索，提供多种可能性。\n```\n\n## 实战工作流示例\n\n### 完整的代码审查工作流\n\n```\n# 1. 使用 Plan 代理分析改动\n\u003c切换到 Plan 代理\u003e\n分析最近提交的更改，列出影响范围。\n\n# 2. 使用 Explore 代理检查相关文件\n@explore 找出所有被修改的文件及其依赖关系。\n\n# 3. 使用自定义 review 代理进行审查\n@review 审查这些更改，重点关注：\n- 代码规范\n- 潜在 Bug\n- 性能影响\n- 安全风险\n\n# 4. 使用 Build 代理实施建议（如果需要）\n\u003c切换到 Build 代理\u003e\n根据 review 的建议修复发现的问题。\n```\n\n### 新功能开发工作流\n\n```\n# 1. Plan 模式制定方案\n\u003c切换到 Plan\u003e\n为用户添加「一键导出 PDF」功能，使用后端生成。\n\n# 2. 探索现有代码\n@explore 找出项目中现有的导出功能实现。\n\n# 3. 并行任务处理\n@general 同时完成：\n1. 分析现有 PDF 生成库的兼容性\n2. 设计 API 接口规范\n3. 列出需要修改的组件清单\n\n# 4. Build 模式实施\n\u003c切换到 Build\u003e\n根据 Plan 的方案开始实现。\n```\n\n### 性能优化工作流\n\n```\n# 1. 使用分析代理\n\u003c切换到 Plan\u003e\n分析项目性能瓶颈，提出优化方向。\n\n# 2. 探索相关代码\n@explore 找出所有数据库查询和 API 调用。\n\n# 3. 并行分析\n@general 并行处理：\n1. 分析前端渲染性能\n2. 分析 API 响应时间\n3. 检查是否有未优化的查询\n\n# 4. 实施优化\n\u003c切换到 Build\u003e\n根据分析结果实施性能优化。\n```\n\n### 安全审计工作流\n\n```\n# 1. 使用审计代理\n@security-audit 对整个项目进行安全审计。\n\n# 2. 深入检查特定模块\n@explore 找出所有处理用户输入的代码。\n\n# 3. 验证修复\n@security-audit 验证最新提交的安全修复是否完整。\n```\n\n### 文档更新工作流\n\n```\n# 1. 使用 docs 代理\n@docs 分析最近的代码更改，更新相关文档。\n\n# 2. 探索文档结构\n@explore 找出所有 API 文档和 README。\n\n# 3. 并行更新\n@docs 同时处理：\n1. 更新 API 文档\n2. 更新变更日志\n3. 更新使用示例\n```\n\n### 调试复杂问题工作流\n\n```\n# 1. 使用 debug 代理\n@debug 分析这个错误：[错误日志]\n\n# 2. 探索相关代码\n@explore 找出错误堆栈中涉及的所有文件。\n\n# 3. 追踪调用链\n@explore 追踪数据从入口到数据库的完整流向。\n\n# 4. 提出修复方案\n@debug 基于分析结果提供详细的修复建议。\n```\n\n## 高级技巧\n\n### 使用通配符控制工具\n\n禁用整个 MCP 服务器的工具：\n\n```json\n{\n  \"agent\": {\n    \"readonly\": {\n      \"tools\": {\n        \"mymcp_*\": false,\n        \"write\": false,\n        \"edit\": false\n      }\n    }\n  }\n}\n```\n\n### 精细化 Bash 命令权限\n\n允许特定命令，其他都需要确认：\n\n```json\n{\n  \"agent\": {\n    \"build\": {\n      \"permission\": {\n        \"bash\": {\n          \"*\": \"ask\",\n          \"git status\": \"allow\",\n          \"git diff\": \"allow\",\n          \"git log\": \"allow\"\n        }\n      }\n    }\n  }\n}\n```\n\n### 多代理协作配置\n\n配置一个编排器代理控制子代理调用：\n\n```json\n{\n  \"agent\": {\n    \"orchestrator\": {\n      \"description\": \"任务编排器\",\n      \"mode\": \"primary\",\n      \"permission\": {\n        \"task\": {\n          \"*\": \"deny\",\n          \"code-reviewer\": \"allow\",\n          \"security-audit\": \"ask\"\n        }\n      }\n    },\n    \"code-reviewer\": {\n      \"mode\": \"subagent\",\n      \"tools\": {\n        \"write\": false,\n        \"edit\": false\n      }\n    }\n  }\n}\n```\n\n### 不同场景的模型选择\n\n```json\n{\n  \"agent\": {\n    \"plan\": {\n      \"description\": \"快速规划\",\n      \"mode\": \"primary\",\n      \"model\": \"anthropic/claude-haiku-4-20250514\",\n      \"temperature\": 0.1\n    },\n    \"build\": {\n      \"description\": \"标准开发\",\n      \"mode\": \"primary\",\n      \"model\": \"anthropic/claude-sonnet-4-20250514\",\n      \"temperature\": 0.3\n    },\n    \"creative\": {\n      \"description\": \"创意探索\",\n      \"mode\": \"subagent\",\n      \"model\": \"anthropic/claude-opus-4-20250514\",\n      \"temperature\": 0.8,\n      \"top_p\": 0.9\n    }\n  }\n}\n```\n\n## 总结\n\nOpenCode Agent 的核心价值：\n\n1. **专业化分工**：不同任务交给不同专家\n2. **并行处理**：多任务同时执行，节省时间\n3. **权限隔离**：精细化控制，安全可控\n4. **上下文管理**：主对话保持清晰\n\n## 参考\n\n- [官方文档 - 代理](https://opencode.ai/docs/agents/)\n- [官方文档 - 介绍](https://opencode.ai/docs/)\n- [GitHub](https://github.com/anomalyco/opencode)\n- [社区](https://opencode.ai/discord)\n"])</script><script>self.__next_f.push([1,"28:T40f0,"])</script><script>self.__next_f.push([1,"\n## 内置工具清单\n\nOpenCode 提供了丰富的内置工具集，让 AI 能够直接操作代码库。这些工具是 OpenCode 强大能力的基石，了解它们的工作原理和配置方式，能让你更好地控制 AI 的行为。\n\n| 工具 | 功能 | 权限选项 | 使用场景 |\n|------|------|----------|----------|\n| **bash** | 执行 shell 命令 | allow/deny/ask | 运行测试、安装依赖、执行构建脚本 |\n| **read** | 读取文件内容 | allow | 分析代码、理解项目结构 |\n| **write** | 创建新文件 | allow/ask | 生成代码、创建配置文件 |\n| **edit** | 修改文件内容 | allow/ask | 重构代码、修复 Bug |\n| **patch** | 应用代码补丁 | allow/ask | 批量修改、跨文件重构 |\n| **grep** | 搜索文件内容 | allow | 查找函数定义、定位问题代码 |\n| **glob** | 列出匹配文件 | allow | 查找特定类型文件 |\n| **list** | 列出目录内容 | allow | 浏览项目结构 |\n| **webfetch** | 抓取网页内容 | allow | 获取 API 文档、技术文章 |\n| **websearch** | 网络搜索 | allow（需 `OPENCODE_ENABLE_EXA=1`）| 查找解决方案、技术资料 |\n| **skill** | 加载 SKILL.md 技能文件 | allow | 扩展 AI 能力、自定义工作流 |\n| **todowrite** | 创建/更新任务清单 | allow | 项目管理、任务跟踪 |\n| **todoread** | 读取任务清单 | allow | 查看任务进度 |\n| **question** | 向用户提问 | allow | 获取用户输入、确认操作 |\n\n\n## 高级 Slash 命令\n\n除了基础命令，OpenCode 还提供了许多高级命令，帮助你更高效地使用。\n\n| 命令 | 功能 | 使用场景 |\n|------|------|----------|\n| `/theme` | 切换主题 | 调整界面外观 |\n| `/export` | 导出对话为 Markdown | 整理和分享 |\n| `/compact` | 压缩当前会话 | 总结上下文，节省 Token |\n| `/share` | 分享当前会话 | 与团队成员合作、展示项目 |\n| `/unshare` | 取消分享当前会话 | 退出与团队成员的合作会话 |\n\n## 使用技巧\n\n### 快速上手\n\n刚开始用 OpenCode 的时候，我也是从最简单的对话开始的。其实不需要学什么特定语法，就像和同事聊天一样说出你的需求就行。\n\n**自然语言提问：别把 AI 想得太复杂**\n\n记得有一次，我需要快速搭一个后台登录页面，传统做法得先想用什么框架、怎么布局、样式怎么写。但在 OpenCode 里，我直接说：\n\n```\n当前目录下创建一个登录页面，包含用户名和密码输入框\n```\n\n就这么一句话，AI 自动给我生成了 HTML 结构、CSS 样式，甚至连表单验证的逻辑都写好了。从想法到能跑起来的页面，也就几分钟的事。\n\n这种方法特别适合那些\"有个大概想法但不想纠结细节\"的场景，比如快速原型、临时页面、或者验证一个想法。\n\n**解释代码：终于不用猜同事写的代码了**\n\n相信你一定遇到过这种情况：接手一个老项目，看到某个函数不知道它是干嘛的，注释也没有，命名还特模糊。以前得打断点、看调用链，折腾半天。\n\n现在我直接用：\n\n```\n@utils.js 中的这个函数是做什么的？\n```\n\nAI 不仅告诉我这个函数的功能，还会分析参数含义、返回值是什么、在哪里被调用过。就像有个资深工程师在旁边给你讲解一样。\n\n这个功能在接手遗留代码、阅读开源库、或者自己写的代码过久了忘了逻辑的时候特别有用。\n\n**快速修复：让 AI 当你的 Debugger**\n\n有一次我跑 Python 脚本报错，错误信息一大串，Google 了半天没找到对症的解决方案。后来试试让 OpenCode 看看：\n\n```\n修复 @app.py 中的语法错误\n```\n\n结果 AI 不仅定位到了问题（原来是个缩进问题），还告诉我为什么会这样、怎么避免下次再犯。这种\"边修边学\"的体验挺棒的，特别适合那些你觉得\"这个问题肯定有人遇到过\"的情况。\n\n**查看和切换模型：找到最适合你的\"脑袋\"**\n\n```\n/models\n```\n\n不同模型擅长的领域不一样。比如 Claude 写代码比较稳，Claude 分析需求比较强，Kimi 的长文本处理更好。有时候一个模型给的方案不满意，切换另一个试试，经常会有惊喜。当你觉得 AI 的回答\"差点意思\"的时候，换个模型可能就能得到更好的答案。\n\n**撤销操作：AI 改错了也能一键回退**\n\n```\n/undo\n```\n\n这个功能需要在 Git 管理下才能用。说实话，刚开始我还有点担心 AI 会不会乱改代码，有了撤销功能就放心多了。就算 AI 理解错了我的意思，一键就能回到之前的状态，不用担心搞砸项目。有了这个功能，你就可以放心大胆地让 AI 尝试各种修改，不用担心改坏了回不来。\n\n### 提升效率\n\n用了 OpenCode 一段时间后，我开始追求更高效的用法。以下这些技巧帮我省了不少时间。\n\n**Plan 模式：复杂任务别急着动手**\n\n有一次我需要给用户模块加一个\"回收站\"功能，涉及前端页面、后端接口、数据库表结构好几个地方。如果直接让 AI 写代码，它可能会漏掉某些边界情况。\n\n后来我学聪明了，先用 Plan 模式：\n\n1. 按 `Tab` 切换到 Plan 模式\n2. 把需求拆成小块：\n\n```\n为用户模块添加删除功能：\n1. 软删除标记（数据库层面加个 deleted_at 字段）\n2. 回收站页面（展示已删除用户，支持搜索和筛选）\n3. 恢复和永久删除选项（按钮和相关接口）\n```\n\n3. AI 会生成一个详细的执行计划，包括要改哪些文件、每个文件做什么修改\n4. 我检查一遍，发现 AI 还提醒我别忘了给回收站加权限控制，这个我差点漏了\n5. 确认没问题后，`Tab` 切回 Build 模式执行\n\n这种先规划再执行的方式，在需求比较复杂、涉及多个文件或模块时特别靠谱，比盲目开干强多了。\n\n**批量文件操作：告别机械重复劳动**\n\n之前公司有个老 Java 项目，里面大量用了 `var` 声明变量，代码审查时要求改成显式类型。几十个文件，手动改能改到天荒地老。\n\n我就让 OpenCode 帮忙：\n\n```\n将所有 .java 文件中的 var 替换为对应的类型\n```\n\nAI 先用 grep 找出所有用到 var 的地方，分析上下文推断具体类型，然后批量替换。整个过程全自动，我就喝口茶的功夫就改完了。这种\"机械重复但需要一定判断力\"的批量操作，AI 特别擅长。\n\n**代码审查：多一双眼睛看代码**\n\n我自己写的代码，有时候会有盲点，看不出问题。现在提交前会让 OpenCode 过一遍：\n\n```\n审查 @src/components 目录下的代码，找出潜在问题\n```\n\nAI 会从代码质量、安全性、性能等角度分析。比如有一次它提醒我一个 API 接口没做参数校验，可能会被 SQL 注入，这个我当时真没注意到。作为代码提交前的最后一道防线，能发现一些自己容易忽略的问题。\n\n**添加图片参考：直接把设计图\"喂\"给 AI**\n\n和产品经理开会，她给我一张设计稿截图。以前我得一边看图一边写 CSS，不断调整对位。现在更简单了：\n\n直接把图片拖拽到终端，然后说：\n\n```\n按照这个设计图实现页面布局\n[图片已添加]\n```\n\nAI 能理解图片中的布局结构，生成对应的 HTML 和 CSS。当然这个需要模型支持视觉能力，比如 Kimi for Coding 的多模态模型 K2.5 就挺好用的。有了这个功能，根据设计稿还原页面的时候特别省事，尤其是那种布局复杂的页面。\n\n**我的实践案例**\n\n我自己的简历页面就是这么做的——直接把 PDF 简历截图丢给 AI，让它参考样式生成在线版本。半小时就搞定了，现在可以直接维护在线 [简历](/resume) 了。\n\n**会话管理：别把所有对话混在一起**\n\n```\n/sessions    # 查看所有会话\n/new         # 开始新会话\n/compact     # 压缩当前会话（总结上下文）\n```\n\n刚开始我总是用一个会话处理所有任务，结果上下文越来越长，AI 的回复质量也慢慢下降。后来我学会了按任务开新会话，一个会话专注解决一个问题。`/compact` 也挺有用，当上下文太长时压缩一下，AI 会把之前的内容总结成关键要点，节省 token 的同时保持连贯性。这样可以避免上下文过长导致 AI\"记性不好\"，同时让对话更有条理。\n\n### 深度定制\n\n基础功能用熟了之后，我开始琢磨怎么让 OpenCode 更符合我的工作流。以下是我实践下来觉得很有用的定制技巧。\n\n**自定义命令：把重复的工作流打包**\n\n我经常需要给新项目生成 README 文档，每次都要写一堆提示词。后来我干脆把这个流程封装成一个自定义命令：\n\n```bash\nmkdir -p ~/.config/opencode/commands\ncat \u003e ~/.config/opencode/commands/project-analysis.md \u003c\u003c 'EOF'\n---\nagent: build\ndescription: 全面分析当前工程，提供项目改进建议\n---\n## 你的任务\n\n全面分析项目结构，理解其类型和核心价值，创建专业的 `README.md`文件。如果文档已存在，则智能补充更新。\n\n## 执行流程\n\n### 1. 扫描项目结构\n\n使用 `Glob` 扫描：\n\n- 根目录文件（配置、入口文件）\n- 子目录结构\n...\nEOF\n```\n\n重启 OpenCode 后，直接输入 `/project-analysis`，它就会自动分析项目并生成文档。相当于我自己造了一个\"快捷指令\"，把那些经常重复的工作流都打包起来，省时省力。\n\n**配置 MCP 服务器：给 AI 扩展\"超能力\"**\n\nMCP（Model Context Protocol）是个好东西，相当于给 AI 装插件。比如我想让 AI 能直接查询数据库：\n\n在 `opencode.json` 中添加：\n\n```json\n{\n  \"mcpServers\": {\n    \"database\": {\n      \"command\": \"npx\",\n      \"args\": [\"-y\", \"@modelcontextprotocol/server-postgres\"],\n      \"env\": {\n        \"DATABASE_URL\": \"postgresql://...\"\n      }\n    },\n    \"github\": {\n      \"command\": \"npx\",\n      \"args\": [\"-y\", \"@modelcontextprotocol/server-github\"],\n      \"env\": {\n        \"GITHUB_TOKEN\": \"your_github_token\"\n      }\n    }\n  }\n}\n```\n\n配置完后，我可以让 AI 直接查询数据库里的表结构，或者帮我创建 GitHub Issue。相当于把 AI 和公司现有的工具链打通了，不再局限于代码编辑器里。\n\n**权限精细控制：该放手时就放手**\n\n刚开始用的时候，我设置了所有操作都要询问权限，这样比较安全。但用久了发现，有些操作完全可以自动执行。\n\n编辑 `opencode.json`，给不同的工具设置不同的权限：\n\n```json\n{\n  \"tools\": {\n    \"bash\": {\n      \"permission\": \"ask\"  // 执行命令前要问我\n    },\n    \"write\": {\n      \"permission\": \"ask\"  // 创建文件前要问我\n    },\n    \"edit\": {\n      \"permission\": \"allow\",  // 修改文件不用问\n      \"patterns\": [\"src/**/*.js\"]  // 但只允许改 src 目录下的 js 文件\n    }\n  }\n}\n```\n\n这样 AI 在 src 目录改代码时不用频繁问我，但执行命令或创建新文件时还是会确认，平衡了效率和安全。你可以根据信任程度和工作习惯，灵活控制 AI 的权限。\n\n**使用 oh-my-opencode 扩展：多智能体协作的黑科技**\n\noh-my-opencode 是社区开发的多智能体协作框架，里面有 Sisyphus、Hephaestus 等多个专业 Agent，能自动协调完成复杂任务。\n\n说实话，刚开始我觉得这玩意儿有点\"高大上\"，但实际用下来确实挺香。比如我说：\n\n```\nultrawork: 实现一个支持暗黑模式的 React 组件\n```\n\n它会自动拆解任务，有的 Agent 负责写组件逻辑，有的负责处理样式切换，有的负责测试，协同工作。\n\n\u003e ⚠️ **安全提醒**：这个项目是免费开源的，GitHub 上能找到。千万别信那些让你付费的网站，都是骗子。\n\n安装的话，最简单的方式是让 AI 帮你自动配置：\n\n```\n请帮我安装和配置 oh-my-opencode，按照以下指南操作：\nhttps://raw.githubusercontent.com/code-yeongyu/oh-my-opencode/refs/heads/master/docs/guide/installation.md\n```\n\n遇到特别复杂的任务，一个 AI 搞不定的时候，多个 Agent 协作会更高效。\n\n**非交互模式脚本化：让 AI 在后台默默干活**\n\n有时候我需要批量处理一些任务，比如检查多个项目的代码质量。这时候可以用非交互模式：\n\n```bash\n# 单次任务\nopencode -p \"生成项目 README\"\n\n# 指定目录\nopencode -c ~/my-project -p \"修复 lint 错误\"\n\n# JSON 输出，方便后续处理\nopencode -p \"检查代码质量\" -f json\n```\n\n这个在 CI/CD 流程里特别有用。比如每次提交代码后，自动运行代码检查，发现问题直接报出来。在自动化场景里，不需要人工交互，AI 自己就能干活。\n\n\n**导出对话：好记性不如烂笔头**\n\n```\n/export   # 导出为 Markdown\n```\n\n有时候和 AI 的对话里会有一些有价值的思路或方案，我会导出保存下来，以后遇到类似问题可以参考。这样可以保存有价值的对话内容，便于整理和分享。\n\n**多会话并行：一心可以二用**\n\n同时开多个 OpenCode 实例，一个窗口处理前端任务，另一个处理后端任务，互不干扰。这在需要同时跟进多个需求的时候特别有用，能让工作区保持整洁和专注。\n\n**IDE 集成：在熟悉的环境里用 AI**\n\nVS Code 有 OpenCode 的扩展，装上后可以在编辑器里直接调用 AI。这样不用在终端和编辑器之间来回切换，体验更流畅。如果你习惯了 VS Code 的工作流，集成插件能让你无缝衔接。\n\n## 实战案例\n\n### 案例 1：快速创建 Node.js API\n\n**步骤**：\n\n1.创建目录：\n\n   ```bash\n   mkdir my-api \u0026\u0026 cd my-api\n   npm init -y\n   ```\n\n2.启动 OpenCode：\n\n   ```bash\n   opencode\n   ```\n\n3.初始化项目：\n\n   ```\n   /init\n   ```\n\n4.描述需求：\n\n   ```\n   创建一个 FastAPI 的 Web Service：\n   - GET /contacts 路由返回Contact联系人的JSON格式\n   - 添加错误处理中间件\n   - 包含 README 使用说明\n   ```\n\n5.AI 自动生成代码和文档\n\n### 案例 2：代码重构\n\n**场景**：将回调函数重构为 async/await\n\n```\n将 @src/utils.js 中的所有回调函数改为 async/await 风格\n```\n\nAI 会：\n- 分析文件\n- 展示修改计划\n- 执行重构\n- 验证语法正确性\n\n### 案例 3：Bug 修复流程\n\n**步骤**：\n\n1.描述问题：\n\n```\n用户反馈登录接口偶尔返回 500 错误，请定位并修复\n```\n\n2.AI 分析相关文件\n3.提出修复方案\n4.执行修复并测试\n\n## GitHub Actions 集成\n\nOpenCode 可以直接集成到 GitHub Actions 中，在 PR 和 Issue 中使用 `/opencode` 或 `/oc` 命令触发 AI 自动完成任务。\n\n### 主要功能\n\n- **自动修复 Issue**：在 Issue 中评论 `/opencode fix this`，自动创建分支、修复问题并提交 PR\n- **PR 代码审查**：在 PR 中评论，自动审查代码或执行修改\n- **定时任务**：通过 cron 定时运行 OpenCode 执行自动化任务\n- **代码行级评论**：在 PR 的具体代码行上评论，OpenCode 会理解上下文并响应\n\n### 安装配置\n\n在项目中运行（确保已在 GitHub 仓库目录下）：\n\n```bash\nopencode github install\n```\n\n这会引导你完成：\n1. 安装 OpenCode GitHub App\n2. 创建 workflow 文件\n3. 配置 API Key\n\n### 使用示例\n\n**自动修复 Bug**：\n```\n在 GitHub Issue 中评论：\n/opencode 这个登录接口偶尔返回 500 错误，请定位并修复\n```\n\n**PR 代码修改**：\n```\n在 PR 中评论：\n/opencode 在删除用户时添加软删除逻辑\n```\n\n**定时代码审查**：\n```yaml\n# .github/workflows/opencode-scheduled.yml\nname: Weekly Code Review\non:\n  schedule:\n    - cron: \"0 9 * * 1\"  # 每周一上午 9 点\njobs:\n  review:\n    runs-on: ubuntu-latest\n    permissions:\n      id-token: write\n      contents: write\n      pull-requests: write\n      issues: write\n    steps:\n      - uses: actions/checkout@v6\n        with:\n          fetch-depth: 1\n          persist-credentials: false\n      - uses: anomalyco/opencode/github@latest\n        env:\n          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}\n        with:\n          model: anthropic/claude-sonnet-4-20250514\n          prompt: |\n            审查本周的代码变更，找出潜在问题并提供建议\n```\n\n## 参考链接\n\n- **官网**：[https://opencode.ai](https://opencode.ai)\n- **GitHub**：[https://github.com/anomalyco/opencode](https://github.com/anomalyco/opencode)\n- **文档**：[https://opencode.ai/docs](https://opencode.ai/docs)\n- **Discord 社区**：[https://opencode.ai/discord](https://opencode.ai/discord)\n"])</script><script>self.__next_f.push([1,"29:T2431,"])</script><script>self.__next_f.push([1,"\n\n\u003e 一款开源、免费、支持 75+ 模型提供商的 AI 编程代理，拥有近 100K GitHub stars，让你的终端变成智能编程助手。\n\n## 引言：为什么需要 OpenCode\n\n每天面对重复性编码任务、繁琐的代码审查、复杂的重构工作，你是否想过有一个智能助手能分担这些工作？传统的 AI 编程工具要么价格昂贵，要么隐私堪忧。\n\nOpenCode 的出现改变了这一局面。它是一款**完全开源**的 AI 编程代理，支持在终端、桌面应用和主流 IDE 中使用。最吸引人的是：它支持 75+ 家模型提供商，提供**限时免费体验模型**（如 Kimi K2.5、GLM-4.7、MiniMax M2.1），体验期间无需订阅和配置 API Key 即可直接使用。\n\n本文将带你全面了解 OpenCode，从安装配置到核心功能，帮助你快速上手这款效率工具。\n\n## OpenCode 简介\n\n### 什么是 OpenCode\n\nOpenCode 是一个开源的 AI 编程代理（AI Coding Agent），由 **anomalyco** 开发并在 GitHub 开源。它允许开发者通过自然语言与 AI 交互，完成代码编写、重构、调试、审查等任务。\n\n**核心定位**：\n- 开源免费，代码透明\n- 隐私优先，数据可控\n- 终端原生，高效便捷\n- 模型灵活，支持多提供商\n\n### 主要特性\n\n| 特性 | 说明 |\n|------|------|\n| **双模式工作** | Build 模式（全权限编辑）+ Plan 模式（只读规划） |\n| **多平台支持** | macOS、Windows（WSL）、Linux |\n| **模型丰富** | 支持 75+ 提供商，提供限时免费体验模型（Kimi K2.5、GLM-4.7、MiniMax M2.1 等），体验期间无需配置即可使用 |\n| **工具集** | bash 执行、文件读写、grep 搜索等 |\n| **上下文感知** | 自动生成 `AGENTS.md`，理解项目结构 |\n| **分享协作** | 一键生成会话分享链接 |\n\n### 适用场景\n\n- **快速原型开发**：通过自然语言描述生成代码\n- **代码审查与重构**：自动化代码改进建议\n- **Bug 修复**：定位问题并提供修复方案\n- **技术学习**：解释复杂代码逻辑\n- **文档编写**：自动生成代码注释和文档\n\n## 安装与配置\n\n### macOS 安装\n\n**方式一：一键安装脚本（推荐）**\n\n```bash\ncurl -fsSL https://opencode.ai/install | bash\n```\n\n**方式二：Homebrew 安装**\n\n```bash\n# 使用官方 tap 获取最新版本\nbrew install anomalyco/tap/opencode\n```\n\n**方式三：npm 安装**\n\n```bash\nnpm install -g opencode-ai\n```\n\n**验证安装成功*：\n\n```bash\nopencode --version\n# 输出示例：1.1.53\n```\n\n### Windows 安装\n\n**推荐：使用 WSL（Windows Subsystem for Linux）**\n\nWSL（Windows Subsystem for Linux）是 Windows 10/11 的可选功能，**需要手动开启**，不是
