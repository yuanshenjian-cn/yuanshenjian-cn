UDE.md、Rules 与 Auto Memory](/articles/2026/04/05/claude-code-memory-and-claude-md)\n\u003e - [第六篇：设置、权限与 Auto Mode](/articles/2026/04/06/claude-code-settings-and-permissions)\n\u003e - **第七篇：扩展架构全景**（本文）\n\u003e - [第八篇：高阶自动化实战](/articles/2026/04/08/claude-code-advanced-automation-with-mcp-hooks-and-agents)\n"])</script><script>self.__next_f.push([1,"1d:T627c,"])</script><script>self.__next_f.push([1,"\n## 引言：安全与效率的永恒博弈\n\n前五篇我们已经能用 Claude Code 完成日常开发任务。但随着使用深入，你会遇到这样的场景：\n\n- 团队成员 A 希望 Claude 自动运行 `npm test`，成员 B 担心误执行 `rm -rf`\n- 你想让 Claude 推送到公司 GitLab，但 Auto Mode 把它当成\"数据泄露\"拦截了\n- CI/CD 环境里需要完全无人值守，开发机上却想保留确认提示\n- 新来的实习生需要限制 Claude 只能读不能写\n\nClaude Code 提供了一套**四层设置 + 细粒度权限 + Auto Mode 分类器 + OS 级沙箱**的完整安全体系来应对这些挑战。本篇将系统拆解每一层。\n\n\u003e **前置阅读**：本篇假设你已熟悉[第四篇](/articles/2026/04/04/claude-code-interactive-mode-and-built-in-commands)中介绍的六种权限模式（Default / AcceptEdits / Plan / Auto / DontAsk / BypassPermissions），这里将深入权限*规则*层面而非模式层面。\n\n---\n\n## 一、设置系统：四层配置与优先级\n\n### 1.1 配置作用域一览\n\nClaude Code 采用分层配置，每一层有明确的定位：\n\n| 作用域 | 文件位置 | 影响范围 | 是否共享 | 典型用途 |\n|--------|---------|---------|---------|---------|\n| **Managed** | 服务器 / MDM / plist / 系统级 `managed-settings.json` | 机器上所有用户 | 由 IT 部署 | 组织安全策略、合规要求 |\n| **User** | `~/.claude/settings.json` | 你的所有项目 | 否 | 个人偏好（主题、语言、模型） |\n| **Project** | `.claude/settings.json` | 项目所有协作者 | 提交到 git | 团队权限、Hooks、MCP |\n| **Local** | `.claude/settings.local.json` | 仅你在此项目 | 否（gitignored） | 个人覆盖、测试配置 |\n\n### 1.2 优先级规则\n\n当同一设置在多层出现时，**更具体的层级获胜**：\n\n```\nManaged（最高）\u003e CLI 参数 \u003e Local \u003e Project \u003e User（最低）\n```\n\n**关键规则**：\n\n- **Managed 不可覆盖**：即使用 `--allowedTools` 也无法绕过 Managed 的 deny 规则\n- **deny 优先于 allow**：若 User 层 allow，但 Project 层 deny，则被阻止\n- **数组类设置合并**：`permissions.deny`、`sandbox.filesystem.allowWrite` 等数组类设置在各层之间是**合并**而非替换\n\n### 1.3 各功能的配置位置\n\n不同功能在各作用域的文件位置不同：\n\n| 功能 | User 位置 | Project 位置 | Local 位置 |\n|------|----------|-------------|-----------|\n| Settings | `~/.claude/settings.json` | `.claude/settings.json` | `.claude/settings.local.json` |\n| Subagents | `~/.claude/agents/` | `.claude/agents/` | — |\n| MCP Servers | `~/.claude.json` | `.mcp.json` | `~/.claude.json`（每项目段） |\n| Plugins | `~/.claude/settings.json` | `.claude/settings.json` | `.claude/settings.local.json` |\n| CLAUDE.md | `~/.claude/CLAUDE.md` | `CLAUDE.md` 或 `.claude/CLAUDE.md` | `CLAUDE.local.md` 或 `.claude/CLAUDE.local.md` |\n| Rules | `~/.claude/rules/` | `.claude/rules/` | — |\n\n### 1.4 /config 命令与 JSON Schema\n\n交互式配置入口：\n\n```bash\n/config              # 打开分页设置界面\n```\n\n在 settings.json 顶部添加 `$schema` 可获得编辑器自动补全：\n\n```json\n{\n  \"$schema\": \"https://json.schemastore.org/claude-code-settings.json\",\n  \"permissions\": { ... }\n}\n```\n\n---\n\n## 二、权限规则：细粒度控制\n\n### 2.1 权限模型\n\nClaude Code 的权限模型分三层：\n\n| 工具类型 | 示例 | 默认需要批准？ | \"是，不再询问\" 的作用范围 |\n|---------|------|------------|-----------------|\n| 只读 | 文件读取、Grep | 否 | 不适用 |\n| Bash 命令 | Shell 执行 | 是 | 每项目目录 + 命令，永久有效 |\n| 文件修改 | Edit / Write | 是 | 仅当前会话 |\n\n规则按 **deny → ask → allow** 顺序评估，第一个匹配的规则生效。这意味着 **deny 永远优先**。\n\n### 2.2 规则语法：`Tool` 或 `Tool(specifier)`\n\n#### 匹配所有使用\n\n```json\n{\n  \"permissions\": {\n    \"allow\": [\"Bash\"],       // 允许所有 Bash 命令\n    \"deny\": [\"WebFetch\"]     // 禁止所有网络获取\n  }\n}\n```\n\n`Bash(*)` 等同于 `Bash`，匹配所有命令。\n\n#### Bash 通配符\n\nBash 规则支持 `*` 通配符，可出现在任意位置：\n\n| 规则 | 匹配 | 不匹配 |\n|------|------|--------|\n| `Bash(npm run build)` | 精确匹配 `npm run build` | `npm run test` |\n| `Bash(npm run *)` | `npm run test`、`npm run lint` | `npm install` |\n| `Bash(* --version)` | `node --version`、`python --version` | `node --help` |\n| `Bash(git * main)` | `git checkout main`、`git merge main` | `git push origin dev` |\n\n**空格敏感**：`Bash(ls *)` 匹配 `ls -la` 但不匹配 `lsof`；`Bash(ls*)` 两者都匹配。因为空格前缀的 `*` 强制单词边界。\n\n**复合命令自动拆分**：批准 `git status \u0026\u0026 npm test` 时，Claude Code 会为 `npm test` 单独保存规则，未来 `npm test` 无论前面连什么都会被识别。单个复合命令最多保存 5 条规则。\n\n**Shell 运算符感知**：`Bash(safe-cmd *)` 不会让 `safe-cmd \u0026\u0026 other-cmd` 获得权限，Claude Code 理解 `\u0026\u0026`、`||`、`;` 等运算符。\n\n\u003e **安全警告**：试图用 Bash 模式约束命令参数是脆弱的。例如 `Bash(curl http://github.com/ *)` 无法匹配 URL 前加选项、不同协议、重定向等变体。对于 URL 过滤，更推荐用 `WebFetch(domain:...)` 权限 + 沙箱网络隔离。\n\n#### Read / Edit 路径规则\n\nRead 和 Edit 规则遵循 **gitignore 规范**，有四种路径前缀：\n\n| 前缀 | 含义 | 示例 |\n|------|------|------|\n| `//path` | 文件系统**绝对**路径 | `Read(//Users/alice/secrets/**)` |\n| `~/path` | 相对**主目录** | `Read(~/Documents/*.pdf)` |\n| `/path` | 相对**项目根目录** | `Edit(/src/**/*.ts)` |\n| `path` 或 `./path` | 相对**当前目录** | `Read(*.env)` |\n\n\u003e **易错点**：`/Users/alice/file` 不是绝对路径！它相对于项目根目录。绝对路径必须用 `//`。\n\n通配符区别：`*` 匹配单个目录中的文件，`**` 递归匹配目录。\n\n\u003e **重要限制**：Read/Edit 的 deny 规则仅适用于 Claude 的**内置文件工具**，不阻止 Bash 中的 `cat .env`。要实现 OS 级阻止，需启用沙箱。\n\n#### WebFetch 域名匹配\n\n```json\n{\n  \"permissions\": {\n    \"allow\": [\"WebFetch(domain:example.com)\"],\n    \"deny\": [\"WebFetch(domain:evil.com)\"]\n  }\n}\n```\n\n#### MCP 工具权限\n\n```json\n{\n  \"permissions\": {\n    \"allow\": [\"mcp__github__create_issue\"],        // 精确工具\n    \"deny\": [\"mcp__puppeteer\"]                      // 整个服务器的所有工具\n  }\n}\n```\n\n格式：`mcp__\u003c服务器名\u003e__\u003c工具名\u003e`，用 `mcp__\u003c服务器名\u003e` 或 `mcp__\u003c服务器名\u003e__*` 匹配服务器所有工具。\n\n#### Agent（Subagent）权限\n\n```json\n{\n  \"permissions\": {\n    \"deny\": [\"Agent(Explore)\"]    // 禁用 Explore 子代理\n  }\n}\n```\n\n也可通过 CLI 标志：`--disallowedTools 'Agent(Explore)'`。\n\n### 2.3 实用配置示例\n\n**前端项目**——允许常用命令，阻止敏感文件和危险操作：\n\n```json\n{\n  \"permissions\": {\n    \"allow\": [\n      \"Bash(npm run *)\",\n      \"Bash(npx *)\",\n      \"Bash(git diff *)\",\n      \"Bash(git status *)\",\n      \"Bash(git log *)\",\n      \"Bash(git commit *)\",\n      \"Bash(* --version)\",\n      \"Bash(* --help *)\"\n    ],\n    \"deny\": [\n      \"Bash(git push *)\",\n      \"Bash(curl *)\",\n      \"Bash(wget *)\",\n      \"Read(./.env)\",\n      \"Read(./.env.*)\",\n      \"Read(./secrets/**)\"\n    ]\n  }\n}\n```\n\n**只读审查模式**——仅允许读取和分析，禁止一切修改：\n\n```json\n{\n  \"permissions\": {\n    \"defaultMode\": \"plan\",\n    \"deny\": [\n      \"Edit\",\n      \"Bash(rm *)\",\n      \"Bash(git push *)\"\n    ]\n  }\n}\n```\n\n### 2.4 工作目录\n\n默认情况下，Claude 只能访问启动它的目录。扩展方式：\n\n| 方式 | 用法 | 持久性 |\n|------|------|--------|\n| CLI 参数 | `--add-dir ../docs` | 仅当前会话 |\n| 交互命令 | `/add-dir ../docs` | 仅当前会话 |\n| 设置文件 | `additionalDirectories: [\"../docs\"]` | 持久 |\n\n\u003e **注意**：额外目录仅授予**文件访问权限**，不会成为完整的配置根目录。大多数 `.claude/` 配置不会从额外目录加载，但 Skills 和部分插件设置例外。\n\n---\n\n## 三、Auto Mode 深入\n\n第四篇介绍了 Auto Mode 是六种权限模式之一——它使用后台分类器自动批准或拒绝操作。本节深入其配置机制。\n\n### 3.1 分类器的工作方式\n\nAuto Mode 的分类器模型会对每个工具调用进行评估：\n\n```\n用户请求 → Claude 决定调用工具 → 分类器评估 → 允许/拒绝/提示\n```\n\n分类器内部的优先级：\n\n1. **soft_deny 规则**先阻止（如强制推送、数据泄露、`curl | bash`）\n2. **allow 规则**作为例外覆盖 soft_deny\n3. **显式用户意图**可覆盖两者——但必须是**直接且具体**的指令（\"强制推送此分支\"有效，\"清理存储库\"无效）\n\n### 3.2 配置源限制\n\n分类器**不从共享项目设置（`.claude/settings.json`）读取** `autoMode`，防止恶意仓库注入自己的 allow 规则。只从以下来源读取：\n\n| 配置源 | 文件 | 用途 |\n|--------|------|------|\n| 个人设置 | `~/.claude/settings.json` | 个人信任的基础设施 |\n| 项目本地设置 | `.claude/settings.local.json` | 每项目信任的存储桶/服务（gitignored） |\n| 托管设置 | managed-settings.json 等 | 组织级强制信任基础设施 |\n\n各来源的条目被**合并**。开发者可以用个人条目扩展 `environment`、`allow`、`soft_deny`，但不能删除托管设置提供的条目。\n\n### 3.3 配置信任基础设施（environment）\n\n对大多数组织，`autoMode.environment` 是**唯一需要设置的字段**。它用自然语言告诉分类器哪些是你的内部资源：\n\n```json\n{\n  \"autoMode\": {\n    \"environment\": [\n      \"Organization: Acme Corp. Primary use: software development\",\n      \"Source control: github.example.com/acme-corp and all repos under it\",\n      \"Cloud provider: AWS\",\n      \"Trusted cloud buckets: s3://acme-build-artifacts\",\n      \"Trusted internal domains: *.corp.example.com\",\n      \"Key internal services: Jenkins at ci.example.com\"\n    ]\n  }\n}\n```\n\n条目是**散文描述**（不是正则表达式或工具模式），分类器将它们作为自然语言规则读取。按你向新工程师描述基础设施的方式编写即可。\n\n**推荐渐进式配置**：\n\n1. 先用默认值运行\n2. 添加源代码控制组织和关键内部服务（解决最常见误报，如推送到自己的仓库被拦截）\n3. 添加信任域和云存储桶\n4. 其余在遇到阻止时按需填写\n\n### 3.4 覆盖 allow 和 soft_deny\n\n\u003e **危险操作**：设置 `allow` 或 `soft_deny` 会**替换该部分的整个默认列表**！如果你只设置一条 `soft_deny`，所有内置阻止规则（强制推送、数据泄露、`curl | bash`、生产部署等）都会消失。\n\n安全操作流程：\n\n```bash\n# 1. 查看完整默认规则\nclaude auto-mode defaults\n\n# 2. 复制输出到设置文件，然后按需增删\n\n# 3. 确认最终生效的规则\nclaude auto-mode config\n\n# 4. 让 AI 审查你的自定义规则\nclaude auto-mode critique\n```\n\n示例——在默认规则基础上放宽 staging 部署：\n\n```json\n{\n  \"autoMode\": {\n    \"environment\": [\n      \"Source control: github.example.com/acme-corp\"\n    ],\n    \"allow\": [\n      \"...copy full default allow list here first...\",\n      \"Deploying to staging namespace is allowed: isolated from production, resets nightly\"\n    ],\n    \"soft_deny\": [\n      \"...copy full default soft_deny list here first...\",\n      \"Never run database migrations outside the migrations CLI\"\n    ]\n  }\n}\n```\n\n### 3.5 审查 Auto Mode 拒绝\n\n当 Auto Mode 拒绝某个操作时：\n\n1. 屏幕出现通知\n2. 被拒绝的操作记录在 `/permissions` → **\"最近拒绝\"** 选项卡\n3. 在被拒绝的操作上按 **`r`**，将其标记为\"重试\"\n4. 退出对话框后，Claude Code 发消息告诉模型可以重试该操作\n\n要以编程方式响应拒绝，可使用 `PermissionDenied` Hook。\n\n### 3.6 禁用 Auto Mode\n\n在任何 settings.json 中设置：\n\n```json\n{\n  \"disableAutoMode\": \"disable\"\n}\n```\n\n效果：从 `Shift+Tab` 循环中移除 `auto`，启动时拒绝 `--permission-mode auto`。在托管设置中设置最有效，因为用户无法覆盖。\n\n---\n\n## 四、沙箱化：OS 级纵深防御\n\n### 4.1 为什么需要沙箱\n\n权限系统控制 Claude 的**内置工具**可以做什么，但 Bash 子进程可以绕过——`cat .env` 不受 `Read(./.env)` deny 规则限制。沙箱提供 **OS 级强制执行**，限制所有 Bash 命令及其子进程的文件系统和网络访问。\n\n| 安全层 | 作用对象 | 强制级别 | 覆盖范围 |\n|--------|---------|---------|---------|\n| 权限系统 | Claude 内置工具（Bash、Read、Edit、WebFetch、MCP） | 应用级 | 所有工具 |\n| 沙箱 | Bash 命令及其子进程 | OS 级 | 仅 Bash |\n\n两者是**互补**关系，推荐同时使用实现纵深防御。\n\n### 4.2 沙箱的两大隔离\n\n**文件系统隔离**：\n\n- 默认写入：仅当前工作目录及子目录\n- 默认读取：整个机器（除某些被拒绝目录）\n- OS 级强制：macOS 用 Seatbelt，Linux 用 bubblewrap，所有子进程继承限制\n\n**网络隔离**：\n\n- 通过沙箱外的代理服务器控制\n- 仅允许访问批准的域名\n- 新域名请求触发权限提示\n- 适用于所有子进程\n\n### 4.3 启用与配置\n\n```bash\n/sandbox        # 交互式启用，显示依赖检查\n```\n\n**Linux 前置依赖**（macOS 开箱即用）：\n\n```bash\n# Ubuntu/Debian\nsudo apt-get install bubblewrap socat\n\n# Fedora\nsudo dnf install bubblewrap socat\n```\n\n**两种沙箱模式**：\n\n| 模式 | 行为 | 适用场景 |\n|------|------|---------|\n| **Auto Allow** | 沙箱内命令自动批准，无法沙箱化的命令回退到权限流程 | 日常开发，追求效率 |\n| **Regular Permissions** | 所有命令都走权限流程，沙箱仅提供 OS 级保护 | 高安全要求 |\n\nAuto Allow 模式**独立于权限模式**运行——即使你不在 AcceptEdits 模式，沙箱化的 bash 命令也会自动执行。\n\n### 4.4 沙箱设置速查\n\n```json\n{\n  \"sandbox\": {\n    \"enabled\": true,\n    \"autoAllowBashIfSandboxed\": true,\n    \"failIfUnavailable\": false,\n    \"excludedCommands\": [\"docker\", \"git\"],\n    \"allowUnsandboxedCommands\": true,\n    \"filesystem\": {\n      \"allowWrite\": [\"~/.kube\", \"/tmp/build\"],\n      \"denyWrite\": [\"/etc\", \"/usr/local/bin\"],\n      \"denyRead\": [\"~/.aws/credentials\"],\n      \"allowRead\": [\".\"]\n    },\n    \"network\": {\n      \"allowUnixSockets\": [\"~/.ssh/agent-socket\"],\n      \"allowAllUnixSockets\": false\n    }\n  }\n}\n```\n\n路径前缀规则（注意与 Read/Edit 权限规则**不同**）：\n\n| 前缀 | 沙箱中的含义 | Read/Edit 权限中的含义 |\n|------|-----------|-----------------|\n| `/path` | 绝对路径 | 项目根相对路径 |\n| `~/path` | 主目录相对 | 主目录相对 |\n| `./path` | 项目根相对 | 当前目录相对 |\n\n\u003e **逃生舱机制**：当命令因沙箱限制失败时，Claude 可能使用 `dangerouslyDisableSandbox` 参数在沙箱外重试，此时走常规权限流程。设置 `\"allowUnsandboxedCommands\": false` 可完全禁用此逃生舱。\n\n### 4.5 沙箱不覆盖的内容\n\n- **内置文件工具**（Read、Edit、Write）：由权限系统控制，不走沙箱\n- **Computer Use**：在真实桌面运行，不在隔离环境\n- **WebFetch**：有自己的域名权限控制\n\n---\n\n## 五、Hooks 扩展权限评估\n\nHooks 是第七篇的重点，这里仅介绍其与权限系统的交互。\n\n**PreToolUse Hook** 可在权限提示前运行自定义脚本来动态评估：\n\n```\n工具调用 → PreToolUse Hook → 权限规则评估 → 执行/拒绝\n```\n\nHook 返回值的效果：\n\n| Hook 返回 | 效果 | 与权限规则的关系 |\n|----------|------|-------------|\n| `\"allow\"` | 跳过提示 | deny/ask 规则**仍然生效**（deny 优先） |\n| 退出码 2 | 阻止调用 | **优先于** allow 规则 |\n| 其他 | 不影响 | 正常走权限流程 |\n\n典型用途：允许所有 Bash 但用 Hook 阻止特定危险命令：\n\n```json\n{\n  \"permissions\": { \"allow\": [\"Bash\"] },\n  \"hooks\": {\n    \"PreToolUse\": [{\n      \"matcher\": \"Bash\",\n      \"hooks\": [{ \"type\": \"command\", \"command\": \"~/.claude/validate-bash.sh\" }]\n    }]\n  }\n}\n```\n\n---\n\n## 六、托管设置：企业级管控\n\n### 6.1 仅 Managed 生效的设置\n\n以下设置只在 Managed 层有效，放在用户或项目设置中无效：\n\n| 设置 | 用途 |\n|------|------|\n| `allowedChannelPlugins` | 频道插件白名单 |\n| `allowManagedHooksOnly` | 仅允许 Managed Hooks |\n| `allowManagedMcpServersOnly` | 仅允许 Managed MCP |\n| `allowManagedPermissionRulesOnly` | 仅允许 Managed 权限规则 |\n| `blockedMarketplaces` | 插件市场黑名单 |\n| `channelsEnabled` | 启用频道功能 |\n| `pluginTrustMessage` | 自定义插件信任警告 |\n| `sandbox.filesystem.allowManagedReadPathsOnly` | 仅 Managed 读取路径 |\n| `sandbox.network.allowManagedDomainsOnly` | 仅 Managed 网络域名 |\n| `strictKnownMarketplaces` | 限制插件市场来源 |\n\n### 6.2 部署方式\n\n| 方式 | 平台 | 位置 |\n|------|------|------|\n| 服务器托管 | 通用 | Claude.ai 管理员控制台 |\n| MDM | macOS | `com.anthropic.claudecode` preferences 域 |\n| 注册表 | Windows | `HKLM\\SOFTWARE\\Policies\\ClaudeCode` |\n| 基于文件 | macOS | `/Library/Application Support/ClaudeCode/` |\n| 基于文件 | Linux | `/etc/claude-code/` |\n| 基于文件 | Windows | `C:\\Program Files\\ClaudeCode\\` |\n\n**Drop-in 目录**：`managed-settings.d/` 目录中的 `*.json` 文件按字母顺序合并，方便不同团队独立部署策略片段。使用数字前缀控制顺序（如 `10-telemetry.json`、`20-security.json`）。\n\n---\n\n## 七、分场景实战配置\n\n### 7.1 个人开发者\n\n场景：个人项目，追求效率，适度安全。\n\n```json\n// ~/.claude/settings.json\n{\n  \"permissions\": {\n    \"defaultMode\": \"acceptEdits\",\n    \"allow\": [\n      \"Bash(npm *)\",\n      \"Bash(git diff *)\",\n      \"Bash(git status *)\",\n      \"Bash(git log *)\",\n      \"Bash(git commit *)\",\n      \"Bash(* --version)\",\n      \"Bash(* --help *)\"\n    ],\n    \"deny\": [\n      \"Bash(curl *)\",\n      \"Bash(wget *)\",\n      \"Read(./.env)\",\n      \"Read(./.env.*)\"\n    ]\n  }\n}\n```\n\n### 7.2 团队项目\n\n场景：多人协作，需要统一标准，允许合理自由度。\n\n```json\n// .claude/settings.json（提交到 git）\n{\n  \"permissions\": {\n    \"defaultMode\": \"default\",\n    \"allow\": [\n      \"Bash(npm run *)\",\n      \"Bash(npx vitest *)\",\n      \"Bash(git diff *)\",\n      \"Bash(git status)\",\n      \"Bash(git log *)\"\n    ],\n    \"deny\": [\n      \"Bash(git push --force *)\",\n      \"Bash(rm -rf *)\",\n      \"Bash(curl *)\",\n      \"Bash(wget *)\",\n      \"Read(./.env)\",\n      \"Read(./.env.*)\",\n      \"Read(./secrets/**)\"\n    ]\n  },\n  \"sandbox\": {\n    \"enabled\": true,\n    \"autoAllowBashIfSandboxed\": true,\n    \"filesystem\": {\n      \"denyRead\": [\"~/.ssh\", \"~/.aws\"]\n    }\n  }\n}\n```\n\n### 7.3 企业 CI/CD\n\n场景：无人值守，需要最大自动化 + 最严格安全。\n\n```json\n// managed-settings.json（IT 部署）\n{\n  \"permissions\": {\n    \"defaultMode\": \"dontAsk\",\n    \"allow\": [\n      \"Bash(npm run *)\",\n      \"Bash(git *)\"\n    ],\n    \"deny\": [\n      \"Bash(curl *)\",\n      \"Bash(wget *)\",\n      \"WebFetch\"\n    ],\n    \"disableBypassPermissionsMode\": \"disable\"\n  },\n  \"sandbox\": {\n    \"enabled\": true,\n    \"failIfUnavailable\": true,\n    \"allowUnsandboxedCommands\": false\n  },\n  \"allowManagedPermissionRulesOnly\": true,\n  \"allowManagedHooksOnly\": true\n}\n```\n\n---\n\n## 八、高频设置速查表\n\n以下精选日常最常调整的设置项（完整列表见[官方文档](https://code.claude.com/docs/zh-CN/settings)）：\n\n### 8.1 行为与偏好\n\n| 设置键 | 类型 | 说明 | 示例 |\n|--------|------|------|------|\n| `model` | string | 覆盖默认模型 | `\"claude-sonnet-4-6\"` |\n| `effortLevel` | string | 努力级别 | `\"low\"` / `\"medium\"` / `\"high\"` |\n| `language` | string | 响应语言 | `\"chinese\"` |\n| `outputStyle` | string | 输出风格 | `\"Explanatory\"` |\n| `alwaysThinkingEnabled` | bool | 默认启用扩展思考 | `true` |\n\n### 8.2 安全与权限\n\n| 设置键 | 类型 | 说明 | 示例 |\n|--------|------|------|------|\n| `permissions.defaultMode` | string | 默认权限模式 | `\"acceptEdits\"` |\n| `permissions.allow` | array | 允许规则列表 | `[\"Bash(npm *)\"]` |\n| `permissions.deny` | array | 拒绝规则列表 | `[\"Read(./.env)\"]` |\n| `disableAutoMode` | string | 禁用 Auto Mode | `\"disable\"` |\n| `disableBypassPermissionsMode` | string | 禁用 Bypass 模式 | `\"disable\"` |\n\n### 8.3 沙箱\n\n| 设置键 | 类型 | 说明 | 示例 |\n|--------|------|------|------|\n| `sandbox.enabled` | bool | 启用沙箱 | `true` |\n| `sandbox.autoAllowBashIfSandboxed` | bool | 沙箱内自动批准 | `true` |\n| `sandbox.failIfUnavailable` | bool | 不可用时硬失败 | `true` |\n| `sandbox.excludedCommands` | array | 沙箱外运行的命令 | `[\"docker\"]` |\n| `sandbox.filesystem.allowWrite` | array | 额外写入路径 | `[\"~/.kube\"]` |\n\n### 8.4 会话与清理\n\n| 设置键 | 类型 | 说明 | 示例 |\n|--------|------|------|------|\n| `cleanupPeriodDays` | number | 非活跃会话清理周期 | `20` |\n| `autoUpdatesChannel` | string | 更新渠道 | `\"stable\"` / `\"latest\"` |\n| `includeGitInstructions` | bool | 系统提示含 Git 说明 | `true` |\n\n---\n\n## 九、安全最佳实践清单\n\n基于官方安全指南，按场景整理：\n\n### 处理敏感代码\n\n- ✅ 批准前审查所有建议的更改\n- ✅ 为敏感仓库使用项目级权限设置\n- ✅ 启用沙箱并配置 `denyRead` 阻止敏感路径\n- ✅ 使用 `/permissions` 定期审计权限设置\n- ✅ 考虑使用 Devcontainer 获得额外隔离\n\n### 防止提示注入\n\n- ✅ 权限系统在任何操作前要求批准\n- ✅ 不要直接将不受信任内容管道传给 Claude\n- ✅ 验证对关键文件的修改建议\n- ✅ 沙箱确保即使注入成功，也无法修改系统文件或泄露数据\n- ✅ Web Fetch 使用独立上下文窗口，避免注入恶意提示\n\n### 团队协作\n\n- ✅ 用 Managed 设置强制执行组织标准\n- ✅ 通过 `.claude/settings.json` 共享权限配置\n- ✅ 用 OpenTelemetry 监控 Claude Code 使用情况\n- ✅ 用 `ConfigChange` Hook 审计设置变更\n- ✅ 用 `/bug` 报告可疑行为\n\n---\n\n## 十、常见问题\n\n| 问题 | 答案 |\n|------|------|\n| 如何查看当前生效的所有权限？ | `/permissions` 命令，列出所有规则及来源 |\n| allow 和 deny 冲突时谁赢？ | **deny 永远赢**，评估顺序 deny → ask → allow |\n| Auto Mode 把正常操作拦截了怎么办？ | 在 `/permissions` \"最近拒绝\"选项卡按 `r` 重试，或配置 `autoMode.environment` |\n| 沙箱和权限需要同时开吗？ | 推荐同时开，权限控制工具级，沙箱控制 OS 级，互补 |\n| 项目设置会覆盖我的个人设置吗？ | 是的，Project 优先于 User（但 Local 优先于 Project） |\n| `bypassPermissions` 真的跳过一切吗？ | 不，`.git`、`.claude`、`.vscode`、`.idea`、`.husky` 目录的写入仍需确认 |\n| 如何在 CI 中完全无人值守？ | 用 `--permission-mode dontAsk` + 预配置 `allow` 规则 |\n| 沙箱在 Docker 中能用吗？ | Linux 上需要 `enableWeakerNestedSandbox`，安全性会削弱 |\n| settings.json 改了不生效？ | 检查优先级——更高层级可能覆盖了。用 `/config` 或 `claude auto-mode config` 查看实际生效值 |\n| 如何阻止 Claude 读取 .env？ | 权限 `deny: [\"Read(./.env)\"]` + 沙箱 `denyRead: [\"./.env\"]`，双保险 |\n\n---\n\n## 小结\n\n本篇系统梳理了 Claude Code 的安全与配置体系：\n\n| 层级 | 机制 | 作用 |\n|------|------|------|\n| **设置系统** | 四层作用域 + 优先级 | 统一配置管理 |\n| **权限规则** | deny → ask → allow + 工具特定语法 | 细粒度工具控制 |\n| **Auto Mode** | 分类器 + 自然语言策略 | 智能自动批准 |\n| **沙箱** | OS 级文件/网络隔离 | 纵深防御 |\n| **Hooks** | PreToolUse 运行时评估 | 动态权限扩展 |\n| **托管设置** | 不可覆盖的组织策略 | 企业级管控 |\n\n安全配置的核心原则：**从最小权限开始，按需放宽，定期审计**。下一篇我们将进入 Claude Code 的扩展架构——Skills、Sub-agents、Agent Teams、Hooks、MCP 与 Plugins 的全景图。\n\n\u003e 📖 **系列导航**\n\u003e\n\u003e - [第一篇：从 OpenCode 切到 Claude Code](/articles/2026/04/01/opencode-to-claude-code-getting-oriented)\n\u003e - [第二篇：快速上手](/articles/2026/04/02/claude-code-getting-started)\n\u003e - [第三篇：日常工作流](/articles/2026/04/03/claude-code-common-workflows)\n\u003e - [第四篇：交互模式与内置命令](/articles/2026/04/04/claude-code-interactive-mode-and-built-in-commands)\n\u003e - [第五篇：CLAUDE.md、Rules 与 Auto Memory](/articles/2026/04/05/claude-code-memory-and-claude-md)\n\u003e - **第六篇：设置、权限与 Auto Mode**（本文）\n\u003e - [第七篇：扩展架构全景](/articles/2026/04/07/claude-code-extension-model-overview)\n\u003e - [第八篇：高阶自动化实战](/articles/2026/04/08/claude-code-advanced-automation-with-mcp-hooks-and-agents)\n"])</script><script>self.__next_f.push([1,"1e:T65ed,"])</script><script>self.__next_f.push([1,"\n\u003e **系列导读**：本文是 Claude Code 系列第 5 篇。第 1 篇讲[迁移心智模型](/articles/2026/04/01/opencode-to-claude-code-getting-oriented)，第 2 篇讲[安装与上手](/articles/2026/04/02/claude-code-getting-started)，第 3 篇讲[日常工作流](/articles/2026/04/03/claude-code-common-workflows)，第 4 篇讲[交互模式与内置命令](/articles/2026/04/04/claude-code-interactive-mode-and-built-in-commands)。本篇深入 Claude Code 的\"记忆层\"——让 Claude 在每次会话中都知道你的项目规范、团队约定和历史经验。\n\n---\n\n## 为什么 Claude Code 需要\"记忆层\"\n\nAI 编程助手有一个根本矛盾：**它的上下文窗口是有限的，但你的项目知识是无限的**。\n\n每次启动新会话，Claude Code 面对的是一张白纸。它不知道：\n\n- 你的项目用 2 空格还是 4 空格缩进\n- 提交信息要用英文还是中文\n- 测试命令是 `npm test` 还是 `pnpm vitest`\n- 项目有哪些不能碰的遗留模块\n- 上次调试某个 bug 时发现的关键线索\n\n没有记忆层，你每次都要重复说明这些。说一次两次还行，说十次就崩溃了。\n\nClaude Code 用**三套互补的记忆系统**解决这个问题：\n\n| 系统 | 谁写 | 内容类型 | 作用域 | 加载时机 |\n|------|------|---------|--------|---------|\n| **CLAUDE.md** | 你（开发者） | 指令、规范、架构说明 | 项目 / 用户 / 组织 | 每次会话自动加载 |\n| **Rules** | 你（开发者） | 模块化规则 | 项目 / 用户 | 每次会话自动加载 |\n| **Auto Memory** | Claude 自己 | 学习记录、模式总结 | 按项目（worktree） | 会话启动加载索引，按需加载详情 |\n\n三者的关系像这样：\n\n```text\n你写的（持久指令）        Claude 写的（经验积累）\n┌─────────────────┐     ┌─────────────────┐\n│   CLAUDE.md     │     │   Auto Memory   │\n│  （操作手册）    │     │  （笔记本）      │\n├─────────────────┤     └─────────────────┘\n│  .claude/rules/ │\n│  （规则卡片）    │\n└─────────────────┘\n```\n\n接下来，我们逐个深入。\n\n---\n\n## CLAUDE.md：你写给 Claude 的操作手册\n\nCLAUDE.md 是 Claude Code 最核心的记忆机制。它本质上是一个 **Markdown 文件**，内容会在每次会话开始时被注入到 Claude 的上下文中，相当于一份\"开机就读\"的操作手册。\n\n### 四层作用域与文件位置\n\nCLAUDE.md 支持四层作用域，优先级从高到低：\n\n| 层级 | 文件位置 | 谁维护 | 共享方式 | 典型内容 |\n|------|---------|--------|---------|---------|\n| **组织托管** | `/Library/Application Support/ClaudeCode/CLAUDE.md`（macOS）\u003cbr/\u003e`/etc/claude-code/CLAUDE.md`（Linux） | IT / DevOps | MDM 下发 | 公司级安全策略、合规要求 |\n| **项目级** | `./CLAUDE.md` 或 `./.claude/CLAUDE.md` | 团队 | Git 提交 | 项目架构、编码规范、构建命令 |\n| **项目本地** | `./CLAUDE.local.md` 或 `./.claude/CLAUDE.local.md` | 个人 | 不共享（gitignored） | 个人对项目的特殊覆盖 |\n| **子目录级** | 任意子目录下的 `CLAUDE.md` | 团队 | Git 提交 | 模块级特殊规则 |\n| **用户级** | `~/.claude/CLAUDE.md` | 个人 | 不共享 | 个人偏好（语言、风格、快捷设定） |\n\n\u003e **实际优先级**：当多个 CLAUDE.md 内容冲突时，Claude 会综合所有层级的信息。组织托管策略优先级最高，但实际上 Claude 会尝试协调而非简单覆盖。最佳实践是**避免冲突**——每层只写属于自己职责范围的内容。\n\n### 加载机制\n\nClaude Code 的 CLAUDE.md 加载遵循明确的规则：\n\n**会话启动时**：\n1. 从当前工作目录（CWD）开始，**向上遍历**目录树，加载沿途所有 CLAUDE.md\n2. 加载用户级 `~/.claude/CLAUDE.md`\n3. 加载组织托管的 CLAUDE.md（如果存在）\n\n**会话进行中**：\n- 当 Claude 读取某个子目录下的文件时，**按需加载**该子目录的 CLAUDE.md\n- 这意味着子目录的 CLAUDE.md 不会一开始就占用上下文，只在需要时才加入\n\n**注意事项**：\n- CLAUDE.md 的内容以**用户消息**的形式注入，不是系统提示（system prompt）\n- 如果需要系统提示级别的注入，使用 `--append-system-prompt` CLI 标志\n- HTML 块注释（`\u003c!-- ... --\u003e`）会在注入前被**自动剥离**——可以用来写只给人看的备注\n- `/compact` 压缩上下文时，CLAUDE.md 不会丢失——它会从磁盘**重新读取**\n\n```text\n项目根目录/\n├── CLAUDE.md              ← 会话启动时加载\n├── src/\n│   ├── CLAUDE.md          ← Claude 读 src/ 下文件时按需加载\n│   ├── components/\n│   │   └── CLAUDE.md      ← Claude 读 components/ 下文件时按需加载\n│   └── utils/\n└── tests/\n    └── CLAUDE.md          ← Claude 读 tests/ 下文件时按需加载\n```\n\n### 写出高效的 CLAUDE.md\n\n写 CLAUDE.md 不是写小说。它是给 AI 读的指令文档，需要遵循特定的写作原则。\n\n#### 核心原则\n\n| 原则 | ✅ 好的写法 | ❌ 差的写法 |\n|------|-----------|-----------|\n| **具体化** | \"使用 2 空格缩进\" | \"格式化代码要好看\" |\n| **可操作** | \"提交信息用英文，格式：`type(scope): description`\" | \"提交信息要规范\" |\n| **不矛盾** | 每层只管自己的职责范围 | 项目级说用 tabs，子目录级说用 spaces |\n| **精简** | 每个文件控制在 200 行以内 | 把整个项目文档都塞进去 |\n| **结构化** | 用 Markdown 标题 + 列表 | 写成长段落 |\n\n#### 项目级 CLAUDE.md 模板\n\n这是一个经过实战验证的模板结构：\n\n```markdown\n# 项目：我的博客\n\n## 技术栈\n- Next.js 15 + React 19 + TypeScript 5（严格模式）\n- 样式：Tailwind CSS 3.4 + shadcn/ui\n- 测试：Vitest\n- 包管理：npm\n\n## 核心命令\n- 开发：`npm run dev`\n- 构建：`npm run build`\n- 测试：`npm run test`\n- 类型检查：`npm run typecheck`\n- Lint：`npm run lint`\n\n## 编码规范\n- 缩进：2 空格\n- 组件：PascalCase（`Header.tsx`）\n- 其他文件：kebab-case（`blog-utils.ts`）\n- 提交信息：英文，格式 `type(scope): description`\n- 禁止使用 `any` 类型，用 `unknown` + 类型守卫代替\n\n## 架构约定\n- 服务器组件是默认的，不需要标注\n- 客户端组件必须在文件顶部加 `\"use client\"`\n- 所有 API 请求封装在 `lib/api/` 目录下\n\n## 注意事项\n- 不要修改 `lib/legacy/` 下的任何文件（遗留代码，等待重写）\n- 图片放在 `public/images/`，使用 WebP 格式\n- 环境变量模板在 `.env.example`，不要提交 `.env.local`\n```\n\n#### 用户级 CLAUDE.md 示例\n\n```markdown\n# 个人偏好\n\n## 语言\n- 与我对话用中文\n- 代码注释和提交信息用英文\n\n## 风格\n- 回答尽量简洁，不需要过多解释\n- 给出方案前先问我确认\n- 优先使用函数式编程风格\n\n## Git 习惯\n- 禁止 --no-verify\n- force push 用 --force-with-lease\n- 不要自动 push，提交后等我确认\n```\n\n### 导入语法：用 @import 组合指令\n\nCLAUDE.md 支持用 `@` 语法导入其他文件的内容，实现指令的模块化复用：\n\n```markdown\n# 项目指令\n\n@docs/coding-standards.md\n@docs/architecture.md\n@.github/CONTRIBUTING.md\n```\n\n导入规则：\n\n| 特性 | 说明 |\n|------|------|\n| **路径类型** | 支持相对路径和绝对路径 |\n| **递归深度** | 最多 5 层递归导入（A 导入 B，B 导入 C…） |\n| **文件类型** | 任意文本文件（.md、.txt、.yml 等） |\n| **跨工具兼容** | 可以导入 `AGENTS.md`，兼容 Cursor、OpenCode 等工具 |\n\n\u003e **技巧**：如果你的团队同时使用 Cursor 和 Claude Code，可以在 CLAUDE.md 中 `@AGENTS.md`，这样一份指令文件就能同时服务两个工具。反之亦然——在 AGENTS.md 中也可以引用共享的规范文档。\n\n### 用 HTML 注释写\"人读\"备注\n\nCLAUDE.md 在注入 Claude 前会自动剥离 HTML 块注释，所以你可以用注释写只给人看的内容：\n\n```markdown\n# 编码规范\n\n\u003c!-- \n  维护者注意：这个文件会被 Claude Code 自动读取。\n  修改前请在团队频道通知。\n  最后更新：2026-04-01 by @zhangsan \n--\u003e\n\n- 使用 2 空格缩进\n- 组件用 PascalCase\n```\n\nClaude 只会看到规范条目，看不到注释里的维护信息。\n\n---\n\n## .claude/rules/：模块化规则引擎\n\n当 CLAUDE.md 变得太长，或者你需要**按文件类型 / 目录**应用不同规则时，`.claude/rules/` 目录是更好的选择。\n\n### 基本用法\n\n在项目根目录下创建 `.claude/rules/` 目录，放入规则文件：\n\n```text\n.claude/\n└── rules/\n    ├── typescript.md      ← TypeScript 编码规则\n    ├── testing.md         ← 测试编写规则\n    ├── git-commit.md      ← Git 提交规则\n    └── security.md        ← 安全相关规则\n```\n\n每个规则文件就是一个普通的 Markdown 文件：\n\n```markdown\n# TypeScript 规则\n\n- 始终启用严格模式\n- 禁止使用 `any`，用 `unknown` 替代\n- Props 用 `interface` 定义，联合类型用 `type`\n- 优先使用类型守卫而非 `as` 断言\n- 枚举用 `const enum` 或字面量联合类型\n```\n\n**不带 `paths` 限定的规则文件在会话启动时自动加载**，与 CLAUDE.md 一起注入上下文。带 `paths` 限定的规则则是**按需加载**——只有当 Claude 操作匹配路径的文件时才会激活。\n\n### 路径限定规则\n\nRules 最强大的特性是**路径限定**——你可以让某条规则只在操作特定文件时生效。通过 YAML frontmatter 的 `paths` 字段实现：\n\n```markdown\n---\npaths:\n  - \"**/*.test.ts\"\n  - \"**/*.test.tsx\"\n  - \"**/*.spec.ts\"\n---\n\n# 测试文件规则\n\n- 每个测试文件只测一个模块\n- 使用 `describe` 按功能分组\n- 测试名称用中文描述行为：\"应该在输入为空时返回默认值\"\n- Mock 外部依赖，不 Mock 内部模块\n- 每个测试用例独立，不依赖执行顺序\n```\n\n```markdown\n---\npaths:\n  - \"src/components/**/*.tsx\"\n---\n\n# React 组件规则\n\n- 服务器组件是默认的，不需要额外标注\n- 客户端组件必须在文件开头添加 \"use client\"\n- Props 接口名统一用 `ComponentNameProps`\n- 使用 Tailwind CSS 类名，不写内联样式\n- 导出组件使用命名导出，不用默认导出\n```\n\n`paths` 字段支持标准 glob 模式（`*`、`?`、`**`、`[seq]` 等）。当 Claude 操作匹配路径的文件时，对应规则会被激活。\n\n### 用户级规则\n\n除了项目级规则，你还可以设置跨所有项目生效的个人规则：\n\n```text\n~/.claude/\n└── rules/\n    ├── my-style.md        ← 个人编码风格\n    ├── language.md        ← 语言偏好\n    └── git-habits.md      ← Git 操作习惯\n```\n\n用户级规则对所有项目生效，适合放入通用的个人偏好。\n\n### 跨项目共享规则\n\n如果多个项目需要共享相同的规则，可以用**符号链接**：\n\n```bash\n# 创建共享规则目录\nmkdir -p ~/shared-claude-rules\n\n# 在各项目中创建符号链接\nln -s ~/shared-claude-rules/typescript.md \\\n  ./my-project/.claude/rules/typescript.md\n\nln -s ~/shared-claude-rules/security.md \\\n  ./my-project/.claude/rules/security.md\n```\n\n这样修改共享规则时，所有链接的项目都会自动生效。\n\n### CLAUDE.md vs Rules：什么时候用哪个？\n\n| 场景 | 推荐 | 原因 |\n|------|------|------|\n| 项目整体架构说明 | CLAUDE.md | 需要连贯的上下文描述 |\n| 构建 / 测试 / 部署命令 | CLAUDE.md | 全局性信息 |\n| 特定文件类型的编码规范 | Rules（带 paths） | 按需生效，不占用无关文件的上下文 |\n| 安全策略 | Rules | 独立维护，方便审计 |\n| 个人偏好 | 用户级 CLAUDE.md 或 Rules | 不提交到项目仓库 |\n| 复杂的多模块规范 | Rules（拆多个文件） | 每个文件职责单一，易维护 |\n\n\u003e **实践建议**：项目级 CLAUDE.md 控制在 100 行以内，放\"全局上下文\"（技术栈、核心命令、架构约定）。具体的编码规则拆到 `.claude/rules/` 下，按主题分文件。这样既保证 Claude 启动时有足够的项目理解，又不会让上下文被规则文本淹没。\n\n---\n\n## Auto Memory：Claude 自己的笔记本\n\n前面两套系统都是你写的——你告诉 Claude 该怎么做。Auto Memory 则反过来：**Claude 自己学到的东西，自己记下来**。\n\n### 工作原理\n\nAuto Memory 在 v2.1.59+ 版本中默认启用。工作流程：\n\n```text\n会话中 Claude 学到新知识\n        ↓\nClaude 判断是否值得记住\n        ↓\n  ┌─────┴─────┐\n  │ 是        │ 否\n  ↓           ↓\n写入 Memory   丢弃\n文件\n  ↓\n下次会话自动加载\n```\n\nClaude 会自动记录什么？\n\n| 类别 | 示例 |\n|------|------|\n| **构建 / 运行命令** | \"这个项目用 `pnpm` 而不是 `npm`\" |\n| **调试发现** | \"MySQL 连接超时是因为连接池配置在 `config/db.ts` 第 42 行\" |\n| **项目结构洞察** | \"API 路由都在 `app/api/` 下，每个路由一个目录\" |\n| **用户偏好** | \"用户喜欢函数式风格，不喜欢类组件\" |\n| **错误模式** | \"跑 `npm run build` 前要先 `npm run typecheck`，否则类型错误会导致构建失败\" |\n\n### 存储结构\n\nAuto Memory 的文件存储在用户目录下，**不在项目仓库内**：\n\n```text\n~/.claude/projects/\n└── \u003cproject-dir\u003e/            ← 基于 git 仓库路径推导的目录名\n    └── memory/\n        ├── MEMORY.md         ← 索引文件（会话启动时加载前 200 行或 25KB）\n        ├── topic-a.md        ← 主题文件（按需加载）\n        ├── topic-b.md\n        └── ...\n```\n\n关键细节：\n\n| 特性 | 说明 |\n|------|------|\n| **存储位置** | `~/.claude/projects/\u003cproject-dir\u003e/memory/` |\n| **项目识别** | 基于 git 仓库路径推导 |\n| **Worktree 共享** | 同一仓库的所有 worktree 共享同一份 memory |\n| **索引限制** | MEMORY.md 前 200 行或 25KB 在会话启动时加载 |\n| **详情加载** | 主题文件在 Claude 需要时按需加载 |\n| **自定义路径** | 可通过 `autoMemoryDirectory` 设置自定义存储目录 |\n\n\u003e **注意**：Auto Memory 文件不会出现在你的项目仓库中，也不会被 git 跟踪。它是纯粹的本地存储。如果你换了电脑，Auto Memory 需要重新积累。\n\n### /memory 命令\n\n`/memory` 是管理记忆系统的入口命令：\n\n```text\n\u003e /memory\n\n╭─ Memory ──────────────────────────────────╮\n│                                            │\n│  CLAUDE.md files:                          │\n│    ✓ ./CLAUDE.md (project)                │\n│    ✓ ~/.claude/CLAUDE.md (user)           │\n│                                            │\n│  Rule files:                               │\n│    ✓ .claude/rules/typescript.md          │\n│    ✓ .claude/rules/testing.md             │\n│    ✓ ~/.claude/rules/my-style.md (user)   │\n│                                            │\n│  Auto Memory: enabled                      │\n│    📁 ~/.claude/projects/abc123/memory/    │\n│    📄 MEMORY.md (47 lines)                │\n│    📄 build-patterns.md                   │\n│    📄 debugging-notes.md                  │\n│                                            │\n│  Actions:                                  │\n│    [t] Toggle auto memory                  │\n│    [o] Open memory folder                  │\n│    [e] Edit in editor                      │\n╰────────────────────────────────────────────╯\n```\n\n通过 `/memory` 你可以：\n\n- **查看**当前加载了哪些 CLAUDE.md 和规则文件\n- **开关** Auto Memory 功能\n- **打开** memory 文件夹，直接编辑或删除记忆文件\n- **确认**文件是否被正确加载（排错利器）\n\n### 手动干预 Auto Memory\n\n虽然 Auto Memory 是自动的，但你可以手动干预：\n\n```text\n# 让 Claude 记住特定信息\n\u003e 记住：这个项目的 CI 在 GitHub Actions 上跑，\n  配置在 .github/workflows/deploy.yml\n\n# 让 Claude 忘记某条记忆\n\u003e 忘记你之前记录的关于 MySQL 连接池的信息\n\n# 直接编辑 memory 文件\n\u003e /memory → [o] Open memory folder → 手动编辑 .md 文件\n```\n\n### Subagent 的独立记忆\n\nClaude Code 的子代理（Subagent）拥有自己独立的 Auto Memory 目录。这意味着当你配置了多个 Agent 角色时，每个角色可以积累自己的专属经验：\n\n```text\n~/.claude/agent-memory/\n├── reviewer/               ← Code Review 代理的独立记忆目录\n│   ├── MEMORY.md\n│   └── ...\n├── tester/                 ← 测试代理的独立记忆目录\n│   ├── MEMORY.md\n│   └── ...\n└── ...\n```\n\n---\n\n## 三套系统的协作模式\n\n理解每套系统的定位后，关键是知道**怎么组合使用**。\n\n### 模式一：个人项目的最小配置\n\n```text\n项目根目录/\n├── CLAUDE.md           ← 技术栈 + 核心命令 + 基本规范（50-80 行）\n└── ~/.claude/\n    └── CLAUDE.md       ← 个人偏好（语言、风格、Git 习惯）\n```\n\n适合个人项目，简单直接。Auto Memory 自动积累，不需要额外配置。\n\n### 模式二：团队项目的标准配置\n\n```text\n项目根目录/\n├── CLAUDE.md                 ← 项目概述 + 架构 + 核心命令（80-120 行）\n├── .claude/\n│   ├── settings.json         ← 项目级设置（权限、模型等）\n│   └── rules/\n│       ├── typescript.md     ← TypeScript 规则\n│       ├── testing.md        ← 测试规则（带 paths 限定）\n│       ├── git-commit.md     ← 提交规范\n│       └── security.md       ← 安全策略\n└── 每个开发者本地/\n    └── ~/.claude/\n        ├── CLAUDE.md         ← 个人偏好\n        └── rules/\n            └── my-style.md   ← 个人风格\n```\n\n项目级文件提交到 Git，团队共享。个人级文件留在本地。\n\n### 模式三：Monorepo 多层配置\n\n```text\nmonorepo/\n├── CLAUDE.md                    ← Monorepo 全局规范\n├── .claude/rules/\n│   └── shared-standards.md      ← 共享编码标准\n├── packages/\n│   ├── frontend/\n│   │   ├── CLAUDE.md            ← 前端特定规范（React、CSS）\n│   │   └── .claude/rules/\n│   │       └── react.md         ← React 组件规则（带 paths）\n│   ├── backend/\n│   │   ├── CLAUDE.md            ← 后端特定规范（Node.js、DB）\n│   │   └── .claude/rules/\n│   │       └── api-design.md    ← API 设计规则\n│   └── shared/\n│       └── CLAUDE.md            ← 共享库规范\n```\n\nMonorepo 的关键是**层级分工**：根级放通用规范，子包放模块特定规范。Claude 在操作前端代码时会自动加载前端的 CLAUDE.md 和规则，不会被后端规则干扰。\n\n### 模式四：跨工具兼容配置\n\n如果团队同时使用多个 AI 编程工具：\n\n```text\n项目根目录/\n├── AGENTS.md                    ← 通用指令（Cursor、OpenCode 等都能读）\n├── CLAUDE.md                    ← Claude Code 专用，导入通用指令\n│   内容：@AGENTS.md\n│         # Claude Code 专用设置\n│         ...\n├── .cursor/rules/               ← Cursor 专用规则\n└── .claude/rules/               ← Claude Code 专用规则\n```\n\n在 CLAUDE.md 中用 `@AGENTS.md` 导入通用指令，再追加 Claude Code 专属配置。一份规范维护一处，多工具共用。\n\n---\n\n## 常见问题与排错\n\n### 诊断清单\n\n遇到\"Claude 好像没读我的 CLAUDE.md\"时，按这个清单排查：\n\n| 步骤 | 操作 | 检查什么 |\n|------|------|---------|\n| 1 | 运行 `/memory` | 文件是否出现在加载列表中 |\n| 2 | 检查文件路径 | 是否放在了正确的位置（CWD 或其上级目录） |\n| 3 | 检查文件名 | 必须是 `CLAUDE.md`（大写），不是 `claude.md` |\n| 4 | 检查 @import 路径 | 导入的文件是否存在，路径是否正确 |\n| 5 | 检查文件大小 | 文件是否过大导致截断（建议少于 200 行） |\n| 6 | 检查 .gitignore | 确保 CLAUDE.md 没有被意外忽略 |\n\n### FAQ\n\n| 问题 | 回答 |\n|------|------|\n| CLAUDE.md 更新后需要重启吗？ | 不需要。`/compact` 或新消息时会从磁盘重新读取 |\n| Auto Memory 会泄露到 Git 吗？ | 不会。存储在 `~/.claude/projects/` 下，不在项目目录内 |\n| 能禁用 Auto Memory 吗？ | 能。通过 `/memory` 切换，或在 settings.json 设置 `\"autoMemoryEnabled\": false` |\n| 多个 CLAUDE.md 冲突怎么办？ | 避免冲突是最佳实践。如果冲突，Claude 会尝试协调；组织级优先级最高 |\n| Rules 文件支持哪些格式？ | Markdown 文件。Frontmatter（YAML）可选，用于 `paths` 限定 |\n| 能在 CLAUDE.md 里写代码块吗？ | 能。代码块会被正常传递给 Claude，适合放命令模板或代码示例 |\n| @import 最多几层嵌套？ | 5 层。A→B→C→D→E→F 是极限 |\n| 子目录 CLAUDE.md 什么时候加载？ | 当 Claude 读取该子目录下的文件时按需加载，不是启动时 |\n| 怎么让 Claude 记住跨会话的信息？ | 方法一：写入 CLAUDE.md。方法二：让 Auto Memory 自动记录。方法三：直接告诉 Claude \"记住这个\" |\n| Auto Memory 的 MEMORY.md 太长了怎么办？ | 只有前 200 行 / 25KB 会在启动时加载。可以手动编辑精简，或让 Claude 整理 |\n\n---\n\n## 实战：为本博客项目配置记忆层\n\n让我们用一个真实案例——就是你正在阅读的这个博客项目——展示如何配置完整的记忆层。\n\n### 项目级 CLAUDE.md\n\n```markdown\n# 个人博客\n\n## 技术栈\n- Next.js 15 + React 19 + TypeScript 5（严格模式）\n- Tailwind CSS 3.4 + shadcn/ui\n- MDX 博客内容，gray-matter 解析 frontmatter\n- Vitest 单元测试\n- 静态导出到 GitHub Pages + Cloudflare CDN\n\n## 核心命令\n- `npm run dev` — 开发服务器\n- `npm run build` — 构建（输出到 /dist）\n- `npm run test` — 运行测试\n- `npm run typecheck` — TypeScript 类型检查\n- `npm run lint` — ESLint 检查\n\n## 目录结构\n- `app/` — Next.js App Router 路由\n- `components/` — React 组件\n- `lib/` — 核心逻辑（blog.ts、mdx.tsx、config.ts）\n- `content/blog/` — MDX 文章（agile/career/oo/xp/swd）\n- `public/` — 静态资源\n- `types/` — TypeScript 类型定义\n\n## 文章 Frontmatter\n必需：title、date\n可选：tags、published、brief\n\n## 注意事项\n- 不要提交 .env.local\n- 文章文件用 kebab-case 命名\n- 组件用 PascalCase\n```\n\n### 规则文件\n\n```markdown\n\u003c!-- .claude/rules/mdx-articles.md --\u003e\n---\npaths:\n  - \"content/blog/**/*.mdx\"\n---\n\n# MDX 文章规则\n\n- Frontmatter 必须包含 title 和 date\n- date 格式：'YYYY-MM-DD'\n- tags 是字符串数组\n- 写完文章后运行 `npm run build` 验证\n- 标题使用中文\n- 代码块标注语言\n```\n\n```markdown\n\u003c!-- .claude/rules/components.md --\u003e\n---\npaths:\n  - \"components/**/*.tsx\"\n---\n\n# 组件规则\n\n- 服务器组件是默认的\n- 客户端组件顶部加 \"use client\"\n- Props 用 interface 定义\n- 使用 Tailwind CSS 工具类\n- 导入顺序：外部模块 → 绝对路径 → 相对路径\n```\n\n### 效果\n\n配置好后，Claude Code 的行为会发生显著变化：\n\n- **写博客文章时**：自动使用正确的 frontmatter 格式，写完后主动跑构建\n- **改组件时**：自觉遵循 PascalCase、Tailwind、正确的导入顺序\n- **跑命令时**：知道用 `npm run build` 而不是猜测\n- **跨会话时**：Auto Memory 记住了之前的调试经验，不会重复踩坑\n\n不需要每次都重复说明这些规范。**一次配置，永久生效**。\n\n---\n\n## 小结\n\n| 维度 | CLAUDE.md | .claude/rules/ | Auto Memory |\n|------|-----------|----------------|-------------|\n| **谁写** | 你 | 你 | Claude |\n| **内容** | 全局上下文、架构、命令 | 特定规则、路径限定 | 学到的经验、模式 |\n| **加载** | 启动时 + 按需 | 启动时 | 启动时索引 + 按需详情 |\n| **存储** | 项目内（Git 跟踪） | 项目内（Git 跟踪） | 本地（~/.claude/） |\n| **维护** | 手动 | 手动 | 自动 + 可手动干预 |\n| **共享** | 团队共享 | 团队共享 | 个人 |\n\n记忆层是 Claude Code 从\"聊天工具\"进化为\"团队成员\"的关键。它让 Claude 不再每次从零开始，而是带着你的项目知识、团队规范和历史经验进入每次会话。\n\n**下一篇**，我们将深入 Claude Code 的[设置系统与权限模型](/articles/2026/04/06/claude-code-settings-and-permissions)——四层配置作用域、精细化权限规则、Auto Mode 的安全分类器，以及如何在安全与效率之间找到最佳平衡点。\n\n---\n\n\u003e 📖 **系列导航**\n\u003e\n\u003e - [第一篇：从 OpenCode 切到 Claude Code](/articles/2026/04/01/opencode-to-claude-code-getting-oriented)\n\u003e - [第二篇：快速上手](/articles/2026/04/02/claude-code-getting-started)\n\u003e - [第三篇：日常工作流](/articles/2026/04/03/claude-code-common-workflows)\n\u003e - [第四篇：交互模式与内置命令](/articles/2026/04/04/claude-code-interactive-mode-and-built-in-commands)\n\u003e - **第五篇：CLAUDE.md、Rules 与 Auto Memory**（本文）\n\u003e - [第六篇：设置、权限与 Auto Mode](/articles/2026/04/06/claude-code-settings-and-permissions)\n\u003e - [第七篇：扩展架构全景](/articles/2026/04/07/claude-code-extension-model-overview)\n\u003e - [第八篇：高阶自动化实战](/articles/2026/04/08/claude-code-advanced-automation-with-mcp-hooks-and-agents)\n"])</script><script>self.__next_f.push([1,"1f:T57bd,"])</script><script>self.__next_f.push([1,"\n\u003e **系列导读**：本文是 Claude Code 系列第 4 篇。第 1 篇讲[迁移心智模型](/articles/2026/04/01/opencode-to-claude-code-getting-oriented)，第 2 篇讲[安装与上手](/articles/2026/04/02/claude-code-getting-started)，第 3 篇讲[日常工作流](/articles/2026/04/03/claude-code-common-workflows)。本篇将深入交互层——权限模式、命令体系与上下文管理，让你从\"能用\"进阶到\"用得顺\"。\n\n---\n\n## 为什么交互模式值得单独讲\n\n前三篇我们从心智模型到安装，再到六个真实工作场景，已经能用 Claude Code 干活了。但你可能遇到过这些卡点：\n\n- 每次修改文件都要手动确认，连续修 20 个文件时崩溃\n- 聊到一半上下文满了，Claude 开始\"忘事\"\n- 想跑个 shell 命令但不知道怎么最快触发\n- 不知道哪些命令是内置的，哪些其实是 Skill\n\n这些问题的答案都在**交互模式**里。Claude Code 的终端不是一个简单的聊天框，而是一个精心设计的**开发者控制台**，拥有六种权限模式、60+ 条内置命令、十几个快捷键组合，以及一套完整的上下文管理策略。\n\n---\n\n## 六种权限模式：安全与效率的平衡\n\n权限模式决定了 Claude 在执行操作时**需不需要你点头**。这是 Claude Code 最核心的交互机制之一。\n\n### 模式总览\n\n| 模式 | 启动方式 | 文件读取 | 文件写入 | 命令执行 | 适用场景 |\n|------|---------|---------|---------|---------|---------|\n| **Default** | 默认 | ✅ 自动 | ⚠️ 需确认 | ⚠️ 需确认 | 日常开发，平衡安全与效率 |\n| **Accept Edits** | `Shift+Tab` / `--permission-mode acceptEdits` | ✅ 自动 | ✅ 自动 | ⚠️ 需确认 | 信任 Claude 的代码修改，但命令仍需把关 |\n| **Plan** | `Shift+Tab` / `--permission-mode plan` | ✅ 自动 | ❌ 禁止 | ⚠️ 只读探索命令 | 分析和规划，允许读文件和执行探索性 shell 命令（如 `ls`、`cat`）|\n| **Auto** | 需额外启用 / `--permission-mode auto` | ✅ 自动 | ✅ 自动 | ⚠️ 分类器判断 | 大批量任务，Auto 分类器自动判断命令安全性 |\n| **Don't Ask** | `--permission-mode dontAsk` | ✅ 自动 | ✅ 自动 | ⚠️ 仅预批准 | CI/CD 流水线，自动拒绝未在 allow 列表中预批准的工具 |\n| **Bypass Permissions** | `--permission-mode bypassPermissions` | ✅ 自动 | ✅ 自动 | ✅ 自动（含危险操作） | 极端场景，跳过所有安全检查 |\n\n### 用 Shift+Tab 实时切换\n\n在交互模式下，按 `Shift+Tab` 可以在三种模式之间循环切换：\n\n```text\nDefault → Accept Edits → Plan → Default → ...\n```\n\n\u003e **注意**：Auto 模式不在 `Shift+Tab` 循环中，需要通过设置或命令行标志 `--permission-mode auto` 额外启用。\n\n这是 Claude Code 最实用的快捷键之一。典型工作流：\n\n1. 用 **Plan** 模式让 Claude 分析问题、给出方案\n2. 确认方案后切到 **Accept Edits**，让它自动改代码\n3. 改完切回 **Default**，逐个确认命令执行（跑测试、提交等）\n\n\u003e **提示**：`dontAsk` 和 `bypassPermissions` 只能通过命令行标志启用，不能在交互模式中切换——这是故意的安全设计。\n\n### Auto 模式的分类器机制\n\nAuto 模式不是简单的\"全部允许\"。它内置了一个**安全分类器**，将操作分为三类：\n\n| 分类 | 示例 | 行为 |\n|------|------|------|\n| **默认允许** | `ls`、`cat`、`git status`、`npm test` | 自动执行 |\n| **默认阻止** | `rm -rf`、`curl \\| bash`、修改 `/etc` | 拒绝执行并提示 |\n| **灰色地带** | `git push`、`npm install`、`docker run` | 分类器根据上下文判断 |\n\n你可以通过 `/permissions` 命令自定义允许和阻止列表：\n\n```text\n/permissions\n\n# 添加到允许列表\nAllow: npm run build\nAllow: docker compose up\n\n# 添加到阻止列表\nBlock: rm -rf /\n```\n\n### 受保护目录\n\n无论什么权限模式，Claude Code 都**不会**修改以下目录和文件：\n\n- `.git/`（Git 内部数据）\n- `.vscode/`、`.idea/`（IDE 配置）\n- `.husky/`（Git Hooks）\n- `.bashrc`、`.zshrc`、`.profile` 等 Shell 配置文件\n- 其他开发环境敏感路径\n\n即使在 `bypassPermissions` 模式下，这些路径也是硬编码保护的。\n\n---\n\n## 快捷键与输入技巧\n\nClaude Code 的终端支持丰富的键盘操控。掌握这些快捷键，手可以不离键盘就完成所有操作。\n\n### 核心快捷键速查\n\n| 快捷键 | 功能 | 说明 |\n|--------|------|------|\n| `Enter` | 发送消息 | 单行输入时直接发送 |\n| `Shift+Tab` | 切换权限模式 | 循环：Default → Accept Edits → Plan |\n| `Esc` `Esc`（连按两次） | 回退到检查点（rewind） | 撤销上一轮 Claude 的修改 |\n| `Ctrl+C` | 取消当前操作 | 中断当前正在进行的操作 |\n| `Ctrl+D` | 退出 | 等价于输入 `/exit` |\n| `Ctrl+L` | 清屏 | 清除终端显示，不清除上下文 |\n| `Ctrl+G` | 在编辑器中打开输入 | 用外部编辑器编写长 prompt |\n| `Ctrl+R` | 搜索历史 | 搜索之前输入过的提示词 |\n| `Ctrl+V` | 粘贴图片 | 从剪贴板粘贴截图到对话 |\n| `Ctrl+O` | 切换详细输出 | 展开/折叠工具调用的详细信息 |\n| `Ctrl+B` | 后台运行 bash | 在后台启动一个 bash 进程 |\n| `Ctrl+T` | 打开任务列表 | 管理多个并行任务（最多 10 个） |\n| `Alt+P` | 切换模型 | 在不同模型之间快速切换 |\n\n### 多行输入\n\nClaude Code 支持三种多行输入方式：\n\n**方式一：反斜杠续行**\n\n```text\n我需要你做以下修改：\\\n1. 在 Header 组件中添加搜索框 \\\n2. 搜索结果用 debounce 处理 \\\n3. 添加对应的单元测试\n```\n\n**方式二：Vim 模式**\n\n如果你习惯 Vim，可以启用 Vim 模式：\n\n```text\n/config\n# 找到 Vim mode 选项并启用\n```\n\n启用后，你在输入框中获得完整的 Vim 按键绑定——`i` 进入插入模式，`Esc` 回到普通模式，`o` 新开一行。对于长 prompt 的编辑体验大幅提升。\n\n**方式三：粘贴多行文本**\n\n直接从编辑器粘贴多行内容，Claude Code 会自动识别为多行输入。\n\n### ! 前缀直接执行 bash\n\n在输入框中以 `!` 开头，可以直接执行 bash 命令而不经过 Claude：\n\n```text\n! git status\n! npm run test -- --watch\n! docker ps\n```\n\n这比切出终端窗口再切回来快得多。执行结果会直接显示在对话中，Claude 也能看到输出。\n\n### 后台 bash（Ctrl+B）\n\n`Ctrl+B` 启动一个后台 bash 进程，非常适合需要长时间运行的命令：\n\n```text\n# 按 Ctrl+B 后输入\nnpm run dev\n\n# 后台进程持续运行，你继续和 Claude 对话\n# 进程输出最多保留 5GB\n```\n\n典型用法：在后台跑 `npm run dev`，前台继续让 Claude 改代码，改完直接在浏览器看效果。\n\n### /btw 侧面提问\n\n`/btw` 是一个特殊命令，用于\"顺便问一下\"——提出一个与当前任务无关的问题：\n\n```text\n/btw TypeScript 5.7 的 using 关键字是怎么用的？\n```\n\n`/btw` 的三个特点：\n\n1. **不加入对话历史**——不会干扰当前任务的上下文\n2. **不使用工具**——纯知识回答，不读文件、不跑命令\n3. **成本更低**——使用更轻量的处理方式\n\n适合在工作中临时查一个语法、确认一个概念，而不想打断正在进行的任务流。\n\n---\n\n## 内置命令全景\n\nClaude Code 拥有 60+ 条内置命令，输入 `/` 即可看到完整列表和搜索。以下按功能分类梳理。\n\n### 会话管理\n\n| 命令 | 功能 | 使用场景 |\n|------|------|---------|\n| `/clear` | 清除当前对话历史 | 上下文混乱时重新开始 |\n| `/compact` | 压缩对话历史 | 上下文快满时，保留关键信息 |\n| `/compact [主题]` | 按主题压缩 | 指定保留哪些方面的信息 |\n| `/save` | 保存当前会话 | 离开前保存进度 |\n| `/resume` | 恢复之前的会话 | 继续上次的工作 |\n| `/exit` | 退出 Claude Code | 等价于 Ctrl+D |\n\n### 上下文操作\n\n| 命令 | 功能 | 使用场景 |\n|------|------|---------|\n| `@文件路径` | 引用文件到上下文 | 精确指定 Claude 要看的文件 |\n| `@目录路径` | 引用整个目录 | 批量加载相关文件 |\n| `@url` | 引用 URL 内容 | 加载网页、文档链接 |\n| `/add-dir` | 添加工作目录 | 将额外目录纳入 Claude 的视野 |\n| `/add-tool` | 添加自定义工具 | 扩展 Claude 可用的工具集 |\n| `/remove-tool` | 移除工具 | 精简工具列表 |\n| `/tools` | 列出可用工具 | 查看当前 Claude 能用什么工具 |\n\n### 配置与设置\n\n| 命令 | 功能 | 使用场景 |\n|------|------|---------|\n| `/config` | 打开配置菜单 | 修改主题、Vim 模式等设置 |\n| `/model` | 切换模型 | 在 Opus、Sonnet 之间切换 |\n| `/permissions` | 管理权限规则 | 添加允许/阻止的命令模式 |\n| `/cost` | 查看会话费用 | 监控 token 消耗和成本 |\n| `/status` | 查看当前状态 | 确认会话 ID、模式、模型等 |\n\n### 扩展与集成\n\n| 命令 | 功能 | 使用场景 |\n|------|------|---------|\n| `/mcp` | 管理 MCP 服务器 | 添加、移除、查看 MCP 连接 |\n| `/plugin` | 管理代码智能插件 | 安装语言插件（LSP 能力） |\n| `/hooks` | 管理生命周期钩子 | 配置事件触发的自动化动作 |\n| `/agents` | 管理 sub-agents | 查看和配置子代理 |\n| `/chrome` | 启动 Chrome 浏览器 | 需要浏览器操作时 |\n\n### 工作流命令\n\n| 命令 | 功能 | 使用场景 |\n|------|------|---------|\n| `/review` | 代码审查（已弃用） | 审查当前 diff 或指定提交 |\n| `/pr-comments` | 查看 PR 评论 | 拉取 GitHub PR 的评论到上下文 |\n| `/init` | 初始化 CLAUDE.md | 在项目中创建指令文件 |\n| `/tasks` | 管理子任务 | 查看和管理 sub-agent 任务 |\n| `/help` | 查看帮助 | 获取命令使用指南 |\n\n### 内置命令 vs Bundled Skills\n\n\u003e **重要区分**：以下命令看起来像内置命令，但其实是 **Bundled Skills**（预装技能）：\n\u003e\n\u003e | 命令 | 本质 | 说明 |\n\u003e |------|------|------|\n\u003e | `/batch` | Skill | 批量处理多个文件的相同操作 |\n\u003e | `/debug` | Skill | 交互式调试工作流 |\n\u003e | `/loop` | Skill | 循环执行直到条件满足 |\n\u003e | `/simplify` | Skill | 简化和重构代码 |\n\u003e\n\u003e Bundled Skills 和内置命令的区别：Skills 可以被覆盖或扩展，它们使用 Claude 的 Agent 能力执行，而内置命令是硬编码的系统功能。了解这个区别在你自定义工作流时很重要——你可以创建同名 Skill 来覆盖 bundled 版本。\n\n---\n\n## 上下文管理：最容易被忽视的关键能力\n\n上下文窗口是 Claude Code 的\"工作记忆\"。管理好上下文，是高效使用 Claude Code 和\"用了就忘\"之间的分水岭。\n\n### 上下文窗口模型\n\nClaude Code 的上下文窗口就像一个固定大小的白板：\n\n```text\n┌─────────────────────────────────────────────────────────┐\n│  系统指令 (CLAUDE.md, Rules 等)                          │\n│  ───────────────────────────────                        │\n│  对话历史 (你的提问 + Claude 的回答)                      │\n│  ───────────────────────────────                        │\n│  工具调用结果 (文件内容、命令输出等)                       │\n│  ───────────────────────────────                        │\n│  当前提问                                                │\n│  ▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼                               │\n│  [窗口上限 ≈ 200K tokens]                                │\n└─────────────────────────────────────────────────────────┘\n```\n\n当内容接近窗口上限时，Claude Code 会自动提示你需要 compact。\n\n### 什么在消耗你的上下文\n\n| 消耗来源 | 典型大小 | 说明 |\n|---------|---------|------|\n| 系统指令 | 2K-10K tokens | CLAUDE.md、Rules、项目配置 |\n| 每轮对话 | 500-5K tokens | 取决于回答复杂度 |\n| 文件读取 | 1K-50K tokens | 大文件是头号杀手 |\n| 命令输出 | 500-20K tokens | `git log`、测试输出等 |\n| 图片 | 1K-5K tokens | 截图和图表 |\n\n### 三种上下文管理策略\n\n#### 策略一：/compact —— 压缩而不丢弃\n\n```text\n/compact\n```\n\nClaude 会把当前对话历史压缩成一段摘要，释放上下文空间但保留关键信息。你可以指定压缩主题：\n\n```text\n/compact 保留所有关于数据库迁移的决策和代码修改\n```\n\n**适用时机**：\n\n- 上下文使用率超过 70%\n- Claude 开始\"忘记\"之前的约定\n- 对话中有大量已完成的探索性内容\n\n**注意**：compact 后，Claude 对之前的精确代码细节可能模糊。如果后续需要引用之前改过的文件，最好用 `@` 重新加载。\n\n#### 策略二：/clear + 新开会话 —— 干净重来\n\n```text\n/clear\n```\n\n完全清空对话历史。适用于：\n\n- 任务已完成，准备开始全新任务\n- 上下文被错误信息污染\n- 切换到完全不同的代码模块\n\n\u003e **技巧**：在 `/clear` 之前，先用 `/save` 保存当前会话。万一后续需要回来，可以用 `/resume` 恢复。\n\n#### 策略三：/resume —— 接续之前的会话\n\n```text\n/resume\n```\n\n显示最近的会话列表，选择一个恢复。这在以下场景非常有用：\n\n- 下班前 `/save`，第二天 `/resume` 继续\n- 在 CLI 中做了一半，切到 Web 端继续（Web/Desktop/CLI 共享会话）\n- 在不同分支间切换任务\n\n你也可以通过 CLI 标志直接恢复：\n\n```bash\n# 恢复最近的会话\nclaude --resume\n\n# 恢复指定会话\nclaude --resume session-id\n\n# 继续上次的会话（等价于 --resume 最近一个）\nclaude --continue\n```\n\n### @ 引用的最佳实践\n\n`@` 是精确控制上下文的利器：\n\n```text\n# 引用单个文件\n看一下 @src/components/Header.tsx 的实现\n\n# 引用多个文件\n比较 @src/old-api.ts 和 @src/new-api.ts 的差异\n\n# 引用目录\n分析 @src/hooks/ 目录下所有自定义 Hook\n\n# 引用 URL\n参考 @https://react.dev/reference/react/useEffect 来重构这段代码\n```\n\n**@ 引用 vs 让 Claude 自己找**：\n\n| 方式 | 优点 | 缺点 | 适用场景 |\n|------|------|------|---------|\n| `@` 精确引用 | 节省 token，精确 | 需要你知道文件路径 | 已知要看哪些文件 |\n| 让 Claude 自己搜索 | 能发现你不知道的文件 | 消耗更多上下文 | 探索性任务 |\n| 子代理探索 | 不污染主上下文 | 结果需要传回主会话 | 大范围代码搜索 |\n\n### 上下文管理决策流\n\n面对上下文管理，可以按这个决策流来：\n\n```text\n上下文快满了？\n├── 当前任务还在进行中\n│   ├── 需要之前的精确细节 → /compact [保留主题]\n│   └── 不需要精确细节 → /compact\n├── 当前任务已完成\n│   ├── 可能还要回来 → /save → /clear\n│   └── 不会回来了 → /clear\n└── 上下文被污染了\n    └── /clear 重新开始\n```\n\n---\n\n## 会话的生命周期：保存、恢复与跨端迁移\n\n### 会话自动保存\n\nClaude Code 会自动保存会话状态。即使你意外关闭终端，下次启动时也可以通过 `/resume` 恢复。\n\n### 跨端共享\n\nClaude Code 的会话可以在不同入口之间无缝切换：\n\n```text\nCLI ←→ VS Code 扩展 ←→ JetBrains 插件 ←→ Web 端（claude.ai/code）\n```\n\n场景示例：\n\n1. 在 CLI 中开始一个重构任务\n2. 需要看 UI 效果，切到 VS Code 扩展继续\n3. 回到家在 Web 端 `/resume`，继续收尾\n\n### 从 PR 恢复上下文\n\n一个特别实用的功能——从 Pull Request 恢复上下文：\n\n```bash\nclaude --from-pr 123\n```\n\nClaude 会读取 PR #123 的所有信息（标题、描述、diff、评论），自动构建出一个包含完整上下文的会话。非常适合：\n\n- 接手别人的 PR 做 review\n- 继续一个之前搁置的 PR\n- 根据 reviewer 评论修改代码\n\n---\n\n## CLI 标志速查：非交互场景必备\n\n当你在脚本、CI/CD 或管道中使用 Claude Code 时，CLI 标志是你的主要交互方式。\n\n### 会话相关\n\n| 标志 | 功能 | 示例 |\n|------|------|------|\n| `-c, --continue` | 继续最近的会话 | `claude -c` |\n| `-r, --resume` | 选择会话恢复 | `claude -r session-id` |\n| `-n, --new` | 强制新会话 | `claude -n` |\n| `--from-pr` | 从 PR 初始化 | `claude --from-pr 123` |\n\n### 权限与模式\n\n| 标志 | 功能 | 示例 |\n|------|------|------|\n| `--permission-mode` | 设置权限模式 | `claude --permission-mode auto` |\n| `--allowedTools` | 指定允许的工具 | `claude --allowedTools \"Bash,Read\"` |\n| `--disallowedTools` | 指定禁止的工具 | `claude --disallowedTools \"WebFetch\"` |\n\n### 模型与性能\n\n| 标志 | 功能 | 示例 |\n|------|------|------|\n| `--model` | 指定模型 | `claude --model sonnet` |\n| `--effort` | 推理力度 | `claude --effort high` |\n\n### 输出控制\n\n| 标志 | 功能 | 示例 |\n|------|------|------|\n| `-p, --print` | 非交互模式 | `echo \"分析代码\" \\| claude -p` |\n| `--output-format` | 输出格式 | `claude -p --output-format json` |\n\n### 系统提示\n\n| 标志 | 功能 | 示例 |\n|------|------|------|\n| `--system-prompt` | 追加系统提示 | `claude --system-prompt \"用中文回答\"` |\n| `--system-prompt-file` | 从文件加载提示 | `claude --system-prompt-file rules.md` |\n| `--system-prompt-override` | 覆盖系统提示 | 替代而非追加 |\n\n### MCP 配置\n\n| 标志 | 功能 | 示例 |\n|------|------|------|\n| `--mcp-config` | 指定 MCP 配置文件 | `claude --mcp-config mcp.json` |\n\n### Worktree\n\n| 标志 | 功能 | 示例 |\n|------|------|------|\n| `-w, --worktree` | 使用 Git Worktree | `claude -w feature/auth` |\n\n\u003e **管道模式典型用法**：\n\u003e\n\u003e ```bash\n\u003e # 代码审查管道\n\u003e git diff main..HEAD | claude -p \"审查这个 diff，列出问题和建议\"\n\u003e\n\u003e # 批量文件处理\n\u003e find src -name \"*.ts\" | claude -p \"找出所有未处理的 Promise\"\n\u003e\n\u003e # CI 中的自动修复\n\u003e claude -p --permission-mode auto \"修复所有 lint 错误并提交\"\n\u003e ```\n\n---\n\n## 实战组合技\n\n掌握了单个命令和快捷键后，真正的效率来自**组合使用**。以下是几个经过实战验证的组合技。\n\n### 组合技一：Plan → Execute → Verify\n\n```text\n# 第一步：Plan 模式分析（按 Shift+Tab 切到 Plan）\n分析 @src/auth/ 目录的认证逻辑，给出从 JWT 迁移到 Session 的方案\n\n# 第二步：确认方案后切到 Accept Edits（Shift+Tab）\n按照刚才的方案执行迁移\n\n# 第三步：切回 Default 模式（Shift+Tab），逐个确认命令\n跑一下测试看有没有回归\n```\n\n### 组合技二：后台服务 + 前台开发\n\n```text\n# Ctrl+B 启动后台进程\nnpm run dev\n\n# 前台继续工作\n修改 @src/pages/Login.tsx，添加\"记住我\"功能\n\n# 改完后\n! curl http://localhost:3000/api/auth/session  # ! 快速验证\n```\n\n### 组合技三：子任务并行\n\n```text\n# Ctrl+T 打开任务列表\n# 创建任务 1：修复认证模块\n# 创建任务 2：优化首页性能\n# 最多可以并行 10 个任务\n```\n\n任务之间的上下文是隔离的——一个任务中的文件修改不会干扰另一个任务的上下文。适合在等待一个耗时操作时开启另一个任务。\n\n### 组合技四：Review + PR Comments 闭环\n\n```text\n/review                  # 审查当前 diff\n/pr-comments             # 拉取 PR 评论\n根据评论修改代码          # Claude 结合评论做针对性修改\n/review                  # 再次审查确认修改质量\n```\n\n---\n\n## 常见问题速查\n\n| 问题 | 解答 |\n|------|------|\n| Claude 不停问我要不要执行，太烦了 | 切到 Accept Edits 或 Auto 模式（`Shift+Tab`） |\n| 上下文满了怎么办 | `/compact` 压缩，或 `/save` + `/clear` 重来 |\n| 怎么看当前用了多少上下文 | `/cost` 查看 token 消耗 |\n| Vim 模式怎么开 | `/config` → 找到 Vim Mode → 启用 |\n| 怎么在不同设备间继续工作 | `/save` 后在另一个设备 `/resume` |\n| `/batch` 和 `/loop` 是内置命令吗 | 不是，它们是 Bundled Skills |\n| Auto 模式安全吗 | 相对安全，有分类器保护，但建议在 Git 仓库中使用（可随时回退） |\n| 怎么快速执行 shell 命令 | 用 `!` 前缀，如 `! git status` |\n\n---\n\n## 小结\n\n本文覆盖了 Claude Code 交互层的四个维度：\n\n| 维度 | 核心要点 |\n|------|---------|\n| **权限模式** | 6 种模式从最保守到最激进，`Shift+Tab` 实时切换前 3 种 |\n| **快捷键** | `Esc Esc` 中断、`Ctrl+B` 后台 bash、`!` 前缀直接执行、`/btw` 侧面提问 |\n| **内置命令** | 60+ 条命令分 5 大类，注意区分内置命令和 Bundled Skills |\n| **上下文管理** | `/compact` 压缩、`/clear` 重来、`/resume` 恢复、`@` 精确引用 |\n\n交互模式是你和 Claude Code 之间的**操作系统**。掌握它，你的每个意图都能以最短路径传达给 Claude；忽略它，你就像在用一台没学过快捷键的电脑——能用，但慢。\n\n\u003e **下一篇预告**：第 5 篇将深入 CLAUDE.md、Rules 和 Auto Memory——Claude Code 的\"长期记忆\"系统。如何让 Claude 记住你的编码偏好、项目规范和团队约定，让每次对话都不从零开始。\n\n\u003e 📖 **系列导航**\n\u003e\n\u003e - [第一篇：从 OpenCode 切到 Claude Code](/articles/2026/04/01/opencode-to-claude-code-getting-oriented)\n\u003e - [第二篇：快速上手](/articles/2026/04/02/claude-code-getting-started)\n\u003e - [第三篇：日常工作流](/articles/2026/04/03/claude-code-common-workflows)\n\u003e - **第四篇：交互模式与内置命令**（本文）\n\u003e - [第五篇：CLAUDE.md、Rules 与 Auto Memory](/articles/2026/04/05/claude-code-memory-and-claude-md)\n\u003e - [第六篇：设置、权限与 Auto Mode](/articles/2026/04/06/claude-code-settings-and-permissions)\n\u003e - [第七篇：扩展架构全景](/articles/2026/04/07/claude-code-extension-model-overview)\n\u003e - [第八篇：高阶自动化实战](/articles/2026/04/08/claude-code-advanced-automation-with-mcp-hooks-and-agents)\n"])</script><script>self.__next_f.push([1,"20:T4d94,"])</script><script>self.__next_f.push([1,"\n\u003e **系列导读**：本文是 Claude Code 系列第 3 篇。第 1 篇讲[迁移心智模型](/articles/2026/04/01/opencode-to-claude-code-getting-oriented)，第 2 篇讲[安装与上手](/articles/2026/04/02/claude-code-getting-started)。如果你已装好 Claude Code 并完成了第一个真实任务，本篇将带你走完日常研发的全部场景。\n\n---\n\n## 为什么需要\"工作流\"思维\n\n很多开发者初次使用 AI 编程工具时，把它当做**搜索引擎**——\"怎么写一个排序算法？\"。但 Claude Code 是**代理式编码环境**：它能读文件、跑命令、改代码、看结果，然后基于结果继续迭代。\n\n这意味着你不是在\"问问题\"，而是在**指挥一个初级工程师**。你描述目标、提供上下文、给出验证标准，Claude 去执行。执行过程中你可以随时纠偏、中断、回退。\n\n本文覆盖六个最高频的日常场景，每个场景都给出：\n\n- **你怎么提问**（提示词示例）\n- **Claude 会做什么**（典型行为链）\n- **常见陷阱与应对**\n\n---\n\n## 场景一：快速理解陌生代码库\n\n### 适用时机\n\n- 刚加入一个新项目\n- 接手一个不熟悉的模块\n- 在大型 monorepo 中定位功能代码\n\n### 推荐步骤\n\n**第一步：获取全局概览**\n\n```text\n给我这个代码库的整体概览：\n- 目录结构和主要模块\n- 核心技术栈\n- 数据流和架构模式\n```\n\nClaude 会读取 `package.json`、`README`、关键目录结构，给你一张\"地图\"。\n\n**第二步：深入特定领域**\n\n```text\n解释一下认证模块是怎么工作的。\n从前端登录表单开始，追踪到数据库的完整请求流程。\n```\n\n**第三步：定位关联代码**\n\n```text\n找到所有处理支付回调的文件，\n说明它们之间的调用关系。\n```\n\n### 提效技巧\n\n| 技巧 | 说明 |\n|------|------|\n| **从广到窄** | 先问\"整体架构\"，再问\"这个模块怎么工作\" |\n| **使用领域语言** | 用项目中的术语提问，而不是泛泛的\"这个功能\" |\n| **`@` 引用文件** | `解释一下 @src/auth/middleware.ts 的逻辑` 比 \"找到认证中间件并解释\" 更精确 |\n| **安装代码智能插件** | 运行 `/plugin` 搜索你语言的代码智能插件，让 Claude 获得\"转到定义\"和\"查找引用\"能力 |\n\n### 常见陷阱\n\n\u003e **陷阱**：问 Claude \"把整个代码库都看一遍\"——这会读取大量文件，快速填满上下文窗口。\n\u003e\n\u003e **应对**：限定范围。\"只看 `src/auth/` 目录\"比\"看整个代码库\"高效得多。或者使用 subagent 做探索，避免污染主会话上下文。\n\n---\n\n## 场景二：从错误描述到修复完成\n\n### 适用时机\n\n- 收到一个 Bug 报告\n- 构建或测试报错\n- 生产环境出现异常\n\n### 推荐步骤\n\n**第一步：分享错误信息**\n\n```text\n运行 npm test 时出现了以下错误：\n[粘贴错误日志]\n\n帮我找到根本原因。\n```\n\n\u003e **关键原则**：告诉 Claude **重现问题的命令**，而不只是错误消息。Claude 可以自己跑命令获取完整堆栈。\n\n**第二步：让 Claude 诊断**\n\nClaude 典型的行为链：\n1. 读取相关源文件\n2. 分析错误堆栈中涉及的调用链\n3. 定位到具体的问题代码\n4. 提出修复方案\n\n**第三步：应用修复并验证**\n\n```text\n用你建议的方案修复这个问题。\n修完后运行 npm test 确认测试通过。\n```\n\n### 提效技巧\n\n| 技巧 | 说明 |\n|------|------|\n| **给重现步骤** | \"登录后点击设置页面会报错\" 比 \"有个 Bug\" 有用得多 |\n| **说明是否间歇性** | \"这个错误偶尔出现\"会影响 Claude 的诊断策略 |\n| **要求解决根因** | \"解决根本原因，不要抑制错误\" 可以防止 Claude 只加 try-catch |\n| **粘贴截图** | 直接拖放错误截图到终端，比手动描述更准确 |\n\n### 常见陷阱\n\n\u003e **陷阱**：Claude 修了一个错误，但引入了新的回归。\n\u003e\n\u003e **应对**：始终要求 Claude 运行完整测试套件，而不只是验证改动的那个测试。\n\n---\n\n## 场景三：先规划再重构\n\n### 适用时机\n\n- 更新遗留代码到现代模式\n- 大范围的 API 变更\n- 提取公共逻辑、拆分大文件\n\n### 推荐工作流：Plan Mode 四阶段\n\n**阶段一：探索（Plan Mode）**\n\n按 `Shift+Tab` 切换到 Plan Mode，或启动时使用：\n\n```bash\nclaude --permission-mode plan\n```\n\n```text\n读取 src/utils/ 目录，分析其中哪些函数使用了\n已废弃的 API。列出每个文件的问题和严重程度。\n```\n\n在 Plan Mode 中 Claude 只读取和分析，不做任何修改。\n\n**阶段二：规划**\n\n```text\n我想把这些工具函数从 CommonJS 迁移到 ES Modules。\n哪些文件需要改？改动的顺序是什么？有哪些风险？\n给我一个详细的实施计划。\n```\n\n\u003e **进阶技巧**：按 `Ctrl+G` 可以在外部编辑器中打开输入框，你可以在编辑器中编写和修改长 prompt 后发送给 Claude。\n\n**阶段三：实现（Normal Mode）**\n\n切回 Normal Mode（`Shift+Tab` 循环切换），让 Claude 执行计划：\n\n```text\n按照你的计划开始重构。\n每改完一个文件就运行 npm test 确认没有回归。\n```\n\n**阶段四：提交**\n\n```text\n用描述性的 commit 信息提交更改。\n```\n\n### 何时跳过规划\n\n| 场景 | 需要规划？ |\n|------|----------|\n| 修改多个文件的架构变更 | ✅ 强烈建议 |\n| 不确定最佳方案 | ✅ 建议 |\n| 一句话能描述清楚的 diff | ❌ 直接执行 |\n| 修复拼写错误、重命名变量 | ❌ 直接执行 |\n\n---\n\n## 场景四：补测试、补边界、跑回归\n\n### 适用时机\n\n- 给未覆盖的代码补测试\n- 发现边界条件缺失\n- 新功能开发完成后的验证\n\n### 推荐步骤\n\n**第一步：识别未测试代码**\n\n```text\n找出 NotificationsService 中没有被测试覆盖的函数。\n```\n\n**第二步：生成测试脚手架**\n\n```text\n为通知服务添加测试。\n遵循项目现有的测试风格和框架。\n```\n\nClaude 会检查项目中已有的测试文件，匹配测试框架（Jest/Vitest/Mocha 等）、断言风格和目录结构。\n\n**第三步：覆盖边界情况**\n\n```text\n为通知服务添加边界条件测试，包括：\n- 空输入\n- 超长字符串\n- 并发发送\n- 网络超时\n```\n\n**第四步：运行并修复**\n\n```text\n运行新添加的测试，修复所有失败。\n```\n\n### 提效技巧\n\n| 技巧 | 说明 |\n|------|------|\n| **说明要验证什么行为** | \"测试 token 过期后的刷新逻辑\" 比 \"加点测试\" 好 |\n| **指定不要 mock** | 如果你偏好集成测试，明确说 \"避免使用 mock\" |\n| **只跑单个测试文件** | `运行 src/auth/__tests__/login.test.ts` 比 \"跑全部测试\" 快得多 |\n| **让 Claude 发现盲区** | \"分析代码路径，建议我可能遗漏的边界情况\" |\n\n### 常见陷阱\n\n\u003e **陷阱**：Claude 写了很多测试，但测试内容都是\"happy path\"，没有真正覆盖到边界。\n\u003e\n\u003e **应对**：明确列出你关心的边界条件，或者让 Claude 先分析代码路径再设计测试用例。\n\n---\n\n## 场景五：提交、分支、PR 描述\n\n### 适用时机\n\n- 完成一轮开发后提交代码\n- 创建 Pull Request\n- 生成变更日志\n\n### 快速提交\n\n```text\n用描述性的 commit 信息提交我的更改。\n```\n\nClaude 会自动读取 `git diff`，生成有意义的 commit 消息。\n\n### 创建 PR\n\n最简单的方式：\n\n```text\n为我的更改创建一个 PR。\n```\n\n如果需要更精细的控制：\n\n**第一步：总结变更**\n\n```text\n总结我对认证模块的所有更改。\n```\n\n**第二步：创建 PR**\n\n```text\n创建 PR，标题要清晰，描述要包含：\n- 变更动机\n- 实现方案\n- 测试情况\n- 潜在风险\n```\n\n**第三步：完善描述**\n\n```text\n在 PR 描述中补充安全改进的上下文。\n```\n\n### PR 与会话的关联\n\n当你通过 `gh pr create` 创建 PR 后，会话会自动关联到该 PR。之后可以用以下方式恢复：\n\n```bash\nclaude --from-pr 42\n```\n\n### Git 工作流速查\n\n| 操作 | 提示词示例 |\n|------|----------|\n| 提交 | `提交更改，commit 信息用英文` |\n| 创建分支 | `创建 feature/oauth-login 分支并切换过去` |\n| 创建 PR | `创建 PR` |\n| 查看 diff | `显示我和 main 分支的差异` |\n| 交互式 rebase | `把最近 3 个 commit 压缩成一个` |\n| Cherry-pick | `从 feature-x 分支 cherry-pick 修复 auth 的那个 commit` |\n\n---\n\n## 场景六：单会话代码审查\n\n### 适用时机\n\n- 在合并前自己先过一遍代码\n- 审查他人的 PR\n- 安全审计\n\n### 基本审查\n\n```text\n审查我最近的代码更改，关注：\n- 潜在的 Bug\n- 安全漏洞\n- 性能问题\n- 代码风格一致性\n```\n\n### 针对性审查\n\n```text\n检查 @src/api/payment.ts 的安全性，\n特别关注注入漏洞和敏感数据处理。\n```\n\n### 使用 Subagent 进行隔离审查\n\n更好的做法是使用 subagent 进行审查，因为审查者不应该有编写代码时的偏见：\n\n```text\n使用 subagent 审查我刚才的所有更改，\n关注边界情况、竞态条件和与现有代码风格的一致性。\n```\n\nSubagent 在独立的上下文窗口中运行，审查完成后只返回结论摘要，不会污染你的主会话。\n\n### 常见陷阱\n\n\u003e **陷阱**：在写完代码的同一个会话里让 Claude 审查——它倾向于认为自己写的代码是对的。\n\u003e\n\u003e **应对**：用 subagent 审查，或者 `/clear` 后再审查，或者新开一个会话专门做 review。\n\n---\n\n## 组合拳：一轮对话完成\"修 Bug → 写测试 → 提交\"\n\n前面讲了六个独立场景，但日常开发中最爽的是把它们串起来，一轮对话走完完整闭环。\n\n### 完整示例\n\n**第一步：诊断问题**\n\n```text\n用户报告在会话超时后登录失败。\n检查 src/auth/ 中的认证流程，特别是 token 刷新逻辑。\n先诊断问题，不要改代码。\n```\n\n**第二步：编写失败测试**\n\n```text\n基于你的诊断，先写一个能重现这个 Bug 的测试用例。\n运行测试确认它确实会失败。\n```\n\n**第三步：修复并验证**\n\n```text\n现在修复这个 Bug。\n修完后运行刚才的测试确认通过，\n然后运行整个 auth 模块的测试套件确认没有回归。\n```\n\n**第四步：提交**\n\n```text\n提交所有更改，commit 信息要说明修了什么问题以及如何修复。\n```\n\n### 这个流程的关键原则\n\n| 原则 | 说明 |\n|------|------|\n| **先诊断再动手** | 避免 Claude 直接猜测性修改 |\n| **测试先行** | 先写失败测试，确保真的重现了问题 |\n| **验证闭环** | 修复后运行测试，不只是\"看起来对了\" |\n| **原子提交** | 一个 commit 解决一个问题 |\n\n---\n\n## 跨场景的通用最佳实践\n\n### 上下文管理\n\n上下文窗口是你最宝贵的资源。它填满得越快，Claude 的表现越差。\n\n| 策略 | 操作 |\n|------|------|\n| **任务间清理** | 不相关任务之间用 `/clear` 重置 |\n| **限定探索范围** | \"只看 `src/auth/`\" 而不是 \"看整个代码库\" |\n| **用 subagent 做调查** | 让 subagent 读文件并汇报，避免主会话上下文膨胀 |\n| **及时压缩** | 运行 `/compact` 或等待自动压缩触发 |\n| **快速问题用 `/btw`** | 答案出现在覆盖层中，不进入对话历史 |\n\n### 验证驱动\n\nClaude Code 最高杠杆的最佳实践：**给 Claude 一种验证自己工作的方式**。\n\n| 验证方式 | 适用场景 |\n|----------|----------|\n| 运行测试套件 | 所有代码变更 |\n| 运行 linter/type check | 风格和类型安全 |\n| 运行构建命令 | 确认编译通过 |\n| 截图对比 | UI 变更 |\n| 自定义脚本 | 特定业务逻辑验证 |\n\n```text\n实现 validateEmail 函数。\n测试用例：user@example.com 为真，invalid 为假，user@.com 为假。\n实现后运行测试确认全部通过。\n```\n\n### 纠偏手段\n\n| 手段 | 快捷键/命令 | 效果 |\n|------|-----------|------|\n| **中断** | `Esc` | 停止当前操作，保留上下文 |\n| **回退** | `Esc + Esc` 或 `/rewind` | 回到之前的检查点 |\n| **撤销** | 直接说\"撤销刚才的更改\" | Claude 恢复修改 |\n| **重置** | `/clear` | 清空上下文重新开始 |\n| **分支** | `/branch` | 从当前点分叉出新的对话分支 |\n\n\u003e **经验法则**：如果你在一个会话中纠正了 Claude 两次以上，上下文已经被失败方案污染。`/clear` 后用更好的提示重新开始，几乎总是比继续纠正更高效。\n\n---\n\n## 使用 `@` 引用加速工作\n\n`@` 是 Claude Code 中最实用的快捷语法，能让你直接把文件、目录、甚至 MCP 资源引入对话上下文。\n\n| 引用方式 | 示例 | 效果 |\n|----------|------|------|\n| **单个文件** | `解释 @src/utils/auth.js 的逻辑` | 文件完整内容加入对话 |\n| **目录** | `@src/components 的结构是什么？` | 目录列表（不含内容） |\n| **多文件** | `对比 @file1.js 和 @file2.js` | 两个文件内容都加入对话 |\n| **MCP 资源** | `查看 @github:repos/owner/repo/issues` | 从 MCP 服务器获取数据 |\n\n\u003e **注意**：`@` 引用文件时，Claude 也会自动加载该文件所在目录和父目录的 `CLAUDE.md`，这是有意为之——确保 Claude 理解目录级别的规则。\n\n---\n\n## 使用图像辅助开发\n\nClaude Code 支持在对话中使用图像，这在 UI 开发和错误诊断中特别有用。\n\n### 添加图像的方式\n\n| 方式 | 操作 |\n|------|------|\n| **拖放** | 直接拖放图片到 Claude Code 窗口 |\n| **粘贴** | 复制图片后按 `Ctrl+V`（注意不是 `Cmd+V`） |\n| **路径引用** | `分析这张图片：/path/to/screenshot.png` |\n\n### 实用场景\n\n```text\n[粘贴设计稿截图]\n实现这个设计。完成后对结果截图，和原设计对比。\n列出差异并修复。\n```\n\n```text\n[粘贴错误截图]\n这个是线上报的错误，帮我定位问题。\n```\n\n---\n\n## 让 Claude 作为 Unix 工具\n\nClaude Code 不仅是交互式工具，还可以嵌入到脚本和管道中。\n\n### 管道输入输出\n\n```bash\n# 分析构建错误\ncat build-error.txt | claude -p '简洁解释这个构建错误的根因' \u003e analysis.txt\n\n# 批量检查\nfind src -name \"*.ts\" -newer last-check | \\\n  xargs -I {} claude -p \"检查 {} 中的 TypeScript 类型错误\"\n```\n\n### 作为 Linter 使用\n\n```json\n// package.json\n{\n  \"scripts\": {\n    \"lint:claude\": \"claude -p 'you are a linter. look at changes vs. main and report typos. report filename and line number on one line, description on the second line. no other text.'\"\n  }\n}\n```\n\n### 输出格式控制\n\n| 格式 | 标志 | 适用场景 |\n|------|------|----------|\n| **纯文本** | `--output-format text` | 默认，简单集成 |\n| **JSON** | `--output-format json` | 需要完整对话日志 |\n| **流式 JSON** | `--output-format stream-json` | 实时处理每轮输出 |\n\n---\n\n## 并行会话与 Worktrees\n\n当你需要同时处理多个任务时，Claude Code 支持用 Git Worktrees 隔离每个会话的代码环境。\n\n### 快速创建\n\n```bash\n# 在隔离的 worktree 中启动 Claude\nclaude --worktree feature-auth\n\n# 另一个终端，另一个任务\nclaude --worktree bugfix-123\n\n# 自动生成名称\nclaude --worktree\n```\n\n### Worktree 清理\n\n| 情况 | 处理 |\n|------|------|\n| 会话结束时无更改 | 自动删除 worktree 和分支 |\n| 有未提交的更改 | Claude 提示你选择保留或删除 |\n\n### 复制环境文件\n\n新 worktree 不包含 `.env` 等 gitignored 文件。在项目根目录添加 `.worktreeinclude`：\n\n```text\n.env\n.env.local\nconfig/secrets.json\n```\n\n\u003e **提示**：将 `.claude/worktrees/` 加入 `.gitignore`，避免 worktree 内容在主仓库中显示为未跟踪文件。\n\n---\n\n## 定时任务与自动化\n\nClaude Code 支持按计划自动运行任务。\n\n| 调度方式 | 运行位置 | 最适合 |\n|----------|----------|--------|\n| **云计划任务** | Anthropic 基础设施 | 电脑关机也能运行的任务 |\n| **Desktop 计划任务** | 本地机器 | 需要访问本地文件的任务 |\n| **GitHub Actions** | CI 管道 | 与仓库事件相关的任务 |\n| **`/loop`** | 当前 CLI 会话 | 会话打开时的快速轮询 |\n\n```text\n为计划任务编写提示时，明确说明成功标准和结果处理方式。\n任务自主运行，不能提出澄清问题。\n\n例如：\"审查标记为 needs-review 的 PR，对问题留下评论，\n并在 #eng-reviews 频道发布摘要。\"\n```\n\n---\n\n## 恢复与切换会话\n\n开发不是线性的——你可能在修 Bug 到一半时被叫去看另一个问题。Claude Code 的会话管理支持这种工作方式。\n\n### 恢复会话\n\n```bash\n# 继续最近的对话\nclaude --continue\n\n# 从列表中选择\nclaude --resume\n\n# 按名字恢复\nclaude --resume auth-refactor\n\n# 恢复关联到某个 PR 的会话\nclaude --from-pr 42\n```\n\n### 命名会话\n\n```bash\n# 启动时命名\nclaude -n auth-refactor\n\n# 会话中命名\n/rename auth-refactor\n```\n\n### 会话选择器快捷键\n\n| 快捷键 | 操作 |\n|--------|------|\n| `↑` / `↓` | 导航会话列表 |\n| `Enter` | 恢复选中会话 |\n| `P` | 预览会话内容 |\n| `R` | 重命名会话 |\n| `/` | 搜索过滤 |\n| `A` | 切换当前目录/所有项目 |\n| `B` | 过滤当前 Git 分支的会话 |\n\n\u003e **最佳实践**：像对待 Git 分支一样对待会话——不同的工作流用不同的会话，及时命名，方便回溯。\n\n---\n\n## 常见失败模式与应对\n\n| 失败模式 | 症状 | 修复方法 |\n|----------|------|----------|\n| **厨房水槽会话** | 一个会话里混杂多个不相关任务 | 不同任务之间用 `/clear` |\n| **反复纠正** | 纠正了两次 Claude 还做不对 | `/clear` 后用更好的提示重新开始 |\n| **无限探索** | Claude 读了上百个文件 | 限定范围或用 subagent |\n| **跳过验证** | 代码看起来对但实际有问题 | 始终提供验证标准 |\n| **过度依赖单会话** | 上下文窗口满了导致质量下降 | 拆分任务到多个会话 |\n\n---\n\n## 本篇小结\n\n| 场景 | 核心提示模式 | 验证方式 |\n|------|------------|----------|\n| **理解代码** | \"给我概览 → 深入模块 → 追踪调用链\" | 自己确认理解正确 |\n| **修 Bug** | \"分享错误 → 诊断 → 修复 → 运行测试\" | 测试通过 |\n| **重构** | \"Plan Mode 探索 → 规划 → 实现 → 验证\" | 测试 + 构建通过 |\n| **写测试** | \"找未覆盖代码 → 生成测试 → 补边界 → 运行\" | 测试通过 + 覆盖率 |\n| **Git/PR** | \"提交 → 创建 PR → 完善描述\" | PR 审查 |\n| **代码审查** | \"用 subagent 审查变更\" | 独立视角 |\n\n**最重要的三条原则**：\n\n1. **给 Claude 验证方式**——测试、lint、构建命令，让它能自查\n2. **管理上下文**——`/clear`、subagent、`/compact`，保持上下文窗口干净\n3. **及时纠偏**——`Esc` 中断、`/rewind` 回退、两次纠正后重新开始\n\n下一篇我们将深入 [Claude Code 的交互模式、内置命令与上下文管理](/articles/2026/04/04/claude-code-interactive-mode-and-built-in-commands)——掌握 Claude Code 的完整操作面板。\n\n\u003e 📖 **系列导航**\n\u003e\n\u003e - [第一篇：从 OpenCode 切到 Claude Code](/articles/2026/04/01/opencode-to-claude-code-getting-oriented)\n\u003e - [第二篇：快速上手](/articles/2026/04/02/claude-code-getting-started)\n\u003e - **第三篇：日常工作流**（本文）\n\u003e - [第四篇：交互模式与内置命令](/articles/2026/04/04/claude-code-interactive-mode-and-built-in-commands)\n\u003e - [第五篇：CLAUDE.md、Rules 与 Auto Memory](/articles/2026/04/05/claude-code-memory-and-claude-md)\n\u003e - [第六篇：设置、权限与 Auto Mode](/articles/2026/04/06/claude-code-settings-and-permissions)\n\u003e - [第七篇：扩展架构全景](/articles/2026/04/07/claude-code-extension-model-overview)\n\u003e - [第八篇：高阶自动化实战](/articles/2026/04/08/claude-code-advanced-automation-with-mcp-hooks-and-agents)\n"])</script><script>self.__next_f.push([1,"21:T3825,"])</script><script>self.__next_f.push([1,"\n\u003e 十分钟内，让 Claude Code 在你的项目里跑起来。\n\n## 引言：你的第一个 Claude Code 会话\n\n上一篇我们建立了从 OpenCode 到 Claude Code 的心智模型。这一篇只做一件事：**让你从零开始，跑通第一个真实任务**。\n\n不是 Hello World，不是玩具项目，而是在你的真实代码库里完成一个有意义的操作闭环：\n\n```\n安装 → 登录 → 选入口 → 理解项目 → 做一个小改动 → 跑验证 → 查看 diff → 提交\n```\n\n## 安装 Claude Code\n\n### 三种安装方式\n\n| 安装方式 | 命令 | 自动更新 | 适用场景 |\n|---------|------|:------:|---------|\n| **Native Install（推荐）** | `curl -fsSL https://claude.ai/install.sh \\| bash` | ✅ | 日常开发，保持最新 |\n| **Homebrew** | `brew install --cask claude-code` | ❌ | macOS 用户偏好 brew 管理 |\n| **WinGet** | `winget install Anthropic.ClaudeCode` | ❌ | Windows 用户 |\n\n**macOS / Linux / WSL 推荐**：\n\n```bash\n# Native Install（推荐，自动后台更新）\ncurl -fsSL https://claude.ai/install.sh | bash\n```\n\n**Windows 推荐**：\n\n```powershell\n# PowerShell\nirm https://claude.ai/install.ps1 | iex\n```\n\n\u003e **Windows 前置条件**：需要先安装 [Git for Windows](https://git-scm.com/downloads/win)。\n\n**验证安装**：\n\n```bash\nclaude --version\n```\n\n### 更新策略\n\n- **Native Install**：自动后台更新，无需手动操作\n- **Homebrew**：需要定期运行 `brew upgrade claude-code`\n- **WinGet**：需要定期运行 `winget upgrade Anthropic.ClaudeCode`\n\n\u003e **从 OpenCode 迁移者注意**：OpenCode 用 `npm install -g opencode-ai` 或 `curl` 脚本安装。Claude Code 不推荐 npm 安装方式，主推 Native Install。\n\n## 登录认证\n\n安装后，在任何项目目录启动 Claude Code：\n\n```bash\ncd your-project\nclaude\n```\n\n首次启动会提示登录。使用 `/login` 命令选择认证方式。\n\n### 四种认证方式\n\n| 认证方式 | 适合人群 | 特点 |\n|---------|---------|------|\n| **Claude Pro / Max** | 个人开发者 | 按月订阅，功能最完整 |\n| **Claude Teams / Enterprise** | 团队 / 企业 | SSO、集中管理、托管策略 |\n| **Anthropic Console（API）** | API 开发者 | 按用量付费，通过环境变量配置 API Key |\n| **第三方 Provider** | 企业云用户 | Amazon Bedrock / Google Vertex AI / Microsoft Foundry |\n\n**个人用户推荐**：Claude Pro 或 Max 订阅，功能最全、限制最少。\n\n**重要区别**：使用 `claude.ai` 账户登录可以获得最完整的功能（包括 Remote Control、Channels、Cloud Sessions 等）。第三方 Provider 登录虽然支持基础编码功能，但部分高级功能（如 Chrome 调试、Agent Teams）可能不可用。\n\n```bash\n# 登录（首次启动自动提示，或手动执行）\n/login\n\n# 切换账户\n/login\n```\n\n登录凭证会安全存储在本地，后续无需重复登录。\n\n## 选择你的入口\n\nClaude Code 有五种主要入口，选哪个取决于你的工作场景：\n\n### 入口选择指南\n\n```\n你的主要工作场景是什么？\n│\n├─ 终端重度用户、需要管道和脚本 → Terminal CLI\n│\n├─ 需要可视化 diff 审查 → VS Code 扩展\n│\n├─ 使用 IntelliJ / PyCharm / WebStorm → JetBrains 插件\n│\n├─ 需要并行多会话、定时任务 → Desktop App\n│\n└─ 没有本地环境、或想在移动端工作 → Web（claude.ai/code）\n```\n\n### Terminal CLI（本文重点）\n\n作为从 OpenCode 迁移过来的用户，你最熟悉的就是 Terminal CLI。好消息是：Claude Code 的 CLI 体验和 OpenCode 非常相似，上手成本极低。\n\n```bash\n# 启动交互会话\nclaude\n\n# 一次性任务（执行后退出）\nclaude \"fix the build error in src/utils.ts\"\n\n# 一次性查询（只返回结果，不交互）\nclaude -p \"explain the auth flow in this project\"\n\n# 继续上一个会话\nclaude -c\n\n# 恢复历史会话（选择列表）\nclaude -r\n```\n\n### VS Code 扩展\n\n```bash\n# 安装\ncode --install-extension anthropic.claude-code\n```\n\n或在 VS Code 扩展市场搜索 \"Claude Code\"。安装后通过命令面板（`Cmd+Shift+P`）搜索 \"Claude Code\" 打开。\n\n**核心优势**：内联 diff 预览、@-提及文件引用、计划审查面板。\n\n### Desktop App\n\n从 [claude.com/download](https://claude.com/download) 下载安装。\n\n**核心优势**：\n- 并行运行多个会话\n- Dispatch：从手机发送任务\n- 可视化 diff 审查\n- 定时任务管理\n- 云端会话\n\n### Web\n\n直接访问 [claude.ai/code](https://claude.ai/code)，无需本地安装。\n\n**核心优势**：\n- 无需本地环境\n- 长时间运行任务\n- 处理你本地没有的仓库\n- 移动端可用\n\n### JetBrains 插件\n\n从 [JetBrains Marketplace](https://plugins.jetbrains.com/plugin/27310-claude-code-beta-) 安装，支持 IntelliJ IDEA、PyCharm、WebStorm 等。\n\n\u003e **建议**：初期先用 Terminal CLI 熟悉核心操作，之后根据需要添加 IDE 扩展或 Desktop App 作为补充。\n\n## 跑通第一个真实任务\n\n现在让我们在你的真实项目里完成一个完整的操作闭环。以下以一个实际的博客项目为例演示。\n\n### 第一步：让 Claude 理解你的项目\n\n```bash\ncd /path/to/your/project\nclaude\n```\n\n进入交互会话后，先让 Claude 熟悉你的代码库：\n\n```\n这个项目做什么？用了什么技术栈？\n```\n\nClaude 会自动读取你的项目文件（`package.json`、`tsconfig.json`、目录结构等），给出一份项目概要。\n\n你也可以问更具体的问题：\n\n```\n这个项目的主入口在哪里？\n```\n\n```\n解释一下目录结构和各模块的职责\n```\n\n\u003e **关键区别**：和 OpenCode 不同，你不需要手动把文件\"添加到上下文\"。Claude Code 会根据需要自动读取文件。\n\n### 第二步：做一个小改动\n\n选一个真实的小任务，比如：\n\n```\n在 README 中添加一个\"快速开始\"章节，包括安装和启动命令\n```\n\nClaude 会：\n1. 读取现有的 README 文件\n2. 分析项目的 `package.json` 了解可用命令\n3. 生成修改建议并**展示 diff**\n4. **等待你的批准**\n\n```\n\u003e Claude: 我将对 README.md 进行以下修改：\n\u003e [显示 diff 预览]\n\u003e 确认修改？(y/n)\n```\n\n输入 `y` 确认，Claude 会执行修改。\n\n### 第三步：跑验证\n\n让 Claude 帮你验证修改没有破坏任何东西：\n\n```\n运行构建和测试，确保一切正常\n```\n\nClaude 会根据你的项目自动选择正确的命令（`npm run build`、`npm test`、`pytest` 等）。首次运行时，Claude 会请求执行 shell 命令的权限。\n\n### 第四步：查看 diff 和提交\n\n```\n查看我刚才的所有修改\n```\n\nClaude 会执行 `git diff` 并展示变更摘要。\n\n```\n用描述性的提交信息提交这些修改\n```\n\nClaude 会：\n1. 暂存修改的文件\n2. 根据变更内容生成一条描述性的提交信息\n3. 请求你确认后执行提交\n\n```\n\u003e Claude: 建议提交信息：\n\u003e \"docs: add quick start section to README with install and run commands\"\n\u003e 确认提交？(y/n)\n```\n\n### 完整闭环回顾\n\n恭喜！你刚刚完成了一个完整的 Claude Code 操作闭环：\n\n```\n理解项目 → 做修改 → 跑验证 → 查看 diff → 提交\n```\n\n这五步是你日常使用 Claude Code 最核心的工作流。\n\n## 你需要先知道的 6 个概念\n\n在深入日常使用之前，先了解这 6 个核心概念：\n\n### 1. 会话（Session）\n\n每次 `claude` 启动是一个独立会话，拥有自己的上下文窗口。会话自动保存在本地。\n\n```bash\nclaude          # 新会话\nclaude -c       # 继续最近的会话\nclaude -r       # 选择历史会话恢复\n```\n\n### 2. 代理循环（Agentic Loop）\n\nClaude Code 不是简单的问答，而是一个**代理循环**：\n\n```\n你的提示 → Claude 收集上下文 → Claude 采取行动 → Claude 验证结果 → 重复直到完成\n```\n\n一个任务可能触发十几次工具调用（读文件、搜索、编辑、运行命令），Claude 会根据每一步的结果决定下一步做什么。\n\n### 3. 内置工具\n\nClaude Code 自带五类内置工具，覆盖大部分编码任务：\n\n| 类别 | 能力 | 示例 |\n|------|------|------|\n| **文件操作** | 读取、编辑、创建、重命名 | 读代码、改文件 |\n| **搜索** | 文件搜索、内容搜索（正则） | 找到所有使用某个函数的地方 |\n| **执行** | Shell 命令、git、测试 | 跑构建、跑测试、git 提交 |\n| **网络** | Web 搜索、获取文档 | 搜索错误信息、查看库文档 |\n| **代码智能** | 类型检查、跳转定义、查找引用 | 查看类型错误（需要插件） |\n\n### 4. 权限模式\n\nClaude 不会未经许可就修改你的代码。默认模式下，每次编辑和命令都需要你确认。\n\n按 `Shift+Tab` 循环切换模式：\n\n| 模式 | 行为 | 适合场景 |\n|------|------|---------|\n| **默认** | 编辑和命令都要确认 | 初期使用、敏感操作 |\n| **自动接受编辑** | 编辑自动通过，命令仍需确认 | 信任 Claude 的代码修改 |\n| **Plan Mode** | 只做分析和规划，但可以读文件和运行探索性 shell 命令 | 复杂任务前先看计划 |\n\n\u003e **Auto Mode**：需要额外启用（非 `Shift+Tab` 循环中的选项），启用后 Claude 自主评估并执行操作，仅在安全规则阻止时才暂停请求确认。适合高度信任场景。\n\n### 5. 上下文窗口\n\nClaude 的上下文窗口有限。它保存了你的对话历史、文件内容、命令输出、CLAUDE.md 等所有信息。随着对话推进，上下文会逐渐填满。\n\n- Claude 会自动压缩（compact）旧的对话内容\n- 你可以手动运行 `/compact` 来释放空间\n- 运行 `/context` 查看当前上下文使用情况\n- 超长对话建议开新会话\n\n### 6. 检查点（Checkpoint）\n\nClaude 在编辑文件前会自动快照。如果改坏了：\n\n- 按两次 `Esc` 回退到上一个检查点\n- 或者直接告诉 Claude \"撤销刚才的修改\"\n\n\u003e **注意**：检查点只覆盖文件修改。影响远程系统的操作（数据库写入、API 调用、部署）无法回退。\n\n## 基础命令速查\n\n### 启动命令\n\n| 命令 | 作用 | 示例 |\n|------|------|------|\n| `claude` | 启动交互会话 | `claude` |\n| `claude \"task\"` | 一次性任务 | `claude \"fix the build error\"` |\n| `claude -p \"query\"` | 查询后退出 | `claude -p \"explain this function\"` |\n| `claude -c` | 继续最近会话 | `claude -c` |\n| `claude -r` | 恢复历史会话 | `claude -r` |\n\n### 会话内命令\n\n| 命令 | 作用 |\n|------|------|\n| `/help` | 显示帮助信息 |\n| `/clear` | 清除对话历史 |\n| `/compact` | 压缩上下文 |\n| `/context` | 查看上下文使用情况 |\n| `/model` | 切换模型 |\n| `/memory` | 查看 / 管理记忆系统 |\n| `/mcp` | 查看 MCP 连接状态 |\n| `/init` | 初始化项目（创建 CLAUDE.md） |\n| `/status` | 查看当前状态 |\n| `exit` 或 `Ctrl+D` | 退出会话 |\n\n### 快捷键\n\n| 快捷键 | 作用 |\n|--------|------|\n| `Shift+Tab` | 循环切换权限模式 |\n| `Esc` × 2 | 回退到检查点（rewind） |\n| `Ctrl+C` | 取消当前操作 |\n| `Ctrl+D` | 退出会话 |\n| `Ctrl+G` | 在编辑器中打开输入 |\n| `Ctrl+O` | 切换详细输出 |\n| `Alt+P` | 切换模型 |\n| `Tab` | 命令补全 |\n| `↑` | 查看历史输入 |\n\n## 初始化你的项目\n\n在你的项目里运行一次 `/init`，Claude 会引导你创建一份 `CLAUDE.md`：\n\n```bash\nclaude\n# 进入会话后\n/init\n```\n\nClaude 会分析你的项目结构、技术栈、构建工具，然后生成一份包含核心约定的 `CLAUDE.md` 文件。\n\n如果你已经有 `AGENTS.md`（从 OpenCode 带过来的），推荐的做法是在 `CLAUDE.md` 中引用它：\n\n```markdown\n# CLAUDE.md\n\n@AGENTS.md\n\n## 额外约定\n- 提交前运行 npm run build 验证构建\n- 使用 vitest 运行测试\n```\n\n\u003e **关于记忆系统**：`/init` 只是开始。Claude Code 还有 Auto Memory、`.claude/rules/` 条件规则等更丰富的记忆能力，将在本系列第 5 篇详细介绍。\n\n## 常见问题排查\n\n### 安装问题\n\n| 问题 | 解决方案 |\n|------|---------|\n| `command not found: claude` | 重新打开终端，或检查 PATH 配置 |\n| Windows 安装失败 | 确保已安装 Git for Windows |\n| 权限错误 | macOS/Linux 下尝试 `sudo` 或检查目录权限 |\n\n### 登录问题\n\n| 问题 | 解决方案 |\n|------|---------|\n| 浏览器未自动打开 | 手动复制终端显示的 URL 到浏览器 |\n| 令牌过期 | 运行 `/login` 重新登录 |\n| 第三方 Provider 连接失败 | 检查 IAM 凭证或 Service Account 配置 |\n\n### 使用问题\n\n| 问题 | 解决方案 |\n|------|---------|\n| Claude 读不到我的文件 | 确认在正确的项目目录启动 `claude` |\n| 终端显示乱码 | 检查终端是否支持 Unicode，尝试不同终端 |\n| 响应很慢 | 检查网络连接；或换用更快的模型（`/model`） |\n| 上下文溢出 | 运行 `/compact` 或开新会话 |\n\n## 小结\n\n这篇文章带你完成了 Claude Code 的完整起步流程：\n\n1. **安装**：推荐 Native Install，自动后台更新\n2. **登录**：Claude Pro/Max 体验最完整\n3. **选入口**：先从 Terminal CLI 开始，按需扩展\n4. **跑通闭环**：理解项目 → 做修改 → 验证 → 查看 diff → 提交\n5. **核心概念**：会话、代理循环、内置工具、权限模式、上下文窗口、检查点\n6. **初始化项目**：用 `/init` 创建 CLAUDE.md\n\n下一篇，我们将深入 Claude Code 的日常工作流：如何高效地探索代码、修 Bug、重构、写测试、做 Git 操作和代码审查。\n\n\u003e 📖 **系列导航**\n\u003e\n\u003e - [第一篇：从 OpenCode 切到 Claude Code](/articles/2026/04/01/opencode-to-claude-code-getting-oriented)\n\u003e - **第二篇：快速上手**（本文）\n\u003e - [第三篇：日常工作流](/articles/2026/04/03/claude-code-common-workflows)\n\u003e - [第四篇：交互模式与内置命令](/articles/2026/04/04/claude-code-interactive-mode-and-built-in-commands)\n\u003e - [第五篇：CLAUDE.md、Rules 与 Auto Memory](/articles/2026/04/05/claude-code-memory-and-claude-md)\n\u003e - [第六篇：设置、权限与 Auto Mode](/articles/2026/04/06/claude-code-settings-and-permissions)\n\u003e - [第七篇：扩展架构全景](/articles/2026/04/07/claude-code-extension-model-overview)\n\u003e - [第八篇：高阶自动化实战](/articles/2026/04/08/claude-code-advanced-automation-with-mcp-hooks-and-agents)\n"])</script><script>self.__next_f.push([1,"22:T42ca,"])</script><script>self.__next_f.push([1,"\n\u003e 这不是换个终端工具，而是换一套工作方式。\n\n## 引言：为什么这不是\"换个 CLI\"\n\n如果你之前一直用 OpenCode 做 AI 辅助编程，你可能已经习惯了它的模式：在终端里输入自然语言指令，AI 帮你读代码、改文件、跑命令。切到 Claude Code 后，表面上看起来差不多——都是终端里对话、都能编辑文件、都支持 MCP。\n\n但深入使用后你会发现，这两个工具的**设计哲学**截然不同：\n\n| 维度 | OpenCode | Claude Code |\n|------|----------|-------------|\n| **定位** | 开源社区驱动的 AI Coding Agent | Anthropic 官方深度集成的编码平台 |\n| **模型** | 支持 75+ 提供商，模型自由切换 | 以 Claude Sonnet/Opus 为核心，支持有限的第三方 |\n| **形态** | 主要是终端 CLI | CLI + VS Code + JetBrains + Desktop App + Web + iOS |\n| **扩展** | MCP + AGENTS.md + 自定义 Agent | CLAUDE.md + Skills + Sub-agents + Hooks + MCP + Plugins + Agent Teams |\n| **权限** | 基础的工具权限控制 | 细粒度权限系统 + Auto Mode + Sandbox |\n| **协作** | 会话分享链接 | Remote Control + Channels + Dispatch + 云端会话 |\n| **CI/CD** | 无原生支持 | 原生 GitHub Actions + GitLab CI/CD 集成 |\n\nOpenCode 的核心优势是**开放性**——你可以选任何模型、任何提供商，代码完全透明。而 Claude Code 的核心优势是**深度集成**——它把 AI 编程从\"一个终端工具\"变成了\"一个跨平台的开发协作平台\"。\n\n这篇文章不会手把手教你安装和使用（那是后续文章的事），而是帮你建立正确的**心智模型**，让你知道：\n\n1. 两者的核心差异在哪里\n2. Claude Code 的全景能力地图长什么样\n3. 迁移时该关注什么、该忽略什么\n4. 这个系列 8 篇文章如何串起来\n\n## 心智模型：从\"开源瑞士军刀\"到\"深度集成平台\"\n\n### OpenCode 的心智模型\n\nOpenCode 像一把**开源瑞士军刀**：\n\n```\n你 → 选择模型提供商 → 终端 CLI → AI 读/写/执行 → 输出\n```\n\n它的核心价值主张是\"自由\"：自由选择模型、自由配置 API Key、自由定制 Agent。你完全控制每一个环节，但也需要自己搭建和维护整个工具链。\n\n### Claude Code 的心智模型\n\nClaude Code 更像一个**深度集成的开发平台**：\n\n```\n你 → 选择入口（CLI/IDE/Desktop/Web/Mobile） → Claude 代理循环 → 内置工具 + 扩展层 → 输出\n                                                    ↑\n                                          CLAUDE.md / Skills / Hooks / MCP / Plugins\n```\n\n关键的思维转变：\n\n1. **从\"选模型\"到\"选入口\"**：OpenCode 的核心决策是选哪个模型提供商；Claude Code 的核心决策是选哪个入口和工作模式\n2. **从\"手动配置一切\"到\"渐进式扩展\"**：Claude Code 开箱即用就很强，扩展是锦上添花而非必需\n3. **从\"单会话\"到\"跨端跨会话\"**：你可以在终端开始，手机上继续，桌面应用里审查\n4. **从\"工具\"到\"平台\"**：Claude Code 不只是一个 CLI，它是一套包含 CI/CD、定时任务、多代理协作的完整平台\n\n## Claude Code 产品地图\n\n### 五种主要入口\n\nClaude Code 提供五种主要的使用入口，每种适合不同的场景：\n\n| 入口 | 形态 | 核心优势 | 适合场景 |\n|------|------|---------|---------|\n| **Terminal CLI** | 终端命令行 | 功能最完整、可组合、支持管道 | 日常开发、脚本自动化、CI/CD |\n| **VS Code 扩展** | IDE 内嵌面板 | 内联 diff、@-提及、计划审查 | 需要可视化 diff 的开发 |\n| **JetBrains 插件** | IDE 内嵌面板 | 交互式 diff、选择上下文共享 | Java/Kotlin/Python 开发者 |\n| **Desktop App** | 独立桌面应用 | 可视化 diff、并行会话、Dispatch、定时任务 | 多任务管理、云端会话 |\n| **Web** | 浏览器 | 无需本地安装、长时间运行任务 | 远程仓库、移动端、排队运行 |\n\n### 超越入口：跨端协作能力\n\n除了五种入口本身，Claude Code 还提供了一组**跨端协作**能力，这是 OpenCode 完全没有的维度：\n\n| 能力 | 作用 | 使用场景 |\n|------|------|---------|\n| **Remote Control** | 从手机/平板/任何浏览器继续本地 CLI 会话 | 离开工位但想继续监控任务 |\n| **Dispatch** | 从手机发送任务，Desktop App 自动创建会话 | 通勤时快速派发任务 |\n| **`/teleport`** | 将 Web 会话拉入本地终端 | 云端跑完后想在本地继续 |\n| **`/desktop`** | 将终端会话交给 Desktop App | 需要可视化审查 diff |\n| **Channels** | 从 Telegram/Discord/Webhook 推送事件到会话 | 外部事件触发处理 |\n| **Slack 集成** | 在 Slack 中 @Claude 触发任务 | 团队协作、错误报告转 PR |\n| **iOS App** | Claude iOS 应用中使用 Code 功能 | 移动端启动长时间任务 |\n\n\u003e **迁移者注意**：如果你只是把 Claude Code 当作一个终端 CLI 来用（就像用 OpenCode 一样），你只发挥了它不到 30% 的能力。\n\n### 功能可用性矩阵\n\n不是所有功能在所有入口和所有计划下都可用。以下矩阵帮你快速判断：\n\n| 功能 | CLI | VS Code | JetBrains | Desktop | Web |\n|------|:---:|:-------:|:---------:|:-------:|:---:|\n| 文件编辑 | ✅ | ✅ | ✅ | ✅ | ✅ |\n| Shell 命令执行 | ✅ | ✅ | ✅ | ✅ | ✅（云端沙箱） |\n| CLAUDE.md | ✅ | ✅ | ✅ | ✅ | ✅ |\n| Skills | ✅ | ✅ | ✅ | ✅ | ✅ |\n| Hooks | ✅ | ✅ | ✅ | ✅ | ❌ |\n| MCP | ✅ | ✅ | ✅ | ✅ | ❌ |\n| Sub-agents | ✅ | ✅ | ✅ | ✅ | ✅ |\n| Agent Teams | ✅ | ❌ | ❌ | ✅ | ❌ |\n| Auto Mode | ✅ | ✅ | ✅ | ✅ | ✅ |\n| Remote Control | ✅ | ❌ | ❌ | ❌ | ❌ |\n| Dispatch | ❌ | ❌ | ❌ | ✅ | ❌ |\n| 定时任务 | ✅（/loop） | ❌ | ❌ | ✅ | ✅（云端） |\n| Chrome 调试 | ✅ | ✅ | ❌ | ✅ | ❌ |\n| Computer Use | ✅ | ❌ | ❌ | ✅ | ❌ |\n\n\u003e **说明**：上表基于撰写时（2026年4月）的官方文档。Claude Code 迭代速度极快，功能可用范围可能随版本更新而扩展。\n\n**按计划类型的主要差异**：\n\n| 能力 | Pro/Max（个人） | Team | Enterprise | API |\n|------|:------------:|:----:|:----------:|:---:|\n| 基础编码功能 | ✅ | ✅ | ✅ | ✅ |\n| Auto Mode | ✅ | ✅ | ✅ | ✅ |\n| Agent Teams | ✅ | ✅ | ✅ | ❌ |\n| Computer Use | ✅（Pro/Max） | ❌ | ❌ | ❌ |\n| 云端定时任务 | ✅ | ✅ | ✅ | ❌ |\n| 第三方 Provider | ✅（CLI/VS Code） | ✅ | ✅ | N/A |\n| 托管策略 | ❌ | ❌ | ✅ | ❌ |\n\n## 扩展能力：从 OpenCode 的简单到 Claude Code 的丰富\n\n这是迁移时变化最大的部分。OpenCode 的扩展能力主要就三个：AGENTS.md、MCP、自定义 Agent。而 Claude Code 有一整套分层扩展体系：\n\n### 扩展层全景\n\n```\n┌──────────────────────────────────────────────────┐\n│                  打包与分发层                      │\n│           Plugins / Marketplaces                  │\n├──────────────────────────────────────────────────┤\n│                  外部连接层                        │\n│           MCP（数据库、Slack、Chrome…）             │\n├──────────────────────────────────────────────────┤\n│                  事件驱动层                        │\n│           Hooks（26 个生命周期事件）                │\n├──────────────────────────────────────────────────┤\n│                  隔离执行层                        │\n│     Sub-agents / Agent Teams（独立上下文）          │\n├──────────────────────────────────────────────────┤\n│                  按需加载层                        │\n│           Skills（知识、工作流、命令）               │\n├──────────────────────────────────────────────────┤\n│                  始终加载层                        │\n│     CLAUDE.md / .claude/rules/（项目约定）          │\n└──────────────────────────────────────────────────┘\n```\n\n### 与 OpenCode 的扩展能力对照\n\n| OpenCode 概念 | Claude Code 对应 | 迁移说明 |\n|---------------|-----------------|---------|\n| `AGENTS.md` | `CLAUDE.md` + `.claude/rules/` | Claude Code 兼容读取 AGENTS.md，推荐在 CLAUDE.md 中用 `@AGENTS.md` 导入 |\n| MCP 服务器配置 | MCP（配置方式不同） | 需要重新配置，语法有差异 |\n| 自定义 Agent（Sub Agent） | Sub-agents + Agent Teams | 能力大幅增强，支持隔离上下文和多会话协作 |\n| 无对应 | Skills | **全新能力**：可重用知识和可调用工作流 |\n| 无对应 | Hooks | **全新能力**：26 个生命周期事件的自动化 |\n| 无对应 | Plugins / Marketplaces | **全新能力**：打包和分发扩展 |\n| 会话分享 | Remote Control / Channels / Web | 从\"分享链接\"升级到\"跨端实时协作\" |\n| 无对应 | Auto Memory | **全新能力**：自动记忆系统 |\n\n\u003e **关键认知**：Claude Code 的 Hooks 和 Skills 是迁移后最大的能力增量。Hooks 让你在 AI 操作的生命周期中插入自动化脚本；Skills 让你把重复的工作流封装成可调用的命令。这两个能力在 OpenCode 中完全没有对应物。\n\n## 术语对照表\n\n从 OpenCode 切换时，一些概念名称变了，一些是全新的：\n\n| 概念 | OpenCode 叫法 | Claude Code 叫法 | 说明 |\n|------|-------------|-----------------|------|\n| 项目指令文件 | AGENTS.md | CLAUDE.md | Claude Code 也兼容读取 AGENTS.md |\n| 条件规则 | 无 | `.claude/rules/` | 可按文件路径条件加载 |\n| 自动记忆 | 无 | Auto Memory / MEMORY.md | 存储在 `~/.claude/projects/` 下 |\n| 模型切换 | 支持 75+ 提供商 | 主要 Claude 系列，CLI/VS Code 支持第三方 | 模型选择范围大幅缩小 |\n| 编辑模式 | Build / Plan | Normal / Plan / Auto Mode | 模式更丰富 |\n| 自定义 Agent | Custom Agent | Sub-agent | 支持隔离上下文 |\n| 多 Agent 协作 | 无 | Agent Teams | 实验性功能 |\n| 可重用工作流 | 无 | Skills（`/命令`） | 支持 `SKILL.md` 格式 |\n| 生命周期钩子 | 无 | Hooks | 26 个事件类型 |\n| 扩展包 | 无 | Plugins | 打包 Skills + Hooks + MCP + Sub-agents |\n| 扩展市场 | 无 | Marketplaces | 发现和安装 Plugins |\n| 外部工具连接 | MCP | MCP | 协议相同，配置方式不同 |\n| 跨端继续会话 | 无 | Remote Control | 从任何浏览器继续本地会话 |\n| 事件推送 | 无 | Channels | 外部事件推入会话 |\n| 移动派发 | 无 | Dispatch | 从手机发任务到 Desktop |\n| 上下文压缩 | 自动 | `/compact` 手动 + 自动 | 可控制压缩时机 |\n| 权限控制 | 基础工具权限 | 细粒度规则 + Auto Mode | 支持 allow/ask/deny 规则 |\n\n## 迁移清单：切换后第一周该做的事\n\n### 第一天：基础迁移\n\n- [ ] **安装 Claude Code**：推荐使用 Native Install（`curl -fsSL https://claude.ai/install.sh | bash`）\n- [ ] **登录认证**：使用 claude.ai 账户或 API Key\n- [ ] **迁移 AGENTS.md**：在项目根目录创建 `CLAUDE.md`，用 `@AGENTS.md` 导入现有规则\n\n```markdown\n# CLAUDE.md 示例\n# 导入现有 AGENTS.md（避免双份维护）\n@AGENTS.md\n\n# 添加 Claude Code 特有的指令\n## 构建与测试\n- 运行 `npm run build` 验证构建\n- 运行 `npm run test` 验证测试\n```\n\n### 第二天：权限配置\n\n- [ ] **了解权限模式**：先用默认模式（逐一确认），熟悉后可切换到 Auto Mode\n- [ ] **配置权限规则**：在 `.claude/settings.json` 中设置项目级权限\n\n```json\n{\n  \"permissions\": {\n    \"allow\": [\n      \"Bash(npm run *)\",\n      \"Bash(git *)\",\n      \"Read\",\n      \"WebFetch\"\n    ],\n    \"deny\": [\n      \"Bash(rm -rf *)\",\n      \"Bash(sudo *)\"\n    ]\n  }\n}\n```\n\n### 第三天：MCP 迁移\n\n- [ ] **迁移 MCP 配置**：Claude Code 的 MCP 配置在 `.claude/settings.json` 或 `~/.claude.json` 中\n- [ ] **验证连接**：使用 `/mcp` 命令检查所有 MCP 服务器的连接状态\n\n### 第四天：探索新能力\n\n- [ ] **尝试内置 Skills**：运行 `/simplify`、`/batch`、`/debug` 等捆绑命令\n- [ ] **体验 Auto Memory**：让 Claude 工作一段时间，观察它自动记住的内容\n- [ ] **尝试 Plan Mode**：在复杂任务前用 Plan Mode 先规划再执行\n\n### 第五天：高级配置\n\n- [ ] **创建自定义 Skill**：把你最常用的工作流封装成 `/命令`\n- [ ] **配置 Hooks**：为常见操作添加自动化（如保存后自动格式化）\n- [ ] **设置 `.claude/rules/`**：将特定于文件类型的规则拆分出来\n\n## 你可能失去的（以及为什么值得）\n\n坦诚地说，从 OpenCode 迁移到 Claude Code，你确实会失去一些东西：\n\n| 失去的 | 得到的 |\n|--------|--------|\n| 75+ 模型提供商自由选择 | Claude 系列模型的深度优化（代理循环专为 Claude 设计） |\n| 完全开源、代码透明 | 更成熟的产品体验和更快的迭代速度 |\n| 免费模型（Kimi K2.5 等） | 需要付费订阅（Pro/Max/Team） |\n| 社区驱动的扩展生态 | 官方维护的 Plugin Marketplace |\n| 简单直接的配置 | 更复杂但更强大的扩展体系 |\n\n**什么时候不该迁移**：\n- 你强烈需要使用非 Claude 的模型（如 GPT-4o、Gemini）\n- 你的工作环境完全无法联网\n- 你需要完全开源透明的工具链\n- 你的团队没有预算支付 Claude 订阅\n\n**什么时候值得迁移**：\n- 你需要跨端、跨会话的协作能力\n- 你想要自动化 CI/CD 集成\n- 你需要细粒度的权限控制\n- 你想利用 Hooks 和 Skills 构建自动化工作流\n- 你的团队需要统一的 AI 编码平台\n\n## 本系列导读\n\n这是一个 8 篇的系列，从基础到高阶，帮你全面掌握 Claude Code：\n\n| 篇号 | 标题 | 你将学到 |\n|:----:|------|---------|\n| **1** | **本文：从 OpenCode 切到 Claude Code** | 心智模型、能力地图、迁移清单 |\n| 2 | Claude Code 快速上手 | 安装、登录、选入口、跑通第一个真实任务 |\n| 3 | 日常工作流 | 探索代码、修 Bug、重构、写测试、Git 操作 |\n| 4 | 交互模式与内置命令 | 权限模式、高频命令、上下文管理、快捷键 |\n| 5 | CLAUDE.md、Rules 与 Auto Memory | 记忆系统三层架构、条件规则、自动记忆 |\n| 6 | 设置、权限与 Auto Mode | 四层设置作用域、权限规则语法、
