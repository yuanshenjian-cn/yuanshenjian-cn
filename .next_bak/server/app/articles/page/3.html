\"swd\",\"relativePath\":\"swd/agile/understand-agile-manifesto-deeply.mdx\"},{\"slug\":\"programmer-to-trainner\",\"year\":\"2018\",\"month\":\"10\",\"day\":\"19\",\"title\":\"从写代码到做培训\",\"date\":\"2018-10-19T00:00:00.000Z\",\"excerpt\":\"作为程序员工作五年后，作者踏上培训道路开始梳理总结分享。发展他人的意愿是成为培训师的基础，在ThoughtWorks被列入胜任力模型。转型前有四点顾虑：培训劳心劳体是否拖垮身体；台上讲话紧张会否被嘲笑；不会课程设计是否会误人子弟；远离一线技术是否会退化。关于培训收获，强化了沟通协作、梳理知识体系、拓展外训视野、获得认证机会。培训师面对培训无用论的回答是：培训核心作用是让你知道自己不知道，再通过知识扩充、实战操练和技能转化达到提升目的。\",\"content\":\"$40\",\"tags\":[\"职业成长\"],\"published\":true,\"readingTime\":6,\"category\":\"career\",\"relativePath\":\"career/programmer-to-trainner.mdx\"},{\"slug\":\"three-practices-of-simple-design\",\"year\":\"2018\",\"month\":\"08\",\"day\":\"27\",\"title\":\"简单设计落地三板斧\",\"date\":\"2018-08-27T00:00:00.000Z\",\"excerpt\":\"简单设计落地需要三板斧：TDD、重构和整洁代码。TDD通过测试驱动开发、测试驱动设计、任务驱动开发三种层次指导编码；重构在不改变行为的前提下改善代码设计；整洁代码强调不重复、揭示意图、简单三点核心价值。这三者形成有机整体，TDD开启开发、重构优化设计、整洁代码收尾，共同支撑简单设计的核心价值——编写简洁可用的代码。\\n\\n价值体系\\n假如让你去建造一幅巨大的广告牌，你会怎么做？从大框架来看，首先要打牢地基，再使用结实支柱做支撑，最后在顶部挂上广告牌。地基和支柱是帮助完成目标的必备条件。\",\"content\":\"$41\",\"tags\":[\"软件开发\",\"极限编程\",\"简单设计\"],\"published\":true,\"readingTime\":6,\"category\":\"swd\",\"relativePath\":\"swd/xp/simple-design/three-practices-of-simple-design.mdx\"},{\"slug\":\"vd-cast-model-in-workshop\",\"year\":\"2018\",\"month\":\"07\",\"day\":\"05\",\"title\":\"Workshop中的价值交付投射模型\",\"date\":\"2018-07-05T00:00:00.000Z\",\"excerpt\":\"作者结合组织Workshop的经验，提炼出VD CAST模型（价值交付投射模型）来指导Workshop的组织和实施。模型左边是价值，中间是影响价值落地的五大因素（约束、受众、支持、跟踪），右边是最终交付。将Workshop视同Sprint，划分为5个阶段：需求分析、架构搭建、课程设计、课程交付、回顾复盘。VD CAST模型帮助组织者分离关注点，提前识别风险，评估Workshop能否落地并实现预设价值。\",\"content\":\"$42\",\"tags\":[\"软件开发\",\"敏捷教练\"],\"published\":true,\"readingTime\":4,\"category\":\"swd\",\"relativePath\":\"swd/agile/coaching/vd-cast-model-in-workshop.mdx\"},{\"slug\":\"summary-for-2017\",\"year\":\"2017\",\"month\":\"12\",\"day\":\"31\",\"title\":\"轻描淡写的2017\",\"date\":\"2017-12-31T00:00:00.000Z\",\"excerpt\":\"2017年主旋律是\\\"忙\\\"，作者在磕磕碰碰中收获了三个重要词汇：自信、健康和自律。关于自信，通过Workshop、演讲、培训等活动在挣扎中突破自己，借助公众压力驱动自己前进。关于健康，用三个月减重5公斤，一年内脂降低2%、身体年龄减小7岁，饮食控制并未造成生活困扰反而更热爱健康饮食。关于自律，坚持做一件让自己变好的事情需要极端自律，高质量执行比简单按计划执行更重要。自律给我自由，哪有什么天生如此，只是天天坚持。\",\"content\":\"$43\",\"tags\":[\"职业成长\"],\"published\":true,\"readingTime\":3,\"category\":\"career\",\"relativePath\":\"career/summary-for-2017.mdx\"},{\"slug\":\"unit-test-from-other-sight\",\"year\":\"2017\",\"month\":\"12\",\"day\":\"20\",\"title\":\"从另一个角度告诉你单元测试的意义\",\"date\":\"2017-12-20T00:00:00.000Z\",\"excerpt\":\"微服务架构如火如荼，但单元测试仍是根本。微服务架构让服务独立小巧，但这不意味着可以忽略单元测试。微服务提倡服务间契约测试集成，但单元测试仍是性价比最高的实践。三个维度看单元测试：能力建设上，单元测试易上手，培训和Pair可快速培养能力，测试即文档帮助新人了解业务；生产效率上，重Service测试轻单元测试会导致反馈慢、缺陷发现晚；卓越态度上，追求卓越的程序员应编写Clean Test，单元测试可作为设计工具让代码更易测试。编写有效单元测试需要遵循SOLID原则，避免STUPID代码，践行GRASP原则，并对测试坏味道保持敏锐嗅觉。\",\"content\":\"$44\",\"tags\":[\"软件开发\",\"敏捷测试\"],\"published\":true,\"readingTime\":7,\"category\":\"swd\",\"relativePath\":\"swd/xp/testing/unit-test-from-other-sight.mdx\"},{\"slug\":\"a-different-journey-in-thoughtworks\",\"year\":\"2017\",\"month\":\"12\",\"day\":\"15\",\"title\":\"ThoughtWorks给你不一样的入职之旅\",\"date\":\"2017-12-15T00:00:00.000Z\",\"excerpt\":\"本文同时发表于ThoughtWorks洞见。ThoughtWorks为新人提供TWU（应届生5周海外培训）、TWI（社招3天培训）、NHO、Buddy/Sponsor等丰富培训资源。北京Office推出Local项目人才培养计划，以\\\"学习者为中心\\\"进行四周脱产培训。培训体系包括：削弱象牙塔意识、建立Owner意识、明确可验证目标、构建项目技能树、教学反馈环、持续改进反馈、渗透敏捷文化、保持运动健康。Coach角色是引导启发而非灌输知识，新人需明确学习目标并承担成长责任。敏捷实践（Standup、Code Review、Retro、TDD、Pair等）应渗透到培训中，运动健身则保障培训可持续性。\",\"content\":\"$45\",\"tags\":[\"职业成长\"],\"published\":true,\"readingTime\":8,\"category\":\"career\",\"relativePath\":\"career/a-different-journey-in-thoughtworks.mdx\"},{\"slug\":\"student-centralized-pdt\",\"year\":\"2017\",\"month\":\"10\",\"day\":\"23\",\"title\":\"以学习者为中心的项目驱动培训\",\"date\":\"2017-10-23T00:00:00.000Z\",\"excerpt\":\"ThoughtWorks北京Office与思沃学院推出Local项目人才培养计划，对5位新人进行四周封闭式脱产培训。以学习者为中心的项目驱动培训，强调启发式教学而非填鸭式灌输。培训体系包括：削弱象牙塔意识（拒绝\\\"老师\\\"词汇，传授解决问题套路）、建立Owner意识、明确可验证目标、构建围绕项目的技能树、教学反馈环（讲解-演示-练习-巩固-拓展-反馈分享）、持续改进反馈、敏捷文化渗透、运动健康保持。核心是教练少讲课多引导，学习者清楚目标并自主学习，培养责任意识。\",\"content\":\"$46\",\"tags\":[\"软件开发\",\"敏捷教练\"],\"published\":true,\"readingTime\":8,\"category\":\"swd\",\"relativePath\":\"swd/agile/coaching/student-centralized-pdt.mdx\"},{\"slug\":\"test-strategy-for-microservice-2\",\"year\":\"2017\",\"month\":\"07\",\"day\":\"25\",\"title\":\"微服务架构下的测试应对策略（下）\",\"date\":\"2017-07-25T00:00:00.000Z\",\"excerpt\":\"本文介绍消费者驱动契约测试（CDCT）。CDCT的流程是消费者定义期望的API或消息，这些期望即为契约，从契约生成存根供消费者团队在构建过程中重复使用。CDCT强调契约由消费者驱动并由双方共同遵守，只有双方都将文档转换成可工作的软件时，契约才真正生效。技术实践上，Spring Cloud Contract和Pact是流行的CDCT框架。微服务架构的盛行促使团队测试策略演变：引入CDCT可以大大弱化UI测试。软件工程没有银弹，选择测试策略需遵循原则：单元测试成本低始终第一位、高层测试是第二防线、选择性价比高的方案、根据团队能力选择适合的策略。\",\"content\":\"$47\",\"tags\":[\"软件开发\",\"敏捷测试\"],\"published\":true,\"readingTime\":5,\"category\":\"swd\",\"relativePath\":\"swd/xp/testing/test-strategy-for-microservice-2.mdx\"},{\"slug\":\"test-strategy-for-microservice-1\",\"year\":\"2017\",\"month\":\"07\",\"day\":\"05\",\"title\":\"微服务架构下的测试应对策略（上）\",\"date\":\"2017-07-05T00:00:00.000Z\",\"excerpt\":\"系统架构从单体应用演变到SOA再到微服务架构，解决了扩展性、维护性、部署发布等瓶颈，但也带来了服务拆分、设计、测试的复杂性。单体应用的测试策略简单直接：足够单元测试、一定Service测试、少量E2E测试。微服务架构下，系统集成测试面临环境维护成本高、问题难定位、运行速度慢等痛点。Pair集成测试提出积小成多理念保证服务俩俩集成可靠。引入Contract概念的集成测试通过前后端共同定义API协议来支持并行开发，但仍缺乏自动化监控机制来同步契约变更，这就是CDCT要解决的问题。\",\"content\":\"$48\",\"tags\":[\"软件开发\",\"敏捷测试\"],\"published\":true,\"readingTime\":6,\"category\":\"swd\",\"relativePath\":\"swd/xp/testing/test-strategy-for-microservice-1.mdx\"},{\"slug\":\"unit-test-in-a-programmer\",\"year\":\"2017\",\"month\":\"06\",\"day\":\"05\",\"title\":\"一枚程序员眼中的单元测试\",\"date\":\"2017-06-05T00:00:00.000Z\",\"excerpt\":\"程序员应手持神剑、心怀善念地成为战士，编写高质量代码以促成高质量交付。单元测试能增强代码信心、轻松完成工作、改良设计、缩减调试时间、作为测试文档。测试金字塔中单元测试位于底端，应更\\\"凶猛\\\"。不写测试的借口有无辜派（不清楚代码行为）、个性派（测试不是我的工作）、同理派（让QA失业内疚）。编写单元测试太花时间是常见担忧，但实践表明TDD方式总时间不会多于裸奔代码。测试价值大于成本时编写，否则需取舍，如追求100%覆盖率或快速技术Spike时可考虑不写。\",\"content\":\"$49\",\"tags\":[\"软件开发\",\"敏捷测试\"],\"published\":true,\"readingTime\":6,\"category\":\"swd\",\"relativePath\":\"swd/xp/testing/unit-test-in-a-programmer.mdx\"},{\"slug\":\"a-letter-for-newer\",\"year\":\"2017\",\"month\":\"02\",\"day\":\"28\",\"title\":\"写给新人的一封信\",\"date\":\"2017-02-28T00:00:00.000Z\",\"excerpt\":\"本文同时发表于ThoughtWorks洞见。作者结合自身经历和身边故事，给软件行业新人分享建议。关于认知误区：软件行业确实薪资较高，但仅靠速成培训班难以获得真正的高薪，热爱和持续投入才是关键；程序员加班分主动和被动，热爱技术者主动加班是享受而非负担；培训班不能保证好工作，关键在于自己扎实学习和勤加练习。关于新人定义，包括在校学生、转行者、已入行但迷茫的探索者。开启历练的最佳时机是大一大二，起步晚更需要加倍努力，不要抱有侥幸心理。最后强调：编程高手源自不断操练和思考，勇敢迈出第一步。\",\"content\":\"$4a\",\"tags\":[\"职业成长\"],\"published\":true,\"readingTime\":8,\"category\":\"career\",\"relativePath\":\"career/a-letter-for-newer.mdx\"},{\"slug\":\"my-agile-practice-in-thoughtworks\",\"year\":\"2017\",\"month\":\"02\",\"day\":\"12\",\"title\":\"我的ThoughtWorks敏捷初体验\",\"date\":\"2017-02-12T00:00:00.000Z\",\"excerpt\":\"分享在ThoughtWorks参与海外独立交付项目的敏捷实践经验。文章详细介绍了IPM、Standup、Story Kick Off、Pair、TDD、Code Review、Showcase、CI、Retro等敏捷实践，阐述如何通过高效协作与快速反馈实现项目成功交付，并强调敏捷不只是流程形式，更要追求实践背后的真正价值。\",\"content\":\"$4b\",\"tags\":[\"软件开发\",\"敏捷教练\"],\"published\":true,\"readingTime\":21,\"category\":\"swd\",\"relativePath\":\"swd/agile/my-agile-practice-in-thoughtworks.mdx\"},{\"slug\":\"summary-for-2016\",\"year\":\"2017\",\"month\":\"01\",\"day\":\"01\",\"title\":\"ThoughtWorks，我的2016\",\"date\":\"2017-01-01T00:00:00.000Z\",\"excerpt\":\"\\n\\n\\n---\\n\\n 匆匆那年\\n翻开自己的博客，重新读过 ThoughtWorks，我的2015\\n 这篇文章，感觉那时的我像是一个小孩吃到了期盼已久的糖果果，好奇心得到满足，并且也体会到了糖果的来之不易，拥有后倍加珍惜，而且享受其中。2015年，经历了`入职`--\u003e`Shadow(Off Shore)`--\u003e`On Beach`--\u003e`国内出差`--\u003e`国外出差`--\u003e`Billable(Off ...\",\"content\":\"$4c\",\"tags\":[\"职业成长\"],\"published\":true,\"readingTime\":6,\"category\":\"career\",\"relativePath\":\"career/summary-for-2016.mdx\"},{\"slug\":\"trust-building-for-buddy-sponsor\",\"year\":\"2016\",\"month\":\"05\",\"day\":\"15\",\"title\":\"Buddy/Sponsor培训•信任的构建\",\"date\":\"2016-05-15T00:00:00.000Z\",\"excerpt\":\"Buddy/Sponsor是ThoughtWorks的师徒制机制，Buddy陪伴新人度过试用期，Sponsor在转正后继续指导职业发展。这种机制旨在帮助新人融入大家庭、培养梯队建设、降低离职风险、吸引优秀人才。成功的Buddy/Sponsor应具备能力强、责任心、安全感、真诚、口碑好、亲和力、同理心等特质。信任的三要素包括：动机（互惠原则）、能力（技能、认知、态度）、品格（言行一致、履行承诺）。医患关系信任缺失的问题主要出在品格层面。作为Buddy/Sponsor，应认同公司文化价值观，对工作充满热情，富有责任心和同理心，积极主动地关注徒弟成长。\",\"content\":\"$4d\",\"tags\":[\"职业成长\"],\"published\":true,\"readingTime\":9,\"category\":\"career\",\"relativePath\":\"career/trust-building-for-buddy-sponsor.mdx\"},{\"slug\":\"3-mistakes-of-first-tl\",\"year\":\"2016\",\"month\":\"03\",\"day\":\"27\",\"title\":\"初次做技术领导的3个陷阱\",\"date\":\"2016-03-27T00:00:00.000Z\",\"excerpt\":\"开发人员初次转型为技术领导（TL）时，往往因为旧有习惯而踏入三个陷阱。第一个陷阱是所有时间都在编码，过度投入开发工作而忽略技术愿景创造、团队指导等职责。第二个陷阱是独自做所有技术决定，这会使TL成为团队瓶颈，削弱成员动力，应采用从委派到独裁等多种决策方式。第三个陷阱是忽视团队文化培养，未能建立信任关系和有效的协作机制。TL需要在技术和领导责任之间找到平衡，才能带领团队走向成功。\",\"content\":\"$4e\",\"tags\":[\"职业成长\"],\"published\":true,\"readingTime\":3,\"category\":\"career\",\"relativePath\":\"career/3-mistakes-of-first-tl.mdx\"},{\"slug\":\"5-tips-being-an-effective-tl\",\"year\":\"2016\",\"month\":\"03\",\"day\":\"15\",\"title\":\"高效技术领导的5个锦囊妙计\",\"date\":\"2016-03-15T00:00:00.000Z\",\"excerpt\":\"转型为技术领导（TL）对开发人员是艰难挑战，因为管理和沟通技能不能从编码经验自动转化。高效TL的五个锦囊：1.学会委托，不独自承担所有编码工作，让团队成员获得成长机会；2.抽出时间写代码，保持对代码库的熟悉和团队成员的尊敬；3.可视化系统架构，通过白板会议和图表帮助开发人员理解系统设计与自身工作的关联；4.与团队成员一对一交流，了解每个人的目标和成长需求；5.学会说业务语言，用业务人员熟悉的术语解释技术概念，减小沟通隔阂。\",\"content\":\"$4f\",\"tags\":[\"职业成长\"],\"published\":true,\"readingTime\":4,\"category\":\"career\",\"relativePath\":\"career/5-tips-being-an-effective-tl.mdx\"},{\"slug\":\"summary-for-2015\",\"year\":\"2016\",\"month\":\"01\",\"day\":\"01\",\"title\":\"ThoughtWorks，我的2015\",\"date\":\"2016-01-01T00:00:00.000Z\",\"excerpt\":\"2015年3月26日，作者正式加入ThoughtWorks，结束了创业失败的经历，开启了这家专业软件咨询公司的旅程。从西安到珠海再到短暂的新加坡出差，作者参与了国内外项目交付，在敏捷实践中不断成长。这里聚集着对工作充满热情的人，高效完成高质量工作、为客户创造持久价值是目标。日常工作中出现最多的词包括敏捷开发、用户体验、持续集成、持续交付、代码整洁、结对编程、测试驱动、代码审查。环境上没有领导办公室、没有隔栏，人手MacBook Pro，网络无限制。作者在打鸡血的状态下高效工作、快乐生活，享受累并快乐着的过程。\",\"content\":\"$50\",\"tags\":[\"职业成长\"],\"published\":true,\"readingTime\":6,\"category\":\"career\",\"relativePath\":\"career/summary-for-2015.mdx\"}],\"tags\":[\"AI 编程\",\"ClaudeCode\",\"Oh My OpenCode\",\"OpenCode\",\"TDD\",\"敏捷教练\",\"敏捷测试\",\"极限编程\",\"生活\",\"简单设计\",\"职业成长\",\"软件开发\",\"面向对象\"],\"postsPerPage\":12,\"initialPage\":3}]}]}]}]\n"])</script><script>self.__next_f.push([1,"11:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\nd:null\n"])</script><script>self.__next_f.push([1,"51:I[622,[],\"IconMark\"]\n"])</script><script>self.__next_f.push([1,"f:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"文章 | 第 3 页 | 袁慎建\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"分享技术知识、生活感悟与个人想法\"}],[\"$\",\"link\",\"2\",{\"rel\":\"manifest\",\"href\":\"/manifest.json\",\"crossOrigin\":\"$undefined\"}],[\"$\",\"meta\",\"3\",{\"name\":\"theme-color\",\"content\":\"#000000\"}],[\"$\",\"meta\",\"4\",{\"name\":\"color-scheme\",\"content\":\"dark light\"}],[\"$\",\"meta\",\"5\",{\"name\":\"mobile-web-app-capable\",\"content\":\"yes\"}],[\"$\",\"meta\",\"6\",{\"name\":\"apple-mobile-web-app-title\",\"content\":\"YSJ Blog\"}],[\"$\",\"meta\",\"7\",{\"name\":\"apple-mobile-web-app-status-bar-style\",\"content\":\"default\"}],[\"$\",\"meta\",\"8\",{\"property\":\"og:title\",\"content\":\"文章 | 第 3 页 | 袁慎建\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:description\",\"content\":\"分享技术知识、生活感悟与个人想法\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:image\",\"content\":\"http://localhost:3000/images/og-default.webp\"}],[\"$\",\"meta\",\"11\",{\"property\":\"og:image:width\",\"content\":\"1200\"}],[\"$\",\"meta\",\"12\",{\"property\":\"og:image:height\",\"content\":\"630\"}],[\"$\",\"meta\",\"13\",{\"property\":\"og:image:alt\",\"content\":\"袁慎建的文章\"}],[\"$\",\"meta\",\"14\",{\"property\":\"og:type\",\"content\":\"website\"}],[\"$\",\"meta\",\"15\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"16\",{\"name\":\"twitter:title\",\"content\":\"文章 | 第 3 页 | 袁慎建\"}],[\"$\",\"meta\",\"17\",{\"name\":\"twitter:description\",\"content\":\"分享技术知识、生活感悟与个人想法\"}],[\"
