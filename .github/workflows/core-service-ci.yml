name: Core Service CI

on:
  pull_request:
    paths:
      - "core-service/**"
      - ".github/workflows/core-service-ci.yml"
  push:
    branches: [main]
    paths:
      - "core-service/**"
      - ".github/workflows/core-service-ci.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync dependencies
        run: uv sync --frozen --extra dev
        working-directory: core-service

      - name: Ruff
        run: uv run --frozen --no-sync ruff check app tests
        working-directory: core-service

      - name: Mypy
        run: uv run --frozen --no-sync mypy app
        working-directory: core-service

      - name: Test
        env:
          APP_ENV: test
          DATABASE_URL: sqlite+aiosqlite:///./test.db
        run: uv run --frozen --no-sync pytest tests -q
        working-directory: core-service

      - name: Migration smoke
        env:
          APP_ENV: test
          DATABASE_URL: sqlite+aiosqlite:///./migration-smoke.db
        run: uv run --frozen --no-sync alembic -c alembic.ini upgrade head
        working-directory: core-service

      - name: Trigger Render deploy
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is missing; skip Render deploy."
            exit 0
          fi
          curl -fsS "$RENDER_DEPLOY_HOOK_URL"

      - name: Render health smoke
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          CORE_SERVICE_HEALTH_URL: ${{ vars.CORE_SERVICE_HEALTH_URL }}
        run: |
          if [ -z "$CORE_SERVICE_HEALTH_URL" ]; then
            echo "CORE_SERVICE_HEALTH_URL is missing; skip health smoke."
            exit 0
          fi
          curl -fsS "$CORE_SERVICE_HEALTH_URL"
