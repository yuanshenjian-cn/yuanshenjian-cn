name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Validate content
        run: npm run validate-content

      - name: Run tests
        run: npm run test

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: |
            dist/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx', 'content/**/*.md', 'content/**/*.mdx') }}

      - name: Build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_AI_WORKER_URL: ${{ vars.NEXT_PUBLIC_AI_WORKER_URL }}
          NEXT_PUBLIC_AI_ENABLED: ${{ vars.NEXT_PUBLIC_AI_ENABLED }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          NEXT_PUBLIC_GISCUS_REPO: ${{ vars.NEXT_PUBLIC_GISCUS_REPO }}
          NEXT_PUBLIC_GISCUS_REPO_ID: ${{ vars.NEXT_PUBLIC_GISCUS_REPO_ID }}
          NEXT_PUBLIC_GISCUS_CATEGORY: ${{ vars.NEXT_PUBLIC_GISCUS_CATEGORY }}
          NEXT_PUBLIC_GISCUS_CATEGORY_ID: ${{ vars.NEXT_PUBLIC_GISCUS_CATEGORY_ID }}
        run: npm run build:prod

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  purge-cache:
    needs: deploy
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Check Cloudflare purge prerequisites
        id: prereq
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ZONE_ID" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: ${{ steps.prereq.outputs.ready == 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        if: ${{ steps.prereq.outputs.ready == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Purge Cloudflare cache
        if: ${{ steps.prereq.outputs.ready == 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          before="$GITHUB_EVENT_BEFORE"
          if [ -n "$before" ] && [ "$before" != "0000000000000000000000000000000000000000" ]; then
            mapfile -t changed_files < <(git diff --name-only "$before" "$GITHUB_SHA")
          else
            mapfile -t changed_files < <(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
          fi

          args=(--scope deploy)
          for file in "${changed_files[@]}"; do
            args+=(--changed-file "$file")
          done

          node scripts/purge-cloudflare-cache.js "${args[@]}"

      - name: Skip Cloudflare purge
        if: ${{ steps.prereq.outputs.ready != 'true' }}
        run: |
          echo "CLOUDFLARE_API_TOKEN or CLOUDFLARE_ZONE_ID is missing; skip purge-cache job gracefully."
