name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: site

      - name: Type check
        run: npm run typecheck
        working-directory: site

      - name: Lint
        run: npm run lint
        working-directory: site

      - name: Validate content
        run: node scripts/validate-post.js

      - name: Run tests
        run: npm run test && npm exec vitest run -c vitest.workspace.config.ts
        working-directory: site

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: |
            site/dist/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('site/package-lock.json', 'site/**/*.js', 'site/**/*.jsx', 'site/**/*.ts', 'site/**/*.tsx', 'content/**/*.md', 'content/**/*.mdx') }}

      - name: Build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_AI_WORKER_URL: ${{ vars.NEXT_PUBLIC_AI_WORKER_URL }}
          NEXT_PUBLIC_CORE_SERVICE_URL: ${{ vars.NEXT_PUBLIC_CORE_SERVICE_URL }}
          NEXT_PUBLIC_AI_ENABLED: ${{ vars.NEXT_PUBLIC_AI_ENABLED }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          NEXT_PUBLIC_GISCUS_REPO: ${{ vars.NEXT_PUBLIC_GISCUS_REPO }}
          NEXT_PUBLIC_GISCUS_REPO_ID: ${{ vars.NEXT_PUBLIC_GISCUS_REPO_ID }}
          NEXT_PUBLIC_GISCUS_CATEGORY: ${{ vars.NEXT_PUBLIC_GISCUS_CATEGORY }}
          NEXT_PUBLIC_GISCUS_CATEGORY_ID: ${{ vars.NEXT_PUBLIC_GISCUS_CATEGORY_ID }}
        run: npm run build:prod
        working-directory: site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  purge-cache:
    needs: deploy
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Check Cloudflare purge prerequisites
        id: prereq
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ZONE_ID" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: ${{ steps.prereq.outputs.ready == 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        if: ${{ steps.prereq.outputs.ready == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve Cloudflare purge diff base
        if: ${{ steps.prereq.outputs.ready == 'true' }}
        id: purge-base
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          before="$GITHUB_EVENT_BEFORE"
          last_successful_sha="$(gh api "/repos/$GITHUB_REPOSITORY/actions/workflows/deploy.yml/runs?branch=$GITHUB_REF_NAME&status=success&per_page=1" --jq '.workflow_runs[0].head_sha // ""')"

          if [ -n "$last_successful_sha" ] && git cat-file -e "$last_successful_sha^{commit}" 2>/dev/null; then
            before="$last_successful_sha"
            echo "Using last successful deploy SHA as purge diff base: $before"
          elif [ -n "$before" ] && [ "$before" != "0000000000000000000000000000000000000000" ]; then
            echo "Falling back to push before SHA as purge diff base: $before"
          else
            before=""
            echo "No prior deploy SHA available; purge will fall back to current commit file list."
          fi

          echo "compare_base=$before" >> "$GITHUB_OUTPUT"

      - name: Purge Cloudflare cache
        if: ${{ steps.prereq.outputs.ready == 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
          COMPARE_BASE: ${{ steps.purge-base.outputs.compare_base }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          before="$COMPARE_BASE"
          if [ -n "$before" ] && [ "$before" != "0000000000000000000000000000000000000000" ]; then
            mapfile -t changed_files < <(git diff --name-only "$before" "$GITHUB_SHA")
          else
            mapfile -t changed_files < <(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
          fi

          args=(--scope deploy)
          for file in "${changed_files[@]}"; do
            args+=(--changed-file "$file")
          done

          node scripts/purge-cloudflare-cache.js "${args[@]}"

      - name: Skip Cloudflare purge
        if: ${{ steps.prereq.outputs.ready != 'true' }}
        run: |
          echo "CLOUDFLARE_API_TOKEN or CLOUDFLARE_ZONE_ID is missing; skip purge-cache job gracefully."
