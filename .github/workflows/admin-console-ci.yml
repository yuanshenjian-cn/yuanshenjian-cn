name: Admin Console CI

on:
  pull_request:
    paths:
      - "admin-console/**"
      - ".github/workflows/admin-console-ci.yml"
  push:
    branches: [main]
    paths:
      - "admin-console/**"
      - ".github/workflows/admin-console-ci.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: admin-console/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: admin-console

      - name: Type check
        run: npm run typecheck
        working-directory: admin-console

      - name: Build
        env:
          VITE_CORE_SERVICE_URL: ${{ vars.VITE_CORE_SERVICE_URL }}
        run: npm run build
        working-directory: admin-console

      - name: Deploy Cloudflare Pages
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_ADMIN: ${{ vars.CLOUDFLARE_PAGES_PROJECT_ADMIN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ] || [ -z "$CLOUDFLARE_PAGES_PROJECT_ADMIN" ]; then
            echo "Cloudflare Pages variables are missing; skip admin-console deploy."
            exit 0
          fi
          npx wrangler pages deploy admin-console/dist --project-name="$CLOUDFLARE_PAGES_PROJECT_ADMIN"
