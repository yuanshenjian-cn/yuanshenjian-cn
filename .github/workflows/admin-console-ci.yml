name: Admin Console CI

on:
  pull_request:
    paths:
      - "admin-console/**"
      - ".github/workflows/admin-console-ci.yml"
  push:
    branches: [main]
    paths:
      - "admin-console/**"
      - ".github/workflows/admin-console-ci.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: admin-console/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: admin-console

      - name: Type check
        run: npm run typecheck
        working-directory: admin-console

      - name: Build
        env:
          VITE_CORE_SERVICE_URL: ${{ vars.VITE_CORE_SERVICE_URL }}
          VITE_TURNSTILE_SITE_KEY: ${{ vars.VITE_TURNSTILE_SITE_KEY }}
        run: npm run build
        working-directory: admin-console

      - name: Trigger Vercel deploy
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          VERCEL_ADMIN_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_ADMIN_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_ADMIN_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_ADMIN_DEPLOY_HOOK_URL is missing; skip Vercel deploy."
            exit 0
          fi
          curl -fsS -X POST "$VERCEL_ADMIN_DEPLOY_HOOK_URL"
