name: RAG Sync

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "content/**"
      - "core-service/**"
      - "site/lib/author-profile-data.js"
      - "scripts/build-ai-data.js"
      - "site/package-lock.json"

concurrency:
  group: rag-sync-production
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        run: npm ci
        working-directory: site

      - name: Validate content
        run: node scripts/validate-post.js

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install core-service dependencies
        run: uv sync --frozen
        working-directory: core-service

      - name: Check RAG sync prerequisites
        id: prereq
        env:
          DATABASE_URL: ${{ secrets.CORE_SERVICE_DATABASE_URL }}
          EMBEDDING_BASE_URL: ${{ secrets.EMBEDDING_BASE_URL }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_MODEL_ID: ${{ vars.EMBEDDING_MODEL_ID }}
        run: |
          if [ -z "$DATABASE_URL" ] || [ -z "$EMBEDDING_BASE_URL" ] || [ -z "$EMBEDDING_API_KEY" ] || [ -z "$EMBEDDING_MODEL_ID" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Validate core-service database URL
        if: ${{ steps.prereq.outputs.ready == 'true' }}
        env:
          DATABASE_URL: ${{ secrets.CORE_SERVICE_DATABASE_URL }}
        run: |
          uv run --frozen --no-sync python - <<'PY'
          import os
          from sqlalchemy.engine import make_url

          url = os.environ.get("DATABASE_URL", "").strip()
          if not url:
              raise SystemExit("CORE_SERVICE_DATABASE_URL is missing")
          if not url.startswith("postgresql+asyncpg://"):
              raise SystemExit(
                  "CORE_SERVICE_DATABASE_URL must use postgresql+asyncpg:// and sslmode=require"
              )
          if "#" in url:
              raise SystemExit(
                  "CORE_SERVICE_DATABASE_URL contains raw '#'; encode it as %23 in the password"
              )
          make_url(url)
          print("CORE_SERVICE_DATABASE_URL format is valid")
          PY
        working-directory: core-service

      - name: Sync public RAG content
        if: ${{ steps.prereq.outputs.ready == 'true' }}
        env:
          APP_ENV: production
          DATABASE_URL: ${{ secrets.CORE_SERVICE_DATABASE_URL }}
          EMBEDDING_BASE_URL: ${{ secrets.EMBEDDING_BASE_URL }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_MODEL_ID: ${{ vars.EMBEDDING_MODEL_ID }}
        run: uv run --frozen --no-sync python -m app.contexts.knowledge_base.interface.published_content_sync_cli --repo-root .. --commit-sha "$GITHUB_SHA"
        working-directory: core-service

      - name: Skip RAG sync
        if: ${{ steps.prereq.outputs.ready != 'true' }}
        run: |
          echo "CORE_SERVICE_DATABASE_URL / EMBEDDING_BASE_URL / EMBEDDING_API_KEY / EMBEDDING_MODEL_ID is missing; skip RAG sync gracefully."
